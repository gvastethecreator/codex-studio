name: Bug report
description: Report a reproducible problem in Codex Studio.
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Codex Studio. Please include enough detail to reproduce the issue locally.
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: bun
    attributes:
      label: Bun version
      placeholder: bun --version
    validations:
      required: true
  - type: input
    id: codex
    attributes:
      label: Codex version
      placeholder: codex --version
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command used
      placeholder: bun run dev
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Attach relevant logs from your Studio Library logs folder or `logs/tooling/`. Remove secrets before posting.
