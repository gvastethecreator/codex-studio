# Copy to ../presets/<pack_id>/<PRESET_ID>.yaml for sprite-oriented style presets.
schemaVersion: 1
id: SPRITE-PRESET-ID
packId: pack_06
name: Human Readable Sprite Style
category: 6. Video Game & Pixel Art Styles
version: 1
supportedTasks:
  - sprite_sheet
  - image_generate
  - style_preset_card
tags:
  - game-art
  - sprite-sheet
visualDna:
  aesthetic: Sprite-ready game art with clear silhouette language and readable shape hierarchy.
  subject_treatment: Consistent proportions across frames, strong pose readability, clean action arcs.
  color_and_tone: Limited palette with separated shadow, midtone, highlight, and accent ramps.
  lighting_and_shadow: Simple directional lighting that stays stable across animation frames.
  texture_and_material: Controlled pixel/noise detail that does not shimmer between frames.
  camera_and_composition: Orthographic side or three-quarter view, centered subject, stable scale.
  atmosphere_and_mood: Expressive game feel without scene clutter or background dependency.
  rendering_and_quality: Animation-sheet friendly, crisp edges, no motion blur, no text.
avoidRules:
  - motion blur
  - inconsistent proportions
  - changing costume
  - background scene
  - watermark
  - text
assets:
  defaultImage: /assets/recipes/styles/defaults/SPRITE-PRESET-ID.webp
attributes:
  negativePrompt: motion blur, inconsistent proportions, changing costume, background scene, watermark, text
  layout:
    preferredFrameCount: 8
    frameGrid: 4x2
    transparentBackground: true
taxonomy:
  packId: pack_06
  packName: Essential Art Styles
  categoryId: video-game-and-pixel-art-styles
  categoryName: 6. Video Game & Pixel Art Styles
  tags:
    - game-art
    - sprite-sheet
  supportedTasks:
    - sprite_sheet
    - image_generate
    - style_preset_card
  hasDefaultImage: true
