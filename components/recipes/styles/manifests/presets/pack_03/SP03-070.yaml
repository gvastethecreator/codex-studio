visualDna:
  aesthetic: Reboot/Toy Story 1 early feature-era CGI, pioneer polygons, awkward charm
  form_and_line: Simple geometry
  color_palette: Primary colors, flat 90s palette
  lighting_setup: Phong shading, ambient-fill
  material_texture: Checkerboard, procedural era
  render_quality: Vintage CGI, uncanny, nostalgic retro
  spatial_distortion: Stiff animation
  atmosphere: Nostalgic, weird, pioneering spirit
  key_features: No shadows, jitter-free geometry
  creative_brief: >-
    Simple geometry wears Phong shading like a badge of its era — primary colors pop against checkerboard textures, and
    ambient-fill lighting substitutes for the bounce light these renderers could not yet calculate. No ambient
    occlusion, no global illumination, just the honest awkwardness of pioneer polygons rendered with the tools of 1995.
    The image channels Reboot and Toy Story 1: stiff animation, uncanny charm, the pioneering spirit of an industry
    discovering what it could become. Apply Retro CGI as a portable 3D/render style system over any input: preserve its
    renderer logic, material behavior, geometry language, lighting grammar, and production cues while avoiding a
    required character, vehicle, prop, environment, UI screen, product shot, or scene template.
avoidRules:
  - modern
  - ambient occlusion
