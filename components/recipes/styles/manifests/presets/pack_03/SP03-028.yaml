  material_texture: Glossy, class-A surface
  render_quality: CAD, automotive, manufacturing-grade
  atmosphere: Perfect, engineered, mathematical precision
  key_features: Smoothness, G2 continuity
  creative_brief: >-
    Give the input NURBS-like surface discipline: mathematically smooth curves, zebra-stripe reflection checks, G2
    continuity and class-A gloss. Automotive CAD language may guide the finish, but no car, fender, or design-studio
    setup is required. Apply Nurbs Surface as a portable 3D/render style system over any input: preserve its renderer
    logic, material behavior, geometry language, lighting grammar, and production cues while avoiding a required
    character, vehicle, prop, environment, UI screen, product shot, or scene template.
