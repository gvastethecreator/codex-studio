visualDna:
  aesthetic: >-
    Porcelain within 2. Materials: a reusable 3D & CGI Rendering visual language with a clear stylistic
    thesis, disciplined mood, and recognizable art direction. Keep the result transferable across subjects
    while preserving Porcelain's specific style identity.
  subject_treatment: >-
    Define Porcelain through line, mass, contour, spacing, and rhythm. Keep forms readable, intentional, and
    reusable beyond one literal scene.
  color_and_tone: >-
    Use a Porcelain-specific palette with clear dominant, secondary, and accent roles. Keep contrast
    deliberate and avoid generic color wash.
  lighting_and_shadow: >-
    Use lighting that makes Porcelain recognizable: purposeful key, rim, bounce, shadow, and glow behavior
    with readable hierarchy.
  texture_and_material: >-
    Use materials and textures that reinforce Porcelain: surface response, grain, patina, polish, or wear
    should feel intentional and style-defining.
  camera_and_composition: >-
    Lookdev camera for Porcelain: close three-quarter or macro material framing, strong highlight planes,
    readable surface curvature, and controlled depth.
  atmosphere_and_mood: >-
    Set a mood that belongs to Porcelain: specific, coherent, and distinct, with emotional tone carried by
    visual systems rather than narrative captioning.
  rendering_and_quality: >-
    Render Porcelain with high production clarity, strong silhouette reads, clean detail priority, and no
    accidental UI, text, logos, or watermark.
  key_features: >-
    Prioritize Porcelain's key features: recognizable shape language, palette logic, material cues, lighting
    behavior, and composition rules.
  creative_brief: >-
    Create a style-card that translates Porcelain into a portable visual system for 2. Materials. Preserve the
    preset identity through style mechanics, not a fixed scene, character, prop, or story beat.
