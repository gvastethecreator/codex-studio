  aesthetic: Glazed ceramic material treatment
  form_and_line: Smooth curves
  color_palette: White, painted details, hand-glazed accents
  lighting_setup: Soft gloss, ceramic luster
  material_texture: Smooth, fragile, vitreous sheen
  render_quality: Doll, fine china, collectible-grade
  atmosphere: Delicate, creepy, period-piece elegance
  key_features: Glaze, crackle-line detail
  creative_brief: >-
    Smooth as frozen milk, the vitreous glaze catches light with the restraint of fine china — hand-painted details
    trace floral geometries across curved surfaces, and crackle lines web through the finish like frozen lightning.
    There is something unsettling in the perfection, a doll-like stillness that borders on the uncanny. Period-piece
    elegance meets the fragility of a collectible never meant to be touched. Apply Porcelain as a portable 3D/render
    style system over any input: preserve its renderer logic, material behavior, geometry language, lighting grammar,
    and production cues while avoiding a required character, vehicle, prop, environment, UI screen, product shot, or
    scene template.
