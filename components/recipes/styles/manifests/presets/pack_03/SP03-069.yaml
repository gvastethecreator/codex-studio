  creative_brief: 'Orange heat blooms into black smoke — turbulence curls the pyroclastic density into rolling vortices, and self-illuminated volumes cast their own light onto the scene like a miniature sun born in an instant. The expansion reads as physics rather than art direction, Houdini simulations where every wisp of smoke and tongue of flame obeys the mathematics of fluid dynamics. The image is cinematic destruction frozen at its peak: dangerous, dynamic, a fireball that will have consumed itself before the next frame renders.'
