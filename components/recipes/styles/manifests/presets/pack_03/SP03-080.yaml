  creative_brief: 'Grey veins drift through white Carrara like weather systems frozen in stone — slight subsurface scattering gives the marble a translucency that suggests depth beneath the polished surface, and chisel marks (where present) record the sculptor''s last touch before setting down the tool. The stone polish reflects soft light without the hardness of metal, and the veined-crystal surface reads as geology repurposed into art. The image is neoclassical perfection: a museum piece rendered with the stillness of eternity, carved from the same material as Michelangelo''s dreams.'
