  texture_and_material: Mechanical parts, greeble density
  camera_and_composition: >-
    Lookdev camera for Kitbash: three-quarter or orthographic framing, clean silhouette read, material
    highlights, controlled depth, and vertical card composition.
  atmosphere_and_mood: Industrial, complex, constructed chaos
  rendering_and_quality: Concept art, detailed, blockbuster sci-fi
  key_features: Dense detail, mechanical storytelling
  creative_brief: >-
    Densify the input with kitbash logic: greebles, panel seams, rivets, worn industrial metal and
    ambient-occlusion pockets that imply functional assembly. It can hint at starship/mecha engineering when
    suitable, but must not force a vehicle hull, battle staging, or specific sci-fi set. Apply Kitbash as a
    portable 3D/render style system over any input: preserve its renderer logic, material behavior, geometry
    language, lighting grammar, and production cues while avoiding a required character, vehicle, prop,
    environment, UI screen, product shot, or scene template.
