  creative_brief: >-
    Push the input through organic-modeling language: flowing topology, dynamesh sculptural mass, branching or muscular
    rhythm, subsurface warmth and evolution-like surface logic. It may become creature/plant-like when useful, but must
    not require a living body, forest or biological subject. Apply Organic Modeling as a portable 3D/render style system
    over any input: preserve its renderer logic, material behavior, geometry language, lighting grammar, and production
    cues while avoiding a required character, vehicle, prop, environment, UI screen, product shot, or scene template.
