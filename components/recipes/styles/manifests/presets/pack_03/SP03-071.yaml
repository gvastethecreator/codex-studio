visualDna:
  aesthetic: Frosted glass interface
  form_and_line: White borders
  color_palette: Blurry background colors, frosted tones
  lighting_setup: Soft, diffuse-transmission
  material_texture: Noise blur, glass-transparency
  render_quality: Modern UI design, interface trend
  atmosphere: Clean, modern, translucent UX
  key_features: Floating cards, depth-blur layers
  creative_brief: >-
    Interface panels float in a hierarchy of blur — each card catches the colors behind it and softens them into frosted
    abstraction, and white borders trace the edges of translucent rectangles like window frames into another layer.
    Depth-blur cascades through the z-stack, and diffuse transmission gives glass its weight without its opacity. The
    image is modern UI rendered tactile: a glassmorphism dream where every surface is a window and every window is a
    promise of what lies beneath. Apply Glassmorphism UI as a portable 3D/render style system over any input: preserve
    its renderer logic, material behavior, geometry language, lighting grammar, and production cues while avoiding a
    required character, vehicle, prop, environment, UI screen, product shot, or scene template.
avoidRules:
