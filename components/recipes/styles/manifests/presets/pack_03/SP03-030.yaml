visualDna:
  aesthetic: >-
    Glitch 3D within 4. 3D Styles: a reusable 3D & CGI Rendering visual language with a clear stylistic thesis,
    disciplined mood, and recognizable art direction. Keep the result transferable across subjects while preserving
    Glitch 3D's specific style identity.
  form_and_line: >-
    Define Glitch 3D through line, mass, contour, spacing, and rhythm. Keep forms readable, intentional, and reusable
    beyond one literal scene.
  color_palette: >-
    Use a Glitch 3D-specific palette with clear dominant, secondary, and accent roles. Keep contrast deliberate and
    avoid generic color wash.
  lighting_setup: >-
    Use lighting that makes Glitch 3D recognizable: purposeful key, rim, bounce, shadow, and glow behavior with readable
    hierarchy.
  material_texture: >-
    Use materials and textures that reinforce Glitch 3D: surface response, grain, patina, polish, or wear should feel
    intentional and style-defining.
  render_quality: >-
    Render Glitch 3D with high production clarity, strong silhouette reads, clean detail priority, and no accidental UI,
    text, logos, or watermark.
  atmosphere: >-
    Set a mood that belongs to Glitch 3D: specific, coherent, and distinct, with emotional tone carried by visual
    systems rather than narrative captioning.
  key_features: >-
    Prioritize Glitch 3D's key features: recognizable shape language, palette logic, material cues, lighting behavior,
    and composition rules.
  creative_brief: >-
    Create a style-card that translates Glitch 3D into a portable visual system for 4. 3D Styles. Preserve the preset
    identity through style mechanics, not a fixed scene, character, prop, or story beat.
