  key_features: Artifacts, vertex explosion
  creative_brief: 'Vertices tear free from their moorings and scatter like shrapnel from a digital explosion — UV maps stretch, texture channels swap, and the geometry itself forgets what shape it was supposed to hold. Corrupted data becomes aesthetic: chromatic offsets bleed at the seams, and mesh errors bloom into accidental sculpture. The image is signal failure rendered beautiful, a datamosh fever dream where the glitch is the message and destruction is the medium.'
