  creative_brief: 'Paper grain catches light at grazing angles, and fold creases cast micro-shadows between layered cardstock planes — every surface reads as something you could cut with scissors and reassemble on a craft table. The depth between layers is physical, built from stacked sheets rather than extruded geometry, and folded construction replaces curved surfaces with the honest language of the crease. The image is origami precision meets art-project warmth: papercraft rendered with the conviction that glue and patience built this world.'
