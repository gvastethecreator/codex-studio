visualDna:
  aesthetic: Mesh topology view
  form_and_line: Glowing lines
  color_palette: Black background, Neon lines, glow contrast
  lighting_setup: None, self-illuminated edges
  material_texture: Grid, topology linework
  render_quality: Technical, blueprint, debug-preview
  atmosphere: Technical, cyber, developer aesthetic
  key_features: Topology, edge-flow visibility
  creative_brief: >-
    Strip the input to topology: neon edge loops, self-illuminated mesh lines, visible edge flow and debug-viewport
    elegance. No need for a standalone object or black void; the style is structure made visible. Apply Wireframe Render
    as a portable 3D/render style system over any input: preserve its renderer logic, material behavior, geometry
    language, lighting grammar, and production cues while avoiding a required character, vehicle, prop, environment, UI
    screen, product shot, or scene template.
avoidRules:
  - solid
  - textured
