  creative_brief: 'The body opens like a textbook — cutaway views reveal layered systems in clinical red, blue, and white, every vessel and bone rendered with diagrammatic clarity rather than surgical gore. Shadowless diagnostic lighting flattens drama in favor of legibility, and translucent tissue gradients map density to opacity with the precision of a radiology workstation. The image is knowledge made visible: anatomy as architecture, the human machine explained through the lens of medical illustration.'
