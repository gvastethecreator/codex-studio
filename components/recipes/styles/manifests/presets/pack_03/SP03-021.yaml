visualDna:
  aesthetic: Minimalist mesh
  form_and_line: Visible triangles
  color_palette: Flat shading, vibrant stylized tones
  lighting_setup: Baked AO, ambient-fill
  material_texture: None or gradient, facet-clean
  render_quality: Indie game, retro, geometric charm
  atmosphere: Simple, clean, polygon purity
  key_features: Facets, edge visibility
  creative_brief: >-
    Reduce the input to deliberate low-poly clarity: visible facets, flat-shaded planes, ambient-occlusion crease
    accents and vibrant indie-game color. Treat geometry as graphic design, not a forced game world or landscape. Apply
    Low Poly as a portable 3D/render style system over any input: preserve its renderer logic, material behavior,
    geometry language, lighting grammar, and production cues while avoiding a required character, vehicle, prop,
    environment, UI screen, product shot, or scene template.
avoidRules:
  - high poly
  - smooth
  - detailed
