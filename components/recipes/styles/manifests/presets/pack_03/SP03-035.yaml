  material_texture: Real world reflection, ambient integration
  render_quality: Photorealistic integration, composited realism
  atmosphere: Grounded, location-accurate
  key_features: Matched lighting, reflection authenticity
  creative_brief: >-
    Integrate the input with HDRI truth: matched reflections, contact shadows, ambient color wrap and unseen-environment
    lighting that gives CG weight. Use location cues only as reflection language; do not require a sunset, mountaintop,
    city square or object placement. Apply HDRI Environment as a portable 3D/render style system over any input:
    preserve its renderer logic, material behavior, geometry language, lighting grammar, and production cues while
    avoiding a required character, vehicle, prop, environment, UI screen, product shot, or scene template.
