  creative_brief: A 360-degree photograph becomes the entire lighting rig — spherical harmony wraps the subject in light borrowed from a real sunset, a real mountaintop, a real city square at golden hour. Reflections carry the DNA of an actual place, not a studio approximation, and ambient integration makes the render disappear into the plate. The object belongs because the light says it belongs, photorealistic integration achieved through environmental truth rather than fakery.
