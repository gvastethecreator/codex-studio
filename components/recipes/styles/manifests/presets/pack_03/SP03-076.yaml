  creative_brief: 'Mylar wrinkles catch the world in distorted high-reflection — metallic foil shimmers across inflated curves, and visible seams trace the construction logic of balloons designed to impress at gallery scale. The reflective surfaces map studio lights into abstract highlights, and the inflated tension gives every form the buoyancy of helium and the weight of pop art. The image channels Jeff Koons party spectacle: celebration rendered in foil and air, sculpture that feels like it might float away mid-exhibition.'
