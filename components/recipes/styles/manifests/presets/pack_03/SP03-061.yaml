  color_and_tone: Gunmetal, painted metal, military-grade
  lighting_and_shadow: Rim light, mechanical edge-pop
  texture_and_material: Scratched metal, machined wear
  camera_and_composition: >-
    Lookdev camera for Hard Surface Modeling: three-quarter or orthographic framing, clean silhouette read,
    material highlights, controlled depth, and vertical card composition.
  atmosphere_and_mood: Industrial, tactical, engineered grit
  rendering_and_quality: Mech-design precision, machined credibility
  key_features: Functional parts, panel-line definition
  creative_brief: >-
    Give the input hard-surface/mecha discipline: bevel hierarchy, panel-line logic, service seams, machined
    wear and believable component density. If a character or object exists, it may mechanize toward mecha;
    avoid forcing weapons, combat, or military staging. Apply Hard Surface Modeling as a portable 3D/render
    style system over any input: preserve its renderer logic, material behavior, geometry language, lighting
    grammar, and production cues while avoiding a required character, vehicle, prop, environment, UI screen,
    product shot, or scene template.
