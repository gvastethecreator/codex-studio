  creative_brief: >-
    Give the input hard-surface/mecha discipline: bevel hierarchy, panel-line logic, service seams, machined wear and
    believable component density. If a character or object exists, it may mechanize toward mecha; avoid forcing weapons,
    combat, or military staging. Apply Hard Surface Modeling as a portable 3D/render style system over any input:
    preserve its renderer logic, material behavior, geometry language, lighting grammar, and production cues while
    avoiding a required character, vehicle, prop, environment, UI screen, product shot, or scene template.
