  creative_brief: 'No cuts, no glue — only the purity of the fold — sharp creases define every plane and vertex, and paper grain textures the flat surfaces with natural-fiber warmth. Soft lighting highlights fold geometry without burning the edges, and the absence of curves makes every angle a deliberate geometric decision. The image is folded poetry: traditional origami rendered in 3D with zen precision, a crane or lotus built from mathematical crease patterns that transform a single sheet into sculpture.'
