visualDna:
  aesthetic: >-
    Clay UI within 4. 3D Styles: a reusable 3D & CGI Rendering visual language with a clear stylistic thesis,
    disciplined mood, and recognizable art direction. Keep the result transferable across subjects while
    preserving Clay UI's specific style identity.
  subject_treatment: >-
    Define Clay UI through line, mass, contour, spacing, and rhythm. Keep forms readable, intentional, and
    reusable beyond one literal scene.
  color_and_tone: >-
    Use a Clay UI-specific palette with clear dominant, secondary, and accent roles. Keep contrast deliberate
    and avoid generic color wash.
  lighting_and_shadow: >-
    Use lighting that makes Clay UI recognizable: purposeful key, rim, bounce, shadow, and glow behavior with
    readable hierarchy.
  texture_and_material: >-
    Use materials and textures that reinforce Clay UI: surface response, grain, patina, polish, or wear should
    feel intentional and style-defining.
  camera_and_composition: >-
    Lookdev camera for Clay UI: three-quarter or orthographic framing, clean silhouette read, material
    highlights, controlled depth, and vertical card composition.
  atmosphere_and_mood: >-
    Set a mood that belongs to Clay UI: specific, coherent, and distinct, with emotional tone carried by
    visual systems rather than narrative captioning.
  rendering_and_quality: >-
    Render Clay UI with high production clarity, strong silhouette reads, clean detail priority, and no
    accidental UI, text, logos, or watermark.
  key_features: >-
    Prioritize Clay UI's key features: recognizable shape language, palette logic, material cues, lighting
    behavior, and composition rules.
  creative_brief: >-
    Create a style-card that translates Clay UI into a portable visual system for 4. 3D Styles. Preserve the
    preset identity through style mechanics, not a fixed scene, character, prop, or story beat.
