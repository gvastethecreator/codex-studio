    Lookdev camera for Ice Sculpture: close three-quarter or macro material framing, strong highlight planes,
    readable surface curvature, and controlled depth.
  atmosphere_and_mood: Cold, temporary, ephemeral beauty
  rendering_and_quality: Event, art, gala-tier sculpture
  key_features: Transparency, melt-edge detail
  creative_brief: >-
    Carve the input into ice-sculpture material: cold translucence, blue-tinted refraction, chiseled edges,
    melt-softened corners and frosty dispersion. Preserve gala-tier ephemerality without forcing a literal
    sculpture or event setting. Apply Ice Sculpture as a portable 3D/render style system over any input:
    preserve its renderer logic, material behavior, geometry language, lighting grammar, and production cues
    while avoiding a required character, vehicle, prop, environment, UI screen, product shot, or scene
    template.
