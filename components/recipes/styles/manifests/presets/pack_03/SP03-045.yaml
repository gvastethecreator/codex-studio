    Lookdev camera for Wireframe on Shaded: three-quarter or orthographic framing, clean silhouette read,
    material highlights, controlled depth, and vertical card composition.
  atmosphere_and_mood: Educational, process, design-transparency
  rendering_and_quality: Making-of, technical, breakdown beauty
  key_features: Wire overlay, shaded+wireframe combo
  creative_brief: >-
    Overlay the input with shaded-wireframe construction: visible topology, glowing edge flow, material
    surface retained beneath technical linework. Treat mesh logic as graphic pattern; do not require a model
    turntable or peeled-skin object. Apply Wireframe on Shaded as a portable 3D/render style system over any
    input: preserve its renderer logic, material behavior, geometry language, lighting grammar, and production
    cues while avoiding a required character, vehicle, prop, environment, UI screen, product shot, or scene
    template.
