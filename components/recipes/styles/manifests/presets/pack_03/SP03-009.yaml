  creative_brief: Digital clay remembers the pressure of a stylus like real clay remembers a thumbprint — matcap highlights ride the crest of every sculpted fold, and dynamesh topology flows beneath the surface like invisible grain. The monochromatic wax palette strips away distraction, leaving pure form under rim-lit scrutiny, anatomical studies that feel excavated rather than constructed. The raw model stands in its own honesty, untextured and unapologetic.
