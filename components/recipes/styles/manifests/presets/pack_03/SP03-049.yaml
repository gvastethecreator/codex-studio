visualDna:
  aesthetic: Character model sheet
  form_and_line: Anatomical
  color_palette: Neutral light, skin-tone accuracy
  lighting_setup: Flat, character-sheet evenness
  material_texture: Skin, cloth, character assembly
  render_quality: Concept art, production, model-sheet
  atmosphere: Neutral, design, audition-ready
  key_features: T-Pose or A-Pose, turn-around clarity
  creative_brief: >-
    Use production model-sheet clarity. If a character exists, keep T-pose or A-pose, neutral turnaround lighting and
    rig-ready anatomy/cloth truth. If no character exists, translate the subject into a neutral asset sheet with
    orthographic readability. Avoid action pose or narrative background. Apply Character Design as a portable 3D/render
    style system over any input: preserve its renderer logic, material behavior, geometry language, lighting grammar,
    and production cues while avoiding a required character, vehicle, prop, environment, UI screen, product shot, or
    scene template.
avoidRules:
  - action pose
  - background
