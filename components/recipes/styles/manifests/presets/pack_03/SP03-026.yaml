visualDna:
  aesthetic: Disassembled parts arranged
  form_and_line: 90 degree angles
  color_palette: Clean background, component contrast
  lighting_setup: Top down, shadow-free
  material_texture: Clean parts, disassembly beauty
  render_quality: Organized exploded-layout clarity
  atmosphere: Satisfying, organized, design-museum
  key_features: Grid layout, 90-degree arrangement
  creative_brief: >-
    Recompose the input as knolled structure: top-down orthographic order, right-angle spacing, exploded relationships
    and shadow-free museum clarity. If the subject has parts, separate them; otherwise translate its visual elements
    into a precise grid. Do not require a product teardown. Apply Knolling as a portable 3D/render style system over any
    input: preserve its renderer logic, material behavior, geometry language, lighting grammar, and production cues
    while avoiding a required character, vehicle, prop, environment, UI screen, product shot, or scene template.
