  creative_brief: 'Thousands of photographs resolve into a single mesh — photogrammetry captures the authentic noise of the real world, every surface imperfection a gift from the scan rather than an artist''s decision. Baked delit lighting carries the memory of the original capture environment, and photo-textured surfaces read as documentary truth rather than constructed fiction. The image channels Quixel Megascans realism: a rock, a tree stump, a ruined wall, rendered with the authority of something that actually exists.'
