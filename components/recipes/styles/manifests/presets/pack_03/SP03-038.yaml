  creative_brief: The subject retreats into near-silhouette while a halo of brilliance traces its outline with the precision of a calligrapher's final stroke — backlight carves definition from darkness, and every edge that catches the rim becomes the entire story. The dark masses between highlights pulse with withheld revelation, and the image holds tension like a dramatic pause before the hero steps forward. Moody, cinematic, a reveal staged in light's most economical gesture.
