  creative_brief: 'Every surface bears the memory of the thumb that pressed it — fingerprints ride ridges of plasticine like fossil records of a touch that happened between frames. Dust motes settle into crevices, matte clay colors refuse to shine, and the miniature set glows under studio lights with the warmth of a handmade universe. The image channels Aardman''s soul: imperfection as charm, patience as magic, the still frame vibrating with the effort of its own creation.'
