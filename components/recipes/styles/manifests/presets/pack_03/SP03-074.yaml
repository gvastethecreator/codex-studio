  creative_brief: >-
    Rebuild the input in neon-tube construction: bent glass, gas glow, transformer fittings, colored bloom and
    emissive spill. It may feel like signage or nightlife, but must not require brick walls, bars, text or an
    urban setting. Apply Neon Sign 3D as a portable 3D/render style system over any input: preserve its
    renderer logic, material behavior, geometry language, lighting grammar, and production cues while avoiding
    a required character, vehicle, prop, environment, UI screen, product shot, or scene template.
