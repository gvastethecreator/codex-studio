visualDna:
  aesthetic: Abstract shapes moving
  form_and_line: Trails
  color_palette: Vibrant, gradient
  lighting_setup: Studio
  material_texture: Glossy, abstract finish
  render_quality: Cinema 4D motion-design showcase, mograph energy
  spatial_distortion: Squash/Stretch
  atmosphere: Energetic, corporate, broadcast-level
  key_features: Abstract shapes, kinetic flow
  creative_brief: >-
    Geometry forgets to be still — glossy abstract shapes trail kinetic echoes behind them, and vibrant gradients smear
    across the frame like a motion-blur photograph of pure energy. Squash and stretch remembers animation's elastic
    origins, and Cinema 4D mograph sensibilities give every sphere and spline the confidence of broadcast design. The
    image pulses with corporate creativity at its most unleashed: a logo reveal frozen at the peak of its own spectacle.
    Apply Motion Graphics as a portable 3D/render style system over any input: preserve its renderer logic, material
    behavior, geometry language, lighting grammar, and production cues while avoiding a required character, vehicle,
    prop, environment, UI screen, product shot, or scene template.
