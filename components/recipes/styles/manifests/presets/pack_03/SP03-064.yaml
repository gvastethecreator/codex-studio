    highlights, controlled depth, and vertical card composition.
  atmosphere_and_mood: Technical, complex, assembly logic
  rendering_and_quality: Engineering, diagram, instructional
  key_features: Alignment, explosion direction
  creative_brief: >-
    Split the input into exploded-view logic: invisible assembly axes, precise spacing, subsystem color coding
    and cross-section surfaces that explain structure. If there are parts, separate them; otherwise infer
    component layers without forcing screws, housings or a manufactured product. Apply Exploded View as a
    portable 3D/render style system over any input: preserve its renderer logic, material behavior, geometry
    language, lighting grammar, and production cues while avoiding a required character, vehicle, prop,
    environment, UI screen, product shot, or scene template.
