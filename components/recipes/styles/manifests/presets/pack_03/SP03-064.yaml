  creative_brief: 'Components drift apart along invisible assembly axes, each part maintaining its exact spatial relationship to every other — the explosion is orderly, didactic, a diagram rendered in three dimensions. Assembly-color coding distinguishes subsystems, and flat lighting prioritizes legibility over drama, cross-section surfaces revealing what the solid exterior conceals. The image is engineering as spectacle: an instruction manual elevated to sculpture, every screw and housing floating in the precise position that explains how it all fits together.'
