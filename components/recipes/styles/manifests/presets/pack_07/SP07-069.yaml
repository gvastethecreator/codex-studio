visualDna:
  aesthetic: Inflable de juego con masa blanda presurizada, color blocking festivo y espacialidad temporal.
  form_and_line: Tubos neumáticos abultados, segmentación soldada, lóbulos redondeados de torre y geometría de anclaje por manguera.
  color_palette: High-saturation vinyl pink, electric yellow, safety orange, cobalt blue, bright green, and neutral seam-strip accents
  lighting_setup: Sol difuso exterior con especulares fuertes en vinilo, glow translúcido de panel y bloom suave en borde inflado.
  material_texture: Piel PVC glossy, crestas de soldadura térmica, membranas tensas, arrugas en carga y herrajes de blower.
  render_quality: Render inflable legible y juguetón con fidelidad material alta y brillo controlado de instalación temporal.
  spatial_distortion: Soft-volume inflation bulge and pressure-rounded edge behavior across all masses
  atmosphere: Energética, cinética y festiva, inequívocamente temporal.
  key_features: Bastidor tubular presurizado, retícula de costura térmica, zonificación vívida, paneles mesh y nodos de inflado visibles.
  creative_brief: >-
    Construye un sistema reusable de tratamiento inflable con masa redondeada
    por presión, topología de costura soldada y zonificación cromática saturada
    consistente entre sujetos.
