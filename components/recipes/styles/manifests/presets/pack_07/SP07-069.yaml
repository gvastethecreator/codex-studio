visualDna:
  aesthetic: Play-structure inflatable architecture language with pressurized soft-volume massing, carnival color blocking, and temporary-event spatial identity
  form_and_line: Bulging pneumatic tubes, welded panel segmentation, rounded turret lobes, soft crenellation bumps, and hose-fed anchoring geometry
  color_palette: High-saturation vinyl pink, electric yellow, safety orange, cobalt blue, bright green, and neutral seam-strip accents
  lighting_setup: Outdoor diffuse sun with strong vinyl specular hits, translucent panel glow, localized party practicals, and subtle subsurface edge bloom
  material_texture: Glossy PVC skin, heat-weld seam ridges, taut inflated membranes, wrinkle transitions at load points, nylon tie-down details, and blower-interface fittings
  render_quality: Toy-like yet structurally legible inflatable rendering with high material fidelity, controlled sheen, and clear temporary-installation character
  spatial_distortion: Soft-volume inflation bulge and pressure-rounded edge behavior across all masses
  atmosphere: Energetic, playful, kinetic, festive, and unmistakably temporary
  key_features: Pressurized tubular frame, heat-weld seam grid, vivid panel zoning, mesh safety windows, blower-fed inflation node, and soft-impact edge profiles
  creative_brief: >-
    Preserve inflatable-architecture grammar as a reusable style system:
    pressure-rounded massing, welded vinyl seam topology, and saturated modular
    color zoning must stay consistent independent of subject matter.
