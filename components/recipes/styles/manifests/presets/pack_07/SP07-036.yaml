visualDna:
  aesthetic: Hipercomercio de juego sensorial, diseñado para atención continua y permanencia prolongada.
  form_and_line: >-
    Densidad ortogonal de módulos brillantes, patrón no direccional, espejos estratégicos y
    circulación deliberadamente ambigua.
  color_palette: Red, Gold, Neon, Casino Carpet Confetti, Chrome, Velvet Purple
  lighting_setup: >-
    Base oscura con hotspots seriados, wash de techo, destellos decorativos y sobreestimulación
    luminosa controlada.
  material_texture: Patrón saturado, carcasas moldeadas, cromo usado, laminados brillantes y paño denso.
  render_quality: Realismo de estímulo alto con jerarquía lumínica comercial y acabado nocturno de gran densidad.
  spatial_distortion: None
  atmosphere: Activación continua, desorientación temporal y confort-presión de consumo.
  key_features: >-
    Envolvente sin tiempo, glow bajo, clusters de premio, supresión de wayfinding y profundidad
    espejada.
  creative_brief: >-
    El preset debe secuestrar atención con patrón, glow bajo, reflejo y desorientación comercial.
    Cualquier input se vuelve estímulo táctico de permanencia prolongada, más psicología ambiental
    que fiesta decorativa.
