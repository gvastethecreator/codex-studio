visualDna:
  aesthetic: Interior hipercomercial de juego, diseñado para economía sensorial continua y permanencia prolongada.
  form_and_line: Densidad ortogonal de máquinas, alfombra no direccional, espejos estratégicos y circulación deliberadamente ambigua.
  color_palette: Red, Gold, Neon, Casino Carpet Confetti, Chrome, Velvet Purple
  lighting_setup: Base oscura con hotspots de máquina, wash de techo, destellos decorativos y sobreestimulación luminosa controlada.
  material_texture: Alfombra de patrón saturado, carcasas moldeadas, cromo usado, laminados brillantes y paño de mesa denso.
  render_quality: Realismo de estímulo alto con jerarquía lumínica comercial y acabado nocturno de gran densidad.
  spatial_distortion: None
  atmosphere: Activación continua, desorientación temporal y confort-presión de consumo.
  key_features: Envolvente sin relojes, glow de techo bajo, clusters jackpot, supresión de wayfinding y profundidad espejada.
  creative_brief: >-
    Define una gramática de casino transferible donde patrón, brillo y reflejo
    secuestren la atención de forma estratégica. Debe sentirse táctico y
    comercial, nunca caricatura festiva.
