visualDna:
  aesthetic: Hyper-dense techno-brutalist residential style focused on vertical compression, improvised modularity, and infrastructural overload
  form_and_line: Repeating module stacks, cable-bundle diagonals, service-ladder zigzags, grille and shutter rhythms, fragmented light channels
  color_palette: Carbon blacks, oxidized rust browns, toxic greens, sign-magenta accents, smoggy blue-greys, low-luminance neon tints
  lighting_setup: Persistent artificial spill, flicker-prone practicals, hard occlusion pockets, wet-surface micro-reflections, narrow contrast windows
  material_texture: Corrugated steel fatigue, polymer grime bloom, layered paint peel, stained concrete, oxidized fastener patina, damp residue
  render_quality: High-detail architectural dystopia rendering with clutter legibility, controlled noise, and material density realism
  spatial_distortion: Vertical stacking exaggeration with narrow depth corridors and compressed breathing-space intervals
  atmosphere: Oppressive, overbuilt, unstable, electrically saturated, survivalist
  key_features: Modular stack logic, exposed service infrastructure, cable congestion patterns, degraded industrial surfaces, constrained circulation geometry
  creative_brief: >-
    Preserve the style as a system of compression and infrastructural excess:
    the visual identity must emerge from modular density, material wear, and
    electric clutter rather than a specific named district.
