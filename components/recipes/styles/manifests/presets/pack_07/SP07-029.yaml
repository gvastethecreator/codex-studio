visualDna:
  aesthetic: >-
    Vernáculo adobe de masa térmica, domesticidad desértica y expresión manual de arraigo
    territorial.
  form_and_line: >-
    Muros gruesos monolíticos, aristas suavizadas, cubiertas escalonadas, huecos profundos y
    parapetos bajos.
  color_palette: Terracota, arena, ocre cálido, salvia, canela y arcilla soleada.
  lighting_setup: Sol desértico duro, sombras profundas en vanos, glow de nichos y parpadeo de hogar tipo kiva.
  material_texture: >-
    Revoco de tierra encalada, fibra vegetal visible, huella de llana manual, vigas expuestas y teja
    de barro usada.
  render_quality: Honestidad material de alto realismo climático con imperfección artesanal plausible.
  spatial_distortion: Ondulación leve de muros por manufactura manual, manteniendo estabilidad tectónica.
  atmosphere: Cobijo térmico, calma árida y continuidad ancestral.
  key_features: >-
    Huecos profundos, masa excavada, nichos térmicos, geometría de hogar kiva y aristas manuales
    suavizadas.
  creative_brief: >-
    Mantén una gramática adobe transferible centrada en inercia térmica, hueco profundo y acabado
    manual visible. Debe comunicar adaptación climática y arraigo constructivo, no exotismo
    escénico.
