  color_palette: Blue, Gold, Biolum, Coral Pink, Seaweed Green, Rust-orange decay, Gleaming Brass
  lighting_setup: >-
    Filtro acuático azul profundo, constelaciones bioluminiscentes y contraste entre glow dorado
    interior y alarma roja.
  material_texture: Piedra mojada, vidrio presurizado, pátina cobre-verde, coral incrustado y hormigón con fugas.
