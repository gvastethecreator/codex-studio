  aesthetic: Tribal-canopy elevado con ingeniería orgánica artesanal y vida comunal suspendida.
  form_and_line: Hubs circulares, catenarias de cuerda, anillos abrazatroncos y circulación vertical por niveles orgánicos.
  color_palette: Redwood brown, moss green, rope tan, bark gray, filtered canopy gold, and muted ember accents for night signaling
  lighting_setup: Luz moteada filtrada por hojas, prácticos cálidos colgantes, rebote de fogata y glow nocturno de bajo contraste.
  material_texture: Madera desbastada, fibra de cuerda trenzada, paneles de paja tejida y amarres vegetales sobre soportes de corteza.
  render_quality: Realismo artesanal aventurero con integración arbórea legible y profundidad vertical consistente.
  spatial_distortion: None
  atmosphere: Comunal, ingeniosa y vigilante, con ritualidad suave de hábitat ecológico.
  key_features: Cuerdas enlazadas, plataformas radiales, pasarelas ceñidas al soporte vivo y nidos de observación elevados.
  creative_brief: >-
    Aplica una gramática vernacular suspendida: plataformas radiales, cuerdas catenarias, amarres vegetales, luz
    filtrada por dosel y materiales vivos. Debe expresar ingeniería comunal elevada sin tribu, planeta o set específico.
