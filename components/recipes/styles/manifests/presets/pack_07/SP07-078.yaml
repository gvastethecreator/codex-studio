  spatial_distortion: None
  atmosphere: Ominosa, deshumanizada y eficiente, con invasividad tecnológica constante.
  key_features: Modularidad cube-shell, matrices repetitivas, superred de conducciones, canales verdes y emisores circulares.
  creative_brief: >-
    Construye una gramática reusable de cybernetic-hive donde macroforma
    cúbica ortogonal, infraestructura saturada de conducciones y sistemas
    colectivos fosforoverdes sostengan identidad consistente.
