visualDna:
  aesthetic: Hive cibernético de infraestructura colectiva modular, utilidad implacable e integración máquina-orgánica invasiva.
  form_and_line: >-
    Masa ortogonal cúbica, haces densos de conductos, retículas de alcobas repetitivas y panelería recursiva de
    servicio.
  color_palette: >-
    Graphite black metals, gunmetal gray fields, phosphor green emissions, cold cyan plasma accents, and deep
    void-shadow undertones
  lighting_setup: >-
    Ambiente low-key espacial, pulso verde en conducciones, prácticos localizados y profundidad de sombra industrial de
    alto contraste.
  material_texture: Placas greeble densas, interfaces biomecánicas, arneses de cable, gel translúcido y pátina conductiva desgastada.
  render_quality: Tecnoindustrial denso con repetición modular estricta y precisión mecánica opresiva.
  spatial_distortion: None
  atmosphere: Ominosa, deshumanizada y eficiente, con invasividad tecnológica constante.
  key_features: Modularidad cube-shell, matrices repetitivas, superred de conducciones, canales verdes y emisores circulares.
  creative_brief: >-
    Aplica infraestructura hive cibernética: modularidad ortogonal, conducciones densas, fosforescencia verde, panelería
    recursiva y utilidad colectiva opresiva. Debe funcionar sin nombrar faccion, personaje o nave. Conserva modularidad
    hive, conducciones densas, fosforescencia verde y utilidad colectiva sin exigir edificio, paisaje, set, criatura ni escena fija.
