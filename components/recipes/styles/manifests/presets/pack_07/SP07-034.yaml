visualDna:
  aesthetic: Derelict institutional interior, bureaucratic ruin, pathology of maintenance failure
  form_and_line: Rigid corridor axiality disrupted by collapses, repeated door modules, suspended-ceiling failure patterns
  color_palette: Desaturated Green/Grey, Sickly Mint, Rust stain, Water-damage Brown, Faded Cream
  lighting_setup: Shafts of light, dust-beam theater, broken-window blade, flickering emergency bulb, pitch corners
  material_texture: Delaminated paint skins, mineral streaking, rust bloom at junctions, damp plaster blistering, fungal spread traces
  render_quality: Forensic decay readability, high tactile distress detail, institutional-era authenticity
  spatial_distortion: Collapsed ceiling
  atmosphere: Oppressive stillness, administrative abandonment, cold acoustic emptiness
  key_features: Faded compliance signage, broken fluorescent housings, cracked linoleum seams, dust shafts, partial ceiling cave-ins
  creative_brief: >-
    Construye la identidad desde la degradación sistémica: pintura, yeso, luminarias
    y pavimentos deben narrar décadas de uso y abandono. Mantén tensión psicológica
    sin teatralidad explícita; el miedo surge de la evidencia material y la escala
    institucional repetitiva.
