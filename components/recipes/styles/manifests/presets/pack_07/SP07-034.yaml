visualDna:
  aesthetic: Ruina institucional burocrática, donde el deterioro acumulado se convierte en sistema visual principal.
  form_and_line: Axialidad rígida interrumpida por colapsos, repetición administrativa y fallas de cielo suspendido.
  color_palette: Desaturated Green/Grey, Sickly Mint, Rust stain, Water-damage Brown, Faded Cream
  lighting_setup: Hazes de luz quebrada, polvo en suspensión, parpadeo eléctrico residual y esquinas de oscuridad profunda.
  material_texture: Pintura delaminada, escurridos minerales, oxidación en uniones, yeso ampollado y trazas fúngicas progresivas.
  render_quality: Lectura forense del deterioro con autenticidad de edificio público abandonado.
  spatial_distortion: Colapso parcial, interrupciones de eje y profundidad administrativa quebrada.
  atmosphere: Inmovilidad opresiva, vacío acústico frío y memoria administrativa detenida.
  key_features: Señalética deslavada, luminarias rotas, juntas abiertas, pilares de polvo y cielos parciales caídos.
  creative_brief: >-
    Define una gramática de abandono institucional transferible en la que cada
    capa material evidencie décadas de fallo de mantenimiento. La tensión debe
    nacer de repetición arquitectónica y evidencia física, no de susto explícito.
