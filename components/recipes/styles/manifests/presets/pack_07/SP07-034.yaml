visualDna:
  aesthetic: Patina institucional de deterioro burocratico, donde mantenimiento fallido y repeticion administrativa se vuelven sistema visual portable.
  form_and_line: Axialidad rigida interrumpida por colapsos, repeticion modular de servicio y fallas en capas suspendidas sin requerir edificio publico literal.
  color_palette: Desaturated green-grey, sickly mint, rust stain, water-damage brown, faded cream
  lighting_setup: Hazes de luz quebrada, polvo en suspension, parpadeo electrico residual y fondos de sombra profunda.
  material_texture: Pintura delaminada, escurridos minerales, oxidacion en uniones, yeso ampollado y trazas fungicas progresivas.
  render_quality: Lectura forense del deterioro con autenticidad administrativa y decadencia material legible.
  spatial_distortion: Partial collapse, axis interruption and service-depth fracture
  atmosphere: Inmovilidad opresiva, vacio acustico frio y memoria administrativa detenida.
  key_features: Placas graficas deslavadas no legibles, luminarias rotas, juntas abiertas, polvo estratificado y cielos parciales caidos.
  creative_brief: >-
    Transforma cualquier tema en evidencia de mantenimiento fallido: pintura delaminada, repeticion administrativa,
    humedad mineral y luz residual. La tension debe surgir de burocracia detenida y desgaste sistemico, no de hospital
    embrujado, pasillo de asylum o ruina de terror demasiado literal. Conserva patina institucional, repeticion de
    servicio, escala administrativa y luz rota sin exigir edificio, paisaje, set, criatura ni escena fija.
