visualDna:
  aesthetic: Artesanía arbórea elevada, ensamblada contra crecimiento vivo y gobernada por adaptación orgánica.
  form_and_line: Soportes híbridos, plataformas moduladas, diagonales tensadas y vacíos de evasión orgánica.
  color_palette: Brown, Green leaves, Bark Grey, Rope Tan, Sky Blue through leaves, Moss
  lighting_setup: Sol moteado filtrado por hoja, brillo variable de dosel y pools cálidos en escala íntima.
  material_texture: Veta de madera expuesta al clima, cuerda fibrosa, abrasión de corteza y herrajes galvanizados oxidados.
  render_quality: Autenticidad hand-built con plausibilidad estructural ligera y detalle de uso exterior real.
  spatial_distortion: Inclinación artesanal, torsión orgánica y apoyo asimétrico creíble.
  atmosphere: Íntima y adaptativa, con autonomía exploratoria y abrigo ligero frente a exposición ambiental.
  key_features: Encuentros con soporte vivo, accesos ligeros, bordes suspendidos, pools cálidos y uniones improvisadas.
  creative_brief: >-
    El estilo negocia cualquier forma contra soporte vivo mediante ensamblaje elevado, cuerda, madera expuesta y
    tensiones improvisadas. Debe sentirse artesanal y suspendido sin exigir treehouse, refugio infantil, tronco heroico
    ni postal de aventura. Conserva logica material, escala ligera y ritmo estructural adaptativo sin fijar tipologia,
    paisaje, franquicia, criatura ni escena cerrada.
