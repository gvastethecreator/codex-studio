visualDna:
  aesthetic: Microarquitectura arbórea de refugio elevado, integrada a copa y condicionada por soporte vivo.
  form_and_line: Soportes híbridos entre pilotes y ramas, plataformas escalonadas, diagonales de cable y vacíos de evasión de tronco.
  color_palette: Brown, Green leaves, Bark Grey, Rope Tan, Sky Blue through leaves, Moss
  lighting_setup: Sol moteado filtrado por hoja, brillo variable de dosel y pools cálidos de linterna en escala íntima.
  material_texture: Veta de madera expuesta al clima, cuerda fibrosa, abrasión de corteza y herrajes galvanizados oxidados.
  render_quality: Autenticidad hand-built con plausibilidad estructural ligera y detalle de uso exterior real.
  spatial_distortion: Crooked
  atmosphere: Íntima y lúdica, con autonomía exploratoria y abrigo frente a exposición de viento.
  key_features: Aberturas de tronco en piso, accesos de cuerda, bordes mirador, pools cálidos de linterna y uniones improvisadas.
  creative_brief: >-
    Define una gramática treehouse transferible en la que estructura y árbol se
    negocian mutuamente. Debe combinar improvisación artesanal, seguridad básica
    y sensación de descubrimiento sin infantilizar la tipología.
