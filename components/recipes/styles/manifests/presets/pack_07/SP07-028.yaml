  aesthetic: Vertical biophilic high-rise, metabolist eco-tower, planted-envelope architecture, urban rewilding facade
  form_and_line: Orthogonal slab grid interleaved with irregular canopy protrusions, cantilevered planter bands, stacked terrace strata
  color_palette: Green plants, Wood, Sky reflection, Soil Brown, Seasonal Blossom color
  lighting_setup: Natural sun, leaf-filtered dapple, photosynthesis glow, seasonal-angle shadow
  material_texture: Leaves, timber, living bark, bamboo cladding, rammed earth, recycled aggregate
  render_quality: High-detail architectural visualization, species-level planting readability, believable facade ecology and maintenance logic
  spatial_distortion: Overgrown
  atmosphere: Regenerative urbanism, breathable density, temperate microclimate comfort, long-horizon civic optimism
  key_features: Deep planter setbacks, mixed-height canopy layers, facade irrigation tracks, bird-supportive ledges, evapotranspirative shading
  creative_brief: >-
    Construye una tipología de torre-jardín donde la vegetación no sea decorativa,
    sino parte del sistema arquitectónico: control solar, amortiguación térmica,
    identidad de fachada y hábitat urbano. El estilo debe mantener lectura técnica
    (estructura, drenaje, mantenimiento) y al mismo tiempo una presencia orgánica
    densa, apta para múltiples programas residenciales o mixtos.
