visualDna:
  aesthetic: Haunted-cartoon retro, con amenaza juguetona y exageración torcida de lectura inmediata.
  form_and_line: Verticales inclinadas, cubiertas combadas, vanos deformados y silueta elástica con contorno gráfico claro.
  color_palette: Moonlit violet, toxic-lime accents, charcoal black, desaturated pumpkin orange trim, pale spectral ivory, and deep indigo shadow pools
  lighting_setup: Keys de relámpago intermitente, contraluz lunar frío, brillos selectivos y bloques cel-shade de alto contraste.
  material_texture: Planos pintados flat, contorno entintado, gradientes limitados y motivos de madera simplificada de estilo TV.
  render_quality: Lectura 2D limpia con nostalgia televisiva, claridad de forma alta y terror lúdico no realista.
  spatial_distortion: Deformación elástica, inclinación imposible y gestos pareidólicos sugeridos.
  atmosphere: Campy, traviesa y teatral, con suspenso amable sin violencia realista.
  key_features: Perfil inclinado, relámpagos zigzag, contraluz lunar, siluetas spooky y ritmo de gate gráfico.
  creative_brief: >-
    Formula una gramática haunted-cartoon transferible donde forma torcida,
    contraste de tormenta y staging spooky lúdico se mantengan constantes. Debe
    evitar por completo el horror realista y sostener legibilidad gráfica.
