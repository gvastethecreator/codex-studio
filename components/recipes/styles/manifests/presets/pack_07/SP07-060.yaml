visualDna:
  aesthetic: Retro TV cartoon haunted-manor language blending playful menace, exaggerated architecture, and Saturday-morning mystery energy in the Scooby-Doo tradition
  form_and_line: Canted verticals, bowing roof ridges, asymmetrical shutter rhythm, warped fenestration, and elastic silhouette curves with readable inked outlines
  color_palette: Moonlit violet, toxic-lime accents, charcoal black, desaturated pumpkin orange trim, pale spectral ivory, and deep indigo shadow pools
  lighting_setup: Intermittent lightning keys, cool moon backlight, selective window glow, high-contrast cel-shadow blocks, and storm-driven rim flashes
  material_texture: Flat painted clapboard planes, stylized ink contouring, limited cel-shaded gradients, simplified weathered timber motifs, and graphic silhouette props
  render_quality: Clean 2D-cartoon readability with nostalgic TV-era finish, high shape clarity, controlled texture minimalism, and playful spooky tone
  spatial_distortion: Face in window
  atmosphere: Campy, eerie, mischievous, nostalgic, theatrical, and suspenseful without realistic horror intensity
  key_features: Leaning manor profile, zig-zag lightning motifs, crescent or full moon framing, bat silhouettes, twisted foreground trees, iron gate rhythm, and bright window pops
  creative_brief: >-
    Keep the preset anchored in stylized cartoon-haunt grammar: exaggerated
    crooked architecture, storm-lit silhouette contrast, and playful spooky
    staging should remain consistent while avoiding realistic horror rendering.
avoidRules:
