  aesthetic: Romanticismo de fortaleza aérea con megastructura suspendida y soberanía en altura.
  form_and_line: >-
    Clústeres de agujas verticales, estratificación de masa flotante, cortes de vacío y vectores
    descendentes.
  color_palette: White, Blue sky, Cloud-silver, Golden sun edge, Waterfall-cascade White, Lapis above
  lighting_setup: Sol alto, rebote en nubes, rayos volumétricos y rim dorado de borde sobre siluetas suspendidas.
  material_texture: Piedra aérea, niebla de base, aristas cristalinas y roca flotante de estrato erosionado.
  render_quality: Sky-architecture fantástica con profundidad atmosférica y coherencia de ingeniería imposible.
  spatial_distortion: Floating rocks
  atmosphere: Sublime de gran altitud, calma improbable y grandeza impulsada por viento.
  key_features: Tramos sobre vacío, nubes inferiores, undercuts flotantes, vectores aéreos y silueta dominante.
  creative_brief: >-
    Cualquier sujeto gana soberania aerea mediante masa suspendida, undercuts, niebla inferior y rim
    solar de altura. Lo importante es gravedad negada con coherencia visual, no un castillo
    especifico.
