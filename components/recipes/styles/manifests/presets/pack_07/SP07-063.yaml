visualDna:
  aesthetic: Monumental funerary urbanism defined by sepulchral grandeur, ritual geometry, and necromantic civic order at megalopolis scale
  form_and_line: Obelisk-dominant axial planning, stepped mausoleum masses, repetitive crypt grids, sarcophagus colonnades, and severe pointed skyline rhythm
  color_palette: Black basalt, bone-white marble, oxidized bronze, dim funerary gold, spectral green haze, and bruised violet shadow fields
  lighting_setup: Low underlit crypt glow, pallid moon diffusion, selective soul-lantern accents, volumetric cemetery fog, and ember-like rune highlights
  material_texture: Weather-eaten stone blocks, cracked marble facings, oxidized iron gates, ash-coated paving, carved ossuary reliefs, and eroded funerary inscriptions
  render_quality: High-detail dark-fantasy architectural rendering with disciplined tonal restraint, monumental readability, and oppressive atmospheric layering
  spatial_distortion: None
  atmosphere: Solemn, oppressive, ritualistic, haunted, and acoustically muted as if sound itself were entombed
  key_features: Processional obelisk avenues, stacked crypt terraces, sarcophagus field repetition, necro-rune wayfinding, skull-derived ornament systems, and monument-scale mausoleum gates
  creative_brief: >-
    Keep the preset driven by funerary megacity grammar: axial tomb planning,
    obelisk hierarchy, and spectral low-light atmosphere should remain
    structurally consistent across compositions.
