visualDna:
  aesthetic: Orden funerario monumental con grandeza sepulcral y civismo necromántico de escala masiva.
  form_and_line: >-
    Axialidad dominada por obeliscos, masas escalonadas, retículas de cripta y siluetas severas de
    puntas rituales.
  color_palette: >-
    Black basalt, bone-white marble, oxidized bronze, dim funerary gold, spectral green haze, and
    bruised violet shadow fields
  lighting_setup: >-
    Glow bajo de cripta, difusión lunar pálida, acentos de farol espectral y niebla volumétrica de
    cementerio.
  material_texture: >-
    Sillería erosionada, mármol fisurado, rejas oxidadas, pavimento ceniciento y relieves osarios
    tallados.
  render_quality: Dark fantasy arquitectónica de alto detalle con contención tonal y lectura monumental opresiva.
  spatial_distortion: Profundidad axial procesional con compresión sepulcral controlada.
  atmosphere: Solemne, ritualista y opresiva, con silencio acústico de enclave enterrado.
  key_features: Ritmo procesional de obeliscos, criptas apiladas, wayfinding rúnico y umbrales masivos.
  creative_brief: >-
    Lleva cualquier input a civismo funerario monumental: axialidad procesional, piedra severa, baja
    luz espectral, bronce oxidado y jerarquías de cripta. Evita cementerio literal como requisito;
    sostén solemnidad arquitectónica.
