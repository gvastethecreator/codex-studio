  key_features: Frente abierto seccionado, módulos de microcuartos apilados, transiciones de escalera y perímetros de corte nítidos.
  creative_brief: >-
    Formula una gramática reusable de dollhouse-cutaway donde apilado seccional
    abierto, interiorismo miniatura y proporción toy-scale dominen el estilo
    sin depender del tema específico.
