  color_palette: Soft pastel wall fields, printed wallpaper motifs, painted toy-wood neutrals, carpet beige bases, dusty pink highlights, and muted decorative accents
  lighting_setup: Luz de vitrina uniforme, glow interior suave y sombreado de compartimentos en contraste bajo para lectura seccional.
  material_texture: Madera mini pintada, grano de papel tapiz, textil diminuto, plástico moldeado y remates satín lacados.
