visualDna:
  aesthetic: Miniatura en corte abierto, curada por compartimentos-caja y precisión de exhibición artesanal.
  form_and_line: >-
    Cara retirada en sección, bandas apiladas, retícula de compartimentos y diagonales de conexión
    compacta.
  color_palette: >-
    Soft pastel wall fields, printed wallpaper motifs, painted toy-wood neutrals, carpet beige
    bases, dusty pink highlights, and muted decorative accents
  lighting_setup: >-
    Luz de vitrina uniforme, glow interior suave y sombreado de compartimentos en contraste bajo
    para lectura seccional.
  material_texture: >-
    Madera mini pintada, grano de papel tapiz, textil diminuto, plástico moldeado y remates satín
    lacados.
  render_quality: >-
    Miniatura cutaway de alta claridad con legibilidad compartimento-por-compartimento y densidad
    decorativa balanceada.
  spatial_distortion: None
  atmosphere: Lúdica, íntima y ordenada, con teatralidad doméstica curada.
  key_features: >-
    Frente abierto seccionado, módulos apilados, transiciones diagonales y perímetros de corte
    nítidos.
  creative_brief: >-
    Aplica corte seccional toy-scale: frente abierto, compartimentos apilados, materiales
    miniaturizados y luz de vitrina. Debe revelar estructura interna como maqueta curada sin exigir
    dollhouse doméstica.
