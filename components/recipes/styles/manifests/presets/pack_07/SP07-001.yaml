visualDna:
  aesthetic: >-
    Minimalismo arquitectónico de alta precisión, donde la ausencia programática y la continuidad
    material construyen lujo silencioso.
  form_and_line: >-
    Planos ortogonales largos, encuentros sin marco, espesores ocultos, ejes de circulación limpios
    y piezas flotantes de bajo perfil.
  color_palette: >-
    Blanco mineral, marfil cálido, gris piedra frío, arena pálida y roble desaturado como único
    acento térmico.
  lighting_setup: >-
    Luz diurna difusa de gran apertura, rebotes uniformes sin hotspots, cove lighting perimetral
    oculto y sombras extremadamente blandas.
  material_texture: >-
    Yeso fino continuo, microcemento mate, piedra apomazada de poro cerrado y madera cepillada casi
    sin veta visible.
  render_quality: >-
    Visualización editorial ultra-clean con énfasis en proporción, borde, alineación y disciplina de
    vacío.
  spatial_distortion: >-
    Perspectiva neutra y estable, con profundidad construida por capas tonales suaves en lugar de
    dramatización angular.
  atmosphere: >-
    Serenidad curada, control acústico implícito, claridad mental, y sensación de lujo por
    contención.
  key_features: >-
    Vacío activo, alineación invisible, planos enrasados, módulos suspendidos y continuidad material
    sin lectura de escena obligatoria.
  creative_brief: >-
    Preserva una gramática minimalista transferible basada en sustracción extrema, continuidad
    constructiva y jerarquía por vacío. Cualquier input debe absorberse en planos silenciosos, luz
    uniforme y detalle oculto de alta precisión sin quedar atado a arquitectura literal.
avoidRules:
  - clutter
  - ornate
  - pattern
  - dark
