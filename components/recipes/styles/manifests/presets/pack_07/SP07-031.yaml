visualDna:
  aesthetic: >-
    Utilitarismo aeroespacial operativo, donde la habitabilidad emerge de ingeniería compacta y no
    de decoración.
  form_and_line: >-
    Retículas modulares, aperturas circulares, vectores de sujeción y grillas de acceso técnico de
    alta densidad.
  color_palette: White, Hook-and-loop Blue, Equipment Beige, Soft-glow Green LED, Black panel accents
  lighting_setup: >-
    LED técnico de alto control, focos de tarea integrados en panel, rebote frío y modo nocturno
    ámbar de baja fatiga.
  material_texture: >-
    Paneles textiles técnicos ignífugos, aleación cepillada, hook-and-loop retention, foil aislante y
    polímeros moldeados funcionales.
  render_quality: >-
    Fidelidad mission-grade con densidad instrumental legible, ergonomía de mantenimiento y desgaste
    realista de uso continuo.
  spatial_distortion: Flotación funcional y orientación múltiple sugerida por grillas técnicas.
  atmosphere: >-
    Contenida y procedimental, con precisión operativa bajo fatiga y sensación de vida frágil en
    entorno hostil.
  key_features: >-
    Sujeciones redundantes, módulos etiquetados, aperturas presurizadas, bolsillos utilitarios y
    orientación no terrestre.
  creative_brief: >-
    Lleva cualquier sujeto hacia habitabilidad orbital compacta: retención física, orientación
    múltiple, paneles de acceso y fatiga operacional. El estilo debe sentirse diseñado para
    sobrevivir microgravedad, no para verse futurista.
