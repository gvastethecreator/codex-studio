visualDna:
  aesthetic: Ecologia postindustrial de borde reutilizado, donde memoria infraestructural y vegetacion urbana coexisten como una sola gramatica de superficie.
  form_and_line: Estratos lineales de borde, alternancia hardscape-softscape y modulos repetidos de retencion, pausa y filtrado.
  color_palette: Weathered concrete neutrals, oxidized steel oranges, prairie grass olive tones, muted florals, cool urban greys
  lighting_setup: Luz urbana difusa con rebote mineral suave y caida progresiva sobre planos, franjas y vacios reutilizados.
  material_texture: Hormigon crudo, corten oxidado, acero cepillado, grava fina, gramaneas al viento e inserciones de madera envejecida.
  render_quality: Nivel concurso de paisaje con legibilidad de reutilizacion y sucesion vegetal creible.
  spatial_distortion: Layered edge compression, depth through repeating field modules, strong threshold legibility without a required promenade axis
  atmosphere: Respiro civico contemporaneo, permeable y con patina de infraestructura heredada en transicion ecologica.
  key_features: Linealidad infraestructural, bordes estratificados, umbrales de retencion y mezclas de plantacion resiliente para polinizadores.
  creative_brief: >-
    Reprograma cualquier composicion como ecologia de borde reutilizado: corten, hormigon heredado, grava, madera
    envejecida y plantacion resiliente colonizando una reticula previa. Debe sentirse civic-reclaimed y modular, no
    como sendero heroico, parque lineal obligatorio o paseo con procession fija. Conserva borde reutilizado, estratos
    civicos, plantacion resiliente y ritmo modular sin exigir edificio, paisaje, set, criatura ni escena fija.
avoidRules:
