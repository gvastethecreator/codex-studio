  color_palette: Bronze, Brick, Smoke, Copper patina, warm Gaslight Yellow, Coal Black, Brass-bright
  lighting_setup: Gaslight ámbar, glow callejero difuso en smog, chispas mecánicas y ventilación de vapor visible.
  material_texture: Metal y ladrillo, cobre remachado, panel de madera, cuero y depósito de hollín en superficie.
