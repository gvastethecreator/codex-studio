  creative_brief: >-
    Aplica un lenguaje neo-victoriano de vapor a cualquier input: articulaciones de latón, remaches
    funcionales, tuberías legibles, hollín material y glow gaslight. La utilidad mecánica debe
    sentirse plausible sin necesitar una ciudad ni vehículo específico.
