visualDna:
  aesthetic: Domesticidad pastoral semienterrada de escala humana, con umbrales circulares y calidez artesanal cotidiana.
  form_and_line: Aberturas redondas dominantes, cubierta bermada baja, corredores arqueados suaves y planificación radial íntima.
  color_palette: >-
    Moss green, weathered timber brown, loam umber, butter-cream plaster, muted brass highlights, warm terracotta
    accents, soft wildflower notes
  lighting_setup: Clave cálida de hogar, spill bajo de umbral, prácticos de linterna y rebote difuso de tarde.
  material_texture: Cubierta de césped, madera cepillada a mano, revoco de cal-arcilla, piedra gastada y latón cepillado.
  render_quality: Realismo de cuento doméstico con tactilidad artesanal y encanto fantástico contenido por función vivida.
  spatial_distortion: None
  atmosphere: Protegida, íntima y celebratoria de rituales cotidianos de vida lenta.
  key_features: Umbral circular, cubierta vegetal, aperturas redondeadas y núcleo compacto de calor doméstico.
  creative_brief: >-
    Traslada cualquier tema a domesticidad pastoral semienterrada: umbrales circulares, proporciones bajas, materiales
    cálidos, cubierta vegetal y escala artesanal. El resultado debe comunicar refugio lento y táctil sin depender de una
    casa concreta. Apply this spatial/worldbuilding grammar over any input: preserve material logic, scale cues,
    architectural rhythm, atmosphere, and signature construction rules while avoiding a required building type,
    landscape, franchise set, creature, or fixed scene.
