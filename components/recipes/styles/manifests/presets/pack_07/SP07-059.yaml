visualDna:
  aesthetic: Domesticidad pastoral semienterrada de escala humana, con umbrales redondos y calidez artesanal portable.
  form_and_line: Aberturas redondeadas dominantes, cubierta bermada baja, corredores suaves y planificación íntima de perfil contenido.
  color_palette: >-
    Moss green, weathered timber brown, loam umber, butter-cream plaster, muted brass highlights, warm terracotta
    accents, soft wildflower notes
  lighting_setup: Clave cálida de hogar, spill bajo de umbral, prácticos de linterna y rebote difuso de tarde.
  material_texture: Cubierta de césped, madera cepillada a mano, revoco de cal-arcilla, piedra gastada y latón cepillado.
  render_quality: Realismo de cuento doméstico con tactilidad artesanal y encanto fantástico contenido por función vivida.
  spatial_distortion: None
  atmosphere: Protegida, íntima y celebratoria de rituales cotidianos de vida lenta.
  key_features: Umbral redondeado, cubierta vegetal, masa bermada y núcleo compacto de calor doméstico.
  creative_brief: >-
    Traslada cualquier tema a domesticidad pastoral semienterrada: umbrales redondeados, proporciones bajas, materiales
    calidos, cubierta vegetal y escala artesanal. El resultado debe comunicar refugio lento y tactil sin depender de
    round-door pastoral burrow-home trope, licensed literary burrow-home, aldea pastoral fija o casa concreta. Conserva umbrales redondos, masa bermada,
    calidez artesanal y proporcion contenida sin exigir edificio, paisaje, set, criatura ni escena fija.
