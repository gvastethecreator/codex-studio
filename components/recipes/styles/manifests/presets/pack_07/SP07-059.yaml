  color_palette: Moss green, weathered timber brown, loam umber, butter-cream plaster, muted brass highlights, warm terracotta accents, soft wildflower notes
  lighting_setup: Hearth-led amber key light, low window spill, lantern practicals, diffuse afternoon bounce, and mild tunnel falloff to preserve intimate depth
  material_texture: Turf roof matting, hand-planed timber, lime-clay plaster, worn flagstone, brushed brass hardware, woven natural fibers, and herb-garden edges
  render_quality: Storybook residential realism with tactile handcrafted detail, cozy volumetric softness, and restrained fantasy charm anchored in lived-in function
  spatial_distortion: None
