visualDna:
  aesthetic: Critical data infrastructure focused on operational continuity and machine-first logic.
  subject_treatment: Modular series, thermal-containment lanes, orthogonal trays and functional perforated-panel repetition.
  color_and_tone: Black, Blue LED, Blinking Amber, Cool White fluorescent, Signal Green status, Grey metal
  lighting_and_shadow: >-
    Continuous cold artificial light, rack-like glow, service strips and status LED constellations with
    visible thermal containment.
  texture_and_material: >-
    Powder-coated steel, braided fiber, perforated mesh, rubberized technical surfaces and intake-dust
    residue.
  camera_and_composition: >-
    Modular redundancy, thermal-lane compression and machine-grid repetition without forcing racks, aisles or
    a data-center corridor.
  atmosphere_and_mood: Controlled urgency, infrastructural surveillance and minimal human occupation.
  rendering_and_quality: Facility-grade realism with high information density and system readability under technical lighting.
  key_features: >-
    Status LED clusters, thermal containment cues, cable-routing logic, patch-field rhythm and redundant
    repetition.
  creative_brief: >-
    Turn any input into critical infrastructure: modular redundancy, thermal containment, status-light logic
    and machine-first surfaces. It should feel like guarded operational continuity, not generic science
    fiction or a fixed server room scene.
