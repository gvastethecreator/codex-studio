  aesthetic: Infraestructura crítica de datos orientada a continuidad operativa y lógica machine-first.
  form_and_line: Series modulares, corredores térmicos rígidos, bandejas ortogonales y repetición de panel perforado funcional.
  color_palette: Black, Blue LED, Blinking Amber, Cool White fluorescent, Signal Green status, Grey metal
  lighting_setup: Luz fría artificial continua, glow de rack, tiras de servicio y constelaciones LED de estado con contención térmica visible.
  material_texture: Acero pintado en polvo, fibra trenzada, malla perforada, superficie técnica gomada y polvo de admisión.
  render_quality: Realismo facility-grade con alta densidad informativa y legibilidad de sistema bajo iluminación técnica.
  spatial_distortion: None
  atmosphere: Urgencia controlada, vigilancia infraestructural y ocupación humana mínima.
  key_features: Clúster LED de estado, contención térmica, pistas de flujo, patch fields etiquetados y repetición redundante.
  creative_brief: >-
    Construye una gramática data-grid transferible donde continuidad,
    redundancia y control térmico gobiernen cada decisión visual. Debe verse
    contemporánea y crítica, no sci-fi genérica.
