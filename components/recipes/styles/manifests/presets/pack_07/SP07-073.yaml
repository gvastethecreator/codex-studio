visualDna:
  aesthetic: Sección subterránea biofuncional con red capilar y zonificación interna estricta.
  form_and_line: Ramificaciones capilares, cámaras nodales, conectores verticales y estratos seccionados por capas.
  color_palette: >-
    Compacted soil umber, sandy beige, amber gel translucency, deep chamber brown, charcoal ant silhouettes, and freshly
    turned earth tones
  lighting_setup: Iluminación lateral de corte, transmisión translúcida en gel y pockets de sombra controlada en profundidad.
  material_texture: Compactación granular de suelo, bandas arenosas, alisado húmedo de túnel y marcas finas de excavación.
  render_quality: Cutaway naturalista de alto detalle con legibilidad sistémica y estratificación subterránea precisa.
  spatial_distortion: None
  atmosphere: Laboriosa, biológica y funcional, escondida bajo superficie inferida.
  key_features: Jerarquía capilar, cámaras funcionales, ejes de circulación vertical y lectura estratificada de sección.
  creative_brief: >-
    Representa cualquier sistema como sección biofuncional subterránea: ramificaciones capilares, cámaras nodales,
    estratos granulares y lectura lateral de organizacion interna. La funcion importa mas que insectos, hormiguero,
    vitrina de observacion o superficie literal. Conserva capilaridad, estratos, escala seccionada y logica funcional
    interna sin exigir edificio, paisaje, set, criatura ni escena fija.
