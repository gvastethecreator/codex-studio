visualDna:
  aesthetic: Cutaway subterráneo con red capilar y zonificación biofuncional estricta.
  form_and_line: Túneles capilares ramificados, cámaras nodales, conectores verticales y estratos seccionados por capas.
  color_palette: Compacted soil umber, sandy beige, amber gel translucency, deep chamber brown, charcoal ant silhouettes, and freshly turned earth tones
  lighting_setup: Iluminación lateral de corte, transmisión translúcida en gel y pockets de sombra controlada en profundidad.
  material_texture: Compactación granular de suelo, bandas arenosas, alisado húmedo de túnel y marcas finas de excavación.
  render_quality: Cutaway naturalista de alto detalle con legibilidad sistémica y estratificación subterránea precisa.
  spatial_distortion: None
  atmosphere: Laboriosa, biológica y funcional, escondida bajo superficie observada.
  key_features: Jerarquía de malla capilar, cámaras funcionales, ejes de circulación vertical y borde transparente de observación.
  creative_brief: >-
    Define una gramática reusable de ant-farm cutaway donde circulación
    ramificada, cámaras por función y estratificación granular del suelo
    permanezcan consistentes entre composiciones.
