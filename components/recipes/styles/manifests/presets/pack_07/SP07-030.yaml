visualDna:
  aesthetic: Constructivist civic-machine language, ideological monumentality, tectonic propaganda geometry
  form_and_line: Aggressive diagonals, interlocking prismatic/cylindrical bodies, exposed structural vectors, suspended connectors
  color_palette: Grey, Red accents, Raw Concrete, Faded Ochre, Industrial Black, Propaganda Crimson
  lighting_setup: Overcast, low-angle drama, stark shadow projection, factory-window rhythm
  material_texture: Concrete, rough-cast render, steel frame, glass-block, bolted plate
  render_quality: Diagrammatic mass clarity, high-contrast volumetric legibility, archival-modernist severity
  spatial_distortion: Floating masses
  atmosphere: Austere, programmatic, collectivist, machine-age idealism with historical residue
  key_features: Cantilever stress reads, pilotis lift-off, bridge-like connectors, banner-red accent planes, structural hierarchy exposed
  creative_brief: >-
    Construye composiciones donde la forma actúe como manifiesto: geometría en
    conflicto controlado, estructura visible y cromatismo político mínimo pero
    contundente. Debe sentirse como arquitectura-programa (función + ideología), no
    como set cinematográfico puntual.
