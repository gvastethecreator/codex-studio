visualDna:
  aesthetic: Ephemeral littoral architecture language built from wet-sand sculpting, tidal vulnerability, and playful improvised fortress typologies
  form_and_line: Bucket-cast cylindrical towers, drip-formed verticals, scalloped parapets, concentric moat cuts, and soft-edged erosion-prone contours
  color_palette: Dry sand beige, wet umber brown, shell off-white, sunlit shore gold, driftwood gray, and muted sea-glass accents
  lighting_setup: Hard coastal daylight, reflected water shimmer, low-angle beach shadows, slight marine haze, and bright specular micro-highlights on damp surfaces
  material_texture: Granular sand aggregation, compacted wet-sand crust, drip-strand ridges, shell inclusions, pebble interruptions, and erosion-softened edges
  render_quality: High-detail transient-sculpture rendering emphasizing granular fidelity, controlled collapse cues, and intentionally impermanent structural character
  spatial_distortion: Crumbling
  atmosphere: Sunlit, playful, fragile, tactile, and shaped by imminent natural decay
  key_features: Drip-cast turret profiles, bucket-mold repeat modules, carved moat channels, crenelated sand ridges, shell inlay accents, and visible tidal wear lines
  creative_brief: >-
    Keep the style anchored in wet-sand construction grammar: granular
    material behavior, bucket-cast geometry, and erosion-prone ephemeral
    forms should define outputs across varied subjects.
