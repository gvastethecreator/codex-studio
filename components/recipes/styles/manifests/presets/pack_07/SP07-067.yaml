visualDna:
  aesthetic: Arquitectura litoral efímera modelada en arena húmeda con vulnerabilidad mareal y fortificación lúdica improvisada.
  form_and_line: Torres cilíndricas de molde-balde, verticales por goteo, parapetos festoneados y contornos blandos propensos a erosión.
  color_palette: Dry sand beige, wet umber brown, shell off-white, sunlit shore gold, driftwood gray, and muted sea-glass accents
  lighting_setup: Daylight costero duro, shimmer de agua reflejada, sombras bajas de playa y microespeculares en superficie húmeda.
  material_texture: Agregación granular de arena, costra compactada, crestas de goteo, inclusiones de concha y bordes suavizados por desgaste.
  render_quality: Escultura transitoria de detalle alto con fidelidad granular y señales de colapso controlado.
  spatial_distortion: Crumbling
  atmosphere: Soleada, táctil y frágil, condicionada por decadencia natural inminente.
  key_features: Perfiles de torreta por goteo, módulos repetidos de balde, canales de foso, crestas almenadas y líneas de desgaste de marea.
  creative_brief: >-
    Mantén una gramática reusable de construcción en arena húmeda donde
    geometría de molde, comportamiento granular y erosión visible definan el
    estilo en sujetos variados.
