  lighting_setup: Print-style even exposure with intentionally conflicting shadow cues, multi-vector light implication, and restrained contrast for illusion persistence
  material_texture: Lithograph paper grain, etched ink hatch marks, matte stone-like plane treatment, and fine engraving-style contour detailing
  render_quality: High-precision optical-illusion rendering with strict geometric coherence, controlled print aesthetic, and cognitively destabilizing yet readable topology
  spatial_distortion: Multi-gravity inversion loops and perspective-locked paradox compression across connected planes
