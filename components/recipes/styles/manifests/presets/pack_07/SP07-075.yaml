visualDna:
  aesthetic: Arquitectura de paradoja con lógica escheriana, ambigüedad óptica matemática y circulación imposible.
  form_and_line: Bucles de escaleras interbloqueadas, arcos invertibles, mallas isométricas y permuta suelo-muro-techo en trayectorias cerradas.
  color_palette: Monochrome gray spectrum, warm print-paper cream, deep ink black linework, subtle sepia undertones, and cool shadow modulation bands
  lighting_setup: Exposición uniforme de impresión con sombras deliberadamente conflictivas y contraste moderado para sostener la ilusión.
  material_texture: Grano de papel litográfico, hatch de tinta grabada y tratamiento plano mate de piedra abstracta.
  render_quality: Ilusión óptica de precisión alta, coherencia geométrica estricta y topología desestabilizante pero legible.
  spatial_distortion: Multi-gravity inversion loops and perspective-locked paradox compression across connected planes
  atmosphere: Cerebral, elegante y desorientante, con infinitud no resuelta.
  key_features: Circuitos multi-gravedad, transiciones imposibles de arco, loops bloqueados por perspectiva y jerarquía de línea litográfica.
  creative_brief: >-
    Construye una gramática reusable de impossible-architecture donde bucles
    paradójicos, lógica lineal estable bajo gravedad contradictoria y disciplina
    tonal litográfica definan el sistema visual.
