  key_features: Transiciones desbordadas, manchas aromáticas, floración vertical, recorridos curvos y señales para polinizadores.
  creative_brief: >-
    Construye una gramática cottage transferible basada en mezcla, altura y
    secuencia de floración. Debe parecer libre pero responder a una estructura
    de capas estacionales y calidez doméstica sostenida.
