    Transiciones desbordadas, manchas aromáticas, floración vertical, recorridos curvos y señales
    para polinizadores.
  creative_brief: >-
    Lleva cualquier input a abundancia hortícola compuesta: capas por altura, bordes que desbordan,
    floración escalonada y calidez doméstica. Debe parecer espontáneo, pero revelar estructura
    estacional al mirarlo de cerca.
