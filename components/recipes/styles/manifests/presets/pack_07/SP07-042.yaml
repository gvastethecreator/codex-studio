  aesthetic: >-
    Jardín cottage de abundancia romántica, domesticidad hortícola y espontaneidad cuidadosamente
    compuesta.
  form_and_line: >-
    Borduras estratificadas por altura, recorridos sinuosos, masas redondeadas y acentos verticales
    trepadores.
  color_palette: Pastel flowers, Green, Lavender haze, Hollyhock Pink, Delphinium Blue, Cream Rose
  lighting_setup: Sol suave con difusión nubosa, dapple bajo arbolado y brillo cálido de pétalo en tarde baja.
  material_texture: >-
    Pétalo y hoja de textura variada, ladrillo con musgo, piedra rugosa, mulch de corteza y follaje
    plumoso.
