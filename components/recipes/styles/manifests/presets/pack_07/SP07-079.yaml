visualDna:
  aesthetic: Kubrickian alien-monolith language based on absolute geometric austerity, symbolic artifact presence, and minimal cosmic monumentality
  form_and_line: Strict 1:4:9 rectangular proportion, flawless planar faces, razor-clean vertical edges, zero ornament policy, and uncompromised orthogonal silhouette dominance
  color_palette: Deep matte black mass, near-void black absorption fields, faint edge silver glints, and sparse neutral lunar-gray environmental reflections
  lighting_setup: High-contrast directional lighting with extreme absorption response, minimal edge catch-light, severe cast shadow geometry, and restrained ambient fill
  material_texture: Ultra-smooth featureless surface, non-granular matte finish, near-specular suppression, and artifact-grade manufacturing uniformity
  render_quality: Precision-minimal rendering with maximum geometric authority, disciplined tonal economy, and enigmatic high-concept sci-fi clarity
  spatial_distortion: None
  atmosphere: Ominous, contemplative, transcendent, silent, and intellectually unsettling
  key_features: Canonical 1:4:9 proportion control, light-absorbing black plane behavior, featureless monolithic slab profile, and severe vertical compositional anchoring
  creative_brief: >-
    Preserve monolith style as a reusable grammar of geometric absolutes:
    strict proportion, featureless black material response, and symbolic
    minimal monumentality should remain stable across subject changes.
