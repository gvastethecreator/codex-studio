visualDna:
  aesthetic: >-
    Monolithic black austerity de geometría absoluta, presencia simbólica y monumentalidad cósmica
    mínima.
  form_and_line: >-
    Proporción rectangular estricta, caras planas impecables y aristas verticales limpias sin
    ornamento.
  color_palette: >-
    Deep matte black mass, near-void black absorption fields, faint edge silver glints, and sparse
    neutral lunar-gray environmental reflections
  lighting_setup: >-
    Iluminación direccional de alto contraste, absorción extrema, catch-light mínimo y sombra
    proyectada severa.
  material_texture: >-
    Superficie ultrasuave y anónima, mate no granular, supresión casi total del especular y
    uniformidad de artefacto.
  render_quality: Minimalismo de precisión con autoridad geométrica máxima y economía tonal disciplinada.
  spatial_distortion: None
  atmosphere: Ominosa, contemplativa y trascendente, con silencio intelectualmente inquietante.
  key_features: >-
    Proporción canónica, planos negros absorbentes, perfil sin rasgos y anclaje compositivo vertical
    severo.
  creative_brief: >-
    Reduce cualquier sujeto a presencia monolítica: proporción estricta, planos negros absorbentes,
    mínima luz de borde y autoridad simbólica. Debe conservar misterio austero sin depender de
    locación espacial.
