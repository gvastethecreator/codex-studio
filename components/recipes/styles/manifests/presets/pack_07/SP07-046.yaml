  creative_brief: >-
    El lujo aparece por lamina de agua, borde infinito, sombra vegetal y tacto exterior calido.
    Cualquier sujeto debe sentirse desacelerado por reflejos, shimmer y horizonte abstracto, sin
    destino ni marca.
