  color_palette: Turquoise, Palm Green, White cabana, Bougainvillea Pink, Sand Beige, Sky-reflected teal
  lighting_setup: >-
    Sol intenso diurno, brillo subacuático controlado, ámbar nocturno de antorcha y shimmer de
    atardecer sobre lámina.
