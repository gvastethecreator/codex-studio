visualDna:
  aesthetic: Modernismo Bauhaus funcional, claridad industrial y belleza derivada de funcion explicita.
  form_and_line: >-
    Interseccion de circulo/cuadrado, reticula racional, tubulares metalicos y planos limpios de
    lectura didactica.
  color_palette: >-
    Blanco/negro estructural, grises calidos y acentos primarios (rojo, amarillo, azul) de uso
    jerarquico.
  lighting_setup: >-
    Iluminacion uniforme de tarea, spots funcionales y pendentes simples sin dramatizacion
    superflua.
  material_texture: Acero tubular, vidrio claro, cuero liso, madera curvada, loneta y linoleo de acabado honesto.
  render_quality: >-
    Precision racionalista con prioridad constructiva, composicion pedagogica y eficiencia visual
    atemporal.
  spatial_distortion: Neutralidad geometrica con enfasis en orden proporcional e interaccion de formas basicas.
  atmosphere: Intelectual, limpio, pragmatico y optimista.
  key_features: >-
    Cantilever visual, acentos cromaticos controlados, estructura visible y gramatica geometrica
    elemental.
  creative_brief: >-
    Convierte cualquier input en un sistema Bauhaus donde funcion, estructura visible y geometria
    primaria gobiernen cada decision visual. Debe sentirse pedagogico, productivo y construido, sin
    depender de un interior ejemplar ni de ornamento anecdotico.
avoidRules:
  - ornate
  - cluttered
