visualDna:
  aesthetic: Tipología de laberinto vegetal formal, basada en desorientación lúdica y cerramiento topiario.
  form_and_line: Matriz ortogonal de corredores, dead-ends rítmicos, jerarquía de rutas al centro y continuidad de muros vivos altos.
  color_palette: Dark Green, Yew-shadow Black, Gravel-path Grey, Statue-stone Cream, Sky ceiling Blue
  lighting_setup: Pasillos en sombra con franjas solares, remates de luz al fondo y patrón moteado sobre grava.
  material_texture: Seto densamente podado, hoja compacta, grava de tránsito y acentos de piedra/musgo en nodos.
  render_quality: Geometría topiaria precisa con tensión de wayfinding y legibilidad de recorrido.
  spatial_distortion: None
  atmosphere: Desorientación curiosa, ansiedad lúdica y progresión cerrada hacia destino incierto.
  key_features: Seto alto recortado, ritmo de nodos, textura de ruta en grava y marcador central de terminación.
  creative_brief: >-
    Define una gramática de laberinto transferible donde pérdida controlada y
    lectura geométrica convivan. La tensión debe surgir del recorrido repetitivo
    y la contención vegetal, no de narrativa fantástica cerrada.
