  aesthetic: Historic iron-and-glass botanical conservatory logic with controlled humid climate.
  subject_treatment: Ribbed glazed vaults, cast-iron modular repetition and vertical botanical layering.
  color_and_tone: White, Green, Tropical-flower Magenta, Iron-grey, Glass-reflected Blue, warm Humidity-silver
  lighting_and_shadow: Diffuse greenhouse brightness, condensation prisms, rain-on-glass sparkle and warm glow over ironwork.
  texture_and_material: Wet glass, cast iron, terracotta tile and broad-leaf tropical texture.
  camera_and_composition: >-
    Ribbed-glass repetition, condensation refraction and layered botanical depth without requiring a fixed
    greenhouse room.
  atmosphere_and_mood: Enclosed lushness, humid cultivation calm and curated botanical awe.
  rendering_and_quality: Museum-grade conservatory clarity with technically credible humid atmosphere.
