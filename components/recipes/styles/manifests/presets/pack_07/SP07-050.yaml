  aesthetic: >-
    Glasshouse histórico en hierro y vidrio con lógica de catedral botánica climáticamente
    controlada.
  form_and_line: Bóvedas acristaladas nervadas, repetición modular de hierro colado y capas verticales vegetales.
  color_palette: White, Green, Tropical-flower Magenta, Iron-grey, Glass-reflected Blue, warm Humidity-silver
  lighting_setup: >-
    Brillo difuso de invernadero, prismas de condensación, lluvia sobre vidrio y glow cálido sobre
    herrería.
  material_texture: Vidrio húmedo, hierro fundido, baldosa de terracota y textura vegetal tropical de gran hoja.
  render_quality: Conservatorio museum-grade con claridad estructural y atmósfera húmeda técnicamente creíble.
  spatial_distortion: None
  atmosphere: Lushness encerrada, calma húmeda de cultivo y asombro botánico curado.
  key_features: >-
    Bahías de celosía de hierro, vidrio prismático condensado, doseles tropicales en capas y
    circulación limpia.
  creative_brief: >-
    La imagen combina herreria ritmica, vidrio humedo y vegetacion de exhibicion densa. Cualquier
    sujeto debe sentirse curado dentro de clima controlado, con estructura visible al mismo nivel
    que la botanica.
