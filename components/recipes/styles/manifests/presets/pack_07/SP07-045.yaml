visualDna:
  aesthetic: Paisaje xerófito de austeridad escultórica y desempeño hídrico explícito.
  form_and_line: Contraste de formas roseta/columnar, swales de grava, canales secos y masas agrupadas de bajo mantenimiento.
  color_palette: Sage Green, Red Earth, Blue Agave, Golden Barrel, Ochre rock, Prickly-pear Magenta fruit
  lighting_setup: Sol duro con shimmer térmico, contraluz de espinas y glow cálido de última hora.
  material_texture: Piedra árida, suculenta cerosa, granito descompuesto, espina rígida y borde metálico oxidado.
  render_quality: Realismo climático resiliente con morfología botánica precisa y lógica water-wise verificable.
  spatial_distortion: None
  atmosphere: Calma endurecida por sol, sobriedad resiliente y elegancia de baja demanda hídrica.
  key_features: Rosetas focales, mulch mineral, dry creek routing, cadencia xerófita y bandas de acero oxidado.
  creative_brief: >-
    Define una gramática xeriscape transferible donde selección vegetal, drenaje
    y escorrentía sean legibles como sistema. Debe transmitir belleza austera y
    táctica climática, no estética turística de desierto.
