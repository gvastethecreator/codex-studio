visualDna:
  aesthetic: Megaestructura habitable en banda orbital con ecología lineal y paisaje planificado a escala de macro-civilización.
  form_and_line: Arcos de horizonte ascendente, cinta territorial continua, muros de borde colosales y visuales longitudinales guiadas por curvatura.
  color_palette: Atmospheric blue gradients, biosphere green land strips, oceanic cyan bands, structural charcoal edge walls, void black backdrop, and high-altitude white haze
  lighting_setup: Luz estelar direccional, sectores de autosombra masiva, scatter atmosférico frontal e iluminación de borde en edge-walls.
  material_texture: Tiling de terreno planetario, estelas de nubes, reflectividad de bandas acuáticas y facetas estructurales en contención.
  render_quality: Paisaje especulativo ultra-vasto con lectura rigurosa de curvatura y coherencia de ingeniería macro.
  spatial_distortion: Orbital-band curvature with upward horizon wrap and macro-scale perspective compression
  atmosphere: Grandiosa, serena y diseñada, con sensación de hábitat cósmico continuo.
  key_features: Terreno arqueado, biosfera en cinta, contención kilométrica de borde y bandas de sombra por rotación.
  creative_brief: >-
    Formula una gramática reusable de ringworld donde comportamiento de
    horizonte orbital curvo, estratificación biosférica en cinta y edge-wall
    megastructural definan identidad transversal.
