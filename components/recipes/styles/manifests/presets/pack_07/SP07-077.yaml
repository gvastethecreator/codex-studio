visualDna:
  aesthetic: Megaestructura habitable en banda orbital con ecología lineal y paisaje planificado a escala de macro-civilización.
  form_and_line: >-
    Arcos de horizonte ascendente, cinta territorial continua, muros de borde colosales y visuales longitudinales
    guiadas por curvatura.
  color_palette: >-
    Atmospheric blue gradients, biosphere green land strips, oceanic cyan bands, structural charcoal edge walls, void
    black backdrop, and high-altitude white haze
  lighting_setup: >-
    Luz estelar direccional, sectores de autosombra masiva, scatter atmosférico frontal e iluminación de borde en
    edge-walls.
  material_texture: >-
    Tiling de terreno planetario, estelas de nubes, reflectividad de bandas acuáticas y facetas estructurales en
    contención.
  render_quality: Paisaje especulativo ultra-vasto con lectura rigurosa de curvatura y coherencia de ingeniería macro.
  spatial_distortion: Orbital-band curvature with upward horizon wrap and macro-scale perspective compression
  atmosphere: Grandiosa, serena y diseñada, con sensación de hábitat cósmico continuo.
  key_features: Terreno arqueado, biosfera en cinta, contención kilométrica de borde y bandas de sombra por rotación.
  creative_brief: >-
    Convierte composición en hábitat de banda orbital: curvatura de horizonte ascendente, ecología lineal, muros de
    borde y macro-perspectiva. La identidad viene de continuidad anular y planificacion biosferica. Conserva curvatura
    orbital, ecologia lineal, escala macro y horizonte ascendente sin exigir edificio, paisaje, set, criatura ni escena fija.
