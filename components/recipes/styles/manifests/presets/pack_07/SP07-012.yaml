visualDna:
  aesthetic: Refugio rústico de masa natural, oficio manual visible y calor centrado en núcleo térmico.
  form_and_line: Geometrías gruesas de madera y mampostería, ensambles robustos, proporciones compactas protectoras.
  color_palette: Umber quemado, roble ahumado, ámbar brasa, verde pino y cenizas neutras de baja saturación.
  lighting_setup: Prioridad de hogar/chimenea, parpadeo cálido de prácticos, filtrado diurno moderado y zonas de sombra confortable.
  material_texture: Veta labrada a mano, piedra porosa, lana y piel, metal forjado patinado y acabados terrosos mates.
  render_quality: Realismo rústico auténtico con lectura de peso material y construcción duradera.
  spatial_distortion: Profundidad cerrada estable con compresión íntima de abrigo.
  atmosphere: Protector, terrenal, silencioso y resistente.
  key_features: Centro térmico dominante, jerarquía de materiales pesados, carpintería artesanal y confort visual cálido.
  creative_brief: >-
    Preserva una gramática rústica transferible basada en masa, fuego y oficio.
    El estilo debe comunicar protección climática y permanencia material en
    cualquier programa interior, sin quedar atado a una cabaña específica.
