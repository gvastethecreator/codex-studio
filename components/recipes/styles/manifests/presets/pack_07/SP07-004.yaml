visualDna:
  aesthetic: Higiene visual nórdica orientada al confort térmico, intimidad suave y bienestar cotidiano sin ruido formal.
  form_and_line: Volúmenes bajos, cantos redondeados, capas textiles continuas y ergonomía despejada de circulación limpia.
  color_palette: Blancos rotos y crema, maderas claras aceitada, verde salvia y rosa apagado como microacento.
  lighting_setup: Difusión suave, red de prácticos cálidos, puntos de baja intensidad y balance nocturno envolvente.
  material_texture: Lana tejida, piel suave, cerámica mate, lino cepillado y madera de veta discreta.
  render_quality: Acabado editorial escandinavo con prioridad de confort legible, detalle contenido y atmósfera doméstica coherente.
  spatial_distortion: Neutralidad geométrica; profundidad construida por superposición blanda de textiles y luminancia cálida.
  atmosphere: Refugio, calma, seguridad y calidez continua de escala humana.
  key_features: Escala baja, capas textiles, madera pálida, iluminación cálida distribuida y ausencia de estridencia visual.
  creative_brief: >-
    Asegura transferencia hygge mediante una tríada constante: luz blanda, tactilidad natural y contraste bajo. El
    estilo debe priorizar confort sensorial y claridad funcional por encima de cualquier narrativa estacional. Apply
    this spatial/worldbuilding grammar over any input: preserve material logic, scale cues, architectural rhythm,
    atmosphere, and signature construction rules while avoiding a required building type, landscape, franchise set,
    creature, or fixed scene.
