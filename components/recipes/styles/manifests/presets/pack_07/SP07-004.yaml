visualDna:
  aesthetic: Confort nordico de bajo contraste, intimidad termica y bienestar cotidiano traducidos a una gramatica material portable.
  form_and_line: Volumenes bajos, cantos redondeados, capas textiles continuas y respiracion despejada sin requerir living domestico fijo.
  color_palette: Blancos rotos y crema, maderas claras aceitada, verde salvia y rosa apagado como microacento
  lighting_setup: Difusion suave, red de practicos calidos, puntos de baja intensidad y balance envolvente de refugio.
  material_texture: Lana tejida, piel suave, ceramica mate, lino cepillado y madera de veta discreta.
  render_quality: Acabado editorial escandinavo con prioridad de confort legible, detalle contenido y atmosfera acogedora coherente.
  spatial_distortion: Neutralidad geometrica; profundidad construida por superposicion blanda de textiles y luminancia calida.
  atmosphere: Refugio, calma, seguridad y calidez continua de escala humana.
  key_features: Escala baja, capas textiles, madera palida, iluminacion calida distribuida y ausencia de estridencia visual.
  creative_brief: >-
    Asegura transferencia hygge mediante una triada constante: luz blanda, tactilidad natural y contraste bajo. El
    estilo debe priorizar confort sensorial y claridad funcional por encima de cualquier habitacion, temporada o escena
    domestica concreta. Conserva logica material, escala baja y ritmo arquitectonico sereno sin fijar tipologia,
    paisaje, franquicia, criatura ni escena cerrada.
