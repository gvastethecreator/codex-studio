visualDna:
  aesthetic: Improvised domestic fortification language using recycled cardboard modules, taped joints, and playful hand-marked make-believe architecture
  form_and_line: Stacked box orthogonals, flap-derived overhangs, taped seam traces, hand-cut aperture geometry, and uneven hand-built silhouette breaks
  color_palette: Kraft cardboard brown, packing-tape tan, marker black linework, wax-crayon accent colors, label-white patches, and soft fabric neutrals
  lighting_setup: Warm indoor ambient base, practical lamp spill, flashlight hotspot accents, cloth-filtered bounce, and low-contrast enclosed interior glow
  material_texture: Corrugated edge channels, fibrous kraft surfaces, glossy tape strips, marker bleed, waxy crayon marks, and draped textile canopy folds
  render_quality: Handcrafted low-tech realism with visible assembly imperfections, tactile recycled-material detail, and nostalgic child-builder authenticity
  spatial_distortion: Sagging
  atmosphere: Inventive, scrappy, cozy, playful, temporary, and proudly homemade
  key_features: Exposed corrugated cut edges, tape-reinforced joints, flap roofs, hand-drawn marker ornament, crayon aperture motifs, and soft blanket canopy closures
  creative_brief: >-
    Preserve a reusable cardboard-fort grammar: recycled box massing, visible
    tape assembly logic, and hand-drawn childlike detailing should remain the
    defining identity independent of scene content.
