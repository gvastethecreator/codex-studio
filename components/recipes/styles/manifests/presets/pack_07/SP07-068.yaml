visualDna:
  aesthetic: Carton reciclado improvisado con union visible, invencion low-tech y fantasia manual de bajo recurso portable.
  form_and_line: Ortogonales apiladas, voladizos de solapa, aperturas recortadas a mano y remiendos estructurales sin cuarto infantil obligatorio.
  color_palette: >-
    Kraft cardboard brown, packing-tape tan, marker black linework, wax-crayon accent colors, label-white patches, and
    soft neutral inserts
  lighting_setup: Calidez domestica suave, hotspots puntuales de linterna y rebote filtrado de baja tecnologia sin fijar interior narrativo unico.
  material_texture: Canales corrugados, superficie kraft fibrosa, cinta brillante, bleed de marcador y trazas cerosas de crayon.
  render_quality: Realismo artesanal low-tech con imperfeccion de ensamblaje, tactilidad reciclada y lectura estructural clara.
  spatial_distortion: Sagging and patched asymmetry from improvised load paths
  atmosphere: Ingeniosa, temporal y orgullosamente homemade.
  key_features: Canto corrugado expuesto, juntas reforzadas con cinta, solapas estructurales, ornamento a marcador y refuerzos blandos insertados.
  creative_brief: >-
    Aplica construccion de carton improvisado: corrugado expuesto, cinta brillante, solapas estructurales, cortes
    manuales y marcas de low-tech craft. Debe expresar invencion material barata sin escena infantil fija, fuerte sesgo
    de playroom ni maqueta de cuarto cerrada. Conserva corrugado, cinta, escala improvisada y logica de carga remendada
    sin exigir edificio, paisaje, set, criatura ni escena fija.
