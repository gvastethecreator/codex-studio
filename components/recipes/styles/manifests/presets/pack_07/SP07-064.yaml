visualDna:
  aesthetic: Retrofuturismo nuboso de gran altitud, entre lujo modernista y equilibrio aerostático sereno.
  form_and_line: Plataformas circulares estratificadas, cubiertas aerodinámicas curvadas, aletas de aguja y anillos concéntricos suspendidos.
  color_palette: Sunset amber haze, pearl ivory superstructures, rose-gold cloud gradients, muted champagne metallics, and cool silver edge highlights
  lighting_setup: Ambiente difuso de horizonte, balizas suaves, backscatter cálido y bloom controlado en atmósfera de altura.
  material_texture: Revestimiento de aleación satinada, piel compuesta pulida, vidrio de grano bajo y costuras de precisión.
  render_quality: Arquitectura especulativa premium, legible a distancia y separada por capas atmosféricas elegantes.
  spatial_distortion: Emphasize stacked floating tier depth, long vertical voids, and gentle perspective curvature without surreal deformation
  atmosphere: Refinada, tranquila y aspiracional, con gracia tecnológica diplomática.
  key_features: Jerarquía de plataformas concéntricas, domos terminales, aproximaciones balizadas y contorno metálico prístino.
  creative_brief: >-
    Define una gramática cloud-metropolis transferible de tiers flotantes,
    atmósfera cálida de ocaso y superficies retrofuturistas pulidas, evitando
    dependencia de una ciudad licenciada específica.
