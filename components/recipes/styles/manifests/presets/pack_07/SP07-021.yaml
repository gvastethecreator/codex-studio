visualDna:
  aesthetic: Deconstructivist architectural style focused on controlled instability, anti-orthogonal form language, and sculptural kinetic tension
  form_and_line: Folded planes, fractured mass intersections, torsion-like profiles, displaced axes, and non-linear envelope continuity
  color_palette: Brushed titanium and steel neutrals with warm mineral countertones, mirrored sky reflections, and restrained metallic highlights
  lighting_setup: Sharp angular shadow cuts, reflective glint choreography, and dynamic sun-tracking contrast across faceted surfaces
  material_texture: Metal cladding seams, zinc-titanium panel grain, glass specular fracture, and high-precision structural skin detailing
  render_quality: High-end sculptural architecture visualization with fluid mass readability and disciplined anti-symmetry coherence
  spatial_distortion: Intentional geometric dislocation with twisting volumetric vectors and collapsing-perspective cues
  atmosphere: Disorienting, cerebral, energetic, provocative, audacious
  key_features: Anti-right-angle composition, folded metallic envelope, displaced volume grammar, kinetic mass choreography
  creative_brief: >-
    Keep this preset anchored in deconstructive geometry logic: fractured axes,
    folded metallic skins, and controlled spatial disorientation should define
    the style independent of any specific landmark reference.
