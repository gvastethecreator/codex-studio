visualDna:
  aesthetic: >-
    Deconstructivismo de inestabilidad controlada, tensión escultórica y rechazo deliberado de la
    ortogonalidad.
  form_and_line: >-
    Planos plegados, intersecciones fracturadas, ejes desplazados y envolvente no lineal en
    conflicto ordenado.
  color_palette: Titanio/ acero cepillado, minerales cálidos secundarios y reflejos especulares contenidos.
  lighting_setup: Cortes de sombra angulares, destellos especulares y contraste dinámico sobre facetas múltiples.
  material_texture: >-
    Piel metálica segmentada, panelería zinc-titanio, vidrio de alto brillo y detalle de junta de
    precisión.
  render_quality: Visualización escultórica de alta gama con anti-simetría legible y coherencia tectónica.
  spatial_distortion: Dislocación geométrica intencional con vectores de torsión y perspectiva en tensión.
  atmosphere: Cerebral, provocadora, energética y desestabilizante.
  key_features: >-
    Composición anti-ángulo recto, pliegues dominantes, volúmenes desplazados y coreografía de masa
    cinética.
  creative_brief: >-
    Establece una gramática deconstructiva transferible: conflicto geométrico controlado, piel
    metálica plegada y desorientación espacial calculada. Debe sostener identidad formal sin
    depender de arquitectos o hitos concretos.
