visualDna:
  aesthetic: Ciber-nocturnidad saturada, con densidad tecnológica improvisada y electricidad funcional.
  form_and_line: >-
    Diagonales de cableado, grillas técnicas apiladas, fuentes lumínicas múltiples y circulación
    comprimida por hardware.
  color_palette: Carbón profundo, neones tóxicos rosa/azul/verde, bolsillos ámbar CRT y violetas fríos de sombra.
  lighting_setup: >-
    Mezcla multi-fuente de baja iluminación con displays, tiras LED, indicadores y derrames neón de
    caída abrupta.
  material_texture: >-
    Chapa rayada, plásticos quebradizos, residuos adhesivos, tapicerías sintéticas gastadas y
    disipadores empolvados.
  render_quality: >-
    Alta densidad de detalle con caos controlado, legibilidad técnica y suciedad creíble de uso
    continuo.
  spatial_distortion: >-
    Primer plano obstruido por estratos de tecnología, profundidad fragmentada por planos
    superpuestos.
  atmosphere: Insomne, hiperestimulada, obsesiva y frágilmente funcional.
  key_features: >-
    Entropía de cableado, luminancia heterogénea, módulos recuperados y textura tecnológica
    patinada.
  creative_brief: >-
    Formula una gramática cyber transferible donde infraestructura visible, luminancia de fuentes
    mixtas y desgaste improvisado sean el núcleo. Debe sentirse habitada por tecnología, no decorada
    con tecnología.
