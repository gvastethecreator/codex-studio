visualDna:
  aesthetic: Interior ciber-residencial saturado, con densidad tecnológica improvisada y nocturnidad eléctrica funcional.
  form_and_line: Diagonales de cableado, racks apilados, pantallas de múltiples formatos y circulación comprimida por hardware.
  color_palette: Carbón profundo, neones tóxicos rosa/azul/verde, bolsillos ámbar CRT y violetas fríos de sombra.
  lighting_setup: Mezcla multi-fuente de baja iluminación con displays, tiras LED, indicadores y derrames neón de caída abrupta.
  material_texture: Chapa rayada, plásticos quebradizos, residuos adhesivos, tapicerías sintéticas gastadas y disipadores empolvados.
  render_quality: Alta densidad de detalle con caos controlado, legibilidad técnica y suciedad creíble de uso continuo.
  spatial_distortion: Primer plano obstruido por estratos de tecnología, profundidad fragmentada por planos superpuestos.
  atmosphere: Insomne, hiperestimulada, obsesiva y frágilmente funcional.
  key_features: Entropía de cableado, luminancia heterogénea de pantallas, muebles recuperados y textura tecnológica patinada.
  creative_brief: >-
    Formula una gramática cyber transferible donde infraestructura visible,
    luminancia de fuentes mixtas y desgaste improvisado sean el núcleo. Debe
    sentirse habitada por tecnología, no decorada con tecnología.
