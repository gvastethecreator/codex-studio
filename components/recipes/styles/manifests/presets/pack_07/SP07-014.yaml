visualDna:
  aesthetic: >-
    Cyberpunk Apartment within 1. Interior Design Systems: a reusable Architecture & Interior visual language with a
    clear stylistic thesis, disciplined mood, and recognizable art direction. Keep the result transferable across
    subjects while preserving Cyberpunk Apartment's specific style identity.
  form_and_line: >-
    Define Cyberpunk Apartment through line, mass, contour, spacing, and rhythm. Keep forms readable, intentional, and
    reusable beyond one literal scene.
  color_palette: >-
    Use a Cyberpunk Apartment-specific palette with clear dominant, secondary, and accent roles. Keep contrast
    deliberate and avoid generic color wash.
  lighting_setup: >-
    Use lighting that makes Cyberpunk Apartment recognizable: purposeful key, rim, bounce, shadow, and glow behavior
    with readable hierarchy.
  material_texture: >-
    Use materials and textures that reinforce Cyberpunk Apartment: surface response, grain, patina, polish, or wear
    should feel intentional and style-defining.
  render_quality: >-
    Render Cyberpunk Apartment with high production clarity, strong silhouette reads, clean detail priority, and no
    accidental UI, text, logos, or watermark.
  spatial_distortion: >-
    Use spatial behavior that fits Cyberpunk Apartment: perspective, compression, exaggeration, or depth should support
    the style without forcing one fixed location.
  atmosphere: >-
    Set a mood that belongs to Cyberpunk Apartment: specific, coherent, and distinct, with emotional tone carried by
    visual systems rather than narrative captioning.
  key_features: >-
    Prioritize Cyberpunk Apartment's key features: recognizable shape language, palette logic, material cues, lighting
    behavior, and composition rules.
  creative_brief: >-
    Create a style-card that translates Cyberpunk Apartment into a portable visual system for 1. Interior Design
    Systems. Preserve the preset identity through style mechanics, not a fixed scene, character, prop, or story beat.
