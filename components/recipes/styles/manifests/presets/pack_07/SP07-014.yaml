visualDna:
  aesthetic: Cyber-clutter interior style with improvised techno-living density, salvage modularity, and nocturnal hacker ambience
  form_and_line: Cable-mass diagonals, stacked display rectangles, ad-hoc rack assemblies, layered utility object silhouettes, compressed circulation paths
  color_palette: Deep charcoal base, toxic neon pink-blue-green accents, amber CRT pockets, cold violet shadows, fluorescent sickly fills
  lighting_setup: Multi-source low-light mix from displays, strips, indicator LEDs, and localized neon spill with sharp falloff pockets
  material_texture: Scuffed metal housings, brittle plastic shells, adhesive residue layers, worn synthetic upholstery, dusted heat-sink fins
  render_quality: High-detail lived-in cyber interior rendering with controlled chaos readability and tactile grime realism
  spatial_distortion: Dense near-field composition with depth blocked by stacked hardware planes and overlapping cable strata
  atmosphere: Restless, saturated, unstable, sleep-deprived, obsessive
  key_features: Hardware accumulation grammar, cable entropy patterns, mixed-display luminance, scavenged modular furniture, patinated tech surfaces
  creative_brief: >-
    Express cyber-residential identity through infrastructural clutter logic,
    mixed-source low-light behavior, and improvised material wear, without
    anchoring the style to one narrative room setup.
