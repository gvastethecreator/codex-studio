visualDna:
  aesthetic: Maritime miniature craft language defined by encapsulated vessel composition, curio-display precision, and impossible-scale illusion within glass containment
  form_and_line: Elongated bottle silhouette, narrowed neck constraint, compressed mast geometry, fine rigging thread networks, and hull curvature framed by cylindrical enclosure
  color_palette: Aged wood brown, sail cream, rigging tan, pale bottle aqua tint, oxidized brass accents, neutral glass highlights, and cork earth tones
  lighting_setup: Controlled display lighting with elongated glass specular streaks, refractive edge highlights, mild internal shadow compression, and shelf-ambient fill
  material_texture: Clear glass surface, micro-scratched display patina, varnished miniature wood, thread rigging fibers, folded sail paper texture, and porous cork grain
  render_quality: High-precision miniature rendering with strong scale readability, glass-optics fidelity, and handcrafted curio-display finish
  spatial_distortion: Cylindrical refraction warp and magnification compression introduced by curved bottle glass
  atmosphere: Reverent, meticulous, contemplative, archival, and quietly impossible
  key_features: Neck-constrained assembly illusion, fine thread rigging web, cork-sealed enclosure, magnified glass curvature, miniature hull detailing, and display-plinth presentation
  creative_brief: >-
    Keep the preset anchored in encapsulated-miniature craft grammar: visible
    glass refraction behavior, constrained-insertion assembly logic, and
    meticulous rigging density must remain stable across subjects.
