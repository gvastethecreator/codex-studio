visualDna:
  aesthetic: Lenguaje osario subterraneo abstracto, donde modulo calcico, presion enterrada y reverencia historica definen la superficie.
  form_and_line: Repeticion modular calcica, arcos bajos secuenciados, nichos comprimidos y bandas oseas sin exigir corredor funerario fijo.
  color_palette: Bone white, dirt, sepia age, calcium yellow, shadow brown, cartilage cream
  lighting_setup: Fuentes calidas puntuales, parpadeo bajo sobre calcio y sombras densas en profundidad comprimida.
  material_texture: Calcio yesoso, porosidad cortical, mortero polvoriento y transiciones humedas de piedra enterrada.
  render_quality: Fidelidad arqueologica de bajo nivel luminico con microtextura funeraria legible y sin horror explicito.
  spatial_distortion: Compressed subterranean pressure and repetitive calcic stacking
  atmosphere: Solemne, comprimida y reverencial, con quietud de tiempo profundo.
  key_features: Hiladas calcicas, bandas cruzadas, nichos minerales y presion de boveda baja.
  creative_brief: >-
    Organiza cualquier composicion por modulo calcico, presion subterranea y luz baja de reverencia historica.
    Repeticion, polvo y porosidad funeraria deben cargar el estilo sin depender de pasillos, catacumba literal, restos
    humanos exhibidos o escena ritual cerrada. Conserva logica material, escala comprimida y ritmo osario sin fijar
    tipologia, paisaje, franquicia, criatura ni escena cerrada.
