visualDna:
  aesthetic: Arquitectura osario subterránea donde mortalidad ritual y módulo óseo definen el lenguaje espacial.
  form_and_line: Patrones repetitivos de cráneo y hueso largo, arcos bajos secuenciados y axialidad comprimida de túnel.
  color_palette: Bone White, Dirt, Sepia age, Calcium Yellow, Shadow Brown, Cartilage Cream
  lighting_setup: Fuentes cálidas puntuales de antorcha o linterna, parpadeo sobre hueso y sombras densas de bajo nivel.
  material_texture: Calcio yesoso, porosidad cortical, juntas de mortero polvorientas y transiciones húmedas de piedra enterrada.
  render_quality: Fidelidad arqueológica de bajo nivel lumínico con microtextura funeraria legible.
  spatial_distortion: None
  atmosphere: Solemne, comprimida y reverencial, con quietud de tiempo profundo.
  key_features: Hiladas de cráneos, bandas de fémures cruzados, nichos osarios y presión de bóveda baja.
  creative_brief: >-
    Define una gramática osaria transferible en la que repetición material y
    orden funerario estructuren el espacio. Debe transmitir reverencia histórica
    y lectura subterránea sin teatralidad gótica explícita.
