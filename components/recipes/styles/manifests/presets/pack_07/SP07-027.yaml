visualDna:
  aesthetic: Revival Tudor residencial con herencia entramada, asimetría pintoresca y calor histórico protector.
  form_and_line: Retícula half-timber expuesta, cubiertas de fuerte pendiente, chimeneas verticales y carpintería plomada romboidal.
  color_palette: Madera oscura sobre cal blanquecina, tierras terracota, verdes musgo y ocre envejecido.
  lighting_setup: Cielo difuso, brillo cálido interior de hogar y filtrado suave por vidrios emplomados.
  material_texture: Madera envejecida, yeso de cal, ladrillo manual, vidrio facetado y cubierta con pátina climática.
  render_quality: Patrimonio doméstico de detalle constructivo sólido y atmósfera de arraigo.
  spatial_distortion: Irregularidad pintoresca leve en cumbreras y entramados para reforzar artesanía premoderna.
  atmosphere: Íntima, protectora, nostálgica y terrenal.
  key_features: Half-timber contrastado, gable pronunciado, vidrio emplomado y núcleo térmico de hogar.
  creative_brief: >-
    Conserva una gramática Tudor transferible basada en contraste madera-cal,
    asimetría pintoresca y calor de hogar. Debe transmitir continuidad
    histórica sin quedar reducida a una postal de cottage.
