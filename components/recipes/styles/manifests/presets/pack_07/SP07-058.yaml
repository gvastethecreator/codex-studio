visualDna:
  aesthetic: Megaestructura cristalina de crecimiento geologico y futurismo mineral monolitico, portable a cualquier masa o sistema.
  form_and_line: Apilamientos facetados, haces hexagonales, placas gema y convergencias prismatica multiples sin depender de una sola aguja heroica.
  color_palette: Purple-blue-white, amethyst, sapphire, diamond spark, deep crystal violet, iridescent flash
  lighting_setup: Refraccion interna intensa, dispersion espectral, nucleos autoiluminados y bordes facetados de alto brillo.
  material_texture: Cristal vitreo, caras gema, profundidad translucida y mineralizacion de microdetalle con optica coherente.
  render_quality: Arquitectura cristalina de alta claridad con precision mineral monumental y control fisico de luz interna.
  spatial_distortion: Faceted stacking and refractive scale drift without a mandatory spire apex
  atmosphere: Quietud luminosa, asombro frio y elegancia mineral de otro mundo.
  key_features: Planos refractivos, nucleos translucidos, estratos de brillo interno y jerarquia prismatica en capas.
  creative_brief: >-
    Haz que el estilo nazca de optica mineral: masa facetada, crecimiento cristalino, refraccion interna y color
    espectral disciplinado. Debe poder envolver arquitectura, objeto, personaje o paisaje sin exigir torre-aguja unica,
    templo gema o skyline de monolitos identicos. Conserva logica mineral, escala prismatica, ritmo facetado y atmosfera
    fria sin depender de edificio, paisaje, set, criatura ni escena fija.
avoidRules:
