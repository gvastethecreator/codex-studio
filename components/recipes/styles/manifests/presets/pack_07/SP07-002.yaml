visualDna:
  aesthetic: Industrial adaptive-reuse style centered on structural honesty, patinated utility, and refined rawness
  form_and_line: Exposed load-bearing geometry, truss and conduit rhythm, riveted junction articulation, long-span volumetric framing
  color_palette: Brick oxides, concrete neutrals, graphite metals, oxidized copper notes, muted amber warmth
  lighting_setup: High-aperture daylight shafts with warm practical pools, shadow zoning, and contrast-led volumetric depth
  material_texture: Board-formed concrete, rough masonry grain, weathered steel oxidation, reclaimed timber wear, matte leather accents
  render_quality: High-fidelity industrial-chic finish balancing grit legibility with editorial polish and material truthfulness
  spatial_distortion: Perspective stability with scale-forward depth, emphasizing structural rhythm over decorative clutter
  atmosphere: Grounded, utilitarian, creative, mature, atmospheric
  key_features: Structure-as-ornament language, patina hierarchy, utility-driven composition, adaptive-reuse material choreography
  creative_brief: >-
    Preserve identity through exposed structural systems and patinated material
    contrast, treating utility elements as primary visual grammar independent of
    any specific loft narrative.
