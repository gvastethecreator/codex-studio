visualDna:
  aesthetic: Reutilización industrial sofisticada, con infraestructura expuesta como ornamento principal y pátina funcional controlada.
  form_and_line: Tramas estructurales repetitivas, cerchas visibles, canalizaciones ortográficas y secuencias de pórticos de gran luz.
  color_palette: Óxidos de ladrillo, neutros cementicios, grafito metálico, cobre envejecido y ámbar cálido de apoyo.
  lighting_setup: Entradas cenitales o laterales profundas, contraste medio-alto, zonas de penumbra técnica y prácticos cálidos puntuales.
  material_texture: Hormigón encofrado, mampostería rugosa, acero oxidado estabilizado, madera recuperada y cuero mate desgastado.
  render_quality: Acabado industrial-chic con legibilidad tectónica y balance entre crudeza material y curaduría editorial.
  spatial_distortion: Profundidad longitudinal marcada por repetición estructural; sin deformación expresiva, sí compresión por capas técnicas.
  atmosphere: Productivo, robusto, creativo y adulto; tensión entre taller y vivienda premium.
  key_features: Vigas y uniones expuestas, instalaciones visibles, cerramientos de gran formato, escalas loft y objetos utilitarios en primer plano.
  creative_brief: >-
    Conserva la identidad loft mediante una lógica estructura-instalación
    explícita: lo técnico debe dominar la composición y la pátina contar uso
    real. La transferencia debe funcionar en cualquier programa interior sin
    perder la tensión entre crudeza y refinamiento.
