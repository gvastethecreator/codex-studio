visualDna:
  aesthetic: >-
    Dimensional retrotech surface grammar with recursive retrofuturist panel rhythm, circular wall modules,
    organic architectural growth, tactile surface arrays and impossible interior expansion.
  subject_treatment: >-
    Circular wall modules, hex nodes, ribbed thresholds and tactile panel surfaces arranged as recursive
    retrotech depth, not one fixed central mechanism room.
  color_and_tone: >-
    Coral amber emissive warmth, deep teal structural shadows, copper-brass retrotech metals, warm gold
    circular-module highlights, and dimensional blue accent glows
  lighting_and_shadow: >-
    Tactile surface glow, indirect circular-module bounce, controlled golden bloom and soft dimensional accent
    light.
  texture_and_material: >-
    Mixed organo-technological surfaces, coral-like ribs, worn copper metal, diffused glass and braided
    cabling.
  camera_and_composition: >-
    Non-euclidean depth recursion, repeated circular wall modules and expandable interior scale without
    requiring a central mechanism.
  atmosphere_and_mood: Adventurous, mysterious and spatially uncanny, with recursive depth.
  rendering_and_quality: High-detail retrofuturist dimensional depth with coherent impossible-space layering.
  key_features: >-
    Repeating circular wall modules, hexagonal modular signal logic, copper-coral ribs, layered tactile
    surface arrays and expandable dimensional thresholds.
  creative_brief: >-
    Build retrotech dimensional language with rhythmic circular wall modules, copper-brass metal, organotech
    ribs, tactile panel surfaces and expanded interior scale. Avoid named franchise interiors, iconic
    control-room layouts, concrete license reads; prioritize spatial paradox, depth recursion and retrotech
    tactility without requiring a fixed cabin, literal central mechanism or closed control room.
avoidRules:
  - literal control room
  - single central prop
  - named franchise interior
  - iconic control-room layout
