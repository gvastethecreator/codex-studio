  material_texture: Mixed organic-tech surfaces, coral-like ribbed wall growth, worn metallic console plating, glass roundel diffusion, braided cabling, and translucent control interfaces
  render_quality: High-detail franchise-faithful sci-fi interior rendering with layered dimensional depth, rich tactile complexity, and coherent retrofuturist machine elegance
