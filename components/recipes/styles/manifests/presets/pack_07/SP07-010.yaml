visualDna:
  aesthetic: Neo-futurist habitat style with seamless ergonomics, ambient intelligence, and high-purity spatial minimalism
  form_and_line: Continuous shell geometry, cornerless flow transitions, integrated interface planes, and biomorphic module repetition
  color_palette: Clinical white foundations with cool cyan-blue light channels, holographic silver mids, and sparse magenta signal accents
  lighting_setup: Embedded indirect luminance, adaptive ambient gradients, responsive zone highlights, and soft panel-based glow architecture
  material_texture: Composite smart surfaces, matte-gloss polymer contrast, low-friction glass skins, touch-reactive interface finishes
  render_quality: Ultra-clean futuristic interior rendering with precision surfacing, controlled bloom, and sterile-detail clarity
  spatial_distortion: Smooth axial continuity with no abrupt depth breaks, reinforcing weightless circulation and frictionless occupancy
  atmosphere: Sterile, serene, advanced, controlled, weightless
