visualDna:
  aesthetic: Hábitat neo-futurista de fricción cero, ergonomía continua e inteligencia ambiental integrada.
  form_and_line: Shells continuas sin esquina, transiciones fluidas, planos interfaz embebidos y repetición biomórfica modular.
  color_palette: Blanco clínico, cian/azul frío lumínico, plata holográfica y magenta puntual de señalización.
  lighting_setup: Luminancia indirecta integrada, gradientes adaptativos por zona y glow controlado en paneles activos.
  material_texture: Polímeros smart mate-brillo, vidrio de baja fricción, superficies táctiles reactivas y uniones invisibles.
  render_quality: Render ultra-clean de precisión superficial, bloom moderado y limpieza tecnológica de alta legibilidad.
  spatial_distortion: Continuidad axial suave, sin quiebres abruptos, con percepción de flotación funcional.
  atmosphere: Controlada, avanzada, serena y ligeramente clínica.
  key_features: Geometría cornerless, iluminación sistémica integrada, mobiliario fusión-carcasa y señalética mínima reactiva.
  creative_brief: >-
    Formula una gramática futurista transferible donde continuidad de carcasa,
    luz adaptativa y ergonomía post-fricción sean innegociables. Cada sujeto
    debe integrarse como extensión del sistema, no como objeto insertado.
