visualDna:
  aesthetic: >-
    Megaestructura estelar de escala civilizatoria con encapsulamiento luminoso y monumentalismo
    industrial cósmico.
  form_and_line: >-
    Retículas hex-panel, costillas concéntricas, simetría radial estelar y segmentación orbital de
    anillos en curvatura extrema.
  color_palette: >-
    Near-black structural silhouettes, solar gold-orange emission, corona-white edge burn, deep
    panel graphite grays, and faint ionized blue fringes
  lighting_setup: >-
    Contraluz estelar extremo, rim de alto contraste, bandas de autosombra en panel y bloom
    controlado en núcleos emisivos.
  material_texture: >-
    Compuestos metálicos densos, microtiling de colectores, aletas de disipación y costuras macro de
    fabricación.
  render_quality: >-
    Ingeniería especulativa ultra-escala con legibilidad estructural rigurosa y contraste
    astrofísico cinematográfico.
  spatial_distortion: Extreme interior-horizon curvature and radial mega-scale perspective compression
  atmosphere: Sublime, colosal y austera, impulsada por ambición tecnológica de civilización tipo II.
  key_features: >-
    Núcleo luminoso enmarcado, campos colectores hexagonales, segmentación radial, horizonte
    interior curvo y silueta de alto contraste.
  creative_brief: >-
    Escala cualquier tema a ingeniería estelar: paneles colectores, simetría radial, contraluz solar
    extremo y horizonte interior curvo. Debe transmitir captura energética civilizatoria sin fijar
    una esfera literal.
