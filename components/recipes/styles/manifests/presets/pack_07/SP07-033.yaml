visualDna:
  aesthetic: Envolvente bioclimática de cultivo, donde estructura de hierro y masa vegetal conviven en equilibrio técnico.
  form_and_line: Luces acristaladas nervadas, tracería metálica fina, secuencias de nave y estratos de plantación por profundidad.
  color_palette: Green, Glass, Tropical Bloom accents, Dew-drop Silver, Mossy floor, Whitewashed iron
  lighting_setup: Sol filtrado por vidrio, difusión húmeda, prismas por condensación y rayos suavizados por neblina interna.
  material_texture: Película de condensación, hierro pintado oxidado, grava húmeda, terracota eflorescente y hojas de brillo ceroso.
  render_quality: Precisión botánica con control de atmósfera húmeda y claridad estructural de invernadero operativo.
  spatial_distortion: Condensation
  atmosphere: Cálida-húmeda, protectora y fértil, con calma de cultivo intensivo controlado.
  key_features: Gradientes de condensación, zonificación por especies, repetición de nervios, estratificación de niebla y rutas de servicio.
  creative_brief: >-
    Formula una gramática de conservatorio transferible basada en retícula
    estructural legible, humedad visible y estratificación botánica técnica.
    Debe leerse como arquitectura de cultivo, no jardín ornamental genérico.
