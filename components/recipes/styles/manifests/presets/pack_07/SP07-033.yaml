visualDna:
  aesthetic: >-
    Envolvente bioclimática húmeda, donde estructura fina y masa vegetal conviven en equilibrio
    técnico.
  form_and_line: Luces acristaladas nervadas, tracería metálica fina y estratos orgánicos por profundidad.
  color_palette: Green, Glass, Tropical Bloom accents, Dew-drop Silver, Mossy floor, Whitewashed iron
  lighting_setup: >-
    Sol filtrado por vidrio, difusión húmeda, prismas por condensación y rayos suavizados por
    neblina interna.
  material_texture: >-
    Película de condensación, hierro pintado oxidado, grava húmeda, terracota eflorescente y hojas
    de brillo ceroso.
  render_quality: Precisión botánica con control de atmósfera húmeda y claridad estructural operativa.
  spatial_distortion: Condensación refractiva y capas de humedad que suavizan profundidad.
  atmosphere: Cálida-húmeda, protectora y fértil, con calma de cultivo intensivo controlado.
  key_features: >-
    Gradientes de condensación, zonificación vegetal, repetición de nervios, estratificación de
    niebla y rutas técnicas.
  creative_brief: >-
    El tratamiento mezcla retícula fina, humedad visible y crecimiento controlado hasta que
    cualquier sujeto parezca mantenido por clima artificial. Condensación, vidrio, nervios
    estructurales y botánica técnica deben operar como un solo sistema.
