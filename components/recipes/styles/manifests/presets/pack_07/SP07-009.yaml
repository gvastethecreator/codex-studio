visualDna:
  aesthetic: Revival gótico de verticalidad devocional, dramatismo pétreo y solemnidad de luz filtrada.
  form_and_line: Arco apuntado, bóveda nervada, tracería compleja, contrafuertes rítmicos y remates de aguja ascendente.
  color_palette: Grises de piedra envejecida, estallidos cromáticos tipo vitral, sombras azul-carmesí y metal apagado.
  lighting_setup: Iluminación low-key con velas/luz lunar, proyección cromática de vitrales y contrastes de alta reverencia.
  material_texture: Caliza tallada, roble envejecido, hierro frío patinado, polvo mineral y latón oscurecido.
  render_quality: Visualización histórico-monumental con fidelidad ornamental y atmósfera sacra precisa.
  spatial_distortion: Énfasis en elongación vertical y tracción de profundidad hacia naves y bóvedas.
  atmosphere: Solemne, ancestral, reverencial y dramática.
  key_features: Gramática de arco ojival, jerarquía vertical, vitral activo y ornamentación pétrea de alta densidad.
  creative_brief: >-
    Mantén una gramática gótica transferible donde verticalidad, piedra tallada
    y luz de vitral construyan reverencia espacial. Debe funcionar sin caer en
    clichés narrativos de horror o ruina escénica.
