visualDna:
  aesthetic: >-
    Infraestructura metropolitana de alto flujo, con pátina cerámica y presión cotidiana de
    movilidad masiva.
  form_and_line: >-
    Ritmo repetitivo de crujías, convergencia longitudinal, techos híbridos y bandas de señalética
    estructural.
  color_palette: Tile White, Grime, Signal Green, Rust Orange, Gum-grey floor, Sick-fluorescent tone
  lighting_setup: >-
    Fluorescencia intermitente, pools de borde operativo, glare publicitario y vacío negro como
    contrapunto.
  material_texture: >-
    Baldosa astillada, acero oxidado, grasa mineral, humedad capilar y pavimento antideslizante
    gastado.
  render_quality: >-
    Realismo documental de tránsito con microdesgaste verosímil y lectura clara de espacio público
    denso.
  spatial_distortion: Blur de tránsito y compresión longitudinal por flujo.
  atmosphere: Transitoria, anónima y húmeda, con urgencia rutinaria y compresión subterránea constante.
  key_features: >-
    Franja de seguridad, wayfinding en banda, conducciones vistas, derrame de luz comercial y huecos
    profundos.
  creative_brief: >-
    Convierte cualquier input en infraestructura de flujo masivo: repetición modular, cerámica
    gastada, señalética como estructura y humedad subterránea. La imagen debe cargar presión de
    tránsito aun sin mostrar una estación literal.
avoidRules:
