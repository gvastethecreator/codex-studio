visualDna:
  aesthetic: Art Nouveau organico con continuidad vegetal, sensualidad lineal y arquitectura total integrada.
  form_and_line: Curvas whiplash, zarcillos estructurales, marcos florales, vidrio sinuoso y metal fluido.
  color_palette: Salvia, dorado, azul pavo real, lila, ambar vitreo y verdes musgo.
  lighting_setup: Luz filtrada por vitral, brillo calido de vidrio emplomado, apliques petalo opcionales y brillo irisado suave.
  material_texture: Madera tallada, art glass iridiscente, hierro forjado, bronce patinado y marqueteria floral.
  render_quality: Detalle ornamental de fin de siglo con continuidad formal y riqueza material controlada.
  spatial_distortion: Ligera fluidez morfologica para enfatizar continuidad organica sobre rigidez geometrica.
  atmosphere: Romantica, envolvente, botanica y artesanal.
  key_features: Motivos florales estructurales, curvas tendril, vidrio cromatico activo y luminancia organica.
  creative_brief: >-
    Convierte cualquier input en una continuidad Art Nouveau de linea vegetal, material artesanal y
    ornamento estructural fluido. Debe leerse como organismo disenado de adentro hacia afuera, no
    como floralidad aplicada ni como una habitacion de epoca obligatoria.
