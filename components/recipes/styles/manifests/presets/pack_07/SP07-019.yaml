visualDna:
  aesthetic: Art Nouveau orgánico con continuidad vegetal, sensualidad lineal y arquitectura total integrada.
  form_and_line: Curvas whiplash, zarcillos estructurales, marcos florales, vidrio sinuoso y metal fluido.
  color_palette: Salvia, dorado, azul pavo real, lila, ámbar vítreo y verdes musgo.
  lighting_setup: Luz filtrada por vitral, lámparas cálidas tipo Tiffany, apliques pétalo y brillo irisado suave.
  material_texture: Madera tallada, favrile iridiscente, hierro forjado, bronce patinado y marquetería floral.
  render_quality: Detalle ornamental de fin de siglo con continuidad formal y riqueza material controlada.
  spatial_distortion: Ligera fluidez morfológica para enfatizar continuidad orgánica sobre rigidez geométrica.
  atmosphere: Romántica, envolvente, botánica y artesanal.
  key_features: Motivos florales estructurales, curvas tendril, vidrio cromático activo y luminancia orgánica.
  creative_brief: >-
    Conserva una gramática Art Nouveau transferible donde línea orgánica, ornamento botánico y
    material artesanal formen un sistema continuo. Debe leerse como estructura viva, no como simple
    decoración floral aplicada.
