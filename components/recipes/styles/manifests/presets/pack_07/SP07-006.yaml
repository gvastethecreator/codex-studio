visualDna:
  aesthetic: Brutalist monumental style with unapologetic mass, structural frankness, and civic-institutional gravity
  form_and_line: Monolithic block stacking, deep recess cuts, cantilever slabs, hard orthogonal silhouettes, and shadow-carved edges
  color_palette: Concrete gray spectrum with charcoal and slate anchors, damp ash variation, and low-chroma mineral depth
  lighting_setup: Hard-angle sunlight, deep shadow wells, high-contrast façade articulation, and recess-emphasizing directional light
  material_texture: Board-formed concrete imprint, tie-hole cadence, exposed aggregate roughness, and weathered mineral patina
  render_quality: Monumental architectural rendering emphasizing material mass, tectonic clarity, and disciplined sculptural austerity
  spatial_distortion: Stable monumental perspective with mass-dominant depth compression and proportionally heavy visual balance
  atmosphere: Stoic, severe, powerful, enduring, contemplative
  key_features: Monolithic concrete hierarchy, boardmark rhythm, deep-recess shadow logic, tectonic cantilever expression
  creative_brief: >-
    Define this preset through material mass and shadow tectonics: raw concrete
    imprint language, monolithic composition, and institutional permanence are
    the transferable identity.
