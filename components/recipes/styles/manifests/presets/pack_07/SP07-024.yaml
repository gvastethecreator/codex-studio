visualDna:
  aesthetic: >-
    Revival victoriano cromatico de ornamento pintado, identidad barrial y detalle carpintero
    exuberante.
  form_and_line: >-
    Gingerbread trim, spindles torneados, salientes facetados, frontones decorados y verticalidad
    estrecha.
  color_palette: Pasteles complejos (azul/rosa/amarillo), lavanda, menta y molduras crema con rosa polvoso.
  lighting_setup: Luz costera difusa con niebla suave, realce dorado de atardecer y brillo de molduras pintadas.
  material_texture: Siding de madera, pintura multicapa, calados finos, aleros con mensulas y tejuela decorativa.
  render_quality: Detalle residencial historico de alta legibilidad ornamental con alegria cromatica controlada.
  spatial_distortion: Perspectiva estable centrada en jerarquia de ornamentacion y capas cromaticas verticales.
  atmosphere: Nostalgica, festiva, civica y orgullosamente preservada.
  key_features: >-
    Esquemas tricromos, salientes facetados, tejuela fish-scale y carpinteria recortada de alta
    densidad.
  creative_brief: >-
    Convierte cualquier input en una gramatica Painted Lady de molduras recortadas, color pastel
    estratificado y verticalidad carpintera festiva. La identidad debe sostenerse por lenguaje
    constructivo y alegria cromatica, no por postal victoriana ni por una calle preservada concreta.
