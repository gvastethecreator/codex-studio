visualDna:
  aesthetic: Revival victoriano cromático de ornamento pintado, identidad barrial y detalle carpintero exuberante.
  form_and_line: Gingerbread trim, spindles torneados, salientes facetados, frontones decorados y verticalidad estrecha.
  color_palette: Pasteles complejos (azul/rosa/amarillo), lavanda, menta y molduras crema con rosa polvoso.
  lighting_setup: Luz costera difusa con niebla suave, realce dorado de atardecer y brillo de molduras pintadas.
  material_texture: Siding de madera, pintura multicapa, calados finos, aleros con ménsulas y tejuela decorativa.
  render_quality: Detalle residencial histórico de alta legibilidad ornamental con alegría cromática controlada.
  spatial_distortion: Perspectiva estable centrada en jerarquía de ornamentación y capas cromáticas verticales.
  atmosphere: Nostálgica, festiva, cívica y orgullosamente preservada.
  key_features: Esquemas tricromos, salientes facetados, tejuela fish-scale y carpintería recortada de alta densidad.
  creative_brief: >-
    Mantén una gramática Painted Lady transferible por ornamentación de madera,
    cromática pastel estratificada y composición vertical doméstica. La
    identidad debe sostenerse por lenguaje constructivo, no por postal turística.
