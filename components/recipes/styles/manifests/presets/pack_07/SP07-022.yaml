visualDna:
  aesthetic: Neoclasico institucional de autoridad civica, orden axial y monumentalidad racional.
  form_and_line: >-
    Columnatas, frontones triangulares, plintos escalonados y secuencias de eje largo con simetria
    estricta.
  color_palette: Marmol blanco, caliza clara, piedra fria y bronce dorado con sombras gris azuladas.
  lighting_setup: Sol lateral que estria columnas, sombras porticadas profundas y acentos nocturnos monumentales.
  material_texture: Piedra lisa, marmol cincelado, granito pulido, yeso colado y cobre con verdin.
  render_quality: Monumental clasico de proporcion rigurosa y legibilidad institucional permanente.
  spatial_distortion: Perspectiva axial neutra con jerarquia frontal y escala ceremonial.
  atmosphere: Seria, estable, civica y atemporal.
  key_features: >-
    Orden columnario, fronton canonico, basamento escalonado, masa civica y composicion
    perfectamente simetrica.
  creative_brief: >-
    Convierte cualquier input en una gramatica neoclasica de eje, proporcion y masa petrea
    disciplinada. La autoridad debe surgir del orden tectonico y la claridad ceremonial, no de un
    capitolio, tribunal o fachada especifica.
