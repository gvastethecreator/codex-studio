visualDna:
  aesthetic: Neoclásico institucional de autoridad cívica, orden axial y monumentalidad racional.
  form_and_line: Columnatas, frontones triangulares, plintos escalonados y secuencias de eje largo con simetría estricta.
  color_palette: Mármol blanco, caliza clara, piedra fría y bronce dorado con sombras gris azuladas.
  lighting_setup: Sol lateral que estría columnas, sombras porticadas profundas y acentos nocturnos monumentales.
  material_texture: Piedra lisa, mármol cincelado, granito pulido, yeso colado y cobre con verdín.
  render_quality: Monumental clásico de proporción rigurosa y legibilidad institucional permanente.
  spatial_distortion: Perspectiva axial neutra con jerarquía frontal y escala ceremonial.
  atmosphere: Seria, estable, cívica y atemporal.
  key_features: Orden columnario, frontón canónico, basamento escalonado, masa cívica y composición perfectamente simétrica.
  creative_brief: >-
    Define una gramática neoclásica transferible por proporción, eje y orden
    tectónico. La autoridad debe emerger de la composición y la masa pétrea,
    evitando retórica narrativa o escenográfica.
