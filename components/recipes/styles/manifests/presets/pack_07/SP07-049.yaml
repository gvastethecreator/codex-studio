visualDna:
  aesthetic: >-
    Formalismo de campo de golf de alto mantenimiento, donde topografía y estrategia deportiva se codifican en el
    terreno.
  form_and_line: Corredores de fairway en cinta, parábolas de bunker, microondas de green y visuales dirigidas por routing.
  color_palette: Vibrant Green, Sand, Sky Blue, Pinstripe Mow lines, Water-hazard Teal, Flag Yellow
  lighting_setup: Neblina de mañana, ángulo bajo sobre fairway, brillo de rocío y dramatismo de sombra en bunker.
  material_texture: Césped corto de corte preciso, arena rastrillada, agua lisa de hazard y señalética de alta visibilidad.
  render_quality: Visualización tournament-grade con lectura de mantenimiento y estrategia de juego a distancia.
  spatial_distortion: None
  atmosphere: Calma controlada, concentración competitiva y exclusividad curada.
  key_features: Franjas de siega, bunkers de borde nítido, focos de objetivo y coreografía de hazards.
  creative_brief: >-
    El estilo convierte superficie en estrategia: franjas de siega, curvas de bunker, rocío, hazards y ruta de juego
    legible. Debe sentirse mantenido con obsesion competitiva, no como paisaje verde generico. Apply this
    spatial/worldbuilding grammar over any input: preserve material logic, scale cues, architectural rhythm, atmosphere,
    and signature construction rules while avoiding a required building type, landscape, franchise set, creature, or
    fixed scene.
