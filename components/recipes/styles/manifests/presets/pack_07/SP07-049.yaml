visualDna:
  aesthetic: >-
    Formalismo de greensward competitivo de alto mantenimiento, donde topografia, mantenimiento y toma de decisiones se
    codifican en el terreno.
  form_and_line: Franjas de siega en cinta, concavidades mineralizadas tipo bunker, mesetas cortas de precision y corredores visuales dirigidos.
  color_palette: Vibrant green, sand mineral, cool sky blue, striped mow contrast, water-teal accents, hazard-marker yellow
  lighting_setup: Neblina de manana, angulo bajo sobre cesped de precision, brillo de rocio y dramatismo de sombra en vacios excavados.
  material_texture: Cesped corto de corte preciso, arena rastrillada, agua lisa contenida y marcadores de mantenimiento de alta visibilidad.
  render_quality: Visualizacion precision-turf con lectura de mantenimiento, seleccion de trayectorias y control de superficie a distancia.
  spatial_distortion: None
  atmosphere: Calma controlada, concentracion competitiva y obsesion curada por la superficie.
  key_features: Franjas de siega, recortes de arena nitidos, focos de objetivo y coreografia de riesgo superficial.
  creative_brief: >-
    Convierte cualquier superficie en estrategia de precision: franjas de siega, recortes minerales, rocio, agua
    contenida y decisiones de recorrido legibles sin exigir hoyos, banderas, jugadores o campo deportivo literal. Debe
    sentirse mantenido con obsesion competitiva, no como paisaje verde generico. Conserva corte de precision, riesgo
    superficial, escala de mantenimiento y estrategia de recorrido sin exigir edificio, paisaje, set, criatura ni escena fija.
avoidRules:
  - weeds
  - unmanaged meadow
