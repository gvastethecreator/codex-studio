visualDna:
  aesthetic: >-
    Victorian Mansion within 1. Interior Design Systems: a reusable Architecture & Interior visual language
    with a clear stylistic thesis, disciplined mood, and recognizable art direction. Keep the result
    transferable across subjects while preserving Victorian Mansion's specific style identity.
  subject_treatment: >-
    Define Victorian Mansion through line, mass, contour, spacing, and rhythm. Keep forms readable,
    intentional, and reusable beyond one literal scene.
  color_and_tone: >-
    Use a Victorian Mansion-specific palette with clear dominant, secondary, and accent roles. Keep contrast
    deliberate and avoid generic color wash.
  lighting_and_shadow: >-
    Use lighting that makes Victorian Mansion recognizable: purposeful key, rim, bounce, shadow, and glow
    behavior with readable hierarchy.
  texture_and_material: >-
    Use materials and textures that reinforce Victorian Mansion: surface response, grain, patina, polish, or
    wear should feel intentional and style-defining.
  camera_and_composition: >-
    Use spatial behavior that fits Victorian Mansion: perspective, compression, exaggeration, or depth should
    support the style without forcing one fixed location.
  atmosphere_and_mood: >-
    Set a mood that belongs to Victorian Mansion: specific, coherent, and distinct, with emotional tone
    carried by visual systems rather than narrative captioning.
  rendering_and_quality: >-
    Render Victorian Mansion with high production clarity, strong silhouette reads, clean detail priority, and
    no accidental UI, text, logos, or watermark.
  key_features: >-
    Prioritize Victorian Mansion's key features: recognizable shape language, palette logic, material cues,
    lighting behavior, and composition rules.
  creative_brief: >-
    Create a style-card that translates Victorian Mansion into a portable visual system for 1. Interior Design
    Systems. Preserve the preset identity through style mechanics, not a fixed scene, character, prop, or
    story beat.
