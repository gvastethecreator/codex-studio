visualDna:
  aesthetic: Victoriano de herencia pesada, exceso ornamental y teatralidad histórica cerrada.
  form_and_line: Densidad de patrón, marcos repetidos, drapeados voluminosos y siluetas sobrecargadas.
  color_palette: Rojo oscuro, dorado envejecido, caoba, ciruela, verde botella y latón antiguo.
  lighting_setup: Gaslight tenue, pools de lámpara de aceite, parpadeo de hogar y penumbra filtrada por cortinaje espeso.
  material_texture: Terciopelo, brocado, papel estampado, mármol oscuro, maderas profundas y metal envejecido.
  render_quality: Densidad museográfica de época con lectura material opulenta y atmósfera histórica cerrada.
  spatial_distortion: Profundidad estable saturada por acumulación decorativa en múltiples capas.
  atmosphere: Opresiva, aristocrática, nostálgica y ceremoniosa.
  key_features: Drapería pesada, tapizados cargados, marcos acumulados, ornamentación floral y volumen overstuffed.
  creative_brief: >-
    Define una gramática victoriana transferible por sobrecarga ornamental,
    paleta profunda y luz baja ceremonial. El estilo debe expresar peso
    histórico y acumulación material sin depender de una narrativa literaria.
