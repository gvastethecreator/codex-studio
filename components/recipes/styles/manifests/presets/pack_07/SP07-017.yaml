visualDna:
  aesthetic: Maximalismo curatorial de alta saturación, donde superposición y colección son gramática base.
  form_and_line: Capas sucesivas de patrón, marcos densos, textiles sobre textiles y ocupación casi total de superficies.
  color_palette: Joyas saturadas (esmeralda, zafiro, rubí, amatista), teal pavo y coral como disonancias controladas.
  lighting_setup: Red cálida de lámparas, luces de cuadro, brillos de candelabro y ambientes regulados por dimmer.
  material_texture: Terciopelo, papeles estampados, alfombras superpuestas, sedas bordadas, dorados y lomo de libro visible.
  render_quality: Densidad opulenta legible, caos controlado y riqueza material acumulativa sin pérdida de jerarquía.
  spatial_distortion: Profundidad estable con compresión visual por saturación de objetos y patrones.
  atmosphere: Efervescente, personal, exuberante y deliberadamente excesiva.
  key_features: Muros galería piso-techo, mezcla agresiva de patrón, capas textiles y colecciones de objetos.
  creative_brief: >-
    Construye una gramática maximalista transferible basada en saturación
    cromática, densidad objetual y superposición textil. Debe mantenerse la
    legibilidad curatorial sin caer en ruido visual indiscriminado.
