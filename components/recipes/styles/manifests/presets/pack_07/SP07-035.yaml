  form_and_line: Tall shelf bays, ladder-track verticals, table-aisle symmetry, vault/alcove cadence, spine-color striping
  color_palette: Brown, Gold, Dust, Calfskin Tan, Marbled Endpaper, Brass Patina, Forest Leather
  lighting_setup: Warm lamp, banker's green glass shade, reading-table pool, high-window shaft, brass sconce
  material_texture: Oxidized leather grain, deckled paper edges, gilt tooling wear, polished oak handling patina, brass lamp tarnish
  render_quality: Museum-grade interior rendering, fine material aging fidelity, deep focus for catalog-like readability
  spatial_distortion: None
