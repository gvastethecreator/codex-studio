visualDna:
  aesthetic: Clasicismo bibliográfico histórico con monumentalidad silenciosa y disciplina de lectura.
  form_and_line: Crugías altas de archivo, verticales de acceso, simetría de lectura y cadencia de bóveda/alcoba.
  color_palette: Brown, Gold, Dust, Calfskin Tan, Marbled Endpaper, Brass Patina, Forest Leather
  lighting_setup: >-
    Lámparas cálidas focales, pantalla verde de lectura, shafts altos de luz y apliques de latón
    envejecido.
  material_texture: >-
    Cuero oxidado, papel de canto irregular, dorados gastados, roble pulido por uso y latón
    oscurecido.
  render_quality: Calidad museo con envejecimiento noble y profundidad de campo apta para lectura catalográfica.
  spatial_distortion: None
  atmosphere: >-
    Contemplativa, rigurosa y reverencial, con calidez puntual sobre un fondo de silencio
    estructurado.
  key_features: >-
    Luz green-shade, clústeres catalográficos, verticales móviles, numeración de bahías y acentos
    cartográficos.
  creative_brief: >-
    Cualquier sujeto debe ordenarse como conocimiento viejo: ritmos verticales de archivo, luz focal
    verde-ambar, cuero oxidado, papel irregular y latón apagado. La solemnidad viene de catalogar y
    preservar, no de un salón fijo.
