visualDna:
  aesthetic: Ciudad toy brick-built con ensamblaje modular ABS, lógica stud-visible y urbanismo lúdico de ingeniería simplificada.
  form_and_line: Retícula ortogonal de studs, masa escalonada por bloques, trabas de esquina y transición geométrica de escala juguete.
  color_palette: Saturated primary red-yellow-blue, bright green accents, neutral black-white-gray balancing blocks, and occasional transparent-plastic highlight tones
  lighting_setup: Key difusa amplia de interior, especulares plásticas nítidas y agrupaciones de highlight sobre coronas stud.
  material_texture: Brillo ABS inyectado, tapas circulares, juntas de pieza, transiciones slope y marcas leves de moldeo.
  render_quality: Toy-architecture de lectura alta con ensamblaje preciso y abstracción de bloque no realista deliberada.
  spatial_distortion: None
  atmosphere: Energética, constructiva y optimista, guiada por sistema modular.
  key_features: Campos de studs visibles, huellas alineadas a baseplate, apilado de fachada, seams interlock y color blocking plástico intenso.
  creative_brief: >-
    Construye una gramática brick-built reusable con geometría modular por
    stud, respuesta plástica ABS brillante y color blocking consistente en
    cualquier sujeto.
