visualDna:
  aesthetic: Brick-built toy-city language based on modular ABS construction, stud-visible assembly logic, and playful engineered urban composition
  form_and_line: Orthogonal stud grid, stepped block massing, interlocking corner bonds, repeated module cadence, and clean toy-scale geometry transitions
  color_palette: Saturated primary red-yellow-blue, bright green accents, neutral black-white-gray balancing blocks, and occasional transparent-plastic highlight tones
  lighting_setup: Broad diffuse indoor key light with crisp plastic speculars, stud-top highlight clustering, and low-roughness reflections across molded surfaces
  material_texture: Injection-mold ABS sheen, circular stud caps, seamline joints, smooth slope-piece transitions, and subtle tooling marks typical of toy bricks
  render_quality: High-readability toy-architecture rendering with precise modular assembly, glossy material fidelity, and deliberate non-realistic block abstraction
  spatial_distortion: None
  atmosphere: Energetic, constructive, optimistic, playful, and system-driven
  key_features: Visible stud fields, baseplate-aligned footprints, modular façade stacking, interlocking brick seams, toy-scale proportion logic, and bright plastic color blocking
  creative_brief: >-
    Preserve a reusable brick-built grammar: stud-first modular geometry,
    glossy ABS material response, and color-blocked toy urbanism should remain
    stable across any subject.
