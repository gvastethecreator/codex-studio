visualDna:
  aesthetic: Parametricismo fluido de logica algoritmica, continuidad topologica y espacialidad casi liquida.
  form_and_line: >-
    Curvas continuas, superficies sin junta visible, volumenes morfogeneticos y transiciones tipo
    cinta.
  color_palette: Blanco tecnico, gris frio gradual, plata liquida y azul hielo en senal luminica.
  lighting_setup: >-
    Ambiente suave continuo, lineas de glow embebidas, iluminacion de borde y nucleos de volumen
    activos.
  material_texture: >-
    Compuestos lisos, hormigon de piel continua, paneleria GRP y membranas tensadas de alta
    precision.
  render_quality: >-
    Futurista de precision computacional, con lectura limpia de geometria compleja y detalle
    constructivo plausible.
  spatial_distortion: Fluidez formal con profundidad sin quiebres, enfatizando continuidad vectorial.
  atmosphere: Elegante, avanzada, ligera y matematica.
  key_features: >-
    Vertices continuos, porosidad algoritmica, patrones parametricos y canales formales sin junta
    visible.
  creative_brief: >-
    Convierte cualquier input en una gramatica parametrica donde continuidad de superficie, variacion
    algoritmica y precision constructiva operen como un solo sistema. Debe sentirse computacional y
    morfogenetico sin depender de un edificio heroico concreto.
