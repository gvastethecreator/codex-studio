visualDna:
  aesthetic: Parametricismo fluido de lógica algorítmica, continuidad topológica y espacialidad casi líquida.
  form_and_line: >-
    Curvas continuas, superficies sin junta visible, volúmenes morfogenéticos y transiciones tipo
    cinta.
  color_palette: Blanco técnico, gris frío gradual, plata líquida y azul hielo en señal lumínica.
  lighting_setup: >-
    Ambiente suave continuo, líneas de glow embebidas, iluminación de borde y núcleos de volumen
    activos.
  material_texture: >-
    Compuestos lisos, hormigón de piel continua, panelería GRP y membranas tensadas de alta
    precisión.
  render_quality: >-
    Futurista de precisión computacional, con lectura limpia de geometría compleja y detalle
    constructivo plausible.
  spatial_distortion: Fluidez formal con profundidad sin quiebres, enfatizando continuidad vectorial.
  atmosphere: Elegante, avanzada, ligera y matemática.
  key_features: >-
    Vórtices continuos, porosidad algorítmica, patrones paramétricos y canales formales sin junta
    visible.
  creative_brief: >-
    Construye una gramática paramétrica transferible donde continuidad de superficie, variación
    algorítmica y precisión constructiva sean inseparables. Debe sentirse computacional sin depender
    de un edificio específico.
