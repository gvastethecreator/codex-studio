visualDna:
  aesthetic: Bauhaus arquitectónico de racionalismo industrial, antiornamento y legibilidad funcional explícita.
  form_and_line: Masas cúbicas, ventanas corridas, cubiertas planas, asimetría planificada y estructura clara.
  color_palette: Base blanco-negro-gris con acentos puntuales de color-señal de baja frecuencia.
  lighting_setup: Distribución diurna homogénea, sombras sobrias y ritmos de ventana lineales sin teatralización.
  material_texture: Revoque mineral mate, acero preciso, vidrio plano, linóleo y detalles metálicos tubulares.
  render_quality: Modernismo nítido de orden gráfico y verdad material.
  spatial_distortion: Estabilidad ortogonal con equilibrio de masas y asimetría medida.
  atmosphere: Precisa, progresiva, utilitaria y calmada.
  key_features: Composición función-primero, cinta de ventana, planos limpios y señalética cromática mínima.
  creative_brief: >-
    Conserva una gramática Bauhaus transferible donde función, masa y estructura
    ordenen cada decisión visual. La asimetría debe ser racional y medible,
    nunca expresiva por capricho formal.
