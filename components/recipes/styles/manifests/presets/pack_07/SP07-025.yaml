visualDna:
  aesthetic: Bauhaus modernist style with machine-age rationalism, functional clarity, and disciplined anti-ornamental expression
  form_and_line: Cubic massing, ribbon windows, planar asymmetry, flat-roof horizontals, and exposed structural legibility
  color_palette: White-black-gray base with steel-blue neutrals and sparse signal-color accents for functional hierarchy
  lighting_setup: Even daylight distribution, low-drama shadows, strip-window rhythm, and clarity-first luminance balance
  material_texture: Mineral render matte, steel-frame precision, glass plane clarity, linoleum tactility, and tubular metal detailing
  render_quality: Crisp modernist visualization prioritizing proportion discipline, material truth, and graphic compositional order
  spatial_distortion: Geometric stability with orthogonal rigor and asymmetry handled through measured mass relationships
  atmosphere: Rational, calm, precise, progressive, utilitarian
  key_features: Function-first composition, ribbon glazing language, flat-roof planar order, restrained signal accents
  creative_brief: >-
    Preserve identity through functional hierarchy and geometric discipline:
    anti-ornamental clarity, structural legibility, and measured asymmetry are
    the transferable core of this preset.
