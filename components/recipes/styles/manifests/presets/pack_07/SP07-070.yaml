  color_palette: Baked ginger brown, royal-icing white, peppermint red, sugar green, candy pink accents, warm caramel notes, and sprinkle multicolor highlights
  lighting_setup: Ámbar interior cálido, destellos de cristal de azúcar, twinkle festivo suave y sombra cozy de bajo contraste.
  material_texture: Grano de galleta horneada, relieve de icing, polvo azucarado cristalino, gloss candy duro y acentos de glaseado chocolate.
