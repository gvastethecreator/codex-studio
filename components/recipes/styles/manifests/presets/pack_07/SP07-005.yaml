visualDna:
  aesthetic: Bohemian-eclectic style defined by collected layering, botanical softness, and artisanal global texture interplay
  form_and_line: Organic asymmetry, draped textile cascades, rounded handcrafted silhouettes, vegetal flow lines, intentionally uneven composition balance
  color_palette: Warm earth foundations with turquoise-indigo accents, spice pigments, terracotta anchors, and patterned chroma punctuation
  lighting_setup: Filtered natural dappling with low-intensity ambient practicals, lantern diffusion, and soft shadow overlap
  material_texture: Woven natural fibers, hand-knotted rugs, macramé cords, raw linen folds, carved wood micro-relief, leaf translucency
  render_quality: Richly layered boho editorial finish with tactile density, controlled visual clutter, and cohesive material harmony
  spatial_distortion: Gentle organic depth drift driven by plants and textiles, avoiding rigid axial symmetry
  atmosphere: Free-spirited, warm, lived-in, creative, worldly
  key_features: Layered artifact curation, botanical-textile rhythm, asymmetrical comfort composition, handcrafted surface diversity
  creative_brief: >-
    Build the preset around layered artisan materials and botanical flow,
    keeping eclectic curation and tactile warmth as transferable style anchors
    rather than a fixed traveler-room vignette.
