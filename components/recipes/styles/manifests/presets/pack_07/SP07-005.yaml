visualDna:
  aesthetic: Eclecticismo bohemio de acumulación curada, con densidad táctil, color viajado y ritmo orgánico como estructura visual principal.
  form_and_line: Asimetría orgánica, cascadas textiles, perfiles artesanales redondeados y composiciones intencionalmente no axiales.
  color_palette: Base tierra cálida con turquesa/índigo, especias cromáticas, terracota y punctuaciones de patrón saturado.
  lighting_setup: Luz natural moteada, prácticos bajos tipo farol, difusión cálida y solapamiento suave de sombras.
  material_texture: Fibras tejidas, alfombras anudadas, macramé, lino crudo, tallas en madera y hojas semitranslúcidas.
  render_quality: Editorial boho de alta densidad material con clutter controlado y armonía entre piezas heterogéneas.
  spatial_distortion: Profundidad orgánica por capas irregulares, solapes textiles y asimetría intencional; sin rigidez geométrica.
  atmosphere: Libre, habitado, cálido, viajero y creativo, con riqueza sensorial continua.
  key_features: Artesanía acumulada, mezcla de patrones, pulsos orgánicos, textiles superpuestos y baja simetría.
  creative_brief: >-
    Establece una gramática bohemia transferible basada en acumulación
    artesanal, ritmo orgánico-textil y abundancia asimétrica. Debe sentirse
    vivido y curado, nunca caótico ni dependiente de una escena puntual.
