visualDna:
  aesthetic: Ultra-luxury aerial residential style with monolithic glazing, restrained opulence, and curated minimal spatial drama
  form_and_line: Long uninterrupted glazing lines, floating slab planes, cantilever gestures, low-profile furnishings, disciplined negative space
  color_palette: Warm ivory neutrals, charcoal anchors, smoky blue-greys, brushed brass accents, muted stone undertones
  lighting_setup: Layered ambient cove light, soft practical pools, controlled reflection management, low-glare premium interior illumination
  material_texture: Book-matched marble veining, satin metal trims, full-grain leather, soft woven textiles, polished glass depth, matte lacquer panels
  render_quality: Architectural-visualization premium finish with high material fidelity, clean staging, and luxury hospitality polish
  spatial_distortion: Wide-angle restraint with elongated interior axis and balanced foreground-midground luxury object hierarchy
  atmosphere: Serene, controlled, aspirational, private, rarefied
  key_features: Continuous glazing language, floating architectural planes, high-end material pairings, low-clutter composition, curated statement objects
  creative_brief: Encode luxury through proportion, material choreography, and lighting discipline rather than landmarks; the style should remain transferable to any high-end interior program.
