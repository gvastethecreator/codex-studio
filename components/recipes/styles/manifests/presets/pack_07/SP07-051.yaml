visualDna:
  aesthetic: >-
    Clasicismo élfico orgánico de santuario, con integración biocéntrica y refinamiento lírico de
    alta fantasía.
  form_and_line: >-
    Arcos filigranados, soportes derivados de ramas, estratos en cascada y curvas estructurales no
    ortogonales.
  color_palette: Autumn Gold, White, Silver Birch, Moss-floor Green, Waterfall Mist, Soft Lavender dusk
  lighting_setup: >-
    Glow etéreo cálido, faroles élficos, reflejo lunar en agua y radiancia interior contenida de
    carácter ceremonial.
  material_texture: >-
    Piedra tallada fina, madera viva, inlays nacarados, filigrana plateada y superficies de brillo
    cristalino.
  render_quality: Alta fidelidad fantástica con integración biótica-artesanal y ornamento de lectura precisa.
  spatial_distortion: None
  atmosphere: Refugio sacro, melancolía luminosa y continuidad atemporal.
  key_features: >-
    Estratos atravesados por agua, fusión árbol-estructura, trazas finas suspendidas y orientación
    celeste.
  creative_brief: >-
    Cualquier sujeto adopta curvatura filigranada, fusión árbol-estructura, agua como estrato y luz
    melancólica. La referencia élfica guía refinamiento lírico, no una localización licenciada.
