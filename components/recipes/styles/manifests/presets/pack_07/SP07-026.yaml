visualDna:
  aesthetic: Googie retro-futurist style with atomic-age optimism, velocity-driven geometry, and exuberant commercial-modern spectacle
  form_and_line: Upswept cantilevers, boomerang vectors, starburst motifs, flying-V canopies, and angular glazing rhythms
  color_palette: Neon-bright primaries with chrome neutrals, turquoise-red anchors, buttery yellow highlights, and atomic orange punches
  lighting_setup: High-signage neon glow, backlit plastic diffusion, marquee-like edge lighting, and animated luminance sequencing
  material_texture: Polished chrome, terrazzo sparkle, Formica gloss, painted stucco grain, and crisp glazed surface reflections
  render_quality: High-energy mid-century retro-future rendering with kitsch precision and polished optimism-forward finish
  spatial_distortion: Directional boomerang skew and upswept perspective emphasis to imply constant forward motion
  atmosphere: Playful, optimistic, fast, theatrical, nostalgic
  key_features: Velocity geometry language, neon-chrome contrast, starburst ornament grammar, exuberant cantilever choreography
  creative_brief: >-
    Keep the preset identifiable through atomic-age velocity forms and
    neon-chrome exuberance; prioritize optimistic retro-future geometry over
    any fixed roadside venue narrative.
