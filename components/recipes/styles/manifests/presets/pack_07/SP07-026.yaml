visualDna:
  aesthetic: Retrofuturismo Googie de optimismo atómico, velocidad visual y espectáculo comercial modernista.
  form_and_line: Cantiléveres ascendentes, vectores boomerang, canopy en V, starbursts y acristalamientos angulares dinámicos.
  color_palette: Primarios neón sobre neutros cromados, turquesa/rojo como anclas y amarillos mantequilla con naranja atómico.
  lighting_setup: Señalética brillante, difusiones plásticas retroiluminadas y bordes tipo marquee con secuencia luminosa.
  material_texture: Cromo pulido, terrazo brillante, Formica esmaltada, estuco pintado y reflejos duros de vidrio.
  render_quality: Retro-futuro de media centuria con energía kitsch precisa y acabado optimista de alto contraste.
  spatial_distortion: Sesgo direccional y perspectiva levantada para sugerir movimiento continuo.
  atmosphere: Lúdica, veloz, nostálgica y espectacular.
  key_features: Motivos starburst, geometría de impulso, neón-cromo dominante y coreografía de voladizos.
  creative_brief: >-
    Define una gramática Googie transferible donde velocidad geométrica,
    exuberancia neón-cromo y optimismo atómico sean constantes visuales. Debe
    funcionar sin depender de la narrativa de un diner o carretera concreta.
