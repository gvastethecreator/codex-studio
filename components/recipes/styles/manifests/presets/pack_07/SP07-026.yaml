    should support the style without forcing one fixed location.
  atmosphere_and_mood: >-
    Set a mood that belongs to Googie Architecture: specific, coherent, and distinct, with emotional tone
    carried by visual systems rather than narrative captioning.
  rendering_and_quality: >-
    Render Googie Architecture with high production clarity, strong silhouette reads, clean detail priority,
    and no accidental UI, text, logos, or watermark.
  key_features: >-
    Prioritize Googie Architecture's key features: recognizable shape language, palette logic, material cues,
    lighting behavior, and composition rules.
  creative_brief: >-
    Create a style-card that translates Googie Architecture into a portable visual system for 2. Architectural
