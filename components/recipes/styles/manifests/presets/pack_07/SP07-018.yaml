visualDna:
  aesthetic: Farmhouse contemporaneo de refinamiento rural, calidez blanca y nostalgia funcional controlada.
  form_and_line: >-
    Listones horizontales, diagonales brace, geometria utilitaria abierta y lineas apron-front
    suavizadas.
  color_palette: Blanco/crema dominante, madera natural, plata galvanizada, lino suave y hierro negro de acento.
  lighting_setup: Manana luminosa aireada, pendentes sobredimensionados y practicos utilitarios de tono calido.
  material_texture: >-
    Madera envejecida, lino lavado, pintura tiza, algodon rayado, fibras trenzadas y metal
    galvanizado.
  render_quality: Editorial farmhouse limpio con legibilidad domestica y calidez cotidiana consistente.
  spatial_distortion: Escala estable y amplitud moderada por luz distribuida y geometria utilitaria visible.
  atmosphere: Acogedor, amable, comunitario y familiar.
  key_features: >-
    Liston blanco, madera recuperada, beadboard, metal galvanizado y utilidad visible como
    ornamento.
  creative_brief: >-
    Convierte cualquier input en una gramatica farmhouse de blanco calido, madera envejecida,
    utilidad visible y calma cotidiana. Debe sentirse vivido y funcional sin quedar atado a una casa
    de campo literal ni a cliches televisivos de domesticidad escenografica.
