visualDna:
  aesthetic: Calma zen de contencion extrema, vacio disciplinado y materialidad natural silenciosa sin dependencia de interior tradicional fijo.
  form_and_line: Reticula modular baja, lineas horizontales contenidas, filtros transluidos y focos asimetricos de vacio intencional.
  color_palette: Blanco papel de arroz, madera clara calida, verde tatami, carbon sumi e indigo apagado
  lighting_setup: Difusion filtrada, pools calidos de baja intensidad y sombras de transicion lenta con control contemplativo.
  material_texture: Fibra vegetal visible, veta de madera cruda, arcilla mate alisada a mano y translucidez de papel.
  render_quality: Minimal refinado con equilibrio de espacio negativo y precision contemplativa portable.
  spatial_distortion: Geometria neutra; profundidad por capas filtrantes y vacios secuenciados.
  atmosphere: Serena, reverente, lenta y enfocada.
  key_features: Reticula baja, filtros transluidos, focos sobrios, materiales organicos desnudos y ritmo contenido.
  creative_brief: >-
    Define el preset como una gramatica de calma modular: reticula, filtro de luz y vacio intencional. La transferencia
    debe sostener quietud material y precision ritual sin depender de tatami-room, templo, jardin seco o escena
    tradicional especifica. Conserva logica material, escala contenida y ritmo espacial contemplativo sin fijar
    tipologia, paisaje, franquicia, criatura ni escena cerrada.
