visualDna:
  aesthetic: Japanese zen-wabi interior style with disciplined emptiness, seasonal restraint, and contemplative material quietude
  form_and_line: Modular tatami grid logic, shoji and fusuma linear cadence, alcove focal minimalism, and low horizon furniture profiles
  color_palette: Rice-paper whites, bamboo and cedar warms, tatami greens, sumi-charcoal accents, and muted indigo depth notes
  lighting_setup: Shoji-filtered daylight diffusion, lantern-soft ambient pools, alcove emphasis lighting, and seasonal shadow subtlety
  material_texture: Tatami fiber weave, raw wood grain, hand-troweled clay matte, paper translucency, and silk-soft accent surfaces
  render_quality: Refined minimalist rendering with high material calm, balanced negative space, and meditative visual precision
  spatial_distortion: Neutral geometric proportioning with depth expressed through layered screens and controlled emptiness
