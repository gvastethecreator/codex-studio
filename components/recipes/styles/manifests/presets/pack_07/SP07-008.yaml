visualDna:
  aesthetic: Zen doméstico de contención extrema, vacío disciplinado y materialidad natural silenciosa.
  form_and_line: Retícula modular baja, líneas horizontales contenidas, paneles translúcidos y focos asimétricos de vacío.
  color_palette: Blanco papel de arroz, madera clara cálida, verde tatami, carbón sumi e índigo apagado.
  lighting_setup: Difusión filtrada por paneles, pools cálidos de baja intensidad y sombras estacionales de transición lenta.
  material_texture: Fibra vegetal visible, veta de madera cruda, arcilla mate alisada a mano y translucidez de papel.
  render_quality: Render minimal refinado con equilibrio de espacio negativo y precisión contemplativa.
  spatial_distortion: Geometría neutra; profundidad por capas de pantalla y vacíos secuenciados.
  atmosphere: Serene, reverente, lenta y enfocada.
  key_features: Retícula baja, filtros translúcidos, focos sobrios, materiales orgánicos desnudos y ritmo contenido.
  creative_brief: >-
    Define el preset como una gramática de calma modular: retícula, filtro de
    luz y vacío intencional. La transferencia debe sostener quietud material y
    precisión ritual sin depender de escenas tradicionales específicas.
