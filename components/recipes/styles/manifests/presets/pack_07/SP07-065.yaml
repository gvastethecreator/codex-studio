visualDna:
  aesthetic: Miniatura papercraft basada en lógica de pliegue, estratificación de diorama y sensibilidad manual portable.
  form_and_line: Siluetas de corte nítido, bisagras marcadas, uniones por pestaña y planos pop-up en profundidad apilada.
  color_palette: >-
    Off-white paper stock, kraft brown board, neutral newsprint gray, pastel card inserts, tracing-paper translucency,
    and muted pigment accents
  lighting_setup: Key suave de maqueta, sombras direccionales por cantos de papel y glow tenue por translucidez de láminas finas.
  material_texture: Fibra visible, diente de cartulina, memoria de pliegue, pelusa de corte y costuras secas de pegamento mate.
  render_quality: Miniatura artesanal de alta claridad con escala controlada y materialidad deliberadamente no fotoreal.
  spatial_distortion: None
  atmosphere: Delicada, paciente y contemplativa, con ensamblaje manual explícito.
  key_features: Líneas de score expuestas, uniones tab-slot, planos por capas y ritmo de sombra en borde de papel.
  creative_brief: >-
    Renderiza cualquier tema como construcción papercraft: planos plegados, pestañas visibles, fibra de cartulina,
    sombras de borde y profundidad de diorama. La maqueta debe sentirse hecha a mano sin depender de ciudad miniatura,
    calle de maqueta, vitrina museistica o escena urbana obligatoria. Conserva pliegue, pestanas, fibra visible,
    escala de maqueta y sombra por capas sin exigir edificio, paisaje, set, criatura ni escena fija.
