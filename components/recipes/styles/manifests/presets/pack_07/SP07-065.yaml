visualDna:
  aesthetic: Miniatura urbana papercraft basada en lógica de pliegue, estratificación de diorama y sensibilidad de maqueta hecha a mano.
  form_and_line: Siluetas de corte nítido, bisagras marcadas, uniones por pestaña y planos pop-up en profundidad baja apilada.
  color_palette: Off-white paper stock, kraft brown board, neutral newsprint gray, pastel card inserts, tracing-paper translucency, and muted pigment accents
  lighting_setup: Key de mesa suave, sombras direccionales por cantos de papel y glow tenue por translucidez de láminas finas.
  material_texture: Fibra visible, diente de cartulina, memoria de pliegue, pelusa de corte y costuras secas de pegamento mate.
  render_quality: Miniatura artesanal de alta claridad con escala controlada y materialidad deliberadamente no fotoreal.
  spatial_distortion: None
  atmosphere: Delicada, paciente y contemplativa, con ensamblaje manual explícito.
  key_features: Líneas de score expuestas, uniones tab-slot, fachadas por capas y ritmo de sombra en borde de papel.
  creative_brief: >-
    Mantén una gramática papercraft transferible donde arquitectura planar
    plegada, costuras visibles y profundidad de diorama definan identidad en
    múltiples sujetos.
