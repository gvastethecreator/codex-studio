visualDna:
  aesthetic: Papercraft urban miniature language centered on folded construction logic, diorama layering, and handcrafted architectural model sensibility
  form_and_line: Crisp cut-edge silhouettes, scored fold hinges, tab-locked joints, stepped pop-up planes, and shallow stacked depth cues
  color_palette: Off-white paper stock, kraft brown board, neutral newsprint gray, pastel card inserts, tracing-paper translucency, and muted pigment accents
  lighting_setup: Soft tabletop key, directional shadow cuts from paper edges, low-contrast fill, and subtle translucency glow through thin sheet layers
  material_texture: Visible paper fiber, card-stock tooth, scored crease memory, cut-edge fuzz, dried glue seams, and matte bristol finish
  render_quality: High-clarity handcrafted miniature rendering with delicate construction detail, controlled scale cues, and intentionally non-photoreal material behavior
  spatial_distortion: None
  atmosphere: Delicate, patient, precise, contemplative, and visibly hand-assembled
  key_features: Exposed fold-score lines, tab-and-slot joins, layered façade planes, miniature street depth stacking, paper-edge shadow rhythm, and matte handmade finish
  creative_brief: >-
    Keep this preset defined by papercraft construction grammar: folded planar
    architecture, exposed assembly seams, and miniature diorama depth should
    remain consistent and transferable across subjects.
