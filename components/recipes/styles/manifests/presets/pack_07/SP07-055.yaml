  aesthetic: Fantasía confitera de surrealismo comestible y modularidad de azúcar.
  form_and_line: Masas redondeadas blandas, columnas candy repetitivas y bandas ornamentales de glaseado.
  color_palette: Pink, Pastel, Candy-apple Red, Gumdrop Green, Marshmallow White, Licorice Black
  lighting_setup: Glow cálido de confitería, brillos de frosting, translucidez gumdrop y destellos de cristal de azúcar.
  material_texture: Glaseado, bizcocho, caramelo duro, malvavisco, oblea y hilos de azúcar estirada.
  render_quality: Fantasía estilizada de saturación alta con coherencia lúdica de material comestible.
  spatial_distortion: Melting
  atmosphere: Exceso lúdico, surrealismo alegre y escapismo hiper-dulce.
  key_features: Planos de icing, marcadores gumdrop, acentos sprinkle y motivos estructurales candy-cane.
  creative_brief: >-
    Todo se vuelve arquitectura de azucar: glaseado como junta, caramelo como estructura, gumdrops como nodos y pastel
    como masa. La fantasia debe ser material y tactil, no depender de reino, cuento o escena. Apply this
    spatial/worldbuilding grammar over any input: preserve material logic, scale cues, architectural rhythm, atmosphere,
    and signature construction rules while avoiding a required building type, landscape, franchise set, creature, or
    fixed scene.
