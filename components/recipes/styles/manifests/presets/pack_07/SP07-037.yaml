visualDna:
  aesthetic: Inmersión azul técnica, donde envolvente acrílica y columna de agua construyen espectáculo óptico.
  form_and_line: Secciones arqueadas continuas, empuje tubular de perspectiva y capas de profundidad acuática con flujo suave.
  color_palette: Blue, Cyan, Aquamarine, Deep Navy shadow, Bioluminescent fleck, Sandy floor tan
  lighting_setup: Redes caústicas dinámicas, dapple cenital, ambiente azul profundo y brillo de tanque de alta difusión.
  material_texture: Acrílico grueso, piel de agua refractiva, partículas suspendidas y rugosidad de sustrato húmedo.
  render_quality: Claridad acuática alta con refracción físicamente creíble y atenuación cromática por profundidad.
  spatial_distortion: Refracción, atenuación azul y curvatura óptica controlada.
  atmosphere: Asombro silencioso, calma presurizada e inmersión azul de ritmo humano ralentizado.
  key_features: Barridos caústicos, nervios acrílicos, turbidez variable, siluetas acuáticas y estratos bióticos.
  creative_brief: >-
    Formula una gramática acuática transferible donde óptica, profundidad y
    robustez de envolvente manden. La biota puede aportar escala y ritmo, pero
    la identidad nace del tratamiento técnico del agua.
