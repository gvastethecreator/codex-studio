visualDna:
  aesthetic: Clasicismo paisajístico formal donde la geometría vegetal expresa poder, protocolo y orden territorial.
  form_and_line: Eje central dominante, parterres espejados, allées perspectivos y jerarquía de focos por lámina de agua.
  color_palette: Green, Gravel Beige, Boxwood Dark, Seasonal Bedding Red, Water-reflection Silver, Limestone
  lighting_setup: Sol plano de lectura planimétrica, dramatismo axial por sombras largas y destellos en nodos ceremoniales.
  material_texture: Setos recortados milimétricos, grava rastrillada, piedra de fuente y césped de patrón controlado.
  render_quality: Precisión de proyecto de paisaje con profundidad ceremonial y legibilidad topiaria estricta.
  spatial_distortion: None
  atmosphere: Ceremonial, monumental y disciplinada, con autoridad visual intencional.
  key_features: Parterres bordados, planos de seto, reflejos axiales, nodos ceremoniales y puntos de control visual lejano.
  creative_brief: >-
    Define una gramática de jardín formal transferible donde eje, simetría y
    precisión topiaria manden la composición. Debe funcionar como arquitectura
    horizontal con lectura clara tanto en planta como en perspectiva.
