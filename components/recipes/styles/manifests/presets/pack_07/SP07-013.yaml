visualDna:
  aesthetic: Mediterráneo solar de cal y terracota, claridad térmica y umbral ventilado.
  form_and_line: Volúmenes estucados de canto blando, arquerías repetidas, colonnatas ligeras y transiciones de sombra abierta.
  color_palette: Blanco de cal, azul mediterráneo, terracota, ocre cálido y verdes vidrio mar en acento moderado.
  lighting_setup: Sol alto de contraste nítido, rebote cálido mineral y transición crepuscular con prácticos discretos.
  material_texture: Estuco mineral, baldosa manual, piedra junta abierta, madera blanqueada y hierro forjado mate.
  render_quality: Realismo mediterráneo limpio con precisión de luz solar y lectura material aérea.
  spatial_distortion: Perspectiva abierta con encuadres axiales suaves y secuencia de umbrales ventilados.
  atmosphere: Luminosa, relajada, ventilada y restaurativa.
  key_features: Binomio cal-terracota, sombra arqueada, umbrales conectores y paleta costera de saturación contenida.
  creative_brief: >-
    Mantén una gramática mediterránea transferible de alto sol, cal mineral y
    terracota estructurante. La identidad debe sostenerse por clima, material y
    secuencia espacial, no por una narrativa de villa puntual.
