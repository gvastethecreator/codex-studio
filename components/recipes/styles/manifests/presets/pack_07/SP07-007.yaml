visualDna:
  aesthetic: Glamour deco de alta densidad geométrica, lujo metálico y teatralidad axial controlada.
  form_and_line: >-
    Perfiles escalonados, chevrons y sunbursts, simetría rígida y ornamentación jerárquica de
    lectura frontal.
  color_palette: Dominante negro-dorado con esmeralda y azul noche, balanceado por marfil y reflejos cromados.
  lighting_setup: >-
    Uplights dramáticos, rebotes especulares en superficies pulidas, capas de apliques/candelabros y
    nodos tipo marquee.
  material_texture: Latón pulido, mármol veteado, terciopelo profundo, lacas brillantes y vidrio grabado.
  render_quality: Acabado deco cinematográfico con precisión ornamental y contraste de lujo legible.
  spatial_distortion: Simetría estructurada con tirón vertical para enfatizar monumentalidad ceremonial.
  atmosphere: Opulento, nocturno, ceremonial y escénico.
  key_features: >-
    Motivos geométricos repetitivos, metales nobles, espejos amplificadores, perfiles stepped y
    focos teatrales.
  creative_brief: >-
    Mantén una gramática art déco transferible basada en jerarquía geométrica, contraste metálico y
    composición axial escénica. La ornamentación debe ser sistema visual, no decoración anecdótica
    de contexto.
