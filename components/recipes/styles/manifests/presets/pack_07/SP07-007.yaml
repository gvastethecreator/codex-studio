visualDna:
  aesthetic: Art Deco glamour style with geometric opulence, metallic luxury contrast, and high-society theatrical polish
  form_and_line: Stepped ziggurat profiles, chevron rhythms, sunburst motifs, and symmetrical ornament hierarchies with strong axial control
  color_palette: Black-gold dominance with emerald and deep navy enrichments, ivory balancing planes, and chrome highlight accents
  lighting_setup: Dramatic uplight architecture, mirrored bounce play, sconce-and-chandelier glow layering, and marquee-like brilliance nodes
  material_texture: Polished brass sheen, marble veining, velvet softness, lacquer depth, etched-glass detailing, and chrome inlay precision
  render_quality: Luxe deco visualization with crisp ornamental readability and cinematic night-glamour finish
  spatial_distortion: Structured symmetry with vertical accent pulls to reinforce grandeur and formal theatrical presence
  atmosphere: Opulent, glamorous, dramatic, celebratory, nocturnal
  key_features: Geometric ornament grammar, metallic-luxury contrast, stepped silhouette architecture, mirror-light amplification
  creative_brief: >-
    Preserve Art Deco identity through geometric ornament hierarchy and
    metallic-material drama, keeping the style transferable beyond party or
    speakeasy storytelling.
