visualDna:
  aesthetic: Monumentalidad criomórfica glacial, con elegancia invernal soberana y pureza cristalina.
  form_and_line: Arbotantes facetados, ritmos glaciales verticales, columnatas congeladas y jerarquías heladas de perfil limpio.
  color_palette: Glacier white, polar cyan, pale sapphire blue, aurora mint, deep teal shadow, and prismatic diamond highlights
  lighting_setup: Transmisión subsuperficial en hielo, wash auroral, acentos lunares de borde y rebote nítido sobre nieve compacta.
  material_texture: Planos de hielo pulido, grano cristalino escarchado, acumulación de cencellada y losas glaciales translúcidas.
  render_quality: Fantasía invernal de alta fidelidad con refracción precisa y claridad monumental de gran escala.
  spatial_distortion: Vertical crystalline rise and frozen layering without a mandatory palace or cathedral silhouette
  atmosphere: Soberana, austera y silenciosa, con temperatura emocional subcero.
  key_features: Bóvedas cristalinas, cadencia helada, nodos congelados y tramos de hielo esculpido.
  creative_brief: >-
    Transforma cualquier composición con monumentalidad criomórfica: facetas de hielo, transmisión subsuperficial fría,
    ritmos congelados y claridad regia. La identidad debe venir de optica glacial y jerarquia monumental, no de un
    palacio de hielo, catedral invernal o salon real literal. Conserva faceta, escala, refraccion fria y atmosfera
    soberana sin exigir edificio, paisaje, set, criatura ni escena fija.
