visualDna:
  aesthetic: Palacial criomórfico de monumentalidad glacial, con elegancia invernal soberana y pureza cristalina.
  form_and_line: Agujas de hielo, arbotantes facetados, columnatas de carámbano y gradación vertical congelada.
  color_palette: Glacier white, polar cyan, pale sapphire blue, aurora mint, deep teal shadow, and prismatic diamond highlights
  lighting_setup: Transmisión subsuperficial en hielo, wash auroral, acentos lunares de borde y rebote nítido sobre nieve compacta.
  material_texture: Planos de hielo pulido, grano cristalino escarchado, acumulación de cencellada y losas glaciales translúcidas.
  render_quality: Fantasía invernal de alta fidelidad con refracción precisa y claridad monumental de escala catedralicia.
  spatial_distortion: None
  atmosphere: Soberana, austera y silenciosa, con temperatura emocional subcero.
  key_features: Bóvedas cristalinas, cadencia de columnata helada, nodos congelados y tramos de hielo esculpido.
  creative_brief: >-
    Transforma cualquier composición con monumentalidad criomórfica: facetas de hielo, transmisión subsuperficial fría,
    columnatas congeladas y claridad regia. La identidad viene de óptica glacial y proporción palacial, no de un palacio
    literal. Apply this spatial/worldbuilding grammar over any input: preserve material logic, scale cues, architectural
    rhythm, atmosphere, and signature construction rules while avoiding a required building type, landscape, franchise
    set, creature, or fixed scene.
