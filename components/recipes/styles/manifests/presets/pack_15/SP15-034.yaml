visualDna:
  aesthetic: Reef-circuit seapunk where party lighting, civic utility, and living coral pulse as one wet nervous system.
  form_and_line: Buoyant cell clusters, branching reef towers, wavy circuit paths, pontoon seams, and current-drawn loops.
  color_palette: Turquoise voltage, hot magenta, seafoam green, wet concrete gray, and pearly coral white.
  lighting_setup: Bioluminescent reef pulses, humid sunset reflections, under-platform LEDs, and specular wet-edge flashes.
  material_texture: Iridescent polymers, coral composites, wet concrete, translucent tubing, algae film, and salt-crusted handrails.
  render_quality: Vibrant high-detail concept with nightlife color discipline and clear regenerative infrastructure.
  spatial_distortion: Curvilinear waterline composition where circuit nodes drift yet stay connected.
  atmosphere: Tidal rhythm, playful futurity, public experimentation, and ecological nightlife.
  key_features: Reef-reactor nodes, algae power beads, luminous waterlines, coral cable junctions, and buoyant rhythm cells.
  creative_brief: 'Rewire the input as a wet reef circuit: turquoise voltage, magenta pulses, coral cable junctions, algae power beads, buoyant rhythm cells, and salt-crusted wet edges. Marinas or platforms can appear as anchors; the style is tidal nightlife infrastructure with a living nervous system. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
