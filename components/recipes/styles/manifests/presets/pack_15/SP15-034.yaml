visualDna:
  aesthetic: Reef-circuit seapunk where party lighting, civic utilities, and living coral all pulse through one wet nervous system.
  form_and_line: Buoyant platform cells, branching reef towers, wavy circuit paths, pontoon seams, and soft current-drawn loops.
  color_palette: Turquoise voltage, hot magenta, seafoam green, wet concrete gray, and pearly coral white.
  lighting_setup: Bioluminescent reef pulses, humid sunset reflections, under-platform LEDs, and specular wet-edge flashes.
  material_texture: Iridescent polymers, coral composites, wet concrete, translucent tubing, algae film, and salt-crusted handrails.
  render_quality: Vibrant high-detail concept with nightlife color discipline and clear regenerative infrastructure.
  spatial_distortion: Curvilinear waterline composition; platforms float like circuit nodes drifting but still connected.
  atmosphere: Tidal rhythm, playful futurity, public experimentation, and ecological nightlife.
  key_features: Reef-reactor nodes, buoyant dance/social decks, algae power pods, luminous waterlines, and coral cable junctions.
  creative_brief: >-
    Preserve coral circuit-marina grammar as a reusable style system:
    wet-circuit civic modules, reef-luminescent infrastructure, and tidal
    nightlife ecology should remain coherent across subjects.
