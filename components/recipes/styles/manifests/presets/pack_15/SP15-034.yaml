visualDna:
  aesthetic: >-
    submerged transit seapunk as a flat graphic digital-illustration card built around a tideglass subway
    platform where commuters move behind thick water windows and reef-lit tracks.
  subject_treatment: >-
    Terrain-specific silhouettes, waterline arcs, ice facets, salt grids, stilt structures, and wind-tensioned
    forms. Core composition uses tide windows, commuters, reef-lit tracks, wet tiles, pressure doors.
  color_and_tone: sea glass green, subway chrome, deep blue, safety orange
  lighting_and_shadow: water-window caustics, platform strips, reef glow, train headlights
  texture_and_material: >-
    thick glass color blocks, wet tile planes, simple rail strip, seaweed shadow shapes, rubber boot
    silhouettes
  camera_and_composition: >-
    Coasts, piers, marinas, glacier towns, salt flats, and swamps with strong environmental identity. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: surreal, public, aquatic, contained
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: tide windows, commuters, reef-lit tracks, wet tiles, pressure doors
  creative_brief: >-
    Make aquatic transit believable through one tideglass commuter or transit keeper protagonist in public
    space, not concept art of an empty tunnel. Keep it representative through a cropped platform, thick
    tideglass water window, commuter silhouettes, reef-lit track strip, pressure doors, and broad tile planes.
    Favor flat graphic digital illustration, clean editorial illustration, cel-shaded poster art, gouache
    poster aesthetics, graphic-novel card art, or stylized animation-background art over realism, photoreal
    painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold
    color/value zones, simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean
    surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
