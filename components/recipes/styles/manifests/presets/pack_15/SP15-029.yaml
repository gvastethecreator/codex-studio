visualDna:
  aesthetic: Cooperative lunarpunk craft language focused on care, fabrication, and soft infrastructure.
  form_and_line: Dome clusters, radial commons rings, vertical greenhouse shafts, and hand-built modular seams.
  color_palette: Frost white, pale cyan, and soft coral accents.
  lighting_setup: Diffused dome glow and reflected rimlight from regolith plains.
  material_texture: Crystalline composites, woven habitat textiles, and matte ceramic panels.
  render_quality: Refined concept style with readable social micro-scenes.
  spatial_distortion: Curved communal-center perspective with gentle radial gravity.
  atmosphere: Mutual aid, creative craft, and patient technological optimism.
  key_features: Woven habitat texture, fab-grid patterning, coral care accents, and crystalline seam highlights.
  creative_brief: >-
    Make the input feel hand-built for mutual aid on the moon: frost-white dome logic, woven habitat texture, coral care
    accents, crystalline seams, and soft radial commons geometry. Domes or districts can appear, but the style is
    patient craft, shared survival, and lunar tenderness. Apply this corepunk genre grammar over any input: preserve the
    faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a
    required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.
