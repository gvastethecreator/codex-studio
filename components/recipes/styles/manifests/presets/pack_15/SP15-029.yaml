visualDna:
  aesthetic: bioarchitecture city bridge as a stylized digital-painting card built around a usable city bridge grown from living ribs, root cables, repair pods, and pedestrians crossing at dusk.
  form_and_line: Organic circuitry, fungal branching, lab-craft silhouettes, soft biotech forms, and handmade mutation logic. Core composition uses root cables, pedestrians, repair pods, rib arches, sap-lit seams.
  color_palette: root brown, bone ivory, leaf green, evening blue
  lighting_setup: dusk rim color, warm pod accent blocks, soft bioluminescent seam shapes
  material_texture: living bark planes, bone-like rib blocks, sap-glass color accents, stone shapes, woven railing arcs
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Clinics, transit spines, bridges, plazas, conservatories, and worktables that feel grown not installed. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: majestic, civic, alive, calm
  key_features: root cables, pedestrians, repair pods, rib arches, sap-lit seams
  creative_brief: 'Bioarchitecture as usable city fabric: bridge, people, maintenance pods, and living structure, avoiding empty fantasy palace imagery, rib-cage horror, wet organic gore, or realistic environment concept art. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat graphic digital illustration, clean editorial illustration, cel-shaded poster art, gouache poster aesthetics, graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
