visualDna:
  aesthetic: >-
    steampunk civic machinery as a flat illustrated cooperative poster with simplified citizens, brass
    commons, large gears, valve shapes, and civic engine silhouettes.
  subject_treatment: >-
    Broad mechanical silhouettes, chunky ink contours, labor-poster spacing, and tactile industrial rhythm.
    Core composition uses brass commons, valve glyphs, simplified civic silhouettes, gear shadows, civic
    machine scale, and open shape areas.
  color_and_tone: smoky brass, oiled umber, tarnished copper, warm cream
  lighting_and_shadow: posterized amber machine glow, soft steam color blocks, rimlit gear teeth as simple graphic accents
  texture_and_material: >-
    broad brass plates, flat soot washes, leather belt silhouettes, glass gauge color dots, sparse screenprint
    wear
  camera_and_composition: >-
    Readable workshops, rail platforms, docks, streets, or civic machine halls without becoming a corridor.
    Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: practical optimism, union craft, warm mechanical density
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: brass commons, valve glyphs, visible civic silhouettes, gear shadows, civic machine scale
  creative_brief: >-
    Make steampunk feel communal and useful as an illustrated civic poster: a public machine square where one
    distinctive citizen inhabits a living city-engine square, not a costume studio, realistic game scene, or
    generic Victorian room. Keep machinery readable in large clusters with open negative spaces; avoid filling
    every inch with rivets, cables, tattoos, realistic faces, or miniature props. Keep the result
    representative rather than over-abstract; make one character in their environment the anchor, with motifs
    as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor
    screenprint poster, risograph poster, cel-shaded graphic-novel card art, flat-to-painterly digital
    illustration, or gouache poster aesthetics over realism, cinematic key art, or hyper-detailed concept art.
    Use few bold color/value zones, moderate texture, large shapes, clean surfaces, and finish denoised with
    no excessive noise or ultra-fine detail.
avoidRules:
