visualDna:
  aesthetic: High-altitude agrarian solarpunk focused on food sovereignty, shared stewardship, and optimistic stepped abundance.
  form_and_line: Stepped cultivation-band rhythm, cooperative cluster geometry, and gently spiraled circulation paths as compositional logic.
  color_palette: Canopy leaf green, sun-cream limestone, and clear irrigation blue.
  lighting_setup: Early sun wash with soft atmospheric haze and controlled terrace highlights.
  material_texture: Laminated timber warmth, hydrated soil texture, translucent membrane glow, and woven shade-cloth tactility.
  render_quality: Production-grade solarpunk finish balancing atmospheric softness with operational readability.
  spatial_distortion: Ascending terrace-like perspective that reveals zoning, access rhythm, and cooperative nodes without requiring a farm scene.
  atmosphere: Productive calm, collective pride, and grounded optimism.
  key_features: Tiered agro-cell patterning, gravity-fed water logic, seedling-scale repetition, and shared-harvest rhythm.
  creative_brief: 'Treat any input as a living food-sovereignty diagram: tier it into harvest-bands, cistern veins, seedling repetition, and cooperative access paths. Crops, terraces, workers, or harvest rituals may appear when useful, but the core style is stepped abundance and gravity-fed stewardship.'
