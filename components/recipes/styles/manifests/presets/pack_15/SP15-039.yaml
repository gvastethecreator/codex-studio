visualDna:
  aesthetic: Atomic pedagogy style where cheerful diagrams explain a future nobody fully understands yet.
  form_and_line: Sawtooth rhythms, corridor-like bands, atom-emblem fields, lab-grid repetition, and oversized instructional arrows.
  color_palette: Sky cyan, lemon cream, steel gray, chalk white, and tiny reactor-glow green.
  lighting_setup: Clean classroom daylight, contained exhibit glow, glass-case reflections, and bright diagram-wall bounce.
  material_texture: Linoleum, ceramic tile, anodized rails, chalk dust, laminated posters, and polished classroom instruments.
  render_quality: Bright illustrative concept with dense educational cues but clear child-scale readability.
  spatial_distortion: Axis perspective links bands, diagrams, grids, and demonstration cues like a textbook spread.
  atmosphere: Curious optimism, disciplined learning, soft propaganda, and future-facing ambition.
  key_features: Demo-reactor silhouettes, atom mural geometry, isotope growth cues, diagram panels, and lab safety color bands.
  creative_brief: >-
    Teach the input in atomic classroom language: sawtooth diagram bands, lemon-cream science graphics, chalk dust, atom
    emblems, and demo-reactor silhouettes should make the future feel freshly explained. Schools or campuses can appear,
    but the style is bright pedagogy and soft propaganda. Apply this corepunk genre grammar over any input: preserve the
    faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a
    required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.
