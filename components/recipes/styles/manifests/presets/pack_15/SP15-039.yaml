visualDna:
  aesthetic: Atomic pedagogy style where school surfaces behave like cheerful diagrams for a future nobody fully understands yet.
  form_and_line: Sawtooth roof rhythms, corridor bands, atom-emblem courtyards, lab-grid repetition, and oversized instructional arrows.
  color_palette: Sky cyan, lemon cream, steel gray, chalk white, and tiny reactor-glow green.
  lighting_setup: Clean classroom daylight, contained exhibit glow, glass-case reflections, and bright diagram-wall bounce.
  material_texture: Linoleum, ceramic tile, anodized rails, chalk dust, laminated posters, and polished classroom instruments.
  render_quality: Bright illustrative concept with dense educational cues but clear child-scale readability.
  spatial_distortion: Axis perspective links corridors, diagrams, lab tables, and demonstration zones like a textbook spread.
  atmosphere: Curious optimism, disciplined learning, soft propaganda, and future-facing ambition.
  key_features: Demo-reactor silhouettes, atom mural geometry, isotope greenhouse cues, diagram panels, and lab safety color bands.
  creative_brief: >-
    Preserve isotope school-campus grammar as a reusable style system:
    diagrammatic pedagogy, bright civic science graphics, and future-facing
    classroom optimism should remain coherent across subjects.
