visualDna:
  aesthetic: Buoyant civic atompunk where architecture looks held up by optimism, helium math, and beautifully visible tension.
  form_and_line: Cantilever slices, pylon spines, helium-pod bellies, tensioned membrane curves, and hairline suspension cables.
  color_palette: Powder blue, white metal, citrus yellow, cloud gray, and tiny red altitude markers.
  lighting_setup: High-altitude sunlight, anti-glare deck strips, cloud bounce under platforms, and sharp cable highlights.
  material_texture: Lightweight alloy skins, translucent membranes, anti-slip polymers, sealed rivet seams, and sun-warmed rubber joints.
  render_quality: Architectural visualization with airy scale, crisp suspension logic, and no generic floating-city blur.
  spatial_distortion: High-angle perspective opens negative space below every floating edge.
  atmosphere: Lightness, vertigo, civic wonder, and absolute trust in optimistic infrastructure.
  key_features: Helium lift forms, cloud-garden pods, reactor-fed linework, floating lips, and tension-gauge panels.
  creative_brief: 'Suspend the input with visible optimism: helium pod bellies, hairline cables, powder-blue membranes, altitude ticks, and open negative space should make weight feel negotiated. Skyline decks can appear as anchors, but the style is buoyant civic trust and engineered vertigo. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
