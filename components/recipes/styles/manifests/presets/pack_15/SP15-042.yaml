visualDna:
  aesthetic: >-
    skatepunk power crew as a flat graphic digital-illustration card built around skaters wiring a generator
    rig into a concrete park with ramps, blank sticker shapes, cables, and sunset dust.
  subject_treatment: >-
    Handmade graphics, patched clothes, improvised machines, crew energy, protest rhythm, and rough edges.
    Core composition uses generator rig, skaters, ramps, cable trails, sticker clusters.
  color_and_tone: concrete gray, sticker red, battery green, sunset orange
  lighting_and_shadow: low sunset, portable floodlights, battery LEDs, dust haze
  texture_and_material: >-
    concrete planes, grip-tape shapes, patched denim silhouettes, battery-pack blocks, blank spray-paint color
    fields
  camera_and_composition: >-
    Safehouses, skateparks, warehouses, booths, yards, clinics, and shared kitchens with visible use. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: kinetic, young, rough, inventive
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: generator rig, skaters, ramps, cable trails, sticker clusters
  creative_brief: >-
    Skatepunk as motion and DIY power: crew, ramps, cables, and attitude, not a sterile product render of a
    board. Keep it representative through concrete skatepark corner, skater crew silhouettes, chunky generator
    rig, ramp curve, broad cable trails, battery glow blocks, and blank sticker-color clusters. Favor flat
    graphic digital illustration, clean editorial illustration, cel-shaded poster art, gouache poster
    aesthetics, graphic-novel card art, or stylized animation-background art over realism, photoreal painterly
    realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value
    zones, simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean surfaces,
    shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
