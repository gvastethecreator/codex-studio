visualDna:
  aesthetic: stonepunk trade mechanics built around a standout flint engine trader-inventor, compact engine stall, carved wheels, smoke, and leather tool rolls.
  form_and_line: Stone tools, rope mechanics, carved engines, low-tech power rigs, salvage sails, and rough handmade engineering. Core composition uses flint engines, traders, leather tool rolls, smoke, carved wheels.
  color_palette: flint gray, smoke black, ochre, hide brown
  lighting_setup: firelight blocks, smoky daylight, polished flint highlights
  material_texture: flint planes, hide-brown material blocks, clay pot shapes, wood wheels, blank pins
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Sanctuaries, markets, camps, bridges, battery houses, and shore commons built from elemental materials. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: busy, primal, inventive, tactile
  key_features: flint engine trader-inventor, engine stall, leather tool rolls, smoke, carved wheels
  creative_brief: 'A market is correct here because it sells low-tech engines: one standout flint engine trader-inventor as the main character beside a compact engine stall, plus leather tool rolls, carved wheel blocks, smoke plume, ochre ground slab, blank cloth canopy, and hide-brown planes behind them, not generic bazaar aisles. Secondary traders may be tiny background silhouettes only. Keep the result representative rather than over-abstract; use non-photographic stylized illustration, editorial digital painting, ligne-claire adventure comic clarity, gouache-cel shapes, drawn contours, broad painted planes, and controlled color design over realism or generic concept art. Avoid workers-only composition. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.'
