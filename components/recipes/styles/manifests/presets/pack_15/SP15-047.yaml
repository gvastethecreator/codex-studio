visualDna:
  aesthetic: Atomic parade propaganda where governance moves as synchronized machinery and public joy is technologized.
  form_and_line: Processional axes, tier bands, atom obelisks, synchronized silhouettes, banner grids, and marching turbine arcs.
  color_palette: Cerulean, parade white, celebratory red, polished aluminum, and tiny brass insignia.
  lighting_setup: Hard day-parade sunlight, metallic float glints, banner-shadow rhythm, and white highlights on polished concrete.
  material_texture: Polished concrete, painted steel, glossy shells, fabric pennants, enamel insignia, and confetti caught in vents.
  render_quality: Epic wide concept with clear crowd segmentation, vehicle hierarchy, and ceremonial readability.
  spatial_distortion: Processional depth magnifies scale through repeated obelisks, flags, and engineered lanes.
  atmosphere: National pride, theatrical governance, curated futurity, and rehearsed mass enthusiasm.
  key_features: Atom obelisks, marching turbine marks, civic-tech float shapes, pennant shadows, and synchronized route markings.
  creative_brief: >-
    March the input through atomic civic spectacle: atom obelisks, parade-white glare, turbine float curves,
    synchronized route marks, and pennant shadows should technologize joy. Parade or avenue cues may appear, but the
    style is rehearsed mass enthusiasm with polished unease. Apply this corepunk genre grammar over any input: preserve
    the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while
    avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.
