visualDna:
  aesthetic: >-
    crustpunk fashion council built around a circle of patched jackets, bootleg symbols, battered tables, dogs
    optional, and tense crew decisions.
  subject_treatment: >-
    Handmade graphics, patched clothes, improvised machines, crew energy, protest rhythm, and rough edges.
    Core composition uses patch jackets, circular seating, boot silhouettes, hand signs, worn table maps.
  color_and_tone: faded black, bone white, rust red, dirty denim blue
  lighting_and_shadow: bare overhead light, candle edge glow, harsh side shadows
  texture_and_material: patched denim, leather, metal studs, paper maps, chipped tables
  camera_and_composition: >-
    Safehouses, skateparks, warehouses, booths, yards, clinics, and shared kitchens with visible use. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: rough, tribal, argumentative, loyal
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: patch jackets, circular seating, boot silhouettes, hand signs, worn table maps
  creative_brief: >-
    Make crustpunk character-forward: clothes, posture, crew politics, and texture, avoiding empty jacket
    still life. Keep the result representative rather than over-abstract; make one character in their
    environment the anchor, with motifs as background, costume, weather, architecture, or social pressure
    instead of a foreground prop. Favor clean graphic-novel card art, stylized 2D digital illustration,
    controlled digital painting, cel-shaded poster art, or gouache-poster color blocking over realism,
    photoreal painterly realism, cinematic key art, or hyper-detailed concept art. Use few bold color/value
    zones, moderate texture, large shapes, clean surfaces, and finish denoised with no excessive noise or
    ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
