visualDna:
  aesthetic: >-
    Quiet isotope astronomy where compact power keeps night sacred, instruments precise, and civic curiosity almost
    devotional.
  form_and_line: >-
    Rotating dome shells, cantilever plates, radial instrument bays, telescope-ring halos, and star-chart coordinate
    lines.
  color_palette: Deep navy, mint isotope glow, steel white, matte black, and faint amber notation marks.
  lighting_setup: >-
    Low-light discipline, telescope ring luminance, mint battery glows, and soft horizon spill kept below stargazing
    threshold.
  material_texture: Matte metal shells, anti-reflective glass, insulated deck panels, rubberized grips, and enamel star-chart plates.
  render_quality: Precision concept balancing poetic darkness, instrument legibility, and quiet scientific drama.
  spatial_distortion: Elevated dome-like composition aligns horizon, aperture, and instrument axis into a contemplative vector.
  atmosphere: Wonder, collective curiosity, night restraint, and compact-power reverence.
  key_features: Isotope telescope rings, astronomy pod modules, aperture lips, calibrated star charts, and low-glow warning tags.
  creative_brief: >-
    Darken the input into disciplined isotope astronomy: mint power glows, anti-reflective black shells, telescope-ring
    halos, star-chart plates, and low-light restraint should protect wonder. Observatory cues can appear, but the style
    is compact power kept quiet under night. Apply this corepunk genre grammar over any input: preserve the faction
    mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required
    city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.
