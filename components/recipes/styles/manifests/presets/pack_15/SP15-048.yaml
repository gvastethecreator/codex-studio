visualDna:
  aesthetic: >-
    commons street tech built around a street kitchen using hacked food printers, crates, volunteers, queue
    lines, and steam in a hard city block.
  subject_treatment: >-
    Handmade graphics, patched clothes, improvised machines, crew energy, protest rhythm, and rough edges.
    Core composition uses food printers, volunteer line, crates, steam, street kitchen tables.
  color_and_tone: tomato red, stainless steel, cardboard tan, street black
  lighting_and_shadow: steam glow, portable lamps, cloudy daylight, warm queue light
  texture_and_material: cardboard, steel trays, food steam, aprons, cracked pavement
  camera_and_composition: >-
    Safehouses, skateparks, warehouses, booths, yards, clinics, and shared kitchens with visible use. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: generous, busy, stubborn, practical
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: food printers, volunteer line, crates, steam, street kitchen tables
  creative_brief: >-
    Commons punk should feed people: queues, hacked machines, volunteers, and city grit, not abstract utopian
    icons. Keep the result representative rather than over-abstract; make one character in their environment
    the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a
    foreground prop. Favor clean graphic-novel card art, stylized 2D digital illustration, controlled digital
    painting, cel-shaded poster art, or gouache-poster color blocking over realism, photoreal painterly
    realism, cinematic key art, or hyper-detailed concept art. Use few bold color/value zones, moderate
    texture, large shapes, clean surfaces, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
