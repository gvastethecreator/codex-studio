visualDna:
  aesthetic: >-
    tarot-tech industrial occult built around a foundry casting circuit-like tarot plates with workers, molten
    lines, and symbolic machine presses.
  subject_treatment: >-
    Ritual diagrams, gothic silhouettes, folk hardware, talismanic machines, and mythic street-level staging.
    Core composition uses tarot plates, machine presses, workers, molten traces, card geometry without
    readable text.
  color_and_tone: burned gold, black iron, card cream, red ember
  lighting_and_shadow: molten gold lines, press shadows, ember glow, overhead smoke
  texture_and_material: iron presses, card stock, molten metal, soot, engraved copper
  camera_and_composition: >-
    Switchyards, foundries, chapels, cairns, repair shops, salons, processions, and rural transformers. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: fateful, industrial, symbolic, heavy
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: tarot plates, machine presses, workers, molten traces, card geometry without readable text
  creative_brief: >-
    Make tarot visual language physical and industrial: casting, a compact press as hero, blank card geometry,
    molten circuit traces, and small plain worker silhouettes with no clothing marks, with no readable card
    text. Keep the result representative rather than over-abstract; use flat graphic illustration,
    gouache-poster shapes, cel-poster blocking, and controlled digital painting over realism or generic
    concept art. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail,
    and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
