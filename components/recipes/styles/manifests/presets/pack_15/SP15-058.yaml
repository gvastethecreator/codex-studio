visualDna:
  aesthetic: Bureaucratic decopunk monument where memory becomes vertical machinery, gold indexing, and controlled access.
  form_and_line: Vertical fin stacks, archive-grid shelves, reading-hall rings, pneumatic tube diagonals, and filing-spine shafts.
  color_palette: Brass gold, charcoal, parchment beige, dust brown, and red index-tab accents.
  lighting_setup: Vertical slit lights, desk luminance, brass-mesh glints, and warm shafts inside catalog towers.
  material_texture: Brass mesh, stone shelving, leather files, parchment labels, clockwork lift rails, and dusty glass catalog drawers.
  render_quality: Detailed institutional concept with hierarchy, retrieval logic, and monumental record density.
  spatial_distortion: Upward vertical perspective turns shelves, lifts, and tubes into a bureaucratic cliff face.
  atmosphere: Bureaucratic majesty, controlled permanence, archival pressure, and reverence for stored power.
  key_features: Pneumatic file tubes, index rotunda rings, clockwork elevator motifs, goldline catalog tabs, and locked desk geometry.
  creative_brief: 'File the input into vertical bureaucratic power: gold index tabs, pneumatic tubes, parchment labels, brass mesh, and clockwork lift rails should make memory feel mechanical and controlled. Archives or towers can appear, but the style is indexed permanence and access pressure. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
