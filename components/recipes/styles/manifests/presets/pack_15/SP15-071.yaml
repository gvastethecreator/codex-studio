visualDna:
  aesthetic: lunarpunk relay agriculture built around a standout lunar orchard signal-keeper, dome orchard, relay dishes, black sky, and pale fruit trees.
  form_and_line: Atomic signage, rocket-age curves, raygun geometry, orbital equipment, chrome kitsch, and cosmic civic forms. Core composition uses dome orchard, suited gardeners, relay dishes, black sky, pale trees.
  color_palette: moon white, silver, leaf green, vacuum black
  lighting_setup: earthlight, flat dome glow, soft grow-lamp color blocks, dish rimlight
  material_texture: lunar regolith, graphic glass dome, suit fabric, hydroponic tray slabs, silver dish shapes
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Promenades, diners, outposts, salvage yards, rails, lunar farms, craters, and isotope-lit plazas. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: quiet, fragile, lunar, cultivated
  key_features: signal-keeper, dome orchard, relay dishes, black sky, pale trees
  creative_brief: 'Lunarpunk here is lunar survival and signal work, not another garden city: one standout lunar orchard signal-keeper as the main character with simplified suit and broad glowing relay tool, plus dome orchard, relay dishes, hydroponic tray slabs, black sky, and earthlight glow behind them. Secondary gardeners may be tiny background shapes only. Keep the result representative rather than over-abstract; use non-photographic stylized illustration, editorial digital painting, ligne-claire sci-fi comic clarity, gouache-cel shapes, drawn contours, broad painted planes, and controlled color design over realism or generic concept art. Avoid workers-only composition. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.'
