visualDna:
  aesthetic: raypunk transit commons built around one distinctive plasma-rail courier or transit guardian, ray-age arches, glowing rails, and civic transit shapes.
  form_and_line: Atomic signage, rocket-age curves, raygun geometry, orbital equipment, chrome kitsch, and cosmic civic forms. Core composition uses plasma-rail courier/guardian protagonist, plasma rails, ray arches, station platforms, motion lines.
  color_palette: plasma blue, orange, cream, brushed steel
  lighting_setup: plasma rail glow, arch rimlight, broad platform light, orange motion lines
  material_texture: brushed steel, enamel tiles, plasma glass, suit fabric, rubber flooring
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Promenades, diners, outposts, salvage yards, rails, lunar farms, craters, and isotope-lit plazas. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: fast, public, sleek-retro, optimistic
  key_features: plasma-rail courier/guardian protagonist, plasma rails, ray arches, station platforms, motion lines
  creative_brief: 'Raypunk transit as public utility through one character: a distinctive plasma-rail courier or transit guardian stepping through a plasma rail arc, ray arches, platform block shapes, plasma-blue glow bands, cream tile slabs, and orange motion lines, not empty spaceship interiors. The rail supports the protagonist; it must not become an object-only transit poster. Avoid commuter crowd as main subject, subway corridor, worker transit poster, cockpit UI, route maps, or dense crowd texture. Keep the result representative rather than over-abstract; use flat graphic illustration, gouache-poster shapes, cel-poster blocking, and controlled digital painting over realism or generic concept art. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.'
