visualDna:
  aesthetic: diesel-steam airship infrastructure flat-to-painterly poster card built around a smoggy airship mooring dock with simplified ground crews, broad gantries, rope arcs, and cargo-signal beacons.
  form_and_line: Mechanical silhouettes, clean drawn contours, labor-poster spacing, and tactile industrial rhythm. Core composition uses mooring lines, beacon color dots, gantry silhouettes, small ground crew scale, and hazy airship mass.
  color_palette: smog gray, brass ochre, black tar, cargo orange
  lighting_setup: flat smog sun block, beacon color dots, silhouette backlight, simple illustrated glints
  material_texture: canvas hull planes, tar rope shapes, broad gantry blocks, rain-dark dock planes, brass fittings
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Readable workshops, rail platforms, docks, streets, or civic machine halls without becoming a corridor. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: adventurous, heavy, atmospheric, practical
  key_features: mooring lines, beacon dots, gantry silhouettes, ground crew scale, hazy airship mass
  creative_brief: 'Show airship culture as logistics and weather: docks, crews, rigging, and mooring signals, not a fantasy castle corridor, floating palace, lamp hero, or airship-only postcard. Keep people simplified and secondary to the dock/airship silhouette. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
