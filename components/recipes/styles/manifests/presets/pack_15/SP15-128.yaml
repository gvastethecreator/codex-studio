visualDna:
  aesthetic: Botanical steampunk precision where brass optics, living specimens, and pressure-era classification systems make nature feel engineered but cherished.
  form_and_line: Lens-ring halos, pressed-leaf silhouettes, articulated brass armatures, and specimen-grid composition with elegant Victorian restraint.
  color_palette: Aged brass, fern green, tobacco umber, ivory paper, and tiny ruby calibration accents.
  lighting_setup: Warm lamplight through glass lenses, green-filtered caustics, and precise rim highlights on polished instrument edges.
  material_texture: Patinated brass, etched glass, vellum fibers, dried botanical veins, lacquered walnut, and condensation beads.
  render_quality: High-detail steampunk naturalist finish with readable mechanical microstructure and delicate organic tactility.
  spatial_distortion: Magnification-layer depth where circular lenses repeat across scale without requiring a laboratory, observatory, or specimen table.
  atmosphere: Curious, scholarly, warm, exacting, alive.
  key_features: Brass lens halos, herbarium vein patterning, pressure-gauge filigree, vellum labels as abstract marks, and living-machine tenderness.
  creative_brief: >-
    Preserve steam herbarium optics as a reusable style system: botanical
    classification, brass magnification, and delicate pressure-era instrument
    logic should transform any subject without requiring plants, lab props, or
    a literal observatory.
