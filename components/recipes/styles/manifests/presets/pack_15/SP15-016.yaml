visualDna:
  aesthetic: >-
    underground med-cyberpunk as a flat-to-painterly clinic-threshold poster card built around humane
    caregivers, mod patients, simple tool trays, non-readable monitor glow, and rainlit entry color.
  subject_treatment: >-
    Sharp but simplified network geometry, non-readable clinic rhythm, a few thick cable paths, matte
    threshold planes, and hacker-era silhouettes. Core composition uses clinic door glow, flat tool trays,
    modded patients, compact monitors, rain threshold.
  color_and_tone: surgical teal, black vinyl, blood red accent, white neon
  lighting_and_shadow: >-
    clinical neon color blocks, non-readable monitor glow, rainlit doorway shape, cold overhead strips as flat
    planes
  texture_and_material: broad vinyl curtain plane, flat tool trays, wet coat shapes, polymer color accents, medical glass blocks
  camera_and_composition: >-
    Dense urban slices, service doors, clinics, relays, roofs, and alleys with clear subject hierarchy. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: intimate, risky, precise, humane
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: clinic door glow, chrome trays, modded patients, compact monitors, rain threshold
  creative_brief: >-
    Make underground medicine specific and human: a clinic threshold, caregivers, and tools, avoiding shock
    gore, fetish staging, or generic hallway horror. Keep the result representative rather than over-abstract;
    make one character in their environment the anchor, with motifs as background, costume, weather,
    architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial
    illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background
    art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or
    hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean
    surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
