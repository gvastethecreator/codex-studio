  aesthetic: Civic cyberpunk with encrypted neighborhood infrastructure, humane data autonomy, and wet-night cooperative resilience.
  form_and_line: Cable lattice overlays, modular kiosk-like blocks, and dense vertical signal rhythm.
  color_palette: Electric blue, magenta pulse, and asphalt charcoal.
  lighting_setup: Wet-night neon with selective AR-overlay glow.
  material_texture: Carbon composites, rain-slick concrete, translucent OLED screens, and braided fiber conduits.
  render_quality: High-contrast cyberpunk key art with precise wayfinding and edge clarity.
  spatial_distortion: Narrow canyon perspective pulling into a secure community-data node.
  atmosphere: Alert intelligence, cooperative resilience, and controlled nocturnal energy.
  key_features: Mesh-router motifs, encrypted micro-market geometry, cooperative sensor cues, and coded mural-wall patterning.
  creative_brief: 'Encrypt the input as humane night infrastructure: braided fiber conduits, wet carbon edges, magenta-blue mesh pulses, sensor glyph rhythm, and cooperative wayfinding light. Alleys, kiosks, drones, stalls, or signage can support the style, but the image should not depend on a street scene. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
