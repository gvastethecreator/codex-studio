visualDna:
  aesthetic: low-tech kinetic power led by one rope-bridge runner-engineer, where walking motion, bridge tension, wooden generators, pulleys, and lantern lines become readable graphic mechanics.
  form_and_line: Stone tools, rope mechanics, carved engines, low-tech power rigs, salvage sails, and rough handmade engineering. Core composition uses one main runner-engineer, rope bridge, wooden generators, pulley systems, lantern lines.
  color_palette: rope tan, forest green, lantern amber, dark wood
  lighting_setup: lantern strings, forest shafts, pulley highlights, mist glow
  material_texture: rope, wood, leather sandals, pulley stones, woven baskets
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Sanctuaries, markets, camps, bridges, battery houses, and shore commons built from elemental materials. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: clever, precarious, communal, kinetic
  key_features: main runner-engineer, rope bridge, wooden generators, pulley systems, lantern lines
  creative_brief: 'Low-tech power through motion without heroic adventure-card styling: use one distinctive runner-engineer protagonist mid-stride or moving across the bridge while the mechanism frames them, with bridge tension, pulleys, and generator wheel explaining the system around them. Vary crop and composition; avoid centered full-body adventurer poses, fantasy suspension corridor, scenic jungle bridge, empty rope texture, object-only cutaway, or workers-only staging. Favor folk-modernist poster structure, controlled digital painting, clean matte shapes, and handmade material poetry over American RPG/sourcebook illustration, cinematic key art, or hyper-detailed concept art. Use few bold color/value zones, moderate texture, large shapes, clean surfaces, and finish denoised with no excessive noise or ultra-fine detail.'
