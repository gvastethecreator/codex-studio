visualDna:
  aesthetic: Ceremonial agro-future focused on seed stewardship, biodiversity memory, and intergenerational exchange as visual ritual.
  form_and_line: Circular assembly choreography, suspended seed-banner motifs, and archive-centric focal geometry.
  color_palette: Pollinator yellow, germination green, and clay-coral warmth.
  lighting_setup: Golden-hour ceremonial light with soft lantern accents around archive-like focal points.
  material_texture: Linen pennants, seed capsules, polished timber nodes, and woven biofiber mats.
  render_quality: Dense-but-readable ceremonial solarpunk concept art with strong motif hierarchy.
  spatial_distortion: Ringed perspective orbiting a transparent archive-like core without requiring a festival scene.
  atmosphere: Collective gratitude, practical hope, and celebratory responsibility.
  key_features: Seed-swap patterning, stewardship glyph walls, crop-lineage display logic, and communal planting-table rhythm.
  creative_brief: 'Make the input feel like biodiversity memory made visible: seed-capsule nodes, lineage rings, pollinator yellow accents, linen glyph surfaces, and ceremonial archive light. Crowds, banners, tables, or vault structures can appear as anchors, but the style is stewardship ritual, not event staging.'
