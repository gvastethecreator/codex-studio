visualDna:
  aesthetic: steampunk print foundry poster built around pneumatic tubes, ink rollers, hot-type blocks, paper motion, and simplified editor/printer silhouettes.
  form_and_line: Mechanical silhouettes, chunky ink contours, labor-poster spacing, and tactile industrial rhythm. Core composition uses pneumatic tubes, hot-type trays, print rollers, unreadable paper blocks, and inked hand shapes.
  color_palette: ink black, cream paper, brass, cherry red
  lighting_setup: furnace orange planes, paper-white bounce light, black ink shadow blocks
  material_texture: letterpress metal planes, ink slabs, brass tubing, paper stacks as broad shapes, hot iron accents
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Readable workshops, rail platforms, docks, streets, or civic machine halls without becoming a corridor. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: urgent, noisy, persuasive, handmade
  key_features: pneumatic tubes, hot-type trays, print rollers, unreadable paper blocks, inked hand shapes
  creative_brief: 'Make media production physical: tubes, presses, one simplified figure posture, paper motion, ink rhythm, and typography only as unreadable texture blocks, with no readable text, logo reliance, work-lamp hero, or cluttered desk scene. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor screenprint poster, risograph poster, cel-shaded graphic-novel card art, flat-to-painterly digital illustration, or gouache poster aesthetics over realism, cinematic key art, or hyper-detailed concept art. Use few bold color/value zones, moderate texture, large shapes, clean surfaces, and finish denoised with no excessive noise or ultra-fine detail.'
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
