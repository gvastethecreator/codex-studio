visualDna:
  aesthetic: Tidal neon seapunk language lit by tide instrumentation and reef tech.
  form_and_line: Sinuous dock-like lines, floating pylons, wave-signal rails, and neon tide bands.
  color_palette: Electric cyan, ultraviolet, and foam white.
  lighting_setup: Night tides with glowing signage and reflected water bloom.
  material_texture: Translucent polymer, salt-wet metal, and coral composite.
  render_quality: Energetic seapunk render with clean pathway readability and tide-instrument glow.
  spatial_distortion: Curving causeway-like depth through layered marine bands.
  atmosphere: Motion, nightlife, and tidal futurity.
  key_features: Tide beacons, floating rail-link motifs, reef-lit edges, and neon current marks.
  creative_brief: 'Electrify the input with tidal neon motion: cyan wave rails, ultraviolet tide bands, foam-white pylons, reef-lit edges, and salt-wet reflections make any subject feel sinuous, marine, and civic at night.'
