visualDna:
  aesthetic: >-
    street signal booth as a flat graphic digital-illustration card built around a tiny signal booth layered
    with blank sticker-color shapes, cables, pirate switches, and teens monitoring street feeds.
  subject_treatment: >-
    Handmade graphics, patched clothes, improvised machines, crew energy, protest rhythm, and rough edges.
    Core composition uses signal booth, sticker layers, switch panels, teens, cable knots.
  color_and_tone: sticker red, hazard yellow, cyan screen, black marker
  lighting_and_shadow: screen glow, street sodium, sticker gloss highlights
  texture_and_material: blank sticker-color layers, plywood planes, acrylic switch blocks, sparse cable arcs, marker-ink shapes
  camera_and_composition: >-
    Safehouses, skateparks, warehouses, booths, yards, clinics, and shared kitchens with visible use. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: scrappy, graphic, watchful, urban
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: signal booth, sticker layers, switch panels, teens, cable knots
  creative_brief: >-
    A street-media preset: dense stickers and signal gear are valid if they serve the booth, not repeated
    random props. Keep it representative through tiny urban signal booth, blank sticker-color layers as plain
    rectangles/circles only, teen operator silhouettes, switch-panel blocks with no marks, cyan screen glow as
    flat rectangle, sparse black cable arcs, and plywood booth geometry. Favor flat graphic digital
    illustration, clean editorial illustration, cel-shaded poster art, gouache poster aesthetics,
    graphic-novel card art, or stylized animation-background art over realism, photoreal painterly realism,
    cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones,
    simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean surfaces, shallow
    poster depth, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
