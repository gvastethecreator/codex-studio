visualDna:
  aesthetic: National-mobility atompunk where speed feels like a civic promise sharpened into an aerodynamic instrument.
  form_and_line: >-
    Sweeping platform bands, radial timetable suns, sleek nose cones, graphite seams, and queue lanes like circuit
    traces.
  color_palette: Teal enamel, cream tile, graphite rail, chrome flash, and red departure ticks.
  lighting_setup: Concourse skylight wash, platform strip illumination, polished edge highlights, and departure-board pulses.
  material_texture: Brushed steel, terrazzo, glazed enamel signage, rubber thresholds, glass timetable covers, and worn ticket brass.
  render_quality: Grand transit concept with exact movement logic, readable boarding choreography, and heroic civic scale.
  spatial_distortion: Parallel seams, ceiling ribs, queue lanes, and nose-cone shapes converge into one national-speed vector.
  atmosphere: Momentum, precision, hopeful mobility, and bureaucratic elegance.
  key_features: Isotope express silhouettes, radial map-like walls, panoramic bands, boarding tick marks, and enamel route seals.
  creative_brief: >-
    Aim the input into national-speed atompunk: teal enamel bands, nose-cone seams, radial timetable suns, chrome
    departure ticks, and queue-lane circuitry should sharpen motion into promise. Rail or concourse cues may appear, but
    the style is aerodynamic civic choreography. Apply this corepunk genre grammar over any input: preserve the faction
    mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required
    city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.
