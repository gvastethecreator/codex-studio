  aesthetic: seapunk cyber-marina as a flat graphic digital-illustration card built around coral-like circuit pylons, divers, neon buoys, and wet boardwalk tech.
  form_and_line: Terrain-specific silhouettes, waterline arcs, ice facets, salt grids, stilt structures, and wind-tensioned forms. Core composition uses coral pylons, divers, neon buoys, wet boardwalk, circuit reefs.
  color_palette: coral pink, aqua, deep blue-gray water, pearl white
  lighting_setup: underwater glow, buoy LEDs, wet deck reflections, sunset cyan
  material_texture: coral ceramic shapes, simple rope arcs, neoprene silhouettes, LED buoy dots, flat dark boardwalk planes
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Coasts, piers, marinas, glacier towns, salt flats, and swamps with strong environmental identity. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: playful, briny, luminous, technical
  key_features: coral pylons, divers, neon buoys, wet boardwalk, circuit reefs
  creative_brief: 'Seapunk with real marina function: one distinctive marina diver-technician protagonist, buoys, coral circuitry, and wet decks, not generic mermaid fantasy. Keep it representative through a compact working marina, coral-circuit pylons, diver/technician silhouettes, buoy dots, and circuit-reef arcs below the waterline. Favor flat graphic digital illustration, clean editorial illustration, cel-shaded poster art, gouache poster aesthetics, graphic-novel card art, or stylized animation-background art over realism, photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
