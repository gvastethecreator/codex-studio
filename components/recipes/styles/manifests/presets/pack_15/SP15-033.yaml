visualDna:
  aesthetic: Friction-age maker style where invention happens in public, loud, dangerous, and half-bartered before sparks cool.
  form_and_line: Sawtooth stall fronts, pulley-canopy slashes, stepped trade shelves, spark-wheel circles, and squat workbench blocks.
  color_palette: Clay red, smoke gray, amber firelight, hemp tan, and blackened bronze green.
  lighting_setup: Torch strings under sagging awnings, forge sparks on faces, and hot rimlight from open friction wheels.
  material_texture: Flint teeth, braided hemp, raw timber, blackened bronze, cracked clay counters, and powdery stone dust.
  render_quality: Character-rich concept art with tactile tools, readable commerce, and controlled clutter.
  spatial_distortion: Compressed bazaar depth turns repair benches, barter trays, and test rigs into a single noisy machine.
  atmosphere: Immediate invention, public risk, communal trade, and practical improvisation.
  key_features: Spark-wheel modules, portable anvils, pit-forge mouths, barter tokens, hemp pulley loops, and half-tested mechanisms.
  creative_brief: >-
    Preserve flint engine-market grammar as a reusable style system:
    public improvisational fabrication, flint-and-hemp tool tactility, and
    visible test-repair marks should remain coherent across subjects.
