visualDna:
  aesthetic: Stonepunk hydraulic timekeeping where carved obsidian, falling water, and shadow calibration make primitive engineering feel sacred and exact.
  form_and_line: Stepped clepsydra channels, obsidian blade silhouettes, notch-mark arcs, and circular basin geometry.
  color_palette: Obsidian black, mineral teal, wet slate blue, chalk incision white, and ember reflection orange.
  lighting_setup: Shafted skylight over glossy black stone, water-caustic flicker, and ember-side bounce on carved marks.
  material_texture: Polished obsidian, wet limestone, mineral deposits, rope fiber, clay sealant, and chiseled calibration grooves.
  render_quality: Heavy tactile stonepunk finish with clear hydraulic logic, ritual precision, and low-tech engineering credibility.
  spatial_distortion: Vertical water-step depth and circular timing recursion without requiring a temple, clock, pool, or operators.
  atmosphere: Ancient, exact, wet, solemn, intelligent.
  key_features: Obsidian channel geometry, carved calibration marks, falling-water rhythm, basin circles, and mineral-stain history.
  creative_brief: >-
    Preserve obsidian water clock as a reusable style system: hydraulic timing,
    polished black stone, and ritual calibration marks should transform any
    subject without forcing clocks, temples, waterworks, or figures.
