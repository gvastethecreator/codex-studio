visualDna:
  aesthetic: >-
    mangrovepunk amphibious commons as a flat-to-painterly poster card built around amphibious lifts and
    boardwalk workshops threaded through mangrove roots, boats, and maintenance crews.
  subject_treatment: >-
    Repair-culture shapes, civic infrastructure, practical climate machines, and human-scaled commons. Core
    composition uses mangrove roots, lift platforms, small boats, boardwalk crews, brackish reflections.
  color_and_tone: mangrove green, brackish brown, weathered teal, sun white
  lighting_and_shadow: dappled water color blocks, warm deck accent dots, leaf-filtered sun planes
  texture_and_material: >-
    wet-wood color planes, mangrove root silhouettes, rope arcs, boat paint blocks, algae-stained metal
    accents
  camera_and_composition: >-
    Rooftops, riversides, roofs, blocks, terraces, and outdoor workshops with lived-in pragmatism. Keep depth
    legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: adaptive, humid, cooperative, rooted
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: mangrove roots, lift platforms, small boats, boardwalk crews, brackish reflections
  creative_brief: >-
    Make climate adaptation place-specific: mangroves, lifts, boats, and workers, not generic green
    architecture, jungle fantasy, tourist boardwalk, or logo-like symbols on awnings/clothes/boats. Keep the
    result representative rather than over-abstract; make one character in their environment the anchor, with
    motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop.
    Favor flat-to-painterly editorial illustration, gouache poster aesthetics, clean graphic-novel card art,
    or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key
    art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, low-to-moderate
    texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise
    or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
