visualDna:
  aesthetic: Biopunk public-ecology grammar where genomic craft, ethical access, and adaptive growth co-evolve.
  form_and_line: Organically branching lab-like modules, tendon-like bridges, and modular grow-pod geometry.
  color_palette: Chlorophyll green, sterile white, and bio-lilac accents.
  lighting_setup: Diffused lab-like daylight with pulsing specimen-chamber glow.
  material_texture: Wet biogel membranes, matte ceramic bioreactors, and mycelial composite walls.
  render_quality: Advanced concept art with clean scientific readability and emotional warmth.
  spatial_distortion: Interlaced civic-biotech perspective linking care nodes to elevated biofarm cues.
  atmosphere: Experimental care, ethical tension, and hopeful adaptation.
  key_features: Community gene-care motifs, edible tissue greenhouse cues, open-source wetlab geometry.
  creative_brief: 'Grow the input as ethical public biotech: wet biogel membranes, mycelial walls, lilac specimen glow, open-source care nodes, and adaptive green anatomy. Neighborhoods, clinics, labs, or greenhouses can be hints; the transferable style is accessible genomic craft with warmth.'
