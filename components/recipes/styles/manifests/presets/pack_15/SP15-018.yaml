visualDna:
  aesthetic: dense urban solarpunk as a flat-to-painterly civic infrastructure poster card built around sunstacks, public elevators, repair crews, service platforms, and visible reuse systems.
  form_and_line: Repair-culture shapes, civic infrastructure, practical climate machines, and human-scaled commons. Core composition uses sunstacks, public repair crews, terrace greenery, visible pipes, civic elevators.
  color_palette: sun yellow, sage, white ceramic, recycled aluminum
  lighting_setup: high sun-yellow slabs, soft graphic reflections, warm panel glow shapes
  material_texture: ceramic tile blocks, recycled aluminum accents, terrace greenery blocks, water-reuse pipe loops, service platform shapes
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Rooftops, riversides, roofs, blocks, terraces, and outdoor workshops with lived-in pragmatism. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: bright, organized, public, optimistic
  key_features: sunstacks, public repair crews, terrace greenery, visible pipes, civic elevators
  creative_brief: Use solarpunk twice as dense civic infrastructure, not endless greenhouse fantasy or leaf-logo green branding; show systems, workers, and practical vertical life. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.
