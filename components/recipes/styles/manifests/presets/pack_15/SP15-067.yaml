visualDna:
  aesthetic: >-
    retro space roadside built around one distinctive ray-age diner rider or counter-courier, roadside diner
    strip, blank orbit signs, rocket cars, and chrome counters at blue hour.
  subject_treatment: >-
    Atomic signage, rocket-age curves, raygun geometry, orbital equipment, chrome kitsch, and cosmic civic
    forms. Core composition uses diner rider/courier protagonist, blank orbit signs, rocket-car silhouettes,
    chrome counters, night asphalt.
  color_and_tone: chrome silver, cherry red, star blue, cream
  lighting_and_shadow: blue-hour neon, diner window glow, chrome reflections
  texture_and_material: chrome color blocks, vinyl booth shapes, blank enamel sign forms, asphalt, glass blocks
  camera_and_composition: >-
    Promenades, diners, outposts, salvage yards, rails, lunar farms, craters, and isotope-lit plazas. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: fun, roadside, retro, social
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: >-
    diner rider/courier protagonist, blank orbit sign shapes, rocket-car silhouettes, chrome counter curves,
    night asphalt
  creative_brief: >-
    Ray-age roadside culture through one character: a distinctive diner rider or counter-courier beside a
    compact diner facade, rocket-car silhouette, chrome counter curve, blank orbit sign shapes, and blue-hour
    asphalt without readable logos or empty car render. The diner supports the protagonist; it must not become
    an object-only facade. Avoid diner crowd as main subject, worker service poster, restaurant photo, mall
    food court, market aisle, or glossy car ad. Keep the result representative rather than over-abstract; use
    flat graphic illustration, gouache-poster shapes, cel-poster blocking, and controlled digital painting
    over realism or generic concept art. Use few bold color/value zones, large matte shapes, clean surfaces,
    low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
