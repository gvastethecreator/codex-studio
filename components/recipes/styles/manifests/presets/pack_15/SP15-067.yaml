visualDna:
  aesthetic: Raypunk resurrection style where wreckage becomes raw myth and repair geometry becomes outlaw ritual.
  form_and_line: Debris totems, crane-arm silhouettes, retrofit pit rings, cable-bundle roots, and half-rebuilt hull profiles.
  color_palette: Rust orange, cobalt worklight, tar black, welding white, and chipped mission-patch color.
  lighting_setup: Arc-welding sparks, floodlight cones, backlit dust, and cobalt glows under raised wreck sections.
  material_texture: Scored metal, cable bundles, burnt paint, patched hull cloth, greasy tool foam, and cratered ceramic plating.
  render_quality: Gritty pulp concept with rich prop detail and clear salvage hierarchy.
  spatial_distortion: Dense layered depth built from stacked wreck silhouettes, retrofit pits, and crane diagonals.
  atmosphere: Ingenuity under pressure, outlaw pragmatism, second chances, and mechanical stubbornness.
  key_features: Salvage crane claws, parts-tray grids, retrofit pit circles, mission-patch scraps, and rebuilt nosecone shrines.
  creative_brief: >-
    Rebuild the input from heroic wreckage: crane diagonals, welding-white scars, mission-patch scraps, retrofit pit
    rings, and cobalt worklight should make repair feel mythic. Salvage yards or wreck sections can anchor the style,
    but the point is outlaw invention and second chances. Apply this corepunk genre grammar over any input: preserve the
    faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a
    required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.
