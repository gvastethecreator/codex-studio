visualDna:
  aesthetic: >-
    grounded solarpunk orchard commons as a flat-to-painterly poster card built around shared solar shade
    panels, gardeners, repair ladders, and food-growing civic paths.
  subject_treatment: >-
    Repair-culture shapes, civic infrastructure, practical climate machines, and human-scaled commons. Core
    composition uses solar canopy, gardeners, ladders, edible plants, communal paths.
  color_and_tone: leaf green, warm solar gold, clay red, soft sky blue
  lighting_and_shadow: flat sun-through-panel blocks, leaf color bounce, clear afternoon shadow shapes
  texture_and_material: >-
    solar panel planes, broad fruit-tree shapes, clay water jar blocks, seed crates without logos, recycled
    metal accents, linen workwear color fields
  camera_and_composition: >-
    Rooftops, riversides, roofs, blocks, terraces, and outdoor workshops with lived-in pragmatism. Keep depth
    legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: hopeful, practical, social, grounded
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: solar canopy, gardeners, ladders, edible plants, communal paths
  creative_brief: >-
    Use solarpunk once as grounded civic agriculture: people repair and grow food under solar shade, no glass
    utopia monoculture and no leaf-logo green branding. Keep the result representative rather than
    over-abstract; make one character in their environment the anchor, with motifs as background, costume,
    weather, architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial
    illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background
    art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or
    hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean
    surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
