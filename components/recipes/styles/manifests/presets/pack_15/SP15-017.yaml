visualDna:
  aesthetic: Post-war dieselpunk rebuilt as cooperative freight logic, repair culture, and practical reconstruction grit.
  form_and_line: Heavy chassis geometry, elevated fuel-line vectors, and robust workshop-like framing.
  color_palette: Oxide red, soot gray, and signal amber.
  lighting_setup: Smoky afternoon backlight with hard industrial highlights.
  material_texture: Riveted steel, grease-dark rubber, weathered concrete, and canvas utility tarps.
  render_quality: Rugged cinematic dieselpunk concept art with strong mass readability and mechanical detail.
  spatial_distortion: Convoy-lane depth perspective ending at a civic repair focal mass.
  atmosphere: Gritty solidarity, practical endurance, and collective reconstruction.
  key_features: Diesel-hauler motifs, communal machine-shop rhythm, fuel reclamation towers, and worker-solidarity cues.
  creative_brief: 'Weight the input with cooperative diesel endurance: oxide-red chassis geometry, grease-dark repair marks, amber signal lamps, tarped utility surfaces, and reclaimed fuel logic. Trucks, hangars, workers, or convoys may appear, but the style is solidarity through rugged maintained mass. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
