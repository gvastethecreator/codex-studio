visualDna:
  aesthetic: industrial sacred-machinery poster built around a tall workshop where riveted machines form monumental craft geometry without church literalism.
  form_and_line: Mechanical silhouettes, chunky ink contours, labor-poster spacing, and tactile industrial rhythm. Core composition uses vertical machine ribs, welding halos, broad rivet arcs, tool plinths, and small worker silhouettes.
  color_palette: iron black, rust umber, wax gold, concrete gray
  lighting_setup: flat overhead light blocks, welding halo, matte smoke shapes, shallow poster depth
  material_texture: iron rib planes, broad rivet arcs, concrete blocks, waxed leather accents, welding slag marks
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Readable workshops, rail platforms, docks, streets, or civic machine halls without becoming a corridor. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: solemn craft, machine reverence, monumental labor
  key_features: vertical machine ribs, welding halos, broad rivet arcs, tool plinths, worker silhouettes
  creative_brief: Make industry feel ceremonial through scale and craft, not through literal stained glass, clergy, chapel corridor, altar room, or empty abstract shapes. Keep machinery as large readable ribs and halos; avoid packing every inch with rivets. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
