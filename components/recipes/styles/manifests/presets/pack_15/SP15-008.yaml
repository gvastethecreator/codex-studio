visualDna:
  aesthetic: Pluvial-ritual solarpunk where civic acoustics and rain harvesting become a calm public visual rhythm.
  form_and_line: Tiered chorus-like groupings, channeling roof geometries, and rhythmic cable spans.
  color_palette: Storm blue, oxidized copper, and rain-saturated leaf green.
  lighting_setup: Silver overcast with specular puddle highlights and translucent canopy glow.
  material_texture: Ribbed catchment panels, tensioned waterproof textiles, wet moss edges, and ceramic gutter cues.
  render_quality: Poetic production concept art balancing lyrical mood with infrastructural clarity.
  spatial_distortion: Stepped catchment-chain perspective descending toward a central cistern-like focal basin.
  atmosphere: Collective tenderness, climatic intelligence, and calm ceremonial focus.
  key_features: Resonant cistern bowls, choir-tier rhythm, rainfall channels, and participatory water-meter motifs.
  creative_brief: 'Score the input like rain infrastructure playing music: ribbed catchment panels, resonant cistern bowls, silver overcast glints, and repeating channel rhythms. Rooftops, singers, blocks, or choirs can appear as anchors, but the style is acoustic water literacy and soft pluvial ceremony. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
