visualDna:
  aesthetic: Pulp raypunk expedition style with cosmic-cartography bravado.
  form_and_line: Rocket-vector silhouettes, parabola antennas, finned contours, and outbound arrows.
  color_palette: Atomic orange, sky cyan, and gunmetal gray.
  lighting_setup: Harsh directional sun with hot edge highlights and charged cyan accents.
  material_texture: Riveted alloy, painted enamel, polymer translucency, and rubberized plating.
  render_quality: Dynamic pulp-sci-fi concept art with clear action staging.
  spatial_distortion: Wide-angle vector framing emphasizing departure, scale, and momentum.
  atmosphere: Adventurous bravado, serial-era wonder, and imminent launch energy.
  key_features: Raycraft silhouettes, expedition-stripe bands, ion-tower linework, and blank mission plaques.
  creative_brief: >-
    Launch the input as pulp ray expedition graphics: atomic orange vectors, finned silhouettes, mission-stripe bands,
    cyan beacons, and riveted alloy glare. Ports, raycraft, or expedition plaques can reinforce the style, but the
    useful grammar is outbound bravado and cosmic cartography. Apply this corepunk genre grammar over any input:
    preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension
    while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed
    set-piece.
