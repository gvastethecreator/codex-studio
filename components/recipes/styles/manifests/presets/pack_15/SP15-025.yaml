visualDna:
  aesthetic: mycopunk transit architecture as a flat-to-painterly poster card built around a transit stop grown from mycelial ribs, non-readable route veins, commuters, and fungal maintenance crews.
  form_and_line: Organic circuitry, fungal branching, lab-craft silhouettes, soft biotech forms, and handmade mutation logic. Core composition uses mycelial ribs, commuter silhouettes, glowing route veins, cap awnings, maintenance baskets.
  color_palette: mushroom ivory, moss green, amber glow, clay brown
  lighting_setup: soft bioluminescent blocks, platform edge glow, humid shadow planes
  material_texture: mycelium rib shapes, damp clay blocks, waxed coat silhouettes, fungal cap awnings, smooth translucent color planes
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Clinics, transit spines, bridges, plazas, conservatories, and worktables that feel grown not installed. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: strange, organic, public, gentle
  key_features: mycelial ribs, commuter silhouettes, glowing route veins, cap awnings, maintenance baskets
  creative_brief: 'Mycopunk should be public infrastructure: a fungal transit spine with people using it, not decorative mushrooms in isolation, subway corridor, or horror infection. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
