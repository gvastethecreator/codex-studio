visualDna:
  aesthetic: >-
    broadcast punk public media built around a public atrium hijacked by pirate TV crews, stacked monitors,
    cables, tripods, and crowd attention.
  subject_treatment: >-
    CRT geometry, analog signal bands, vapor gradients, mall-era surfaces, tape artifacts, and digital
    slippage. Core composition uses monitor stacks, pirate crew, crowd, coax coils, camera gear as production
    context.
  color_and_tone: broadcast blue, red tally light, concrete gray, black cable
  lighting_and_shadow: monitor wall glow, red tally sparks, atrium daylight, cable shadows
  texture_and_material: CRT glass, concrete, coax cable, folding chairs, denim jackets
  camera_and_composition: >-
    Pools, arcades, stations, atriums, kiosks, malls, observatories, and broadcast corners with media texture.
    Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: public, disruptive, media-saturated, alert
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: monitor stacks, pirate crew, crowd, coax coils, camera gear as production context
  creative_brief: >-
    Make pirate TV production visible through monitor stacks, signal gear, antenna arcs, crew silhouettes, and
    crowd attention, not visible camera equipment. Keep the result representative rather than over-abstract;
    make one character in their environment the anchor, with motifs as background, costume, weather,
    architecture, or social pressure instead of a foreground prop. Favor clean graphic-novel card art,
    stylized 2D digital illustration, controlled digital painting, cel-shaded poster art, or gouache-poster
    color blocking over realism, photoreal painterly realism, cinematic key art, or hyper-detailed concept
    art. Use few bold color/value zones, moderate texture, large shapes, clean surfaces, and finish denoised
    with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
