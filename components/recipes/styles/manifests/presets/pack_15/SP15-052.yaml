visualDna:
  aesthetic: Velvet authority system where voice is not sound but architecture, signal, ritual, and soft propaganda.
  form_and_line: Acoustic fan ribs, signal-spine towers, stage-like arcs, waveform grille patterns, and speaker-box stacks.
  color_palette: Deep burgundy, tarnished brass, charcoal felt, microphone chrome, and warm vacuum-tube amber.
  lighting_setup: Stage spot cones, perimeter sconces, glowing signal meters, and chrome pinlights on microphone heads.
  material_texture: Velvet drape, lacquer wood, mic chrome, acoustic felt, perforated brass, and warm tube glass.
  render_quality: Interior concept with rich tonal staging, readable broadcast hardware, and theatrical command of attention.
  spatial_distortion: Composition compresses toward a broadcast axis while fan walls radiate signal outward.
  atmosphere: Glamorous control, official intimacy, signal authority, and performance discipline.
  key_features: Sculptural microphone motifs, waveform walls, broadcast dais geometry, orchestra-pit arcs, glowing meters, and brass grilles.
  creative_brief: 'Turn the input into broadcast authority made tactile: burgundy acoustic ribs, chrome microphone glints, vacuum-tube amber, waveform brass grilles, and signal-spine geometry should command attention. Halls or stages can appear, but the style is voice as architecture. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
