visualDna:
  aesthetic: Civic control as theater, where every gauge feels performative and every audience sightline implies surveillance.
  form_and_line: Concentric bands, radial console ribs, spotlight rings, auditorium curves, and circular instrumentation constellations.
  color_palette: Turquoise authority, ivory enamel, hazard yellow, bakelite brown, and red indicator pinpricks.
  lighting_setup: Console underglow, top-down spotlight rings, luminous voting boards, and instrument-face glow on polished rails.
  material_texture: Bakelite panels, brushed alloy rails, acoustic felt, polished floor insets, enamel labels, and finger-worn switches.
  render_quality: Retro-futurist interior concept with stage blocking, readable controls, and institutional precision.
  spatial_distortion: Circular depth pulls toward a luminous civic core while tiers become part of the machine.
  atmosphere: Institutional confidence, performative transparency, civic surveillance, and rehearsed consent.
  key_features: Voting-board geometry, reactor globe motifs, radial command marks, mission-gallery bands, and public-facing gauge clusters.
  creative_brief: >-
    Preserve radial control-theater grammar as a reusable style system:
    concentric instrumentation staging, audience-power surveillance overlap,
    and polished institutional performance should remain coherent across subjects.
