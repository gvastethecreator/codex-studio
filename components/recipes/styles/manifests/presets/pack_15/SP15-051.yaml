visualDna:
  aesthetic: cassette futurism climate desk built around a weather station built from cassette decks, analog dials, field coats, maps, and magnetic tape ribbons.
  form_and_line: CRT geometry, analog signal bands, vapor gradients, mall-era surfaces, tape artifacts, and digital slippage. Core composition uses cassette decks, tape ribbons, weather maps, field operators, dial clusters.
  color_palette: cassette gray, orange oxide, sky blue, beige plastic
  lighting_setup: overcast window light, dial lamps, tape shimmer, desk lamp pools
  material_texture: plastic decks, magnetic tape, paper maps, wool coats, metal antennas
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Pools, arcades, stations, atriums, kiosks, malls, observatories, and broadcast corners with media texture. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: analog, nerdy, field-science, tactile
  key_features: cassette decks, tape ribbons, weather maps, field operators, dial clusters
  creative_brief: 'Cassette futurism as useful instrument culture: tactile decks and weather work, no product-only still life. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor clean graphic-novel card art, stylized 2D digital illustration, controlled digital painting, cel-shaded poster art, or gouache-poster color blocking over realism, photoreal painterly realism, cinematic key art, or hyper-detailed concept art. Use few bold color/value zones, moderate texture, large shapes, clean surfaces, and finish denoised with no excessive noise or ultra-fine detail.'
