visualDna:
  aesthetic: >-
    swamppunk signal settlement as a flat graphic digital-illustration card built around a swamp stilt
    settlement with radio antennas, boat repair, moss, lanterns, and mud-splashed operators.
  subject_treatment: >-
    Terrain-specific silhouettes, waterline arcs, ice facets, salt grids, stilt structures, and wind-tensioned
    forms. Core composition uses stilt houses, radio antennas, boat repair, moss drape, lantern operators.
  color_and_tone: moss green, muddy brown, lantern orange, radio black
  lighting_and_shadow: humid lantern glow, green water reflections, dusk haze
  texture_and_material: >-
    wet wood planes, moss drape shapes, sparse radio wire arcs, boat-paint blocks, rubber boot silhouettes,
    flat mud planes
  camera_and_composition: >-
    Coasts, piers, marinas, glacier towns, salt flats, and swamps with strong environmental identity. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: humid, secretive, local, resilient
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: stilt houses, radio antennas, boat repair, moss drape, lantern operators
  creative_brief: >-
    Swamppunk as signal and survival: stiltworks, radios, boats, and people, not fantasy swamp corridor. Keep
    it representative through compact stilt repair platform, plain radio mast, boat-repair operators,
    half-repaired skiff, moss drape, sparse radio wires, and lantern dots as support only. Favor flat graphic
    digital illustration, clean editorial illustration, cel-shaded poster art, gouache poster aesthetics,
    graphic-novel card art, or stylized animation-background art over realism, photoreal painterly realism,
    cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones,
    simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean surfaces, shallow
    poster depth, and finish denoised with no excessive noise or ultra-fine detail.
