visualDna:
  aesthetic: Atomic carnival propaganda where family fun, policy messaging, and reactor demos share one glossy smile.
  form_and_line: Pavilion circles, expo arch loops, kinetic blank-sign towers, carousel radial flow, and atom-orbit silhouettes.
  color_palette: Candy mint, coral, polished aluminum, butter yellow, and small red slogan accents.
  lighting_setup: Warm fair bulbs, controlled reactor-demo glow, sunset chrome reflections, and blinking atom marquee patterns.
  material_texture: Painted metal frames, vinyl banner sheen, gloss enamel kiosks, molded plastic edges, and polished aluminum rails.
  render_quality: Playful yet sophisticated environment concept with clear spectacle hierarchy and intentional propaganda polish.
  spatial_distortion: Radial circulation spins subjects through demo-like zones, orbit motifs, and future-home display logic.
  atmosphere: Festive optimism, civic persuasion, spectacle, and charming unease.
  key_features: >-
    Reactor-demo domes, isotope ride motifs, future-home shapes, neon atom signs without text, and slogan-like ribbon
    arcs.
  creative_brief: >-
    Sell the input as an atomic carnival demo: candy-mint expo loops, reactor-dome glow, aluminum rails, future-home
    silhouettes, and slogan-like ribbon arcs without readable text. Fairgrounds can appear, but the style is cheerful
    fission persuasion with a charmingly uneasy smile. Apply this corepunk genre grammar over any input: preserve the
    faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a
    required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.
