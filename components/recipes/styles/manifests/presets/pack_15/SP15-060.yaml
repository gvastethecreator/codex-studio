visualDna:
  aesthetic: Celestial decopunk where astronomy becomes civic pageantry, brass mechanism, and disciplined night.
  form_and_line: Stepped dome bases, radial instrument galleries, finned crowns, telescope axes, and star-chart fan geometries.
  color_palette: Midnight navy, polished brass, ivory stone, frosted glass blue, and tiny constellation white.
  lighting_setup: Night-sky contrast, subtle perimeter glow, brass ring highlights, and controlled star-chart illumination.
  material_texture: Polished brass mechanisms, stone decks, frosted glass, enamel star charts, dark seams, and oiled gear teeth.
  render_quality: Elegant scientific concept with balanced detail density, clear instruments, and ceremonial skyline presence.
  spatial_distortion: Dome-up perspective aligns stepped ascent, instrument axes, and celestial geometry into civic ambition.
  atmosphere: Intellectual grandeur, cosmic ambition, disciplined darkness, and public wonder.
  key_features: Rotating dome slits, brass telescope arrays, star-chart bands, finned observation motifs, and constellation inlays.
  creative_brief: 'Elevate the input into disciplined celestial pageantry: brass telescope rings, finned dome crowns, ivory stone steps, enamel star charts, and tiny constellation inlays should align ambition with night. Observatories may appear, but the style is midnight precision and public wonder. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
