  color_palette: Midnight navy, polished brass, ivory stone, frosted glass blue, and tiny constellation white.
  lighting_setup: Night-sky contrast, subtle perimeter glow, brass ring highlights, and controlled star-chart illumination.
  material_texture: Polished brass mechanisms, stone decks, frosted glass, enamel star charts, dark seams, and oiled gear teeth.
  render_quality: Elegant scientific concept with balanced detail density, clear instruments, and ceremonial skyline presence.
  spatial_distortion: Dome-up perspective aligns stepped ascent, telescope axes, and celestial geometry into civic ambition.
  atmosphere: Intellectual grandeur, cosmic ambition, disciplined darkness, and public wonder.
