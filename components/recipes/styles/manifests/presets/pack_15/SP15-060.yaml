visualDna:
  aesthetic: bonepunk signal ritual built around a cairn of bone-white signal horns, limewash marks, field technicians, and wind-carved hill light.
  form_and_line: Ritual diagrams, gothic silhouettes, folk hardware, talismanic machines, and mythic street-level staging. Core composition uses signal horns, cairn stack, technicians, lime glyphs, hill wind.
  color_palette: bone white, lime green, storm gray, rawhide brown
  lighting_setup: cloud breaks, horn rimlight, cold field glow, tiny signal lamps
  material_texture: bone-like resin, limewash, rawhide straps, field canvas, stone
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Switchyards, foundries, chapels, cairns, repair shops, salons, processions, and rural transformers. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: ancient, stark, practical, eerie
  key_features: signal horns, cairn stack, technicians, lime glyphs, hill wind
  creative_brief: 'Bonepunk without gore: bone-like resin engineering, horn signal function, plain field workers, lime plates, and austere ritual texture. Keep the result representative rather than over-abstract; use flat graphic illustration, gouache-poster shapes, cel-poster blocking, and controlled digital painting over realism or generic concept art. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.'
