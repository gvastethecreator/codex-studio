visualDna:
  aesthetic: >-
    steampunk automata poster built around a single simplified porcelain-mask mechanism, pressure valves,
    broad brass struts, and elegant clockwork gesture.
  subject_treatment: >-
    Mechanical silhouettes, chunky ink contours, labor-poster spacing, and tactile industrial rhythm. Core
    composition uses broad struts, pressure gauges, articulated hand shapes, porcelain mask geometry, and
    sparse brass needlework.
  color_and_tone: porcelain white, oxidized brass, tea stain, pale blue glass
  lighting_and_shadow: soft display glow as posterized cream-blue blocks, small pressure sparks, translucent steam shapes
  texture_and_material: broad porcelain planes, sparse brass linework, rubber seals, etched glass accents, velvet shadow blocks
  camera_and_composition: >-
    Readable workshops, rail platforms, docks, streets, or civic machine halls without becoming a corridor.
    Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: elegant, uncanny, precision-made
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: lace struts, pressure gauges, articulated hands, porcelain faces, brass needlework
  creative_brief: >-
    A refined automata preset: mechanical grace, human-like craft, broad porcelain mask geometry, and
    pressure-clock detail without defaulting to dolls in a studio chair, realistic face portrait, or
    overpacked filigree. Keep lace/needlework sparse and graphic; prioritize porcelain planes and clockwork
    silhouette. Keep the result representative rather than over-abstract; make one character in their
    environment the anchor, with motifs as background, costume, weather, architecture, or social pressure
    instead of a foreground prop. Favor screenprint poster, risograph poster, cel-shaded graphic-novel card
    art, flat-to-painterly digital illustration, or gouache poster aesthetics over realism, cinematic key art,
    or hyper-detailed concept art. Use few bold color/value zones, moderate texture, large shapes, clean
    surfaces, and finish denoised with no excessive noise or ultra-fine detail.
