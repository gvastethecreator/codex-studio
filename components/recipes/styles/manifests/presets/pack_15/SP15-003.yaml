visualDna:
  aesthetic: Amphibious solarpunk exchange where tidal rhythm, porous biology, and civic logistics fuse into one material language.
  form_and_line: Branched pier-like vectors, floating modular bands, and articulated bio-structural ribs.
  color_palette: Tidal cyan, seafoam green, and sun-bleached limestone.
  lighting_setup: Late-afternoon maritime light with reflective water-bounce logic.
  material_texture: Algae-composite hulls, porous bioceramic, and wet rope fibers.
  render_quality: Crisp production-ready solarpunk concept art with clear exchange readability.
  spatial_distortion: Multi-level harbor-like depth guiding the eye through modular exchange layers without requiring a port.
  atmosphere: Cooperative momentum, ocean stewardship, and optimistic trade energy.
  key_features: Tidal turbine motifs, floating exchange decks, amphibious micro-transit patterning.
  creative_brief: 'Give the input amphibious civic metabolism: wet bioceramic ribs, tide-powered modular layers, floating exchange bands, and seafoam logistics marks. Docks, boats, cargo, or harbor cues can appear as style anchors, but the transferable language is porous exchange and tidal motion.'
