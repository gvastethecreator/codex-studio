visualDna:
  aesthetic: Decopunk cinema ritual where brass, velvet, and mass attention become a projection machine.
  form_and_line: Marquee facade stacks, fan-ray canopies, layered bands, vertical tower reveals, and blank poster-window grids.
  color_palette: Midnight blue, amber gold, ruby accents, black stone, and soft champagne bulb halos.
  lighting_setup: Theater marquee glow, wet-ground reflections, amber rim lights, ruby sign pulses, and poster vitrine highlights.
  material_texture: Brass rails, velvet banners, enamel signage, black stone, polished poster glass, and rain-slick curb edges.
  render_quality: Cinematic city concept with strong night mood, readable spectacle hierarchy, and tactile entertainment surfaces.
  spatial_distortion: Long axis perspective repeats facade rhythms, bulbs, and vertical beats like frames in a film strip.
  atmosphere: Stylish spectacle, civic glamour, social ritual, and the machinery of attention.
  key_features: Cinema-palace silhouettes, radio-form details, lit deco towers, fan-shaped canopies, and glowing blank vitrines.
  creative_brief: >-
    Project the input as decopunk attention machinery: brass rails, ruby pulses, velvet banners, blank glowing vitrines,
    fan canopies, and wet marquee reflections should turn viewing into ritual. Cinema or esplanade cues can appear, but
    the style is nocturnal spectacle and social focus. Apply this corepunk genre grammar over any input: preserve the
    faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a
    required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.
