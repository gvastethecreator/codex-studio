visualDna:
  aesthetic: Submarine-club decopunk where nautical pressure, elite secrecy, and amber light compress into sealed glamour.
  form_and_line: Porthole constellations, curved rail marks, fan ribs, pressure-hull arcs, and booth-like capsules.
  color_palette: Naval midnight, aged brass, ivory enamel, cigar brown, and faint sonar green.
  lighting_setup: Low sconces, focused table pools, brass porthole halos, and muted green instrument glows.
  material_texture: Polished teak, brass trim, leather seating, smoked glass, enamel navigation plaques, and condensation on portholes.
  render_quality: Intimate interior concept with rich material contrast and compressed social geography.
  spatial_distortion: Curved pressure-hull composition wraps the viewer with hidden pocket depth.
  atmosphere: Confidential luxury, engineered nostalgia, submerged paranoia, and old-money warmth.
  key_features: Brass ribbing, sonar mural rings, capsule pockets, nautical gauges, porthole mirrors, and hidden hatch seams.
  creative_brief: 'Seal the input inside nautical pressure glamour: brass porthole halos, teak warmth, leather pockets, sonar rings, condensation beads, and curved hull arcs should create submerged secrecy. Submarine clubs may appear, but the style is compressed luxury under engineered pressure. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
