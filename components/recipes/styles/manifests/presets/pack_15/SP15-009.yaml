visualDna:
  aesthetic: wet cyberpunk digital-painting card built around rain-slick street-corner fragments reflected in black glass with courier silhouettes and non-readable kernel-code glow.
  form_and_line: Sharp but simplified network geometry, non-readable signal-panel rhythm, a few thick cable paths, wet reflections, and hacker-era silhouettes. Core composition uses kernel glow, courier silhouettes, cable gutters, rain glass, and layered reflection blocks.
  color_palette: acid green, black glass, magenta rain, sodium gold
  lighting_setup: flat neon color blocks, non-readable code-panel glow, simple backlight, matte rain color shapes
  material_texture: matte charcoal glass planes, wet-as-color asphalt blocks, acrylic signal panels, thick fiber cable paths, raincoat silhouettes
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Dense urban slices, service doors, clinics, relays, roofs, and alleys with clear subject hierarchy. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: fast, paranoid, humid, data-soaked
  key_features: kernel glow, courier silhouettes, cable gutters, rain glass, layered reflection blocks
  creative_brief: 'Cyberpunk with readable street action: people, rain, data, and architecture working together, not an empty neon corridor, readable UI wall, hacker workstation, or phone/device portrait. Keep data as non-readable glow and panel rhythm. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
avoidRules:
