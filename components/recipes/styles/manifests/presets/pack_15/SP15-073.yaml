visualDna:
  aesthetic: >-
    stonepunk sacred mechanics built around a standout basalt gearwright, carved gears, rope pulleys, and
    torchlit mechanical shadows.
  subject_treatment: >-
    Stone tools, rope mechanics, carved engines, low-tech power rigs, salvage sails, and rough handmade
    engineering. Core composition uses carved gears, rope pulleys, stone engineers, basalt arches, torch
    shadows.
  color_and_tone: basalt black, ash gray, torch orange, bone chalk
  lighting_and_shadow: torch-orange glow blocks, stone shadow cuts, ember glow, cave-mouth daylight
  texture_and_material: basalt, rope, carved stone planes, ash, blank chalk strokes
  camera_and_composition: >-
    Sanctuaries, markets, camps, bridges, battery houses, and shore commons built from elemental materials.
    Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: ancient, heavy, engineered, solemn
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: basalt gearwright, carved gears, rope pulleys, basalt arches, torch shadows
  creative_brief: >-
    Stonepunk as sacred mechanics: one standout basalt gearwright as the main character with broad stone apron
    silhouette and empty hands silhouetted before a rope-pulley arc, plus simplified carved basalt gear
    machine, chunky basalt blocks, torch-orange glow shapes, and blank chalk strokes behind them, not fantasy
    dungeon corridor or heraldic workshop. Secondary engineers may be tiny background silhouettes only. Keep
    the result representative rather than over-abstract; use non-photographic stylized illustration, editorial
    digital painting, ligne-claire adventure comic clarity, gouache-cel shapes, drawn contours, broad painted
    planes, and controlled color design over realism or generic concept art. Avoid workers-only composition.
    Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish
    denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
