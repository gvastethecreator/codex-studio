visualDna:
  aesthetic: >-
    earth-tech energy storage led by one mud-brick battery keeper, with ceramic cells, copper jars,
    shade-cooled courtyards, and clay geometry becoming the style grammar.
  subject_treatment: >-
    Stone tools, rope mechanics, carved engines, low-tech power rigs, salvage sails, and rough handmade
    engineering. Core composition uses one main battery keeper, ceramic batteries, mud-brick walls, copper
    jars, shade courtyard.
  color_and_tone: clay red, copper green, shade blue, cream
  lighting_and_shadow: courtyard shade, copper cell glow, warm doorway light
  texture_and_material: mud brick, ceramic cells, copper jars, woven mats, clay dust
  camera_and_composition: >-
    Sanctuaries, markets, camps, bridges, battery houses, and shore commons built from elemental materials.
    Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: grounded, warm, ingenious, communal
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: main battery keeper, ceramic batteries, mud-brick walls, copper jars, shade courtyard
  creative_brief: >-
    Earth-tech as believable energy storage without desert fantasy hero styling: make the keeper, copper cell,
    ceramic batteries, mud-brick shade, and courtyard geometry feel like one warm craft-infrastructure poster.
    Vary crop and composition; avoid centered full-body adventurer poses, generic market scenes, pottery-shop
    still life, solarpunk glass utopia, or workers-only staging. Favor folk-modernist poster structure,
    controlled digital painting, clean matte shapes, and handmade material poetry over American RPG/sourcebook
    illustration, cinematic key art, or hyper-detailed concept art. Use few bold color/value zones, moderate
    texture, large shapes, clean surfaces, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
