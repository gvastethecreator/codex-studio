visualDna:
  aesthetic: Megalith logistics style where travel feels carved into geology, slow as a glacier, and impossible to privatize.
  form_and_line: Parallel stone grooves, pillar forests, sled-runner scars, hanging counterweight blocks, and distance markers cut like fossils.
  color_palette: Sandstone beige, slate blue, iron rust, sun-bleached rope tan, and oxidized route-paint green.
  lighting_setup: Harsh directional sun on exposed route edges, torch pockets under transfer arches, and long shadows from moving weights.
  material_texture: Weathered stone blocks, braided cable ropes, bone-polished runners, rust-stained pins, and grit trapped in guide grooves.
  render_quality: Expansive stonepunk infrastructure concept with every route, lift, and exchange point legible at civic scale.
  spatial_distortion: Horizon compression stretches routes into monumental lines, making distance feel engineered by public effort.
  atmosphere: Slow momentum, civic pragmatism, trade ritual, and old-world futurity.
  key_features: Counterweight lift towers, stone-sled profiles, carved route glyphs, trade-gate frames, and rope-shadow grids.
  creative_brief: >-
    Preserve megalith transit-spine grammar as a reusable style system:
    carved-route logistics, public counterweight mobility, and geological
    movement scale should remain coherent across subjects without requiring a
    road, trade gate, towers, sleds, or literal transit.
