visualDna:
  aesthetic: plant-cell urban biotech as a flat graphic digital-illustration card built around dense housing blocks powered by chloroplast panels, algae windows, and resident maintenance balconies.
  form_and_line: Organic circuitry, fungal branching, lab-craft silhouettes, soft biotech forms, and handmade mutation logic. Core composition uses chloroplast panels, balconies, residents, algae windows, maintenance pipes.
  color_palette: algae green, concrete cream, sunlit yellow, shadow teal
  lighting_setup: soft cellular glow, balcony daylight, filtered green reflections
  material_texture: algae-glass color blocks, concrete planes, plant-cell panels, plain laundry rectangles, simple pipe loops
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Clinics, transit spines, bridges, plazas, conservatories, and worktables that feel grown not installed. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: dense, useful, lived-in, bio-urban
  key_features: chloroplast panels, balconies, residents, algae windows, maintenance pipes
  creative_brief: 'This is biotech urbanism, not garden futurism: emphasize plant-cell hardware, dense housing, and maintenance life. Keep it representative through a vertical housing stack, resident-maintenance silhouettes, algae windows, and chunky chloroplast panel tiles, not luxury eco-architecture branding. Favor flat graphic digital illustration, clean editorial illustration, cel-shaded poster art, gouache poster aesthetics, graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
