visualDna:
  aesthetic: >-
    windpunk neighborhood roofs as a flat-to-painterly poster card built around tenement rooftops filled with
    windcatchers, kite turbines, cloth wind rhythm, and roof crews.
  subject_treatment: >-
    Repair-culture shapes, civic infrastructure, practical climate machines, and human-scaled commons. Core
    composition uses windcatcher towers, kite turbines, roof crews, laundry rhythm, brick silhouettes.
  color_and_tone: chalk white, wind blue, brick red, rope tan
  lighting_and_shadow: windy daylight blocks, moving cloud shadow shapes, roofline rim color
  texture_and_material: canvas vane planes, brick blocks, rope arcs, tin duct shapes, cotton cloth planes
  camera_and_composition: >-
    Rooftops, riversides, roofs, blocks, terraces, and outdoor workshops with lived-in pragmatism. Keep depth
    legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: airy, domestic, clever, communal
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: windcatcher towers, kite turbines, roof crews, laundry rhythm, brick silhouettes
  creative_brief: >-
    Make windpunk domestic and engineered: rooftop wind machines and residents maintaining them, not a fantasy
    sky city or clothesline clutter. Keep the result representative rather than over-abstract; make one
    character in their environment the anchor, with motifs as background, costume, weather, architecture, or
    social pressure instead of a foreground prop. Favor flat-to-painterly editorial illustration, gouache
    poster aesthetics, clean graphic-novel card art, or stylized animation-background art over realism,
    photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept
    art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean surfaces, shallow poster
    depth, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
