visualDna:
  aesthetic: primitive salvage wind-camp identity led by one resilient wind-tender camp elder, with handmade driftwood turbines, patched tents, ember light, and shared power as the thematic world.
  form_and_line: Stone tools, rope mechanics, carved engines, low-tech power rigs, salvage sails, and rough handmade engineering. Core composition uses one main wind-tender, driftwood turbines, patched tents, campfire, scrap blades.
  color_palette: driftwood brown, canvas tan, turbine blue, ember orange
  lighting_setup: campfire warmth, dusk sky, turbine rimlight, soft dust
  material_texture: driftwood, canvas, scrap blades, rope, ash, patched fabric
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Sanctuaries, markets, camps, bridges, battery houses, and shore commons built from elemental materials. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: humble, resilient, handmade, coastal
  key_features: main wind-tender, driftwood turbines, patched tents, campfire, scrap blades
  creative_brief: 'Close the pack with human salvage life without sage/adventure hero styling: make the elder, handmade turbine, campfire plane, patched tents, and wind machinery feel like one quiet infrastructure poster. Vary crop and composition; avoid centered full-body adventurer poses, family-camp postcard, generic refugee camp, eco-symbol abstraction, object-only turbine render, or workers-only staging. Favor folk-modernist poster structure, controlled digital painting, clean matte shapes, and handmade material poetry over American RPG/sourcebook illustration, cinematic key art, or hyper-detailed concept art. Use few bold color/value zones, moderate texture, large shapes, clean surfaces, and finish denoised with no excessive noise or ultra-fine detail.'
