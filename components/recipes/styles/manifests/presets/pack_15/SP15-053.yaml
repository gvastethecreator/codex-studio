  aesthetic: Diplomatic decopunk where hospitality is camouflage for negotiation, surveillance, and perfectly choreographed etiquette.
  form_and_line: Chevron facade codes, tiered balcony bands, canopy shields, elevator monoliths, and reception desks like treaty altars.
  color_palette: Onyx, champagne gold, deep green, mirror silver, and discreet passport red.
  lighting_setup: Warm marquee wash, corridor uplights, mirror glints at thresholds, and soft private-salon lamp pools.
  material_texture: Marble veneer, brass inlay, mirrored paneling, velvet ropes, lacquered concierge surfaces, and embossed seal paper.
  render_quality: Premium hospitality concept with exact decor hierarchy and hidden power cues.
  spatial_distortion: Lobby depth passes through arches, screens, desk layers, and elevator banks like protocol checkpoints.
  atmosphere: Polished intrigue, ceremonial hospitality, quiet surveillance, and gala-grade tension.
  key_features: Treaty-desk silhouettes, private salon thresholds, coded elevator banks, diplomatic seal motifs, and mirrored waiting alcoves.
