visualDna:
  aesthetic: Diplomatic decopunk where hospitality becomes camouflage for negotiation, surveillance, and choreographed etiquette.
  form_and_line: Chevron facade codes, tiered bands, canopy shields, elevator-like monoliths, and treaty-altar blocks.
  color_palette: Onyx, champagne gold, deep green, mirror silver, and discreet passport red.
  lighting_setup: Warm marquee wash, corridor uplights, mirror glints at thresholds, and soft private-salon lamp pools.
  material_texture: Marble veneer, brass inlay, mirrored paneling, velvet ropes, lacquered concierge surfaces, and embossed seal paper.
  render_quality: Premium hospitality concept with exact decor hierarchy and hidden power cues.
  spatial_distortion: Lobby-like depth passes through arches, screens, layers, and vertical banks like protocol checkpoints.
  atmosphere: Polished intrigue, ceremonial hospitality, quiet surveillance, and gala-grade tension.
  key_features: >-
    Treaty-desk silhouettes, private threshold frames, coded vertical banks, diplomatic seal motifs, and mirrored alcove
    forms.
  creative_brief: >-
    Make the input behave like polished protocol: chevron codes, mirrored thresholds, champagne brass, passport-red
    accents, and concierge-smooth surfaces should hide negotiation inside hospitality. Hotels can anchor the read, but
    the style is etiquette, surveillance, and ranked surfaces. Apply this corepunk genre grammar over any input:
    preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension
    while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed
    set-piece.
