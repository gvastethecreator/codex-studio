  aesthetic: Community biopunk night grammar where engineered organisms provide light, data, and care as a living civic pattern.
  form_and_line: Bio-reactor terrace rhythm, vascular conduit arcs, and pod-like community node geometry.
  color_palette: Fluorescent cyan, chlorophyll green, and deep midnight indigo.
  lighting_setup: Pulsed bioluminescent emissions with damp ground reflections and moon spill.
  material_texture: Gel membranes, porous bioceramics, wet stone, and mycelial conduits.
  render_quality: Atmospheric biopunk concept art with crisp biotech legibility and safe-path readability.
  spatial_distortion: Layered vertical depth linked by glowing metabolic corridors without requiring a district.
  atmosphere: Nurturing experimentation, civic trust, and living-system intelligence.
  key_features: Gene-lit path motifs, communal wetlab cues, symbiotic canopy nodes, and bio-signal geometry.
  creative_brief: >-
    Make the input glow like a trusted living circuit: cyan metabolic pulses,
    mycelial conduits, wet bioceramic pores, and safe-path light logic should
    organize the image. Streets, labs, kiosks, or neighborhood cues may appear,
    but the transferable style is civic biotech that illuminates by breathing.
