visualDna:
  aesthetic: netpunk rooftop relay as a flat-to-painterly poster card built around crews building pirate mesh relays from antennas, batteries, and improvised repeaters.
  form_and_line: Sharp but simplified network geometry, non-readable signal rhythm, a few thick cable paths, matte rooftop planes, and hacker-era silhouettes. Core composition uses antenna arrays, battery crates, rooftop crews, signal beams, taped hardware.
  color_palette: night blue, hazard orange, bare aluminum, monitor cyan
  lighting_setup: flat moonlit roof edges, hazard-orange signal arcs, tower beacon color dots, simple spark blocks
  material_texture: antenna rods, duct tape, battery packs, concrete, windbreaker nylon
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Dense urban slices, service doors, clinics, relays, roofs, and alleys with clear subject hierarchy. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: DIY, illegal, windy, focused
  key_features: antenna arrays, battery crates, rooftop crews, signal beams, taped hardware
  creative_brief: 'Netpunk as infrastructure rebellion: one rooftop network runner, visible skyline hardware, and improvised networks, no corporate chrome showroom. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
