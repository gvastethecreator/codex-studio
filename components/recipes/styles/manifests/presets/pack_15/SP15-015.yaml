visualDna:
  aesthetic: Dreamy vaporpunk blending nostalgic consumer architecture, humid leisure, and climate-adaptive public softness.
  form_and_line: Escalator-like ribbon diagonals, palm-grid rhythms, and mirrored geometric facade logic.
  color_palette: Lavender pink, aqua cyan, and warm peach sunset.
  lighting_setup: Soft neon dusk with glossy reflections on polished acrylic-like surfaces.
  material_texture: Frosted acrylic, terrazzo tiles, reflective chrome, and humid foliage.
  render_quality: Stylized high-fidelity vaporpunk treatment with crisp retro-futurist silhouette control.
  spatial_distortion: Mirrored depth guiding toward a luminous civic leisure node.
  atmosphere: Melancholic joy, ambient leisure, and curated digital nostalgia.
  key_features: Retro signage monoliths, mirrored pool logic, synthetic palm silhouettes, and open social spacing.
  creative_brief: >-
    Bathe the input in climate-adapted vaporpunk leisure: lavender acrylic reflections, aqua mirage depth, terrazzo
    softness, synthetic palm rhythm, and sunset chrome. Malls, fountains, signage blocks, palms, or plazas are optional
    anchors; the style is nostalgic public softness with humid glow. Apply this corepunk genre grammar over any input:
    preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension
    while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed
    set-piece.
