visualDna:
  aesthetic: >-
    street drone cyberpunk as a flat-to-painterly poster card built around overpass crews painting abstract
    color fields with small tool-drones and hacked traffic-light dots.
  subject_treatment: >-
    Sharp but simplified network geometry, non-readable street rhythm, a few thick cable paths, matte concrete
    planes, and hacker-era silhouettes. Core composition uses paint drones, abstract spray blocks, overpass
    concrete, crew gestures, hacked lights.
  color_and_tone: spray red, toxic green, concrete gray, black night
  lighting_and_shadow: drone LED color dots, flat projection color blocks, traffic-light cuts, underpass shadow planes
  texture_and_material: abstract spray paint blocks, concrete planes, simple drone shells, matte dust, jacket color shapes
  camera_and_composition: >-
    Dense urban slices, service doors, clinics, relays, roofs, and alleys with clear subject hierarchy. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: playful, illegal, kinetic, urban
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: paint drones, projection mist, overpass concrete, crew gestures, hacked lights
  creative_brief: >-
    A street-tech preset: drones are tools in motion, not decorative birds or camera props held by subjects.
    Graffiti must be abstract color, never readable tags. Keep the result representative rather than
    over-abstract; make one character in their environment the anchor, with motifs as background, costume,
    weather, architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial
    illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background
    art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or
    hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean
    surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
