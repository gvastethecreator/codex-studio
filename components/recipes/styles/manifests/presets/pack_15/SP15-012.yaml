  aesthetic: Coastal resilience solarpunk with amphibious civic elevation, root-network logic, and tidal reciprocity.
  form_and_line: Elevated walkway rhythm, buoyant modular bands, and branching mangrove geometry.
  color_palette: Mangrove green, tidal blue-gray, and sun-washed timber tones.
  lighting_setup: Humid coastal daylight with reflective tidal highlights under canopies.
  material_texture: Salt-tolerant wood, woven flood membranes, and wet root-like systems.
  render_quality: Production-grade environmental concept with clear adaptive-infrastructure storytelling.
  spatial_distortion: Layered waterfront-like depth from root-level patterning to elevated public deck cues.
  atmosphere: Resilient tranquility, civic ingenuity, and ecological reciprocity.
  key_features: Amphibious module motifs, mangrove filtration belts, tidal mobility corridors.
  creative_brief: 'Lift the input through amphibious root logic: branching support lines, buoyant bands, tidal blue-gray reflections, and salt-tolerant woven membranes. Cities, walkways, platforms, or mangroves can reinforce the anchor, but the style is adaptive elevation and reciprocal filtration. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
