visualDna:
  aesthetic: Abstract lunar maker style with visible repair logic, modular patchwork, warm copper accents, and cooperative hand-built texture.
  form_and_line: Modular bay grids, open-court spacing, hanging rail lines, tool-loop arcs, and patchwork panel rhythms.
  color_palette: Chalk white, mint green, warm copper, regolith beige, and small safety-orange tags.
  lighting_setup: Workshop strip light, pale skylight bleed, copper task glow, and small diagnostic highlights.
  material_texture: Printed ceramic grain, woven insulation, polished repair metal, patched membrane softness, and powdery edge wear.
  render_quality: Detailed artisanal future render with readable hand-built construction and no sterile corporate polish.
  spatial_distortion: Dense layered composition creates many small repair/readymade moments without requiring a specific workshop scene.
  atmosphere: Hands-on solidarity, practical creativity, repair pride, and lunar neighborhood warmth.
  key_features: Patchwork modules, copper task-light accents, tool-loop motifs, woven insulation textures, and mint-white maker graphics.
  creative_brief: >-
    Apply selenite artisan-block as an abstract style treatment: make any
    subject feel patched, repaired, shared, ceramic, copper-lit, and
    hand-built.
