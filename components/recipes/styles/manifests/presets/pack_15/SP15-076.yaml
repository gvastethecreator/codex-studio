visualDna:
  aesthetic: bonepunk low-tech signal identity led by one weathered signal-mast herald, using bone-like spars, hide sails, drum-coded rhythm, and storm-field communication as graphic motifs.
  form_and_line: Stone tools, rope mechanics, carved engines, low-tech power rigs, salvage sails, and rough handmade engineering. Core composition uses one main herald, signal mast, hide sails, drum codes, rope lashings.
  color_palette: bone white, rawhide tan, storm blue, charcoal
  lighting_setup: storm-edge light, mast rimlight, small fire signals, hide translucency
  material_texture: bone-like spars, rawhide, charcoal, stone weights, rope lashings
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Sanctuaries, markets, camps, bridges, battery houses, and shore commons built from elemental materials. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: stark, mobile, communicative, tribal
  key_features: main signal herald, signal mast, hide sails, drum codes, rope lashings
  creative_brief: 'Bonepunk without gore and without fantasy RPG hero styling: let the signal mast, hide sails, drum rhythm, and one integrated herald form a field-communication poster plate. Vary crop and composition; avoid centered full-body adventurer poses, skull shrine, tribal stereotype, battlefield banner, or workers-only staging. Favor folk-modernist poster structure, controlled digital painting, clean matte shapes, and handmade material poetry over American RPG/sourcebook illustration, cinematic key art, or hyper-detailed concept art. Use few bold color/value zones, moderate texture, large shapes, clean surfaces, and finish denoised with no excessive noise or ultra-fine detail.'
