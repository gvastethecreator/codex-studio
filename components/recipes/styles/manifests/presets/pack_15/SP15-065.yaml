visualDna:
  aesthetic: atompunk civic neon built around one distinctive isotope-plaza protagonist, atomic fountain glow, blank isotope orbits, chrome curves, and polished midcentury surfaces.
  form_and_line: Atomic signage, rocket-age curves, raygun geometry, orbital equipment, chrome kitsch, and cosmic civic forms. Core composition uses isotope-plaza protagonist, atomic fountain, blank isotope orbits, chrome curves, terrazzo patterns.
  color_palette: uranium green, coral red, cream, chrome
  lighting_setup: neon isotope glow, atomic fountain light, clean evening sky
  material_texture: chrome, terrazzo, neon tubes, enamel panels, polished stone
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Promenades, diners, outposts, salvage yards, rails, lunar farms, craters, and isotope-lit plazas. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: bright, optimistic, strange, civic
  key_features: isotope-plaza protagonist, isotope orbits, atomic fountain, chrome curves, terrazzo blocks
  creative_brief: 'Atompunk as public life through a character: one distinctive isotope-plaza protagonist near an atomic fountain, blank isotope-orbit geometry, chrome curves, terrazzo blocks, and midcentury optimism with uneasy glow. The fountain and plaza support the protagonist; they must not become an object-only civic poster. Avoid crowd-as-subject, families/workers stock illustration, worker propaganda, science diagram, luxury mall, or empty plaza postcard. Keep the result representative rather than over-abstract; use flat graphic illustration, gouache-poster shapes, cel-poster blocking, and controlled digital painting over realism or generic concept art. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.'
