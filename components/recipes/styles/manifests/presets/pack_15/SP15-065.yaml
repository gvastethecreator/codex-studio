visualDna:
  aesthetic: Paranoid exploration style where observation equipment looks half scientific instrument, half warning shrine.
  form_and_line: Clustered glass domes, needle scanning spires, ridge-like catwalk strokes, radar petal shapes, and horizon-measuring cables.
  color_palette: Nebula night blue, aged amber, signal white, oxidized red, and cold moon gray.
  lighting_setup: Telescope lens glow, cold moon edge light, blinking emergency beacons, and amber map-table pools.
  material_texture: Painted alloy shells, scratched glass domes, cable mesh, wind-battered enamel, and taped paper star charts.
  render_quality: Atmospheric exploration concept with tactical readability and poetic unease.
  spatial_distortion: Ridge-to-sky composition where horizon lines stretch like threat vectors through instruments.
  atmosphere: Curiosity, strategic vigilance, lonely weather, and discovery under siege.
  key_features: Radar dish petals, chart-window grids, emergency beacon stacks, ridge-line silhouettes, and nebula route scars.
  creative_brief: 'Make the input watch a beautiful threat: radar-petal silhouettes, scratched glass domes, emergency beacons, taped star charts, and horizon vectors should turn curiosity defensive. Ridge or observatory cues can appear, but the style is lonely vigilance under cosmic weather. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
