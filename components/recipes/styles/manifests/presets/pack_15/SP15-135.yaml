visualDna:
  aesthetic: Field-repair dieselpunk where modular patches, signal amber lamps, and grease-dark pragmatism make endurance visible.
  form_and_line: Patch-plate rectangles, wrench-arc diagonals, hose loops, rivet rows, and robust load-bearing silhouettes.
  color_palette: Signal amber, army olive, soot black, worn steel, canvas tan, and chipped cream markings.
  lighting_setup: Low sun through smoke haze, portable lamp pools, hard rim glints on metal edges, and warm repair sparks.
  material_texture: Grease-dark steel, canvas tape, weld beads, cracked rubber, sandblasted paint, and oily handprint smears.
  render_quality: Tactile dieselpunk finish with readable repair logic, rugged mass hierarchy, and controlled utilitarian clutter.
  spatial_distortion: Compressed maintenance-depth layers, diagonal tool-flow, and optional vehicle-scale cues without requiring a garage, battlefront, or literal repair crew.
  atmosphere: Practical, gritty, stubborn, warm, resourceful.
  key_features: Patch-plate logic, amber repair lamps, hose-loop rhythm, rivet rows, weld scars, and grease-marked material history.
  creative_brief: 'Patch the input with signal amber field repair: plate rectangles, hose-loop rhythm, rivet rows, weld scars, grease-dark steel, and warm maintenance lamps apply diesel utility to any subject. Vehicles, tools, field mechanics, or weapon-hardware silhouettes may reinforce style when useful, without fixing a workshop, garage, or war scene.'
