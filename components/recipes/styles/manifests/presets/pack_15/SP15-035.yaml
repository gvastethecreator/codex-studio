visualDna:
  aesthetic: playful seapunk arcade as a flat graphic digital-illustration card built around a coastal arcade boardwalk tangled with kelp cables, abstract neon fish lights, players, and salt-stained cabinets.
  form_and_line: Terrain-specific silhouettes, waterline arcs, ice facets, salt grids, stilt structures, and wind-tensioned forms. Core composition uses kelp cables, arcade cabinets, players, neon fish shapes, boardwalk planks.
  color_palette: kelp green, arcade pink, salt white, ocean blue
  lighting_setup: arcade neon, sunset bounce, cabinet glow, wet-board reflections
  material_texture: arcade plastic color blocks, broad kelp cable arcs, salt crust marks, painted wood planes, rain-jacket silhouettes
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Coasts, piers, marinas, glacier towns, salt flats, and swamps with strong environmental identity. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: fun, strange, salty, energetic
  key_features: kelp cables, arcade cabinets, players, neon fish shapes, boardwalk planks
  creative_brief: 'A seapunk entertainment preset: one boardwalk arcade runner/player protagonist, machines, and kelp tech, not object-only cabinet still life. Keep it representative through a short coastal boardwalk corner, player silhouettes, chunky arcade cabinet shapes, broad kelp-cable arcs, and abstract neon fish lights without text. Favor flat graphic digital illustration, clean editorial illustration, cel-shaded poster art, gouache poster aesthetics, graphic-novel card art, or stylized animation-background art over realism, photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
