visualDna:
  aesthetic: Educational solarpunk where climate literacy is embedded in visible systems, spiral movement, and canopy warmth.
  form_and_line: Spiral learning-ramp rhythm, open-air classroom-like voids, and layered canopy rings.
  color_palette: Fern green, chalk white, and warm sunlight amber.
  lighting_setup: Soft midday daylight filtered through translucent bioplastic sunshades.
  material_texture: Cross-laminated timber, recycled composite railings, cork flooring, and living vine screens.
  render_quality: Clean editorial solarpunk concept with strong scale and pedagogical clarity.
  spatial_distortion: Ascending spiral perspective linking ground-level inquiry cues to elevated garden-observatory motifs.
  atmosphere: Curious optimism, civic care, and intergenerational collaboration.
  key_features: Outdoor seminar-terrace rhythm, energy dashboard motifs, seed-library cues, and maker-learning nodes.
  creative_brief: 'Convert the input into climate literacy in motion: spiral inquiry paths, translucent canopy rings, dashboard-like energy cues, and warm timber/cork surfaces. Campus, classrooms, students, or observatories may appear, but the style should read as curiosity embedded in visible ecological systems.'
