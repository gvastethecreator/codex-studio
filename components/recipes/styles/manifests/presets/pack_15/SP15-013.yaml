visualDna:
  aesthetic: high-contrast hacker courier as a flat-to-painterly poster card built around a courier cutting through black-ice data lanes, matte coat shapes, frozen interface shards, and hostile security light.
  form_and_line: Sharp but simplified network geometry, non-readable lane rhythm, a few thick cable paths, matte dark planes, and hacker-era silhouettes. Core composition uses black ice shards, courier motion, red security beams, coat shape, data lane markings.
  color_palette: blue black, white cyan, red alert, chrome gray
  lighting_setup: hard cyan rim block, red alarm slabs, flat ice glow
  material_texture: matte coat shapes, glass-shard silhouettes, flat chrome-gray accents, frost-like color blocks, black asphalt plane
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Dense urban slices, service doors, clinics, relays, roofs, and alleys with clear subject hierarchy. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: dangerous, fast, cold, precise
  key_features: black ice shards, courier motion, red security beams, reflective coat, data lane markings
  creative_brief: 'Keep the black-ice metaphor visual and street-level: a moving courier in hostile data weather, not abstract cubes floating alone. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
