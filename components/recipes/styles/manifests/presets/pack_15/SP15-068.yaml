visualDna:
  aesthetic: raypunk frontier outpost built around one distinctive outpost keeper protagonist, rocket fins, simple antenna arcs, desert dust, and sparse desert-night stars.
  form_and_line: Atomic signage, rocket-age curves, raygun geometry, orbital equipment, chrome kitsch, and cosmic civic forms. Core composition uses outpost keeper protagonist, rocket fins, antenna arcs, desert dust, sparse star sky.
  color_palette: rocket white, desert red, teal shadow, star gray
  lighting_setup: sparse star dots, outpost glow, moonlit fins, teal shadow planes
  material_texture: painted rocket metal, desert stone, canvas suits, antenna wire, dust
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Promenades, diners, outposts, salvage yards, rails, lunar farms, craters, and isotope-lit plazas. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: lonely, hopeful, frontier, symbolic
  key_features: outpost keeper protagonist, rocket fins, antenna masts, desert dust planes, sparse star dots
  creative_brief: 'Raypunk frontier with human scale through one character: a distinctive outpost keeper protagonist posed with rocket fins and simple antenna masts, dust planes, desert color blocks, and sparse star dots, not generic spaceship concept art or religious chapel staging. The outpost supports the protagonist; it must not become object-only rocket architecture. Avoid settler crowd as main subject, worker frontier poster, cockpit scene, weapon hero, religious iconography, or starfield wallpaper. Keep the result representative rather than over-abstract; use flat graphic illustration, gouache-poster shapes, cel-poster blocking, and controlled digital painting over realism or generic concept art. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.'
