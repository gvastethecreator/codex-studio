visualDna:
  aesthetic: Luxurious departure myth where threshold design points toward impossible distance.
  form_and_line: >-
    Crescent lounge arcs, translucent tube bands, gate-pylon crowns, pearl ribs, and cruiser silhouettes staged like
    idols.
  color_palette: Nebula violet, ion cyan, pearl white, soft chrome, and tiny rose status lights.
  lighting_setup: Soft terminal glow, nebula backlight through glass, under-seat cyan halos, and pearl rimlight on gate crowns.
  material_texture: Gloss composites, polished rails, transparent membranes, padded travel leather, and frosted itinerary glass.
  render_quality: Premium transit concept scene with elegant pacing and strong threshold design.
  spatial_distortion: Gate-depth perspective leading through arcs, tubes, and glass toward mythic departure silhouettes.
  atmosphere: Anticipation, interstellar sophistication, quiet anxiety, and expensive wonder.
  key_features: Departure crescents, mission alcoves, launch constellations, tube membranes, and cruiser-idol views.
  creative_brief: >-
    Polish the input into a departure threshold: pearl ribs, translucent gate membranes, nebula violet backlight, rose
    status lights, and crescent lounge arcs should make comfort face cosmic risk. Boarding lounge cues can appear, but
    the style is elegant anticipation before impossible distance. Apply this corepunk genre grammar over any input:
    preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension
    while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed
    set-piece.
