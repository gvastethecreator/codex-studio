visualDna:
  aesthetic: Civic mobility solarpunk where ribbon continuity, gardened flow, and public trust become the visual backbone.
  form_and_line: Continuous ribbon trajectories, modular canopy-like arcs, and pedestrian-first circulation curves.
  color_palette: Mint chlorophyll, sunlit limestone white, and saffron transit highlights.
  lighting_setup: Clear noon exposure with reflective bounce under vegetated shade bands.
  material_texture: Satin bio-composite panels, laminated glass fins, and dense hanging foliage mats.
  render_quality: Production-ready solarpunk concept with strong wayfinding legibility.
  spatial_distortion: S-curve continuity linking foreground detail to distant gardened depth without requiring trains or stations.
  atmosphere: Efficient calm, civic trust, and everyday delight in shared infrastructure.
  key_features: Quiet glide rhythm, pollinator-span motifs, open spacing, shade-rich promenade flow.
  creative_brief: >-
    Turn the input into a quiet mobility ribbon: sweeping guide-lines,
    pollinator canopy arcs, satin bio-composite seams, and saffron wayfinding
    accents should make it feel shared, gliding, and civic. Rails, trains, or
    stations can reinforce the idea but should not become mandatory scenery.
