  lighting_setup: Clear noon exposure with reflective bounce under vegetated viaducts.
  material_texture: Satin bio-composite panels, laminated glass fins, and dense hanging foliage mats.
  render_quality: Production-ready environmental concept with strong wayfinding legibility.
  spatial_distortion: S-curve rail perspective that links foreground station life to distant garden districts.
  atmosphere: Efficient calm, civic trust, and everyday delight in shared infrastructure.
  key_features: Quiet glide trains, pollinator bridges, open ticketless platforms, shade-rich promenades.
  creative_brief: A post-car transit corridor where stations operate as neighborhood gardens and movement feels frictionless, inclusive, and joyful.
