visualDna:
  aesthetic: dieselpunk rail signal poster built around civilian rail logistics with locomotive silhouettes, semaphore gantries, small simplified switch crews, coal-fog shape blocks, and red signal geometry.
  form_and_line: Broad mechanical silhouettes, chunky ink contours, labor-poster spacing, and tactile industrial rhythm. Core composition uses headlamp circles, rail silhouettes, semaphore blocks, heavy engine masses, small worker marks, and open charcoal planes.
  color_palette: coal black, signal red, sodium amber, gunmetal gray
  lighting_setup: posterized red signal blocks, amber fog planes, locomotive headlight circles, open charcoal midtones
  material_texture: broad steel masses, flat coal-dust washes, canvas coat silhouettes, cracked enamel color blocks, sparse rail reflections
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Readable workshops, rail platforms, docks, streets, or civic machine halls without becoming a corridor. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: tense logistics, soot, late-night industrial pressure
  key_features: headlamp cones, rail silhouettes, semaphore lights, heavy engines, worker clusters
  creative_brief: 'Push dieselpunk through civilian transport signage and logistics: big engine silhouettes, semaphore signal logic, switch crews as small simplified working figures, soot planes, and rail geometry. No foreground station officer, no uniformed guard hero, no close portrait, no lantern-pinup, no military faction mood, no realistic noir protagonist. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor screenprint poster, risograph poster, cel-shaded graphic-novel card art, flat-to-painterly digital illustration, or gouache poster aesthetics over realism, cinematic key art, or hyper-detailed concept art. Use few bold color/value zones, moderate texture, large shapes, clean surfaces, and finish denoised with no excessive noise or ultra-fine detail.'
