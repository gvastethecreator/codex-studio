visualDna:
  aesthetic: Consumer atompunk play style where joy is packaged as turbine worship, candy buttons, and domestic propaganda.
  form_and_line: Streamlined facade arcs, rounded canopy lips, turbine-medallion loops, cabinet-like fins, and capsule shapes.
  color_palette: Pool aqua, cream enamel, cherry red, chrome sparkle, and bubblegum indicator lights.
  lighting_setup: Marquee spot cones, glowing cabinet screens, candy reflection pools, and rotating turbine shadows on checker tile.
  material_texture: Chrome trim, polished plastic, checker tile, molded laminate, bright enamel buttons, and sticky soda gloss.
  render_quality: Clean retro-future interior render with legible leisure machines and slightly uncanny consumer polish.
  spatial_distortion: Wide showroom-like perspective loops through repeating arcs until pleasure feels mechanical.
  atmosphere: Cheerful excess, family spectacle, polished futurity, and domesticated atomic anxiety.
  key_features: Turbine carousel hubs, atom-game silhouettes, capsule modules, prize-token spirals, and curved waiting rails.
  creative_brief: >-
    Package the input as cheerful atomic leisure machinery: turbine carousel hubs, candy cabinet glow, chrome trim,
    capsule modules, and prize-token spirals should make pleasure feel engineered. Arcades or family showrooms can
    appear, but the style is domesticated atomic anxiety in bright plastic. Apply this corepunk genre grammar over any
    input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color
    tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed
    set-piece.
