visualDna:
  aesthetic: >-
    mallsoft network ritual built around an emptying mall fountain turned into an uplink with teens, coins,
    plants, fiber cables, and pastel storefront glow.
  subject_treatment: >-
    CRT geometry, analog signal bands, vapor gradients, mall-era surfaces, tape artifacts, and digital
    slippage. Core composition uses fountain uplink, teen crew, fiber cables, coins, storefront glow.
  color_and_tone: mall pink, fountain blue, beige tile, fiber cyan
  lighting_and_shadow: skylight wash, fountain reflection, storefront neon, fiber glints
  texture_and_material: tile, water, plastic plants, fiber cable, chrome benches
  camera_and_composition: >-
    Pools, arcades, stations, atriums, kiosks, malls, observatories, and broadcast corners with media texture.
    Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: melancholy, social, softly uncanny, retro
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: fountain uplink, teen crew, fiber cables, coins, storefront glow
  creative_brief: >-
    Mallsoft meets network ritual: a cropped mall fountain, simplified people, cables, and nostalgia, avoiding
    faceless corridor repetition. Keep the result representative rather than over-abstract; use flat graphic
    illustration, gouache-poster shapes, cel-poster blocking, and controlled digital painting over realism or
    generic concept art. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate
    detail, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
