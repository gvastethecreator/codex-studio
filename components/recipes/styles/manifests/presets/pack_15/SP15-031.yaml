visualDna:
  aesthetic: >-
    elegant unsettling biotech as a flat graphic digital-illustration conservatory card where organic circuits
    and soft red membrane patterns integrate with glasshouse machinery.
  subject_treatment: >-
    Organic circuitry, fungal branching, lab-craft silhouettes, soft biotech forms, and handmade mutation
    logic. Core composition uses organic circuit veins, glasshouse ribs, membrane curtains, gold traces,
    careful figures.
  color_and_tone: deep crimson, pale ivory, black green, gold trace lines
  lighting_and_shadow: greenhouse shafts, red membrane glow, gold circuit glints
  texture_and_material: abstract membrane panels, brass tracework, glasshouse ribs, matte leaves, polished bone shapes
  camera_and_composition: >-
    Clinics, transit spines, bridges, plazas, conservatories, and worktables that feel grown not installed.
    Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: beautiful, unsettling, lush, controlled
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: organic circuit veins, glasshouse ribs, membrane curtains, gold traces, careful figures
  creative_brief: >-
    Allow body-horror mood without explicit gore: elegant organic circuits, unsettling beauty, and controlled
    biotech atmosphere. Keep it representative through conservatory structure, careful worker figures,
    glasshouse ribs, and abstract membrane panels, not realistic flesh. Favor flat graphic digital
    illustration, clean editorial illustration, cel-shaded poster art, gouache poster aesthetics,
    graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly
    realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value
    zones, simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean surfaces,
    shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
