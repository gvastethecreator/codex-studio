visualDna:
  aesthetic: Stonepunk sacred machinery where gravity, labor chants, and basalt mass feel like technology older than language.
  form_and_line: Cyclopean arch-jaw rhythm, slow gear halos, stepped load paths, rope-tension diagonals, and monolith silhouettes.
  color_palette: Basalt charcoal, copper-oxide green, ember orange, ash beige, and blackened handprint marks.
  lighting_setup: Hearth-core glow buried inside stone teeth, hard skylight shafts, and sparks catching dust around rotating mass.
  material_texture: Chiseled basalt, rope-burn fibers, hammered copper seams, packed clay, soot-polished wear, and carved tally grooves.
  render_quality: Heavy tactile stonepunk concept art where every mechanism reads as buildable, brutal, and devotional.
  spatial_distortion: Vertical pressure composition where weight stacks downward while gear circles pull the eye into ritual labor.
  atmosphere: Elemental endurance, communal strain, ancient ingenuity, and engineering as worship.
  key_features: >-
    Stone gear halos, counterweight shafts, rope-burn joints, monolith work-bay cues, ember pits, and carved
    maintenance-prayer marks.
  creative_brief: >-
    Crush the input into devotional stone machinery: basalt teeth, counterweight shafts, rope-burn fibers, ember pits,
    and carved tally marks should make technology feel older than speech. Sanctuaries, workers, or ritual sites may
    appear, but the style is weight, labor, and sacred mass. Apply this corepunk genre grammar over any input: preserve
    the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while
    avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.
