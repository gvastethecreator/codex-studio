visualDna:
  aesthetic: biopunk symbiotic commerce as a flat-to-painterly poster card built around a living canopy market where vendors trade stylized symbiont tools, seed pods, and crafted wearable graft objects.
  form_and_line: Organic circuitry, fungal branching, lab-craft silhouettes, soft biotech forms, and handmade mutation logic. Core composition uses living canopy, symbiont tools, vendor gestures, wet pods, wearable graft displays.
  color_palette: orchid magenta, chlorophyll green, warm amber, dark umber
  lighting_setup: canopy-filtered glow blocks, bioluminescent stall accents, matte organic highlights
  material_texture: living canopy planes, seed pod shapes, woven fiber blocks, smooth translucent color, damp wood accents
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Clinics, transit spines, bridges, plazas, conservatories, and worktables that feel grown not installed. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: lush, transactional, uncanny, lively
  key_features: living canopy, symbiont tools, vendor gestures, wet pods, wearable graft displays
  creative_brief: 'A market is correct here because the style is biotech trade: make it living, tactile, and social, not gore, fetish body display, or generic aisle. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
