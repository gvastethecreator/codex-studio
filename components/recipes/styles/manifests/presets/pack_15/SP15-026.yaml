  aesthetic: Monumental raypunk sacred-science design without literal worship staging.
  form_and_line: Pointed rocket arches, ribbed tube vaults, cruciform vectors, and mission-mosaic grids.
  color_palette: Ivory white, plasma blue, and brass orange.
  lighting_setup: Volumetric skylight beams intersecting reactor lumen fixtures.
  material_texture: Ceramic composites, ribbed steel, etched glass, and polished stone.
  render_quality: Grand-scale environment concept with balanced symbolism and function.
  spatial_distortion: Longitudinal sacred-tech depth with processional vector symmetry.
  atmosphere: Triumphal curiosity, solemn innovation, and civic mythmaking.
  key_features: Rocket-arch halos, plasma-blue ribs, mission-mosaic patterning, and brass-orange lumen seams.
  creative_brief: 'Give the input sacred-science scale: rocket arches, plasma-blue ribs, mission-mosaic grids, ivory ceramic light, and processional launch symmetry. Cathedral or arcade cues may appear, but the style is civic mythmaking through monumental function, not worship staging. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
