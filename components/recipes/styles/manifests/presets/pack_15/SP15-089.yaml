visualDna:
  aesthetic: Dense artisan clockpunk precision where watchcraft becomes a compressed texture system.
  form_and_line: Narrow shopfront-like bands, gear awnings, display-grid windows, and pocketwatch curves.
  color_palette: Walnut, brass, and deep green.
  lighting_setup: Warm shop lamps and reflected glass sparkle.
  material_texture: Polished brass, timber, leather, and felt pads.
  render_quality: Detail-rich micro-mechanical render with intimate repair-craft cues.
  spatial_distortion: Tight alley-like perspective with repeating facade bands and tool-grid depth.
  atmosphere: Craft pride, quiet focus, and intimate scale.
  key_features: Watchmaker tool grids, tool-clock motifs, repair-node silhouettes, and pocketwatch filigree.
  creative_brief: 'Miniaturize the input into pocketwatch craft: walnut bands, brass filigree, display-grid windows, felt-pad shadows, repair-node silhouettes, and tiny tool-clock motifs make any subject feel precise, intimate, and hand-serviced.'
