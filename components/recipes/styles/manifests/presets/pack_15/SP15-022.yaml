visualDna:
  aesthetic: >-
    desertpunk climate machines as a flat-to-painterly poster card built around desert water condensers, shade
    cloth, repair teams, sparse bloom beds, and dust-filter towers.
  subject_treatment: >-
    Repair-culture shapes, civic infrastructure, practical climate machines, and human-scaled commons. Core
    composition uses condenser towers, shade cloth, bloom beds, dust filters, repair teams.
  color_and_tone: sand ochre, cactus green, white shade cloth, copper pipe
  lighting_and_shadow: harsh sun as flat shape, shade-cloth color blocks, cool condenser glow, simple dust color plane
  texture_and_material: shade cloth plane, copper pipe arcs, dry clay blocks, simple water-color highlights, patched utility gear
  camera_and_composition: >-
    Rooftops, riversides, roofs, blocks, terraces, and outdoor workshops with lived-in pragmatism. Keep depth
    legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: resourceful, dry, bright, survivalist
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: condenser towers, shade cloth, bloom beds, dust filters, repair teams
  creative_brief: >-
    Desertpunk needs heat and water logic: visible condensers, shade, repair, and sparse bloom, not generic
    oasis fantasy. Keep the result representative rather than over-abstract; make one character in their
    environment the anchor, with motifs as background, costume, weather, architecture, or social pressure
    instead of a foreground prop. Favor flat-to-painterly editorial illustration, gouache poster aesthetics,
    clean graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal
    painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold
    color/value zones, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish
    denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
