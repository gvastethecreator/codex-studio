visualDna:
  aesthetic: Reactor-wellness atompunk where sanitized circular calm is powered by suspiciously perfect surplus heat.
  form_and_line: Smooth dome shells, concentric thermal rings, turbine-water spirals, capsule modules, and rounded hygiene lines.
  color_palette: Pool aqua, clinic white, citrus yellow, chrome silver, and pale isotope green.
  lighting_setup: Diffuse dome daylight, underwater luminous bands, steam glow, and clean status lights above hydrotherapy controls.
  material_texture: Glazed tile, anti-slip stone, polished steel rails, wet enamel, translucent safety panels, and rubber pool grates.
  render_quality: Lifestyle concept with hygienic detail, coherent energy logic, and tactile wet surfaces.
  spatial_distortion: Bowl geometry centers warm isotope rings while circulation paths loop like a health diagram.
  atmosphere: Wellness, civic pride, thermal luxury, and sanitized reactor unease.
  key_features: Thermal isotope rings, health-capsule forms, wave-turbine displays, hydrotherapy panels, and protocol color stripes.
  creative_brief: 'Sanitize the input with reactor-wellness calm: pool-aqua rings, citrus status lights, wet enamel, glazed tile, and hydrothermal loops should feel luxurious and too perfect. Aquatic domes can appear, but the style is surplus heat turned into hygienic civic comfort. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
