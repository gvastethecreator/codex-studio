visualDna:
  aesthetic: Decopunk finance as aerial circulation, where wealth moves like hidden weather made of brass and jade.
  form_and_line: Stepped tower logic, chevron brace stacks, arched connectors, ledger-band facades, and vault-threshold frames.
  color_palette: Black lacquer, aged brass, deep jade, smoke glass gray, and small currency-green glints.
  lighting_setup: Evening marquee bands, deco uplights, brass edge glow, and jade reflections caught in smoked glass.
  material_texture: Polished stone, gilded trim, smoked glass, lacquer panels, jade inlay, and fingerless vault-door metal.
  render_quality: Luxurious urban concept with strict geometric clarity and readable financial circulation.
  spatial_distortion: Elevated interlock perspective turns vertical wealth channels into a controlled maze.
  atmosphere: Ambition, secrecy, metropolitan glamour, and elegant predation.
  key_features: >-
    Currency-threshold motifs, deco rib spans, turbine lobby forms, vault-threshold marks, and chevron transaction
    lanes.
  creative_brief: >-
    Make the input circulate like hidden wealth weather: black lacquer planes, brass chevrons, jade glints, vault
    thresholds, and elevated ledger geometry should feel elegant and predatory. Skybridges or exchanges may appear, but
    the style is decopunk finance translated into vertical pressure. Apply this corepunk genre grammar over any input:
    preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension
    while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed
    set-piece.
