visualDna:
  aesthetic: >-
    vaporpunk pool CRT dream built around a tiled pool space filled with CRT reflections, swimmers or
    loungers, pastel fog, and cathode glow.
  subject_treatment: >-
    CRT geometry, analog signal bands, vapor gradients, mall-era surfaces, tape artifacts, and digital
    slippage. Core composition uses CRT reflections, pool tiles, figures, chrome rails, vapor haze.
  color_and_tone: pool aqua, magenta, cream tile, violet shadow
  lighting_and_shadow: CRT glow on water, pastel skylight, soft neon haze
  texture_and_material: ceramic tile, water, CRT glass, chrome rails, synthetic towels
  camera_and_composition: >-
    Pools, arcades, stations, atriums, kiosks, malls, observatories, and broadcast corners with media texture.
    Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: dreamy, humid, retro, unreal
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: CRT reflections, pool tiles, figures, chrome rails, vapor haze
  creative_brief: >-
    Vaporpunk with scene and bodies: pool, CRTs, water light, and retro dream logic, not empty gradient
    abstraction. Keep the result representative rather than over-abstract; make one character in their
    environment the anchor, with motifs as background, costume, weather, architecture, or social pressure
    instead of a foreground prop. Favor clean graphic-novel card art, stylized 2D digital illustration,
    controlled digital painting, cel-shaded poster art, or gouache-poster color blocking over realism,
    photoreal painterly realism, cinematic key art, or hyper-detailed concept art. Use few bold color/value
    zones, moderate texture, large shapes, clean surfaces, and finish denoised with no excessive noise or
    ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
