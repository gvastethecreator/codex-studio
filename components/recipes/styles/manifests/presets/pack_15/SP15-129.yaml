  color_palette: Porcelain cream, oxidized rose brass, tea-stain beige, soot-violet shadow, and pearl highlight notes.
  lighting_setup: Diffuse parlor warmth, pinpoint brass glints, soft porcelain bounce, and low steam haze around mechanical joints.
  material_texture: Crochet lace relief, porcelain glaze, fine brass teeth, velvet dust, oiled hinge seams, and cloudy glass gauges.
  render_quality: Ornamental steampunk polish with fragile material contrast, precise mechanism readability, and quiet emotional elegance.
  spatial_distortion: Cabinet-of-curiosities compression with nested filigree layers and symmetrical mechanical depth.
  atmosphere: Fragile, ornate, haunted, graceful, intimate.
  key_features: Lace valve geometry, porcelain-mechanism contrast, spring-loop halos, pressure dial motifs, and soft steam veils.
  creative_brief: >-
    Ornament the input with pressure lace automata: porcelain softness, rose-brass
    valve filigree, spring-loop halos, cloudy gauges, and steam-veiled hinge
    seams apply refined pneumatic tenderness without requiring dolls, salons,
    servants, or literal machines.
