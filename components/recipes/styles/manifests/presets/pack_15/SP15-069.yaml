  color_palette: Mission white, worn brass, cosmic blue, candle amber, and scorched launch gray.
  lighting_setup: Narrow altar spot, hatchway rimlight, blue engine glow, and small votive reflections on polished metal.
  material_texture: Painted steel, cloth mission banners, worn floor plating, heat-scarred brass, and paper blessing tags.
  render_quality: Symbolic scene with strong silhouette hierarchy and tactile ritual objects.
  spatial_distortion: Aisle-like perspective toward nozzle halos, with rocket geometry replacing religious architecture.
  atmosphere: Faith, fear, mission resolve, and quiet mechanical tenderness.
  key_features: Engine-blessing rig motifs, star icon panels, vow capsules, launch-candle marks, and prayer-tool racks.
