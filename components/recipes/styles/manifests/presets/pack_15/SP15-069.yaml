visualDna:
  aesthetic: space salvagepunk built around one distinctive tethered salvage captain protagonist, comet ice chunks, old satellites, welding sparks, and cable arcs.
  form_and_line: Atomic signage, rocket-age curves, raygun geometry, orbital equipment, chrome kitsch, and cosmic civic forms. Core composition uses tethered salvage captain protagonist, comet ice, old satellites, welding sparks, cable lines.
  color_palette: space black, ice cyan, hazard orange, dull aluminum
  lighting_setup: broad welding glow, suit glow dots, comet rimlight, sparse cold stars
  material_texture: satellite panels, suit fabric, ice, cables, scorched metal
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Promenades, diners, outposts, salvage yards, rails, lunar farms, craters, and isotope-lit plazas. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: dangerous, scrappy, orbital, cold
  key_features: tethered salvage captain protagonist, comet ice, old satellites, welding sparks, cable lines
  creative_brief: 'Space salvagepunk should show risk through one character: a distinctive tethered salvage captain cutting or claiming comet ice beside old satellite panels, thick cable arcs, and broad welding glow, not a heroic ship poster. The debris supports the protagonist; it must not become object-only salvage. Avoid crew lineup, worker crew, battle debris, cockpit UI, spaceship hero, or 3D space render. Keep the result representative rather than over-abstract; use flat graphic illustration, gouache-poster shapes, cel-poster blocking, and controlled digital painting over realism or generic concept art. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.'
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
