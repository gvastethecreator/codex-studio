visualDna:
  aesthetic: seedpunk community archive as a flat-to-painterly poster card built around a block party with seed libraries, blank paper packets, planters, music shapes, and archival cabinets.
  form_and_line: Repair-culture shapes, civic infrastructure, practical climate machines, and human-scaled commons. Core composition uses seed drawers, planters, neighborhood crowd, paper packets, garden tools.
  color_palette: seed brown, marigold, leafy green, faded poster pink
  lighting_setup: golden-hour street blocks, small celebration color dots, soft plant shadow shapes
  material_texture: blank seed-packet rectangles, wood cabinet silhouette, denim color blocks, soil plane, painted planter shapes
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Rooftops, riversides, roofs, blocks, terraces, and outdoor workshops with lived-in pragmatism. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: festive, archival, local, generous
  key_features: seed drawers, planters, neighborhood crowd, paper packets, garden tools
  creative_brief: 'Seedpunk as living archive: celebration, cabinets, gardeners, and seed exchange, no sterile lab, readable labels, or generic farmers market aisle. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
