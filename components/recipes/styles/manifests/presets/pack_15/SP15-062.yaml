visualDna:
  aesthetic: >-
    mythpunk civic engine built around one distinctive shrine-engine keeper or courier, moving shrine-like
    engine cart, cable garlands, blank cloth strips, brass glow, and sparse public silhouettes.
  subject_treatment: >-
    Ritual diagrams, gothic silhouettes, folk hardware, talismanic machines, and mythic street-level staging.
    Core composition uses shrine-engine keeper/courier, engine cart, cable garlands, blank cloth strips, brass
    engine glow, sparse public silhouettes.
  color_and_tone: saffron, engine black, turquoise, brass
  lighting_and_shadow: engine glow, street dusk, flat banner shadows, sparse warm procession dots
  texture_and_material: brass, painted wood, cable garlands, plain cloth strips, worn shoes
  camera_and_composition: >-
    Switchyards, foundries, chapels, cairns, repair shops, salons, processions, and rural transformers. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: ceremonial, public, moving, mechanical
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: shrine-engine keeper protagonist, engine cart, cable garlands, blank cloth color strips, brass engine glow
  creative_brief: >-
    Mythpunk can be ceremonial but must stay mechanical and public: one distinctive shrine-engine keeper or
    courier guiding a moving engine cart, cable garlands, blank cloth color strips, brass glow, and sparse
    public silhouettes far behind for scale. Character must carry the preset through stance, garment
    silhouette, hand on cable/handle, and calm street-level authority; shrine engine supports them, never
    replaces them. Avoid object-only engine poster, mechanic crew, crowded parade texture, worker revolution
    poster, religious symbols, temple parade, or RPG character styling. Use curated editorial style-card
    structure, flat graphic illustration, gouache-poster shapes, cel-poster blocking, and controlled digital
    painting over realism or generic concept art. Use few bold color/value zones, large matte shapes, clean
    surfaces, low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
