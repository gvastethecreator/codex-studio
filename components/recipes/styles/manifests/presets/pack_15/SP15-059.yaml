visualDna:
  aesthetic: gothpunk communications built around a gothic relay room with black lace cables, radio operators, pointed arches as silhouettes, and red indicator light.
  form_and_line: Ritual diagrams, gothic silhouettes, folk hardware, talismanic machines, and mythic street-level staging. Core composition uses relay operators, pointed silhouettes, cable lace, red indicators, dark coats.
  color_palette: charcoal, oxblood, cold white, tarnished silver
  lighting_setup: red indicator lamps, cold moon cuts, radio glow, deep shadows
  material_texture: black cable, lace-like mesh, tarnished metal, stone, velvet coats
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Switchyards, foundries, chapels, cairns, repair shops, salons, processions, and rural transformers. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: romantic, severe, communicative, nocturnal
  key_features: relay operators, pointed silhouettes, cable lace, red indicators, dark coats
  creative_brief: 'Gothpunk communications: relay gear, radio mast, small operators, cable arches, and gothic shape language, not empty cathedral literalism. Keep the result representative rather than over-abstract; use flat graphic illustration, gouache-poster shapes, cel-poster blocking, and controlled digital painting over realism or generic concept art. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.'
