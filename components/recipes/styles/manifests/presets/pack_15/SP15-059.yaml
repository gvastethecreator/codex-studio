visualDna:
  aesthetic: Judicial decopunk where symmetry acts like surveillance and polished reflection makes judgment feel already decided.
  form_and_line: Symmetric court axes, mirror-wall planes, stepped forecourt logic, legal obelisk alignments, and tribunal chevrons.
  color_palette: Stone white, brass, deep teal, mirror silver, and black shadow lines.
  lighting_setup: Midday glare, colonnade shadow grids, hard mirror reflections, and brass plate highlights at eye level.
  material_texture: Polished stone, mirrored steel, engraved brass, teal enamel seals, crisp stair edges, and cold door glass.
  render_quality: High-clarity urban concept with severe focal order and institutional sharpness.
  spatial_distortion: Axis perspective terminates at formal thresholds while mirror planes duplicate scrutiny on both sides.
  atmosphere: Authority, scrutiny, polished intimidation, and ceremonial inevitability.
  key_features: Mirror colonnades, legal obelisks, tribunal chevrons, ceremonial stair motifs, and engraved verdict plates.
  creative_brief: 'Judge the input through mirrorline severity: doubled reflections, tribunal chevrons, brass verdict plates, polished stone axes, and cold teal seals should make scrutiny unavoidable. Court or plaza cues may appear, but the style is symmetry as surveillance and authority as reflection. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
