visualDna:
  aesthetic: Arcade-vaporpunk mirage where gradient panels, synthetic leisure symbols, and glossy obsolete tech create playful melancholic utility.
  form_and_line: Memphis diagonals, arcade-button circles, mirrored monolith slabs, and rounded plastic interface geometry.
  color_palette: Hot pink, teal cyan, violet dusk, cream plastic, and chrome silver glints.
  lighting_setup: Soft cabinet glow, sunset-gradient backwash, glossy reflection pools, and haloed vector edges.
  material_texture: ABS plastic, smoked glass, rubberized buttons, laminated posters as abstract blocks, and soft CRT noise.
  render_quality: Crisp vaporpunk key-art polish with readable retro interface hierarchy and dreamy synthetic finish.
  spatial_distortion: Isometric arcade-grid compression with impossible mirror planes and flattened poster-depth layers.
  atmosphere: Playful, nostalgic, synthetic, vacant, sweetly strange.
  key_features: Arcade-button rhythm, gradient slab fields, smoked-glass reflections, chrome trim, and poster-like color blocks.
  creative_brief: 'Mirage the input through gradient arcade memory: Memphis diagonals, hot-pink/teal interface gloss, button-circle rhythm, smoked-glass planes, and obsolete-tech nostalgia apply without requiring an arcade, game cabinet, signage, or room.'
