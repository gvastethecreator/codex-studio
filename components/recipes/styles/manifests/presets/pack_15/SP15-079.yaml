visualDna:
  aesthetic: coastal sailpunk salvage identity led by one wind-pulled salvage sailwright-captain, with patched sails, reused hull curves, rope winches, and communal wind rigs behind.
  form_and_line: Stone tools, rope mechanics, carved engines, low-tech power rigs, salvage sails, and rough handmade engineering. Core composition uses one main sailwright-captain, salvage sails, patched hulls, rope winches, coastal rigs.
  color_palette: canvas white, rust, sea blue, tar gray
  lighting_setup: coastal sunlight, sail translucency, welding glints, water bounce
  material_texture: canvas, drift metal, rope, tar, patched hulls, salt wood
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Sanctuaries, markets, camps, bridges, battery houses, and shore commons built from elemental materials. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: windy, communal, rough, optimistic
  key_features: main sailwright-captain, salvage sails, patched hulls, rope winches, coastal rigs
  creative_brief: 'Salvagepunk with wind and community without pirate/adventure hero styling: make the sail geometry, hull curves, rope line, and one integrated sailwright figure form a maritime craft poster. Vary crop and composition; avoid centered full-body adventurer poses, crew-only staging, random junk collage, harbor market, pirate costume portrait, or object-only boat render. Favor folk-modernist poster structure, controlled digital painting, clean matte shapes, and handmade material poetry over American RPG/sourcebook illustration, cinematic key art, or hyper-detailed concept art. Use few bold color/value zones, moderate texture, large shapes, clean surfaces, and finish denoised with no excessive noise or ultra-fine detail.'
