visualDna:
  aesthetic: >-
    shell-built civic seapunk as a flat graphic digital-illustration card built around a metro pier grown from
    shell-like panels, ticket gates, ferry crowds, and tidal service machines.
  subject_treatment: >-
    Terrain-specific silhouettes, waterline arcs, ice facets, salt grids, stilt structures, and wind-tensioned
    forms. Core composition uses shell panels, ferry crowd, service machines, tidal gates, wet pier geometry.
  color_and_tone: shell ivory, teal, rust orange, deep tide gray
  lighting_and_shadow: pier canopy light, tidal reflections, ticket-gate LEDs
  texture_and_material: shell ceramic panels, salt metal blocks, simple ferry rope arcs, wet concrete planes, blank enamel shapes
  camera_and_composition: >-
    Coasts, piers, marinas, glacier towns, salt flats, and swamps with strong environmental identity. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: busy, civic, brackish, architectural
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: shell panels, ferry crowd, service machines, tidal gates, wet pier geometry
  creative_brief: >-
    Make seapunk civic and transport-heavy: one ferry-pier transit keeper or commuter protagonist framed by
    shell architecture and machines, not fantasy palace shells. Keep it representative through ferry-pier
    entrance, shell canopy panels, simple ticket-gate blocks, ferry crowd silhouettes, and tidal service
    machines. Favor flat graphic digital illustration, clean editorial illustration, cel-shaded poster art,
    gouache poster aesthetics, graphic-novel card art, or stylized animation-background art over realism,
    photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use
    few bold color/value zones, simplified brush planes, matte surfaces, low-to-moderate texture, large
    shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine
    detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
