visualDna:
  aesthetic: Hydrological solarpunk commons where storage, cooling, and gathering merge as one calm civic pattern.
  form_and_line: Concentric reservoir-like rings, stepped edge rhythms, and radial circulation paths.
  color_palette: Solar sand, aquifer blue, and herbaceous soft green.
  lighting_setup: High-angle sun with mirrored highlights and cool under-canopy shade pools.
  material_texture: Porous pale stone, evaporative ceramic fins, brushed alloy rails, and laminar water films.
  render_quality: Editorial-grade civic solarpunk concept art with clean public-system readability.
  spatial_distortion: Amphitheater-like basin depth emphasizing a multifunctional water-energy core without requiring a plaza.
  atmosphere: Collective comfort, thermal relief, and visible ecological stewardship.
  key_features: Thermal battery basins, refill-node motifs, mist-pergola rhythm, and mixed-use civic occupancy cues.
  creative_brief: 'Recast the input as a cooling civic hydrology object: concentric aquifer rings, mist-pergola shadows, pale porous stone, and blue thermal relief highlights. Basins, kiosks, crowds, or commons may support the read, but the style should travel as calm water governance and sun-tempered geometry.'
