visualDna:
  aesthetic: clockpunk civic assembly poster built around a clocktower mechanism, guild workers, exposed escapements, and unreadable graphic placard shapes.
  form_and_line: Mechanical silhouettes, chunky ink contours, labor-poster spacing, and tactile industrial rhythm. Core composition uses escapement symbols, unreadable poster blocks, clock shadows, guild coat silhouettes, and stepped civic geometry.
  color_palette: aged ivory, blue-charcoal ink, brass, brick red
  lighting_setup: late-afternoon civic color blocks, clock-face shadows, warm placard glow
  material_texture: paper poster blocks, brass escapements, wool coat silhouettes, brick planes, ink texture
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Readable workshops, rail platforms, docks, streets, or civic machine halls without becoming a corridor. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: defiant, clever, civic, rhythmic
  key_features: escapement symbols, strike posters, clock shadows, guild coats, public stairs
  creative_brief: 'Turn clockpunk into social motion: synchronized gears, civic assembly, unreadable placard shapes, and handmade devices, avoiding sterile clock diagrams, political flag hero shots, or readable slogans. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor screenprint poster, risograph poster, cel-shaded graphic-novel card art, flat-to-painterly digital illustration, or gouache poster aesthetics over realism, cinematic key art, or hyper-detailed concept art. Use few bold color/value zones, moderate texture, large shapes, clean surfaces, and finish denoised with no excessive noise or ultra-fine detail.'
