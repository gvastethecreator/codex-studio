visualDna:
  aesthetic: bodypunk healing workshop as a stylized digital-painting clinic card where nerve-like fiber looms weave prosthetic sensation and careful body repairs.
  form_and_line: Organic circuitry, fungal branching, lab-craft silhouettes, soft biotech forms, and handmade mutation logic. Core composition uses nerve looms, caregivers, prosthetic hands, thread webs, compact monitors.
  color_palette: nerve pink, surgical teal, graphite, soft white
  lighting_setup: low clinical color blocks, broad fiber-optic arcs, warm caregiver light plane
  material_texture: fiber-strand arcs, polymer prosthetic shapes, steel loom blocks, cotton sheet planes, smooth glass accents
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Clinics, transit spines, bridges, plazas, conservatories, and worktables that feel grown not installed. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: careful, intimate, uncanny, compassionate
  key_features: nerve looms, caregivers, prosthetic hands, thread webs, compact monitors
  creative_brief: 'Bodypunk without cheap gore: focus on care, tactile repair, and nerve-fiber craft with characters present when useful, never surgery shock or fetish medical staging. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat graphic digital illustration, clean editorial illustration, cel-shaded poster art, gouache poster aesthetics, graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
