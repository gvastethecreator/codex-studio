  aesthetic: Cloudbelt solarpunk where atmospheric water capture, orchard softness, and elevated communal adaptation drive the style.
  form_and_line: Lightweight mist-tower verticals, braided bridge-like links, and canopy-layered modular forms.
  color_palette: Sage vapor green, pearl fog gray, and muted apricot bloom.
  lighting_setup: Diffused dawn humidity with soft backscatter through condensate nets.
  material_texture: Micro-mesh catchers, oiled light timber, ceramic cistern skins, and dewy fruit-wax highlights.
  render_quality: Premium atmospheric solarpunk concept art with clear climate-adaptation storytelling.
  spatial_distortion: Diagonal elevated-network perspective traversing staggered orchard-like depth.
  atmosphere: Quiet fertility, climatic intelligence, and gentle communal rhythm.
  key_features: Condensation-tower motifs, drip-fed orchard rhythm, suspended module silhouettes, and visible storage-cistern cues.
  creative_brief: >-
    Preserve fog-orchard habitat grammar as a reusable style language:
    atmospheric water-capture infrastructure, orchard-soft layering, and
    cloudbelt adaptation cues should remain stable across subjects without
    requiring homes, footbridges, towers, or an orchard scene.
