visualDna:
  aesthetic: witchpunk electrical ritual built around one neon switchyard practitioner commanding protective current around transformers and cables.
  form_and_line: Ritual diagrams, gothic silhouettes, folk hardware, talismanic machines, and mythic street-level staging. Core composition uses transformer mass, plain neon oval glow, cable staffs, rubber-glove gesture, and one witch technician protagonist.
  color_palette: neon violet, transformer gray, black rubber, hot pink
  lighting_setup: coil arcs, plain neon oval glow, storm cloud flashes, sodium work lights
  material_texture: rubber gloves, copper cable, cracked concrete, neon paint, transformer steel
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Switchyards, foundries, chapels, cairns, repair shops, salons, processions, and rural transformers. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: charged, occult, urban, protective
  key_features: transformer mass, plain neon oval glow, copper cable arcs, rubber-glove gesture, witch technician protagonist
  creative_brief: 'Witchpunk as electrical practice: ritual and infrastructure together, with one characteristic technician-witch protagonist physically commanding the switchyard through rubber gloves, cable arcs, and neon oval halos. Avoid foreground cloaked fantasy figure, anonymous worker crew, generic fantasy corridor, broom cliche, or readable sigil card. Use flat graphic illustration, gouache-poster shapes, cel-poster blocking, and controlled digital painting over realism or generic concept art. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.'
