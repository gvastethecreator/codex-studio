visualDna:
  aesthetic: Isotopic romance style where reactor halos and civic optimism become soft ceremonial machinery.
  form_and_line: Spiral approach lines, atom-canopy ribs, isotope ring frames, circular focal platforms, and floral orbits.
  color_palette: Pearl white, pastel mint, warm brass, blush radiation pink, and soft glass green.
  lighting_setup: Ceremony uplight, diffused reactor shimmer through satin, brass glints, and haloed floor reflections.
  material_texture: Gloss ceramic, satin drapes, polished alloy rails, pearl enamel, translucent floral plastics, and etched vow plates.
  render_quality: Romantic retro-future concept with fine material definition and precise ceremonial focus.
  spatial_distortion: Ring symmetry and spiral approach lines make intimacy feel engineered and gently radiant.
  atmosphere: Tender futurism, social ritual, engineered elegance, and unnervingly perfect optimism.
  key_features: Isotope ring arches, atom floral canopies, radiant circles, brass rail curves, and reactor-blessing lamp motifs.
  creative_brief: 'Make the input ceremonially radiant: isotope ring arches, satin-science surfaces, pearl enamel, blush reactor halos, and brass vow-rail curves should turn utility into ritual. Wedding or pavilion cues may appear, but the style is engineered tenderness with unnervingly perfect optimism. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
