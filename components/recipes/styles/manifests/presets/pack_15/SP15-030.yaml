visualDna:
  aesthetic: garage biopunk craft as a stylized digital-painting card built around a street apothecary of blank vials, coded plants, patched lab coats, and hand-built incubators.
  form_and_line: Organic circuitry, fungal branching, lab-craft silhouettes, soft biotech forms, and handmade mutation logic. Core composition uses coded plants, incubators, patched lab coats, vial racks, hand labels without readable text.
  color_palette: acid green, amber vial, black rubber, cream labels
  lighting_setup: bench glow as flat shape, vial color blocks, street-window plane, incubator warmth
  material_texture: blank glass-vial shapes, rubber tubing arcs, patterned plant leaves, patched coat blocks, enamel tray planes
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Clinics, transit spines, bridges, plazas, conservatories, and worktables that feel grown not installed. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: clever, illicit, small-scale, botanical
  key_features: coded plants, incubators, patched lab coats, vial racks, hand labels without readable text
  creative_brief: 'Make biopunk crafty and small: an apothecary with plants and incubators, not a detailed shop interior, sterile mega-lab, random object still life, readable labels, or drug-store shelf. Keep the result representative rather than over-abstract; make one character in their environment the anchor, with motifs as background, costume, weather, architecture, or social pressure instead of a foreground prop. Favor flat graphic digital illustration, clean editorial illustration, cel-shaded poster art, gouache poster aesthetics, graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value zones, simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.'
