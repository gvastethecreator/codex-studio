visualDna:
  aesthetic: Resourceful lunarpunk rhythm built from crater-bowl forms and tidal energy ritual.
  form_and_line: Curved retaining bands, rope-suspended paths, crescent collectors, and looped cistern lines.
  color_palette: Slate gray, moon mint, and warm lantern amber.
  lighting_setup: Long twilight gradients with kinetic lantern arrays tracing paths.
  material_texture: Basalt aggregate, tensile fabric roofs, and translucent algae tubes.
  render_quality: Detailed matte concept with strong environmental storytelling.
  spatial_distortion: Bowl-crater depth with clustered circular rhythm and soft horizon compression.
  atmosphere: Resourceful tenderness, lunar rhythm, and communal resilience.
  key_features: Tidal-converter glyphs, crater cistern rings, amber lantern trails, and algae-tube glow.
  creative_brief: 'Shape the input as resourceful lunar tidecraft: crater-bowl curves, amber lantern trails, algae-tube glow, basalt aggregate, and crescent converter marks. Hamlets or crater settlements may appear, but the style is resilient tenderness organized around circular energy cycles. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
