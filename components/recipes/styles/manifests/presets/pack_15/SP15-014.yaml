visualDna:
  aesthetic: Neo-victorian steampunk where civic logistics run on elegant pressure systems, brass optimism, and artisanal machinery.
  form_and_line: Riveted arch rhythm, aether-mast verticals, and articulated crane-like silhouettes as compositional grammar.
  color_palette: Aged brass, coal umber, and oxidized teal.
  lighting_setup: Golden industrial dusk with furnace glow and vapor beams.
  material_texture: Hammered copper, varnished oak, oil-stained canvas, and steam-condensed steel.
  render_quality: Premium steampunk concept with clear machinery readability and cinematic density.
  spatial_distortion: Layered drydock-like perspective converging toward an elevated pressure-control focal point.
  atmosphere: Industrious wonder, mechanical pride, and measured optimism.
  key_features: Aether-crane motifs, pressure gauges, civic airship cues, and cooperative labor rhythm.
  creative_brief: 'Reforge the input as optimistic pressure-era logistics: riveted brass arcs, aether-mast verticals, vapor beams, gauges, and cooperative machine rhythm. Ports, airships, crews, cranes, or dockyards can act as anchors, while the core style remains artisanal machinery and civic pressure flow. Apply this corepunk genre grammar over any input: preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.'
