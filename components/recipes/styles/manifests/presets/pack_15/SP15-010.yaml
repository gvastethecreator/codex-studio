visualDna:
  aesthetic: Civic clockpunk driven by precision mechanics, artisanal automation, and communal repair culture.
  form_and_line: Gear-ring colonnade rhythm, pendulum-guided axes, and radial bench-like choreography.
  color_palette: Polished brass, terracotta clay, and oxidized teal accents.
  lighting_setup: Skylight shafts with warm lamp pools over escapement-like work surfaces.
  material_texture: Brushed bronze gears, hardwood warmth, enamel dials, and oil-darkened leather.
  render_quality: High-detail editorial concept art with precise mechanical readability.
  spatial_distortion: Flywheel perspective radiating into timepiece micro-atelier depth without requiring a courtyard.
  atmosphere: Patient mastery, communal ingenuity, and elegant mechanical rhythm.
  key_features: Public gear-library motifs, escapement nodework, cooperative chronometer-forge rhythm, and canopy clockwork cues.
  creative_brief: >-
    Preserve circular maker-courtyard grammar as a reusable style language:
    radial precision-work choreography, visible clockwork governance, and
    communal repair culture should remain stable across subjects without
    requiring a workshop, courtyard, benches, or clock tower.
