visualDna:
  aesthetic: >-
    street mesh cyberpunk poster built around a compact mesh-network exchange with antenna canopies, modded
    coats, and luminous barter tech.
  subject_treatment: >-
    Sharp but simplified network geometry, non-readable signal-panel rhythm, a few thick cable paths, wet
    reflections, and hacker-era silhouettes. Core composition uses mesh antennas, modded coats, canopy
    silhouettes, wearable/hanging nodes, and steam color layers.
  color_and_tone: teal neon, hot pink, black tarp, warm noodle steam
  lighting_and_shadow: flat stall LED color blocks, hanging mesh-node glow, matte canopy color shapes
  texture_and_material: tarp planes, plastic crate blocks, thick wet wire paths, warm steam layers, chrome mod accents
  camera_and_composition: >-
    Dense urban slices, service doors, clinics, relays, roofs, and alleys with clear subject hierarchy. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: tactile, social, illicit, compressed
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: mesh antennas, modded coats, canopy silhouettes, wearable/hanging nodes, steam layers
  creative_brief: >-
    A market is allowed here because it is the premise: make it cybernetic, compact, and signal-driven rather
    than a generic aisle, food-stall postcard, or phone/device demo. Keep barter tech as mesh nodes and
    antenna canopies, with no readable signs or UI. Keep the result representative rather than over-abstract;
    make one character in their environment the anchor, with motifs as background, costume, weather,
    architecture, or social pressure instead of a foreground prop. Favor flat-to-painterly editorial
    illustration, gouache poster aesthetics, clean graphic-novel card art, or stylized animation-background
    art over realism, photoreal photoreal painterly realism, cinematic key art, scratchy print noise, or
    hyper-detailed concept art. Use few bold color/value zones, low-to-moderate texture, large shapes, clean
    surfaces, shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
