  color_palette: Moon gray, basin aqua, lantern amber, dust white, and low-g signal blue.
  lighting_setup: Path beacons, reflected basin light, amber node glows, and soft under-surface illumination.
  material_texture: Composite deck finish, tension cable lines, dust-treated glass, flexible grip surfaces, and powder-soft edges.
  render_quality: Functional clean render with calm motion clarity and low-gravity accessibility cues.
  spatial_distortion: Bowl-depth composition wraps movement around a center without forcing a specific transit scene.
  atmosphere: Calm mobility, civic coordination, low-gravity patience, and shared timing.
  key_features: Bowl composition, low-g rope lines, glide-lane ribbons, amber beacon paths, and soft circular wayfinding.
