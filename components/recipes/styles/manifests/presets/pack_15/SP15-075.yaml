visualDna:
  aesthetic: stone-age precision identity led by one obsidian water-clock timekeeper, with ceremonial water timing translated into bold graphic channels, reflective bowls, and firelit stone geometry.
  form_and_line: Stone tools, rope mechanics, carved engines, low-tech power rigs, salvage sails, and rough handmade engineering. Core composition uses one main timekeeper, obsidian channels, drip bowls, carved stone slabs, reflected fire.
  color_palette: obsidian gray-black, water blue, chalk white, fire amber
  lighting_setup: water reflections, low firelight, glossy obsidian glints
  material_texture: obsidian, water, carved stone, clay bowls, woven cloth
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Sanctuaries, markets, camps, bridges, battery houses, and shore commons built from elemental materials. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: precise, ritual, reflective, ancient
  key_features: main timekeeper, obsidian channels, drip bowls, carved stone slabs, reflected fire
  creative_brief: 'Make precision low-tech and human without falling into fantasy RPG hero art: use a curated poster/artbook character-world composition where the timekeeper stands within water-clock architecture, obsidian channels, and firelit geometry as one designed environment. Vary crop and silhouette; avoid centered full-body adventurer poses, worker-crew staging, cave still life, shrine corridor, or abstract texture-only cards. Favor folk-modernist poster structure, controlled digital painting, clean matte shapes, and handmade material poetry over American RPG/sourcebook illustration, cinematic key art, or hyper-detailed concept art. Use few bold color/value zones, moderate texture, large shapes, clean surfaces, and finish denoised with no excessive noise or ultra-fine detail.'
