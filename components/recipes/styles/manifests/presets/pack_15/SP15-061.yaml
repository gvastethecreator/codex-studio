visualDna:
  aesthetic: necrotech audio repair built around one distinctive repairer protagonist, antique phones, bone-white receivers, hand-tuned copper coils, and ghostly audio lines implying absent voices.
  form_and_line: Ritual diagrams, gothic silhouettes, folk hardware, talismanic machines, and mythic street-level staging. Core composition uses a medium-crop necrotech repairer, oversized phone receiver, compact repair bench, ghost audio lines, hand gesture, copper coils.
  color_palette: ivory, black bakelite, sickly green, warm wood
  lighting_setup: simple dusty window light, phosphor audio glow, one soft bench glow
  material_texture: bakelite, bone resin, wood benches, copper wire, dust
  render_quality: Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity, moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material simulation, or hyper-detail.
  spatial_distortion: Switchyards, foundries, chapels, cairns, repair shops, salons, processions, and rural transformers. Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere: eerie, tender, antique, technical
  key_features: necrotech repairer protagonist, oversized phone receiver, repair bench, ghost audio lines, copper coils
  creative_brief: 'Necrotech as repair craft and communication with absence: one distinctive repairer protagonist at medium crop, oversized phone receiver, compact repair bench, phosphor audio waves, copper coils, and no gore or monster spectacle. Character must carry the preset through face/hood silhouette, hand gesture, listening/tuning pose, and audio-craft attitude; phone machinery supports them, never replaces them. Avoid object-only phone poster, technician crew, cluttered shop, lamp-lit realism, worker propaganda, or RPG character styling. Use curated editorial style-card structure, flat graphic illustration, gouache-poster shapes, cel-poster blocking, and controlled digital painting over realism or generic concept art. Use few bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised with no excessive noise or ultra-fine detail.'
