visualDna:
  aesthetic: Atomic abundance style where organic growth looks laboratory-calibrated and reactor warmth masquerades as sunshine.
  form_and_line: Rounded reactor domes, terrace-grid logic, tubular loop paths, vent-fin ribs, and irrigation arcs drawn like circuit diagrams.
  color_palette: Pistachio mint, cream white, chrome, chlorophyll green, and faint reactor amber.
  lighting_setup: Soft midday glare, contained core glow through vent fins, greenhouse diffusion, and chrome glints on irrigation controls.
  material_texture: Enamel steel, glass blocks, irrigated concrete, sterile planter lips, chrome trim, and wet leaf gloss.
  render_quality: Clear concept render where food systems, heat loops, and civic optimism remain visually legible.
  spatial_distortion: Multi-tier perspective follows heat circulation through grids, loops, vents, and growth patterns.
  atmosphere: Engineered abundance, productive optimism, hygienic utopia, and faint atomic unease.
  key_features: Reactor-greenhouse halos, isotope loop marks, calibrated irrigation panels, growth-grid geometry, and heat-transfer vents.
  creative_brief: >-
    Preserve atomic orchard-district grammar as a reusable style system:
    reactor-assisted agricultural order, polished mid-century civic control,
    and uncanny abundance cues should remain coherent across subjects.
