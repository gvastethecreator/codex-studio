visualDna:
  aesthetic: Decopunk airfield ceremony where flight is a diplomatic entrance, all fins, ramps, monograms, and golden-hour authority.
  form_and_line: Wing-canopy sweeps, control-tower fins, runway symmetry, ceremonial ramp diagonals, and streamlined lounge windows.
  color_palette: Sky gray, brass, cream white, leather brown, and lacquered insignia red.
  lighting_setup: Golden-hour runway glints, terminal sconces, aircraft-edge highlights, and long shadows from finned hangars.
  material_texture: Riveted metal, polished stone, enamel signs, leather luggage, brushed controls, and oiled tarmac sheen.
  render_quality: Expansive transport concept with period detail, arrival choreography, and clean diplomatic staging.
  spatial_distortion: Runway vanishing lines and ramp diagonals turn arrival into a staged procession under monumental fins.
  atmosphere: Prestige travel, geopolitical theater, aristocratic mobility, and wind-polished anticipation.
  key_features: Deco control towers, ceremonial ramp marks, monogrammed lounges, finned hangar doors, and polished luggage trains.
  creative_brief: >-
    Preserve art deco airfield grammar as a reusable style system:
    streamlined arrival ceremony, fin-and-ramp prestige staging, and
    monogrammed aviation authority should remain coherent across subjects.
