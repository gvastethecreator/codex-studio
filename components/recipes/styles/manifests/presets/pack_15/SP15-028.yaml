visualDna:
  aesthetic: >-
    fungal communication network as a stylized digital-painting card built around a public plaza where spore
    towers transmit messages through broad glowing clouds and woven operator masks.
  subject_treatment: >-
    Organic circuitry, fungal branching, lab-craft silhouettes, soft biotech forms, and handmade mutation
    logic. Core composition uses spore towers, message clouds, masked operators, plaza circles, fungal glyphs
    without text.
  color_and_tone: violet spores, night green, stone gray, amber lantern
  lighting_and_shadow: spore glow blocks, twilight color planes, soft tower halos
  texture_and_material: stone planter blocks, fungal tower silhouettes, woven mask shapes, moss color planes, powdery spore clouds
  camera_and_composition: >-
    Clinics, transit spines, bridges, plazas, conservatories, and worktables that feel grown not installed.
    Keep depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: communal, mysterious, breathable, coded
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: spore towers, message clouds, masked operators, plaza circles, fungal glyphs without text
  creative_brief: >-
    Turn communication into fungal weather: plaza operators and glowing spores, not birds, letter-like glyphs,
    readable marks, horror spores, or magic corridor spectacle. Keep the result representative rather than
    over-abstract; make one character in their environment the anchor, with motifs as background, costume,
    weather, architecture, or social pressure instead of a foreground prop. Favor flat graphic digital
    illustration, clean editorial illustration, cel-shaded poster art, gouache poster aesthetics,
    graphic-novel card art, or stylized animation-background art over realism, photoreal photoreal painterly
    realism, cinematic key art, scratchy print noise, or hyper-detailed concept art. Use few bold color/value
    zones, simplified brush planes, matte surfaces, low-to-moderate texture, large shapes, clean surfaces,
    shallow poster depth, and finish denoised with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
