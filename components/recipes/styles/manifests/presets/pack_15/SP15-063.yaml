visualDna:
  aesthetic: Raypunk border bureaucracy rendered as hostile machinery of stamps, pressure locks, scanners, and dust.
  form_and_line: Clamp-like corridors, cargo-gantry teeth, octagonal lock frames, barcode shadows, and turret-eye circles.
  color_palette: Asteroid rust, warning yellow, vacuum black, faded stamp red, and cold viewport blue.
  lighting_setup: Flickering industrial strips, rim-lit inspection windows, and scanner bars slicing forms into legal zones.
  material_texture: Bolted armor plates, abraded hazard paint, dusted alloy, rubber seals, and over-stamped cargo labels.
  render_quality: Functional scifi concept with bold silhouettes and oppressive procedural clarity.
  spatial_distortion: Tunnel-depth funnel toward inspection jaws, with frames narrowing like paperwork decisions.
  atmosphere: Frontier law, procedural dread, and absurd cosmic administration.
  key_features: Scanner arches, ray turret eyes, pneumatic stamp blocks, confiscation-grid cages, and permit-slot geometry.
  creative_brief: >-
    Trap the input in cosmic paperwork machinery: scanner bars, permit slots, pneumatic stamp blocks, octagonal lock
    frames, and turret-eye circles should divide forms into legal zones. Customs gates are optional; the style is
    frontier administration acting like a raypunk predator. Apply this corepunk genre grammar over any input: preserve
    the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while
    avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.
