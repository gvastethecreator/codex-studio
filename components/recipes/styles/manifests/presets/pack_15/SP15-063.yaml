    interchangeable preset, duplicated motifs, generic glass utopia, unmotivated market aisle, unmotivated
    library aisle, fantasy corridor, random camera held by subject, studio wall fixation, chair fixation,
    curtain fixation, scarf fixation, pedestal fixation, bird fixation, excessive noise, ultra-fine detail,
    over-sharpened microtexture, over-rendered machinery, noisy grime, tiny rivets everywhere, busy texture
    chatter, realistic uniform portrait, uniformed officer hero, foreground guard portrait, detailed tattoo
    focus, dense machinery wallpaper, overcrowded scene, high-frequency surface detail, cinematic close-up
    portrait, flat black fill, crushed black, pure black masses, muddy black fields, generic American
    illustration, generic Western RPG card art
