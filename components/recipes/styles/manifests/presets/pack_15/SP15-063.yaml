visualDna:
  aesthetic: >-
    gothic cyber salon built around one distinctive nocturnal data-salon protagonist, velvet terminal
    furniture, red data glass, antique terminals, and social tension.
  subject_treatment: >-
    Ritual diagrams, gothic silhouettes, folk hardware, talismanic machines, and mythic street-level staging.
    Core composition uses data-salon protagonist, velvet terminal table, hand gesture, red data glass, antique
    screens, night windows.
  color_and_tone: velvet black, blood red, pale ivory, chrome
  lighting_and_shadow: red data-glass glow, candle-like LED dots, moonlit window cuts
  texture_and_material: velvet, antique terminals, glass screens, chrome nails, dark wood
  camera_and_composition: >-
    Switchyards, foundries, chapels, cairns, repair shops, salons, processions, and rural transformers. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: decadent, dangerous, elegant, social
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: nocturnal data-salon protagonist, velvet terminal table, red data glass, antique screens, night windows
  creative_brief: >-
    Vampire cyberstyle without glamour portrait drift: one distinctive nocturnal data-salon protagonist in
    elegant punk silhouette, velvet terminal table, red data glass, antique blank screens, and decadent data
    society without explicit blood. Character must carry the preset through posture, face shadow, hand
    gesture, and wardrobe shape; terminal furniture supports them, never replaces them. Avoid object-only
    terminal poster, pale hacker group, bite scene, gothic bedroom, glamour pinup, UI concept art, or RPG
    character styling. Use curated editorial style-card structure, flat graphic illustration, gouache-poster
    shapes, cel-poster blocking, and controlled digital painting over realism or generic concept art. Use few
    bold color/value zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised
    with no excessive noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
