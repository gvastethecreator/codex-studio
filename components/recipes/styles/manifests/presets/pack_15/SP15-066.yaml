visualDna:
  aesthetic: Civic raypunk infrastructure where motion looks dangerous enough to thrill and organized enough to trust.
  form_and_line: Elevated plasma lines, exposed conduit spines, cantilever slices, transfer-pod sockets, and terminal fins.
  color_palette: Electric cyan, ignition orange, brushed steel, signal white, and heat-stained violet.
  lighting_setup: Plasma streaks along rails, pulsing station strips, safety beacons, and underdeck cyan spill.
  material_texture: Composite decking, thick conduit glass, anti-slip metal, ceramic insulators, and heat-warning decals.
  render_quality: Infrastructure-focused concept rendering with clear service routes and strong kinetic rhythm.
  spatial_distortion: Parallel vanishing lines create launch-vector perspective through hubs, pods, and blank signage.
  atmosphere: Speed, civic momentum, controlled danger, and commuter adrenaline.
  key_features: Open plasma rails, transfer-pod sockets, mission-fin silhouettes, service-line strokes, and safety icon clusters.
  creative_brief: >-
    Electrify the input as trusted public speed: plasma rails, ceramic insulators, pod sockets, safety icon clusters,
    and cyan underdeck spill should make travel feel dangerous but organized. Rail or commons cues may appear; the style
    is everyday motion framed like launch preparation. Apply this corepunk genre grammar over any input: preserve the
    faction mood, material ecology, lighting system, infrastructure logic, and signature color tension while avoiding a
    required city, vehicle, room, character lineup, faction scene, readable signage, or fixed set-piece.
