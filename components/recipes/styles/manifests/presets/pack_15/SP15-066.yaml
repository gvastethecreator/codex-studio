visualDna:
  aesthetic: >-
    atomic leisure infrastructure built around one distinctive reactor-promenade protagonist, observation
    windows, simplified suit silhouette, glowing coolant architecture, and blank safety geometry.
  subject_treatment: >-
    Atomic signage, rocket-age curves, raygun geometry, orbital equipment, chrome kitsch, and cosmic civic
    forms. Core composition uses reactor-promenade protagonist, reactor windows, suit silhouette, coolant
    glow, safety geometry.
  color_and_tone: coolant blue, safety yellow, white enamel, black rubber
  lighting_and_shadow: coolant glow, observation-window light, clean overhead strips
  texture_and_material: enamel panels, rubber suits, glass, polished concrete, warning stripes without readable text
  camera_and_composition: >-
    Promenades, diners, outposts, salvage yards, rails, lunar farms, craters, and isotope-lit plazas. Keep
    depth legible and avoid default hallway, aisle, or empty studio staging.
  atmosphere_and_mood: clinical, optimistic, slightly dangerous, touristic
  rendering_and_quality: >-
    Stylized x-punk digital painting / artbook-card illustration with drawn contours, controlled painterly
    planes, readable dark-gray shadows instead of flat black, clean denoised surfaces, strong identity,
    moderate texture, medium-large detail, and no photorealism, AAA concept-art polish, PBR material
    simulation, or hyper-detail.
  key_features: reactor-promenade protagonist, reactor windows, suit silhouette, coolant glow, safety geometry
  creative_brief: >-
    Make atomic leisure uncanny and specific through one character: a distinctive reactor-promenade
    protagonist in simplified rubber suit or atomic leisurewear, reactor window bands, coolant-blue glow,
    enamel blocks, and blank safety-yellow geometry, not a generic power plant diagram. The reactor supports
    the person; it must not become an object-only infrastructure poster. Avoid promenade crowd as main
    subject, worker crew, gas-mask soldier, control-room UI, or hard-surface render. Keep the result
    representative rather than over-abstract; use flat graphic illustration, gouache-poster shapes, cel-poster
    blocking, and controlled digital painting over realism or generic concept art. Use few bold color/value
    zones, large matte shapes, clean surfaces, low-to-moderate detail, and finish denoised with no excessive
    noise or ultra-fine detail.
avoidRules:
  - photoreal
  - watermark
  - text
  - logo
  - generic-style
  - over-abstract
  - repeated-props
  - excessive-noise
  - ultra-fine-detail
