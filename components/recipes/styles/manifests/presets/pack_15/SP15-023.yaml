visualDna:
  aesthetic: Nocturnal decopunk rhythm where jazz-age glamour meets machine polish.
  form_and_line: Streamline arcs, marquee-like bands, repeated cornice geometry, and syncopated curves.
  color_palette: Midnight navy, amber marquee light, and chrome blue reflections.
  lighting_setup: Amber rim pools and blue chrome reflections with rhythmic high contrast.
  material_texture: Gloss enamel, polished metal trims, lacquered wood, and rain-slick sheen.
  render_quality: Cinematic cityscape concept with high legibility and mood depth.
  spatial_distortion: Diagonal syncopated perspective emphasizing speed, rhythm, and flow.
  atmosphere: Electric elegance, urban music pulse, and curated decadence.
  key_features: Blank marquee arcs, radio-wave linework, mirrored canopies, and chrome-blue edgework.
  creative_brief: >-
    Syncopate the input with deco jazz machinery: chrome-blue edgework, amber marquee pulses, lacquer gloss, rain-slick
    reflections, and streamline arcs should make the composition feel musical. Boulevards or nightlife cues can help,
    but the style is rhythm, reflection, and polished nocturnal swing. Apply this corepunk genre grammar over any input:
    preserve the faction mood, material ecology, lighting system, infrastructure logic, and signature color tension
    while avoiding a required city, vehicle, room, character lineup, faction scene, readable signage, or fixed
    set-piece.
