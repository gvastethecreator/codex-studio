visualDna:
  aesthetic: Stonepunk communication grammar where cairn stacks, lime pigment, bone toggles, and wind-borne signal logic create pre-electric networks.
  form_and_line: Stacked cairn silhouettes, semaphore diagonals, knotted cord paths, incised glyph bands, and wind-vane triangles.
  color_palette: Bone white, limewash chalk, weathered granite, ochre cord, charcoal shadow, and dry grass gold.
  lighting_setup: Hard low sun, high-contrast stone edges, wind-dust haze, and small ember or mirror glints.
  material_texture: Lime pigment dust, polished bone toggles, granite chips, braided grass cord, soot marks, and scratched signal glyphs.
  render_quality: Primitive network concept finish with readable signal hierarchy, tactile stone construction, and windswept material honesty.
  spatial_distortion: Ridge-line repetition and signal-chain depth without requiring towers, messengers, flags, or a landscape scene.
  atmosphere: Windswept, alert, communal, ancient, pragmatic.
  key_features: Cairn-stack rhythm, bone toggle markers, lime glyph bands, cord path diagrams, and semaphore-like diagonals.
  creative_brief: 'Signal the input through bone lime cairn logic: chalk-bone markings, stacked-stone rhythm, ochre cord paths, wind-vane diagonals, and dry semaphore tension apply pre-electric network energy without requiring cairns, flags, people, or a literal ridge.'
