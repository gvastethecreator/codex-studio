visualDna:
  aesthetic: Traditional old-school tattoo flash design language
  subject_treatment: Bold black outlines, heavy contour weight, ribbony banners, coiled snakes
  color_and_tone: Red, Green, Yellow, Black shading, limited triad palette, spit-shaded gradients
  lighting_and_shadow: Paper stain (coffee), vintage amber wash, warm sepia base, parchment glow
  texture_and_material: Watercolor paper, skin, flash-sheet tooth, poster-board grain, ink-bled edges
  camera_and_composition: 2D flat design, pinup proportions, dagger-and-heart motifs, talismanic layout
  atmosphere_and_mood: Tough, classic, bold, salt-air romance, port-town grit, permanent devotion
  rendering_and_quality: Bold flash-sheet rendering with high durability/readability logic
  key_features: Pepper shading dots, banner typography, emblematic motif blocks, thick contour lock
  creative_brief: >-
    Design each motif as a standalone flash emblem: thick outlines, limited palette fills, and compact
    symbolic forms. Keep contrast and shape clarity high so marks remain legible at both sheet and tattoo
    scales. Apply Tattoo Flash as a portable style system over any input: preserve its construction grammar,
    material cues, scale logic, and signature rendering behavior while avoiding a required franchise, literal
    prop, fixed specimen, classroom sample, product shot, or scene template.
