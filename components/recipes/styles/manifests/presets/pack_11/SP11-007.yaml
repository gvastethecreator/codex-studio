visualDna:
  aesthetic: Traditional old-school tattoo flash design language
  form_and_line: Bold black outlines, heavy contour weight, ribbony banners, coiled snakes
  color_palette: Red, Green, Yellow, Black shading, limited triad palette, spit-shaded gradients
  lighting_setup: Paper stain (coffee), vintage amber wash, warm sepia base, parchment glow
  material_texture: Watercolor paper, skin, flash-sheet tooth, poster-board grain, ink-bled edges
  render_quality: Bold flash-sheet rendering with high durability/readability logic
  spatial_distortion: 2D flat design, pinup proportions, dagger-and-heart motifs, talismanic layout
  atmosphere: Tough, classic, bold, salt-air romance, port-town grit, permanent devotion
  key_features: Pepper shading dots, banner typography, emblematic motif blocks, thick contour lock
  creative_brief: >-
    Design each motif as a standalone flash emblem: thick outlines, limited palette fills, and compact symbolic forms.
    Keep contrast and shape clarity high so marks remain legible at both sheet and tattoo scales. Apply Tattoo Flash as
    a portable style system over any input: preserve its construction grammar, material cues, scale logic, and signature
    rendering behavior while avoiding a required franchise, literal prop, fixed specimen, classroom sample, product
    shot, or scene template.
