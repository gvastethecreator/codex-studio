visualDna:
  aesthetic: >-
    Hand-molded dough-craft style with tactile imperfection, playful experimentation, and analog childlike
    sculpting energy
  subject_treatment: >-
    Pinched organic silhouettes, rolled-volume construction, uneven hand-shaped edges, and compression-led
    contour behavior
  color_and_tone: Bright mixed primaries with marbled blend transitions and matte craft-paste chroma softness
  lighting_and_shadow: Gentle diffused tabletop lighting emphasizing surface dents, soft shadows, and finger-formed volume relief
  texture_and_material: >-
    Dough-like matte grain, thumbprint impressions, crumbly micro-cracks, tool-scrape traces, and hand-warmed
    surface irregularity
  camera_and_composition: Smooshed uneven proportions with gravity-soft forms and non-uniform thickness distribution
  atmosphere_and_mood: Playful, messy, warm, experimental, joyful
  rendering_and_quality: >-
    Tactile craft-render finish prioritizing handmade honesty, texture legibility, and playful imperfect
    shaping
  key_features: Fingerprint topology, pinch-and-roll morphology, matte dough crackle cues, handmade asymmetry language
  creative_brief: >-
    Keep this preset grounded in tactile hand-sculpting evidence: finger marks, uneven compression, and matte
    dough behavior should carry the identity independent of any specific craft-table narrative. Apply Play-Doh
    Clay as a portable style system over any input: preserve its construction grammar, material cues, scale
    logic, and signature rendering behavior while avoiding a required franchise, literal prop, fixed specimen,
    classroom sample, product shot, or scene template.
avoidRules:
