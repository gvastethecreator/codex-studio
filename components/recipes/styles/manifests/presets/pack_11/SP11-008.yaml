  aesthetic: Stained-glass window art with lead-came segmentation
  subject_treatment: Thick black lead came, segmented contours, curvilinear divisions, interconnected cells
  color_and_tone: Vibrant translucent glass, jewel-tone spectrum, ruby-cobalt-emerald, sun-drenched saturation
  lighting_and_shadow: Backlit, glowing, sun-through-glass radiance, interior candle warmth, beam-fall drama
  texture_and_material: Glass imperfections, bubbles, rippled surface, wavy transparency, antique patina
  camera_and_composition: Mosaic segmentation, lead-line compartmentalization, piecemeal assembly, fractured-light unity
  atmosphere_and_mood: Spiritual, beautiful, light, reverent calm, sacred awe, transcendent glow
  rendering_and_quality: Ornamental luminous-glass rendering with structural lead-line clarity
  key_features: Black outlines mandatory, lead-came shadows, solder joints, textured glass surface
  creative_brief: >-
    Build imagery as interconnected glass cells framed by dark lead lines. Emphasize backlit translucency,
    jewel-tone contrast, and subtle glass imperfections so illumination feels material and architectural.
    Apply Stained Glass as a portable style system over any input: preserve its construction grammar, material
    cues, scale logic, and signature rendering behavior while avoiding a required franchise, literal prop,
    fixed specimen, classroom sample, product shot, or scene template.
