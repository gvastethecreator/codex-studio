visualDna:
  aesthetic: >-
    Victorian-industrial speculative style with brass-and-steam futurism, analog invention romance, and ornate
    mechanical worldbuilding
  subject_treatment: Gears, pipes, cog-train silhouettes, steam-vent contours, clock-face profiles
  color_and_tone: >-
    Brass, Copper, Brown leather, verdigris-patina green, steam-whistle silver, mahogany-wood, boiler-plate
    iron
  lighting_and_shadow: Gaslight, steam, mantle-flame glow, hissing-vent haze, Edison-bulb warmth, lantern-swing shadows
  texture_and_material: Metal, leather, steam, polished-brass luster, rivet-head bumps, pressure-gauge glass, oiled-gear teeth
  camera_and_composition: Clockwork parts, over-engineered joints, exposed-mechanism transparency, piston-in-sleeve precision
  atmosphere_and_mood: Adventure, invention, analog futurism, pressure-system tension, brass-and-steam coziness
  rendering_and_quality: Intricate, mechanical, gear-by-gear wonder, differential-engine complexity, aether-science elegance
  key_features: >-
    Cog-wheel motif language, pressure-gauge instrumentation, brass fittings, steam venting cues, mechanical
    ornament layering
  creative_brief: >-
    Apply ornate steam-mechanical grammar to the input: brass-copper assemblies, pressure instrumentation,
    exposed mechanisms, leather straps, and gaslight warmth should drive the style without requiring
    zeppelins, workshops, tea tables, or named literary references.
