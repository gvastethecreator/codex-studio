visualDna:
  aesthetic: Glossy 3D emoji/icon language for playful digital communication
  subject_treatment: Round, smooth, pill-shaped, sphere-based, soft extrusion
  color_and_tone: Bright Yellow, Blue, Red, vivid primaries, gradient-rich, punchy saturation
  lighting_and_shadow: Studio softbox, rim light, gradient sky reflection, glossy hotspot
  texture_and_material: Shiny plastic or glass, bubble-smooth surface, high-gloss lacquer, candy shell
  camera_and_composition: Sphere based, anthropomorphic objects, simplified features, chunky proportions
  atmosphere_and_mood: Happy, expressive, digital, instant communication, friendly warmth, pixel joy
  rendering_and_quality: Platform-agnostic polished icon render with toy-like gloss
  key_features: Glossy reflection, gradient highlight, white rim catchlight, squircle silhouette
  creative_brief: >-
    Model icons as simple rounded volumes with clean specular response and high readability. Keep expression
    and silhouette instantly legible at small sizes, using gradient highlights and soft shadows to reinforce
    friendly depth. Apply Emoji 3D as a portable style system over any input: preserve its construction
    grammar, material cues, scale logic, and signature rendering behavior while avoiding a required franchise,
    literal prop, fixed specimen, classroom sample, product shot, or scene template.
