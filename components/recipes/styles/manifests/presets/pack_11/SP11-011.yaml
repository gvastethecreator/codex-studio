visualDna:
  aesthetic: Synthwave-retro digital aesthetic with neon geometric minimalism, analog-video nostalgia, and stylized horizon futurism
  form_and_line: Vector-clean wireframe planes, triangular solar motifs, parallel grid recurrences, crisp retro-computational contours
  color_palette: High-voltage magenta-cyan axis, deep violet shadows, near-black base fields, selective chrome white accents
  lighting_setup: Emissive neon washes, bloom-forward gradient transitions, controlled halo response, reflective horizon glow
  material_texture: CRT phosphor bloom, subtle scanline interference, VHS-era grain noise, glossy chrome edge catches
  render_quality: Polished outrun visual finish with poster clarity, era-authentic digital artifacting, and sharp retro-wave discipline
  spatial_distortion: Infinite perspective grid pull with horizon compression and mirrored depth cues for stylized forward momentum
  atmosphere: Nostalgic, electric, melancholic, kinetic, euphoric
  key_features: Neon gradient staging, wireframe depth lattice, triangular solar iconography, analog-video patina, chromed accent rhythm
  creative_brief: >-
    Preserve a recognizable synthwave language through gradient voltage,
    geometric horizon systems, and analog display artifacts rather than any
    fixed narrative roadway scene.
