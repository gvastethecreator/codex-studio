visualDna:
  aesthetic: Kawaii pastel mascot illustration language with high-cute stylization
  subject_treatment: Thick soft lines, rounded-rubber-hose curves, marshmallow-contours, plushie-silhouette
  color_and_tone: Pastel Pink, Blue, Yellow, cotton-candy-spectrum, mint-chip, lavender-cream, buttercream, powder-blue sky
  lighting_and_shadow: Bright, flat, ring-light softness, studio-bounce fill, high-key-whites, shadowless-cheer
  texture_and_material: Smooth, fluffy, marshmallow-soft, fondant-gloss, sherbet-grain, cotton-ball fuzz
  camera_and_composition: Big eyes, sparkle-pupil, oversized-head, tiny-body, chibi-extremity, bean-proportion
  atmosphere_and_mood: Joy, innocence, pastel-paradise, friendship-festival, sugar-rush delight, unconditional-sweetness
  rendering_and_quality: Soft polished mascot finish with sticker-friendly clarity
  key_features: Sparkles, ribbon-bows, heart-motifs, blush-stickers, star-twinkle accents, animal-ear headbands
  creative_brief: >-
    Prioritize rounded silhouettes, pastel harmony, and expression-first facial design. Keep proportions
    chibi-extreme and emotionally positive while avoiding scene-locked motifs so the style adapts across many
    character concepts. Apply Kawaii Pastel as a portable style system over any input: preserve its
    construction grammar, material cues, scale logic, and signature rendering behavior while avoiding a
    required franchise, literal prop, fixed specimen, classroom sample, product shot, or scene template.
avoidRules:
