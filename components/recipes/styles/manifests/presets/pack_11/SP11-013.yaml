  aesthetic: Diesel-industrial retrofuturism with heavy mechanical massing, soot-era infrastructure, and oppressive analog power aesthetics
  form_and_line: Rivets, heavy metal plates, cast-iron curves, bolted seams, industrial silhouettes
  color_palette: Oil, Grease, Steel, Rust, soot-black, oxidized copper, military-olive stain, burnt-sienna corrosion
  lighting_setup: Sooty, dark, industrial, caged-bulb gloom, exhaust-haze diffusion, furnace-glow warmth
  material_texture: Grime, smoke, metal, cold-stamped steel, oil-slick puddles, sweat-stained leather, caked rust
  render_quality: Dense mechanical rendering with piston-era complexity, high material wear readability, and monumental industrial gravity
  spatial_distortion: Bulky machinery, oversized engines, vertical oppression, crushing-mass architecture
  atmosphere: Dirty, loud, powerful, oppressive weight, grinding fatigue, iron-willed endurance
