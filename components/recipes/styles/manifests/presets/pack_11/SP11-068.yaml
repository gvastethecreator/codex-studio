  creative_brief: Chlorophyll glows emerald under backlight that transforms the leaf blade into a stained-glass window of the forest floor, the midrib a central spine of transport and structure. Secondary veins branch outward into areole-polygon mesh, a distribution network that delivers sugar and extracts water with the efficiency of a logistical masterpiece refined by photosynthesis. Hold a leaf to the sun and you hold a map of the tree's circulatory system, chloroplast-glow revealing the architecture of green life.
