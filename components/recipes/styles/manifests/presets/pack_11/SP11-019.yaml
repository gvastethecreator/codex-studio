visualDna:
  aesthetic: Handmade broadcast texture system where any subject becomes soft, stitched, fuzzy, visibly operated, and warmly stage-lit
  form_and_line: Rounded cut-fabric contours, sock-like volume breaks, seam-guided silhouettes, elastic wobble arcs, simplified expressive geometry
  color_palette: Primary felt blocks, craft-store brights, saturated fleece accents, warm studio neutrals, tiny black button contrast
  lighting_setup: Friendly multi-camera studio light with soft key-fill balance, gentle rim glow, and practical set warmth without requiring a stage
  material_texture: Felt nap, fleece fuzz, foam padding, visible stitching, brushed fabric grain, handmade edge irregularity
  render_quality: Tactile, imperfect, playful, low-tech, performance-driven, with intentional handcraft evidence in every surface
  spatial_distortion: Mouth-flap compression, rod-like gesture arcs, slight squash at joints, fabric slouch, shallow theatrical depth
  atmosphere: Warm, comedic, approachable, nostalgic, handmade, emotionally legible
  key_features: Fuzzy contour halos, seam punctuation, button-eye abstraction, foam volume, felt color blocking, soft jaw-like deformation
  creative_brief: >-
    Transform the input into a handmade broadcast-material treatment: felt nap, foam softness, seam rhythm, and operated-expression timing should define the image. The result should feel tactile and performed, without requiring literal puppets, sets, rods, or franchise references.
