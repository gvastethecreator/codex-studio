visualDna:
  aesthetic: >-
    Pop silkscreen impact system using mechanical reproduction, celebrity-scale flatness, commodity color, and graphic
    repetition
  form_and_line: Ben-Day dots, thick contour separation, screen-registration offsets, posterized planes, repeated frame logic
  color_palette: Tomato red, electric yellow, cyan blocks, hot pink, black ink, cream paper, deliberately offset CMYK
  lighting_setup: Flattened print light with almost no modeled depth, hard color field contrast, and ink-density emphasis
  material_texture: Screenprint ink, paper tooth, halftone grain, misregistration edges, cheap poster gloss
  render_quality: Bold, reproducible, graphic, mechanically printed, iconic, high contrast, deliberately artificial
  spatial_distortion: Color-channel offset, serial repetition, halftone scale shifts, cropped icon flattening, print misalignment
  atmosphere: Commercial, ironic, loud, iconic, mass-produced, playful
  key_features: Halftone fields, CMYK separation, registration slips, posterized shadow, repeated icon blocks, ink bleed
  creative_brief: >-
    Make the subject feel mechanically reproduced and culturally amplified: halftone, flat commodity color, registration
    errors, and serial pop rhythm should carry the style. Avoid forcing celebrity portraits, soup cans, comic panels, or
    named artworks. Apply Silkscreen Icon Impact as a portable style system over any input: preserve its construction
    grammar, material cues, scale logic, and signature rendering behavior while avoiding a required franchise, literal
    prop, fixed specimen, classroom sample, product shot, or scene template.
avoidRules:
  - subtle
