visualDna:
  aesthetic: >-
    Memphis-informed anti-minimal pattern system with geometric jokes, surface collision, and playful design
    contradiction
  subject_treatment: >-
    Squiggles, triangles, terrazzo speckles, checker fragments, zany circles, offset blocks, zigzag
    punctuation
  color_and_tone: Hot pink, teal, primary yellow, traffic-cone orange, matte black, white, acid accents, cobalt depth
  lighting_and_shadow: >-
    Flat product-design illumination with crisp shape boundaries, minimal shadows, and pattern-first
    readability
  texture_and_material: Laminate gloss, terrazzo chips, matte plastic, printed pattern fields, synthetic tabletop tactility
  camera_and_composition: >-
    Pattern scale jumps, floating shape collisions, anti-grid balance, shallow design-stage depth, playful
    visual imbalance
  atmosphere_and_mood: Playful, decorative, contrarian, optimistic, ironic, loud
  rendering_and_quality: Bold, cheeky, graphic, design-object sharp, deliberately over-patterned, high-contrast
  key_features: >-
    Squiggle motifs, checkerboard fragments, terrazzo noise, primary blocks, black outline accents,
    anti-minimal composition
  creative_brief: >-
    Use Memphis as a pattern-behavior engine: clashing primitives, synthetic surfaces, terrazzo noise, and
    playful anti-minimal balance should style any subject. Avoid making the image merely furniture, interiors,
    or design showroom scenes.
avoidRules:
  - realistic
  - 3d
