visualDna:
  aesthetic: Memphis-informed anti-minimal pattern system with geometric jokes, surface collision, and playful design contradiction
  form_and_line: Squiggles, triangles, terrazzo speckles, checker fragments, zany circles, offset blocks, zigzag punctuation
  color_palette: Hot pink, teal, primary yellow, traffic-cone orange, matte black, white, acid accents, cobalt depth
  lighting_setup: Flat product-design illumination with crisp shape boundaries, minimal shadows, and pattern-first readability
  material_texture: Laminate gloss, terrazzo chips, matte plastic, printed pattern fields, synthetic tabletop tactility
  render_quality: Bold, cheeky, graphic, design-object sharp, deliberately over-patterned, high-contrast
  spatial_distortion: Pattern scale jumps, floating shape collisions, anti-grid balance, shallow design-stage depth, playful visual imbalance
  atmosphere: Playful, decorative, contrarian, optimistic, ironic, loud
  key_features: Squiggle motifs, checkerboard fragments, terrazzo noise, primary blocks, black outline accents, anti-minimal composition
  creative_brief: >-
    Use Memphis as a pattern-behavior engine: clashing primitives, synthetic surfaces, terrazzo noise, and playful anti-minimal balance should style any subject. Avoid making the image merely furniture, interiors, or design showroom scenes.
