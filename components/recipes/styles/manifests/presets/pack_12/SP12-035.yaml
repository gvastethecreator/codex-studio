  aesthetic: Co-op defense sobre tren blindado en fantasía bélica, con progreso por vagones y eventos de asedio móvil.
  subject_treatment: Defensores por rol elemental (control, ruptura, soporte, anti-swarm) con identidad visual clara.
  color_and_tone: Acero oscuro, oro heroico y azul nocturno para codificar ofensiva, defensa y estado crítico.
  lighting_and_shadow: Chispas de riel, magia en tránsito y sombras dinámicas por velocidad del convoy.
  texture_and_material: Hierro remachado, madera envejecida, cuero reforzado y mecanismos de artillería ritual.
  camera_and_composition: Perspectiva de avance con amenazas frontales y laterales por carril de vagón.
  atmosphere_and_mood: Urgente, cooperativa y épica en movimiento constante.
  rendering_and_quality: Mission art gameplay-first con legibilidad de objetivos por vagón, daño y prioridad enemiga.
