visualDna:
  aesthetic: Pixel-RPG hub social de 16-bit, centrado en loops de quest, comercio y descanso narrativo.
  subject_treatment: NPCs por arquetipo (quest giver, vendor, lore) con silueta de tile y animación idle/readable.
  color_and_tone: Madera cálida, cobre, velas y acentos de UI diegética para POIs.
  lighting_and_shadow: Iluminación interior suave en banding de píxel, con contraste suficiente para navegación.
  texture_and_material: Clusters limpios, dithering controlado y tiles modulares sin ruido ambiguo.
  camera_and_composition: Side-view de hub con circulación clara entre menú, tienda, crafting y salida de mapa.
  atmosphere_and_mood: Acogedora, social y curiosa, con sensación de progreso seguro.
  rendering_and_quality: Pixel pipeline de alta legibilidad con tileset reusable y jerarquía visual por interacción.
