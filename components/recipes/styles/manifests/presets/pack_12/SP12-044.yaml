visualDna:
  aesthetic: Gramática social-stealth ilusoria con engaño, acceso por estatus, fuga limpia y prestigio peligroso.
  subject_treatment: Convierte el input en espía ceremonial, máscara de estatus, gadget discreto o nodo de vigilancia social.
  color_and_tone: Oro suave, azul nocturno y púrpura real para codificar zonas de prestigio y riesgo.
  lighting_and_shadow: Candelabros refractados en múltiples planos para crear coberturas y falsos positivos visuales.
  texture_and_material: Cristal facetado, seda de alto rango, mármol pulido y metal de ornamento funcional.
  camera_and_composition: Rutas ocultas, vigilancia y extracción en planos reflectivos; palacio o gala son anclas opcionales.
  atmosphere_and_mood: Glamorosa, engañosa y socialmente tensa.
  rendering_and_quality: 'Stealth-gala gameplay screencap: patrol loops, cover, access doors, illusion risks readable.'
  creative_brief: >-
    Aplica Mirage Palace Stealth Gala como gramatica original de videojuego sobre cualquier input: conserva su sistema
    de genero, silueta, materiales, camara, color y tension jugable, pero traduce personaje, objeto, criatura,
    arquitectura o abstraccion sin exigir escenario literal, faccion, mapa, combate, texto legible ni set-piece
    fijo.
