visualDna:
  aesthetic: Gramática vehicular-combat postapocalíptica con desgaste logístico, siluetas mech/convoy y lectura de largo alcance.
  subject_treatment: >-
    Si el input incluye personaje, objeto o criatura, mecanizarlo con indicios mech, blindaje, suspensión o escolta
    modular; si ya hay vehículo/mech, reforzar clase y función.
  color_and_tone: Ocre quemado, hierro oxidado y cielo de desecación extrema con contraste táctico mínimo.
  lighting_and_shadow: Sol cenital duro, polvo suspendido y scintillation térmica para sensación de calor operativo.
  texture_and_material: Metal corroído, lonas reparadas, caucho degradado y abrasión granular persistente.
  camera_and_composition: >-
    Encuadre ancho de ruta sugerida con lanes, flancos y amenazas de horizonte como lenguaje compositivo, no como
    desierto obligatorio.
  atmosphere_and_mood: Supervivencia mecanizada, desgaste continuo y disciplina de avance bajo presión.
  rendering_and_quality: "In-engine convoy gameplay frame: readable mech scale, dust lanes, mobility-combat systems."
  creative_brief: >-
    Aplica Desert Mech Convoy como gramatica original de videojuego sobre cualquier input: conserva su sistema de
    genero, silueta, materiales, camara, color y tension jugable, pero traduce personaje, objeto, criatura, arquitectura
    o abstraccion sin exigir escenario literal, faccion, mapa, combate, texto legible ni set-piece fijo.
