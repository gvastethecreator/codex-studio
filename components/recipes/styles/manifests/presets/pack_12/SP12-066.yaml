visualDna:
  aesthetic: Abyssal transit-horror language centered on confined infrastructure failure and unseen predatory presence.
  subject_treatment: Civilian vulnerability silhouettes, fragmented survivor groupings, and implied non-human threat through spatial absence.
  color_and_tone: Pressure-depth blues, blackout blacks, arterial emergency reds, and sickly desaturated neutrals under panic lighting.
  lighting_and_shadow: Intermittent emergency flicker, hard strobe interruptions, low-visibility recesses, and silhouette-breaking backflares.
  texture_and_material: Brine-streaked steel panels, condensation-heavy glazing, corroded fasteners, wet flooring film, and mineral salt crusting.
  camera_and_composition: Tight carriage sightlines with choke-point framing, foreground obstruction, and vanishing-depth anxiety construction.
  atmosphere_and_mood: Claustrophobic dread, escalating paranoia, and survival-driven urgency.
  rendering_and_quality: High-intensity survival-horror concept fidelity with cinematic tension control and environment-first fear readability.
