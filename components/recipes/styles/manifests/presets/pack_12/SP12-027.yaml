visualDna:
  aesthetic: Gramática co-op extraction shooter minera con objetivos, evacuación, polvo mineral y supervivencia de escuadra.
  subject_treatment: Reinterpreta el input como operario pesado, tool-weapon, recurso, amenaza o equipo de extracción modular.
  color_and_tone: Cobre oscuro, verde radar y naranja industrial para lectura de objetivo y estado de equipo.
  lighting_and_shadow: Cascos iluminados, focos de maquinaria y sombras profundas de túnel activo.
  texture_and_material: Roca fracturada, polvo mineral denso, acero rugoso y marcas de perforación reciente.
  camera_and_composition: Objetivos a distancia, rutas de retorno y zonas de emboscada legibles; túnel o mina son anclas opcionales.
  atmosphere_and_mood: Labor extrema, camaradería funcional y riesgo continuo.
  rendering_and_quality: 'Co-op extraction gameplay frame: objective marker, threat direction, tunnel route, team gear clear.'
  creative_brief: >-
    Aplica Deep Mine Co-op Extraction como gramatica original de videojuego sobre cualquier input: conserva su sistema
    de genero, silueta, materiales, camara, color y tension jugable, pero traduce personaje, objeto, criatura,
    arquitectura o abstraccion sin exigir escenario literal, faccion, mapa, combate, texto legible ni set-piece
    fijo.
