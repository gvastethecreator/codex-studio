  aesthetic: Gramática arcade-racer futurista de alta velocidad con boost feedback, trazas holográficas y lectura de trayectoria.
  subject_treatment: Si el input admite vehículo, convertirlo en chasis anti-gravedad por clase; si no, aplicar perfiles de velocidad, paneles aerodinámicos y señales de handling.
  color_and_tone: Azul eléctrico y violeta dominante, con blanco energético para boost-state y timing windows.
  lighting_and_shadow: Neón barrido, trails vectoriales y destellos de checkpoint para ritmo competitivo.
  texture_and_material: Fibra de carbono, vidrio inteligente, asfaltos húmedos y señalética holográfica funcional.
  camera_and_composition: Curvas, apex, carriles y capas de obstáculo como abstracción de velocidad; no requiere pista urbana ni grand prix.
  atmosphere_and_mood: Adrenalina limpia, espectáculo competitivo y precisión de conducción.
  rendering_and_quality: "Racing gameplay screencap: track apex, boost economy, rival spacing, speed feedback readable."
