visualDna:
  aesthetic: Gramática space-trade RPG con economía faccional, diplomacia armada, lujo logístico y rutas interestelares.
  subject_treatment: >-
    Aplica identidad mercantil/escolta, corporación, sindicato o casa comercial al input; naves, carga o puerto son
    anclas opcionales.
  color_and_tone: Oro solar, púrpura espacial y azul profundo para marcar riqueza, neutralidad y conflicto.
  lighting_and_shadow: Contraluz cósmico, balizas de muelle y focos de inspección de carga por zona.
  texture_and_material: Cascos nacarados, metal bruñido, textiles ceremoniales y superficies de carga modular.
  camera_and_composition: Rutas de tránsito, negociación y disputa como lectura compositiva; no exigir hub, puerto ni muelle físico.
  atmosphere_and_mood: Ambiciosa, diplomática y volátil.
  rendering_and_quality: 'Trade-RPG gameplay screencap: route control, cargo stakes, reputation pressure, faction economy visible.'
  creative_brief: >-
    Aplica Celestial Harbor Trade Wars como gramatica original de videojuego sobre cualquier input: conserva su sistema
    de genero, silueta, materiales, camara, color y tension jugable, pero traduce personaje, objeto, criatura,
    arquitectura o abstraccion sin exigir escenario literal, faccion, mapa, combate, texto legible ni set-piece
    fijo.
