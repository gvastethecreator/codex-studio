visualDna:
  aesthetic: >-
    Gramática action-adventure steampunk aérea con verticalidad, mecanismos de abordaje y exploración por nodos
    flotantes.
  subject_treatment: >-
    Reinterpreta el input con rol corsair/engineer/pilot cuando aplique, o con arneses, hélices, presión, poleas y
    animación mecánica legible.
  color_and_tone: Cobre viejo, azul tormenta y crema envejecido para codificar tecnología victoriana-fantástica.
  lighting_and_shadow: Luz oblicua entre vapor de caldera, con silhouettes de casco y lectura de altura/plataformas.
  texture_and_material: Remaches, latón aceitado, madera barnizada y lona de dirigible con desgaste funcional.
  camera_and_composition: Triangulación de objetivos visuales, verticalidad clara y flow de misión; nave, torre o ruta son anclas opcionales.
  atmosphere_and_mood: Aventura de alto riesgo, ambición imperial y dinamismo de frontera aérea.
  rendering_and_quality: "Playable sky-armada screencap: flight paths, boarding vectors, navigation puzzle state clear."
  creative_brief: >-
    Aplica Clockwork Sky Armada como gramatica original de videojuego sobre cualquier input: conserva su sistema de
    genero, silueta, materiales, camara, color y tension jugable, pero traduce personaje, objeto, criatura, arquitectura
    o abstraccion sin exigir escenario literal, faccion, mapa, combate, texto legible ni set-piece fijo.
