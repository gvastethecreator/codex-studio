visualDna:
  aesthetic: Gramática co-op siege medieval-fantasy con defensa por oleadas, presión escalada y ornamentación gótica funcional.
  subject_treatment: >-
    Reinterpreta el input como party, fortificación, reliquia o amenaza de asedio; roles tank/heal/range/control deben
    aparecer sólo cuando ayudan a la lectura.
  color_and_tone: Grises ceniza, rojo brasa y oro apagado para diferenciar estado de fortificación y daño acumulado.
  lighting_and_shadow: Antorchas locales + cielo de tormenta para alternar zonas seguras y puntos de riesgo.
  texture_and_material: Piedra erosionada, vitrales rotos, metal fatigado y restos de barricada reutilizable.
  camera_and_composition: Objective hub, flancos activos y rutas de oleada telegráficas como composición; no exigir catedral ni nave central.
  atmosphere_and_mood: Presión sostenida, heroísmo cooperativo y resistencia de último tramo.
  rendering_and_quality: Raid-endgame visual con excelente readability de objetivos, flujos enemigos y ventanas de cooldown.
  creative_brief: >-
    Aplica Ruined Cathedral Co-op Siege como gramatica original de videojuego sobre cualquier input: conserva su sistema
    de genero, silueta, materiales, camara, color y tension jugable, pero traduce personaje, objeto, criatura,
    arquitectura o abstraccion sin exigir escenario literal, faccion, mapa, combate, UI, texto legible ni set-piece
    fijo.
