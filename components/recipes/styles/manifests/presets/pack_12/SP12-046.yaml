visualDna:
  aesthetic: Gramática open-world nomad-sci-fi con logística móvil, ruta solar, tecnología recuperada y comunidad itinerante.
  subject_treatment: Transforma el input en clan viajero, oficio itinerante, módulo de campamento, vehículo o nodo de recarga.
  color_and_tone: Amarillo solar, rojo óxido y azul polvoriento para mapear energía, desgaste y horizonte.
  lighting_and_shadow: Tarde cálida con destellos fotovoltaicos que marcan nodos de recarga y actividad.
  texture_and_material: Lona resistente, paneles reparados, madera recompuesta y metal reciclado.
  camera_and_composition: Circulación, abastecimiento, taller y guardia como zonas visuales; campamento y riel son opcionales.
  atmosphere_and_mood: Esperanzada, austera y resiliente.
  rendering_and_quality: 'Nomad logistics gameplay screencap: supply flow, security lanes, rail camp circulation visible.'
  creative_brief: >-
    Aplica Solar Rail Nomad Camp como gramatica original de videojuego sobre cualquier input: conserva su sistema de
    genero, silueta, materiales, camara, color y tension jugable, pero traduce personaje, objeto, criatura, arquitectura
    o abstraccion sin exigir escenario literal, faccion, mapa, combate, texto legible ni set-piece fijo.
