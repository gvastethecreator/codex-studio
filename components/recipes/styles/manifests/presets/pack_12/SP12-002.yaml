visualDna:
  aesthetic: Gramática extraction-shooter bioluminiscente con stealth orgánico, rastreo térmico y hostilidad alienígena nocturna.
  subject_treatment: Transforma el input en lectura de presa/equipo/ruta con perfiles térmicos, señales aliado-enemigo y camuflaje vivo sin exigir una jungla literal.
  color_and_tone: Verdes bioluminiscentes y azules tinta con acentos de señalización táctica para rutas seguras.
  lighting_and_shadow: Luz orgánica puntual + niebla volumétrica para ocultamiento parcial y ventanas de visibilidad situacional.
  texture_and_material: Corteza húmeda, hojas translúcidas, barro pesado y fluidos vegetales reactivos al movimiento.
  camera_and_composition: Capas de cobertura orgánica, líneas de visión quebradas, diagonales de emboscada y ventanas de extracción sugeridas.
  atmosphere_and_mood: Cacería silenciosa, paranoia ambiental y descubrimiento biológico de alto riesgo.
  rendering_and_quality: "Gameplay screencap from active jungle raid: terrain reads, target priority, co-op encounter cues."
