visualDna:
  aesthetic: Gramática survival sandbox ártica con refugio precario, crafting, trueque, expedición y contraste térmico.
  subject_treatment: >-
    Reinterpreta el input como trader, hunter, scout, recurso o estación improvisada; usar equipo térmico y perfiles de
    clase sólo cuando aporten lectura.
  color_and_tone: Azul glaciar, ámbar cálido y gris humo para separar refugio de amenaza exterior.
  lighting_and_shadow: Fuentes puntuales de farol sobre blizzard denso, con contraste funcional de zonas seguras.
  texture_and_material: Hielo rayado, lona pesada, madera húmeda y metal congelado por uso extremo.
  camera_and_composition: Hub de supervivencia con puntos de misión, recursos y salida a whiteout como estructura flexible, no bazaar literal.
  atmosphere_and_mood: Refugio precario, cooperación tensa y supervivencia nocturna prolongada.
  rendering_and_quality: 'Survival hub screencap: resource economy, prep choices, trader-hunter roles, cold pressure readable.'
  creative_brief: >-
    Aplica Frozen Bazaar Survival Night como gramatica original de videojuego sobre cualquier input: conserva su sistema
    de genero, silueta, materiales, camara, color y tension jugable, pero traduce personaje, objeto, criatura,
    arquitectura o abstraccion sin exigir escenario literal, faccion, mapa, combate, texto legible ni set-piece
    fijo.
