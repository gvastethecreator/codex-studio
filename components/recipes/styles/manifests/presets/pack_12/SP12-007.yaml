visualDna:
  aesthetic: >-
    Gramática tactical-shooter polar con control por sectores, movilidad vertical, visibilidad térmica y clima como
    sistema.
  subject_treatment: >-
    Aplica roles breacher/sniper/support o equipo térmico al input cuando corresponda; si no, usar anclajes, capas
    antideslizantes y señales operativas.
  color_and_tone: Cian gélido, acero oscuro y naranjas de instrumentación para visibilidad operacional.
  lighting_and_shadow: Nublado difuso con destellos de artillería y blancos de nieve que alteran contraste perceptivo.
  texture_and_material: Hielo compacto, nieve pisada, escarcha en blindaje y superficies antideslizantes de combate.
  camera_and_composition: Vista oblicua sectorizada con rutas A/B/C, choke points y líneas de fuego como lectura táctica flexible.
  atmosphere_and_mood: Resistencia extrema, precisión táctica y desgaste ambiental continuo.
  rendering_and_quality: "Assault mission screencap: topographic lanes, breach points, squad objective flow clear."
  creative_brief: >-
    Aplica Glacier Fortress Assault como gramatica original de videojuego sobre cualquier input: conserva su sistema de
    genero, silueta, materiales, camara, color y tension jugable, pero traduce personaje, objeto, criatura, arquitectura
    o abstraccion sin exigir escenario literal, faccion, mapa, combate, texto legible ni set-piece fijo.
