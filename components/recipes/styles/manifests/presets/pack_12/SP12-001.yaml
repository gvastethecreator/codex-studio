visualDna:
  aesthetic: Action RPG ciberpunk neo-noir orientado a infiltración urbana nocturna y lectura táctica por silueta.
  subject_treatment: Operadores player-class con kit modular legible por rol (assault, recon, tech) y jerarquía visual clara.
  color_and_tone: Dúo cian-magenta sobre negros aceitosos, con codificación cromática de facción y threat level.
  lighting_and_shadow: Iluminación diegética de neón con pockets de sombra para stealth readability y rim de detección.
  texture_and_material: Asfalto mojado PBR, metal cepillado, vidrio sucio y holografía de baja persistencia tipo HUD-world.
  camera_and_composition: Cámara third-person táctica con lanes de navegación, choke points y puntos de cobertura reconocibles.
  atmosphere_and_mood: Tensión operativa, vigilancia constante y ritmo de incursión de alto riesgo.
  rendering_and_quality: Key art AAA con pipeline de legibilidad gameplay-first, contraste de objetivo y nitidez de interacción.
