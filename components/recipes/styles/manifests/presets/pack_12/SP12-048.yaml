  color_and_tone: Electric cyan cores, clinical whites, lilac haze transitions, and steel-cool neutrals with alert-state accents.
  lighting_and_shadow: Distributed platform luminaires, reflective canopy spill, holographic signage glow, and controlled hard-edge shadows.
