visualDna:
  aesthetic: Gramática tower-defense rural sci-fi con carriles vivos, automatización agrícola y economía de recursos.
  subject_treatment: >-
    Convierte el input en drone agrícola, torre, cultivo defensivo, ingeniero o unidad de oleada según su función
    visual.
  color_and_tone: Verdes vibrantes, naranja industrial y blanco solar para distinguir producción y combate.
  lighting_and_shadow: Tarde cálida con highlights de sensores y señalización activa de torres.
  texture_and_material: Fruta cerosa, metal esmaltado, tierra húmeda y tubería de riego inteligente.
  camera_and_composition: Lanes defensivos, choke-points y nodos de upgrade; orchard y cultivo son anclas opcionales.
  atmosphere_and_mood: Ingenio comunitario, urgencia agrícola y resistencia cooperativa.
  rendering_and_quality: 'Tower-defense gameplay frame: wave direction, orchard range, robot state, structure health readable.'
  creative_brief: >-
    Aplica Robot Orchard Defense como gramatica original de videojuego sobre cualquier input: conserva su sistema de
    genero, silueta, materiales, camara, color y tension jugable, pero traduce personaje, objeto, criatura, arquitectura
    o abstraccion sin exigir escenario literal, faccion, mapa, combate, texto legible ni set-piece fijo.
