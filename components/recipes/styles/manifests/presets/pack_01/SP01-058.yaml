visualDna:
  aesthetic: Simple composition
  form_and_line: Negative space
  color_palette: Two or three tones
  lighting_setup: Flat
  material_texture: Smooth
  render_quality: Fine art, graphic
  spatial_distortion: None
  atmosphere: Calm, empty
  key_features: Isolation
  creative_brief: >-
    One thing, one place, one thought: the frame breathes around its subject like silence around a struck bell. An
    economy of tones whispers where abundance would shout, the isolated form suspended in a field of stillness that
    makes it more present by subtraction. The image does not merely illustrate emptiness but practices it, every absent
    element an act of disciplined love for what remains. Apply this photographic look over any input: preserve lens
    behavior, exposure logic, color response, framing discipline, and artifact pattern while avoiding a required place,
    face, travel scene, landscape, or narrative setup.
