visualDna:
  aesthetic: Smartphone front-facing camera selfie, social media aesthetic, casual and spontaneous
  subject_treatment: Wide-angle facial distortion (slightly enlarged nose/eyes), arm extended out of frame
  color_and_tone: Smartphone image processing, vibrant colors, slightly over-sharpened
  lighting_and_shadow: Flat front-facing light, screen glow, or harsh direct sunlight
  texture_and_material: Digital smoothing algorithms, slight digital noise in shadows
  camera_and_composition: Extreme wide-angle perspective, high or low angle, casual framing
  atmosphere_and_mood: Fun, personal, candid, relatable, modern
  rendering_and_quality: Social media quality, realistic smartphone photo look
  creative_brief: The arm extends, the lens warps, and intimacy arrives through that familiar distortion born from holding a screen at reading distance, features elongated into the vernacular of the era. Digital alchemy smooths and sharpens in the same breath, screen glow filling shadows with the democratic light of every front-facing camera. Casualness performed as the highest art, the self-portrait stripped of ceremony yet loaded with the immediacy of now.
