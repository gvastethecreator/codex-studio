visualDna:
  aesthetic: Artistic double exposure photography, portrait blended seamlessly with nature or cityscapes
  subject_treatment: Ghostly overlay of forms, subject's silhouette filled with secondary imagery
  color_and_tone: Dreamy and mixed color palette, ethereal tones, low contrast blending
  lighting_and_shadow: High key lighting base, complex overlapping shadows and highlights
  texture_and_material: Multiple exposure textures, blending of skin and environmental textures (e.g., trees, buildings)
  camera_and_composition: Surreal blending of two distinct perspectives, creative masking
  atmosphere_and_mood: Dreamy, conceptual, surreal, poetic, melancholic
  rendering_and_quality: Fine art photography, seamless blending, highly detailed
  creative_brief: One world bleeding through another, a forest growing inside a profile, city towers rising from the architecture of a jawline, the boundary between interior and exterior dissolved into a single luminous membrane. Memory and matter occupy the same ghostly register, the mind's landscape rendered visible across skin and bone. Consciousness made transparent, two perspectives fused into a poetic confession where what lies within finally surfaces.
