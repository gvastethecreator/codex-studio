  render_quality: Cinematic, moody
  spatial_distortion: Red halation glow
  atmosphere: Nocturnal, moody
  key_features: Red halos
  creative_brief: >-
    Tungsten-balanced darkness with red halation blooming around every hard light source. Highlights bleed like crimson
    chemical halos into cool shadow, while medium grain keeps image tactile and cinematic. The style is nocturnal sensor
    poetry, not a requirement for city streets. Apply this photographic look over any input: preserve lens behavior,
    exposure logic, color response, framing discipline, and artifact pattern while avoiding a required place, face,
    travel scene, landscape, or narrative setup.
