  spatial_distortion: Flattened perspective
  atmosphere: Epic, overview
  key_features: Bird's eye view
  creative_brief: >-
    Altitude converts subject into design: flattened perspective, top-down geometry, maplike spacing, long-shadow logic,
    and crisp digital survey detail. Use drone grammar to abstract any scene or object into pattern; no rivers, roads,
    fields, travel vista, or natural landscape required. Apply this photographic look over any input: preserve lens
    behavior, exposure logic, color response, framing discipline, and artifact pattern while avoiding a required place,
    face, travel scene, landscape, or narrative setup.
