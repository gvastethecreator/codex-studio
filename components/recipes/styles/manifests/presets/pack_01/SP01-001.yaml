visualDna:
  aesthetic: High-end professional studio headshot lighting grammar, clean corporate polish, controlled realism
  subject_treatment: Tack-sharp focal plane on primary details, precise edge definition, natural proportions
  color_and_tone: >-
    True-to-life neutral material tones, balanced color grading, subtle gradients, solid seamless grey
    background
  lighting_and_shadow: >-
    Studio strobe lighting, softbox illumination, classic butterfly-light pattern, controlled specular
    highlights
  texture_and_material: Hyper-realistic surface texture, fine micro-detail, crisp fabric or material definition
  camera_and_composition: Shot on 85mm or 105mm portrait lens, flat field of view, undistorted perspective, centered composition
  atmosphere_and_mood: Professional, confident, approachable, clean, formal
  rendering_and_quality: 8k resolution, commercial photography polish, flawless retouching, photorealistic
  creative_brief: >-
    Apply polished studio-headshot discipline to any subject: neutral seamless backdrop, precise softbox
    sculpting, realistic surface detail, centered authority, and clean commercial retouching without requiring
    a human face.
