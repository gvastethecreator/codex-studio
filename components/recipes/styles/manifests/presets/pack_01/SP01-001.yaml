visualDna:
  aesthetic: High-end professional studio headshot photography, corporate portraiture, clean and polished look
  subject_treatment: Tack-sharp focus on the eyes and facial features, precise edge definition, natural proportions
  color_and_tone: True-to-life neutral skin tones, balanced color grading, subtle gradients, solid seamless grey background
  lighting_and_shadow: Studio strobe lighting, softbox illumination, classic butterfly lighting pattern, flattering catchlights in the eyes
  texture_and_material: Hyper-realistic skin texture, visible pores, fine hair details, crisp fabric textures
  camera_and_composition: Shot on 85mm or 105mm portrait lens, flat field of view, undistorted perspective, centered composition
  atmosphere_and_mood: Professional, confident, approachable, clean, formal
  rendering_and_quality: 8k resolution, commercial photography standard, flawless retouching, photorealistic
  creative_brief: The portrait radiates quiet authority and approachability, as if captured in the brief moment between expressions where authenticity lives. Light wraps the subject with deliberate precision, sculpting form while preserving the subtle imperfections that make a face unforgettable. Every texture tells a story—the weave of fabric, the grain of skin, the sparkle in an eye that holds the viewer's gaze.
