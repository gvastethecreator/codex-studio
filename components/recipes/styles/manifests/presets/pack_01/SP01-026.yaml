  lighting_setup: Long exposure motion blur
  material_texture: Diffraction blur
  render_quality: Dreamy, experimental
  spatial_distortion: Infinite depth of field (soft)
  atmosphere: Surreal, time passing
  key_features: Soft focus
  creative_brief: >-
    Vision stripped of optics, where light seeps through a needle's wound and time pools on the surface. Edges dissolve
    into dreaming, the world seen as if through memory rather than glass. Every frame exhales the patience of a long
    exposure, moments bleeding into one another like watercolor on wet paper. Apply this photographic look over any
    input: preserve lens behavior, exposure logic, color response, framing discipline, and artifact pattern while
    avoiding a required place, face, travel scene, landscape, or narrative setup.
