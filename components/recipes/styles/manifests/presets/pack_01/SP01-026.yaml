  lighting_and_shadow: Long exposure motion blur
  texture_and_material: Diffraction blur
  camera_and_composition: Infinite depth of field (soft)
  atmosphere_and_mood: Surreal, time passing
  rendering_and_quality: Dreamy, experimental
  key_features: Soft focus
  creative_brief: >-
    Vision stripped of optics, where light seeps through a needle's wound and time pools on the surface. Edges
    dissolve into dreaming, the world seen as if through memory rather than glass. Every frame exhales the
    patience of a long exposure, moments bleeding into one another like watercolor on wet paper. Apply this
    photographic look over any input: preserve lens behavior, exposure logic, color response, framing
    discipline, and artifact pattern while avoiding a required place, face, travel scene, landscape, or
    narrative setup.
