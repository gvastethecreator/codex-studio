visualDna:
  aesthetic: Dramatic silhouette photography, dark outline against a bright background
  subject_treatment: Sharp profile edge, completely obscured facial details, focus on shape and form
  color_and_tone: Pure black subject, vibrant or bright background colors, extreme high contrast
  lighting_and_shadow: Strong backlighting, no front fill light, blown-out background highlights
  texture_and_material: No texture on the subject, smooth background gradients
  camera_and_composition: Graphic composition, strong negative space, clear outline
  atmosphere_and_mood: Mysterious, dramatic, anonymous, artistic, epic
  rendering_and_quality: High quality artistic photography, crisp edges
  creative_brief: Form stripped to its barest contour, a figure consumed by darkness standing sentinel against a sky on fire, identity withheld so that shape alone carries the full weight of presence. All that remains is the edge, the razor-thin outline where self meets light, mystery held entirely in the curve of a shoulder or the angle of a jaw. The anonymous becomes the monumental, absence speaking louder than any detail ever could.
