    Define Travel Photography through line, mass, contour, spacing, and rhythm. Keep forms readable,
    intentional, and reusable beyond one literal scene.
  color_and_tone: >-
    Use a Travel Photography-specific palette with clear dominant, secondary, and accent roles. Keep contrast
    deliberate and avoid generic color wash.
  lighting_and_shadow: >-
    Use lighting that makes Travel Photography recognizable: purposeful key, rim, bounce, shadow, and glow
    behavior with readable hierarchy.
  texture_and_material: >-
    Use materials and textures that reinforce Travel Photography: surface response, grain, patina, polish, or
    wear should feel intentional and style-defining.
  camera_and_composition: >-
    Use spatial behavior that fits Travel Photography: perspective, compression, exaggeration, or depth should
    support the style without forcing one fixed location.
  atmosphere_and_mood: >-
    Set a mood that belongs to Travel Photography: specific, coherent, and distinct, with emotional tone
    carried by visual systems rather than narrative captioning.
  rendering_and_quality: >-
    Render Travel Photography with high production clarity, strong silhouette reads, clean detail priority,
    and no accidental UI, text, logos, or watermark.
  key_features: >-
    Prioritize Travel Photography's key features: recognizable shape language, palette logic, material cues,
    lighting behavior, and composition rules.
  creative_brief: >-
    Create a style-card that translates Travel Photography into a portable visual system for 4. Documentary
    And Street. Preserve the preset identity through style mechanics, not a fixed scene, character, prop, or
    story beat.
