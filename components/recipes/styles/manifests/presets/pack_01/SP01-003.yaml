visualDna:
  aesthetic: Editorial environmental-portrait grammar, subject integrated with meaningful context
  subject_treatment: Primary subject integrated with surroundings, sharp details across the frame, storytelling composition
  color_and_tone: Natural and balanced color palette, rich environmental tones, true-to-life colors
  lighting_and_shadow: Mixed ambient lighting with subtle flash fill, balanced exposure between subject and background
  texture_and_material: Sharp contextual detail, realistic textures, material clues that support narrative
  camera_and_composition: Wide-angle lens (24mm or 35mm), deep depth of field, contextual framing
  atmosphere_and_mood: Informative, personal, narrative-driven, authentic
  rendering_and_quality: Editorial magazine quality, high resolution, crisp details
  creative_brief: >-
    Apply environmental portrait logic to any subject: contextual clues,
    balanced subject-background exposure, narrative texture, and editorial
    realism without forcing a workspace, room, props, or human sitter.
