  creative_brief: >-
    Render the accidental rainbows of oil spreading across concrete in dark puddles where thin-film interference paints
    iridescent maps in magenta, cyan, and gold across the garage floor. The surface should feel wet and heavy in the
    dark pools while the rainbow sheen floats like a ghost of color atop the grime. Capture the strange loveliness of
    the unwanted, the mechanics of spectrum blooming in neglect. Use Oil Stains as portable surface/render behavior over
    any input: map its texture, light response, edge wear, color chemistry, and tactile rhythm onto the subject instead
    of requiring a literal material sample, macro tile, wall, landscape, source object, or scene where the material
    naturally appears.
