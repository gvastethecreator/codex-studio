  key_features: Pile
  creative_brief: >-
    Compose a meditation on smoothness earned through millennia of water's patient persuasion, each pebble a
    portrait of surrender whose edges dissolved into curves by the relentless kindness of current. Wet gloss
    should catch the light like a thin skin of memory, reflecting sky where stone once resisted. Render the
    quiet wisdom of the tumbled, the beauty of edges long since forgiven. Use River Stones as portable
    surface/render behavior over any input: map its texture, light response, edge wear, color chemistry, and
    tactile rhythm onto the subject instead of requiring a literal material sample, macro tile, wall,
    landscape, source object, or scene where the material naturally appears.
