  creative_brief: >-
    Apply coral-reef materiality as living mineral architecture: porous calcium-carbonate texture, branching spires,
    honeycombed domes, pink-orange-purple vibrancy, and caustic light moving across the surface. If marine or organic
    content exists, reinforce it; otherwise use coral growth as abstract porous structure without forcing an underwater
    scene. Use Coral Reef as portable surface/render behavior over any input: map its texture, light response, edge
    wear, color chemistry, and tactile rhythm onto the subject instead of requiring a literal material sample, macro
    tile, wall, landscape, source object, or scene where the material naturally appears.
