  material_texture: Abrasive
  render_quality: Worn, used
  spatial_distortion: None
  atmosphere: Industrial, hard
  key_features: Random direction
  creative_brief: >-
    Capture the patina of use written in random scratches across steel, where each mark is a moment of contact frozen in
    silver on grey, light catching in the abrasive grooves like tiny rivers of reflection. The random direction of the
    scratches should tell the story of careless handling and honest work. Render the accumulating biography of a worked
    surface, wear as a form of record-keeping. Use Scratched Metal as portable surface/render behavior over any input:
    map its texture, light response, edge wear, color chemistry, and tactile rhythm onto the subject instead of
    requiring a literal material sample, macro tile, wall, landscape, source object, or scene where the material
    naturally appears.
