  creative_brief: >-
    Summon the deep luxury of velvet where piled fibers catch light at the crest of each soft fold, creating a
    landscape of deep shadows and rich highlights that shift with the angle of view. The surface should feel
    like visual touch, a textile that drinks light and returns it as color deepened by surrounding darkness.
    Render the sensuality of fabric that seems to breathe. Use Velvet Fabric as portable surface/render
    behavior over any input: map its texture, light response, edge wear, color chemistry, and tactile rhythm
    onto the subject instead of requiring a literal material sample, macro tile, wall, landscape, source
    object, or scene where the material naturally appears.
