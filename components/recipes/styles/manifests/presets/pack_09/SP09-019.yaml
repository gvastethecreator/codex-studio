  aesthetic: Thin foil application
  subject_treatment: Crinkles and overlaps
  color_and_tone: Rich Gold
  lighting_and_shadow: Metallic reflection
  texture_and_material: Wrinkled foil
  camera_and_composition: Flaking
  atmosphere_and_mood: Expensive, fragile
  rendering_and_quality: Gilded, delicate
  key_features: Square sheets
  creative_brief: >-
    Compose the fragile opulence of gold leaf applied in crinkled squares barely thicker than thought, where
    every wrinkle and overlap records the gilder's trembling hand in metallic memory. The surface should catch
    light like a held breath, areas of flat brilliance interrupted by the micro-topography of folded foil.
    Render the paradox of permanence made impossibly delicate. Use Gold Leaf as portable surface/render
    behavior over any input: map its texture, light response, edge wear, color chemistry, and tactile rhythm
    onto the subject instead of requiring a literal material sample, macro tile, wall, landscape, source
    object, or scene where the material naturally appears.
