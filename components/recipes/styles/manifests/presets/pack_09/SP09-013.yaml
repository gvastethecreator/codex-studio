  creative_brief: >-
    Capture the delicate engineering of plumage where individual barbs interlock into surfaces that catch and
    split light into spectral blues and greens, each feather a miracle of aerodynamics rendered as ornament.
    The overlapping structure should feel weightless yet precise, a cascade of color built on invisible order.
    The image must float between fragility and resilience. Use Bird Feathers as portable surface/render
    behavior over any input: map its texture, light response, edge wear, color chemistry, and tactile rhythm
    onto the subject instead of requiring a literal material sample, macro tile, wall, landscape, source
    object, or scene where the material naturally appears.
