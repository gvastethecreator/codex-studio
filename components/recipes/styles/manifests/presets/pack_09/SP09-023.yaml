  creative_brief: >-
    Capture the warm disorder of aged brick where every unit carries a unique blush of kiln fire and crumbling mortar
    maps the passage of decades between red clay bodies. The running bond pattern should feel like a woven tapestry of
    earth and fire, rough and uneven. Render the accumulated imperfection of walls that have learned to breathe through
    chipped corners and softened edges. Use Brick Wall as portable surface/render behavior over any input: map its
    texture, light response, edge wear, color chemistry, and tactile rhythm onto the subject instead of requiring a
    literal material sample, macro tile, wall, landscape, source object, or scene where the material naturally appears.
