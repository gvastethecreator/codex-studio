  form_and_line: Plastic blades
  color_palette: Unnatural Green
  lighting_setup: Plastic shine
  material_texture: Plastic strips
  render_quality: Artificial, sports
  spatial_distortion: None
  atmosphere: Fake, clean
  key_features: Uniform height
  creative_brief: >-
    Render the uncanny uniformity of artificial turf where identical plastic blades stand in regimented rows of
    unnatural green, catching a plastic sheen that real grass would never yield under any sun. The surface should feel
    fake in its very perfection, a lawn that needs no water and holds no secrets. Capture the aesthetics of the
    substitute, nature made reliable at the cost of its soul. Use Astroturf as portable surface/render behavior over any
    input: map its texture, light response, edge wear, color chemistry, and tactile rhythm onto the subject instead of
    requiring a literal material sample, macro tile, wall, landscape, source object, or scene where the material
    naturally appears.
avoidRules:
