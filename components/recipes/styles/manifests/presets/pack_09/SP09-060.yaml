  atmosphere: Sci-fi, fluid
  key_features: High surface tension
  creative_brief: >-
    Summon the alien fluidity of liquid mercury beading into chrome spheres of impossible surface tension, each drop a
    convex mirror reflecting a distorted world in silver curves. The material must feel both mesmerizing and toxic,
    beauty that carries the weight of danger in every perfectly rounded blob. Capture the aesthetics of the untouchable,
    metal that refuses to be solid. Use Mercury as portable surface/render behavior over any input: map its texture,
    light response, edge wear, color chemistry, and tactile rhythm onto the subject instead of requiring a literal
    material sample, macro tile, wall, landscape, source object, or scene where the material naturally appears.
