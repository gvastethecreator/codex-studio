  aesthetic: Siege-monastery fantasy with bone-script ornament, barricaded cloisters, armored scribes, and ritual defense engines.
  subject_treatment: A bone-script monastery siege door or giant siege bell with armored monks as small support shapes and non-readable carved markings.
  color_and_tone: Limestone gray, bone white, black ink, old gold, oxblood cloth, and smoky blue shadow.
  lighting_and_shadow: Bell-tower light, candle rows, and smoke beams keep stone planes readable without dark artifact buildup.
  texture_and_material: Chipped limestone, vellum-like cloth, bone inlay, hammered metal, wax, dust, and clean ink seams.
  camera_and_composition: Architectural verticals, barricade foreground, central holy object, and strong silhouette separation.
  atmosphere_and_mood: Besieged, scholarly, sacred, tense, and stoic.
  rendering_and_quality: Detailed medieval fantasy illustration card with denoised darks, defined linework, crisp stone detail, and non-readable decorative marks.
  creative_brief: Original monastery-siege aesthetic for fortress interiors, ritual defenders, relic doors, grim scholars, and holy machines.
