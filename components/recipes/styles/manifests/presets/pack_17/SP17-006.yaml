visualDna:
  aesthetic: Medieval legend rendered like a damaged woven tapestry with mythic silhouettes and flat ceremonial space.
  subject_treatment: >-
    A flattened tapestry hunt scene with a lion-bird monster, fallen tower, profile riders, patterned
    garments, and heraldic outlines.
  color_and_tone: Faded wool reds, moss green, ochre, smoke blue, dark brown linework, and aged linen base.
  lighting_and_shadow: Flat woven light with shadow described through thread density, border contrast, and dark pattern blocks.
  texture_and_material: Visible fibers, worn edges, stitched contours, frayed borders, thread gaps, and softened pigment.
  camera_and_composition: Frontal frieze layout, stacked scenes, ornamental borders, and iconic subject placement.
  atmosphere_and_mood: Ancient, folkloric, mysterious, and ceremonial.
  rendering_and_quality: High-resolution textile illustration preserving woven texture and crisp symbolic readability.
  creative_brief: A portable medieval-tapestry style for battles, monsters, portraits, maps, rituals, or mythic objects.
