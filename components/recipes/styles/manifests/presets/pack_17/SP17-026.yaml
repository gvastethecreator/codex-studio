visualDna:
  aesthetic: Grim gothic tabletop warfront with cathedral armor, painted-miniature contrast, skull-shaped reliquaries, and oversized siege silhouettes.
  subject_treatment: A gothic miniature warfront siege beast or altar-engine unit on a plinth-like battlefield fragment, chunky and readable like a tabletop centerpiece.
  color_and_tone: Blackened steel, ivory bone, imperial red, toxic green glow, cold blue shadows, and bright edge highlights.
  lighting_and_shadow: Display-plinth lighting and battlefield rim light make every silhouette readable at thumbnail scale.
  texture_and_material: Painted miniature brush texture, edge wear, drybrushed metal, cracked stone bases, parchment cloth, and matte armor.
  camera_and_composition: Heroic three-quarter miniature showcase, strong base plane, compact warfront depth, and clean object separation.
  atmosphere_and_mood: Grandiose, martial, occult, heavy, and collectible.
  rendering_and_quality: Fantasy miniature illustration with crisp edge highlights, controlled darks, defined linework, and denoised brush texture.
  creative_brief: Original gothic wargame visual system for champions, monsters, war machines, banners, and grimdark tabletop-inspired cards.
avoidRules:
  - copied tabletop franchise designs
  - real-world insignia
  - unreadable kitbash clutter
  - muddy black artifacts
  - explicit gore
  - watermark
  - text
