    A goat-headed bestiary king seated high over the candlelit court, antler crown, clawed velvet robes, hound
    familiar at his feet, and nobles kept small around the throne.
  color_and_tone: Candle gold, velvet black, parchment cream, muted jewel tones, and dark green shadows.
  lighting_and_shadow: Candle groups create glowing faces, clean black corner shapes, and simple theatrical highlights.
  texture_and_material: Fur trims, vellum pages, carved wood, wax, brocade, feathers, claws, and old ink.
