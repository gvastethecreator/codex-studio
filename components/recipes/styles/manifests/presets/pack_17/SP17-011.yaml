visualDna:
  aesthetic: Fogbound medieval witch-trial fantasy with rough timber, hooded crowds, and occult uncertainty.
  subject_treatment: A massive fogbound witch-trial inquisitor with bell-shaped iron mask, rope mantle, torch halo, and veiled witnesses reduced to small silhouettes around the figure.
  color_and_tone: Damp gray, charred black, torch orange, dirty linen, and muted forest green.
  lighting_and_shadow: Torches create simple halos and long silhouettes while keeping fog smooth and shadow edges readable.
  texture_and_material: Wet timber, rough rope, wool cloaks, muddy ground, smoke, ash, and hand-cut charms.
  camera_and_composition: Circular crowd staging, low fog layers, off-center accused figures, and claustrophobic village space.
  atmosphere_and_mood: Suspicious, cold, communal, and supernatural.
  rendering_and_quality: Historical fantasy illustration with smooth atmospheric fog, tactile props, defined lines, and clean low light.
  creative_brief: Reusable medieval paranoia style for villages, rituals, characters, creatures, or mystery scenes.
avoidRules:
