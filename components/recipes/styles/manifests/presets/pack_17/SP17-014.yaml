visualDna:
  aesthetic: >-
    Black-and-white photocopied bestiary plates with occult medieval linework and rough underground print
    damage.
  subject_treatment: >-
    A horned basilisk-lion specimen or dungeon chimera outlined like a hand-drawn field-guide beast, with
    exaggerated claws, horns, and no human lead.
  color_and_tone: Mostly clean black ink and aged paper white, with optional one-color neon spot fills.
  lighting_and_shadow: Shadow appears as hatch density, clean black fills, tidy stipple fields, and graphic photocopy contrast.
  texture_and_material: >-
    Controlled copier texture, clean toner bloom, scratchy ink, paper tooth, edge wear, and readable line
    reproduction.
  camera_and_composition: Single specimen view, label-free frame, marginal ornament, and rigid bestiary-page balance.
  atmosphere_and_mood: Arcane, handmade, archival, and dungeon-worn.
  rendering_and_quality: Controlled xerox print style with strong graphic readability, denoised darks, and rough line charm.
  creative_brief: Turns any subject into an occult bestiary sheet without relying on text labels or clean digital polish.
avoidRules:
  - color gradients
  - polished concept art
  - photorealism
  - typography
  - clean vector
  - watermark
  - text
