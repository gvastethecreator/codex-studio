    A star monk sealing an astral eel beast with an astrolabe banner and clean non-readable glyph shapes,
    cosmic but feudal.
  color_and_tone: Midnight blue, silver, bone white, violet shadow, gold sparks, and pale cyan astral glow.
  lighting_and_shadow: Moon rims, starfield backlight, and clean glowing geometry separate shapes without noisy dark speckles.
