    Clean fantasy illustration with luminous accents, smooth dark gradients, and card-readable silhouette
    design.
  creative_brief: >-
    Original astral-medieval aesthetic for exorcists, star relics, sealed monsters, ritual armor, and cosmic
    crusade scenes.
