visualDna:
  aesthetic: >-
    Old-world sepulcher warband engraving with carved linework, funeral armor, heraldic masses, and siege-icon
    composition.
  subject_treatment: >-
    An engraved tomb wagon pulled by a skeletal ox with tiny banner bearers and tomb guards, reduced to bold
    cut lines and sepulcher rhythm.
  color_and_tone: Ink black, bone paper, tarnished silver, sepia wash, oxidized green, and small wax-red accents.
  lighting_and_shadow: Value comes from engraved hatching and broad paper-negative space rather than noisy dark gradients.
  texture_and_material: >-
    Etched copperplate lines, dry paper, chipped marble, metal scratches, wax seals without readable marks,
    and clean ink edges.
  camera_and_composition: >-
    Frontal heraldic grouping, triangular warband arrangement, tall banner shapes, and print-safe negative
    space.
  atmosphere_and_mood: Funereal, disciplined, ancient, martial, and ceremonial.
  rendering_and_quality: Crisp engraved fantasy print with heavy denoise, clean hatching, and no muddy texture chatter.
  creative_brief: >-
    Original engraving style for warbands, tomb knights, sepulcher relics, bestiary entries, and medieval
    campaign cards.
avoidRules:
