    Apocalyptic iron reliquary fantasy with cathedral machines, caged saint-bones, armored shrine engines, and
    scorched liturgical metal.
  subject_treatment: >-
    A walking iron shrine construct with bell legs, reliquary chest, beastlike shoulders, and tiny faceless
    penitents used only for scale.
  color_and_tone: Furnace black, rust red, sacred gold, bone ivory, soot gray, and emerald reliquary glow.
  lighting_and_shadow: Furnace underlight and shrine glow illuminate large armor planes while preserving denoised dark fields.
  texture_and_material: >-
    Riveted iron, scorched enamel, reliquary glass, cracked bone, chainmail, ash, and soot cleaned of ugly
    speckle.
  camera_and_composition: >-
    Monumental portrait-card framing, altar-centered depth, vertical machine silhouettes, and strong
    foreground reliquary detail.
  atmosphere_and_mood: Sacred, industrial, catastrophic, penitential, and mythic.
  rendering_and_quality: >-
    Detailed dark fantasy digital illustration with clean black control, defined linework, polished material
    separation, and heavy denoise.
  creative_brief: >-
    Original iron-apocalypse aesthetic for relic engines, armored saints, cathedral machines, and grim
    campaign bosses.
