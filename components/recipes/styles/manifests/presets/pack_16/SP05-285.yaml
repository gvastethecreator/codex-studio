visualDna:
  aesthetic: Epopeya eco-profética donde lo contaminado se vuelve sagrado, vivo y capaz de reconciliación.
  form_and_line: Siluetas aerodinámicas, curvas orgánicas, trazo firme y capas de viento que envuelven el motivo sin cambiar su identidad.
  color_palette: Ocres contaminados, turquesas velados, dorados de polvo esporal y azules de cielo quebrado por neblina tóxica.
  lighting_setup: Luz ventosa de alto contraste con rayos filtrados por esporas, generando profundidad y pulso espiritual ambiental.
  material_texture: Superficies bio-minerales, membranas orgánicas iridiscentes, telas de vuelo erosionadas y terreno sedimentado.
  render_quality: Calidad fílmica premium con prioridad en escala ecológica, legibilidad aérea y dramatismo ambiental sostenido.
  spatial_distortion: Horizonte amplio con compresión atmosférica y flujos diagonales que guían la mirada como corrientes de viento.
  atmosphere: Profética, compasiva, eólica, reverente.
  key_features: Viento visible, esporas luminosas, biología abstracta, escala ecológica y empatía visual frente a materia amenazante.
  creative_brief: >-
    Define un estilo reusable de mito ecológico para cualquier prompt o imagen de entrada:
    viento, partículas vivas y reconciliación planetaria sin imponer junglas tóxicas, planeadores, insectos gigantes ni profecías narrativas.
