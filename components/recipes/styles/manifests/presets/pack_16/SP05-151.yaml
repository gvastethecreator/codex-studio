  color_palette: Amarillos cálidos, azules vivos, acentos primarios pop y destellos extraños de ruptura dimensional.
  lighting_setup: Luz de tarde brillante con gradientes suaves y micro-anomalías lumínicas que sugieren realidad maleable.
