  render_quality: Acabado premium meta-pop con legibilidad alta del tono híbrido entre cotidianeidad y amenaza cósmica.
  spatial_distortion: Espacio cotidiano estable con microdesplazamientos perceptivos cuando emerge la capa de distorsión narrativa.
