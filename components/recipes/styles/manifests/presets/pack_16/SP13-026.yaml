visualDna:
  aesthetic: Prestige samurai minimalism focused on pre-impact stillness, where restraint and posture hierarchy carry more weight than overt action.
  form_and_line: Controlled tapered ink lines, long vertical drape rhythms, and disciplined negative space around weapon-bearing limbs to amplify intent.
  color_palette: Slate mineral neutrals, lacquer crimson accents, and indigo night tones with sparse warm punctuation.
  lighting_setup: Raking lateral key with low lantern bounce, keeping facial planes half-obscured and blade edges selectively highlighted.
  material_texture: Weathered cedar grain, moisture-darkened stone, matte woven cloth, and mirror-polished steel micro-glints.
  render_quality: High-fidelity anime finishing with calm contour clarity, micro-contrast on focal anatomy, and zero ornamental clutter.
  spatial_distortion: Axial temple perspective with compressed midground, creating a pressure chamber effect around opposing vectors.
  atmosphere: Ceremonial tension, disciplined breath control, and the sensation that motion is being withheld by code.
  key_features: Static-ready stance geometry, controlled sleeve and haori wind cues, ritual threshold asymmetry, and line-of-sight dominance.
  creative_brief: Build a reusable pre-duel grammar for any subject by prioritizing poised silhouettes, selective steel highlights, and compositional stillness that feels seconds away from release.
