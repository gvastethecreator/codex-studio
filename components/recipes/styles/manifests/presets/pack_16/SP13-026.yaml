visualDna:
  aesthetic: Prestige martial minimalism focused on pre-impact stillness, where restraint and posture hierarchy carry more weight than overt action.
  form_and_line: Controlled tapered ink lines, long vertical drape rhythms, and disciplined negative space around poised limbs to amplify intent.
  color_palette: Slate mineral neutrals, lacquer crimson accents, and indigo night tones with sparse warm punctuation.
  lighting_setup: Raking lateral key with low warm bounce, keeping facial planes half-obscured and edge highlights selective.
  material_texture: Weathered cedar grain, moisture-darkened stone, matte woven cloth, and mirror-polished micro-glints.
  render_quality: High-fidelity anime finishing with calm contour clarity, micro-contrast on focal anatomy, and zero ornamental clutter.
  spatial_distortion: Axial threshold perspective with compressed midground, creating a pressure chamber effect around opposing vectors.
  atmosphere: Ceremonial tension, disciplined breath control, and the sensation that motion is being withheld by code.
  key_features: Static-ready stance geometry, controlled fabric wind cues, ritual threshold asymmetry, and line-of-sight dominance.
  creative_brief: >-
    Build a reusable pre-impact ritual stillness grammar for any subject:
    poised silhouettes, selective metallic highlights, disciplined negative
    space, and withheld motion without imposing ronin, temples, weapons,
    samurai, duels, haori, or shrine thresholds.
