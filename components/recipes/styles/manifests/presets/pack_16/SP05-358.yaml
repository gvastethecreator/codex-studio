visualDna:
  aesthetic: Boxeo de superación clásica orientado a resistencia, técnica de guardia y comeback por rounds.
  form_and_line: Anatomía de golpeo pesada, guardia compacta y acting físico de castigo acumulado.
  color_palette: Rojos de esquina, azul acero de sombra de ring y tonos piel cálidos de esfuerzo extremo.
  lighting_setup: Spot duro de ring con penumbra periférica y foco dramático en cuerda/esquina.
  material_texture: Cuero de guante castigado, vendas saturadas, lona gastada y sudor de gimnasio viejo.
  render_quality: Frame de combate deportivo con legibilidad de impacto, defensa y recuperación.
  spatial_distortion: Perspectiva de cuerdas con compresión de distancia en intercambio corto y uppercut.
  atmosphere: Dura, inspiradora, áspera y obstinada.
  key_features: Cuerdas tensas, postura de impacto, fatiga en banquillo y dúo coach-boxeador.
  creative_brief: >-
    Construye una gramática reusable de comeback-boxing donde fisicidad de
    round, disciplina técnica y estética de gym clásico sostengan una identidad
    transferible.
