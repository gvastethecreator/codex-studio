visualDna:
  aesthetic: Combate de superación clásica orientado a resistencia, técnica compacta y comeback físico.
  form_and_line: Anatomía de impacto pesada, guardia compacta y acting físico de castigo acumulado.
  color_palette: Rojos de presión, azul acero de sombra periférica y tonos cálidos de esfuerzo extremo.
  lighting_setup: Spot duro con penumbra periférica y foco dramático en borde de presión.
  material_texture: Cuero castigado, bandas saturadas, tejido gastado y sudor de esfuerzo acumulado.
  render_quality: Frame de combate deportivo con legibilidad de impacto, defensa y recuperación.
  spatial_distortion: Compresión de distancia en intercambio corto e impacto ascendente.
  atmosphere: Dura, inspiradora, áspera y obstinada.
  key_features: Límites tensos, postura de impacto, fatiga visible y recuperación obstinada.
  creative_brief: >-
    Construye una gramática reusable de comeback grit para cualquier prompt o imagen de entrada:
    impacto, fatiga y recuperación sin imponer boxeo, ring, cuerdas, coach ni banquillo.
