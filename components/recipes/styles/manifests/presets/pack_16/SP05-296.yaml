  spatial_distortion: Perspectiva ascendente de megaciudad con profundidad estratificada por clases y flujos de movilidad vertical.
  atmosphere: Grandiosa, nostálgica, metálica, empática.
  key_features: Skyline decó icónico, maquinaria colosal, contraste niño-androide y composición social en capas.
  creative_brief: Construye una gramática reusable de retrofuturo humanista para cualquier sujeto, articulando geometría decó, escala industrial y ternura tecnológica.
