visualDna:
  aesthetic: Retrofuturismo art deco monumental con tensión social, asombro tecnológico clásico y melancolía industrial humanista.
  form_and_line: Contorno robusto, geometría decó escalonada, curvas humanoides suaves y masa mecánica abstracta.
  color_palette: Ámbar cinematográfico, verdes petróleo industriales, cremas envejecidos y acentos cromados de ingeniería monumental.
  lighting_setup: Iluminación vertical con bruma cálida, contraluces monumentales y brillos controlados sobre metal.
  material_texture: Acero remachado, mármol art-decó, cristal antiguo y superficies mecánicas con pátina de uso civil.
  render_quality: Acabado premium de gran espectáculo retrofuturo con lectura jerárquica impecable entre escala humana y escala sistémica.
  spatial_distortion: Perspectiva ascendente con profundidad estratificada por capas sociales y flujos verticales.
  atmosphere: Grandiosa, nostálgica, metálica, empática.
  key_features: Geometría decó, escala industrial, ternura tecnológica, composición social en capas y contraste entre máquina y humanidad.
  creative_brief: >-
    Construye una gramática reusable de retrofuturo humanista para cualquier prompt o imagen de entrada:
    geometría decó, escala y sensibilidad tecnológica sin imponer skylines, androides, maquinaria literal ni jerarquías narrativas.
