visualDna:
  aesthetic: Fantasía biomórfica de extrañeza onírica, con tecnología ritual, niebla viva y siluetas quiméricas.
  form_and_line: Siluetas quiméricas con línea orgánico-metálica, poses heroicas y contorno clásico de cel.
  color_palette: Verdes brumosos, violetas de crepúsculo arcano, metales opacos y acentos lumínicos etéreos.
  lighting_setup: Niebla luminosa como fuente principal, key suave de contracampo y sombras planas que conservan legibilidad retro.
  material_texture: Quitina metálica, membranas translúcidas, materia húmeda fantástica y ruido fílmico analógico.
  render_quality: Acabado premium retro-fantasy con claridad de diseño híbrido y atmósfera de tensión irreal sostenida.
  spatial_distortion: Profundidad brumosa con distorsión ligera de escala para reforzar mundo no terrestre.
  atmosphere: Extraña, brumosa, heroica, ultraterrena.
  key_features: Niebla viva, siluetas quiméricas, biología mecánica, brillo ritual y relieve fantástico abstracto.
  creative_brief: >-
    Construye una gramática reusable de fantasía biomórfica para cualquier prompt o imagen de entrada:
    niebla, quimera y tecnología ritual. Insectos, espadas, mechas orgánicos o
    reliquias vivas pueden transformar el input si sostienen el estilo, sin
    fijar guerra ni escena de combate.
