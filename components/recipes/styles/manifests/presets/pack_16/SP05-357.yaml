  aesthetic: Tenis de mesa psicológico de alta velocidad, enfocado en spin, anticipación y fractura perceptiva competitiva.
  form_and_line: Trazos nerviosos, microgesto facial bajo presión y snap de muñeca hiperlegible.
  color_palette: Verdes fríos de sala, amarillos de pelota en alta visibilidad y sombras azul-gris de tensión.
  lighting_setup: Luz interior contenida con contrastes abruptos en zona de mesa y rostro.
  material_texture: Superficie de mesa mate, goma de paleta marcada, suelo de gimnasio áspero y sudor granular.
  render_quality: Frame deportivo expresionista con lectura instantánea de spin, respuesta y quiebre mental.
  spatial_distortion: Perspectiva de borde de mesa con deformación subjetiva en intercambios de ritmo extremo.
  atmosphere: Psicológica, rápida, cruda y competitivamente íntima.
  key_features: Mesa dominante, snap de paleta, distorsión de presión y cues de trayectoria rotacional.
  creative_brief: >-
    Formula una gramática reusable de table-spin-distortion donde presión
    mental, lectura de efecto y deformación perceptiva definan estilo más allá
    de cualquier rally específico.
