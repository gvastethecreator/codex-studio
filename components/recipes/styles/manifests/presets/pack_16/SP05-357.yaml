visualDna:
  aesthetic: Deporte psicológico de alta velocidad, enfocado en spin abstracto, anticipación y fractura perceptiva competitiva.
  form_and_line: Trazos nerviosos, microgesto facial bajo presión y snap de muñeca hiperlegible.
  color_palette: Verdes fríos, amarillos de alta visibilidad y sombras azul-gris de tensión.
  lighting_setup: Luz interior contenida con contrastes abruptos en zona de impacto y rostro.
  material_texture: Superficie mate, goma marcada, plano áspero y sudor granular.
  render_quality: Frame deportivo expresionista con lectura instantánea de spin, respuesta y quiebre mental.
  spatial_distortion: Perspectiva de borde comprimido con deformación subjetiva en intercambios de ritmo extremo.
  atmosphere: Psicológica, rápida, cruda y competitivamente íntima.
  key_features: Plano dominante, snap de muñeca, distorsión de presión y cues de trayectoria rotacional.
  creative_brief: >-
    Formula una gramática reusable de spin-pressure-distortion para cualquier prompt o imagen de entrada:
    presión mental, efecto y deformación perceptiva sin imponer mesa, paleta, pelota ni rally.
