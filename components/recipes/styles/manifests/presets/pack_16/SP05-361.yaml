  color_palette: Paleta sobria de práctica, verdes de cancha, blancos de línea y acentos azules de estudio.
  lighting_setup: Luz de entrenamiento uniforme con contraste moderado para lectura didáctica de gesto.
  material_texture: Superficie de cancha usada, cuerda de raqueta funcional, cuaderno táctico y textil de práctica.
