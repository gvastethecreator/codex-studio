visualDna:
  aesthetic: Entrenamiento metódico de mejora incremental, análisis técnico, repetición y evolución medible.
  form_and_line: Mecánica depurada, pasos didácticos y acting de concentración sostenida.
  color_palette: Paleta sobria de práctica, verdes funcionales, blancos de guía y acentos azules de análisis.
  lighting_setup: Luz de entrenamiento uniforme con contraste moderado para lectura didáctica de gesto.
  material_texture: Superficie usada, material funcional, marcas tácticas sugeridas y textil de práctica.
  render_quality: Frame técnico de entrenamiento con claridad de corrección, progreso y consistencia.
  spatial_distortion: Perspectiva funcional sin dramatización excesiva, enfocada en secuencia y repetición.
  atmosphere: Estudiosa, práctica, constante y determinada.
  key_features: Cues de análisis, mecánica repetida, patrón de pies y lenguaje corporal de mejora progresiva.
  creative_brief: >-
    Define una gramática reusable de entrenamiento calculado para cualquier prompt o imagen de entrada:
    método, repetición y progreso medible sin imponer tennis, cuadernos, raquetas ni cancha.
