  aesthetic: Cyber-aislamiento doméstico con mística de red, donde la identidad se vuelve señal y la intimidad, interfaz.
  form_and_line: Línea fina y distanciada, acting minimal de disociación y composición de habitación-terminal obsesiva.
  color_palette: Verdes CRT, grises de suburbio vacío, azules fríos y blancos de estática electrónica.
  lighting_setup: Luz baja de monitor, sombra blanda de madrugada y parpadeo digital como pulso emocional.
  material_texture: Cableado denso, plástico viejo de terminal, pared suburbana desaturada y grano de señal analógica.
  render_quality: Acabado premium 90s con tensión psicológica persistente y estética proto-red inquietante.
  spatial_distortion: Espacio íntimo comprimido y vacío urbano periférico para sensación de presencia fantasma.
  atmosphere: Aislada, conectada, susurrante, extraña.
  key_features: Clústeres de cables, glow de CRT, overlays de estática y mirada distante de sujeto en tránsito digital.
  creative_brief: Construye una gramática reusable de desmaterialización identitaria en red para cualquier sujeto, combinando silencio suburbano, densidad electrónica y ambigüedad existencial.
