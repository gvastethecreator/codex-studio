visualDna:
  aesthetic: Balada cósmica de tránsito existencial, con nostalgia elegíaca, maravilla iniciática y horizonte infinito.
  form_and_line: Línea clásica de tránsito contemplativo, acting meditado y ritmo visual de trayecto largo.
  color_palette: Azules de noche profunda, dorados antiguos, blancos de nieve estelar y sepias de recuerdo.
  lighting_setup: Faroles lechosos, calidez compartimentada y contraluz sobre vacío estelar.
  material_texture: Metal envejecido, vapor suave, madera antigua y película granulada de época.
  render_quality: Acabado premium retro-poético con legibilidad narrativa de tránsito y emoción de despedida continua.
  spatial_distortion: Perspectiva longitudinal, con profundidad astral que extiende sensación de viaje eterno.
  atmosphere: Melancólica, maravillada, sideral, meditativa.
  key_features: Horizonte infinito, umbrales de viaje, equipaje simbólico abstracto, escala cósmica íntima y soledad luminosa.
  creative_brief: >-
    Diseña una gramática reusable de peregrinaje metafísico para cualquier prompt o imagen de entrada:
    viaje, despedida y escala cósmica íntima sin imponer trenes, estaciones, vías ni equipaje literal.
