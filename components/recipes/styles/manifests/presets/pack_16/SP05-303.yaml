visualDna:
  aesthetic: Balada ferroviaria cósmica de tránsito existencial, con nostalgia elegíaca y maravilla iniciática.
  form_and_line: Línea clásica de locomotora y personajes estilizados, acting contemplativo y ritmo visual de trayecto largo.
  color_palette: Azules noche ferroviaria, dorados de vagón antiguo, blancos de nieve estelar y sepias de recuerdo.
  lighting_setup: Faroles de andén lechosos, compartimentos cálidos de vagón y contraluz de ventanilla sobre nieve estelar.
  material_texture: Metal de vagón envejecido, vapor suave, madera de andén y película granulada de época.
  render_quality: Acabado premium retro-poético con legibilidad narrativa de tránsito y emoción de despedida continua.
  spatial_distortion: Perspectiva longitudinal de vías y vagones, con profundidad astral que extiende sensación de viaje eterno.
  atmosphere: Melancólica, maravillada, sideral, meditativa.
  key_features: Locomotora astral frontal, estaciones-umbral, motivo de equipaje simbólico y horizonte de vías infinitas.
  creative_brief: Diseña una gramática reusable de peregrinaje ferroviario metafísico para cualquier sujeto, fusionando liturgia de estación, melancolía de trayecto y escala cósmica íntima.
