visualDna:
  aesthetic: Deporte competitivo de ego extremo, presión de definición, visión táctica agresiva y ruptura individualista.
  form_and_line: Líneas tensas de aceleración corta, torsión corporal agresiva y postura depredadora en finalización.
  color_palette: Azules fríos técnicos, neón ácido de presión psicológica y rojos de amenaza decisiva.
  lighting_setup: Iluminación high-contrast con foco cerrado y recorte duro sobre el sujeto.
  material_texture: Superficies sintéticas de alta fricción, geometría de jaula, textiles de alto rendimiento y sudor especular.
  render_quality: Sports frame de intensidad máxima con lectura instantánea de duelo interno y decisión final.
  spatial_distortion: Túnel visual, compresión de distancia final y deformación dinámica por sprint terminal.
  atmosphere: Predatoria, obsesiva y clínicamente competitiva.
  key_features: Torque corporal, mirada de presión, geometría de jaula abstracta, último instante decisivo y aura de ego.
  creative_brief: >-
    Aplica una gramática reusable de presión ego-breakout a cualquier prompt o imagen de entrada:
    jaula geométrica, mirada depredadora y decisión letal sin imponer fútbol, redes, goles ni disparos.
