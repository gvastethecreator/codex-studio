visualDna:
  aesthetic: Fútbol competitivo de mentalidad striker-centric, orientado a presión de definición y dominio de área.
  form_and_line: Líneas tensas de aceleración corta, torsión corporal agresiva y postura depredadora en finalización.
  color_palette: Azules fríos de campo técnico, neón ácido de presión psicológica y rojos de amenaza en zona de gol.
  lighting_setup: Iluminación de estadio high-contrast con foco en caja y recorte duro sobre atacante.
  material_texture: Césped sintético de alta fricción, red de portería marcada, textiles de alto rendimiento y sudor especular.
  render_quality: Sports frame de intensidad máxima con lectura instantánea de duelo delantero-portero.
  spatial_distortion: Túnel visual hacia arco, compresión de distancia final y deformación dinámica por sprint terminal.
  atmosphere: Predatoria, obsesiva y clínicamente competitiva.
  key_features: Perspectiva de red frontal, torque de disparo, mirada de presión y framing de último toque letal.
  creative_brief: >-
    Define una gramática reusable de striker-obsession donde presión de área,
    lectura de portería y agresividad de finalización construyan identidad
    visual transferible entre sujetos.
