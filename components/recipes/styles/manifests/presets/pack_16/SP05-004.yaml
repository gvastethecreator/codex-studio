visualDna:
  aesthetic: Ópera astral romántica, heroicidad melancólica, nobleza crepuscular y escala monumental.
  form_and_line: Línea cel clásica de figura elevada, drapeado amplio, acting contenido de añoranza y nobleza.
  color_palette: Índigos profundos, oro envejecido, rojo vino ceremonial y grises siderales desaturados.
  lighting_setup: Claroscuro estelar con key lateral dramática, halos de vacío y rim tenue sobre capa en movimiento.
  material_texture: Metal envejecido, terciopelo ceremonial, vidrio oscuro y grano analógico elegante.
  render_quality: Producción retro premium con lectura épica-lírica y composición de gran aliento visual.
  spatial_distortion: Grandes vacíos y ejes largos para enfatizar soledad heroica y destino itinerante.
  atmosphere: Melancólica, heroica, anhelante, grandiosa.
  key_features: Drapeado icónico, silueta noble, escala axial y horizonte abstracto como contrapeso emocional.
  creative_brief: >-
    Construye una gramática reusable de melancholy-astral-opera para cualquier
    sujeto, equilibrando majestuosidad operática, soledad noble y escala
    crepuscular sin imponer corsarios, naves, uniformes, puentes, ventanales ni
    horizontes estelares literales.
