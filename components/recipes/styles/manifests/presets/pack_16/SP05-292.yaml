  color_palette: Rojos ceremoniales, púrpuras eléctricos, negros performativos y dorados antiguos reactivados como acentos de linaje.
  lighting_setup: Contraluces performativos, haces dinámicos y cambios de temperatura por clímax rítmico para enfatizar catarsis colectiva.
  material_texture: Tejidos históricos reinterpretados con brillo de show, madera pulida, tensión lineal y humo de performance.
  render_quality: Acabado premium de ópera-rock animada con foco en impacto gestual, lectura coral y ritmo visual musical.
  spatial_distortion: Espacio performativo expansivo con perspectiva coral y compresión frontal en momentos de explosión rítmica.
  atmosphere: Extático, rebelde, ceremonial, liberador.
  key_features: Ornamento histórico remezclado, luz performativa, manifiesto corporal, ritmo musical visual y exceso teatral controlado.
  creative_brief: >-
    Diseña una gramática reusable de teatro punk histórico para cualquier prompt o imagen de entrada:
    performance, ornamento y energía glam sin imponer escenarios, instrumentos, audiencias ni vestuario literal.
