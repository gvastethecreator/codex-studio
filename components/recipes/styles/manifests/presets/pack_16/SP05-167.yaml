  color_palette: Azules profundos, naranjas de estela, metales cálidos usados y neón periférico abstracto.
  lighting_setup: Contraste dinámico entre sombra técnica y exterior luminoso, highlights de propulsión y reflejo duro.
  material_texture: Chapa usada, paneles técnicos, textiles utilitarios y grano analógico de space-western anime.
  render_quality: Acabado premium noventero con ritmo de escape y claridad de impulso cinético.
  spatial_distortion: Composición de trayectoria extrema con diagonales de escape, abordaje abstracto y maniobra improvisada.
  atmosphere: Aventurera, chulesca, estelar y peligrosa.
  key_features: Estelas largas, actitud outlaw, mapas de trayectoria abstractos y optimismo de escape peligroso.
  creative_brief: >-
    Define una gramática reusable de engine-trail-outlaw-adventure para
    cualquier sujeto, priorizando libertad, riesgo, estela cinética y espíritu
    de alianza improvisada sin imponer naves, hangares, cazarrecompensas, tesoros,
    dogfights, mapas ni puertos.
