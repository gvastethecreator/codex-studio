visualDna:
  aesthetic: Melodrama deportivo adolescente de verano tardío, donde rivalidad, duelo íntimo y crecimiento conviven en clave nostálgica.
  form_and_line: Línea deportiva limpia, gesto juvenil contenido y composición de campo que alterna acción atlética y pausa emocional.
  color_palette: Verdes de diamante soleado, naranjas de atardecer, blancos de uniforme y azules deslavados de verano tardío.
  lighting_setup: Sol bajo cálido con contraluces de estadio escolar y sombras planas que sostienen melancolía ligera.
  material_texture: Tierra de infield, cuero de guante, tela de uniforme y grano fílmico de recuerdo deportivo.
  render_quality: Acabado retro-atlético premium con lectura táctica de partido y subtexto romántico en respiraciones largas.
  spatial_distortion: Perspectiva de campo abierta con compresión selectiva en momentos de mirada y decisión sentimental.
  atmosphere: Nostálgica, cálida, atlética, melancólica.
  key_features: Diamante soleado, marcador narrativo, miradas desde dugout y crescendo emocional inning a inning.
  creative_brief: Diseña una gramática reusable de deporte sentimental juvenil para cualquier sujeto, combinando luz estival, presión competitiva y deseo contenido de maduración.
