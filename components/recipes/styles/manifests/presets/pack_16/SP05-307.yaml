visualDna:
  aesthetic: Melodrama deportivo de verano tardío, con rivalidad, duelo íntimo y crecimiento nostálgico.
  form_and_line: Línea atlética limpia, gesto contenido y composición que alterna acción física y pausa emocional.
  color_palette: Verdes soleados, naranjas de atardecer, blancos limpios y azules deslavados de verano tardío.
  lighting_setup: Sol bajo cálido con contraluces amplios y sombras planas que sostienen melancolía ligera.
  material_texture: Polvo seco, cuero cálido, tela funcional y grano fílmico de recuerdo deportivo.
  render_quality: Acabado retro-atlético premium con lectura táctica de esfuerzo y subtexto romántico en respiraciones largas.
  spatial_distortion: Perspectiva abierta con compresión selectiva en momentos de mirada y decisión sentimental.
  atmosphere: Nostálgica, cálida, atlética, melancólica.
  key_features: Luz estival, presión competitiva, pausa antes del esfuerzo, deseo contenido y crescendo emocional.
  creative_brief: >-
    Diseña una gramática reusable de deporte sentimental juvenil para cualquier prompt o imagen de entrada:
    verano, competencia y maduración sin imponer baseball, diamantes, marcadores, dugouts ni adolescentes.
