visualDna:
  aesthetic: Surrealismo psicoanalítico invasivo, con teatralidad cromática, metamorfosis de identidad y colapso de la vigilia.
  form_and_line: Contornos pulidos con rupturas súbitas, metamorfosis en cadena y coreografía simbólica sin multitud obligatoria.
  color_palette: Primarios saturados de carnaval, dorados performativos, negros profundos de inconsciente y pasteles inquietantes.
  lighting_setup: Iluminación de show onírico con focos teatrales, pulsos cromáticos y transiciones abruptas entre planos mentales.
  material_texture: Superficies brillantes de objeto-pop, telas pesadas, plástico simbólico y niebla de densidad psicológica.
  render_quality: Acabado premium de alta densidad visual con orden interno preciso para sostener legibilidad en caos simbólico.
  spatial_distortion: Espacio no estable con colapso de fronteras sueño-vigilia y continuidad fluida entre planos incompatibles.
  atmosphere: Surreal, carnavalesca, invasiva, deslumbrante.
  key_features: Saturación teatral, objetos simbólicos mutantes, fragmentación identitaria, ritmo carnavalesco y ruptura de fronteras mentales.
  creative_brief: >-
    Diseña una gramática reusable de invasión onírica para cualquier prompt o imagen de entrada:
    carnaval mental, metamorfosis y exceso cromático sin imponer desfiles, objetos domésticos, multitudes ni escenas de sueño concretas.
