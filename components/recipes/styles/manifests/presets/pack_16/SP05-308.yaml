visualDna:
  aesthetic: Noir ochentero seductor, con cinismo brillante, comedia insolente y peligro preciso.
  form_and_line: Contorno firme, acting de pose confiada y encuadres dinámicos de tensión vertical.
  color_palette: Azules nocturnos de cristal, morados neón, grises acero y acentos rojos de peligro instantáneo.
  lighting_setup: Neón alto reflejado en cristal, key cortante y sombras planas de thriller televisivo.
  material_texture: Vidrio nocturno, superficie brillante, tailoring texturado y metal pulido estilizado.
  render_quality: Acabado premium retro-noir con lectura clara de acción, punchline visual y elegancia precisa.
  spatial_distortion: Profundidad vertical exagerada y lente de acción para ritmo de amenaza.
  atmosphere: Suave, neón, irónica, peligrosa.
  key_features: Neón nocturno, verticalidad abstracta, moda 80s sugerida, ironía visual y contraste entre humor y amenaza.
  creative_brief: >-
    Construye una gramática reusable de noir ochentero de precisión para cualquier prompt o imagen de entrada:
    neón, cinismo y precisión tensa sin imponer skylines, armas, detectives ni violencia literal.
