visualDna:
  aesthetic: Noir urbano ochentero de pistolero privado, con cinismo seductor, comedia insolente y peligro de contrato.
  form_and_line: Contorno firme de figura en traje, acting de pose confiada y encuadres dinámicos de persecución calle-cielo.
  color_palette: Azules nocturnos de cristal, morados neón, grises acero y acentos rojos de peligro instantáneo.
  lighting_setup: Neón de rascacielo reflejado en cristal, key cortante de calle y sombras planas de thriller televisivo.
  material_texture: Vidrio de rascacielos, asfalto brillante, gabardina o traje texturado y metal de arma estilizado.
  render_quality: Acabado premium retro-noir con lectura clara de acción, punchline visual y elegancia de detective urbano.
  spatial_distortion: Profundidad de canyon urbano con verticalidad exagerada y lente de acción para ritmo de chase.
  atmosphere: Suave, neón, irónica, peligrosa.
  key_features: Skyline nocturno, postura detective-armada, moda 80s marcada y contraste entre chiste y violencia precisa.
  creative_brief: Construye una gramática reusable de detective-noir de altura para cualquier sujeto, mezclando verticalidad metropolitana, ironía de mercenario y violencia precisa de escena corta.
