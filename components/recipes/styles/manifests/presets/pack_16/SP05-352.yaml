  material_texture: Asfalto rugoso, grip tape gastado, metal de rampa marcado y textil streetwear vibrante.
  render_quality: Frame de skate premium con lectura instantánea de truco, aterrizaje y velocidad.
  spatial_distortion: Foreshortening aéreo y curvatura de half-pipe para enfatizar altura y trayectoria.
