visualDna:
  aesthetic: Magical-girl noventero de ternura luminosa, diseño ornamental, sellos elegantes y crecimiento emocional amable.
  form_and_line: Línea limpia y delicada, acting inocente determinado y staging de transformación con detalle artesanal.
  color_palette: Rosas pastel, dorados suaves, celestes claros y verdes de tarde acogedora.
  lighting_setup: Glow cálido de atardecer y magia blanda, con highlights perlados en ornamento místico.
  material_texture: Telas detalladas, papel simbólico, superficies suaves y grano analógico delicado.
  render_quality: Acabado premium 90s con legibilidad impecable de encanto, ritual y cotidianidad protectora.
  spatial_distortion: Escala íntima y protectora con aperturas fantásticas para sello, giro y vuelo visual.
  atmosphere: Dulce, mágica, brillante, reconfortante.
  key_features: Motivos de círculo-sello, ornamento arcano abstracto, transformación suave y coreografía aérea.
  creative_brief: >-
    Diseña una gramática reusable de storybook-seal-magic para cualquier
    sujeto, equilibrando delicadeza visual, aventura juvenil y esperanza serena
    sin imponer cartas, llaves, escuela, barrio, vestuario específico ni
    rituales literales.
