visualDna:
  aesthetic: Void-centered horror built on subtraction, silence, and the oppressive pull of a central absence.
  form_and_line: Sparse somber linework, low-detail peripheral elements, and circular anchoring forms that repeatedly return attention to the void.
  color_palette: Cold indigo wash, peat-black moisture zones, mineral gray fog, and faint desaturated cyan reflections.
  lighting_setup: Diffuse nocturnal top-light with weak ground bounce, preserving deep occlusion around cavity edges.
  material_texture: Water-dark stone porosity, saturated soil clumps, frayed fiber cues, and mist-laden air density.
  render_quality: Minimalist high-control rendering that avoids visual noise and concentrates dread through shape economy.
  spatial_distortion: Open negative-space layout with gravitational pull toward the central cavity and suppressed horizon cues.
  atmosphere: Listening-state tension, desolation, and the conviction that something waits below perception.
  key_features: Circular void anchors, moisture halos, decayed functional traces, and thin low-lying fog sheets in void-first framing.
  creative_brief: >-
    Build a transferable deep-void-whisper horror style for any subject:
    minimal geometry, moisture-rich materials, compositional gravity, and an
    unseen center without imposing wells, rural settings, ropes, cavities,
    objects, or specific landscapes.
