visualDna:
  aesthetic: Ceremonial demonic folklore horror combining shrine-like precision with feral ritual escalation and symbolic intimidation.
  form_and_line: Hard mask silhouettes, talismanic pattern bands, and radial gesture lines that imply invocation cycles.
  color_palette: Oxblood reds, ash-black fields, smoke-brown mids, and tarnished gold ritual accents.
  lighting_setup: Low fire-ring illumination with stochastic shadow dance, emphasizing mask contours and hand-sign focality.
  material_texture: Lacquer crackle, charred timber grain, wax drips, ash particulates, and scorched fabric edges.
  render_quality: High-impact folkloric clarity with aggressive focal contrast and controlled peripheral obscurity.
  spatial_distortion: Circular rite composition with centripetal pull, as if all geometry is bending toward the invocation core.
  atmosphere: Taboo ceremony, escalating dread, and primal authority made visual through symbols and heat.
  key_features: Dominant oni visage language, candle or ember ring systems, talisman clusters, and invocation-hand choreography.
  creative_brief: Create a reusable oni-ritual horror grammar by prioritizing radial ritual geometry, fire-ring contrast, and symbolic mask dominance across any subject.
