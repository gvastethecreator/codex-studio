visualDna:
  aesthetic: Picardía retro-jazz elegante, humor seco, glamour nocturno abstracto y tensión de engaño sofisticado.
  form_and_line: Trazo cel vintage afilado, gestualidad pícara y coreografía de timing musical sin acción fija.
  color_palette: Carbón nocturno, ámbar de farola, turquesa tenue y acentos crema de cartel antiguo.
  lighting_setup: Noir suave con contraluz recortado, reflejo húmedo y key focal en gesto de engaño.
  material_texture: Superficie mojada, tela textil elegante, cromado reflectante y grano telecine de caper setentero.
  render_quality: Acabado broadcast 80s de alto carácter, lectura clara de astucia, ritmo y puesta en escena.
  spatial_distortion: Perspectiva oblicua con encuadres de fuga, contrapicado de estilo y compresión de escape.
  atmosphere: Jazzy, juguetona, traviesa, sofisticada.
  key_features: Silueta estilizada, ritmo de montaje heist, luces recortadas y acting de doble intención.
  creative_brief: >-
    Diseña una gramática reusable de jazzy-rogue-heist-rhythm para cualquier
    sujeto, priorizando elegancia táctica, ironía visual y swing nocturno sin
    imponer robos, calles, callejones, gabardinas, vitrinas ni dúos
    investigadores.
