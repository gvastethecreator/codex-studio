visualDna:
  aesthetic: Heist retro-jazz de picardía elegante, con silueta delgada, humor seco y glamour urbano nocturno.
  form_and_line: Trazo cel vintage afilado, gestualidad pícara y staging de robo con coreografía de timing musical.
  color_palette: Carbón nocturno, ámbar de farola, turquesa tenue y acentos crema de cartel antiguo.
  lighting_setup: Noir suave con contraluz de persiana, reflejo húmedo de calle y key focal en gesto de engaño.
  material_texture: Asfalto mojado, gabardina textil, cromado de vitrina y grano telecine de caper setentero.
  render_quality: Acabado broadcast 80s de alto carácter, lectura clara de astucia, ritmo y puesta en escena.
  spatial_distortion: Perspectiva urbana oblicua con encuadres de fuga, contrapicado de estilo y compresión de callejón.
  atmosphere: Jazzy, juguetona, traviesa, sofisticada.
  key_features: Siluetas de abrigo largo, ritmo de montaje tipo atraco, luces urbanas y acting de doble intención.
  creative_brief: Diseña una gramática reusable de heist urbano con swing retro para cualquier sujeto, priorizando elegancia táctica, ironía visual y ritmo nocturno.
