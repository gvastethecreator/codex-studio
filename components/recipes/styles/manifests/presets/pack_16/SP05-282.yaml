visualDna:
  aesthetic: Humanismo cálido con comedia amarga, textura social y ternura resistente.
  form_and_line: Línea expresiva de ensemble, gestualidad corporal imperfecta pero cálida y staging coral adaptable a cualquier motivo.
  color_palette: Neones festivos, ámbares de refugio precario, azules fríos de noche invernal y rojos puntuales de esperanza doméstica.
  lighting_setup: Contraste entre iluminación pública dura y focos cálidos de proximidad, con reflejos húmedos que amplifican intimidad.
  material_texture: Superficie mojada, cartón gastado, telas superpuestas de invierno y señalética con desgaste cotidiano.
  render_quality: Acabado cinematográfico con prioridad en química de grupo, legibilidad emocional y detalle ambiental vivido.
  spatial_distortion: Perspectiva comprimida con capas de objetos y presencias que envuelven el foco relacional.
  atmosphere: Caótica, compasiva, festiva, redentora.
  key_features: Composición coral, microgestos de cuidado, humor corporal, textura social sugerida y contraste entre dureza visual y compasión.
  creative_brief: >-
    Define un estilo reusable de gracia humanista para cualquier prompt o imagen de entrada:
    calor emocional, imperfección expresiva y vínculo social sin imponer callejones, navidad, refugios ni grupos protagonistas.
