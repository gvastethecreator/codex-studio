visualDna:
  aesthetic: Humanismo urbano navideño que mezcla comedia de supervivencia y ternura social en escenarios densos de callejón metropolitano.
  form_and_line: Línea expresiva de ensemble, gestualidad corporal desprolija pero cálida y staging coral para transmitir vínculo improvisado.
  color_palette: Neones festivos de tienda, ámbares de refugio precario, azules fríos de noche invernal y rojos puntuales de esperanza doméstica.
  lighting_setup: Contraste entre iluminación pública dura y focos cálidos de proximidad, con reflejos húmedos que amplifican intimidad callejera.
  material_texture: Asfalto mojado, cartón gastado, telas superpuestas de invierno y señalética urbana con desgaste cotidiano.
  render_quality: Acabado cinematográfico con prioridad en química de grupo, legibilidad emocional y detalle ambiental de barrio vivido.
  spatial_distortion: Perspectiva urbana comprimida con capas de objetos y peatones que envuelven al trío sin perder foco relacional.
  atmosphere: Caótica, compasiva, festiva, redentora.
  key_features: Trío protagonista en bloque, clutter urbano navideño, refugios improvisados, humor corporal y microgestos de cuidado mutuo.
  creative_brief: Define un estilo reusable de gracia urbana invernal para cualquier sujeto combinando neón navideño, textura de precariedad y composición coral centrada en vínculo humano.
