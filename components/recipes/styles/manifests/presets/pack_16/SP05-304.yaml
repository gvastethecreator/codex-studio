visualDna:
  aesthetic: Tragedia barroca insurgente, con glamour cortesano quebrado, sentimentalismo político y alto voltaje ornamental.
  form_and_line: Línea ornamental y estilizada, posturas de retrato ceremonial y gestualidad trágica de alta teatralidad histórica.
  color_palette: Marfiles empolvados, azules reales, rojos de rosa heráldica y dorados envejecidos.
  lighting_setup: Luz lateral ceremonial con sombras planas nobles, halos suaves sobre ornamento y contraste de protocolo.
  material_texture: Brocado ceremonial, encaje rígido, piedra pulida y pátina ornamental al borde del derrumbe.
  render_quality: Acabado premium retro-histórico con lectura de emblema visual y tensión dramática de destino.
  spatial_distortion: Composición profunda con eje de retrato frontal y presión histórica abstracta en segundo plano.
  atmosphere: Regia, trágica, histórica, apasionada.
  key_features: Ornamento floral, protocolo visual, retrato trágico, sensualidad pictórica y sensación de fractura histórica.
  creative_brief: >-
    Define una gramática reusable de melodrama barroco insurgente para cualquier prompt o imagen de entrada:
    protocolo, ornamento y tensión política sin imponer uniformes, palacios, escalinatas ni aristocracia literal.
