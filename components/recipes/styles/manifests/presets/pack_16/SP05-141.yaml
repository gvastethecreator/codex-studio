visualDna:
  aesthetic: Pop gótico de resonancia espiritual, humor macabro gráfico y pulso punk sobrenatural transferible.
  form_and_line: Línea digital afilada, siluetas angulares, gestualidad exagerada y ritmo visual sincopado.
  color_palette: Morados de noche de Halloween, naranjas encendidos, negros tinta y acentos cian de resonancia espiritual.
  lighting_setup: Contrastes teatrales con glow espectral, sombras planas expresivas y rims fríos sobre bordes gráficos.
  material_texture: Acabados limpios de era digital, superficies góticas estilizadas, patrones rayados y grano leve siniestro-pop.
  render_quality: Producción premium early-2000s con lectura inmediata de pose, beat visual y personalidad visual intensa.
  spatial_distortion: Perspectiva dinámica, diagonales juguetonas y deformación elástica alrededor de pulsos de alma.
  atmosphere: Traviesa, spooky, vibrante, desafiante.
  key_features: Contrastes Halloween-pop, accesorios a rayas, morfologías angulares, iconografía lunar abstracta y acentos de resonancia.
  creative_brief: Diseña una gramática reusable de punk gótico espiritual para cualquier sujeto, combinando iconografía de Halloween, ritmo rebelde y energía de alma sin imponer academia, armas, dúos ni combate.
