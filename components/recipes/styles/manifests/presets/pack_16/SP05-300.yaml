visualDna:
  aesthetic: Espectáculo heroico hipergráfico de rescate mecha, con anti-naturalismo cromático y teatralidad de rivalidad en clave de póster vivo.
  form_and_line: Contorno duro y dinámico, geometría angular dominante y siluetas de acción que privilegian impacto inmediato sobre detalle realista.
  color_palette: Bloques intensos en cian, magenta, naranja fuego y amarillos eléctricos con negros limpios de separación gráfica.
  lighting_setup: Iluminación extrema de incendio estilizado, contraluces violentos y flashes de alto contraste para clímax continuo.
  material_texture: Superficies mecha lisas de acabado sintético, humo estilizado y fuego triangular tratado como forma gráfica.
  render_quality: Acabado premium de acción maximalista con legibilidad de coreografía de rescate y jerarquía clara de héroe-antihéroe.
  spatial_distortion: Perspectiva de gran angular heroica con deformación cinética orientada a velocidad, choque y espectáculo.
  atmosphere: Incandescente, teatral, gráfica, triunfal.
  key_features: Llamas triangulares, unidades de rescate mecha, color blocking extremo y staging de rivalidad operática.
  creative_brief: Construye una gramática reusable de acción cromática mecha para cualquier sujeto, usando fuego geométrico, composición de póster y energía de rescate como eje visual.
