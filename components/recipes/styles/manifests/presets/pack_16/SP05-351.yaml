visualDna:
  aesthetic: Resistencia de fondo nocturna, pacing mental, cohesión grupal y respiración progresiva.
  form_and_line: Siluetas de avance eficiente, postura de economía física y acting de fatiga contenida.
  color_palette: Azules nocturnos fríos, ámbar puntual y acentos discretos de cohesión grupal.
  lighting_setup: Cadencia lumínica seriada, contraste bajo nocturno y halos de respiración en frío.
  material_texture: Superficie húmeda fina, textil técnico, vapor de aliento y desgaste continuo.
  render_quality: Frame deportivo introspectivo con claridad de spacing grupal, ritmo y esfuerzo acumulado.
  spatial_distortion: Perspectiva de recorrido largo con compresión gradual de distancia y vector de avance continuo.
  atmosphere: Determinada, fría, introspectiva y comunitaria.
  key_features: Ritmo de luces, spacing de grupo, vapor respiratorio, continuidad de ruta abstracta y calma de esfuerzo.
  creative_brief: >-
    Aplica una gramática reusable de resistencia nocturna a cualquier prompt o imagen de entrada:
    pacing, respiración y cohesión sin imponer running, campus, maratones, rutas ni farolas literales.
