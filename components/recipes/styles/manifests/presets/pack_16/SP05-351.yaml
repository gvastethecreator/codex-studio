  color_palette: Azules nocturnos fríos, ámbar de farola y acentos uniformes discretos de equipo.
  lighting_setup: Cadencia lumínica por farolas, contraste bajo de ruta nocturna y halos de respiración en frío.
  material_texture: Asfalto húmedo fino, textil técnico de running, vapor de aliento y suela de desgaste continuo.
  render_quality: Frame deportivo introspectivo con claridad de pack spacing, ritmo y esfuerzo acumulado.
  spatial_distortion: Perspectiva de ruta larga con compresión gradual de distancia y vector de avance continuo.
