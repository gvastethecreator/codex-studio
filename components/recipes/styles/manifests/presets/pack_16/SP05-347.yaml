visualDna:
  aesthetic: Ciclismo de montaña shonen orientado a escalada extrema, resistencia mental y dinámica de pelotón.
  form_and_line: Curvas de inclinación pronunciada, musculatura de esfuerzo sostenido y postura de pedaleo de alta cadencia.
  color_palette: Colores de escuadra saturados sobre asfalto oscuro, verdes de ladera y cielos fríos de altura.
  lighting_setup: Luz abierta de carretera con contraluces de pendiente y flare suave de altitud.
  material_texture: Asfalto rugoso, fibra de cuadro ligero, tejido técnico de jersey y polvo fino en neumático.
  render_quality: Frame de ruta premium con legibilidad de escalada, drafting y ruptura de pelotón.
  spatial_distortion: Perspectiva de switchback con compresión de pendiente y elongación de curva para dramatizar ascenso.
  atmosphere: Exhausta, obsesiva y triunfal por resistencia.
  key_features: Ángulos de bici agresivos, spacing de pelotón, gestualidad de esfuerzo y topología de puerto ascendente.
  creative_brief: >-
    Define una gramática reusable de uphill-breakaway donde pendiente,
    resistencia y lectura de pelotón estructuren la identidad visual sin quedar
    fijados a un momento narrativo.
