visualDna:
  aesthetic: Deporte shonen de resistencia ascendente, esfuerzo mental, presión grupal y quiebre de ritmo.
  form_and_line: Curvas de inclinación pronunciada, musculatura de esfuerzo sostenido y postura de alta cadencia.
  color_palette: Bloques saturados de esfuerzo sobre oscuros rugosos, verdes inclinados y cielos fríos de altura.
  lighting_setup: Luz abierta de ascenso con contraluces de pendiente y flare suave de altitud.
  material_texture: Superficie rugosa, fibra técnica sugerida, tejido deportivo y polvo fino de fricción.
  render_quality: Frame de resistencia premium con legibilidad de ascenso emocional, succión grupal y ruptura de ritmo.
  spatial_distortion: Perspectiva comprimida de pendiente y elongación de curva para dramatizar ascenso.
  atmosphere: Exhausta, obsesiva y triunfal por resistencia.
  key_features: Diagonales ascendentes, spacing de grupo, gestualidad de esfuerzo, velocidad acumulada y respiración extrema.
  creative_brief: >-
    Aplica una gramática reusable de breakaway ascendente a cualquier prompt o imagen de entrada:
    resistencia, pendiente emocional y presión grupal sin imponer bicicletas, pelotón, rutas ni montaña literal.
