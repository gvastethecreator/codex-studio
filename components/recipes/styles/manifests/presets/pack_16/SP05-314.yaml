visualDna:
  aesthetic: Drama mecha de entrenamiento y sacrificio, con transición emocional de academia a guerra cósmica en clave súper sentida.
  form_and_line: Línea cel de alto contraste, close-ups lacrimales intensos y siluetas de mecha monumental frente a piloto vulnerable.
  color_palette: Azules nocturnos de base, blancos técnicos de instalación, rojos de alarma y naranjas de impulso de lanzamiento.
  lighting_setup: Luz industrial de gantry con destellos de motor warp, sombras planas rígidas y backlight de cuenta regresiva terminal.
  material_texture: Estructura metálica pesada, panelería de hangar, superficies de traje de piloto y grano televisivo ochentero.
  render_quality: Acabado premium retro-dramático con énfasis en escala máquina-cuerpo y crescendo emocional de partida.
  spatial_distortion: Perspectiva vertical extrema de plataforma de lanzamiento que magnifica el salto de madurez forzada.
  atmosphere: Sincera, grandiosa, llorosa, heroica.
  key_features: Gantry colosal, lenguaje visual de entrenamiento, lágrimas de determinación y iconografía de motor espacial.
  creative_brief: Crea una gramática reusable de heroísmo formativo mecha para cualquier sujeto, combinando infraestructura de lanzamiento, vulnerabilidad emotiva y salto irreversible al destino cósmico.
