visualDna:
  aesthetic: Drama de entrenamiento y sacrificio extremo, con vulnerabilidad emotiva, escala cósmica y determinación formativa.
  form_and_line: Línea cel de alto contraste, close-ups emocionales intensos y siluetas monumentales frente a fragilidad humana.
  color_palette: Azules nocturnos de base, blancos técnicos, rojos de alarma y naranjas de impulso terminal.
  lighting_setup: Luz industrial con destellos de energía, sombras planas rígidas y backlight de cuenta regresiva emocional.
  material_texture: Masa técnica pesada, paneles funcionales, superficies de esfuerzo y grano televisivo ochentero.
  render_quality: Acabado premium retro-dramático con énfasis en escala, cuerpo vulnerable y crescendo emocional de partida.
  spatial_distortion: Perspectiva vertical extrema que magnifica madurez forzada y salto irreversible.
  atmosphere: Sincera, grandiosa, llorosa, heroica.
  key_features: Escala colosal, lágrimas de determinación, infraestructura abstracta, salto irreversible y emoción formativa.
  creative_brief: >-
    Crea una gramática reusable de heroísmo formativo monumental para cualquier prompt o imagen de entrada:
    entrenamiento, sacrificio y escala cósmica sin imponer academias, plataformas, motores, pilotos ni lanzamientos.
