visualDna:
  aesthetic: Institutional liminal horror centered on everyday order becoming psychologically unstable through subtle visual dissonance.
  form_and_line: Slightly misregistered contours, straight bureaucratic lines that warp near the vanishing point, and peripheral figure suggestions.
  color_palette: Fluorescent sick-green, chalk gray, nicotine beige, and restrained coagulated-red warning accents.
  lighting_setup: Intermittent overhead flicker pattern with alternating dead zones that create uncertain visibility cadence.
  material_texture: Damp paint bloom, worn synthetic sheen, stained panel surfaces, and particulate haze.
  render_quality: Precise anime readability with unease-first composition, preserving mundane detail while inserting controlled anomalies.
  spatial_distortion: Tunnel-like institutional perspective stretched beyond comfort, with micro-tilt and depth drag near thresholds.
  atmosphere: Social emptiness, anticipatory dread, and the feeling of being observed by architecture itself.
  key_features: Repeating institutional modules, uncertain reflections, failed flicker intervals, and threshold interruptions.
  creative_brief: >-
    Create a reusable institutional-liminal-dread grammar for any subject:
    bureaucratic geometry, flicker rhythm, barely perceived distortions, and
    social emptiness without imposing schools, corridors, lockers, doors,
    classrooms, or specific buildings.
