visualDna:
  aesthetic: Velocidad nocturna técnica, con deriva controlada, transferencia de peso visual y lectura de riesgo invisible.
  form_and_line: Contornos afilados, vectores de derrape abstracto y postura de concentración máxima aplicable a cualquier sujeto.
  color_palette: Azules de noche inclinada, blanco de haz alto, naranja térmico y negros húmedos.
  lighting_setup: Cortes de luz direccionales y halos de niebla que enfatizan apex y salida de curva.
  material_texture: Granularidad húmeda, metal mojado, humo fino y reflejos bajos de velocidad.
  render_quality: Frame de performance anime con prioridad en trayectoria, adherencia visual y lectura de riesgo.
  spatial_distortion: Compresión agresiva de túnel visual y estiramiento lateral de deriva.
  atmosphere: Nocturna, tensa, técnica y adictiva.
  key_features: Ángulo de deriva, conos de luz, curva abstracta, foco técnico y estela de humo precisa.
  creative_brief: >-
    Define una gramática reusable de deriva nocturna para cualquier prompt o imagen de entrada:
    tracción, riesgo y luz direccional sin imponer autos, montaña, faros, volantes ni carreras.
