visualDna:
  aesthetic: Touge-racing nocturno centrado en drift técnico, control de transferencia de peso y lectura de curva ciega.
  form_and_line: Contornos de vehículo afilados, vectores de derrape y postura de conducción de concentración máxima.
  color_palette: Azules de noche montañosa, blanco de faro alto, naranja de freno térmico y negros de asfalto húmedo.
  lighting_setup: Cortes de luz por faros direccionales y halos de niebla que enfatizan apex y salida de curva.
  material_texture: Asfalto granular, guardarraíl metálico mojado, humo de neumático fino y cabina con reflejo bajo.
  render_quality: Frame de motorsport anime con prioridad en trayectoria, adherencia y lectura de riesgo.
  spatial_distortion: Perspectiva de hairpin con compresión agresiva del túnel vial y estiramiento lateral del drift.
  atmosphere: Nocturna, tensa, técnica y adictiva.
  key_features: Ángulo de derrape, conos de faro, curva cerrada, foco de volante y estela de humo quirúrgica.
  creative_brief: >-
    Define una gramática reusable de mountain-drift donde lectura de curva,
    comportamiento de tracción y tensión nocturna estructuren identidad sin
    depender de una carrera concreta.
