visualDna:
  aesthetic: Cel anime 90s deportivo de rivalidad frontal, energía juvenil, esfuerzo sudado y carisma underdog.
  form_and_line: Línea atlética, acting competitivo legible, diagonales de impulso, anatomía en tensión y gestos de remontada.
  color_palette: Miel cálida, rojos y azules limpios, blanco intenso, sombra de esfuerzo y naranja acento de energía.
  lighting_setup: Luz limpia de alto rebote, reflejos cálidos, rim de esfuerzo físico y contraste claro sobre gestos.
  material_texture: Superficie encerada abstracta, tela sudada, grano clásico de anime deportivo y brillo de movimiento rápido.
  render_quality: Acabado premium 90s con claridad táctica, emoción coral y ritmo de superación sin fijar deporte específico.
  spatial_distortion: Perspectiva dinámica de acción media, líneas de velocidad y encuadres bajos para enfatizar salto, choque o avance.
  atmosphere: Competitiva, sudada, esperanzadora, magnética.
  key_features: Diagonales deportivas, reflejos cálidos, gestos de esfuerzo, química de equipo, encuadre de rivalidad y ritmo de remontada.
  creative_brief: >-
    Aplica este preset como tratamiento abstracto de anime deportivo 90s:
    cualquier prompt debe ganar intensidad competitiva, vínculo grupal, energía
    de remontada y fisicalidad clara sin forzar baloncesto ni cancha.
