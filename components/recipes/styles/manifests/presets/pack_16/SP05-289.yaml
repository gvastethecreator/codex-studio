visualDna:
  aesthetic: Alegoría gótica de silencio apocalíptico, con monumentalidad sacra vaciada y simbolismo ambiguo de contemplación extrema.
  form_and_line: Línea fina y ascética, figuras alargadas casi litúrgicas y contornos de ruina monumental con ritmo arquitectónico severo.
  color_palette: Azul petróleo profundo, grises de piedra mojada, marfiles apagados y negros acuosos de profundidad incierta.
  lighting_setup: Iluminación baja y difusa con reflejos acuáticos fríos, focos puntuales de vidriera rota y sombras de gran masa.
  material_texture: Piedra erosionada, superficies inundadas espejadas, madera antigua saturada y pátina ritual de abandono.
  render_quality: Acabado premium de contemplación lenta, detalle textural sobrio y jerarquía simbólica por vacío compositivo.
  spatial_distortion: Escala catedralicia sobredimensionada con perspectiva reverencial que reduce lo humano a signo frágil.
  atmosphere: Sacra, muda, onírica, doliente.
  key_features: Ruina monumental inundada, símbolo ovoide ambiguo, siluetas elongadas y composición devocional de vacío.
  creative_brief: Diseña un lenguaje reusable de misticismo en ruina donde cualquier sujeto quede absorbido por silencio arquitectónico, agua oscura y simbología no resuelta.

