visualDna:
  aesthetic: Alegoría gótica de silencio apocalíptico, monumentalidad vaciada y simbolismo ambiguo de contemplación extrema.
  form_and_line: Línea fina y ascética, proporciones alargadas, ritmo severo y espacios negativos tratados como materia espiritual.
  color_palette: Azul petróleo profundo, grises de piedra mojada, marfiles apagados y negros acuosos de profundidad incierta.
  lighting_setup: Iluminación baja y difusa con reflejos acuáticos fríos, focos puntuales de vidriera rota y sombras de gran masa.
  material_texture: Piedra erosionada, superficies inundadas espejadas, madera antigua saturada y pátina ritual de abandono.
  render_quality: Acabado premium de contemplación lenta, detalle textural sobrio y jerarquía simbólica por vacío compositivo.
  spatial_distortion: Escala reverencial sobredimensionada con perspectiva contemplativa que reduce lo humano a signo frágil.
  atmosphere: Sacra, muda, onírica, doliente.
  key_features: Vacío devocional, agua oscura sugerida, símbolos no resueltos, siluetas elongadas y quietud extrema.
  creative_brief: >-
    Diseña un lenguaje reusable de misticismo ascético para cualquier prompt o imagen de entrada:
    silencio, vacío y símbolo ambiguo sin imponer catedrales, ruinas inundadas, huevos ni figuras litúrgicas concretas.

