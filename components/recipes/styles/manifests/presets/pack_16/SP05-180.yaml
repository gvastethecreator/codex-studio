visualDna:
  aesthetic: Estilo cel anime noventero de acción técnica, tensión cinética abstracta y confianza gráfica afilada.
  form_and_line: Línea limpia y rápida, siluetas decididas, diagonales de velocidad y encuadres compactos de lectura inmediata.
  color_palette: Azules nocturnos, acero cromado, negros densos, piel cálida y acentos naranjas de luz dura.
  lighting_setup: Contraste de farola estilizada, brillos duros sobre bordes metálicos y sombras recortadas de thriller.
  material_texture: Acetato satinado, metal pulido, cuero gráfico, grano analógico y superficies mecánicas sugeridas sin literalidad.
  render_quality: Acabado premium 90s con precisión de contorno, energía cinética y detalle técnico subordinado al sujeto original.
  spatial_distortion: Perspectiva comprimida, motion streaks controlados y planos tensos que vuelven dinámico cualquier motivo.
  atmosphere: Afilada, acelerada, segura, peligrosa.
  key_features: Cel shading limpio, reflejos cromados, tensión operativa abstracta, posing confiado y ritmo visual de aceleración.
  creative_brief: >-
    Aplica una gramática reusable de acción técnica noventera a cualquier prompt o imagen de entrada:
    precisión gráfica, actitud afilada y dinamismo cinético. Vehículos, armas,
    garajes o persecuciones pueden aparecer como indicios de thriller técnico si
    potencian el input, sin fijar una escena literal.
