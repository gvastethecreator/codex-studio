visualDna:
  aesthetic: Aventura celeste clásica, con maravilla retro-mecánica, optimismo de descubrimiento y escala vertical abierta.
  form_and_line: Contornos claros, ingeniería retro sugerida, curvas orgánicas y diagonales de elevación que vuelven expansivo cualquier sujeto.
  color_palette: Cielos cerúleos amplios, dorados envejecidos de metal, verdes de ruina suspendida y blancos de nube brillante.
  lighting_setup: Iluminación de gran altitud con contraluces solares, volumen de nubes y destellos selectivos sobre superficies metálicas.
  material_texture: Latón pulido y oxidado, piedra aérea erosionada, vegetación colgante y telas de aventura con desgaste funcional.
  render_quality: Acabado premium de aventura cinematográfica, lectura limpia de escala aérea y claridad de acción en planos abiertos.
  spatial_distortion: Perspectiva vertical expansiva con sensación de caída y ascenso continuo entre estratos de nubes.
  atmosphere: Maravillosa, valiente, libre, expedicionaria.
  key_features: Luz de altura, metales retro, composición vertical abierta, sensación de viaje y contraste entre inocencia y tecnología noble.
  creative_brief: >-
    Construye una gramática reusable de aventura celeste para cualquier prompt o imagen de entrada:
    asombro, escala aérea y diseño retro-mecánico. Puede elevar el input con
    robots nobles, ruina suspendida, ingeniería aérea o silueta exploradora si
    suma identidad, sin fijar isla flotante ni escena de expedición.
