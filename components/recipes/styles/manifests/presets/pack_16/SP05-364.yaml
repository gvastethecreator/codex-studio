visualDna:
  aesthetic: Ensayo obsesivo de línea corporal, disciplina técnica, exposición emocional y perfección frágil.
  form_and_line: Eje corporal refinado, extensiones largas, transición de peso controlada y gesto vulnerable.
  color_palette: Neutros de estudio, rosas empolvados, grises cálidos y acentos de piel iluminada por esfuerzo.
  lighting_setup: Luz de sala y rebote de espejo con contraste medio para enfatizar corrección postural.
  material_texture: Piso desgastado, tela de ensayo transpirable, resina fina y sudor de práctica.
  render_quality: Frame performativo elegante con lectura clara de técnica, tensión muscular y vulnerabilidad.
  spatial_distortion: Perspectiva de espejo múltiple con profundidad repetida que acentúa autocorrección y presión.
  atmosphere: Apasionada, disciplinada, elegante y técnicamente frágil.
  key_features: Multiplicación especular, líneas de extremidad, respiración de ensayo y foco corporal expresivo.
  creative_brief: >-
    Construye una gramática reusable de obsessive-line-rehearsal donde línea
    anatómica, autocorrección, repetición especular y emocionalidad contenida
    formen identidad visual transferible sin imponer ballet, estudio,
    zapatillas ni ensayo literal.
