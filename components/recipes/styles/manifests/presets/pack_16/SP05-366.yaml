  color_palette: Maderas cálidas, ámbar íntimo, negro laca y acentos crema de formalidad.
  lighting_setup: Luz suave con foco frontal sobre líneas resonantes y rebote cálido de madera.
  material_texture: Laca pulida, tensión lineal visible, tela ceremonial y madera resonante.
  render_quality: Frame musical de alta delicadeza con legibilidad de ataque, dinámica y balance entre intérpretes.
  spatial_distortion: Perspectiva de ensamble en abanico con profundidad serena y jerarquía de secciones.
  atmosphere: Sincera, resonante, delicada y elevadora.
