  color_palette: Maderas cálidas, ámbar de sala, negro laca y acentos crema de vestuario formal.
  lighting_setup: Luz de recital suave con foco frontal sobre cuerdas y rebote cálido de escenario.
  material_texture: Laca pulida del instrumento, cuerda tensada visible, tela ceremonial y piso de madera resonante.
  render_quality: Frame musical de alta delicadeza con legibilidad de ataque, dinámica y balance entre intérpretes.
  spatial_distortion: Perspectiva de ensamble en abanico con profundidad serena y jerarquía de secciones.
  atmosphere: Sincera, resonante, delicada y elevadora.
  key_features: Detalle de cuerdas, staging sentado, brillo de laca y foco en colocación de manos.
