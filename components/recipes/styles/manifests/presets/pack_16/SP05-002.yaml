visualDna:
  aesthetic: Heavy chrome mecha, heroic posing, bold retro machinery, rivet detailing, dramatic launch sequences, chunky mechanical joints
  form_and_line: Chunky mecha silhouette blocking, rivet-conscious contouring, mechanical panel breaks, impact-line emphasis
  color_palette: Saturated super-robot primaries with steel neutrals, hot warning reds, and heroic contrast blocks
  lighting_setup: Hard directional key with dramatic cel shadow wedges, metallic rim splits, launch-bay backlight flare
  material_texture: Painted steel plate cues, cel-highlighted chrome edges, analog matte background treatment, scanline-era grain
  render_quality: Classic super-robot broadcast frame quality with strong mechanical readability and era-faithful cel compositing
  spatial_distortion: Extreme low-angle hero mecha framing, launch-vector perspective exaggeration, scale-first composition logic
  atmosphere: Action-heavy, triumphant, intense, explosive
  key_features: Super-robot massing grammar, riveted panel articulation, launch-sequence perspective drama, metallic cel highlight choreography
  creative_brief: >-
    Preserve the super-robot tradition through heavy mechanical silhouettes,
    high-contrast cel shading, and emotionally maximal hero framing. The style
    should foreground machine grandeur and analog-era dynamism without
    collapsing into generic retro anime.
