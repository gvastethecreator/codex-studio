visualDna:
  aesthetic: Heavy chrome grandeur, heroic massing, bold retro machinery logic, rivet detailing, and triumphant analog scale.
  form_and_line: Chunky silhouette blocking, rivet-conscious contouring, mechanical panel breaks, and impact-line emphasis.
  color_palette: Saturated super-robot primaries with steel neutrals, hot warning reds, and heroic contrast blocks
  lighting_setup: Hard directional key with dramatic cel shadow wedges, metallic rim splits, and backlight flare.
  material_texture: Painted steel plate cues, cel-highlighted chrome edges, analog matte background treatment, scanline-era grain
  render_quality: Classic broadcast frame quality with strong mechanical readability and era-faithful cel compositing.
  spatial_distortion: Extreme low-angle heroic framing, launch-vector perspective exaggeration, and scale-first composition logic.
  atmosphere: Action-heavy, triumphant, intense, explosive
  key_features: Monumental massing grammar, riveted panel articulation, launch-vector perspective drama, and metallic cel highlight choreography.
  creative_brief: >-
    Preserve vintage mechanical grandeur through heavy silhouette logic,
    high-contrast cel shading, riveted articulation, and emotionally maximal
    hero framing. Transfer this logic to any subject or input image without
    requiring robots, vehicles, launch bays, pilots, or machinery as literal
    content.
