  spatial_distortion: Pensión de corredores estrechos y cuartos conectados que intensifica roce emocional continuo.
  atmosphere: Cálida, nostálgica, doméstica, paciente.
  key_features: Balcones al atardecer, clutter habitable, primerísimos emocionales y coreografía de vecinos.
  creative_brief: Crea una gramática reusable de intimidad doméstica adulta para cualquier sujeto, basada en rutina compartida, microgesto afectivo y desgaste entrañable del espacio común.
