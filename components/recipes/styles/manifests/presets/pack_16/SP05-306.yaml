  color_palette: Ámbares de atardecer, marrones de madera vivida, verdes apagados y rojos discretos de intimidad hogareña.
  lighting_setup: Luz dorada de fin de tarde con sombras planas tranquilas y contraste bajo que favorece ternura acumulativa.
  material_texture: Pasillos gastados, lavandería colgada, muebles usados y grano cálido de serie televisiva clásica.
