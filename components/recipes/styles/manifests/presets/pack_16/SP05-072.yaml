visualDna:
  aesthetic: Epopeya eco-mítica ancestral, conflicto civilizatorio y espiritualidad feroz de materia viva.
  form_and_line: Línea robusta y noble, anatomía heroica contenida y composición de choque entre organicidad y hierro.
  color_palette: Verdes profundos, tierra húmeda, negros de hierro y blancos fantasmales de espíritu natural.
  lighting_setup: Luz filtrada con rayos dramáticos, niebla profunda y contrastes de incendio industrial.
  material_texture: Corteza viva, piel rugosa, metal forjado y barro bélico sobre fondo pictórico orgánico.
  render_quality: Producción cinematográfica de alta gravedad moral, con lectura clara de escala natural y tragedia humana.
  spatial_distortion: Grandes vacíos orgánicos y gargantas de escala para enfatizar mundo viejo vs mundo mecánico.
  atmosphere: Majestuosa, elemental, primal, sobrecogedora.
  key_features: Iconografía de guardián natural, tensión organicidad-industria y narrativa visual de pacto roto.
  creative_brief: Diseña una gramática reusable de conflicto eco-épico para cualquier sujeto, fusionando misticismo natural, violencia histórica y peso de decisión moral sin imponer bosques, bestias, armaduras ni guerra literal.
