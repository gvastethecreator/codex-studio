  aesthetic: Epopeya eco-mítica de bosque ancestral, con conflicto civilizatorio y espiritualidad feroz de la naturaleza.
  form_and_line: Línea robusta y noble, anatomía heroica contenida y composición de choque entre bestialidad y armadura.
  color_palette: Verdes profundos, tierra húmeda, negros de hierro y blancos fantasmales de espíritu del bosque.
  lighting_setup: Luz filtrada de dosel con rayos dramáticos, niebla de valle y contrastes de incendio industrial.
  material_texture: Corteza viva, piel de bestia, metal forjado y barro bélico sobre fondo pictórico orgánico.
  render_quality: Producción cinematográfica de alta gravedad moral, con lectura clara de escala natural y tragedia humana.
  spatial_distortion: Grandes claros y gargantas boscosas para enfatizar guerra de mundo viejo vs mundo mecánico.
  atmosphere: Majestuosa, elemental, primal, sobrecogedora.
  key_features: Iconografía de guardián natural, tensión bosque-industria y narrativa visual de pacto roto.
  creative_brief: Diseña una gramática reusable de conflicto eco-épico para cualquier sujeto, fusionando misticismo natural, violencia histórica y peso de decisión moral.
