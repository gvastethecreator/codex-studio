  color_palette: Azules profundos de crepúsculo, magentas de cielo tardío, naranjas de atardecer y cian cristalino.
  lighting_setup: Flare óptico controlado, contraluz de hora mágica y gradientes de cielo de alta saturación sentimental.
  material_texture: Superficies urbanas limpias, aire húmedo translúcido y microdetalle ambiental de realismo pictórico.
  render_quality: Acabado cinematográfico brillante con foco en luz narrativa y emoción suspendida en paisaje.
  spatial_distortion: Escala dual ciudad-pueblo con cortes espaciales que refuerzan distancia afectiva y encuentro improbable.
  atmosphere: Romántica, luminosa, nostálgica, doliente.
  key_features: Cielo protagonista, motivo de hilo/memoria y contraste entre cotidianidad juvenil y evento cósmico.
  creative_brief: Define una gramática reusable de romance cósmico-lumínico para cualquier sujeto, priorizando cielo expresivo, anhelo temporal y delicadeza emocional.
