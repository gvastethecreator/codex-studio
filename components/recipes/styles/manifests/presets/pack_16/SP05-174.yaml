visualDna:
  aesthetic: Cel anime 90s de tragedia pesada, masa de hierro, sombra fúnebre y supervivencia emocional extrema.
  form_and_line: Línea gruesa y agresiva, anatomía angulosa, contornos cargados de peso, diagonales brutales y poses de resistencia física.
  color_palette: Negro ceniza, gris hierro, óxido oscuro, rojo herida apagado y marrón barro profundo.
  lighting_setup: Tormenta baja, highlights metálicos duros, contraluces mínimos y sombra opresiva que aplasta el encuadre.
  material_texture: Hierro rugoso, barro seco, piel marcada, piedra quebrada abstracta y grano fílmico áspero.
  render_quality: Acabado premium noventero con densidad dramática extrema, peso material claro y violencia sugerida por composición.
  spatial_distortion: Escala monumental y diagonales sobredimensionadas hacen que cualquier sujeto parezca cargar una fatalidad física.
  atmosphere: Brutal, fúnebre, condenada, implacable.
  key_features: Silueta pesada, grano áspero, sombra de trauma, masa metálica, rojos apagados y gesto de dolor contenido.
  creative_brief: >-
    Aplica este preset como tratamiento abstracto de anime oscuro 90s:
    cualquier prompt debe ganar peso, fatalidad, textura áspera y tragedia
    corporal sin exigir espada, castillo ni escena medieval.
