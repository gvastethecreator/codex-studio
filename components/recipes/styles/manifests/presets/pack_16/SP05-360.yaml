visualDna:
  aesthetic: Competición poética de reflejo mental, memoria sonora, gesto instantáneo y disciplina elegante.
  form_and_line: Gesto de mano ultrarrápido, postura baja disciplinada y movimiento de tela como vector de acción.
  color_palette: Tonos vegetales cálidos, índigo tradicional y acentos carmín de tensión competitiva.
  lighting_setup: Iluminación interior suave con foco sobre planos de memoria y contraste de concentración facial.
  material_texture: Trama vegetal, papel nítido, seda formal y madera ceremonial sugerida.
  render_quality: Frame deportivo-cultural con lectura precisa de sonido, reacción y captura mental.
  spatial_distortion: Perspectiva rasante y estiramiento gestual para dramatizar velocidad de strike.
  atmosphere: Concentrada, elegante, disciplinada y urgentemente competitiva.
  key_features: Geometría baja, blur de mano, tensión silenciosa y close-up de foco mental.
  creative_brief: >-
    Formula una gramática reusable de reflejo poético para cualquier prompt o imagen de entrada:
    memoria, gesto y silencio competitivo sin imponer karuta, tatami, cartas, sala ni poesía literal.
