visualDna:
  aesthetic: Gótico tecno-sacral, con juventud maldita, liturgia de presión abstracta y solemnidad mecánica sombría.
  form_and_line: Línea digital fina con silueta pesada, gesto melancólico y lenguaje de fuerza sacramental.
  color_palette: Azules fríos de penumbra, granates vitrales, marfiles sagrados y negros de condena mecánica.
  lighting_setup: Luz filtrada tipo vitral, rim tenue sobre insignias abstractas y sombras graduales sacro-industriales.
  material_texture: Piedra gótica, metal maldito, tela pesada, polvo eclesial y pátina mecánica.
  render_quality: Acabado premium dark-2000s con equilibrio entre combate ritual y dolor juvenil persistente.
  spatial_distortion: Profundidad sacra comprimida con fuga vertical para enfatizar carga espiritual y amenaza.
  atmosphere: Lúgubre, sagrada, maldita, decidida.
  key_features: Iconografía sacra tecnificada, marcas de maldición, silueta pesada y profundidad ritual.
  creative_brief: >-
    Construye una gramática reusable de techno-gothic-exorcism para cualquier
    sujeto: solemnidad religiosa, ingeniería maldita, dolor juvenil y contraste
    sacro-industrial sin imponer catedrales, templos, abrigos, armas,
    uniformes ni exorcistas literales.
