visualDna:
  aesthetic: Movimiento formal en pareja, frame coreográfico, tracción elegante y tensión escénica abstracta.
  form_and_line: Siluetas duales en giro, torso estructurado, líneas de guía y fluidez controlada.
  color_palette: Dorados cálidos, negros de contraste formal, rojos profundos y blancos de brillo de gala.
  lighting_setup: Spotlights cálidos de competición con reflejo fuerte en superficie pulida y bordes de silueta.
  material_texture: Satén en flujo, cuero pulido, superficie brillante y pedrería escénica fina.
  render_quality: Frame de danza premium con lectura de liderazgo-seguimiento, giro y postura.
  spatial_distortion: Barrido circular con compresión de fondo y foco en eje de pareja.
  atmosphere: Deslumbrante, tensa, romántica e intensa.
  key_features: Reflejo de superficie, silueta dual, dinámica de giro y presión pública implícita.
  creative_brief: >-
    Define una gramática reusable de formal-partner-motion donde técnica de
    pareja, teatralidad de giro y presión pública sostengan identidad visual
    transferible sin imponer ballroom, pista, jurado ni rutina específica.
