visualDna:
  aesthetic: Ballroom competitivo de pareja, orientado a frame coreográfico, tracción de piso y duelo escénico.
  form_and_line: Línea de pareja tensa, giro de cadera coordinado y extensión de brazos de alta precisión.
  color_palette: Dorados de salón, negros de contraste formal, rojos profundos y blancos de brillo de gala.
  lighting_setup: Spotlights cálidos de competición con reflejo fuerte en piso encerado y bordes de silueta.
  material_texture: Satén de vestido en flujo, cuero de zapato pulido, parquet brillante y pedrería escénica fina.
  render_quality: Frame de danza premium con lectura de liderazgo-seguimiento, giro y postura.
  spatial_distortion: Barrido circular de spin con compresión de fondo y foco en eje de pareja.
  atmosphere: Deslumbrante, tensa, romántica e intensa.
  key_features: Reflejo de dance-floor, silueta dual, dinámica de giro y presencia de juez implícita.
  creative_brief: >-
    Define una gramática reusable de competition-ballroom donde técnica de
    pareja, teatralidad de giro y presión pública sostengan identidad visual
    más allá de una rutina específica.
