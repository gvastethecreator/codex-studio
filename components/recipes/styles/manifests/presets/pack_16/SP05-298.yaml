  spatial_distortion: Ciudad-laberinto amable con compresión de calle y expansión episódica por puertas y desvíos narrativos.
  atmosphere: Etílica, caprichosa, urbana, afectuosa.
  key_features: Calles nocturnas vibrantes, interiores de pub cargados, iconos literarios y encuentros excéntricos en cadena.
  creative_brief: Construye una gramática reusable de odisea nocturna romántica para cualquier sujeto, combinando luz de barrio, caos cálido y deriva episódica con humor.
