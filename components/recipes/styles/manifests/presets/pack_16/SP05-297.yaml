visualDna:
  aesthetic: Lirismo pluvial hiperobservacional, donde intimidad contenida se expresa mediante materia húmeda y pausa contemplativa.
  form_and_line: Línea pulcra y elegante, anatomía naturalista serena y encuadres de detalle que priorizan objetos-cuerpo como signos emocionales.
  color_palette: Verdes saturados por lluvia, grises perlados, negros húmedos y acentos piel de baja saturación.
  lighting_setup: Luz de día lluvioso con reflexión especular en superficies mojadas y contraste delicado de refugio cubierto.
  material_texture: Gotas sobre materia orgánica, madera barnizada húmeda, concreto encharcado y cuero con brillo de lluvia.
  render_quality: Acabado premium de refinamiento atmosférico extremo, con foco en microdetalle material y silencio expresivo.
  spatial_distortion: Espacio naturalista íntimo con profundidad por cortinas de lluvia y capas reflectantes.
  atmosphere: Lluviosa, íntima, solitaria, exquisita.
  key_features: Textura acuosa, detalle milimétrico, objetos cotidianos tratados como emoción y quietud de alta carga afectiva.
  creative_brief: >-
    Diseña una gramática reusable de intimidad bajo lluvia para cualquier prompt o imagen de entrada:
    humedad, pausa y observación microscópica sin imponer jardines, pabellones, zapatos ni encuentros románticos.
