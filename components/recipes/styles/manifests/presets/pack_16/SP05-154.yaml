visualDna:
  aesthetic: Thriller nocturno clínico-táctico, con disciplina operativa, melancolía hemática y tragedia íntima contenida.
  form_and_line: Trazado limpio de acción táctica, siluetas contrastantes y movimiento cortante de amenaza cercana.
  color_palette: Azules hospitalarios, rojos hemáticos contenidos, grises logísticos y blancos fríos de interior estéril.
  lighting_setup: Iluminación fluorescente logística, contraluces nocturnos y highlights finos sobre metal clínico.
  material_texture: Acero clínico, vidrio oscuro, textil técnico y superficies limpias de infraestructura estéril.
  render_quality: Acabado premium dark-action 2000s con legibilidad de operación y peso emocional de misión secreta.
  spatial_distortion: Composición longitudinal de tránsito y corredor abstracto para reforzar encierro psicológico.
  atmosphere: Desolada, disciplinada, nocturna, trágica.
  key_features: Limpieza táctica, iconografía hemática, encuadre de operación oculta y amenaza cortante contenida.
  creative_brief: >-
    Diseña una gramática reusable de clinical-nocturne-tactics para cualquier
    sujeto: limpieza táctica, melancolía hemática, noche controlada y violencia
    contenida sin imponer vampiros, militares, trenes, carreteras, uniformes,
    katanas ni protagonistas escolares.
