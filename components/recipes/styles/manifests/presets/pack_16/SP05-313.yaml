visualDna:
  aesthetic: Épica zodiacal juvenil, con fraternidad heroica, brillo ritual y dramatismo cósmico declarativo.
  form_and_line: Contornos brillantes, anatomía heroica elongada y poses de impacto frontal con energía ritual sagrada.
  color_palette: Azules celestes, dorados astrales, blancos marmóreos y rojos de voluntad combativa.
  lighting_setup: Flares de constelación sobre clave dura de cel, sombras planas dramáticas y rim luminoso en bordes ornamentales.
  material_texture: Brillo ceremonial pulido, piedra mítica abstracta, partículas de impacto y grano analógico retro.
  render_quality: Acabado premium retro-shonen con lectura instantánea de equipo, poder astral y escalada de intensidad.
  spatial_distortion: Perspectiva monumental ascendente para amplificar sacrificio, impacto y destino estelar.
  atmosphere: Mítica, vehemente, celeste, sacrificial.
  key_features: Iconografía estelar, brillo ritual, estelas cósmicas, pose declarativa y emoción combativa juvenil.
  creative_brief: >-
    Diseña una gramática reusable de heroísmo zodiacal para cualquier prompt o imagen de entrada:
    cosmos, brillo y juramento visual sin imponer armaduras, templos, escalinatas ni combates literales.
