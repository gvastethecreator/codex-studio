  color_palette: Rojos clásicos, blancos limpios, miel cálida, azul de sombra interior y acentos dorados.
  lighting_setup: Luminaria directa con rebote cálido y sombras de media altura en clave retro.
  material_texture: Superficie encerada, grano deportivo, tejido vintage y sudor de alta fricción.
  render_quality: Frame deportivo narrativo con lectura clara de posesión emocional, contacto y respuesta colectiva.
  spatial_distortion: Perspectiva media con exageración moderada de salto, empuje y entrada al conflicto.
  atmosphere: Carismática, sudada, competitiva y esperanzada.
  key_features: Contacto físico, miradas de duelo, trayectorias de esfuerzo, reflejos cálidos y energía de equipo reactiva.
