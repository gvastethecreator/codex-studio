  color_palette: Rojos y blancos de uniforme clásico, madera miel, azul de sombra de gimnasio y acentos dorados cálidos.
  lighting_setup: Luminaria escolar directa con rebote en parquet y sombras de media altura en clave retro.
  material_texture: Madera encerada, balón granulado, tejido de jersey vintage y sudor de partido de alta fricción.
