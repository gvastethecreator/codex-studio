visualDna:
  aesthetic: Deporte táctico de velocidad ilusoria, circulación invisible, timing colectivo y ruptura de marca.
  form_and_line: Líneas rápidas de trayectoria, siluetas limpias por rol y anatomía optimizada para cambio de ritmo.
  color_palette: Azules eléctricos, negros de contraste profundo y acentos cian para telegraph de circulación.
  lighting_setup: Iluminación dramática con highlights selectivos en manos, mirada y línea de trayectoria.
  material_texture: Superficie pulida reflectiva, malla geométrica sugerida, tejido técnico y trazas de movimiento estilizadas.
  render_quality: Acabado deportivo de alta precisión con claridad de jugada colectiva vs estrella individual.
  spatial_distortion: Compresión espacial y estiramiento direccional en trayectorias fantasma para lectura de sorpresa.
  atmosphere: Estratégica, veloz y tácticamente deslumbrante.
  key_features: Trails fantasma, cambios bruscos de dirección, contraste teamplay vs aceplay y lectura de velocidad invisible.
  creative_brief: >-
    Aplica una gramática reusable de velocidad fantasma táctica a cualquier prompt o imagen de entrada:
    trails invisibles, cortes súbitos y contraste equipo-individuo sin imponer basket, pelota, cancha ni duelos perimetrales.
