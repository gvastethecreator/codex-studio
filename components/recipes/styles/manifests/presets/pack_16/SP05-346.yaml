visualDna:
  aesthetic: Basket táctico de velocidad ilusoria, orientado a circulación de balón invisible y ruptura de marca por timing.
  form_and_line: Líneas rápidas de pase, siluetas limpias por rol y anatomía optimizada para cambio de ritmo.
  color_palette: Azules eléctricos, negros de contraste de arena y acentos cian para telegraph de circulación.
  lighting_setup: Iluminación indoor dramática con highlights selectivos en balón, manos y línea de pase.
  material_texture: Parquet pulido reflectivo, malla de aro definida, jersey técnico y trazas de movimiento estilizadas.
  render_quality: Acabado deportivo de alta precisión con claridad de jugada colectiva vs estrella individual.
  spatial_distortion: Compresión de cancha y estiramiento direccional en trayectorias de pase para lectura de sorpresa.
  atmosphere: Estratégica, veloz y tácticamente deslumbrante.
  key_features: Trails de pase, duelos perimetrales, cambios de dirección bruscos y contraste team-play vs ace-play.
  creative_brief: >-
    Formula una gramática reusable de phantom-pass-basketball donde timing,
    ocultación de intención y lectura táctica de líneas de pase sean el núcleo
    estilístico, no una jugada concreta.
