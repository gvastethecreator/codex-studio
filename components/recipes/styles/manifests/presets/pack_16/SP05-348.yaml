visualDna:
  aesthetic: Deporte de precisión bajo calor estival, control de zona, duelo mental y tensión de instante decisivo.
  form_and_line: Mecánica cinética abstracta, lectura de señales y anatomía de transferencia precisa.
  color_palette: Azules funcionales, rojizos secos de presión, blancos de marca gráfica y dorado cálido de verano.
  lighting_setup: Sol alto competitivo con rebote en polvo y contraluz duro sobre el eje de objetivo.
  material_texture: Polvo seco, cuero abstracto, marcas de fricción sugeridas, tela técnica y borde metálico.
  render_quality: Frame competitivo de alta nitidez con prioridad visual en señal, liberación abstracta y respuesta.
  spatial_distortion: Perspectiva de objetivo con compresión dramática de distancia y foco en trayectoria.
  atmosphere: Concentrada, calurosa y disciplinadamente juvenil.
  key_features: Foco de objetivo, geometría estratégica, tensión lateral, postura contenida y calor competitivo.
  creative_brief: >-
    Aplica una gramática reusable de duelo deportivo preciso a cualquier prompt o imagen de entrada:
    objetivo, calor y lectura mental sin imponer baseball, guantes, montículo, dugout ni inning.
