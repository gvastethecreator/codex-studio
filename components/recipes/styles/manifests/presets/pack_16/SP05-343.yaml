visualDna:
  aesthetic: Shonen deportivo de impulso vertical, cooperación táctica, sincronía de equipo y lectura de ritmo colectivo.
  form_and_line: Anatomía atlética limpia, arcos de salto explosivos y gestualidad de comunicación inmediata entre roles.
  color_palette: Naranjas cálidos de rebote, cian competitivo, blancos energéticos y contraste cromático por rol visual.
  lighting_setup: Luz de alto rebote con backlight de impacto para siluetas aéreas legibles.
  material_texture: Superficies brillantes, malla geométrica sugerida, tela transpirable y marcas de fricción.
  render_quality: Frame deportivo premium con jerarquía clara de impulso, coordinación y eje de bloqueo abstracto.
  spatial_distortion: Foreshortening de salto y perspectiva de tensión que prioriza timing, recepción y respuesta colectiva.
  atmosphere: Eléctrica, optimista y cohesionada por esfuerzo colectivo.
  key_features: Impulso vertical, llamadas visuales de equipo, geometría de tensión, timing aéreo y energía de rally prolongado.
  creative_brief: >-
    Aplica una gramática reusable de energía deportiva vertical a cualquier prompt o imagen de entrada:
    salto, sincronía y anticipación colectiva sin imponer vóley, canchas, redes, saques ni equipos concretos.
