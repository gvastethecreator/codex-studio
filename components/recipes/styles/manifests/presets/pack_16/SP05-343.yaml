visualDna:
  aesthetic: Vóley shonen de impulso vertical y cooperación táctica, con énfasis en sincronía de equipo y lectura de rotación.
  form_and_line: Anatomía atlética limpia, arcos de salto explosivos y gestualidad de comunicación inmediata entre setter, spiker y libero.
  color_palette: Naranjas de parquet cálido, cian de acento competitivo, blancos energéticos y contraste uniforme por escuadra.
  lighting_setup: Luz de gimnasio de alto rebote con backlight de remate para siluetas aéreas legibles.
  material_texture: Barniz brillante de cancha, malla de red nítida, tela deportiva transpirable y marcas de fricción en suela.
  render_quality: Frame deportivo premium con jerarquía clara de balón, rematador y eje de bloqueo.
  spatial_distortion: Foreshortening de salto y perspectiva de red que prioriza timing de recepción, colocación y spike.
  atmosphere: Eléctrica, optimista y cohesionada por esfuerzo colectivo.
  key_features: Silueta de saque en suspensión, geometría de red dominante, llamadas de equipo y energía de rally prolongado.
  creative_brief: >-
    Formula una gramática reusable de volleyball-momentum donde salto,
    sincronía de rotación y lectura de red definan identidad visual sostenida
    sin depender de una jugada puntual.
