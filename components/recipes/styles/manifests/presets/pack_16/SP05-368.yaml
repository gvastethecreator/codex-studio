  color_palette: Azules midnight, dorados latón, magentas de neón tenue y negros humo de sala.
  lighting_setup: Spot cálido de club con contraluz de neblina y glow lateral sobre campana del saxo.
  material_texture: Latón con pátina, madera de tarima, humo volumétrico fino y tela oscura de escenario.
  render_quality: Frame performativo adulto con lectura de intensidad, dinámica de solo y respuesta de sala.
  spatial_distortion: Profundidad de club comprimida hacia solista con halo de audiencia periférica difusa.
