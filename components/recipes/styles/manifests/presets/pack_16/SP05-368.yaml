  aesthetic: Jazz nocturno visceral, improvisación ascendente, presencia solista y explosión soulful.
  form_and_line: Silueta performativa en tensión, gesto respiratorio marcado y arcos de cuerpo al fraseo.
  color_palette: Azules midnight, dorados latón, magentas de neón tenue y negros humo de sala.
  lighting_setup: Spot cálido aislado con contraluz de neblina y glow lateral sobre metal curvo.
  material_texture: Latón con pátina, madera oscura, humo volumétrico fino y tela de performance.
  render_quality: Frame performativo adulto con lectura de intensidad, dinámica de solo y respuesta de sala.
  spatial_distortion: Profundidad nocturna comprimida hacia foco performativo con halo periférico difuso.
  atmosphere: Nocturna, impulsada, soulful y explosiva.
  key_features: Brillo de latón, haze nocturno, spot aislado y silueta de solo en ascenso continuo.
