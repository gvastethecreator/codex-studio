visualDna:
  aesthetic: Mecha bélico realista de frente terrestre, con doctrina militar, fatiga de campaña y sobriedad táctica.
  form_and_line: Línea técnica robusta, panelado legible y acting de escuadra en tensión operacional continua.
  color_palette: Olivas apagados, tierra polvorienta, acero mate y rojos mínimos de señal de riesgo.
  lighting_setup: Luz dura de campo abierto, sombras secas de blindaje y reflejos discretos en metal funcional.
  material_texture: Chasis rayado, barro compactado, lona de vehículo y grano viejo de crónica de guerra.
  render_quality: Acabado retro de precisión mecánica con claridad documental de hardware y cadena de mando.
  spatial_distortion: Profundidad de llanura de combate con bloqueos de columna, cobertura y avance por capas.
  atmosphere: Seria, devastada, áspera, resiliente.
  key_features: Silueta de mecha de línea de frente, mapa táctico implícito y desgaste visible de campaña prolongada.
  creative_brief: Define una gramática reusable de mecha militar terrenal para cualquier sujeto, priorizando funcionalidad mecánica, disciplina táctica y peso logístico.
