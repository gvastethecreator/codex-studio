visualDna:
  aesthetic: Maquinaria táctica terrenal, doctrina funcional, fatiga de campaña y sobriedad operacional.
  form_and_line: Línea técnica robusta, panelado legible y acting de tensión logística continua.
  color_palette: Olivas apagados, tierra polvorienta, acero mate y rojos mínimos de señal de riesgo.
  lighting_setup: Luz dura de campo abierto, sombras secas de blindaje y reflejos discretos en metal funcional.
  material_texture: Superficie rayada, barro compactado, lona técnica y grano viejo de crónica operacional.
  render_quality: Acabado retro de precisión mecánica con claridad documental de hardware y cadena funcional.
  spatial_distortion: Profundidad por capas tácticas con bloqueos, cobertura abstracta y avance pesado.
  atmosphere: Seria, devastada, áspera, resiliente.
  key_features: Masa funcional, mapa táctico implícito, desgaste prolongado y peso logístico visible.
  creative_brief: >-
    Define una gramática reusable de grounded-tactical-machinery para cualquier
    sujeto, priorizando funcionalidad mecánica, disciplina táctica y peso
    logístico. Si el input admite transformación mecánica, puede volverse mecha,
    vehículo táctico o hardware operativo; si no, debe recibir placas, marcas de
    mantenimiento y peso logístico sin fijar frente de guerra, escuadra, mapa ni
    campo de batalla.
