visualDna:
  aesthetic: Ópera espacial clásica, con liturgia de mando analógico, solemnidad colectiva y supervivencia civilizatoria.
  form_and_line: Contorno grueso de ingeniería, siluetas jerarquizadas y acting decidido de mando clásico setentero.
  color_palette: Azules interestelares profundos, rojos de alerta analógica, grises metálicos y ámbares cálidos de interfaz.
  lighting_setup: Iluminación de alarma táctica con pools rojos intermitentes, key de interfaz y sombra cel de alta urgencia.
  material_texture: Paneles analógicos, metal pintado, fósforo de monitor y grano de telecine vintage.
  render_quality: Acabado premium retro-broadcast con lectura táctica clara y dramatismo emocional coral.
  spatial_distortion: Perspectiva forzada y escala cósmica monumental para enfatizar fragilidad humana frente al vacío.
  atmosphere: Noble, urgente, cósmica, sacrificial.
  key_features: Paneles analógicos, jerarquía compositiva, alerta solemne, escala interestelar sugerida y heroísmo coral.
  creative_brief: >-
    Construye una gramática reusable de mando espacial analógico para cualquier prompt o imagen de entrada:
    tensión, ceremonia técnica y escala épica sin imponer puentes de nave, consolas, cascos ni tripulaciones.
