visualDna:
  aesthetic: Ópera espacial militar de convoy interestelar, con liturgia de puente y épica de supervivencia civilizatoria.
  form_and_line: Contorno grueso de ingeniería naval, siluetas de tripulación jerarquizadas y acting decidido de mando clásico setentero.
  color_palette: Azules interestelares profundos, rojos de alerta analógica, grises metálicos y ámbares cálidos de consola.
  lighting_setup: Iluminación de alarma táctica con pools rojos intermitentes, key de consola y sombra cel de alta urgencia.
  material_texture: Paneles analógicos, metal naval pintado, monitores de fósforo y grano de telecine vintage.
  render_quality: Acabado premium retro-broadcast con lectura táctica clara y dramatismo emocional de capitán-tripulación.
  spatial_distortion: Perspectiva forzada de puente y escala cósmica monumental para enfatizar fragilidad humana frente al vacío.
  atmosphere: Noble, urgente, cósmica, sacrificial.
  key_features: Geometría de puente por rangos, consola analógica saturada, casco insignia volumétrico y coreografía de mando coral.
  creative_brief: Construye una gramática reusable de mando naval interestelar para cualquier sujeto, priorizando ritual de puente, tensión de alerta y heroísmo de tripulación sincronizada.
