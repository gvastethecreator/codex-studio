visualDna:
  aesthetic: Pulp espacial canalla de carisma seductor, humor insolente y peligro cool en clave noir retrofuturista.
  form_and_line: Silueta rogue confiada, postura relajada de tensión y contorno cel limpio con staging pulp de viñeta dinámica.
  color_palette: Rojo dominante, púrpuras interestelares, ámbar ahumado y azules acero.
  lighting_setup: Iluminación lounge-noir, bordes de energía, charcos de luz baja y rim estelar cosmopolita.
  material_texture: Brillo de vestuario retro, humo difuso de ambiente, superficies sci-fi cepilladas y grano compositivo analógico.
  render_quality: Acabado premium pulp-80s con legibilidad total del protagonista y atmósfera de peligro juguetón.
  spatial_distortion: Encuadre centrado en carisma con profundidad comprimida y dinámica one-vs-many de alta confianza.
  atmosphere: Desfachatada, cósmica, juguetona, peligrosa.
  key_features: Rojo acento, silueta relajada, amenaza elegante, ironía visual y lujo retrofuturista sugerido.
  creative_brief: >-
    Construye una gramática reusable de rogue pulp espacial para cualquier prompt o imagen de entrada:
    seducción, ironía y amenaza elegante sin imponer chaquetas, láseres, clubes ni anti-héroes concretos.
