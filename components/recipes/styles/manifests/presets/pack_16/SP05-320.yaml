visualDna:
  aesthetic: Pulp espacial canalla de carisma seductor, con humor insolente y peligro cool en clave noir retrofuturista.
  form_and_line: Silueta rogue confiada, postura relajada de duelo y contorno cel limpio con staging pulp de viñeta dinámica.
  color_palette: Dominante rojo-jacket, púrpuras de club interestelar, ámbar ahumado y azules acero de corredor espacial.
  lighting_setup: Iluminación lounge-noir, bordes de láser, charcos de luz baja y rim estelar de fondo cosmopolita.
  material_texture: Brillo de vestuario retro, humo difuso de ambiente, superficies sci-fi cepilladas y grano compositivo analógico.
  render_quality: Acabado premium pulp-80s con legibilidad total del protagonista y atmósfera de peligro juguetón.
  spatial_distortion: Encuadre centrado en carisma con perspectiva de pasillo y dinámica one-vs-many de alta confianza.
  atmosphere: Desfachatada, cósmica, juguetona, peligrosa.
  key_features: Icono chaqueta roja, motivo brazo-láser, ambiente club-planetario y gramática de bribón galáctico.
  creative_brief: Construye una gramática reusable de rogue pulp espacial para cualquier sujeto, equilibrando seducción, ironía y amenaza en encuadre elegante de anti-héroe carismático.
