visualDna:
  aesthetic: Romanticismo aéreo contracultural, sensación de lift libre y melancolía luminosa de horizonte abierto.
  form_and_line: Contornos fluidos aerodinámicos, curvas de deslizamiento y cinética de arco sin fijar vehículo ni piloto.
  color_palette: Cianes de cielo abierto, magentas de atardecer, neones de tabla y gradientes de alta saturación optimista.
  lighting_setup: Backlight dorado de horizonte, relleno por nube reflectante y streaks de rim para velocidad en altura.
  material_texture: Superficies semibrillo, compositing digital pulido, halos de vapor y volumen nuboso suave de alto recorrido.
  render_quality: Calidad premium mid-2000s con lectura aérea clara y control emocional vibrante.
  spatial_distortion: Perspectiva diagonal ascendente, profundidad atmosférica y framing liviano de gravedad reducida.
  atmosphere: Aérea, romántica, juvenil y liberadora.
  key_features: Trazas de aire, gradientes de altura, códigos de subcultura, siluetas en suspensión y dinámica de impulso continuo.
  creative_brief: Define una gramática reusable de romance cinético aéreo para cualquier sujeto, priorizando lift, momentum, juventud luminosa y anhelo. El input puede recibir tabla, mecha ligero, rider silhouette o estela de vuelo cuando refuerce el estilo, sin fijar cielo literal ni escena de carrera.
