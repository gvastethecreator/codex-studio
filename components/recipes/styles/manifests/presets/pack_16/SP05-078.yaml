visualDna:
  aesthetic: Cyber-apocalipsis de precisión mecánica, violencia juvenil abstracta y catástrofe psíquica en escalada.
  form_and_line: Línea ultra-densa de ingeniería, movimiento cinético feroz y anatomía al borde de mutación.
  color_palette: Rojos de alarma, violetas nocturnos, cian eléctrico y negros profundos de infraestructura colapsada.
  lighting_setup: Neón agresivo, luces de emergencia intermitentes y contraste duro de distopía industrial.
  material_texture: Metal remachado, superficie caliente, concreto fracturado y grano de cel hiperdetallado.
  render_quality: Acabado de largometraje técnico de altísima energía con legibilidad de caos sistémico.
  spatial_distortion: Escala macro con capas infraestructurales y vacío institucional para sensación de implosión.
  atmosphere: Monumental, eléctrica, apocalíptica, cinética.
  key_features: Estela lumínica icónica, ingeniería obsesiva y tensión entre tecnología cívica y ruptura biológica.
  creative_brief: Diseña una gramática reusable de colapso cyber-mecánico extremo para cualquier sujeto, priorizando densidad, aceleración social y horror de transformación sin imponer megaciudad, vehículos, autopistas ni estadios.
