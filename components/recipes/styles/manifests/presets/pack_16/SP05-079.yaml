visualDna:
  aesthetic: Velocidad cósmica hipercinética dibujada a pulso, con exceso cromático y culto absoluto al impulso.
  form_and_line: Trazo brutal de inercia extrema, líneas de fuga violentas y siluetas aerodinámicas de alto contraste.
  color_palette: Primarios incendiarios, magentas eléctricos, negros densos y acentos neón de nitro en combustión.
  lighting_setup: Flashes de propulsión, contraluces duros y estallidos lumínicos que enfatizan aceleración sin reposo.
  material_texture: Superficie vibrante, fricción abrasada, humo dibujado y grano entintado de energía analógica.
  render_quality: Acabado de espectáculo maximalista con claridad de velocidad y sobrecarga sensorial.
  spatial_distortion: Perspectiva túnel y curvatura extrema del espacio para sensación de riesgo constante.
  atmosphere: Adrenalínica, eufórica, vertiginosa, explosiva.
  key_features: Motion-lines dominantes, perfiles excéntricos y dramatización gráfica de boost, fricción y derrape abstracto.
  creative_brief: Construye una gramática reusable de hipervelocidad cósmica para cualquier sujeto, priorizando energía dibujada, riesgo visual y clímax imposible. Si el input lo permite, puede volverse vehículo, piloto abstracto o bólido de trazo; si no, recibe líneas de boost, fricción y túnel cinético sin fijar carrera ni pista.
