  color_palette: Negros terciopelo, azules de abismo estelar, rojos vino de emblema y blancos fríos de insignia.
  lighting_setup: Contraluz estelar dramático con rim fuerte sobre capa y rostro, sombras planas de fuerte identidad gráfica.
  material_texture: Tejido pesado en movimiento, superficies de casco oscurecidas y señalética pirata de acabado clásico.
  render_quality: Terminación premium retro-operática con foco en presencia de figura única y aura de leyenda errante.
  spatial_distortion: Contraste de primerísimo monumental contra vacío astral negativo para acentuar aislamiento soberano.
  atmosphere: Romántica, solitaria, rebelde, cósmica.
  key_features: Emblema calavérico, capa al viento estelar, pose de mando disidente y composición de vacío alrededor.
  creative_brief: Crea una gramática reusable de leyenda corsaria melancólica para cualquier sujeto, anclada en silueta imperial, viento estelar y código moral insumiso.
