visualDna:
  aesthetic: Comedia anacrónica irreverente de choque tonal total, con corazón dramático escondido bajo parodia constante.
  form_and_line: Línea digital expresiva para reacción cómica extrema, postura holgazana arquetípica y ritmo visual de gag.
  color_palette: Saturaciones pop, neones moderados, tierras cálidas tradicionales y acentos absurdos en choque continuo.
  lighting_setup: Iluminación flexible de comedia-acción, highlights pulidos y contraste medio para sostener cambios de tono abruptos.
  material_texture: Materia utilitaria, metal cotidiano, señalética híbrida y acabados limpios de producción 2000s.
  render_quality: Acabado premium de parodia-action con legibilidad alta de chiste, acción y microdrama humano.
  spatial_distortion: Composición modular para gag episódico, con perspectivas exageradas en punchlines y choques tonales.
  atmosphere: Irreverente, caótica, entrañable, astuta.
  key_features: Mashup histórico-moderno, acting deadpan, heroísmo perezoso y staging de caos con timing preciso.
  creative_brief: >-
    Diseña una gramática reusable de anachronistic-deadpan-mayhem para
    cualquier sujeto: absurdo, swagger, choque temporal y humanidad subyacente
    sin imponer samuráis, ciudad, props históricos, armas de madera, duelos ni
    sci-fi literal.
