visualDna:
  aesthetic: Comedia samurái sci-fi irreverente de anacronismo total, con corazón dramático escondido bajo parodia constante.
  form_and_line: Línea digital expresiva para reacción cómica extrema, postura holgazana de antihéroe y ritmo visual de gag.
  color_palette: Saturaciones pop de ciudad Edo-futurista, neones moderados y tierra urbana tradicional en choque continuo.
  lighting_setup: Iluminación flexible de comedia-acción, highlights pulidos y contraste medio para sostener cambios de tono abruptos.
  material_texture: Madera de bokken, metal de utilería urbana, señalética híbrida y acabados limpios de producción 2000s.
  render_quality: Acabado premium de parodia-action con legibilidad alta de chiste, acción y microdrama humano.
  spatial_distortion: Escena urbana modular para setpiece episódico, con perspectivas exageradas en punchlines y duelos.
  atmosphere: Irreverente, caótica, entrañable, astuta.
  key_features: Mashup de props históricos-modernos, acting deadpan, heroísmo perezoso y staging de caos con timing preciso.
  creative_brief: Diseña una gramática reusable de comedia anacrónica samurái-sci-fi para cualquier sujeto, mezclando absurdo, swagger y humanidad subyacente.
