visualDna:
  aesthetic: Fantasía digital operática de gran escala, con identidad luminosa, ornamento de datos y emoción pop monumental.
  form_and_line: Siluetas elegantes, curvas ornamentales, linework limpio y coreografía visual de luz aplicada a cualquier motivo.
  color_palette: Magentas y cianes luminosos, blancos perla, violetas profundos y gradientes iridiscentes de entorno virtual.
  lighting_setup: Iluminación sinfónica con haces volumétricos, contraluces monumentales y acentos pulsantes sincronizados al clímax vocal.
  material_texture: Superficies translúcidas tipo interfaz, metal pulido digital y partículas de luz como materia performativa.
  render_quality: Acabado premium de pop-opera virtual con nitidez de ícono, profundidad de espectáculo y jerarquía emocional contundente.
  spatial_distortion: Espacialidad expansiva no literal con escala reverencial y perspectiva ascendente que enfatiza trascendencia performativa.
  atmosphere: Grandiosa, catártica, conectiva, esperanzadora.
  key_features: Escala digital monumental, pulsos de luz, ornamento virtual, identidad radiante y teatralidad pop sin espacio fijo.
  creative_brief: >-
    Define un estilo reusable de ópera digital para cualquier prompt o imagen de entrada:
    luz escénica, identidad luminosa y grandeza emocional sin imponer catedrales virtuales, avatares, conciertos ni multitudes.

