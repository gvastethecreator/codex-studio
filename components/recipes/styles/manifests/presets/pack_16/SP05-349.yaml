visualDna:
  aesthetic: Deporte generacional de largo arco, legado competitivo, maduración personal y resolución sostenida.
  form_and_line: Acting deportivo emocional, mecánica de esfuerzo sólida y postura de determinación.
  color_palette: Paleta competitiva clásica con azules profundos, blancos cálidos y acentos rojos de herencia emocional.
  lighting_setup: Iluminación nocturna amplia con foco sentimental sobre gesto, materia y decisión.
  material_texture: Cuero envejecido, polvo deportivo, tela en desgaste progresivo y metal de fondo.
  render_quality: Frame deportivo emotivo con lectura clara de trayectoria vital y tensión competitiva.
  spatial_distortion: Perspectiva progresiva que conserva un eje de objetivo como núcleo simbólico.
  atmosphere: Resuelta, nostálgica y profundamente motivada.
  key_features: Iconografía deportiva abstracta, profundidad de trayectoria, ecos de crecimiento y herencia emocional.
  creative_brief: >-
    Aplica una gramática reusable de resolución deportiva generacional a cualquier prompt o imagen de entrada:
    legado, madurez y arco vital sin imponer baseball, guantes, pelotas, estadios ni linajes literales.
