  color_palette: Paleta de estadio clásica con azules profundos, blancos cálidos y acentos rojos de herencia competitiva.
  lighting_setup: Iluminación de estadio nocturno con foco sentimental en guante, pelota y rostro del lanzador.
  material_texture: Cuero envejecido de guante, polvo de diamante, tela uniforme en desgaste progresivo y metal de graderío.
  render_quality: Frame deportivo emotivo con lectura clara de trayectoria vital y tensión de juego.
  spatial_distortion: Perspectiva progresiva de diamante que conserva eje pitcher-home como núcleo simbólico.
  atmosphere: Resuelta, nostálgica y profundamente motivada.
  key_features: Iconografía guante-pelota, profundidad de estadio, ecos de crecimiento y herencia deportiva intergeneracional.
