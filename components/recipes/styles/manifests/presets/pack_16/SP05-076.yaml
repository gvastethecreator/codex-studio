visualDna:
  aesthetic: Surrealismo psico-onírico de collage cinético, con transición imposible y arquitectura mental en fuga.
  form_and_line: Línea metamórfica de montaje continuo, silhouettes mutantes y raccord deliberadamente inestable.
  color_palette: Saturación carnavalesca, fucsias intensos, amarillos ácidos y negros de vacío subconsciente.
  lighting_setup: Destellos abruptos, focos teatrales flotantes y variaciones lumínicas que rompen continuidad realista.
  material_texture: Superficie de objeto-ícono, plástico ritual, papel simbólico y grano de sueño inestable.
  render_quality: Acabado de feature experimental con ritmo de edición alucinada y claridad de motivo simbólico.
  spatial_distortion: Espacios plegables con tránsito entre interior psíquico y plano externo sin corte lógico.
  atmosphere: Delirante, hipnótica, exuberante, inquietante.
  key_features: Secuencias de íconos, metamorfosis de plano, lógica de sueño y tensión entre terapia y colapso mental.
  creative_brief: Construye una gramática reusable de surrealismo onírico cinematográfico para cualquier sujeto, priorizando transformación continua, choque simbólico y vértigo perceptivo sin imponer desfiles, escenarios urbanos ni objetos concretos.
