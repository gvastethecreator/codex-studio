visualDna:
  aesthetic: Tragedia político-militar de seguridad estatal, con iconografía paramilitar pesada y humanidad reprimida bajo doctrina de control.
  form_and_line: Siluetas blindadas macizas, contornos rígidos de equipo táctico y encuadres cerrados que enfatizan alienación del cuerpo.
  color_palette: Grises carbón industriales, rojos ópticos de amenaza, marrones de humo urbano y desaturados fríos de crisis prolongada.
  lighting_setup: Contraluces de incendio y faros tácticos, neblina densa de disturbio y highlights selectivos en visores y metal.
  material_texture: Armadura mate con abrasión, concreto urbano ennegrecido, humo particulado y telas técnicas de uso operativo.
  render_quality: Acabado cinematográfico severo con lectura táctica impecable, detalle industrial y dramatismo psicológico contenido.
  spatial_distortion: Perspectiva urbana comprimida por barricadas y humo, con profundidad fragmentada que sugiere cerco institucional.
  atmosphere: Opresiva, trágica, disciplinaria, crepuscular.
  key_features: Visores rojos, masa blindada, calle en humo, tensión de proximidad emocional y signos de conflicto civil.
  creative_brief: Construye una gramática reusable de melancolía paramilitar para cualquier sujeto, combinando ópticas rojas, densidad de humo y composición de deber contra conciencia.
