visualDna:
  aesthetic: Tragedia político-militar abstracta, con peso doctrinal, humanidad reprimida y amenaza institucional.
  form_and_line: Siluetas macizas, contornos rígidos, encuadres cerrados y geometría opresiva que puede aplicarse a cualquier sujeto.
  color_palette: Grises carbón industriales, rojos ópticos de amenaza, marrones de humo y desaturados fríos de crisis prolongada.
  lighting_setup: Contraluces de incendio, haces tácticos, neblina densa de crisis y highlights selectivos en visores y metal.
  material_texture: Blindaje mate con abrasión, concreto ennegrecido, humo particulado y telas técnicas de uso operativo.
  render_quality: Acabado cinematográfico severo con lectura táctica impecable, detalle industrial y dramatismo psicológico contenido.
  spatial_distortion: Perspectiva comprimida por masas opresivas y humo, con profundidad fragmentada que sugiere cerco institucional.
  atmosphere: Opresiva, trágica, disciplinaria, crepuscular.
  key_features: Ópticas rojas abstractas, humo denso, masa visual pesada, cercanía emocional y conflicto entre deber y conciencia.
  creative_brief: >-
    Construye una gramática reusable de melancolía paramilitar para cualquier prompt o imagen de entrada:
    control, humo y peso moral sin imponer blindajes, calles de disturbio, armas ni fuerzas específicas.
