  color_palette: Rosas profundos, blanco ceremonial, lila dramático, dorado escénico y sombras violetas psicológicas.
  lighting_setup: Luz teatral abstracta, halo emocional limpio, contrastes de ópera juvenil y focos suaves sobre símbolos clave.
  material_texture: Satén estilizado, encaje gráfico, superficies idealizadas, brillos dorados planos y grano psicológico elegante.
  render_quality: Acabado premium 90s con símbolo legible, tensión de poder, lirismo performático y abstracción emocional.
  spatial_distortion: Perspectivas imposibles, profundidad teatral y composición ritual que convierten cualquier sujeto en alegoría.
  atmosphere: Teatral, simbólica, elegante, inquietante.
  key_features: Motivos de rosa abstractos, simetría ritual, poses codificadas, dorado ceremonial y ruptura de roles como forma visual.
  creative_brief: >-
    Aplica este preset como tratamiento abstracto de anime simbólico 90s:
    cualquier prompt debe ganar teatralidad, ornamento emocional, tensión de
    identidad y lenguaje ritual sin forzar academia, duelo o plataforma.
