visualDna:
  aesthetic: Juventud cruda de feedback emocional, crecimiento por ensayo, precariedad sonora y cohesión emergente.
  form_and_line: Posturas imperfectas de ejecución abstracta, energía contenida, microgesto inseguro y dinámica de grupo.
  color_palette: Marrones crudos, rojos de señal improvisada, negros de equipo usado y acentos neón caseros.
  lighting_setup: Luz dura de práctica con sombras irregulares y contraluces improvisados.
  material_texture: Vinilo usado, metal gastado, líneas enredadas y pintura descascarada.
  render_quality: Frame crudo con legibilidad de rol grupal, precariedad sonora y progresión de ensayo.
  spatial_distortion: Perspectiva cerrada con capas densas de equipo abstracto y proximidad física.
  atmosphere: Cruda, joven, precaria y de corazón abierto.
  key_features: Torres gráficas de sonido, postura de ejecución, clutter lineal y spacing de grupo en formación.
  creative_brief: >-
    Formula una gramática reusable de raw-youth-feedback donde precariedad,
    energía de ensayo y autenticidad punk articulen identidad transferible sin
    imponer garaje, amplificadores, banda, instrumentos ni sala de práctica.
