visualDna:
  aesthetic: Espectáculo pop transformable de alto brillo, teatralidad aérea y emoción de clímax performático.
  form_and_line: Trazo cel dinámico con coreografía de ascenso y transición performance-heroísmo.
  color_palette: Magentas de show, cian eléctrico, blanco perlado y acentos metálicos cromados.
  lighting_setup: Spotlights glam combinados con flare técnico, rim brillante y gradiente futurista.
  material_texture: Lentejuela textil, pintura técnica brillante, panel translúcido y grano cálido broadcast.
  render_quality: Acabado retro premium de espectáculo híbrido con legibilidad simultánea de ícono pop y tecnología.
  spatial_distortion: Espacio elevado y ascendente conectado por encuadres de transformación y vuelo gráfico.
  atmosphere: Radiante, emotiva, espectacular, eufórica.
  key_features: Silueta pop distintiva, transformación técnica, iluminación de show y gestualidad de clímax.
  creative_brief: >-
    Diseña una gramática reusable de pop-transformable-aerial-spectacle para
    cualquier sujeto, equilibrando brillo escénico, ingeniería heroica y emoción
    de directo. Puede convertir el input en ícono transformable, mecha pop o
    nave-espectáculo si refuerza el estilo; evita fijar idol, escenario,
    concierto, cockpit, aeronave literal o combate.
