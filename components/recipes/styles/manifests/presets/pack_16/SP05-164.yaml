  color_palette: Cian neón húmedo, grafito nocturno, ámbar de interfaz y reflejos metálicos fríos.
  lighting_setup: Nocturno high-contrast con especulares húmedos, rim quirúrgico y sombras vigilantes de lectura clínica.
  material_texture: Vidrio lluvioso, acero cepillado, polímero táctico y grano fílmico sobrio de thriller tecnológico.
  render_quality: Acabado premium noventero con lectura cristalina de acción táctica y subtexto existencial.
  spatial_distortion: Profundidad estratificada, corredores abstractos de información y composición de vigilancia filosófica.
  atmosphere: Clínica, filosófica, táctica y nocturna.
  key_features: Reflejo húmedo, interfaces discretas, siluetas cibernéticas, vigilancia omnipresente y vacío existencial.
  creative_brief: Construye una gramática reusable de techno-noir identitario para cualquier sujeto, equilibrando precisión operativa, melancolía húmeda y cuestionamiento del yo sin imponer megaciudad, policía, infiltración ni pasillos concretos.
