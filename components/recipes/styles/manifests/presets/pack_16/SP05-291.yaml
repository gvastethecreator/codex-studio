  aesthetic: Drama íntimo de reparación emocional en entorno escolar-contemporáneo, centrado en vulnerabilidad, escucha y dignidad relacional.
  form_and_line: Línea delicada de microgesto, énfasis en manos, hombros y mirada baja, con contornos limpios que priorizan lectura afectiva sobre acción.
  color_palette: Azules de río calmado, beiges urbanos suaves, verdes pálidos de primavera y acentos rosados de empatía contenida.
  lighting_setup: Luz natural de tarde nublada con difusión amable, contraste bajo y brillos discretos que favorecen intimidad conversacional.
  material_texture: Hormigón de puente húmedo, telas escolares cotidianas, barandas metálicas gastadas y reflejos acuosos serenos.
  render_quality: Acabado premium de realismo sensible con foco en expresión corporal mínima y continuidad emocional entre planos.
  spatial_distortion: Espacialidad naturalista abierta con distancia interpersonal modulada como métrica visual de confianza y perdón.
  atmosphere: Tierno, arrepentido, respirable, humano.
  key_features: Composición de dos cuerpos en reconciliación, manos como núcleo semántico, ribera urbana y silencios visuales elocuentes.
  creative_brief: Construye una gramática reusable de reconciliación humana para cualquier sujeto usando microgesto, luz suave y espacio interpersonal como lenguaje principal.
