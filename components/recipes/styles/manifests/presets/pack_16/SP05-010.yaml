visualDna:
  aesthetic: Aventura cómica de formas redondas, inocencia física, slapstick amable y energía itinerante.
  form_and_line: Trazo cel elástico y expresivo, timing de gag corporal y silueta cartoon de lectura instantánea.
  color_palette: Amarillos soleados, verdes vivos, naranjas suaves y azules limpios de viaje clásico.
  lighting_setup: Iluminación abierta de aventura diurna, sombra simple y acentos brillantes de humor físico.
  material_texture: Polvo caricaturesco, tela simple, piedra ligera y grano retro optimista.
  render_quality: Acabado broadcast cálido con énfasis en claridad cómica y ternura de movimiento.
  spatial_distortion: Espacio expansivo y flexible para carrera, salto y choque cómico sin perder legibilidad.
  atmosphere: Aventurera, alegre, juguetona, entrañable.
  key_features: Proporción redondeada, energía de troupe, beat de broma visual y choque amistoso.
  creative_brief: >-
    Define una gramática reusable de round-adventure-slapstick para cualquier
    sujeto, enfocada en elasticidad expresiva, optimismo narrativo y ritmo de
    gag físico sin imponer artes marciales, viajes, troupe, combate ni mundo
    expansivo literal.
