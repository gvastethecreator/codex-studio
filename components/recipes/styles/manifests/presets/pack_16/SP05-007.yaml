visualDna:
  aesthetic: Épica de supervivencia brutal, impacto físico extremo, ferocidad ritual y dureza post-colapso.
  form_and_line: Línea gruesa y cortante, anatomía hipertensa y puesta de golpe frontal con lectura brutal inmediata.
  color_palette: Ocres abrasados, negros pesados, rojos secos y acentos hueso de paisaje devastado.
  lighting_setup: Sol alto implacable y sombras densas, con destellos duros sobre sudor, metal y cuero gastado.
  material_texture: Cuero curtido, polvo volcánico, cicatriz visible y grano áspero de cinta analógica violenta.
  render_quality: Acabado retro de alto contraste corporal, privilegiando contundencia, daño y resiliencia.
  spatial_distortion: Horizonte árido abstracto con encuadres de colisión directa y escala de choque primitivo.
  atmosphere: Brutal, icónica, tensa, visceral.
  key_features: Siluetas masivas, gesto de supervivencia, dureza wasteland y coreografía de impacto sin ornamento.
  creative_brief: >-
    Construye una gramática reusable de wasteland-impact-legend para cualquier
    sujeto, enfocada en peso físico, dureza material y catarsis de choque sin
    imponer desiertos, duelos, guerreros, cuero, cicatrices ni combate literal.
