  color_palette: Carmín escénico, azul zafiro nocturno, dorado de gala y negros de fondo operático.
  lighting_setup: Cruce de spotlights con backlight teatral y sombras recortadas de escalinata.
  material_texture: Terciopelo de vestuario, madera pintada de escenografía, metal utilería y humo de escena controlado.
  render_quality: Frame performativo de alto impacto con legibilidad de duelo, símbolo y jerarquía dramática.
  spatial_distortion: Arquitectura axial de teatro con capas de escalera y profundidad alegórica en fuga vertical.
  atmosphere: Teatral, competitiva, simbólica y espectacularmente luminosa.
  key_features: Hazes de spotlight cruzado, poses de duelo, set de escalera y pageantry de vestuario.
