visualDna:
  aesthetic: Confrontación performativa alegórica, rivalidad escénica abstracta y coreografía de alto simbolismo.
  form_and_line: Poses teatrales de confrontación, siluetas rituales y transición dramática entre niveles visuales.
  color_palette: Carmín escénico, azul zafiro nocturno, dorado de gala y negros de fondo operático.
  lighting_setup: Cruce de spotlights con backlight teatral y sombras recortadas en capas verticales.
  material_texture: Terciopelo abstracto, superficie pintada, metal utilitario y humo controlado.
  render_quality: Frame performativo de alto impacto con legibilidad de símbolo, tensión y jerarquía dramática.
  spatial_distortion: Arquitectura axial abstracta con capas verticales y profundidad alegórica en fuga vertical.
  atmosphere: Teatral, competitiva, simbólica y espectacularmente luminosa.
  key_features: Hazes de spotlight cruzado, poses de confrontación abstracta, capas verticales y pageantry ornamental.
  creative_brief: >-
    Construye una gramática reusable de allegorical-spotlight-confrontation donde
    alegoría, coreografía de confrontación y arquitectura axial sostengan una
    identidad visual transferible sin imponer escenario, escaleras, espadas,
    teatro ni combate literal.
