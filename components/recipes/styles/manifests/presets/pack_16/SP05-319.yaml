visualDna:
  aesthetic: Ópera pop de dualidad estratégica y espectáculo emocional, donde tensión técnica y melodrama cromático coexisten.
  form_and_line: Doble registro de línea, rigidez operacional y fluidez performativa de espectáculo.
  color_palette: Grises tácticos, rojos de alerta, azules estelares y pasteles pop de contrapeso emocional.
  lighting_setup: Haze técnico combinado con spot escénico, glow de interfaz y contraluces cósmicos de gran dramatismo.
  material_texture: Placas pintadas, marcas operativas, superficies de show y shimmer de borde cel analógico.
  render_quality: Acabado premium retro-futuro con balance nítido entre lectura táctica y catarsis pop escénica.
  spatial_distortion: Escala macro contrapuesta a encuadre íntimo performativo para tensión entre estrategia y canción.
  atmosphere: Romántica, estratégica, pop, sideral.
  key_features: Contraste táctico-pop, escala operática, color pop, melodrama estratégico y diseño técnico sentimental.
  creative_brief: >-
    Diseña una gramática reusable de pop estratégico dual para cualquier prompt o imagen de entrada:
    estrategia, espectáculo y romance gráfico. Idols, mechas, carrier decks,
    ciudad-nave u operaciones militares pueden funcionar como indicios de escala
    y dualidad pop-táctica cuando aporten estilo, sin fijar una escena militar.
