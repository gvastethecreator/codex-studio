visualDna:
  aesthetic: Infraestructura cyber-retro hiperdensa, fricción social, velocidad mecánica y saturación sistémica.
  form_and_line: Línea detallista y nerviosa, estructura protagonista y dinámica de desplazamiento a máxima inercia.
  color_palette: Violeta eléctrico, verde neón, concreto gris-azul y rojos de señal disruptiva.
  lighting_setup: Brillo de señal superpuesto, flare industrial y sombras recortadas por capas elevadas.
  material_texture: Superficies calientes, chapa abstracta, señalética luminosa y suciedad tecnológica acumulada.
  render_quality: Acabado retro de alta complejidad visual con lectura clara de caos estructurado.
  spatial_distortion: Capas infraestructurales superpuestas para sensación de presión sistémica constante.
  atmosphere: Eléctrica, rebelde, convulsa, adrenalínica.
  key_features: Horizonte saturado de ingeniería, movilidad agresiva, densidad señalética y pulso de revuelta.
  creative_brief: >-
    Construye una gramática reusable de hyper-dense-cyber-retro-infrastructure para
    cualquier sujeto, priorizando densidad arquitectónica, energía social y
    movimiento continuo sin imponer ciudad literal, calles, torres, vías,
    pasarelas ni cartelería concreta.
