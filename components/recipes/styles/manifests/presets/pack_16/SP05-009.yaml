visualDna:
  aesthetic: Megaciudad neo-retro hiperdensa, con fricción social, velocidad mecánica y saturación de infraestructura.
  form_and_line: Línea detallista y nerviosa, arquitectura protagonista y dinámica de desplazamiento a máxima inercia.
  color_palette: Violeta eléctrico, verde neón urbano, concreto gris-azul y rojos de señal disruptiva.
  lighting_setup: Brillo de cartel superpuesto, flare industrial y sombras recortadas por viaductos elevados.
  material_texture: Asfalto caliente, chapa urbana, señalética luminosa y suciedad tecnológica acumulada.
  render_quality: Acabado retro de alta complejidad visual con lectura clara de caos estructurado.
  spatial_distortion: Capas de ciudad superpuestas (vía, pasarela, torre) para sensación de presión metropolitana constante.
  atmosphere: Eléctrica, rebelde, convulsa, adrenalínica.
  key_features: Horizonte saturado de ingeniería, movilidad agresiva, densidad de cartelería y pulso de revuelta cívica.
  creative_brief: Construye una gramática reusable de urbanismo cyber-retro extremo para cualquier sujeto, priorizando densidad arquitectónica, energía social y movimiento continuo.
