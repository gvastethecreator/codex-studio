visualDna:
  aesthetic: >-
    Grand-strategy anime language emphasizing formation logic, heraldic identity, and mass momentum over
    individual hero framing.
  subject_treatment: >-
    Broad massed silhouettes, banner-like arcs that map faction flow, and repeated line cadence used as
    directional rhythm.
  color_and_tone: >-
    Dominant crimson, soot-charcoal fields, oxidized metal neutrals, and restrained antique gold command
    accents.
  lighting_and_shadow: >-
    Cold dawn haze with low-angle backlight that separates ranks in planes while preserving readable command
    focal points.
  texture_and_material: Battle-scored metal, mud-caked lower planes, frayed fabric standards, and humid particulate air.
  camera_and_composition: >-
    Multi-plane conflict depth using atmospheric compression and diagonal advance vectors for collective force
    direction.
  atmosphere_and_mood: Inevitable collision, inherited duty, and banner-locked resolve under doctrine.
  rendering_and_quality: >-
    Wide-format tactical readability with crisp hierarchy between command layer, vanguard layer, and
    environmental pressure.
  key_features: Rank geometry, signal standards, wave cadence, and collision-ready front interfaces.
  creative_brief: >-
    Create a transferable crimson formation momentum grammar for any subject: formation-driven composition,
    heraldic color dominance, disciplined large-scale motion, and command-layer hierarchy without imposing
    clans, armies, battlefields, cavalry, infantry, weapons, or war scenes.
