  color_palette: Imperial crimson, polished black, royal violet, cold white, gold trim accents, and saturated early-HD emergency glow.
  lighting_setup: Polished gradient highlights, spotlight-like command keys, crimson rim light, and clean fill for graphic hierarchy.
  material_texture: Smooth digital cel polish, lacquered black surfaces, ceremonial cloth sheen, tactical glass glow, and subtle composite grain.
  render_quality: Early-2000s digital anime production frame with clean rendering, smooth color blending, and high-drama readability.
  spatial_distortion: Strategic overhead cues, theatrical diagonals, throne-like negative space, and compressed command-board perspective.
