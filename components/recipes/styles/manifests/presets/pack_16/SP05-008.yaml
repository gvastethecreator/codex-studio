visualDna:
  aesthetic: Procedural retro con filo cómico, elegancia precisa y tensión nocturna de deducción.
  form_and_line: Trazo cel preciso, acting seco y blocking táctico con ritmo irónico.
  color_palette: Cobalto nocturno, neón rosa-controlado, ámbar contenido y grafito frío.
  lighting_setup: Contraste de vidrio y sombra, reflejos húmedos y key dirigida para lectura de indicio visual.
  material_texture: Tejido elegante, metal vintage abstracto, vidrio lluvioso y grano cinematográfico pulcro.
  render_quality: Acabado broadcast 80s con equilibrio entre carisma procedural y ritmo de resolución.
  spatial_distortion: Profundidad oblicua con encuadres de vigilancia, giro táctico y resolución rápida.
  atmosphere: Elegante, afilada, irónica, magnética.
  key_features: Siluetas elegantes, neón de expediente abstracto, acción compacta y humor procedural seco.
  creative_brief: >-
    Diseña una gramática reusable de neon-procedural-irony para cualquier
    sujeto, combinando sofisticación táctica, deducción visual y timing irónico
    sin imponer policías, detectives, calles, armas, trajes, ventanas ni
    persecuciones.
