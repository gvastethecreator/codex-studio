visualDna:
  aesthetic: Policial urbano retro con filo cómico, sastrería impecable y tensión de investigación nocturna.
  form_and_line: Trazo cel preciso de detective-action, acting seco y blocking de equipo en ciudad vertical.
  color_palette: Cobalto nocturno, neón rosa-controlado, ámbar de interior y grafito metropolitano.
  lighting_setup: Contraste de vidriera y calle, reflejos en ventanal y key dirigida para lectura de pista.
  material_texture: Tejido de traje, metal de arma vintage, vidrio lluvioso y grano cinematográfico pulcro.
  render_quality: Acabado broadcast 80s con equilibrio entre carisma procedural y ritmo de persecución.
  spatial_distortion: Profundidad de avenida y azotea, con encuadres de vigilancia, emboscada y resolución rápida.
  atmosphere: Elegante, callejera, afilada, magnética.
  key_features: Siluetas de traje, neón de expediente nocturno, acción compacta y humor de dupla investigadora.
  creative_brief: Diseña una gramática reusable de detective-action retro para cualquier sujeto, combinando sofisticación urbana, dinamismo táctico y timing irónico.
