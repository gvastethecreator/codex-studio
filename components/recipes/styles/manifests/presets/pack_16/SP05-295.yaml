  key_features: Detalle de oboe y flauta, separación corporal medida, gestualidad mínima y composición de silencio compartido.
  creative_brief: Define una gramática reusable de intimidad musical para cualquier sujeto, usando microgesto, luz pálida y distancia espacial como partitura emocional.
