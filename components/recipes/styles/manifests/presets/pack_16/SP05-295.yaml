visualDna:
  aesthetic: Cámara musical intimista de precisión emocional, enfocada en distancia afectiva, pausa y resonancia silenciosa.
  form_and_line: Trazo fino y reservado, microgestos delicados, respiración visual y timing compositivo entre presencia y ausencia.
  color_palette: Marfiles pálidos, azules deslavados, grises silenciosos y dorados suaves de resonancia acústica.
  lighting_setup: Luz interior filtrada de baja intensidad con sombras blandas que sostienen vulnerabilidad sin dramatismo excesivo.
  material_texture: Barniz cálido, superficies enceradas, telas ligeras y aire suspendido con sensación acústica contenida.
  render_quality: Acabado premium de alta sutileza, lectura de proximidad emocional y refinamiento acústico traducido a imagen.
  spatial_distortion: Profundidad longitudinal usada como métrica de distancia vincular, con limpieza compositiva y mínima distorsión.
  atmosphere: Frágil, musical, contenida, punzante.
  key_features: Distancia espacial, gestualidad mínima, luz pálida, ritmo de cámara y composición de silencio compartido.
  creative_brief: >-
    Define una gramática reusable de intimidad musical para cualquier prompt o imagen de entrada:
    pausa, aire y distancia emocional sin imponer instrumentos, pasillos, escuelas ni dúos de personajes.
