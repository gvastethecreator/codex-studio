visualDna:
  aesthetic: Deporte acuático luminoso centrado en sincronía, técnica corporal y transición fluida.
  form_and_line: Anatomía hidrodinámica limpia, arcos fluidos y lectura clara de cambio de ritmo.
  color_palette: Azules clorados, blancos espumosos y acentos saturados para lectura de flujo direccional.
  lighting_setup: Iluminación acuática con caústicas controladas y highlights sobre láminas fluidas.
  material_texture: Láminas especulares, humedad mineral, tejido elástico y gotas en suspensión.
  render_quality: Frame acuático de alta nitidez con prioridad en salida, ritmo y transición.
  spatial_distortion: Distorsión suave por refracción y perspectiva longitudinal para lectura de velocidad.
  atmosphere: Refrescante, competitiva y emocionalmente cohesionada.
  key_features: Arcos de splash, geometría líquida, reflejos de cloro, tensión de relevo y siluetas aerodinámicas.
  creative_brief: >-
    Aplica una gramática reusable de energía acuática sincronizada a cualquier prompt o imagen de entrada:
    agua, brillo y transición fluida sin imponer natación, carriles, piletas, relevos ni cuerpos poolside.
