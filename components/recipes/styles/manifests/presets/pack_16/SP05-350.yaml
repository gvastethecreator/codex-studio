visualDna:
  aesthetic: Natación de relevos centrada en sincronía de equipo, técnica de salida y transición de testigo.
  form_and_line: Anatomía hidrodinámica limpia, arcos de brazada fluidos y lectura clara de cambio en pared.
  color_palette: Azules de piscina clorada, blancos de espuma y acentos de escuadra saturados para lane clarity.
  lighting_setup: Iluminación interior acuática con caústicas controladas y highlights sobre superficie de agua.
  material_texture: Agua en lámina especular, baldosa húmeda, tejido elástico de competición y gotas en suspensión.
  render_quality: Sports frame acuático de alta nitidez con prioridad en salida, ritmo y relevo.
  spatial_distortion: Distorsión suave por refracción y perspectiva longitudinal de carriles para lectura de velocidad.
  atmosphere: Refrescante, competitiva y emocionalmente cohesionada.
  key_features: Splash arcs definidos, geometría de lane-line, handoff de relevo y siluetas poolside.
  creative_brief: >-
    Formula una gramática reusable de relay-swim donde caústicas, ritmo de
    carril y transición de relevo sostengan identidad transferible, no una
    escena cerrada.
