visualDna:
  aesthetic: Fantasía de duelo metafísico donde naturaleza húmeda y arquitectura imposible funcionan como umbral emocional más que escenario literal.
  form_and_line: Línea delicada y contemplativa, siluetas de guía aviar ambigua y bordes suavemente inestables en zonas de transición onírica.
  color_palette: Verdes de marisma apagados, grises de luto doméstico, marfiles velados y acentos cálidos mínimos de memoria íntima.
  lighting_setup: Luz difusa de cielo cubierto con contraluces tenues en bruma, preservando ambigüedad entre vigilia y sueño.
  material_texture: Agua quieta, juncos húmedos, muros antiguos de yeso y madera envejecida con acabado pictórico de alta sutileza.
  render_quality: Terminación premium de tono introspectivo, con jerarquía suave y microdetalle atmosférico orientado a sensación de tránsito.
  spatial_distortion: Profundidad por capas de neblina y arquitectura no euclidiana ligera que sugiere pasaje interior.
  atmosphere: Doliente, extraña, contemplativa, en búsqueda.
  key_features: Silueta de ave guía, portales de torre y pantano, quietud suspendida y composición de umbral.
  creative_brief: Diseña una gramática transferable de duelo-onírico para cualquier sujeto usando marisma, arquitectura umbral y luz velada como lenguaje de transformación interna.

