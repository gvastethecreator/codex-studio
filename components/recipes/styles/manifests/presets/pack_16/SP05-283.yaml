visualDna:
  aesthetic: Fantasía metafísica de duelo, con naturaleza velada, umbrales abstractos y transformación interna.
  form_and_line: Línea delicada y contemplativa, bordes suavemente inestables y siluetas tratadas como presencias ambiguas.
  color_palette: Verdes apagados de humedad emocional, grises de luto, marfiles velados y acentos cálidos mínimos de memoria íntima.
  lighting_setup: Luz difusa de cielo cubierto con contraluces tenues en bruma, preservando ambigüedad entre vigilia y sueño.
  material_texture: Veladuras húmedas, fibras orgánicas sugeridas, yeso erosionado y madera envejecida como memoria material.
  render_quality: Terminación premium de tono introspectivo, con jerarquía suave y microdetalle atmosférico orientado a sensación de tránsito.
  spatial_distortion: Profundidad por capas de neblina y arquitectura no euclidiana ligera que sugiere pasaje interior.
  atmosphere: Doliente, extraña, contemplativa, en búsqueda.
  key_features: Umbral simbólico, quietud suspendida, luz velada, escala emocional ambigua y materia orgánica sugerida.
  creative_brief: >-
    Diseña una gramática transferible de duelo onírico para cualquier prompt o imagen de entrada:
    silencio metafísico, bordes inestables y sensación de tránsito interior sin imponer aves, torres, pantanos ni portales literales.

