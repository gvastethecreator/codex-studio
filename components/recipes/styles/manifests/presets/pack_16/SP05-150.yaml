visualDna:
  aesthetic: Fantasía sobrenatural de umbral carmesí, con tensión romántica, severidad emocional y combustión contenida.
  form_and_line: Línea digital limpia y compacta, silueta dominante, ejes frontales de confrontación y acting de intensidad contenida.
  color_palette: Rojos brasa, naranjas ígneos, azules fríos de contraste y negros de plano oculto con saturación nítida.
  lighting_setup: Glow de fuego sobrenatural, key crepuscular y gradiente suave típico de compositing digital de época.
  material_texture: Superficies limpias, partículas de ceniza flotante, bordes de calor y acabado cel-digital con ruido sutil.
  render_quality: Acabado premium de acción romántica 2000s con lectura inmediata de choque mundo ordinario-mundo oculto.
  spatial_distortion: Espacio cotidiano tensionado por overlays dimensionales y encuadre cerrado de choque emocional crepuscular.
  atmosphere: Ígnea, estricta, romántica y secretamente combativa.
  key_features: Mirada carmesí, partículas de ember, silueta severa, plano oculto superpuesto y frontera dimensional.
  creative_brief: >-
    Diseña una gramática reusable de crimson-threshold-embers para cualquier
    sujeto: fuego arcano, romance de frontera dimensional, severidad emocional
    y contraste mundo visible/oculto sin imponer escuela, uniformes, espadas,
    armas, patios ni duelos.
