visualDna:
  aesthetic: Confesión indie íntima, lirismo vulnerable, calidez contenida y silencio emocional.
  form_and_line: Gestualidad cercana, postura contenida y distancia emocional claramente legible.
  color_palette: Ámbar cálido, azul nocturno suave y acentos granate de melancolía contemporánea.
  lighting_setup: Focos pequeños con caída suave y penumbra envolvente de espacio reducido.
  material_texture: Madera mínima, metal de soporte, acabado mate y humo ligero ambiental.
  render_quality: Frame emotivo con lectura de confesión, silencio y clímax íntimo.
  spatial_distortion: Perspectiva frontal compacta con foco íntimo y eje de respiración compartida.
  atmosphere: Íntima, doliente, cálida y acústicamente contenida.
  key_features: Framing íntimo, close-up táctil, spacing emocional y lenguaje corporal confesional.
  creative_brief: >-
    Construye una gramática reusable de intimate-indie-confession donde
    intimidad acústica, tensión emocional y mínima puesta escénica definan una
    identidad visual reutilizable sin imponer escenario, micrófono, guitarra,
    dúo ni venue literal.
