visualDna:
  aesthetic: Horror demónico setentero de violencia expresionista, con transformación corporal cruda y tragedia sin filtro.
  form_and_line: Deformación anatómica agresiva, trazo quebrado de metamorfosis y energía de tinta frenética.
  color_palette: Rojos hemáticos ácidos, amarillos tóxicos, violetas infernales y blancos de pánico estroboscópico.
  lighting_setup: Estallidos de contraste, subluces de horror y sombras cel inestables con artefacto de señal analógica.
  material_texture: Pintura cel rugosa, sangrado croma de TV antigua y fondos deteriorados de pincel duro.
  render_quality: Acabado premium de shock-retro deliberadamente abrasivo, con legibilidad emocional asentada en confrontación visual.
  spatial_distortion: Warping de body horror y encuadre desorientado impulsado por dolor de transformación.
  atmosphere: Pánico, psicodelia, tragedia, primalidad.
  key_features: Agonía metamórfica, simbolismo apocalíptico, brutalidad cromática, grano de broadcast antiguo e impacto visceral.
  creative_brief: >-
    Construye una gramática reusable de horror demónico expresionista para cualquier prompt o imagen de entrada:
    transformación, crudeza y tragedia cromática sin imponer demonios literales ni escenas de violencia concreta.
