visualDna:
  aesthetic: Dusty space-western absurdity, reckless comedy-action contrast, sunburnt loneliness, and elastic cool-to-chaos expression.
  form_and_line: Crisp 90s cel contours, exaggerated gesture snaps, long coat-like silhouette rhythms, and slapstick-to-danger timing lines.
  color_palette: Sun-bleached ochres, turquoise sky accents, hot red impact pops, faded mauves, and scorched black cel shadows.
  lighting_setup: Harsh high-noon cel contrast, heat-haze bloom, hard rim light, and dry highlight separation on metal or fabric.
  material_texture: Painted dust grain, worn leather-like surfaces, scratched metal glints, sanded matte color, and cel overlay texture.
  render_quality: Golden-era anime frame polish with sharp cel definition, warm grading, and readable absurd-action silhouette design.
  spatial_distortion: Heat-warped horizon pressure, extreme foreshortening, comedic snap framing, and empty-space loneliness.
  atmosphere: Chaotic, lonely, reckless, wild.
  key_features: Dust haze, oversized attitude, elastic expression contrast, dry kinetic impact, and absurd danger rendered with sincerity.
  creative_brief: >-
    Build a reusable dusty-space-western absurdity grammar for any subject or
    input image: heat, dry texture, elastic cool-to-chaos acting, lonely
    negative space, and reckless 90s cel impact without imposing deserts,
    guns, saloons, shell casings, arm-weapons, or specific horizons.
