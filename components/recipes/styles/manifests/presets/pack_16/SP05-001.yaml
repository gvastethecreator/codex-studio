visualDna:
  aesthetic: Early television anime, large eyes, simple shapes, brave retro energy, round facial structure, limited shadow tones, earnest storytelling charm
  form_and_line: Rounded heroic anatomy, thick confident contouring, simplified in-between-friendly geometry, hand-inked cel cadence
  color_palette: Sun-warmed primaries, milk-soft skin midtones, subdued sky blues, faded analog broadcast chroma
  lighting_setup: Broadcast-era key-fill simplicity, stepped cel shadow bands, restrained rim accents, low dynamic-range highlights
  material_texture: Acetate cel edge shimmer, painted matte backgrounds, mild registration jitter, analog scan grain
  render_quality: Late-70s to early-80s TV anime fidelity with clean silhouette priority and era-authentic compositing softness
  spatial_distortion: Heroic child-safe proportion push, foreground emphasis for bravery beats, limited-perspective staging for readability
  atmosphere: Nostalgic, optimistic, daring, spirited
  key_features: Earnest hero silhouette language, warm cel-era optimism, emblematic poses, hand-painted scenic restraint
  creative_brief: >-
    Early TV-anime heroism should read immediately through bold contour clarity,
    emotionally direct posing, and warm analog cel color logic. Keep
    compositions clean, uplifting, and iconic, with craftsmanship rooted in
    hand-painted backgrounds and pre-digital broadcast constraints.
