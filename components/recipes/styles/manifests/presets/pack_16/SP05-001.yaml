visualDna:
  aesthetic: >-
    Early television anime with large-eye era cues, simple shapes, brave retro energy, limited shadow tones,
    and earnest storytelling charm
  subject_treatment: >-
    Rounded iconic form language, thick confident contouring, simplified in-between-friendly geometry,
    hand-inked cel cadence
  color_and_tone: Sun-warmed primaries, milk-soft skin midtones, subdued sky blues, faded analog broadcast chroma
  lighting_and_shadow: >-
    Broadcast-era key-fill simplicity, stepped cel shadow bands, restrained rim accents, low dynamic-range
    highlights
  texture_and_material: Acetate cel edge shimmer, painted matte backgrounds, mild registration jitter, analog scan grain
  camera_and_composition: Child-safe proportion push, focal emphasis for bravery beats, limited-perspective staging for readability
  atmosphere_and_mood: Nostalgic, optimistic, daring, spirited
  rendering_and_quality: >-
    Late-70s to early-80s TV anime fidelity with clean silhouette priority and era-authentic compositing
    softness
  key_features: >-
    Earnest iconic silhouette language, warm cel-era optimism, emblematic posing rhythm, hand-painted scenic
    restraint
  creative_brief: >-
    Early TV-anime optimism should read immediately through bold contour clarity, emotionally direct posing,
    and warm analog cel color logic. Keep compositions clean, uplifting, and iconic, with craftsmanship rooted
    in hand-painted backgrounds and pre-digital broadcast constraints. Apply this as reusable retro-pioneer
    grammar to any prompt or input image: rounded heroic simplification, warm cel-era bravery, analog
    registration softness, and emblematic uplift without requiring a boy hero, robot, sidekick, broadcast
    frame, or fixed adventure scene.
