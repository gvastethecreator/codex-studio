  color_palette: Neón frío, piel desaturada, rojos de alarma y grises de apartamento vigilado.
  lighting_setup: Iluminación clínica nocturna, reflejos espejados agresivos y zonas de sombra de amenaza latente.
  material_texture: Cristal, pantalla CRT, maquillaje escénico y superficies domésticas de realismo inquietante.
  render_quality: Acabado fílmico de precisión psicológica con montaje de ambigüedad controlada.
  spatial_distortion: Interiores comprimidos y capas de reflejo para sensación de yo fragmentado y mirada externa invasiva.
