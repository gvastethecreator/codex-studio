visualDna:
  aesthetic: Juventud veraniega con elasticidad temporal ligera, combinando comedia de error cotidiano y melancolía de decisiones irreversibles.
  form_and_line: Trazos ágiles para movimiento de salto, expresividad facial espontánea y siluetas escolares limpias de alta legibilidad.
  color_palette: Azules de cielo brillante, blancos de nube cálida, verdes suburbanos suaves y acentos rosados de emoción adolescente.
  lighting_setup: Sol de tarde alto con rebotes claros en azoteas, sombras suaves y brillo atmosférico de verano en expansión.
  material_texture: Concreto de techo escolar, barandas metálicas calientes al sol, telas ligeras de uniforme y aire húmedo estival.
  render_quality: Acabado cinematográfico fresco con prioridad en ritmo corporal, timing visual y lectura clara de loop temporal.
  spatial_distortion: Perspectiva naturalista con elongación dinámica en saltos y microdeformación de trayectoria para sugerir rewind temporal.
  atmosphere: Lúdica, nostálgica, aérea, impulsiva.
  key_features: Azoteas como plataforma, nubes protagonistas, gestualidad de salto, iconografía temporal sutil y ensemble juvenil.
  creative_brief: Crea una gramática reusable de verano temporal para cualquier sujeto usando luz de tarde, composición de salto y tensión entre juego y arrepentimiento.

