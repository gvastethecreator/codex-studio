visualDna:
  aesthetic: Juventud luminosa con elasticidad temporal ligera, energía de error cotidiano y melancolía de decisión irreversible.
  form_and_line: Trazos ágiles, expresividad espontánea, diagonales de impulso y siluetas limpias de alta legibilidad.
  color_palette: Azules brillantes, blancos cálidos, verdes suaves de cotidianidad abierta y acentos rosados de impulso emocional.
  lighting_setup: Sol de tarde alto con rebotes claros, sombras suaves y brillo atmosférico de verano en expansión.
  material_texture: Superficies cálidas al sol, metal liviano, telas ligeras y aire húmedo estival sin anclar locación.
  render_quality: Acabado cinematográfico fresco con prioridad en ritmo corporal, timing visual y lectura clara de loop temporal.
  spatial_distortion: Perspectiva naturalista con elongación dinámica en saltos y microdeformación de trayectoria para sugerir rewind temporal.
  atmosphere: Lúdica, nostálgica, aérea, impulsiva.
  key_features: Luz de tarde, impulso corporal, repetición temporal sutil, aire de verano abstracto y tensión entre juego y arrepentimiento.
  creative_brief: >-
    Crea una gramática reusable de tiempo elástico veraniego para cualquier prompt o imagen de entrada:
    ligereza, impulso y arrepentimiento suave sin imponer azoteas, escuelas, saltos literales ni grupos juveniles.

