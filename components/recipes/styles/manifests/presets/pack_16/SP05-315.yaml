visualDna:
  aesthetic: Tragedia política áspera, donde juventud, geometría coercitiva e institución opresiva chocan.
  form_and_line: Contorno angular severo, siluetas rígidas y actuación contenida de trauma bajo presión institucional.
  color_palette: Grises industriales, azules fríos de interfaz, rojos de alerta táctica y blancos desaturados.
  lighting_setup: Luz dura de control institucional, sombras cel planas tajantes y destellos de interfaz en rostros tensos.
  material_texture: Aleación pesada, vidrio fracturable, paneles tácticos y ruido analógico de señal en crisis.
  render_quality: Acabado premium retro-institucional con lectura estratégica clara y peso emocional de decisión irreversible.
  spatial_distortion: Profundidad comprimida y escala opresiva para reforzar claustrofobia política.
  atmosphere: Tensa, institucional, trágica, cortante.
  key_features: Geometría angular, luz de conflicto, códigos abstractos de poder, crisis psicológica y masa opresiva.
  creative_brief: >-
    Diseña una gramática reusable de tragedia institucional angular para cualquier prompt o imagen de entrada:
    aristas, trauma y poder opresivo sin imponer colonias, cabinas, pilotos, facciones ni máquinas concretas.
