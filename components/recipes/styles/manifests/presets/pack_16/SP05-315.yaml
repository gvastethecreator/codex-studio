visualDna:
  aesthetic: Tragedia política de guerra mecha con tono más áspero, donde juventud y maquinaria quedan atrapadas en conflicto institucional.
  form_and_line: Contorno angular severo, siluetas militares rígidas y actuación contenida de trauma en cabina.
  color_palette: Grises de colonia industrial, azules fríos de monitor, rojos de alerta táctica y blancos desaturados de uniforme.
  lighting_setup: Luz dura de cockpit y corredor militar, sombras cel planas tajantes y destellos de interfaz en rostros tensos.
  material_texture: Aleación de mobile suit, vidrio fracturable de colonia, paneles tácticos y ruido analógico de señal bélica.
  render_quality: Acabado premium retro-militar con lectura estratégica clara y peso emocional de decisión irreversible.
  spatial_distortion: Profundidad comprimida de cabina y corredor bélico, con escala orbital opresiva para reforzar claustrofobia política.
  atmosphere: Tensa, militarizada, trágica, cortante.
  key_features: Cabina como cámara de crisis, mecha de arista dura, códigos de facción y duelo psicológico de piloto.
  creative_brief: Diseña una gramática reusable de drama bélico mecha-político para cualquier sujeto, combinando geometría angular, luz de conflicto y trauma juvenil institucionalizado.
