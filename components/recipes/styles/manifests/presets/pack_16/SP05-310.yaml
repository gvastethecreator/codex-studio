visualDna:
  aesthetic: Pulp espacial profesionalista, con ética de oficio, aventura resolutiva y optimismo técnico ochentero.
  form_and_line: Contorno robusto de diseño técnico, acting competente y staging funcional orientado a resolución práctica.
  color_palette: Naranjas operativos, azules técnicos, grises industriales y blancos de señal funcional.
  lighting_setup: Iluminación de mantenimiento con key frontal claro, sombras planas técnicas y acentos de baliza.
  material_texture: Metal usado, paneles de servicio, tejido técnico y desgaste mecánico de uso intensivo.
  render_quality: Acabado premium retro-pulp con foco en claridad procedimental, jerarquía funcional y acción resolutiva.
  spatial_distortion: Gran volumen operativo con líneas guía y flujo direccional para enfatizar competencia técnica.
  atmosphere: Pulp, aventurera, competente, luminosa.
  key_features: Color-identidad fuerte, claridad procedimental, hardware funcional sugerido, oficio competente y aventura directa.
  creative_brief: >-
    Crea una gramática reusable de pulp espacial competente para cualquier prompt o imagen de entrada:
    oficio, claridad técnica y heroísmo práctico. Trajes, hangares, tripulación
    o rescate pueden operar como indicios de oficio espacial cuando el input lo
    admita, sin convertir el resultado en una escena obligatoria.
