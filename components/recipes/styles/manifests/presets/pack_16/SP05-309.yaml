visualDna:
  aesthetic: Space-action glam hiperpop, con elegancia táctica, croma explosivo y caos coreografiado.
  form_and_line: Siluetas fashion dinámicas, contorno cel contundente y lenguaje de pose dual coordinada en clave de impacto.
  color_palette: Blancos clínicos de corredor, rosas explosivos, cianes láser y acentos amarillos de advertencia pop.
  lighting_setup: Luz interior brillante de sci-fi retro con flashes de energía y sombras planas para legibilidad de acción veloz.
  material_texture: Corredor sci-fi pulido, textil técnico brillante, residuos de disparo láser y grano analógico televisivo.
  render_quality: Acabado premium retro-glam con claridad de dúo protagonista y balance entre espectacularidad y control.
  spatial_distortion: Corredores de fuga y combate con perspectiva lineal acelerada para subrayar velocidad y destrucción elegante.
  atmosphere: Flashy, traviesa, pop, explosiva.
  key_features: Moda sci-fi abstracta, láseres de color, sincronía táctica sugerida, croma explosivo y composición de caos limpio.
  creative_brief: >-
    Diseña una gramática reusable de acción glam espacial para cualquier prompt o imagen de entrada:
    moda, energía táctica y color explosivo sin imponer dúos, pasillos, misiones ni protagonistas concretos.
