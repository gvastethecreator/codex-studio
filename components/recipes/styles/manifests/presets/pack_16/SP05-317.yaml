visualDna:
  aesthetic: Retrofuturo rebelde de OVA ochentera, con neón sintético, velocidad gráfica y paranoia de sistema encubierto.
  form_and_line: Trazado afilado de señalética, diagonales cinéticas y silueta rebelde como eje de identidad visual.
  color_palette: Cianes y magentas arcade, violetas sintéticos de twilight y negros húmedos.
  lighting_setup: Derrame de neón nocturno, parpadeo de cartelería abstracta y contraste cel duro con backfill de sodio.
  material_texture: Brillo de lluvia sobre superficie oscura, borde de bloom CRT y grano analógico de video-era.
  render_quality: Acabado premium OVA retro-tech con claridad de velocidad y atmósfera de inquietud sistémica.
  spatial_distortion: Perspectiva de avance forzado con compresión profunda para enfatizar fuga y revelación.
  atmosphere: Elegante, rebelde, nocturna, revelatoria.
  key_features: Overlays de arcade, neón sintético, velocidad lateral, vigilancia abstracta y revelación de verdad oculta.
  creative_brief: >-
    Diseña una gramática reusable de techno-rebeldía ochentera para cualquier prompt o imagen de entrada:
    arcade, velocidad y paranoia sin imponer motos, carreteras, skylines ni riders.
