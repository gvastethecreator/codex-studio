visualDna:
  aesthetic: Retrofuturo urbano rebelde de OVA ochentera, con velocidad de moto y paranoia de ciudad-sistema encubierta.
  form_and_line: Trazado afilado de señalética y asfalto, diagonales cinéticas y silueta rider como eje de identidad visual.
  color_palette: Cianes y magentas arcade, violetas sintéticos de twilight y negros de asfalto húmedo.
  lighting_setup: Derrame de neón nocturno, parpadeo de cartelería y contraste cel duro con backfill de sodio vial.
  material_texture: Brillo de lluvia sobre calle, borde de bloom CRT y grano analógico de video-era.
  render_quality: Acabado premium OVA retro-tech con claridad de velocidad y atmósfera de inquietud sistémica.
  spatial_distortion: Perspectiva de avance forzado con compresión de cañón urbano para enfatizar fuga y revelación.
  atmosphere: Elegante, rebelde, nocturna, revelatoria.
  key_features: Rider central, overlays de arcade, skyline vigilado y gramática visual de verdad oculta.
  creative_brief: Diseña una gramática reusable de techno-rebeldía urbana para cualquier sujeto, combinando impulso de carretera, neón sintético y paranoia de sistema encubierto.
