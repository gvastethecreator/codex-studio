visualDna:
  aesthetic: Cel anime 90s de melancolía humanista, humor defensivo y heroísmo pacifista bajo luz abrasada.
  form_and_line: Línea energética y elástica, siluetas largas, gestos cómicos que se quiebran en pausa dramática y contornos de gran soledad.
  color_palette: Ocres dorados, azul seco, rojo acento dominante, marrones quemados y sombras violeta apagadas.
  lighting_setup: Luz dura de mediodía, rim cálido, contraluces crepusculares y sombras amplias que agrandan la distancia emocional.
  material_texture: Grano seco de cel clásico, polvo atmosférico, superficies gastadas, cuero estilizado y ruido cinematográfico cálido.
  render_quality: Acabado premium noventero que alterna slapstick, tensión ética y lirismo de largo alcance sin exigir props específicos.
  spatial_distortion: Horizontes enormes y encuadres comprimidos que convierten cualquier sujeto en figura solitaria ante una decisión moral.
  atmosphere: Bufonesca, compasiva, errante, melancólica.
  key_features: Rojo protagonista, polvo dorado, acting cómico-serio, líneas de distancia épica y contraste entre ternura y peligro.
  creative_brief: >-
    Aplica este preset como tratamiento abstracto de anime 90s: cualquier
    prompt debe ganar calidez polvorienta, humanidad contradictoria, humor
    frágil y melancolía ética sin quedar atado a una escena western.
