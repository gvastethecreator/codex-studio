visualDna:
  aesthetic: Chivalric vow iconography built around sacred verticality, heraldic gravitas, and devotional stillness rather than combat spectacle.
  form_and_line: Clean plate-armor contours, cape folds with weighted gravity, and emblem-first line emphasis to foreground lineage coding.
  color_palette: Brushed silver base, royal ultramarine fields, muted parchment neutrals, and amber liturgical highlights.
  lighting_setup: Filtered clerestory-style shafts with soft volumetric dust, preserving sanctified contrast on helm and gauntlet planes.
  material_texture: Mirror-polished yet worn steel, carved limestone relief, waxed fabric banners, and ceremonial leather straps.
  render_quality: Premium anime finish with emblem legibility, controlled bloom, and high tonal discipline around symbolic gestures.
  spatial_distortion: Monumental upward composition with columnar framing that magnifies oath posture and insignia readability.
  atmosphere: Reverence, obligation, and intergenerational burden accepted in silence.
  key_features: Oath-anchor weapon posture, heraldic motif centrality, chapel-scale geometry, and ritual light crowns.
  creative_brief: Define a reusable knightly-vow style by prioritizing heraldry, sacred vertical framing, and solemn material response that can transfer to any character or object.
