visualDna:
  aesthetic: Folkloric celestial horror where lunar omen iconography dominates scale, silhouette, and emotional tonality.
  form_and_line: Thin spectral contours, elongated drapery vectors, and stark silhouette cutouts against high-contrast sky masses.
  color_palette: Saturated blood-crimson sky field, void-black landforms, chalk-ash highlights, and desaturated bone undertones.
  lighting_setup: Strong backlit moon core with fog-driven edge bloom, keeping subjects semi-occluded and symbol-first.
  material_texture: Vapor-heavy mist layers, brittle branch textures, weathered cloth translucency, and powder-dry ground surfaces.
  render_quality: High-impact mythic readability with deliberate shape economy and controlled atmospheric granulation.
  spatial_distortion: Vast negative-space composition where scale disproportion makes figures appear cosmically overruled.
  atmosphere: Omen fatalism, ancestral unease, and sacred fear under an indifferent sky.
  key_features: Lunar disc dominance, suspended or hovering silhouettes, windless stillness, and barren horizon separators.
  creative_brief: Build a transferable crimson-omen horror style by privileging giant celestial contrast, sparse silhouettes, and fatalistic scale-imbalance composition.
