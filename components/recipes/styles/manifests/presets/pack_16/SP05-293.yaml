visualDna:
  aesthetic: Mitología rugosa de supervivencia compartida, con pulso feroz, espiritualidad gráfica y ternura bajo presión.
  form_and_line: Línea nerviosa, contornos irregulares, verticalidad agresiva y siluetas compactas en tensión.
  color_palette: Amarillos sucios de sodio, cianes de señal, rojos gastados de pigmento erosionado y sombras petroladas profundas.
  lighting_setup: Iluminación mixta contaminada, focos duros, brillos sucios y contraluces altos.
  material_texture: Chapa rugosa, piel pictórica descascarada, filamentos expuestos, superficie caliente y desgaste cotidiano.
  render_quality: Terminación premium de crudeza controlada con alta legibilidad espacial en caos multicapa.
  spatial_distortion: Perspectiva vertical laberíntica con compresión estrecha y saltos de altura que refuerzan dominio emocional.
  atmosphere: Áspera, sagrada, abarrotada, feral.
  key_features: Textura densa, tótems gráficos, verticalidad agresiva, energía instintiva y mezcla de ternura con amenaza.
  creative_brief: >-
    Crea una gramática reusable de mito rugoso para cualquier prompt o imagen de entrada:
    densidad, irregularidad y supervivencia compartida sin imponer callejones, azoteas, infancia ni ciudad literal.
