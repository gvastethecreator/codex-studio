  aesthetic: Heist glam nocturno de alta elegancia, con sofisticación ochentera, precisión coreográfica y tensión de infiltración.
  form_and_line: Línea estilizada de figura felina, poses de infiltración milimétrica y coreografía silenciosa táctica.
  color_palette: Rojos icónicos, negros cerrados, dorados de lujo y blancos de spotlight.
  lighting_setup: Conos de luz de seguridad, sombras planas marcadas y brillos reflectivos para tensión furtiva.
  material_texture: Piedra pulida, vidrio reflectivo, cuero técnico y grano analógico de serie nocturna retro.
  render_quality: Acabado premium de thriller elegante con legibilidad de movimiento furtivo y glamour controlado.
  spatial_distortion: Espacio abstracto con perspectiva profunda y capas de vigilancia que tensionan el vector de salida.
  atmosphere: Astuta, elegante, nocturna, glamurosa.
  key_features: Rojo acento, lujo reflejado, ballet criminal abstracto, siluetas elegantes y precisión estratégica.
