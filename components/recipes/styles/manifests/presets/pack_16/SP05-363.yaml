visualDna:
  aesthetic: Sincronía aérea de conjunto, ritmo corporal, control muscular y confianza grupal.
  form_and_line: Extensiones limpias de columna y piernas, arcos de salto coordinados y timing gestual colectivo.
  color_palette: Azules y blancos limpios, acentos naranja de energía y fondos cálidos de competencia.
  lighting_setup: Luz homogénea con realce en fase aérea y sombra suave bajo la suspensión.
  material_texture: Rebote granular, textil elástico técnico, agarre ligero y superficie pulida.
  render_quality: Frame deportivo de alta nitidez con legibilidad de sincronía, altura y aterrizaje.
  spatial_distortion: Foreshortening vertical moderado para enfatizar suspensión grupal y alineación de figuras.
  atmosphere: Ligera, esperanzadora, sincronizada y vibrante.
  key_features: Poses midair en espejo, lectura de conteo, extensión corporal y calor competitivo.
  creative_brief: >-
    Construye una gramática reusable de vuelo sincronizado para cualquier prompt o imagen de entrada:
    conteo, extensión y confianza grupal sin imponer gimnasia, club escolar, equipo masculino ni rutina.
