visualDna:
  aesthetic: Tennis de duelo estilizado orientado a baseline control, saque de efecto y presión de torneo.
  form_and_line: Arcos de swing marcados, postura de split-step precisa y acting de rivalidad frontal.
  color_palette: Azules de indoor-court, blancos técnicos y acentos cromáticos por jugador para lectura de matchup.
  lighting_setup: Iluminación indoor contrastada con focos en impacto de raqueta y zona de bote.
  material_texture: Superficie acrílica de cancha, cuerda de raqueta tensa, pelota con fuzz visible y textil de alto rendimiento.
  render_quality: Frame deportivo de alta teatralidad con claridad de punto, ventaja y respuesta.
  spatial_distortion: Foreshortening en servicio y compresión de fondo de pista para enfatizar timing de devolución.
  atmosphere: Estilizada, intensa, juvenil y dramática.
  key_features: Arco de saque, geometría de baseline, estela de golpe y framing de enfrentamiento frontal.
  creative_brief: >-
    Define una gramática reusable de baseline-showdown donde duelismo,
    trayectoria de bola y teatralidad de torneo sostengan una identidad
    transferible.
