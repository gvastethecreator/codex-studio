visualDna:
  aesthetic: Duelo deportivo estilizado, con control de línea, efecto especial abstracto y presión de torneo.
  form_and_line: Arcos de impacto marcados, postura de reacción precisa y acting de rivalidad frontal.
  color_palette: Azules interiores, blancos técnicos y acentos cromáticos por fuerza opuesta.
  lighting_setup: Iluminación indoor contrastada con focos en impacto gráfico y zona de respuesta.
  material_texture: Superficie sintética, tensión lineal sugerida, ruido de impacto y textil de alto rendimiento.
  render_quality: Frame deportivo de alta teatralidad con claridad de punto emocional, ventaja y respuesta.
  spatial_distortion: Foreshortening de impacto y compresión de fondo para enfatizar timing de devolución.
  atmosphere: Estilizada, intensa, juvenil y dramática.
  key_features: Arco de impacto, geometría de línea, estela de golpe y framing de enfrentamiento frontal.
  creative_brief: >-
    Define una gramática reusable de duelo deportivo teatral para cualquier prompt o imagen de entrada:
    trayectoria, efecto y rivalidad frontal sin imponer tennis, baseline, raquetas, pelota ni cancha.
