visualDna:
  aesthetic: Comedia de pertenencia juvenil en escalada shonen, con heráldica pop, rito de compromiso y energía de clan.
  form_and_line: Línea digital expresiva, poses grupales asimétricas y transición visual de gag cotidiano a solemnidad heroica.
  color_palette: Primarios intensos de acción 2000s, negros ceremoniales, blancos limpios y acentos fuego para activación emocional.
  lighting_setup: Highlights pulidos de comedia, contraste medio de ceremonia y rim energético en símbolos de pertenencia.
  material_texture: Tela formal, emblemas gráficos, metal pulido pequeño y compositing digital limpio con grano mínimo.
  render_quality: Acabado premium de shonen mafioso con lectura clara de jerarquía de clan y evolución de tono.
  spatial_distortion: Encuadres de juramento grupal, diagonales de escalada y profundidad comprimida hacia símbolo central.
  atmosphere: Ruidosa, cómica, leal, incendiaria.
  key_features: Motivos heráldicos, mentoría excéntrica sugerida, activación circular y contraste gag-solemnidad en escalada.
  creative_brief: >-
    Define una gramática reusable de clan-comedy-escalation para cualquier
    sujeto: pertenencia juvenil, rito pop, jerarquía afectiva y acción de
    compromiso sin imponer escuela, mafia, trajes, anillos, mentores, clanes
    literales ni duelos.
