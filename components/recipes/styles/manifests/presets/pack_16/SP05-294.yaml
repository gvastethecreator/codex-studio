visualDna:
  aesthetic: Psicodelia de reinvención radical con lógica mutante de estilos, donde la imagen cambia de piel como motor narrativo principal.
  form_and_line: Hibridación de trazo caricatural, anatomía distorsionada y fragmentos gráficos que alternan registro cómico y existencial.
  color_palette: Saturaciones altas en magenta, cian, naranja ácido y negros de corte abrupto para choques perceptivos deliberados.
  lighting_setup: Iluminación no naturalista, flashes de transición y bloques de luz plana que marcan saltos de estado mental.
  material_texture: Collage gráfico, pinceladas abruptas, manchas digitales y capas visuales de apariencia heterogénea intencional.
  render_quality: Acabado premium de caos controlado, con claridad de ritmo interno pese a la ruptura constante de lenguaje visual.
  spatial_distortion: Espacio elástico con deformaciones súbitas, cámaras imposibles y continuidad quebrada orientada a vértigo liberador.
  atmosphere: Liberadora, delirante, brillante, cinética.
  key_features: Estallidos mixed-media, transiciones violentas, corporalidad en fuga y semántica de renacimiento por velocidad.
  creative_brief: Construye una gramática reusable de mutación psicodélica para cualquier sujeto, combinando colisión de estilos, distorsión espacial y energía de escape continuo.
