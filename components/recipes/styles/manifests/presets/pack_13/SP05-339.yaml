visualDna:
  aesthetic: >-
    Suspense adulto de realismo contenido, donde microexpresiones y presión moral dominan el
    encuadre.
  form_and_line: >-
    Contorno medido, detalle facial naturalista y marcas expresivas mínimas de alta intención
    dramática.
  color_palette: Muted khaki, asphalt grey, skin-warm taupe, office white, rainy blue, burgundy accent
  lighting_setup: Fluorescencia práctica, luz lluviosa y sombras tipo interrogatorio en baja saturación.
  material_texture: Tejido sobrio, papel de expediente, haze de humo, vidrio moteado por lluvia y muros vividos.
  render_quality: Dramaturgia de close-up sobrio con legibilidad psicológica y tensión procedural sostenida.
  spatial_distortion: >-
    Natural adult proportions, camera-close tension framing, realistic perspective, and
    stillness-driven composition
  atmosphere: Tensa, humana y terrenal, con inquietud ética persistente.
  key_features: >-
    Adult microgesture tension, restrained realism, procedural backgrounds, moral pressure,
    almost-still pacing, and unsentimental focus
  creative_brief: >-
    Use Naoki Urasawa as style anchor for adult suspense microgesture. Any prompt should hold
    tension through tiny shifts, grounded space, and moral pressure. Offices, files, smoke, cities,
    detectives, human close-ups, and crime scenes are optional.
avoidRules:
  - action spectacle
  - bright comedy palette
  - cute chibi design
  - glossy fantasy armor
  - neon cyberpunk glow
  - melodramatic speed lines
  - plastic 3d render
