visualDna:
  aesthetic: >-
    Everyday-care anime intimacy where responsibility, patience, small practical rituals, and sincere
    tenderness carry emotional weight
  subject_treatment: >-
    Close relational spacing, softened posture arcs, careful hand gestures, and uncluttered composition around
    acts of care
  color_and_tone: Cotton cream, soft beige, lunchbox red, mild navy, warm skin peach, and pale morning blue
  lighting_and_shadow: >-
    Gentle domestic daylight, soft practical warmth, low-contrast fill, and small highlight accents on useful
    objects
  texture_and_material: >-
    Cotton softness, worn surfaces, small utility plastics, cloth wraps, paper textures, and handled everyday
    tactility
  camera_and_composition: Close framing compression that turns any subject into a quiet care ritual
  atmosphere_and_mood: Tender, patient, domestic, soft, responsible
  rendering_and_quality: Intimate anime finish with sincere emotional clarity, routine detail fidelity, and low-melodrama restraint
  key_features: Caregiving gestures, small practical details, patient pauses, close spacing, and emotional sincerity
  creative_brief: >-
    Use Usagi Drop as style anchor for everyday-care gesture intimacy. Apply patient hand placement, soft
    practical light, close responsibility, and small-use textures to any prompt. Apartments, lunches, school
    items, and parent-child scenes are optional.
