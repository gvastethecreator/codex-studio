visualDna:
  aesthetic: Folklore yokai de desfile nocturno con extrañeza documental, humor seco y familiaridad inquietante.
  form_and_line: Contorno de brocha vernácula, detalle de criatura contundente y bordes difuminados tipo tinta lavada.
  color_palette: Sumi black, lantern orange, moss green, moon grey, mud brown, ghostly cyan
  lighting_setup: Doble fuente linterna-luna, negativos oscuros de tinta y niebla rural de baja saturación.
  material_texture: Sangrado de pincel, papel washi, tierra húmeda y veta de madera con musgo.
  render_quality: Ilustración yokai de gran legibilidad taxonómica y tono nocturno narrativo contenido.
  spatial_distortion: Odd spirit anatomy, procession depth, deadpan human-scale contrast, uncanny silhouette spacing
  atmosphere: Folclórica, eerie y nocturna, con ironía tranquila ante lo sobrenatural.
  key_features: Siluetas de parada yokai, fondo campestre nocturno, glow de linterna y staging pseudo-documental.
  creative_brief: >-
    Define una gramática yokai-parade transferible basada en trazo de tinta,
    nocturnidad rural y catalogación deadpan de espíritus grotescos sin caer
    en terror explícito ni caricatura vacía.
