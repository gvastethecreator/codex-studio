visualDna:
  aesthetic: >-
    Folklore ink nocturno con extrañeza documental, humor seco, grotesco amable y familiaridad
    inquietante.
  form_and_line: >-
    Contorno de brocha vernácula, detalle de criatura contundente y bordes difuminados tipo tinta
    lavada.
  color_palette: Sumi black, lantern orange, moss green, moon grey, mud brown, ghostly cyan
  lighting_setup: Doble fuente linterna-luna, negativos oscuros de tinta y niebla rural de baja saturación.
  material_texture: Sangrado de pincel, papel washi, tierra húmeda y veta de madera con musgo.
  render_quality: Ilustración yokai de gran legibilidad taxonómica y tono nocturno narrativo contenido.
  spatial_distortion: >-
    Odd spirit-like anatomy, procession depth, deadpan scale contrast, and uncanny silhouette
    spacing
  atmosphere: Folclórica, eerie y nocturna, con ironía tranquila ante lo sobrenatural.
  key_features: >-
    Earthy nocturnal ink, deadpan catalog framing, friendly grotesque silhouettes, dry humor, and
    pseudo-documentary oddity
  creative_brief: >-
    Use Shigeru Mizuki as style anchor for folkloric deadpan ink catalog. Any prompt should feel
    archived from strange folklore: earthy ink, dry humor, nocturnal calm, and friendly grotesque
    logic. Yokai, parades, fields, lanterns, witnesses, and story scenes are optional.
avoidRules:
  - glossy digital polish
  - photoreal creature rendering
  - clean modern fantasy UI
  - neon sci-fi palette
  - cute mascot simplification
  - empty flat background
