  defaultImage: /assets/recipes/styles/defaults/SP05-330.webp
attributes:
  negativePrompt: >-
    glossy digital polish, photoreal creature rendering, clean modern fantasy UI, neon sci-fi
    palette, cute mascot simplification, empty flat background
