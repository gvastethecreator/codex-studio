  color_palette: Clouded blue-grays, damp green undertones, warm beige interior neutrals, and muted skin tones with low-saturation harmony
  lighting_setup: Overcast ambient key, window reflection accents, diffuse interior fill, and gentle value rolloff for calm tonal continuity
  material_texture: Raindrop-on-glass diffusion, soft knit and cotton fabrics, matte wood furniture planes, and low-gloss indoor surfaces
  render_quality: Cinematic everyday anime finish with emotional subtlety, high readability, and controlled detail density
  spatial_distortion: Medium-close compositional intimacy with shallow depth emphasis and minimal perspective exaggeration
  atmosphere: Quiet, reflective, tender, and human-scale
