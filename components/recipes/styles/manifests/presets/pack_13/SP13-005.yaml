visualDna:
  aesthetic: >-
    Intimate slice-of-life anime language with rainy-day melancholy, grounded everyday realism, and restrained
    emotional dramaturgy
  subject_treatment: >-
    Soft contour cadence, naturalistic anatomy simplification, subtle gesture-driven acting lines, and
    low-noise framing hierarchy
  color_and_tone: >-
    Clouded blue-grays, damp green undertones, warm beige interior neutrals, and muted skin tones with
    low-saturation harmony
  lighting_and_shadow: >-
    Overcast ambient key, window reflection accents, diffuse interior fill, and gentle value rolloff for calm
    tonal continuity
  texture_and_material: Raindrop diffusion, soft knit and cotton fabrics, matte wood-like planes, and low-gloss everyday surfaces
  camera_and_composition: Medium-close compositional intimacy with shallow depth emphasis and minimal perspective exaggeration
  atmosphere_and_mood: Quiet, reflective, tender, and human-scale
  rendering_and_quality: Cinematic everyday anime finish with emotional subtlety, high readability, and controlled detail density
  key_features: >-
    Rain-laced glazing cues, understated micro-expression, everyday prop simplicity, and soft tonal
    transitions
  creative_brief: >-
    Use Rainy Slice of Life as style anchor for quiet melancholy: subdued overcast palette, intimate framing,
    and gesture-led emotion should transfer without requiring domestic interiors, windows, furniture, or a
    human drama scene.
