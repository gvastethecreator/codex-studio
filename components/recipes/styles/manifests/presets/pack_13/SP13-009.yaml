    Transformation silhouette lock, emblem-centric composition, prism-energy ring motifs, and sparkle-field
    rhythm control
  creative_brief: >-
    Use Magical Girl Prism Burst as style anchor for luminous transformation: emblem-led power staging,
    prismatic color harmony, and ribbon-plus-particle motion should transfer without requiring a magical girl,
    costume change, or character-centered ritual scene.
