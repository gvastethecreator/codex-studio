visualDna:
  aesthetic: >-
    Classic heroic-shonen cel language anchored in late-90s/2000s TV anime readability, optimistic adventure
    tonality, and emblematic subject-first clarity
  subject_treatment: >-
    Medium-weight contour hierarchy, clear exterior silhouette lines, selective interior simplification, and
    pose-forward shape design for instant card legibility
  color_and_tone: >-
    Warm primaries, sunrise oranges, sky blues, clean skin midtones, and restrained complementary accents for
    high emotional clarity
  lighting_and_shadow: >-
    Front-biased key with gentle warm rim, binary cel shadow stepping, and limited specular highlights to
    preserve traditional cel discipline
  texture_and_material: >-
    Light cel grain simulation, painted-background softness, controlled flat-fill transitions, and low-noise
    anime finish
  camera_and_composition: Moderate dynamic lensing with silhouette-priority composition and minimal context competition
  atmosphere_and_mood: Uplifting, determined, adventurous, and emotionally forward
  rendering_and_quality: >-
    Broadcast-grade cel anime polish with crisp line stability, stable color blocking, and premium key-visual
    readability at small sizes
  key_features: >-
    Heroic silhouette dominance, expressive focal line, two-step cel shading logic, warm dawn tonal bias, and
    iconic pose readability
  creative_brief: >-
    Use Cel Heroic Dawn as style anchor for optimistic classic-shonen energy: silhouette-led composition,
    disciplined cel-shadow layering, and warm dawn color momentum should transfer without requiring a hero
    archetype, adventure scene, or fixed character pose.
