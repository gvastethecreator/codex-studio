visualDna:
  aesthetic: >-
    Low-stakes otaku-banter anime flatness where conversational rhythm, tiny personality deltas, and
    comfortable repetition carry the image
  form_and_line: >-
    Relaxed everyday contours, stable talk-circle composition, expression-over-action priority, and
    low-drama gesture pacing
  color_palette: >-
    Gentle indoor pastels, cream neutrals, mint accents, snack-warm highlights, and balanced
    low-contrast skin tones
  lighting_setup: >-
    Soft ambient fill, mild daylight wash, minimal dramatic shadow, and steady tonal consistency for
    dialogue-led viewing
  material_texture: >-
    Flat simple surfaces, soft textile hints, low-noise small details, and unobtrusive environmental
    supports
  render_quality: >-
    Dialogue-forward anime finish with crisp expression readability, consistent polish, and episodic
    comfort pacing
  spatial_distortion: >-
    Stable conversational framing, mild cute stylization, and clear line-of-sight geometry around
    any subject
  atmosphere: Casual, nerdy, witty, comfortable, low-pressure
  key_features: >-
    Banter pacing, low-contrast calm, tiny reaction shifts, talk-circle composition, and relaxed
    social continuity
  creative_brief: >-
    Use Lucky Star as style anchor for low-stakes banter flatness. Any prompt should feel
    conversational: clean flat colors, tiny timing changes, calm repetition, and personality
    microacting. Seated groups, snacks, classrooms, and living rooms are optional.
