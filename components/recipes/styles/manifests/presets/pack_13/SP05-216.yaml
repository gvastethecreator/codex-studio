    Bundled warmth-pocket anime where cold space makes comfort feel deliberate, tactile, and shared
    without requiring outdoors
  form_and_line: >-
    Practical silhouette clarity, rounded bundled shapes, circular warmth-flow composition, and
    compact comfort against wider cool fields
  color_palette: >-
    Winter blue, pine green, orange heat glow, canvas neutral, star indigo, fleece cream, and muted
    graphite
  lighting_setup: >-
    Warm practical key, cold ambient fill, tiny lantern points, crisp dawn diffusion, and soft
    thermal spill
  material_texture: >-
    Nylon weave, quilted padding, enamel gloss, worn metal, frosted particulate, insulated cloth,
    and soft vapor edges
  render_quality: >-
    Cozy cold-weather anime rendering with practical fidelity, tactile comfort, and restorative
    social calm
  spatial_distortion: >-
    Circular compression concentrates shared warmth while cooler negative space breathes around the
    subject
  atmosphere: Cozy, crisp, friendly, restorative, tactile
  key_features: >-
    Bundled contours, cold-warm contrast, warmth pockets, practical textile cues, crisp air, and
    quiet friendship light
  creative_brief: >-
    Use Laid-Back Camp as style anchor for bundled warmth pockets. Apply cold-blue fields, practical
    orange heat, padded texture, and calm shared comfort to any prompt. Campsites, stoves, tents,
    food, and flame scenes are optional.
