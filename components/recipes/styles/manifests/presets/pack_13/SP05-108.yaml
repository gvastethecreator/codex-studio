visualDna:
  aesthetic: Gentle watercolor-anime hybrid, illuminated-manuscript borders, floating flower petals on every frame, soft-focus dream sequences, shoujo fantasy at its most tender, children's-book warmth with anime expressiveness, Sugar Sugar Rune sweetness, Cardcaptor Sakura sparkle
  form_and_line: Delicate hair-thin ink, scrollwork ornamental contours, lace-pattern borders, heart-motif motion lines
  color_palette: Cotton-candy pink, buttercream yellow, lavender mist, robin-egg blue, mint-cream green, pearl-white shimmer, rose-quartz everything
  lighting_setup: Soft diffused heavenly glow, bokeh fairy-light scatter, gentle dappled sunbeams, enchanted-morning radiance
  material_texture: Watercolor paper grain, gold-foil stamping, lace-fabric overlay, sugar-spun thread texture, petal-soft surface
  render_quality: Fairy-tale anime frame, children's-book elegance, shoujo-sparkle rendering, picture-book warmth
  spatial_distortion: Floral-frame compositions, magical-girl transformation-space backgrounds, floating decorative elements
  atmosphere: Enchanting, gentle, sweet-natured, storybook magic, pure-hearted wonder
  key_features: Floating flower petals, sparkle-dust particles, lace-pattern borders, ribbon-framing devices, magical-transformation glow
  creative_brief: Petals drift through every frame like punctuation marks in a sentence written in sugar-spun thread and gold-foil light. The world is constructed from lullabies and lace borders, each character a wish given gentle outline and pastel breath. This is the visual language of believing in magic before anyone tells you to stop.
