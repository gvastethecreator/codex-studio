visualDna:
  aesthetic: >-
    Gentle watercolor-anime hybrid with illuminated-manuscript ornament, floating floral softness,
    dream-sequence bloom, tender shojo fantasy, and storybook warmth
  subject_treatment: Delicate hair-thin ink, scrollwork ornamental contours, lace-pattern borders, heart-motif motion lines
  color_and_tone: >-
    Cotton-candy pink, buttercream yellow, lavender mist, robin-egg blue, mint-cream green, pearl-white
    shimmer, rose-quartz everything
  lighting_and_shadow: >-
    Soft diffused heavenly glow, bokeh fairy-light scatter, gentle dappled sunbeams, enchanted-morning
    radiance
  texture_and_material: >-
    Watercolor paper grain, gold-foil stamping, lace-fabric overlay, sugar-spun thread texture, petal-soft
    surface
  camera_and_composition: >-
    Floral-frame composition, transformation-like abstract backdrops, floating decorative elements, and soft
    storybook depth
  atmosphere_and_mood: Enchanting, gentle, sweet-natured, storybook magic, pure-hearted wonder
  rendering_and_quality: Fairy-tale anime frame, children's-book elegance, shoujo-sparkle rendering, picture-book warmth
  key_features: >-
    Floating floral particles, sparkle dust, lace-pattern borders, ribbon-like framing devices,
    transformation-glow softness
  creative_brief: >-
    Use fairy-tale storybook anime as tender ornament grammar. Any prompt should gain pastel-lace framing,
    illuminated softness, floating decorative particles, and gentle shoujo fantasy glow. Princesses, forests,
    castles, or transformation scenes are optional.
