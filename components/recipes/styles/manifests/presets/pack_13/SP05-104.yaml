visualDna:
  aesthetic: Sparse economical anime minimalism, generous negative space, single-line expression logic, color-atmosphere fields, quiet indie pacing, and intentional emptiness
  form_and_line: Ultra-thin restrained ink lines, minimal contour economy, suggestion over statement, fewer strokes more impact
  color_palette: Single-hue atmospheres, sky-gradient minimalism, off-white expanses, one accent color per scene, monochrome restraint
  lighting_setup: Soft overcast diffusion, single-source quiet light, crepuscular rays, and ambient emptiness
  material_texture: Smooth digital matte, untextured simplicity, paper-white void, subtle grain whisper if any
  render_quality: Indie-anime minimalism, arthouse restraint, quiet-production beauty, less-is-more conviction
  spatial_distortion: Subject scale can shrink against vast empty fields, with loneliness-accenting framing and negative-space composition
  atmosphere: Quiet, introspective, profoundly lonely, meditative stillness, held breath
  key_features: Negative space dominance, minimalist line count, single-color atmospheres, scale humility, intentional silence
  creative_brief: >-
    Preserve minimalist-indie-quiet grammar as a reusable style system:
    negative-space dominance, sparse line economy, and low-saturation
    contemplative atmospheres should remain consistent across subjects.
