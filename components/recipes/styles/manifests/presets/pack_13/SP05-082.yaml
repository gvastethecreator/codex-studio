visualDna:
  aesthetic: >-
    Absurd anime timing system where calm mundane baseline snaps into surreal elastic impact, then
    returns to deadpan clarity
  form_and_line: >-
    Fast-switch contour elasticity, punchline silhouettes, reaction breakpoints, and deformation
    bursts held inside readable staging
  color_palette: >-
    Daily-life pastels, neutral soft bases, sudden saturation spikes, comic accent primaries, and
    clean pale backgrounds
  lighting_setup: Flat readable baseline with abrupt gag-apex highlight emphasis and minimal shadow complexity
  material_texture: >-
    Simplified everyday surfaces kept secondary to timing, with detail spikes only where the joke
    needs focus
  render_quality: >-
    High-clarity comedy anime finish optimized for reaction readability, elastic escalation, and
    immediate visual punchlines
  spatial_distortion: >-
    Rhythmic reality warps, perspective snaps, and scale exaggerations that land comedy without
    losing subject legibility
  atmosphere: Chaotic, witty, absurd, bright, hyper-alert
  key_features: >-
    Deadpan baseline, explosive deformation, elastic reaction faces, sudden scale jumps, and
    punchline-focused composition
  creative_brief: >-
    Use Nichijou as style anchor for deadpan-explosion timing. Any prompt can become a calm visual
    setup interrupted by impossible elastic comedy, sharp reaction beats, and sudden saturation
    spikes. School and classroom staging are optional.
