    Elegant CLAMP-inspired supernatural poise with impossible verticality, ornate geometry, moonlit
    glamour, and emotionally restrained luminous fashion logic
  form_and_line: >-
    Refined tapered contour, ornamental linework, graceful eyelash intricacy, and cathedral-tall
    silhouette construction
  color_palette: Pearl white, amethyst, midnight blue, rose quartz, icy silver, celestial lavender
  lighting_setup: Soft moon-rim illumination, jewel-like specular accents, staged dramatic glow
  material_texture: >-
    Silk sheen, gem sparkle, lace filigree, polished ribbon-like accents, and glossy highlight
    points
  render_quality: >-
    High-elegance fashion-fantasy rendering with precise silhouette hierarchy and jewel-toned
    compositional clarity
  spatial_distortion: >-
    Fashion-figure proportions, cathedral-tall silhouettes, and elegant extension of hands, necks,
    objects, or ornamental forms
  atmosphere: Elegant, lunar, poised, dramatic
  key_features: >-
    Extreme vertical elegance, ornate geometry, moonlit framing, jewel accents, poised emotional
    distance
  creative_brief: >-
    Use CLAMP as style anchor for celestial vertical ornament. Any prompt should stretch into poised
    verticality, moonlit geometry, jewel accents, and emotional distance. Human limbs, costumes,
    accessories, and fantasy figures are optional.
