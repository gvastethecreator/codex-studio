visualDna:
  aesthetic: Rough urban adolescence, scratchy linework, concrete poetry, drifting bikes and rooftops, holy and ugly city textures fused into emotional sketch energy
  form_and_line: Scratchy uneven contour, dry-ink scribble, architectural scrawl
  color_palette: Cement grey, faded blue, rust orange, dirty cream, bruised purple, asphalt black
  lighting_setup: Hazy urban daylight, sodium-vapor night bleed, flat overcast concrete gloom
  material_texture: Dry-brush grit, photocopy grain, rough wall scrape, cracked paint, pencil scuff
  render_quality: Peak-action anime frame, battle-animation showcase, shonen-sakuga excellence, impact-maximum rendering
  spatial_distortion: Loose body proportions, tilted urban perspective, sketched motion drift, uneven head-to-limb relationships
  atmosphere: Restless, rough, spiritual, urban
  key_features: Scratchy concrete textures, rooftop silhouettes, adolescent motion, rough city iconography, sacred-urban weirdness
  creative_brief: Concrete breathes through scratched lines as a bicycle carves meaning into the city rough skin. Rooftops become confessionals, alleyways become temples, and every scuff mark on the pavement is a prayer written in scuffed shoe rubber. The holy and the ugly share a cigarette on a fire escape, and the line between them was never drawn.
