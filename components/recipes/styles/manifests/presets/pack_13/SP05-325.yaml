visualDna:
  aesthetic: >-
    Rough concrete-poetry adolescence, scratchy linework, sacred-ugly texture, restless drift, and emotional
    sketch energy
  subject_treatment: Scratchy uneven contour, dry-ink scribble, architectural scrawl, and unstable proportion rhythm
  color_and_tone: Cement grey, faded blue, rust orange, dirty cream, bruised purple, asphalt black
  lighting_and_shadow: Hazy daylight, sodium-vapor night bleed, and flat overcast concrete gloom
  texture_and_material: Dry-brush grit, photocopy grain, rough wall scrape, cracked paint, pencil scuff
  camera_and_composition: Loose proportion logic, tilted perspective, sketched motion drift, and uneven scale relationships
  atmosphere_and_mood: Restless, rough, spiritual, urban
  rendering_and_quality: Gritty sketch-urban rendering with rough poetic abstraction and tactile city-line immediacy
  key_features: >-
    Scratchy concrete textures, tilted silhouettes, adolescent motion, rough civic iconography, sacred-ugly
    weirdness
  creative_brief: >-
    Use Taiyo Matsumoto as style anchor for scratchy concrete-poetry drift. Any prompt should feel rough,
    sacred-ugly, restless, dry-inked, and emotionally sketched. Bikes, rooftops, city streets, youth
    characters, and urban scenes are optional.
avoidRules:
  - clean glossy polish
  - perfect symmetry
  - sterile gradients
  - ultra-smooth linework
  - fantasy ornament overuse
