visualDna:
  aesthetic: >-
    Breezy reinvention anime where brush energy, summer looseness, comedy warmth, and self-repair make the
    image feel freshly restarted
  subject_treatment: >-
    Loose brushlike contours, breezy gesture arcs, occasional comedy deformation, and open spacing around acts
    of trying again
  color_and_tone: Sea-air blue, sunlit white, ink black, straw beige, watermelon red, and warm summer green
  lighting_and_shadow: Bright summer daylight, soft bounce, ink-emphasis contrast, and airy highlight wash
  texture_and_material: >-
    Brush ink drag, paper tooth, weathered wood, cotton texture, salty air haze, and handmade surface
    irregularity
  camera_and_composition: Open-air spacing and loose brush rhythm that imply reset and motion without locking place
  atmosphere_and_mood: Breezy, comic, sincere, summery, renewing
  rendering_and_quality: Breezy slice anime finish with brush-material fidelity, emotional comedy, and relaxed summer clarity
  key_features: Brush energy, summer air, self-reinvention tone, loose comedy, paper texture, and bright sincerity
  creative_brief: >-
    Use Barakamon as style anchor for breezy brush-reinvention. Any prompt should feel like a warm restart:
    ink drag, summer air, loosened posture, and comic sincerity. Islands, villages, children, fish markets,
    and calligraphy tools are optional.
