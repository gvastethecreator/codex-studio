visualDna:
  aesthetic: Urban anime-cyberpunk noir language with rain-soaked metropolitan layering, vigilant character framing, and high-chroma neon control
  form_and_line: Razor-edged silhouette cuts, angular urban framing lines, selective tech glyph details, and convergent street geometry for depth pressure
  color_palette: Dominant magenta-cyan duality, deep asphalt blacks, electric accent nodes, and cool metallic neutrals for structural balance
  lighting_setup: Back-biased neon rim systems, wet-surface reflection pooling, constrained bloom halos, and low-key fill preserving noir contrast
  material_texture: Wet asphalt specular streaks, satin metal paneling, rain-beaded glass, luminous signage diffusion, and damp fabric micro-sheen
  render_quality: High-contrast contemporary anime finish with cinematic night grading, clean edge discipline, and robust thumbnail readability
  spatial_distortion: Deep vanishing-point street compression with controlled perspective exaggeration and foreground-midground-background separation
  atmosphere: Tense, alert, nocturnal, technological, and atmospheric
  key_features: Neon channel reflections, rain-layer depth, vigilant stance framing, cyan-magenta contrast gating, and noir silhouette integrity
  creative_brief: >-
    Preserve cyberpunk-vigil style as a reusable grammar: neon-backed noir
    silhouettes, rain-reflective urban surfaces, and controlled high-contrast
    color tension should remain stable across subjects.
