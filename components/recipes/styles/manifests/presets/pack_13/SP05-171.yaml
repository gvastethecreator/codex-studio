visualDna:
  aesthetic: >-
    Arcane-chaos comedy anime language with loud spell theatrics, mercenary bravado, and high-tempo 90s
    fantasy irreverence abstracted into explosive color rhythm
  subject_treatment: >-
    Agile expressive linework with elastic comedic accents, flame-and-spell circle geometry, and reaction-shot
    exaggeration tuned for banter energy
  color_and_tone: >-
    Fire-cast oranges, sapphire spell blues, scorched umbers, pop-magenta highlight accents, and bright
    fantasy-sky contrasts
  lighting_and_shadow: >-
    Spell-burst key flashes, warm ember practicals, high-contrast cel cuts during impact beats, and comedic
    brightness resets between chaos peaks
  texture_and_material: Scorched matte surfaces, parchment-grain patterning, cel-grain overlays, and painted fantasy-depth wash
  camera_and_composition: Kinetic exaggeration and rapid perspective pushes that support slapstick-to-spell impact transitions
  atmosphere_and_mood: Comic, adventurous, fiery, rambunctious
  rendering_and_quality: >-
    Punchy 90s fantasy-comedy rendering with clear comedic timing readability, explosive magic grammar, and
    adventurous charm fidelity
  key_features: >-
    Spell-circle bursts, flame-color punctuation, comic reaction geometry, mischievous silhouette energy,
    fireball spectacle
  creative_brief: >-
    Detonate the input with arcane-chaos roadtrip energy: spell-circle bursts, fireball color punctuation,
    elastic comic reaction geometry, and mischievous fantasy bravado can turn any subject loud and
    rambunctious without requiring a party, wagon, tavern, or specific adventurer scene.
