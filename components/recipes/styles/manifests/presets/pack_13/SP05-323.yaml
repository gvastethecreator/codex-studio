  form_and_line: >-
    Clean beauty-line contours, glossy eyelash emphasis, accessory-like inking, and ribbon-sweep
    composition
  color_palette: Blush pink, moon white, navy velvet, gold sparkle, peach pearl, lavender gleam
  lighting_setup: Soft star-filter bloom, moonlit key light, cosmetic glow with sparkle flares
  material_texture: >-
    Glossy cosmetic highlights, satin ribbon sheen, enamel-like ornament detail, and pearl-shine
    glow
  render_quality: >-
    Romantic magical-girl rendering with polished fashion-beauty framing and sparkle-disciplined
    clarity
  spatial_distortion: >-
    Long flowing arcs, elongated eye-like focal shapes, floating ribbons, and graceful
    transformation posture cues
