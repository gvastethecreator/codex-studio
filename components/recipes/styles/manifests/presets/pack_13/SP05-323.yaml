visualDna:
  aesthetic: >-
    Shimmering moon-prism glamour with fashion-magazine grace, diary-heart tenderness, celestial romance, and
    polished transformation energy
  subject_treatment: Clean beauty-line contours, glossy eyelash emphasis, accessory-like inking, and ribbon-sweep composition
  color_and_tone: Blush pink, moon white, navy velvet, gold sparkle, peach pearl, lavender gleam
  lighting_and_shadow: Soft star-filter bloom, moonlit key light, cosmetic glow with sparkle flares
  texture_and_material: Glossy cosmetic highlights, satin ribbon sheen, enamel-like ornament detail, and pearl-shine glow
  camera_and_composition: >-
    Long flowing arcs, elongated eye-like focal shapes, floating ribbons, and graceful transformation posture
    cues
  atmosphere_and_mood: Romantic, sparkling, feminine, dreamy
  rendering_and_quality: Romantic magical-girl rendering with polished fashion-beauty framing and sparkle-disciplined clarity
  key_features: >-
    Prismatic sparkle, fashion rhythm, ribbonlike motion, gem-light accents, tender celestial framing, and
    polished shoujo glamour
  creative_brief: >-
    Use Naoko Takeuchi as style anchor for prism-glamour transformation polish. Any prompt should become
    luminous, romantic, fashion-clean, and jewel-bright. Magical girls, brooches, pose callouts, ribbons, and
    moon symbols are optional.
