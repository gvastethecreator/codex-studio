    Prismatic sparkle, fashion rhythm, ribbonlike motion, gem-light accents, tender celestial
    framing, and polished shoujo glamour
  creative_brief: >-
    Use Naoko Takeuchi as style anchor for prism-glamour transformation polish. Any prompt should
    become luminous, romantic, fashion-clean, and jewel-bright. Magical girls, brooches, pose
    callouts, ribbons, and moon symbols are optional.
