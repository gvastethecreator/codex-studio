  color_palette: Ink blue shadows, muted crimson accents, weathered stone beige, lantern amber highlights, and steel-gray reflective notes
  lighting_setup: Warm lantern practical pockets against cool dusk ambient, crossing hard shadow diagonals, and selective blade-edge rim accents
  material_texture: Rain-darkened stone paving, woven traditional textiles, polished yet worn steel surfaces, and fine mist particulate layers
  render_quality: Precision duel key-visual rendering with strong pose readability, restrained FX noise, and high emotional tension clarity
  spatial_distortion: Central vanishing-point street compression reinforcing confrontation symmetry and imminent-impact focus
  atmosphere: Honorable, silent, severe, and imminently explosive
  key_features: Two-silhouette opposition lock, rain-thread depth cues, katana highlight discipline, and lantern-shadow conflict lines
