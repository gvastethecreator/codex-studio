    Inspirational anime finish with atmospheric breadth, clean emotional propulsion, and practical readiness
    detail
  key_features: >-
    Sky-heavy optimism, forward motion, practical readiness, friendship momentum, bright horizon expansion,
    and sincere courage
  creative_brief: >-
    Use A Place Further Than the Universe as style anchor for horizon-forward youth momentum. Any prompt
    should feel ready to cross distance: bright air, forward pull, practical detail, and sincere courage.
    Uniforms, maps, gear, travel-prep, and expedition scenes are optional.
