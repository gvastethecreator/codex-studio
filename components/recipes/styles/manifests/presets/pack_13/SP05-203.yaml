    Forward-pull silhouettes, practical contour emphasis, ensemble momentum arcs, and horizon-expansion
    composition
  color_and_tone: Polar white, sky cyan, navy anchors, orange determination accents, sunlit peach, and clean ice-blue shadow
  lighting_and_shadow: Crisp travel-day daylight, high-albedo bounce, warm departure glow, and bright reveal highlights
  texture_and_material: >-
    Nylon utility, insulated fabric, paper fiber, frost-kissed surfaces, transit scuffs, and clean atmospheric
    grain
  camera_and_composition: Horizon expansion and forward perspective that amplify collective motion without requiring literal travel
  atmosphere_and_mood: Hopeful, brave, bright, uplifting, forward
