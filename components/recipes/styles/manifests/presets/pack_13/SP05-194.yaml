visualDna:
  aesthetic: >-
    Revolutionary-baroque shojo grammar combining court portrait grandeur, political tension undertones, and
    tragic romantic nobility
  subject_treatment: >-
    Ornate portrait silhouette hierarchy, martial-and-lace contour interplay, dramatic profile line emphasis,
    and ceremonial pose rigor
  color_and_tone: >-
    Powdered ivory, royal blue and wine-red authority tones, antique gold ornament, candle-amber highlights,
    and storm-gray dramatic shadows
  lighting_and_shadow: >-
    Chandelier-like and candle key light, painterly portrait falloff, velvet-shadow depth, and high-contrast
    edge illumination for dueling tensions
  texture_and_material: >-
    Brocade and lace detailing, polished metal reflections, powdered fabric softness, carved gilt-frame
    surfaces, and marble-like accents
  camera_and_composition: Court-stage perspective stretching to emphasize rank distance and impending upheaval tension
  atmosphere_and_mood: Regal, tragic, historic, operatic
  rendering_and_quality: >-
    Operatic classic-shojo rendering with aristocratic detail clarity, portrait-theatre composition, and
    high-emotion historical polish
  key_features: >-
    Baroque ornament, lace-and-martial contrast, court portrait poses, revolutionary tension, tear-bright
    dramatic gazes
  creative_brief: >-
    Ennoble the input with Versailles court revolution: powdered ivory, royal blue and wine-red authority,
    lace-versus-martial contour tension, candlelit portrait falloff, and operatic tragic gravity can transform
    any subject without requiring a palace, court figure, duel, or historical scene.
