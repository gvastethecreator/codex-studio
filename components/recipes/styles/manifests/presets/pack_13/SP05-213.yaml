visualDna:
  aesthetic: >-
    Shift-comedy anime warmth where ensemble banter, coordinated handoffs, practical service rhythm,
    and low-stakes workplace chaos become style
  form_and_line: >-
    Clear blocking lines, uniform-like silhouette contrast, fast reaction timing cues, handoff arcs,
    and choreographed movement paths
  color_palette: >-
    Diner cream, black-white anchors, menu red, amber practical glow, stainless highlights, and warm
    beige supports
  lighting_setup: >-
    Bright practical illumination, warm pass-through glow, evening comfort, and clean comic reaction
    spotlighting
  material_texture: >-
    Apron cloth, laminated sheen, ceramic gloss, counter smoothness, metal highlights, and handled
    work-surface wear
  render_quality: >-
    Workplace-comedy anime finish with rhythm-first readability, upbeat practicality, and ensemble
    timing clarity
  spatial_distortion: Quick-cut compression and reaction-scale pops supporting banter pace around any subject
  atmosphere: Cheery, busy, ensemble-driven, comfy, punchy
  key_features: >-
    Handoff choreography, coworker chemistry, practical warmth, service rhythm, comic reaction
    beats, and clear blocking
  creative_brief: >-
    Use Working!! as style anchor for shift-comedy choreography warmth. Any prompt should feel timed
    by handoffs, practical glow, and ensemble banter. Restaurants, counters, trays, aprons, and
    order scenes are optional.
