    Flowing calm contours, slow oval composition, airy spacing, and gentle handoff rhythm between
    foreground and reflected depth
  color_palette: Aqua blue, cream stone, soft sky lavender, warm sunset peach, pearl white, and muted teal shadow
  lighting_setup: High-diffusion sky glow, reflective underlight, low-contrast sparkle, and warm horizon softness
