visualDna:
  aesthetic: >-
    Art-deco anime fusion with geometric planes, faceted beauty, posterized color separation, theatrical
    composition, and shojo-classic elegance sharpened into abstraction
  subject_treatment: >-
    Precise geometric contour, ruler-straight ink lines, compass-circle precision, angular facet construction,
    and ornamental symmetry
  color_and_tone: >-
    Gold leaf, lapis lazuli blue, ruby red, emerald facet green, black enamel, geometric color-blocking,
    jewel-tone exclusivity
  lighting_and_shadow: Theatrical spotlight, dramatic shadow geometry, stage-light precision, jewel-refraction highlights
  texture_and_material: Metallic gold inlay, stained-glass segmentation, enamel gloss, faceted crystal surface, polished stone
  camera_and_composition: Subjects become faceted planes, angular fan-shapes, jewel-cut surfaces, and stylized depth layers
  atmosphere_and_mood: Grand, theatrical, elegant severity, crystalline beauty, staged perfection
  rendering_and_quality: >-
    Deco-styled anime frame, theatrical rendering, geometric-abstraction beauty, and crystalline visual
    precision
  key_features: >-
    Geometric fan shapes, faceted-jewel focal points, ruler-straight lines, stained-glass color separation,
    staged symmetry
  creative_brief: >-
    Use deco-geometric anime as faceted poster grammar. Any prompt should sharpen into ruler-straight
    contours, jewel planes, staged symmetry, and theatrical light separation. Architecture, fashion poses, or
    literal stained glass are optional.
avoidRules:
  - organic
  - round
  - soft
  - flowing
  - natural
  - irregular
  - curved
  - messy
  - sketchy
  - unplanned
