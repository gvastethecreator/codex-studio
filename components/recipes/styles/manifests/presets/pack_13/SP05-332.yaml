visualDna:
  aesthetic: Teatralidad alegórica de alta ceremonia, donde conflicto emocional se codifica en iconos, rosas, simetría ritual y cambios de escala.
  form_and_line: Contorno elegante simbólico, precisión ceremonial y ornamento lineal con flourishes operáticos.
  color_palette: Rose crimson, cathedral violet, candle gold, ivory, shadow navy, ceremonial black
  lighting_setup: Spot de escenario, contraluz ritual, glow simbólico teñido y oscuridad de telón dramático.
  material_texture: Terciopelo de cortina, pétalo suave, mármol satinado y velo de humo de vela.
  render_quality: Composición alegórica de alta legibilidad semiótica con densidad escénica controlada.
  spatial_distortion: Ceremonial symmetry, impossible stage transitions, allegorical scale changes, and posed ritual spacing
  atmosphere: Simbólica, intoxicante e inestable, con intensidad ritual adolescente.
  key_features: Rosas simbólicas, tránsito alegórico, espacio ritual abstracto y utilería emocional codificada.
  creative_brief: >-
    Define una gramática rose-altar reusable donde ceremonia teatral,
    iconografía recurrente y staging simbólico sustituyan realismo literal,
    sin exigir altar, tren, arena, duelo, uniforme o set teatral concreto.
