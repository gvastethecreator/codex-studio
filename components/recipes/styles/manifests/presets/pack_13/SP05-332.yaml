visualDna:
  aesthetic: >-
    Teatralidad alegórica de alta ceremonia, donde conflicto emocional se codifica en iconos, rosas,
    simetría ritual y cambios de escala.
  form_and_line: Contorno elegante simbólico, precisión ceremonial y ornamento lineal con flourishes operáticos.
  color_palette: Rose crimson, cathedral violet, candle gold, ivory, shadow navy, ceremonial black
  lighting_setup: Spot de escenario, contraluz ritual, glow simbólico teñido y oscuridad de telón dramático.
  material_texture: Terciopelo de cortina, pétalo suave, mármol satinado y velo de humo de vela.
  render_quality: Composición alegórica de alta legibilidad semiótica con densidad escénica controlada.
  spatial_distortion: >-
    Ceremonial symmetry, impossible stage transitions, allegorical scale changes, and posed ritual
    spacing
  atmosphere: Simbólica, intoxicante e inestable, con intensidad ritual adolescente.
  key_features: >-
    Symbolic repetition, ceremonial symmetry, coded props as abstract icons, emotional scale shifts,
    and theatrical ritual space
  creative_brief: >-
    Use Kunihiko Ikuhara as style anchor for ritual allegory icon systems. Any prompt should become
    symbolic, ceremonial, symmetrical, and emotionally coded. Roses, altars, trains, duels,
    uniforms, arenas, and literal theater sets are optional.
avoidRules:
  - literal realism
  - casual slice of life
  - unstyled modern room
  - flat documentary light
  - generic fantasy battle
  - low-symbolism composition
  - random prop clutter
