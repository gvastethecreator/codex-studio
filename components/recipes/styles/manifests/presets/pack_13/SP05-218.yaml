    Upward route-like composition, practical silhouette clarity, encouragement gestures, breathable spacing,
    and stepwise progression lines
  color_and_tone: High-altitude blue, pine green, sunlit ochre, gear neutral, rosy effort highlights, and bright cloud white
  lighting_and_shadow: Clear daylight, edge rim light, cool shadow fill, and reveal-like brightness for progress beats
  texture_and_material: Technical fabric, nylon strap tactility, rocky grit, bark texture, breathable knit, and dry air sparkle
  camera_and_composition: Elevation-gain perspective used as emotional progress, without requiring mountains or trails
