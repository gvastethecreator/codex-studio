visualDna:
  aesthetic: >-
    Incremental-ascent anime confidence where effort, crisp air, supportive rhythm, and small
    progress reveals make the image feel earned
  form_and_line: >-
    Upward route-like composition, practical silhouette clarity, encouragement gestures, breathable
    spacing, and stepwise progression lines
  color_palette: >-
    High-altitude blue, pine green, sunlit ochre, gear neutral, rosy effort highlights, and bright
    cloud white
  lighting_setup: Clear daylight, edge rim light, cool shadow fill, and reveal-like brightness for progress beats
  material_texture: >-
    Technical fabric, nylon strap tactility, rocky grit, bark texture, breathable knit, and dry air
    sparkle
  render_quality: >-
    Outdoor-hobby anime finish with clean clarity, uplifting progression tone, and sincere
    confidence-building warmth
  spatial_distortion: Elevation-gain perspective used as emotional progress, without requiring mountains or trails
  atmosphere: Fresh, supportive, scenic, uplifting, crisp
  key_features: >-
    Upward rhythm, incremental confidence, supportive gestures, crisp daylight, practical texture,
    and reveal lighting
  creative_brief: >-
    Use Yama no Susume as style anchor for incremental-ascent confidence light. Any prompt should
    feel like progress made visible: upward composition, fresh air, practical texture, and
    supportive brightness. Mountains, gear, trails, summits, and schoolgirls are optional.
