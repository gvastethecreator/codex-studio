visualDna:
  aesthetic: >-
    Beginner-made DIY anime glow where visible process, earnest imperfection, tactile construction,
    and optimistic collaboration become the style itself
  form_and_line: >-
    Handmade contour wobble, tool-path clarity, assembled-shape rhythm, cheerful gesture arcs, and
    process marks kept legible around any subject
  color_palette: >-
    Sanded wood beige, glue white, cloth pastel, mint hardware accents, pencil gray, and amber
    window warmth
  lighting_setup: Side daylight, dust-mote backlight, soft practical fill, and warm work-surface bounce
  material_texture: >-
    Sawdust particulate, unfinished timber grain, fabric scraps, tape edges, adhesive sheen,
    brush-painted surfaces, and scuffed craft material
  render_quality: >-
    Tactile anime rendering that favors process honesty, maker warmth, material readability, and
    charming nonindustrial imperfection
  spatial_distortion: >-
    Process-focused cropping, magnified handmade presence, and constructive diagonals that imply
    building without requiring tools
  atmosphere: Crafty, optimistic, tactile, sweet, constructive
  key_features: >-
    DIY material traces, beginner imperfection, warm process light, assembled contours, and
    collaborative making energy
  creative_brief: >-
    Use Do It Yourself!! as style anchor for beginner-made glow. Any prompt should feel physically
    made: taped edges, sawdust warmth, soft mistakes, constructive diagonals, and friendly process
    light. Clubs, workshops, tools, and specific objects are optional.
