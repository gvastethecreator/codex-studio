visualDna:
  aesthetic: >-
    Immaculate social-jitter anime comedy where pristine beauty, nervous silence, graphic restraint, and
    overpolite pressure define the image
  subject_treatment: >-
    Clean beauty contours, microexpression emphasis, large polite negative space, tidy pause panels, and
    controlled awkward body language
  color_and_tone: Polished white, navy anchors, soft blush, green-black contrast, warm skin highlights, and pale chalk dust
  lighting_and_shadow: >-
    Bright clean fill, reflective tidy surfaces, focused confession-like contrast, and blush-lit reaction
    beats
  texture_and_material: >-
    Chalk dust, pressed cloth planes, smooth paper, dry marker residue, immaculate polish, and faint surface
    grain
  camera_and_composition: Anxiety-POV tightening around expressions and empty graphic space rather than literal classroom geography
  atmosphere_and_mood: Shy, polished, funny, affectionate, tense
  rendering_and_quality: >-
    Polished social-comedy anime finish with high expression readability, elegant exaggeration, and precise
    awkwardness
  key_features: >-
    Pristine order, silent pressure, chalk-dust motifs, social-jitter beats, beauty-comedy contrast, and
    polite empty space
  creative_brief: >-
    Use Komi as style anchor for immaculate social-jitter comedy. Apply pristine contours, silent pressure,
    blush beats, and chalk-dust restraint to any prompt. Classrooms, chalkboards, school setup, and specific
    social scenes are optional.
