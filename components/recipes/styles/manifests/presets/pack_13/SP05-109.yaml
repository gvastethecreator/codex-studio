visualDna:
  aesthetic: Maximum-impact shonen battle, speed-lines tearing through every frame, impact-crater explosions, motion-blur afterimages, power-up aura distortions, shattered-panel manga energy, Dragon Ball combat clarity, One Piece impact scale, Jujutsu Kaisen fluidity, Mob Psycho paint-splash explosiveness
  form_and_line: Dense speed-line forests, impact-burst radial lines, action-smear tracers, after-image ghost contours, velocity-deformation edges
  color_palette: Battle-aura electric blue, impact-flash white, energy-blast yellow-to-white gradient, crater-smoke grey, motion-trail cyan, destruction orange
  lighting_setup: Explosive backlighting, power-up emission glow, impact-flash overexposure, dynamic key-shifting mid-frame
  material_texture: Kinetic-smear surface, speed-line density mapping, particle-burst scattering, dust-cloud volumetric texture
  render_quality: Peak-action anime frame, battle-animation showcase, shonen-sakuga excellence, impact-maximum rendering
  spatial_distortion: Foreshortened extreme perspectives, fist-to-camera depth compression, ground-shatter crater deformation, afterimage ghost trails
  atmosphere: Electric, explosive, adrenaline-maximum, battle-fever intensity, unstoppable momentum
  key_features: Speed-line forests, impact-burst radial marks, afterimage trails, power-up aura distortion, ground-shatter cracks
  creative_brief: The frame cannot contain what it holds — speed lines erupt outward like the page itself is screaming, impact bursts radiating from the point where fist meets impossibility. Motion becomes a character more vivid than any figure, a forest of kinetic marks through which bodies blur at the limit of what animation can capture.
