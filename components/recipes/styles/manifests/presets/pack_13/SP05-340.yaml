visualDna:
  aesthetic: >-
    Beauty-anime clásico de glamour pictórico, elegancia aristocrática y romanticismo maduro de
    tempo lento.
  form_and_line: >-
    Contorno rico en pestaña, precisión refinada y suavidad lineal orientada a presencia de alta
    clase.
  color_palette: Burgundy, ivory, smoky mauve, navy silk, gold trim, warm peach
  lighting_setup: Spot de retrato, sombra aterciopelada, rim glam y brillo pictórico en pómulo.
  material_texture: Cortinaje de terciopelo, sheen de cabello, detalle satinado en vestuario y suavidad old-cel.
  render_quality: Portrait frame de alto refinamiento con dramatismo elegante y foco en presencia emocional.
  spatial_distortion: >-
    Beauty-first proportions, swan-neck elegance cues, luxuriant framing, and noble silhouette
    emphasis
  atmosphere: Aterciopelada, madura y dramática, de confesión íntima ceremonial.
  key_features: >-
    Velvet texture, lash-heavy graphic elegance, aristocratic posture language, slow romantic
    pressure, and classic beauty-anime polish
  creative_brief: >-
    Use Akio Sugino as style anchor for velvet-lash refined tension. Any prompt should become
    elegant, luxurious, slow, and romantically pressurized. Human portraits, swan-neck poses,
    curtains, close-ups, and aristocratic scenes are optional.
