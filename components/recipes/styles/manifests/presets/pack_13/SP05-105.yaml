visualDna:
  aesthetic: >-
    Visible pencil underdrawing, messy eraser ghosts, rough animation paper grain, production-art roughness,
    keyframe with timing charts still visible, genga-level rawness, human-hand evidence everywhere, imperfect
    charm of pre-digital anime production
  subject_treatment: >-
    Pencil-textured contour, varying graphite pressure, smudge-softened edges, construction lines still
    visible, wobbly hand-drawn imperfection
  color_and_tone: >-
    Graphite grey, colored-pencil softness, pastel rough-fill, paint-swatch palette, marker-tone overlay,
    non-digital color irregularity
  lighting_and_shadow: No literal lighting implied, raw drawing-plane flatness, value created by pencil pressure not light logic
  texture_and_material: >-
    Animation paper tooth, graphite smudge trails, colored-pencil wax buildup, eraser-rubbed surface damage,
    peg-bar hole artifacts
  camera_and_composition: Sightly off-model proportions, frame-to-frame variation implied, organic asymmetry, hand-drawn wobble
  atmosphere_and_mood: Nostalgic, handmade, pre-digital soul, animation-desk intimacy, warm imperfection
  rendering_and_quality: >-
    Production-art roughness, genga-cel frame, pre-digital anime authenticity, rough animation drawing scan,
    human-touch warmth
  key_features: >-
    Pencil underdrawing visible, smudge marks, peg-bar registration holes, rough construction lines, colored
    pencil fill
  creative_brief: >-
    Use textured hand-drawn rough as visible-process grammar. Any prompt should show underdrawing, graphite
    tooth, eraser ghosts, imperfect line search, and human timing. Production marks are texture language, not
    required animation-sheet props.
avoidRules:
  - digital clean
  - vector smooth
  - perfect
  - polished
  - cel shaded
  - crisp
  - sharp
  - sterile
  - computer-generated
