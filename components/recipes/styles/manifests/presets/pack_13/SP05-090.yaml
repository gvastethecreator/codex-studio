  color_palette: Warm cream and peach neutrals, cherry-blossom pink accents, soft dusk violets, and muted nostalgia-washed highlights
  lighting_setup: Diffuse memory-like glow, soft interior practical warmth, gentle backlight halos, and low-contrast shadow treatment for emotional softness
  material_texture: Home textiles, polished wood traces, delicate floral particulate overlays, and slightly hazed atmosphere suggestive of recollection
  render_quality: Tearful high-clarity drama render with refined softness, expressive close-up fidelity, and cohesive sentimental grading
  spatial_distortion: Intimate close-to-medium framing with shallow depth and mild dreamy softness around emotional focal points
