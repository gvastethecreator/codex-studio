visualDna:
  aesthetic: >-
    Breeze-drift anime inertia where low energy, ambient friendship, sleepy elegance, and beautiful
    nothingness slow every visual decision
  form_and_line: >-
    Relaxed silhouettes, minimal expression marks, drifting contours, soft posture collapse, and
    broad airy negative space
  color_palette: Pale sky blue, soft gray, neutral cloth, spring green, light cream, and faint warm blush
  lighting_setup: >-
    Diffuse midday softness, sleepy ambient fill, gentle side light, and low-contrast illumination
    that lets pauses breathe
  material_texture: >-
    Light fabric drape, paper matte, faint worn surfaces, soft wind-ruffled texture, and dustlike
    air
  render_quality: >-
    Lethargic-comfort anime finish with airy minimalism, precise low-exertion comedy, and deliberate
    calm beauty
  spatial_distortion: Time-dilation framing stretches quiet pauses and ambient stillness across any subject
  atmosphere: Sleepy, gentle, airy, easygoing, elegant
  key_features: >-
    Low-energy posture, breeze effects, negative space, pause-centric timing, minimal exertion
    comedy, and soft light
  creative_brief: >-
    Use Tanaka-kun as style anchor for breeze-drift beautiful inertia. Apply slow pauses, airy
    negative space, relaxed silhouettes, and low-energy elegance to any prompt. Schools, benches,
    classrooms, and recline scenes are optional.
