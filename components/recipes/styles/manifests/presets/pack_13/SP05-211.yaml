visualDna:
  aesthetic: Super Cub title anchor translated into practical quietude, utilitarian independence, small-scale emotional expansion, and ordinary movement rendered with spare confidence
  form_and_line: Practical contour precision, restrained gesture linework, compact mechanical rhythm, and open-air compositional simplicity that can wrap any subject
  color_palette: Matte black anchors, cold morning blues, subdued neutral fields, rubber-gray shadows, and occasional warm sunset accents
  lighting_setup: Clear daylight restraint, overcast commuting softness, sparse golden-hour rim light, and low-drama highlights on functional surfaces
  material_texture: Matte metal, rubber grain, worn vinyl, asphalt-like grit, weathered utility surfaces, and wind-pressed fabric cues
  render_quality: Minimal mechanical-slice rendering with quiet freedom tone, functional fidelity, and calm emotional restraint
  spatial_distortion: Long-perspective taper and open negative space used as a freedom cue, not as a required road scene
  atmosphere: Minimal, freeing, quiet, clean
  key_features: Utilitarian silhouette discipline, sparse open-air framing, practical material detail, low-voice emotional expansion, subtle acting
  creative_brief: >-
    Use Super Cub as a style anchor for functional quietude: practical
    mechanical texture, spare open framing, and low-voice liberation should
    remain readable without requiring a bike, road, rider, or school setup.
