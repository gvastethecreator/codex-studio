visualDna:
  aesthetic: >-
    Practical quiet-freedom anime minimalism where utilitarian surfaces, spare independence, and
    ordinary motion create emotional expansion
  form_and_line: >-
    Precise functional contour, restrained gestures, compact mechanical rhythm, open-air negative
    space, and low-noise silhouette discipline
  color_palette: >-
    Matte black, cold morning blue, subdued neutrals, rubber gray, dry asphalt beige, and rare
    sunset amber
  lighting_setup: >-
    Clear daylight restraint, overcast commuter softness, sparse golden rim, and low-drama
    highlights on functional edges
  material_texture: >-
    Matte metal, rubber grain, worn vinyl, roadlike grit, utility fabric, and weathered practical
    surfaces
  render_quality: >-
    Minimal mechanical-slice finish with calm fidelity, functional texture, and low-voice emotional
    restraint
  spatial_distortion: >-
    Long negative-space taper and open perspective used as liberation cue without needing literal
    travel scenery
  atmosphere: Minimal, freeing, quiet, clean, self-possessed
  key_features: >-
    Utilitarian silhouettes, spare open framing, practical material detail, mechanical quietude, and
    subtle emotional expansion
  creative_brief: >-
    Use Super Cub as style anchor for utilitarian quiet freedom. Apply matte functional texture,
    spare open framing, restrained daylight, and small independence cues to any subject. Bikes,
    roads, riders, and school setups are optional.
avoidRules:
  - realistic
