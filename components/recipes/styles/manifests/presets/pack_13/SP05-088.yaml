    Soft comfort contours mixed with creature-adjacent exaggeration, scale-contrast blocking, and
    expressive ensemble interaction
  color_palette: >-
    Warm cream, wood brown, pastel comfort hues, vivid creature accents, magical cyan, and
    affectionate pink highlights
  lighting_setup: >-
    Cozy practicals, daylight fill, warm evening pools, and sudden magical spill highlights during
    interruption beats
  material_texture: >-
    Lived-in comfort surfaces, gentle gloss, textile softness, scale/wing-like abstract accents, and
    integrated magical shimmer
  render_quality: >-
    Heartwarming fantasy-comedy anime finish balancing routine detail, interruption energy, and
    readable affection
  spatial_distortion: >-
    Grounded comfort-space perspective with mild warps during magical or comedic escalation around
    any subject
