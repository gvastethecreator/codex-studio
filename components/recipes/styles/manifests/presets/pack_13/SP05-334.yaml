visualDna:
  aesthetic: Urgencia de storyboard en crudo, monocromo ansioso y catástrofe emocional codificada en anotaciones de producción.
  form_and_line: Contorno de lápiz nervioso, marcas técnicas densas, hatch urgente y soltura de boceto operacional.
  color_palette: Pencil grey, warning red, photocopy black, paper white, rust sepia, alarm orange
  lighting_setup: Spotlight conceptual duro, estallidos rojo-alarma y glare de material no finalizado.
  material_texture: Smudge de grafito, grano de fotocopia, pliegues de papel, bleed de marcador y líneas borradas de construcción.
  render_quality: Sketch-frame de emergencia con lectura táctica alta y energía preproducción apocalíptica.
  spatial_distortion: Storyboard panel shifts, emergency-angle perspective, rough dramatic framing, and note-margin compression
  atmosphere: Urgente, ansiosa y esquelética, al borde de colapso planificado.
  key_features: Paneles de storyboard, flechas de emergencia, notación técnica, ansiedad monocroma y framing explosivo.
  creative_brief: >-
    Define una gramática emergency-board reusable donde trazo incompleto,
    anotación visible y tensión de preproducción se conviertan en identidad sin
    exigir misil, desastre, mecha, cabina o panel narrativo específico.
