visualDna:
  aesthetic: Melodrama clásico de postcard-memory, con congelado emocional y glamour luminoso de alto voltaje romántico.
  form_and_line: Contorno clásico nítido, inking dramático cargado y acentos de brillo tipo estallido sentimental.
  color_palette: Sepia gold, crimson rose, cream white, royal blue, amber light, filmic mauve
  lighting_setup: Key teatral en spot, flares en highlight, glare de congelado y contraluz de escenario melodramático.
  material_texture: Grano fílmico suave, bloom cel, brillo aerografiado y tactilidad de papel postal.
  render_quality: Frame icónico de memoria dramática con composición concentrada y claridad de gesto emocional.
  spatial_distortion: Heroic freeze poses, diagonally framed bodies, symbolic overlay space, concentrated emotional composition
  atmosphere: Nostálgica, intensa y luminosa, suspendida en un instante absoluto.
  key_features: Freeze-frame postal, líneas de highlight dramático, overlays florales simbólicos y stare-down emocional.
  creative_brief: >-
    Construye una gramática postcard-freeze reusable donde el tiempo se detiene
    pero la emoción escala: brillo glam, símbolos florales y encuadre de
    melodrama deben sostener identidad sin escena fija.
