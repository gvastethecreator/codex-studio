visualDna:
  aesthetic: Golden-hour silhouette anime style with sky-dominant emotional storytelling, backlit contour poetry, and twilight longing through color
  form_and_line: Pure silhouette contour discipline, rim-lit hair-edge articulation, posture-led narrative shape language, minimal internal line intrusion
  color_palette: Blazing orange-magenta sunset cores, deep silhouette blacks, gold rim luminance, violet dusk transitions, cyan zenith remnants
  lighting_setup: Extreme backlight staging with flare halos, atmospheric diffusion, crepuscular beam accents, and overexposed solar edge treatment
  material_texture: Lens flare bloom strata, haze particulate depth, soft cloud gradient layering, subtle film-grain shadow structure
  render_quality: High-impact sunset silhouette rendering with cinematic sky scripting and emotionally readable negative-space composition
  spatial_distortion: Sky-first composition dominance with silhouette-anchor foregrounds and atmosphere-driven perceived depth expansion
  atmosphere: Nostalgic, bittersweet, romantic, tender, wistful
  key_features: Sky-as-narrator framing, pure silhouette dramaturgy, golden rim contour logic, flare-and-haze emotional depth
  creative_brief: >-
    Preserve identity through sky-led silhouette storytelling: emotional weight
    should emerge from backlight color scripts, posture contours, and atmospheric
    flare depth rather than specific rooftop or seaside scenes.
