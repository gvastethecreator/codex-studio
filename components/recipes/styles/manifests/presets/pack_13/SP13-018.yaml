visualDna:
  aesthetic: >-
    Lantern-summer slice-of-life anime language with flowing elegance, communal night warmth, and nostalgic
    romantic undercurrent
  subject_treatment: >-
    Soft flowing garment contours, gesture-led interaction rhythm, lantern-like cadence lines, and gentle
    layered silhouettes
  color_and_tone: >-
    Lantern amber-orange, deep indigo night fields, muted rose accents, and warm skin-light highlights
    balanced by cool shadows
  lighting_and_shadow: >-
    Warm lantern practical clusters, low-key night ambient fill, distant sparkle edge glints, and soft bokeh
    separation
  texture_and_material: Light cotton weave, washi lantern diffusion, lacquered wood surfaces, and humid summer-air haze
  camera_and_composition: Mid-depth perspective with layered lantern depth cues and stable subject readability in foreground
  atmosphere_and_mood: Nostalgic, joyful, tender, and gently wistful
  rendering_and_quality: >-
    Emotion-rich festival anime rendering with clear focal hierarchy, balanced crowd context, and polished
    readability
  key_features: >-
    Lantern-string cadence, flowing silhouette motifs, distant shimmer accents, and shared-gesture emotional
    anchors
  creative_brief: >-
    Use Festival Lantern Summer as style anchor for nostalgic night warmth: lantern practicals, indigo-night
    contrast, and gesture-centered tenderness should transfer without requiring festival stalls, yukata,
    fireworks, street, crowd, or summer-date scene.
