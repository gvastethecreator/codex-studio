visualDna:
  aesthetic: >-
    Observational mystery anime built from warm intellectual stillness, clue-forward attention,
    polished quiet, and suspended curiosity
  form_and_line: >-
    Precise quiet contours, object-attention framing, restrained eye-line geometry, and small
    inference cues embedded in composition
  color_palette: Tea amber, library brown, soft cream, muted green-black, pale window blue, and subtle gold dust
  lighting_setup: >-
    Warm lamplike pools, soft window fill, focused clue highlights, and low-contrast intellectual
    ambience
  material_texture: Paper fiber, polished wood, ceramic matte, dust motes, cloth grain, and clean glass reflections
  render_quality: >-
    Polished contemplative anime finish with high detail control, clue readability, and calm
    emotional restraint
  spatial_distortion: Still-life compression and attention tunnels that make any subject feel quietly investigated
  atmosphere: Curious, calm, warm, observant, restrained
  key_features: >-
    Clue-focused framing, tea-light warmth, observational stillness, precise microgestures, and
    intellectual hush
  creative_brief: >-
    Use Hyouka as style anchor for tea-light observational mystery. Any prompt should feel gently
    investigated: warm focus pools, clue hierarchy, stillness, and polished curiosity. Classrooms,
    books, clubrooms, and tea props are optional.
