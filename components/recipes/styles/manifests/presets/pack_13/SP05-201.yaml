visualDna:
  aesthetic: Quiet mystery anime language where low-drama deduction becomes beautiful through light, stillness, and curiosity carrying the frame
  form_and_line: Deliberate observational line economy, eye-acting emphasis, and tidy contour hierarchy that supports deduction readability
  color_palette: Tea amber, worn-paper cream, polished wood browns, uniform navy, and late-afternoon honey highlights
  lighting_setup: Afternoon slat light, amber pockets, and soft suspended dust-glow in still tonal fields
  material_texture: Matte dark surfaces, bookcloth wear, ceramic glaze, varnished grain, and aged patina cues
  render_quality: Refined quiet-mystery rendering with disciplined stillness and high prop-legibility balance
  spatial_distortion: Subtle viewpoint tightening around clue-like focal points and gaze vectors
  atmosphere: Curious, refined, calm, observant
  key_features: Attentive facial acting, sunlit dust motes, clue-forward focus, tea-amber warmth, and restrained mystery framing
  creative_brief: >-
    Use the title as a style anchor for tea-light mystery. Keep observational
    stillness, clue-forward focus, and warm intellectual ambience without
    requiring classroom, clubroom, books, or tea props.
