visualDna:
  aesthetic: >-
    Horror manga clásico de pánico espiral, con teatralidad de alto contraste y neurosis gráfica
    corrosiva.
  form_and_line: >-
    Contorno dentado, masas negras contundentes y densidad chillante de stress-lines alrededor del
    foco.
  color_palette: Bone white, pitch black, dried blood red, sickly mint, corpse blue, bruise violet
  lighting_setup: Spotlight hostil, negativos profundos y sobreexposición de formas en estado de shock.
  material_texture: >-
    Negro de tinta saturado, screentone rasposo, diente de papel y sombreado áspero de pesadilla
    impresa.
  render_quality: Terror gráfico de lectura inmediata, con composición de crisis y contraste brutal.
  spatial_distortion: >-
    Wide scream-like apertures, bulging eye-like focal shapes, warped depth corridors, and
    panic-twisted posture
  atmosphere: Histérica, uncanny y retro, con amenaza infantil deformada.
  key_features: >-
    Spiral panic geometry, severe black-white contrast, striated fear patterns, theatrical
    expression pressure, and corrosive manga texture
  creative_brief: >-
    Use Kazuo Umezz as style anchor for spiral panic engraving. Any prompt should be trapped by
    graphic fear geometry, high-contrast pressure, and obsessive line pattern. Human faces, screams,
    hallways, victims, and chase scenes are optional.
