visualDna:
  aesthetic: Naturalismo humano silencioso centrado en microgesto cotidiano, peso corporal creíble y ternura observacional anti-espectáculo.
  form_and_line: Contorno natural discreto, estilización mínima y claridad en gesto funcional de vida diaria.
  color_palette: Soft beige, denim blue, skin-warm peach, kitchen white, rainy grey, muted green
  lighting_setup: Luz de ventana natural, rebote interior moderado, suavidad nublada y prácticos domésticos de escala humana.
  material_texture: Algodón usado, superficies de cocina vividas, roces de suelo, calidez de piel y difusión en vidrio lluvioso.
  render_quality: Realismo animado íntimo con temporalidad pausada y lectura fina de comportamiento humano.
  spatial_distortion: Believable anatomy, restrained perspective, human-scale room depth, natural gait and gesture
  atmosphere: Íntima, modesta y arraigada, con gravedad emocional cotidiana.
  key_features: Body language observada, interiores habitados, peso postural natural y timing gestual realista.
  creative_brief: >-
    Construye una gramática quiet-human reusable donde microgesto, iluminación
    doméstica y materialidad vivida transmitan emoción sin subrayado ni
    espectacularidad externa.
