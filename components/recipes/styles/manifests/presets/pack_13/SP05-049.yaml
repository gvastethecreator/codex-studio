visualDna:
  aesthetic: >-
    Velvet gothic shojo romance built from nocturnal longing, lace-like delicacy, moonlit secrecy, forbidden
    elegance, and melancholy ornament
  subject_treatment: >-
    Delicate romance linework, fine hair-thin strokes, graceful flowing contours, soft eyelash detail, and
    gothic vertical accenting
  color_and_tone: >-
    Deep velvet blacks, moonlit silvers, wine-red accents, pearl skin glow, faded rose tones, and muted violet
    shadows
  lighting_and_shadow: >-
    Soft bloom, moon-rim light, candle-warm accent points, diffuse romantic glow, and luminous halation inside
    dark value fields
  texture_and_material: Velvet softness, lace textures, silk sheen, mahogany-like polish, petal softness, and chiffon translucency
  camera_and_composition: >-
    Graceful elongated proportions, corridor-like depth compression as optional mood, fashion elegance, and
    romantic silhouette styling
  atmosphere_and_mood: Gothic, yearning, mysterious, melancholic
  rendering_and_quality: >-
    Luminous gothic-romance frame with ethereal bloom, soft-focus beauty, dark-value control, and dreamy
    chromatic softness
  key_features: >-
    Nocturnal longing, velvet-lace materiality, moon-silver contrast, gothic romantic restraint, expressive
    eye detail
  creative_brief: >-
    Use the gothic academy title as a style anchor for nocturnal shojo longing: velvet darkness, lace
    delicacy, and forbidden romantic pressure should transfer without requiring school, corridors, lake,
    furniture, gardens, or libraries.
