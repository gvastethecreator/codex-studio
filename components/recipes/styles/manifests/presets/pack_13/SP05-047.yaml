visualDna:
  aesthetic: >-
    Airy first-love tenderness built from soft blushes, distance-closing glances, innocent hesitation,
    springlike pacing, and emotional near-miss clarity
  subject_treatment: >-
    Delicate romance linework, fine hair-thin strokes, graceful flowing contours, soft eyelash detail, and
    breath-held gesture arcs
  color_and_tone: Pale pinks, soft florals, pearl luminosity, clean cream fields, and barely-there green-blue freshness
  lighting_and_shadow: >-
    Soft bloom, gentle rim light, butterfly portrait lighting, diffuse romantic glow, and luminous halation
    around hesitant emotion
  texture_and_material: >-
    Airy fabrics, ribbon-like motion cues, soft paper grain, silk sheen, delicate lace texture, and chiffon
    translucency
  camera_and_composition: >-
    Graceful elongated proportions, shallow emotional depth, suspended-time spacing, and romantic silhouette
    styling
  atmosphere_and_mood: Gentle, hopeful, innocent, sweet
  rendering_and_quality: >-
    Luminous romance-anime frame with ethereal bloom, soft-focus beauty, clean expression readability, and
    dreamy chromatic softness
  key_features: >-
    Blush-soft emotional timing, tender micro-expressions, hesitant proximity, pastel restraint, heartfelt
    gesture language
  creative_brief: >-
    Keep the first-love title as a style anchor for soft romantic hesitation: blush-light, suspended pacing,
    and gentle near-contact should stay readable without requiring school, classroom, cherry blossoms,
    stairwells, or confession scenes.
