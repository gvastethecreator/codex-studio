  color_palette: Burgundy wine reds, abyssal blacks, oxidized silver accents, deep violet shadows, and candle-amber warmth
  lighting_setup: Candle-like key pools against heavy ambient darkness, selective rim highlights on edges, and controlled chiaroscuro depth layering
  material_texture: Crushed velvet drape, polished marble-like planes, aged wrought metal ornament, satin sheen, and carved dark-wood detail
  render_quality: High-polish gothic anime rendering with luxurious material separation, elegant contrast control, and premium nocturnal readability
  spatial_distortion: Theatrical depth recession through baroque diagonals, arch-like frames, and staged shadow anchors
