  lighting_setup: Candelabra key pools against heavy ambient darkness, selective rim highlights on costume edges, and controlled chiaroscuro depth layering
  material_texture: Crushed velvet drape, polished marble floors, aged wrought metal ornament, satin cape sheen, and carved wood architectural detailing
  render_quality: High-polish gothic anime rendering with luxurious material separation, elegant contrast control, and premium nocturnal readability
