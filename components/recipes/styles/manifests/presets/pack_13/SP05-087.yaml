visualDna:
  aesthetic: >-
    Pastoral breathing-room anime stillness where spacious quiet, tiny rituals, seasonal air, and
    childlike softness slow the image down
  form_and_line: >-
    Low-tension contours, simplified gentle gestures, open negative-space framing, and minimal
    dramatic pose pressure
  color_palette: >-
    Sunlit green, sky soft blue, straw beige, warm wood, muted earth, and low-contrast pastel
    accents
  lighting_setup: Broad afternoon wash, cicada-hour warmth, soft sky fill, and long low-drama shadow planes
  material_texture: >-
    Grass softness, wood grain, paper matte, cotton fabric, dust motes, and lightly weathered rural
    tactility
  render_quality: >-
    Slow-life anime finish with clean open readability, warm nostalgia, and quiet everyday
    tenderness
  spatial_distortion: >-
    Large breathing-room spacing, gentle horizon calm, and tiny subject emphasis without forcing
    landscape content
  atmosphere: Quiet, nostalgic, spacious, tender, sun-warmed
  key_features: >-
    Open negative space, tiny ritual focus, summer-air softness, childlike gesture economy, and
    pastoral tonal calm
  creative_brief: >-
    Use Non Non Biyori as style anchor for pastoral breathing-room stillness. Any prompt should gain
    spacious air, tiny ritual attention, sunlit softness, and low-pressure nostalgia. Rural roads,
    schools, bus stops, and countryside scenes are optional.
