visualDna:
  aesthetic: >-
    Cheerful romantic-comedy elasticity with instantly readable silhouettes, slapstick chaos,
    affection-argument rhythm, and buoyant cartoon clarity
  subject_treatment: Clean efficient contour, lively expression marks, simple comedic exaggeration
  color_and_tone: Candy red, sky blue, warm peach, clean black, sunny yellow, pond green
  lighting_and_shadow: Bright TV-animation key, simple cel highlights, cheerful no-fuss lighting
  texture_and_material: Flat cel paint feel, clean paper grain, hair-shine pops, simple clothing folds
  camera_and_composition: Elastic slapstick deformation, giant reaction-scale shifts, and instant pose readability
  atmosphere_and_mood: Playful, combative, charming, lively
  rendering_and_quality: Clean retro rom-com action rendering with readable slapstick timing and buoyant character-comedy impact
  key_features: >-
    Comic smears, expressive reactions, slapstick timing, readable silhouettes, buoyant affection tension, and
    bright cartoon clarity
  creative_brief: >-
    Use Rumiko Takahashi as style anchor for elastic rom-com slapstick timing. Any prompt should carry bounce,
    argument rhythm, readable silhouettes, and affectionate chaos. Combat, object hits, couples, martial arts,
    and character acting are optional.
