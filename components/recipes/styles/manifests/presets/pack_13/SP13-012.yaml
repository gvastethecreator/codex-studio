visualDna:
  aesthetic: >-
    90s OVA-inspired retro-machine language blending analog broadcast nostalgia, angular industrial heroism,
    and cel-era cinematic staging
  subject_treatment: >-
    Sharp mechanical contouring, segmented panel logic, enclosed focal framing, and robust silhouette framing
    for era-authentic machine presence
  color_and_tone: >-
    Petrol blue base, signal red accents, warm off-white highlights, graphite metal neutrals, and subtle
    CRT-era chroma bias
  lighting_and_shadow: >-
    Hard industrial directional keys, analog lens-flare streaks, practical warning-light accents, and
    constrained shadow blocks echoing cel-era compositing
  texture_and_material: >-
    VHS grain overlays, mild horizontal scanline artifacts, painted cel-surface feel, worn industrial metal
    edges, and lightly noisy analog gradation
  camera_and_composition: >-
    Heroic telephoto-compressed action staging with strong machine-form dominance and layered support-depth
    cues
  atmosphere_and_mood: Nostalgic, mechanical, dramatic, and mission-ready
  rendering_and_quality: >-
    High-fidelity retro-anime frame quality with period-authentic artifact simulation and modern readability
    control
  key_features: >-
    OVA-era mechanical silhouette authority, analog artifact signature, scale contrast, and hard-lit
    industrial context
  creative_brief: >-
    Use Retro Mecha VHS Grain as style anchor for analog industrial drama: angular cel-era machine design,
    signal artifacts, and hard directional lighting should transfer by giving the input mecha silhouette,
    cockpit-like compression, panel breakup, or crew-scale cues when useful, without fixing a hangar or launch
    context.
