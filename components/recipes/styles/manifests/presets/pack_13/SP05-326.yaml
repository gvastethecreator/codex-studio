visualDna:
  aesthetic: Expresionismo cinético de anatomía elástica, donde la realidad se pliega al gesto y la velocidad emocional gobierna la imagen.
  form_and_line: Contorno gomoso, taper de brocha nerviosa, siluetas inestables y curvas de movimiento tipo danza explosiva.
  color_palette: Acid cyan, burnt orange, grape purple, hot pink, black ink, fever yellow
  lighting_setup: Flashes cromáticos abruptos de escenario, cambios de key violentos y prioridad expresiva sobre realismo fotométrico.
  material_texture: Mancha pictórica energética, pincel digital áspero, bloques flat de póster y boil de animación visible.
  render_quality: Frame de sakuga hiperactivo con legibilidad de impacto y caos controlado por ritmo.
  spatial_distortion: Constant anatomical morphing, melting perspective, dance-curve poses, explosive timing shapes
  atmosphere: Elástica, extática y febril, siempre al borde de romper la forma.
  key_features: Morphing anatómico continuo, arcos bailados, bursts de color ácido y staging velocity-first anti-model.
  creative_brief: >-
    Define una gramática de rubber-reality transferible donde anatomía mutable,
    color detonante y timing gestual extremo sustituyan rigidez por energía.
    Debe sentirse en rebelión permanente contra el frame congelado.
