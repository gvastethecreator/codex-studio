  color_palette: Forest greens, mossy neutrals, warm leather browns, soft gold accents, and sky-filtered natural highlights
  lighting_setup: Leaf-filtered canopy key light, dappled ground bounce, soft shadow pooling, and warm rim accents on travel gear focal points
  material_texture: Handworked wood grain, stitched travel fabrics, worn leather straps, forged but low-polish metal fittings, and dust-softened path surfaces
  render_quality: Ensemble-focused anime rendering with clear party hierarchy, environmental cohesion, and reliable small-card group legibility
  spatial_distortion: Layered journey composition using mild depth compression to keep multi-character readability without losing world scale
