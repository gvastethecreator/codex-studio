visualDna:
  aesthetic: Minimalismo mineral introspectivo con translucidez gema suspendida en vacío contemplativo.
  form_and_line: Contorno mínimo preciso, arista cristalina limpia y marcas expresivas de baja densidad.
  color_palette: Opal white, seafoam cyan, pale gold, quartz pink, void black, glacial blue
  lighting_setup: >-
    Luz refractiva limpia, glow de borde, apertura ambiental inmensa y chispa cristalina sin ruido
    escénico.
  material_texture: >-
    Translucidez mineral pulida, suavidad de erosión marina, superficie vítrea y terreno mate
    mínimo.
  render_quality: Claridad contemplativa de alto control, con espacio negativo dominante y detalle selectivo.
  spatial_distortion: >-
    Slim fragile proportion logic, open-space isolation, clean silhouette spacing, and low-clutter
    monumental emptiness
  atmosphere: Esparsa, luminosa e introspectiva, sostenida por fragilidad cristalina.
  key_features: Translucidez gema, composición en vacío abierto, paisaje mínimo y lenguaje postural delicado.
  creative_brief: >-
    Use Haruko Ichikawa as style anchor for mineral-void serenity. Any prompt should become
    translucent, quiet, faceted, spacious, and melancholic through negative space. Gem bodies, empty
    terrain, fragile figures, and literal landscapes are optional.
