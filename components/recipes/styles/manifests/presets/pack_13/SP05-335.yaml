  aesthetic: Minimalismo mineral introspectivo con corporalidad gema translúcida suspendida en vacío contemplativo.
  form_and_line: Contorno mínimo preciso, arista cristalina limpia y marcas expresivas de baja densidad.
  color_palette: Opal white, seafoam cyan, pale gold, quartz pink, void black, glacial blue
  lighting_setup: Luz refractiva limpia, glow de borde, apertura ambiental inmensa y chispa cristalina sin ruido escénico.
  material_texture: Translucidez mineral pulida, suavidad de erosión marina, piel vítrea y terreno mate mínimo.
  render_quality: Claridad contemplativa de alto control, con espacio negativo dominante y detalle selectivo.
  spatial_distortion: Slim fragile anatomy, open-space isolation, clean silhouette spacing, low-clutter monumental emptiness
  atmosphere: Esparsa, luminosa e introspectiva, sostenida por fragilidad cristalina.
  key_features: Translucidez corporal gema, composición en vacío abierto, paisaje mínimo y lenguaje postural delicado.
  creative_brief: >-
    Construye una gramática mineral-void reusable donde translucidez, espacio
    negativo y melancolía minimal definan identidad, evitando saturación visual
    o dramatismo ruidoso.
