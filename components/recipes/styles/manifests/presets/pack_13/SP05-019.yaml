visualDna:
  aesthetic: Psychological glitch-anime style built on analog signal decay, identity fragmentation, and minimalist existential framing
  form_and_line: Fine cel contours interrupted by interference breaks, discontinuous silhouette echoes, jittered edge registration, restrained gesture geometry
  color_palette: Desaturated lavenders and cold cyans with intermittent neon corruption pulses, charcoal voids, and ghost-white highlights
  lighting_setup: Low-key monitor-like emission, abrupt contrast cliffs, isolated halo bands, and unstable luminance transitions
  material_texture: CRT phosphor grain, static overlays, scanline veils, layered cel paint softness disrupted by digital noise scars
  render_quality: High-fidelity retro-anime treatment with intentional analog artifacts and controlled degradation for emotional unease
  spatial_distortion: Perceptual depth drift, duplicated contour offsets, and compositional dislocation that suggests cognitive instability
  atmosphere: Uncanny, introspective, fragile, dissonant, haunted
  key_features: Signal-noise dramaturgy, fragmented silhouette logic, analog-digital tension, sparse emotional staging, interference-led mood design
  creative_brief: >-
    Make the style recognizable through signal degradation behavior and
    perceptual instability: line breaks, static overlays, and contrast collapse
    should communicate psychological tension independent of character archetype.
