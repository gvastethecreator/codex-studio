visualDna:
  aesthetic: >-
    Realismo pulido quebrado por memoria, performance e identidad inestable entre reflejos,
    pantallas y cortes perceptivos.
  form_and_line: Contorno refinado realista, detalle facial actoral y dislocación sutil en líneas de encuadre.
  color_palette: Cool steel, skin peach, screen blue, lipstick crimson, neutral beige, shadow plum
  lighting_setup: >-
    Iluminación práctica reflectiva, spill de monitor, spot íntimo y sombras de suspense de
    superficie limpia.
  material_texture: Reflejos en vidrio, brillo cosmético, barniz pulido y glow de escaneo electrónico.
  render_quality: >-
    Suspense psicológico cinematográfico con continuidad quebrada y lectura precisa de capas
    perceptivas.
  spatial_distortion: >-
    Reality-slip match cuts, reflection-depth confusion, poised adult proportion, and cinematic
    frame logic with subtle breakage
  atmosphere: Inquietante y sofisticada, de tensión mental bajo control aparente.
  key_features: >-
    Reflection logic, polished adult spaces, screenlike cuts, memory-performance slippage, identity
    fracture, and seamless impossible continuity
  creative_brief: >-
    Use Satoshi Kon as style anchor for reality-slip reflection continuity. Any prompt should
    fracture identity through polished surfaces, perceptual cuts, memory drift, and seamless
    impossible transitions. Hallways, cities, screens, mirrors, protagonists, and literal
    reflections are optional.
avoidRules:
  - blunt horror gore
  - chaotic dream collage
  - flat sitcom framing
  - cartoon chibi acting
  - muddy low-detail realism
  - fantasy ornament clutter
  - obvious literal symbolism
