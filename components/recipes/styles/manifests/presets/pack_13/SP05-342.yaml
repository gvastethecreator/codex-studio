visualDna:
  aesthetic: Realismo urbano pulido quebrado por memoria, performance e identidad inestable entre reflejos y pantallas.
  form_and_line: Contorno refinado realista, detalle facial actoral y dislocación sutil en líneas de encuadre.
  color_palette: Cool steel, skin peach, screen blue, lipstick crimson, hallway beige, shadow plum
  lighting_setup: Iluminación práctica reflectiva, spill de monitor, spot de camerino y sombras de suspense de superficie limpia.
  material_texture: Reflexos en vidrio, brillo cosmético, barniz de pasillo y glow de escaneo electrónico.
  render_quality: Suspense psicológico cinematográfico con continuidad quebrada y lectura precisa de capas perceptivas.
  spatial_distortion: Reality-slip match cuts, reflection-depth confusion, poised adult anatomy, cinematic frame logic with subtle breakage
  atmosphere: Inquietante y sofisticada, de tensión mental bajo control aparente.
  key_features: Espejos, pantallas, espacios adultos urbanos y transiciones de reality-slip en continuidad ilusoria.
  creative_brief: >-
    Define una gramática reusable de mirror-reality-slip donde reflejo, corte
    perceptivo y espacio urbano pulido construyan fractura identitaria sin
    necesidad de horror explícito.
