  creative_brief: Rage registers as white-hot core, fear as cooling blue, the body's emotional truth mapped across the ironbow spectrum where no face remains recognizable. The thermal crosshair tracks heat like a predator reading prey through walls, every bloom of infrared halo a confession the subject cannot control. Vision itself becomes weaponized — to be seen is to be targeted.
