visualDna:
  aesthetic: >-
    Diseño iconográfico angular de grin maligno, fuego geométrico y actitud callejera gótica de
    combustión estilizada.
  form_and_line: Contorno duro limpio, dominio de diagonales y disciplina formal en triángulos, dientes y flamas.
  color_palette: Carbon black, fire orange, bone white, acid lime, charcoal grey, ember red
  lighting_setup: Contraste fuerte por fuego, underglow geométrico y rims nítidos que recortan siluetas agresivas.
  material_texture: Superficie cel limpia, bordes de hollín, gradientes de llama estilizada y textil negro mate.
  render_quality: Acción estilizada de lectura icónica con diseño de forma dominante sobre detalle realista.
  spatial_distortion: Angular anatomy, sharp perspective cuts, grin-led focal geometry, and icon-heavy pose language
  atmosphere: Incendiaria, insolente y lúdicamente siniestra.
  key_features: >-
    Triangular rhythm, angular flame geometry, toothlike graphic accents, clean street-goth
    silhouette, and aggressive contrast
  creative_brief: >-
    Use Atsushi Ohkubo as style anchor for angular combustion iconography. Any prompt should gain
    sharp triangular rhythm, firelike geometry, toothy graphic energy, and clean dark contrast.
    Faces, uniforms, characters, weapons, and combat scenes are optional.
