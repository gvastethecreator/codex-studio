visualDna:
  aesthetic: >-
    Heroísmo hiperpulido de espectacularidad máxima, anatomía cromada y energía de impacto
    coreografiada con precisión quirúrgica.
  form_and_line: >-
    Contorno de precisión absoluta, detalle anatómico denso y control ultralimpio de líneas de
    acción.
  color_palette: Steel grey, explosion orange, hero red, electric cyan, soot black, flash white
  lighting_setup: >-
    Iluminación HDR de impacto, sheen especular heroico, contraluz explosivo y relleno por
    partículas incandescentes.
  material_texture: Acabado pulido en piel/metal, granulado de debris, columnas de humo y microdetalle de fractura.
  render_quality: Action frame premium con claridad de lectura cinética y acabado editorial de alto brillo.
  spatial_distortion: Extreme foreshortening, focal compression, spectacle-first scale, and perfect action readability
  atmosphere: Explosiva, triunfal y metálica, impulsada por perfección técnica agresiva.
  key_features: >-
    Chrome-like anatomy, impact fractures, extreme foreshortening, scale-shatter perspective, and
    hyperdefined spectacle polish
  creative_brief: >-
    Use Yusuke Murata as style anchor for chrome impact spectacle. Any prompt should gain
    hyperdefined polish, forceful foreshortening, crisp anatomy, and scale fracture. Cities,
    craters, superheroes, punches, and camera-hit poses are optional.
