visualDna:
  aesthetic: Sumi-e action treatment where single brushstrokes imply force arcs, black-ink bursts mark impact, negative space carries tension, and calligraphy becomes motion
  form_and_line: Single-gesture-brushstroke contours, variable-pressure-from-brush, dry-brush-scattering at stroke-end, wet-ink-pooling at stroke-start, economy-of-line philosophy
  color_palette: Sumi-ink-black, rice-paper-white, vermillion-seal-stamp-red, grey-wash-dilutions, no other colors exist, monochrome-poetry
  lighting_setup: No lighting, ink-density-as-value, dry-brush-lightness, wet-pool-darkness, negative-space-as illumination
  material_texture: Rice-paper-fiber-absorption, ink-bleed-feathering, dry-brush-splinter-texture, sumi-stick-grind-grain, bamboo-brush-hair-texture, paper-buckling-from-moisture
  render_quality: Sumi-e brushstroke anime, zen action aesthetic, ink-wash mastery, single-breath rendering, and calligraphic force essence
  spatial_distortion: Ink splash suggests impact zones, negative space becomes form, brushstroke gesture replaces anatomy, no filled forms, economy of space
  atmosphere: Zen discipline, explosive silence, one-stroke certainty, ink-grind meditation, quiet confidence
  key_features: Sumi-ink-monochrome, single-brushstroke-gestures, dry-brush-splinter-edges, ink-pool-wetness, rice-paper-texture, negative-space-as-light, vermillion-seal-stamp
  creative_brief: >-
    Preserve sumi-e brushstroke combat grammar as a reusable style system:
    pressure-variable calligraphic stroke anatomy, negative-space impact logic,
    and monochrome ink-value composition should remain consistent across
    subjects without requiring a fight scene, sword cut, warrior, or literal
    combat event.
