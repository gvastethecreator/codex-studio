visualDna:
  aesthetic: Romanticismo espacial retrofuturista de melancolía noble, con distancia cósmica y heroísmo resignado.
  form_and_line: Contorno elegante retro, proporciones faciales alargadas, linework fino en capas y maquinaria ferroviaria estelar.
  color_palette: Deep navy, brass gold, wine red, vacuum black, starlight white, engine blue
  lighting_setup: Contraluz de campo estelar, glow de consola latón y framing de silueta en puente de mando sombrío.
  material_texture: Cielo pintado profundo, paneles metálicos gastados, caída de capa aterciopelada y suavidad cel-era.
  render_quality: Space-opera de alta legibilidad con escala infinita y dramatismo de horizonte prolongado.
  spatial_distortion: Tall melancholy figures, long horizon lines, deep star-distance perspective, theatrical cape flow
  atmosphere: Solitaria, romántica y cósmica, con nobleza de despedida interminable.
  key_features: Imaginería de star-track, siluetas en capa, control rooms retro y framing de distancia luctuosa.
  creative_brief: >-
    Define una gramática de cosmic-melancholy transferible con silueta
    retrofuturista, iconografía ferroviaria estelar y escala emocional de
    lejanía persistente.
