visualDna:
  aesthetic: Romanticismo retrofuturista de melancolía noble, distancia cósmica y heroísmo resignado.
  form_and_line: >-
    Contorno elegante retro, proporciones alargadas, linework fino en capas y maquinaria estelar
    sugerida.
  color_palette: Deep navy, brass gold, wine red, vacuum black, starlight white, engine blue
  lighting_setup: Contraluz de campo estelar, glow de latón técnico y framing de silueta en penumbra solemne.
  material_texture: >-
    Cielo pintado profundo, paneles metálicos gastados, caída textil aterciopelada y suavidad
    cel-era.
  render_quality: Space-opera de alta legibilidad con escala infinita y dramatismo de horizonte prolongado.
  spatial_distortion: >-
    Tall melancholy forms, long horizon lines, deep star-distance perspective, and theatrical fabric
    flow
  atmosphere: Solitaria, romántica y cósmica, con nobleza de despedida interminable.
  key_features: >-
    Retrofuture silhouettes, noble aged metal, star-track-like distance cues, long-loss framing, and
    romantic cosmic scale
  creative_brief: >-
    Use Leiji Matsumoto as style anchor for retrofuture distance melancholy. Any prompt should feel
    noble, far away, aged by travel, and emotionally vast. Trains, command bridges, capes,
    starships, and heroic characters are optional.
avoidRules:
  - photoreal spaceship realism
  - hard sci-fi UI clutter
  - comedic chibi tone
  - bright candy palette
  - grounded contemporary streetwear
  - shallow space scale
