visualDna:
  aesthetic: Romanticismo retrofuturista de melancolía noble, distancia cósmica y heroísmo resignado.
  form_and_line: Contorno elegante retro, proporciones alargadas, linework fino en capas y maquinaria estelar sugerida.
  color_palette: Deep navy, brass gold, wine red, vacuum black, starlight white, engine blue
  lighting_setup: Contraluz de campo estelar, glow de latón técnico y framing de silueta en penumbra solemne.
  material_texture: Cielo pintado profundo, paneles metálicos gastados, caída textil aterciopelada y suavidad cel-era.
  render_quality: Space-opera de alta legibilidad con escala infinita y dramatismo de horizonte prolongado.
  spatial_distortion: Tall melancholy forms, long horizon lines, deep star-distance perspective, and theatrical fabric flow
  atmosphere: Solitaria, romántica y cósmica, con nobleza de despedida interminable.
  key_features: Imaginería de star-track, siluetas retro, metal noble envejecido y framing de distancia luctuosa.
  creative_brief: >-
    Define una gramática cosmic-melancholy transferible con silueta
    retrofuturista, señales de viaje estelar y escala emocional de lejanía
    persistente, sin exigir tren, puente de mando, capa o personaje heroico.
