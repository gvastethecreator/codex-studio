visualDna:
  aesthetic: >-
    Local-community anime warmth built from festive intimacy, handmade commerce rhythm, cheerful
    neighbor density, and confectionery-like softness without locking to a street scene
  form_and_line: >-
    Rounded silhouette clusters, welcoming contour rhythm, signage-like shape balance without
    readable text, and neighborly spacing around the subject
  color_palette: >-
    Mochi cream, cedar brown, festival red, mint paper accents, warm amber shoplight, and soft
    evening violet shadows
  lighting_setup: >-
    Lantern-like warm pools, overcast daylight softness, amber spill, and low-drama celebratory
    highlights
  material_texture: >-
    Powdery matte softness, paper fiber, wood grain, woven cloth, polished display glints, and
    handmade packaging tactility
  render_quality: >-
    Community-slice rendering with cozy density, friendly object clarity, festive readability, and
    gentle local personality
  spatial_distortion: >-
    Compact neighborhood-scale depth, corridor-like warmth, and curved attention flow around the
    main subject
  atmosphere: Cheerful, neighborly, tasty, soft, festive
  key_features: >-
    Community rhythm, food-craft softness, paper accents, warm local light, rounded social
    composition, and affectionate bustle
  creative_brief: >-
    Use Tamako Market as style anchor for community softness. Transform any subject into warm local
    ritual: rounded neighborly density, powdery craft texture, paper-festival accents, and amber
    friendliness. Markets, storefronts, mochi, and stalls stay optional.
avoidRules:
  - realistic
  - 3d render
  - photo
  - live action
  - western comic
  - ugly
  - bad anatomy
  - low quality
  - jpeg artifacts
  - watermark
  - text
  - signature
