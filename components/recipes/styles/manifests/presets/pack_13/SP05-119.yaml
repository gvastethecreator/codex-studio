visualDna:
  aesthetic: Hand-drawn chalk-anime treatment emphasizing impermanent mark-making, tactile fragility, and analog board-surface expression
  form_and_line: Variable-pressure chalk strokes, dry-friction breaks, eraser-softened contours, ghost-line remnants, powder-edge diffusion
  color_palette: Chalk white core, muted pastel accents, deep green-black substrate, dusty greys, low-saturation cyan and warm yellow notes
  lighting_setup: Soft directional glow with particulate scattering and gentle specular hotspots on semi-gloss slate surfaces
  material_texture: Micro-grain slate tooth, powder residue layering, felt-eraser streaking, fingertip smudge bloom, brittle chalk fracture traces
  render_quality: Medium-faithful analog rendering with visible process artifacts, non-uniform deposition, and intentionally unfinished charm
  spatial_distortion: Flat-board presentation with slight perspective drift, edge-framing emphasis, and composition anchored by mark density
  atmosphere: Nostalgic, delicate, ephemeral, intimate, process-oriented
  key_features: Powder halos, smudge ghosts, broken-stroke cadence, erasure memory layers, substrate grain response, fragile contour rhythm
  creative_brief: >-
    The preset should read as a chalk medium language first: transient marks,
    residue, and erasure memory define identity, allowing any subject to
    inherit an intentionally impermanent handcrafted anime finish.
