visualDna:
  aesthetic: Fallen authority rendered through ash-crown symbolism, soot residue, and memorial noir gravity.
  form_and_line: Brittle crown silhouettes, collapsed diadem arcs, and asymmetrical ash cascade rhythms with no braided loops, serpent coils, or central totem symmetry.
  color_palette: Charcoal, muted silver, and antique ivory.
  lighting_setup: Narrow halo beam from above.
  material_texture: Charred wood, cracked enamel, dusty glass, and powdery soot.
  render_quality: Cinematic symbolic still life.
  spatial_distortion: Tight iconic depth with offset fragment layers and drifting residue, not a required cabinet or shrine axis.
  atmosphere: Loss, legitimacy, and solemn afterimage.
  key_features: Ash crown, residue halos, memorial dust, collapsed diadem fragments, offset crown shards.
  creative_brief: Reinterpret any input as authority surviving only as ash, residue, and crown-shaped memory. Use offset crown shards, brittle silhouette, soot halos, charred enamel, narrow overhead beams, and memorial gravity without requiring serpents, braided loops, shrine windows, relic cabinets, rulers, swords, or literal objects.
