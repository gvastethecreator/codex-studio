  aesthetic: Processional blood-moon omen language with solemn public ritual pressure.
  form_and_line: Long solemn verticals, lantern-pole rhythms, suspended banner lines, and a lunar arc overhead with no candle cluster centerpiece.
  color_palette: Blood red, midnight indigo, and ash gray.
  lighting_setup: Moonlit backlight with lantern accents.
  material_texture: Wet stone sheen, ceremonial cloth, lacquered wood, and ash haze.
  render_quality: Cinematic mythic rendering with processional clarity.
  spatial_distortion: Receding ritual rhythm that leads visual force toward a blood moon disk.
  atmosphere: Omen, obedience, and a solemn public rite.
  key_features: Processional mask cues, lantern standards, blood moon sigils, suspended omen banners.
  creative_brief: Apply blood-moon processional omen logic to any input, making red celestial pressure feel like witness and verdict. Use lantern-pole rhythm, suspended omen banners, ash haze, solemn verticals, and obedient negative space without forcing candle clusters, black wax shrines, corridor reliquaries, moon disks, street marches, masks, crowds, or ritual parades.
