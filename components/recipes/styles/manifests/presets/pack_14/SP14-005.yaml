visualDna:
  aesthetic: Aristocratic death-feast noir where etiquette persists as cursed protocol and petrified luxury.
  form_and_line: Rigid protocol silhouettes, knife-and-goblet rhythm, axial table-like geometry, and formal spacing.
  color_palette: Bone ivory, coagulated wine black, and smoked pewter gray.
  lighting_setup: Candle troughs with mirrored marble bounce and deep peripheral falloff.
  material_texture: Veined marble slabs, tarnished heirloom silver, oxidized candelabra, and desiccated floral garlands.
  render_quality: Prestige editorial key art with high micro-detail and controlled tonal compression.
  spatial_distortion: Vaulted axial depth that tunnels attention through ceremonial place-setting rhythm without requiring a banquet hall.
  atmosphere: Ritualized decay, dynastic arrogance, and prophetic unease.
  key_features: Petrified etiquette cues, carbonized centerpiece forms, oath-cutlery lines, veined marble, and empty sovereign-axis tension.
  creative_brief: >-
    Petrify the input through banquet etiquette noir: bone ivory, coagulated
    wine-black shadows, pewter decay, oath-cutlery rhythm, and rigid protocol
    geometry should make any subject feel cursed by perfect manners without
    requiring nobles, table, courtiers, food, or dining room.
