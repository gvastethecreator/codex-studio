  aesthetic: Eschatological court-noir where prophecy reads as legal force and sovereign ash.
  form_and_line: High vertical authority, decree-tablet geometry, strict heraldic symmetry, and crown-halo framing.
  color_palette: Volcanic ash gray, funerary gold, and deep ultramarine dusk.
  lighting_setup: Ember uplight from censers plus a narrow crown halo rim.
  material_texture: Charred vellum, oxidized regalia, cinder dust, and brocade ceremonial cloth.
  render_quality: Prestige key art with precise icon hierarchy and high-distance readability.
  spatial_distortion: Tribunal-axis convergence through smoke-layered arches or equivalent authority planes without requiring a throne room.
  atmosphere: Judicial inevitability, prophetic dread, and sovereign calm.
  key_features: Cracked coronet cues, decree tablets, oath geometry, intelligent ash plumes, and funerary-gold verdict light.
  creative_brief: 'Decree the input through ash-crown oracle law: volcanic gray fields, funerary-gold halos, ultramarine dusk, charred-vellum texture, and heraldic verdict symmetry should make any subject feel prophetically binding without requiring a literal oracle figure, courtroom, attendants, tablets, or apocalypse tableau.'
