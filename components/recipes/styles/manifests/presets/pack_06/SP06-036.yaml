  texture_and_material: Glass transfer, paper
  camera_and_composition: Blurred
  atmosphere_and_mood: Ghostly, soft
  rendering_and_quality: Unique, expressive
  key_features: Transfer texture
  creative_brief: >-
    Apply monotype transfer behavior to any input: single-pull softness, glass-plate smear, accidental
    blending, pressure blur, and unrepeatable painterly transfer marks. Keep one-off print spontaneity without
    requiring botanical subjects, abstract plates, studio tools, or edition context.
