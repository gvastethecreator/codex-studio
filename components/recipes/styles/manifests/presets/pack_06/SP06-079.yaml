  creative_brief: >-
    Pigment floats on the surface tension of thickened water, swirled into patterns by comb and stylus, then
    transferred to paper in a single decisive contact. No two pulls are identical, no two patterns repeatable,
    the medium encoding uniqueness into every sheet. The image is a liquid moment frozen, a turbulence caught
    becoming design. Apply this mixed-media process over any input: preserve material assembly, edge evidence,
    surface treatment, layering logic, and handmade artifacts while avoiding required clippings, readable
    text, boards, fire, studio setup, or literal craft-table scene.
