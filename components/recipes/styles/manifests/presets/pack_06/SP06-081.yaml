visualDna:
  aesthetic: >-
    Original DMG Game Boy palette, four shades of olive-green, 160x144 low-resolution vision, pea-soup
    display, Nintendo handheld nostalgia, 1989 portable graphics, abstract subject reduced into blocky
    dot-matrix silhouettes
  subject_treatment: >-
    Rigid pixel-grid alignment, 8x8 or 16x16 tile construction, hard silhouette boxing, no sub-pixel
    rendering, any input compressed into readable tile masses
  color_and_tone: >-
    Four-shade green gradient, pea-soup olive, sickly lime, bile yellow highlight, shadow-moss dark, no other
    colors exist
  lighting_and_shadow: Self-illuminated LCD screen, reflective green phosphor glow, pocket-light on plastic screen
  texture_and_material: LCD pixel grid gap, dusty plastic screen overlay, passive-matrix ghost trail, screen-burn memory
  camera_and_composition: Screen-edge vignette, LCD-viewing-angle washout, reflective plastic frame reflection, pocket-sized display
  atmosphere_and_mood: Portable, nostalgic, constrained, quiet, low-power, memory-fragile
  rendering_and_quality: Game Boy screen capture, retro handheld nostalgia, 8-bit portable aesthetic, chunky-pixel charm
  key_features: >-
    Four-shade green only, visible pixel grid, chunky 8x8 tile boundaries, screen-bezel framing, monochrome
    dot-matrix abstraction
  creative_brief: >-
    Four green voltages become an entire image language. Any subject collapses into pea-soup values, tile
    boundaries, LCD gaps and ghost trails, as if visual memory had to fit inside a pocket device with fading
    batteries.
