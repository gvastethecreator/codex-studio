visualDna:
  aesthetic: Seamless photo blending
  subject_treatment: Invisible
  color_and_tone: Unified grading
  lighting_and_shadow: Matched
  texture_and_material: Photo
  camera_and_composition: Impossible scale
  atmosphere_and_mood: Dreamlike
  rendering_and_quality: Surreal, advertising
  key_features: Realistic blend
  creative_brief: >-
    Image fragments blend at the pixel level, one visual plane flowing into another through gradients of
    transparency, the join so seamless it becomes uncanny. Scale shifts without warning, impossible
    relationships presented with banal compositing confidence. The image disturbs through plausibility, not
    fantasy, without requiring faces, cities, objects, or passport-photo framing.
