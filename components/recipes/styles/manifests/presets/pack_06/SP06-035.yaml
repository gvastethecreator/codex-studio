visualDna:
  aesthetic: Silkscreen poster
  subject_treatment: No outlines, color shapes
  color_and_tone: Flat, vibrant, layered
  lighting_and_shadow: >-
    Lighting for Screenprint (Serigraphy): purposeful key, bounce, rim, shadow depth, and focal readability
    matched to 3. Printmaking.
  texture_and_material: Mesh pattern, ink overlay
  camera_and_composition: Misregistration (offset)
  atmosphere_and_mood: Commercial, bold
  rendering_and_quality: Warhol, pop art
  key_features: Layered colors
  creative_brief: >-
    Apply screenprint/serigraphy logic to any input: mesh-pulled ink, flat separated color passes, bold
    registration offsets, opaque poster planes, and reproduction-first contrast. Keep graphic commercial punch
    without requiring slogans, portraits, pop icons, product ads, or readable text.
