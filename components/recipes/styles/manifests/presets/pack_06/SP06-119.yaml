visualDna:
  aesthetic: >-
    Cozy sim seasonal art style with soft pixel warmth, gentle routine energy, and approachable hand-crafted
    charm.
  subject_treatment: >-
    Make any subject feel small, friendly, useful, and collectible through rounded forms and soft edge
    priorities.
  color_and_tone: >-
    Four-season palette logic, warm pastels, honeyed highlights, cool morning shadows, and low-stress
    contrast.
  lighting_and_shadow: Soft ambient daylight, tiny contact shadows, seasonal color washes, and almost no harsh drama.
  texture_and_material: Gentle pixel grain, quilt-like pattern accents, soft organic noise, and tactile handmade detail.
  camera_and_composition: Isometric or icon-atlas framing with tidy spacing, cozy negative space, and clear modular grouping.
  atmosphere_and_mood: Calm, domestic, nurturing mood without requiring farms, crops, animals, houses, or seasonal scenery.
  rendering_and_quality: Clean cozy-game polish, crisp but soft-edged pixels, no visual clutter, no readable labels.
avoidRules:
  - motion blur
  - inconsistent proportions
  - changing costume
  - background scene
  - farm requirement
  - crop requirement
  - animal requirement
  - watermark
  - text
assets:
  defaultImage: /assets/recipes/styles/defaults/SP06-119.webp
attributes:
  negativePrompt: >-
    motion blur, inconsistent proportions, changing costume, background scene, farm requirement, crop
    requirement, animal requirement, watermark, text
  layout:
    preferredFrameCount: 8
    frameGrid: 4x2
    transparentBackground: true
