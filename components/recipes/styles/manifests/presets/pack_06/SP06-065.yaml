visualDna:
  aesthetic: Scrapbook layering style with taped ephemera, soft nostalgia, and handmade page rhythm
  subject_treatment: Tape, stickers
  color_and_tone: Pastel, vintage
  lighting_and_shadow: Flat lay
  texture_and_material: Paper fibers, tape sheen, sticker edges, paper shadows, and optional non-readable handwriting texture
  camera_and_composition: Layered
  atmosphere_and_mood: Nostalgic, sweet
  rendering_and_quality: Personal, cute
  key_features: Page layout
  creative_brief: >-
    Ephemera-like layers arrange into a memory-coded page rhythm, each fragment selected for texture, color,
    and emotional residue rather than literal content. Tape, stickers, torn corners, and soft paper shadows
    create a curated accident of affection. Keep nostalgia material and compositional, without requiring
    tickets, flowers, handwriting, people, or readable notes.
