visualDna:
  aesthetic: Thread stitched over photo
  subject_treatment: Thread lines
  color_and_tone: Photo + Thread accent
  lighting_and_shadow: Photo lighting
  texture_and_material: Glossy photo, matte thread
  camera_and_composition: Stitched details
  atmosphere_and_mood: Personal, tactile
  rendering_and_quality: Artistic, altered
  key_features: Thread texture
  creative_brief: >-
    Thread pierces an image surface, adding texture to captured light or flat print, the stitch becoming a
    third dimension over a two-dimensional base. Needle holes, floss color, and matte thread turn the
    substrate into a tactile field. The visible mend becomes the art without requiring portraits, memories, or
    literal photographs.
