visualDna:
  aesthetic: Roguelike tile grammar built from stark glyph silhouettes, grid logic, and harsh tactical readability.
  subject_treatment: Reduce any subject into symbolic tile chunks, clear collision edges, and instantly parsed icon-like forms.
  color_and_tone: Low-count palette with black gutters, sickly accent colors, and high-contrast value separation.
  lighting_and_shadow: Minimal light logic, mostly value-coded planes, with tiny glow accents reserved for interaction points.
  texture_and_material: Chunky pixel pits, chipped edges, procedural speckle, and repeat-safe surface motifs.
  camera_and_composition: Strict orthographic top-down or angled tile view with modular alignment and no cinematic depth.
  atmosphere_and_mood: Tense, procedural, survival-focused mood without requiring dungeons, corridors, traps, or monsters.
  rendering_and_quality: Seamless-tile friendly edges, crisp pixel boundaries, readable at thumbnail scale.
avoidRules:
  - motion blur
  - inconsistent proportions
  - changing costume
  - background scene
  - literal dungeon requirement
  - monster requirement
  - watermark
  - text
