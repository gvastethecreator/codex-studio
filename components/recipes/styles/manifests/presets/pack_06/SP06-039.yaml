  color_palette: Neon pink, blue, yellow, grain
  lighting_setup: Flat
  material_texture: Rice paper, dithering
  render_quality: Zine, retro, cheap
  spatial_distortion: Misregistration
  atmosphere: Fun, indie, handmade, slightly unstable
  key_features: Grainy dither
  creative_brief: Soy-based inks layer through a drum that turns digital input into imperfect physical color, each pass slightly offset, each layer adding grain. The dither pattern becomes texture, the misregistration becomes charm, the paper absorbs neon with an appetite for the handmade. Every image should feel duplicated, cheap, vivid, and intentionally unstable.
