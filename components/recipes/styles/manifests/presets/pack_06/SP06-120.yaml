visualDna:
  aesthetic: Boss-encounter key-art style with asymmetrical scale tension, ominous focal pressure, and cinematic game polish.
  subject_treatment: Cast any subject as a dramatic threat or challenge through exaggerated scale contrast and dominant silhouette mass.
  color_and_tone: Deep cinematic shadows, one menacing accent hue, hot edge highlights, and severe value separation.
  lighting_and_shadow: Backlit menace, rim-fire accents, volumetric haze, and large shadow shapes pressing into focal space.
  texture_and_material: Polished concept-art brushwork, scratched material detail, smoke particles, and sharpened focal textures.
  camera_and_composition: Low-angle or compressed wide key-art crop, huge negative-space pressure, diagonal confrontation rhythm.
  atmosphere_and_mood: Climactic, dangerous, awe-heavy mood without requiring monsters, combat, weapons, arenas, or heroes.
  rendering_and_quality: Finished cinematic key-art quality, readable thumbnail silhouette, no UI, no logo, no readable text.
avoidRules:
  - watermark
  - text
  - monster requirement
  - combat scene
  - weapon requirement
