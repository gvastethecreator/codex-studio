visualDna:
  aesthetic: >-
    Polished digital illustration with layer-built control, clean brush economy, and modern concept-render
    clarity
  subject_treatment: Refined silhouette edges, selective painterly marks, and clean shape transitions
  color_and_tone: RGB-vibrant but disciplined, with controlled hue shifts and crisp accent separation
  lighting_and_shadow: Studio-like key/fill/rim logic tuned for clean digital readability
  texture_and_material: Smooth brush blending with selective texture overlays and pressure-sensitive edge detail
  camera_and_composition: >-
    Compose for Digital Painting using its key spatial cues: Layered polish, crisp focal rendering,
    editable-feeling control.
  atmosphere_and_mood: Polished
  rendering_and_quality: Professional digital painting polish without platform-specific tropes
  key_features: Layered polish, crisp focal rendering, editable-feeling control
  creative_brief: >-
    Apply digital-painting workflow to any input: pressure-sensitive brushwork, layered corrections, sampled
    color precision, soft undo-polished gradients, and clean iterative finish. Keep weightless painterly
    control without requiring fantasy characters, concept sheets, tablet UI, or visible layers.
