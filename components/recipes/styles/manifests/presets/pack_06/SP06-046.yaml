visualDna:
  aesthetic: Polished digital illustration with layer-built control, clean brush economy, and modern concept-render clarity
  form_and_line: Refined silhouette edges, selective painterly marks, and clean shape transitions
  color_palette: RGB-vibrant but disciplined, with controlled hue shifts and crisp accent separation
  lighting_setup: Studio-like key/fill/rim logic tuned for clean digital readability
  material_texture: Smooth brush blending with selective texture overlays and pressure-sensitive edge detail
  render_quality: Professional digital painting polish without platform-specific tropes
  spatial_distortion: None
  atmosphere: Polished
  key_features: Layered polish, crisp focal rendering, editable-feeling control
  creative_brief: >-
    Apply digital-painting workflow to any input: pressure-sensitive brushwork,
    layered corrections, sampled color precision, soft undo-polished gradients,
    and clean iterative finish. Keep weightless painterly control without
    requiring fantasy characters, concept sheets, tablet UI, or visible layers.
