visualDna:
  aesthetic: Anime gacha-card visual style with iridescent foil borders, rarity glow, and polished collectible spectacle.
  subject_treatment: Stage any subject as a premium collectible centerpiece with clean anime contours and rarity-coded emphasis.
  color_and_tone: Pastel jewel gradients, gold/opal foil accents, prismatic highlights, and high-key magical contrast.
  lighting_and_shadow: Sparkle bloom, rim halos, layered glow bursts, and glossy card-surface reflections.
  texture_and_material: Holographic foil grain, embossed frame detail, soft star particles, and smooth digital anime finish.
  camera_and_composition: Vertical card-like framing, ornate border hierarchy, central focus window, and balanced negative space.
  atmosphere_and_mood: Desirable, premium, celebratory mood without requiring characters, card text, stats, weapons, or mascots.
  rendering_and_quality: Clean collectible asset polish, no readable typography, no cluttered UI, controlled sparkle density.
