visualDna:
  aesthetic: >-
    Classic RPG Maker top-down tile grammar, chibi-scale abstraction when subjects appear, 16x16 modular
    tiles, nostalgic indie-RPG charm, Yume Nikki dream simplicity and Ib horror-cute dissonance as tone
    anchors
  subject_treatment: >-
    Small-pixel outlines, tile-grid construction, chunky square modules, simple animation-frame logic,
    grid-locked everything
  color_and_tone: >-
    Cute saturated tiles, clear terrain-like color coding, compact RTP-inspired palette, palette swaps for
    subject separation
  lighting_and_shadow: Flat ambient tile lighting, occasional window-yellow glow tiles, no dynamic lighting, pre-baked atmosphere
  texture_and_material: >-
    Tile-repetition grids, sprite-pixel squareness, grid-aligned collision edges, chunky-block construction
    feel
  camera_and_composition: Top-down orthographic grid, tile-based snapping, screen-transition fade, flat-isometric hybrid worldview
  atmosphere_and_mood: Cozy, nostalgic, do-it-yourself creativity, miniature, indie-game soul
  rendering_and_quality: RPG Maker screen grammar, indie-RPG nostalgia, chibi-pixel charm, do-it-yourself game-aesthetic warmth
  key_features: >-
    Grid-based tile composition, chibi-scale simplification, top-down orthographic perspective,
    tile-repetition patterns, optional dialogue-box overlay without readable text
  creative_brief: >-
    Any subject is rebuilt from small square modules as if authored inside a humble RPG tool. The camera stays
    orthographic, scale stays miniature, repetition becomes texture and the whole image feels handmade inside
    a fixed tile grid.
