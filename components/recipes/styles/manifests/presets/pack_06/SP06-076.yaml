visualDna:
  aesthetic: Soot on paper
  subject_treatment: Soft smoke trails
  color_and_tone: Black soot, white paper
  lighting_and_shadow: Soft
  texture_and_material: Smoke residue
  camera_and_composition: Ghostly
  atmosphere_and_mood: Ethereal, dark
  rendering_and_quality: Surreal, delicate
  key_features: Smoke patterns
  creative_brief: >-
    Flame deposits soot in patterns determined by airflow and chance, the image drawn by smoke rather than
    hand. Carbon traces create ghostly gradations that seem to hover above the surface. The style is soft,
    dangerous, residue-based, and never reliant on literal fire imagery. Apply this mixed-media process over
    any input: preserve material assembly, edge evidence, surface treatment, layering logic, and handmade
    artifacts while avoiding required clippings, readable text, boards, fire, studio setup, or literal
    craft-table scene.
