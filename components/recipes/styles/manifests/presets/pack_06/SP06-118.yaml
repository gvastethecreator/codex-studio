visualDna:
  aesthetic: RPG pixel-inventory icon language with collectible clarity, tiny material storytelling, and consistent atlas rhythm.
  subject_treatment: Turn any subject into an inventory-ready icon with compact silhouette, clear rarity cue, and readable function.
  color_and_tone: Earthy base ramps, jewel accent colors, metal/leather/potion-like swatch logic, and strong outline contrast.
  lighting_and_shadow: Top-left icon lighting, tiny rim glints, soft contact shadow, and controlled highlight pixels.
  texture_and_material: Hand-placed pixel clusters, miniature material pixels, small chips, gleams, labels avoided.
  camera_and_composition: Centered transparent-background icon framing, equal padding, stable scale, and consistent three-quarter tilt.
  atmosphere_and_mood: Lootable, tactile, game-ready mood without requiring weapons, potions, bags, or item sets.
  rendering_and_quality: Icon-sheet friendly, crisp low-res finish, no text, no background scene, no interpolation blur.
avoidRules:
  - motion blur
  - inconsistent proportions
  - changing costume
  - background scene
  - weapon requirement
  - potion requirement
  - watermark
  - text
