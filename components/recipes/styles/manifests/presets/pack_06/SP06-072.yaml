visualDna:
  aesthetic: Image made of tape
  form_and_line: Straight tape lines
  color_palette: Masking tape, duct tape
  lighting_setup: Flat
  material_texture: Tape layers
  render_quality: Tape-strip construction with installation-like precision but no required wall or street context
  spatial_distortion: Geometric
  atmosphere: Temporary, geometric, improvised
  key_features: Tape strips
  creative_brief: >-
    Adhesive strips become line, become form, become image, the tape refusing to be merely functional, demanding
    aesthetic recognition. The lines are straight because tape cannot curve, the image bound by the geometry of its
    medium. Each strip catches light differently, matte against gloss, creating dimension from adhesive. Apply this
    mixed-media process over any input: preserve material assembly, edge evidence, surface treatment, layering logic,
    and handmade artifacts while avoiding required clippings, readable text, boards, fire, studio setup, or literal
    craft-table scene.
