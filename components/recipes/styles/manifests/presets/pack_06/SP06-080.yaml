visualDna:
  aesthetic: Stencil graphic style with hard cut bridges, repeatable silhouettes, and spray-edge urgency
  form_and_line: Hard edges, bridges
  color_palette: Black, Red, White
  lighting_setup: Flat
  material_texture: Wall, spray paint
  render_quality: Graphic reproducible stencil finish without requiring street walls, protest text, or slogans
  spatial_distortion: Simplified
  atmosphere: Bold, urgent, reproducible
  key_features: Stencil bridges
  creative_brief: Negative space becomes positive through bridges that hold isolated shapes in place, the stencil declaring its method in every uncut connection. Detail is sacrificed to reproducibility, and spray edges reveal the process. The style should feel repeatable and urgent without requiring letters, slogans, walls, or protest scenes.
