visualDna:
  aesthetic: Stencil graphic style with hard cut bridges, repeatable silhouettes, and spray-edge urgency
  subject_treatment: Hard edges, bridges
  color_and_tone: Black, Red, White
  lighting_and_shadow: Flat
  texture_and_material: Wall, spray paint
  camera_and_composition: Simplified
  atmosphere_and_mood: Bold, urgent, reproducible
  rendering_and_quality: Graphic reproducible stencil finish without requiring street walls, protest text, or slogans
  key_features: Stencil bridges
  creative_brief: >-
    Negative space becomes positive through bridges that hold isolated shapes in place, the stencil declaring
    its method in every uncut connection. Detail is sacrificed to reproducibility, and spray edges reveal the
    process. The style should feel repeatable and urgent without requiring letters, slogans, walls, or protest
    scenes.
