  camera_and_composition: 'Compose for Mixed Media Canvas using its key spatial cues: Heavy texture.'
  atmosphere_and_mood: Expressive
  rendering_and_quality: Fine art, abstract
  key_features: Heavy texture
  creative_brief: >-
    Paint meets grit, paper, fibers, and anything that can hold pigment, building a surface where relief
    becomes content. Texture rises into the image until support and subject negotiate equal weight. The
    artwork asserts objecthood through material truth, without requiring newspaper, fabric, or canvas as fixed
    props.
