  defaultImage: /assets/recipes/styles/defaults/SP06-101.webp
attributes:
  negativePrompt: >-
    motion blur, inconsistent proportions, changing costume, background scene, literal town requirement, npc
    crowd requirement, watermark, text
  layout:
    preferredFrameCount: 8
    frameGrid: 4x2
    transparentBackground: true
