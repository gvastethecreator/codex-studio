visualDna:
  aesthetic: Compact JRPG pixel-art diorama language with nostalgic 16-bit readability and toy-like spatial charm.
  subject_treatment: >-
    Translate any subject into small modular clusters, readable silhouettes, stepped edge logic, and
    charm-first simplification.
  color_and_tone: >-
    Warm limited ramps, soft dusk accents, separated roof-light/shadow bands, and selective jewel-color
    highlights.
  lighting_and_shadow: Stable top-left pixel lighting with blocky cast shadows and simple ambient occlusion under forms.
  texture_and_material: Hand-placed dithering, tiny tile noise, one-pixel highlight ticks, and restrained pattern repetition.
  camera_and_composition: Locked isometric or three-quarter diorama framing with stacked depth layers and tidy grid rhythm.
  atmosphere_and_mood: Adventurous, cozy, exploratory mood without requiring towns, buildings, roads, or NPCs.
  rendering_and_quality: Crisp pixel scale, no interpolation blur, clean sprite readability, and consistent palette discipline.
avoidRules:
  - motion blur
  - inconsistent proportions
  - changing costume
  - background scene
  - literal town requirement
  - npc crowd requirement
  - watermark
  - text
