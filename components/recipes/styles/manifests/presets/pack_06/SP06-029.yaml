visualDna:
  aesthetic: Paper-cut silhouette grammar with total shape reliance and zero interior modeling
  subject_treatment: Outline only
  color_and_tone: Solid Black on White
  lighting_and_shadow: Backlit
  texture_and_material: Paper edge
  camera_and_composition: No internal details
  atmosphere_and_mood: Graphic, stark
  rendering_and_quality: Stark cut-paper finish with crisp contour judgment
  key_features: Solid shape
  creative_brief: >-
    Apply silhouette-first drawing to any input: pure contour recognition, interior detail removed, high
    figure-ground contrast, edge clarity, and omission as design language. Keep shape-driven eloquence without
    requiring profile portraits, sunsets, cut paper, theatre screens, or human bodies.
avoidRules:
