visualDna:
  aesthetic: Paper-cut silhouette grammar with total shape reliance and zero interior modeling
  form_and_line: Outline only
  color_palette: Solid Black on White
  lighting_setup: Backlit
  material_texture: Paper edge
  render_quality: Stark cut-paper finish with crisp contour judgment
  spatial_distortion: No internal details
  atmosphere: Graphic, stark
  key_features: Solid shape
  creative_brief: >-
    Apply silhouette-first drawing to any input: pure contour recognition,
    interior detail removed, high figure-ground contrast, edge clarity, and
    omission as design language. Keep shape-driven eloquence without requiring
    profile portraits, sunsets, cut paper, theatre screens, or human bodies.
