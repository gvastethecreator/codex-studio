  creative_brief: >-
    Coffee-like organic pigment leaves sepia stains on absorbent paper, the process warm, fluid, and domestic
    in material feel. Rings, blooms, granules, and tide marks become compositional elements, accidents
    welcomed into the frame. The style should feel stained and aromatic without requiring mugs, kitchens,
    mornings, or beverage props.
