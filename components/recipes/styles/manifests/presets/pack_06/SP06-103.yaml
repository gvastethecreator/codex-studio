visualDna:
  aesthetic: Layered Metroidvania side-scroll style with readable silhouettes against moody parallax depth.
  subject_treatment: Shape any subject into bold side-view forms, negative-space cutouts, and traversal-readable contours.
  color_and_tone: Deep cool shadows, muted midtones, rare toxic accents, and strong foreground/background value splits.
  lighting_and_shadow: Rim-biased side lighting with luminous pockets, heavy occlusion, and atmosphere-separated planes.
  texture_and_material: >-
    Pixel clusters, mossy noise, mineral-like speckle, and subtle animated-glow implications without fixed
    scenery.
  camera_and_composition: Wide side-on composition, layered planes, strong platform-read silhouette rhythm, and stable sprite scale.
  atmosphere_and_mood: Lonely, exploratory, mysterious tone without requiring caverns, platforms, doors, or creatures.
  rendering_and_quality: Pixel-perfect edges, parallax-ready depth separation, no painterly blur, no overdetail.
avoidRules:
  - motion blur
  - inconsistent proportions
  - changing costume
  - background scene
  - literal cavern requirement
  - platform requirement
  - watermark
  - text
