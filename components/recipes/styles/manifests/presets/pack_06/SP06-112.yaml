visualDna:
  aesthetic: Sci-fi inventory-icon style with hard-surface silhouette logic, technical accents, and clean arsenal readability.
  subject_treatment: Convert any subject into collectible equipment-like icons with crisp outer contours and modular tech segmentation.
  color_and_tone: Gunmetal neutrals, cold blue emissive accents, rarity-color trims, and strong dark-to-light material ramps.
  lighting_and_shadow: Small studio-like icon lighting, bevel highlights, contact shadow pads, and controlled emissive glows.
  texture_and_material: Brushed metal pixels, panel seams, carbon texture hints, tiny bolts, and readable material swatches.
  camera_and_composition: Centered three-quarter icon framing, transparent background, equal padding, and atlas-consistent scale.
  atmosphere_and_mood: Tactical, collectible, high-tech mood without requiring guns, ammo, soldiers, or shooter scenes.
  rendering_and_quality: Icon-pack friendly, sharp thumbnail readability, transparent-background safe, no labels.
avoidRules:
  - motion blur
  - inconsistent proportions
  - changing costume
  - background scene
  - gun requirement
  - soldier requirement
  - watermark
  - text
