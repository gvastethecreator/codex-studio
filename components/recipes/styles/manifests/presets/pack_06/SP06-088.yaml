visualDna:
  aesthetic: >-
    PlayStation 1 aesthetic, vertex-warble jittering polygons, affine texture swim, unfiltered chunky
    textures, dithering-haze distance fog, Silent Hill grain-and-gloom and Metal Gear Solid low-poly intensity
    as tone anchors, no z-buffer precision, 1995 3D instability
  subject_treatment: >-
    Low-poly triangulated mesh, wobbling vertices on camera move, no sub-pixel precision, chunky model
    contours, affine-mapped edges
  color_and_tone: >-
    16-bit color depth banding, dither-pattern gradients, PSX texture-page compression colors, distance-fog
    greying, CRT-emulated chroma bleed
  lighting_and_shadow: >-
    Per-vertex gouraud shading, no per-pixel lights, dither-stepped shadow transitions, distance-fog
    atmosphere, no realtime shadows
  texture_and_material: >-
    Unfiltered nearest-neighbor textures, polygon-warp texture swim, dithering gradient noise,
    affine-distorted texels, scanline artifact overlay
  camera_and_composition: >-
    Jitter-vertex polygon warping, z-fighting flicker, affine-perspective distortion, distance-fog depth
    compression
  atmosphere_and_mood: >-
    Eerie, nostalgic, technological-limitation beauty, 90s-3D uncanny poetry, CRT-warmth glow, abstract
    low-poly unease
  rendering_and_quality: PlayStation 1 aesthetic, 32-bit console 3D, retro-CGI wobble poetry, beautiful instability
  key_features: >-
    Vertex wobble jitter, unfiltered chunky textures, dithering gradient bands, affine texture warping,
    distance-fog atmosphere, z-fighting flicker
  creative_brief: >-
    Polygons wobble and swim, vertices jittering with mathematical imprecision. Any subject is reduced to
    unstable low-poly planes, warped texels, dithered fog and z-fighting flicker, making technical failure
    feel like visual personality.
