  creative_brief: The image dissolves into dots at close range, a matrix of black circles that achieve grey through spacing, not dilution. Newsprint absorbs ink greedily, cheap paper already yellowing toward oblivion. The style should feel mass-reproduced, urgent, and degraded without requiring headlines, captions, or newspaper layout.
