  creative_brief: Iron salts sensitize paper to ultraviolet light, turning Prussian blue where exposure reaches and leaving white where matter interrupts it. The image is a photogram logic, a direct impression of blocked light, science indistinguishable from art. The style should feel exposed, rinsed, monochrome, and materially tied to light.
