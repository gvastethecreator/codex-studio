visualDna:
  aesthetic: Pinned planning-board style with layered intent, thread logic, soft cork texture, and provisional composition
  form_and_line: Pins, string
  color_palette: Varied
  lighting_setup: Room light
  material_texture: Cork, paper
  render_quality: Personal, planning
  spatial_distortion: None
  atmosphere: Hopeful, messy
  key_features: Pinned items
  creative_brief: >-
    Cork-like texture, pins, tape, and thread create a provisional planning surface where relationships matter more than
    individual fragments. Lines connect zones, clusters imply priority, and empty gaps become part of the system. Keep
    the style about visible planning grammar, not wishes, clippings, conspiracy walls, or readable goals. Apply this
    mixed-media process over any input: preserve material assembly, edge evidence, surface treatment, layering logic,
    and handmade artifacts while avoiding required clippings, readable text, boards, fire, studio setup, or literal
    craft-table scene.
