  creative_brief: Parallel lines never converge, perspective abandoned for a geometry where every plane receives equal attention. The subject tilts thirty degrees, revealing itself as a diorama-like construction with clean dimensional logic. Distance is measured in grid cells and stacked planes, not vanishing points or literal worlds.
