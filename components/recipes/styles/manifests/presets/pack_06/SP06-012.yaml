visualDna:
  aesthetic: Aerosol paint style with stencil drift, overspray halos, and bold graphic immediacy
  form_and_line: Soft spray edges, drips
  color_palette: Neon, vibrant, aerosol
  lighting_setup: Flat graphic light with sprayed edge bloom and high-contrast color hits
  material_texture: Aerosol mist, layered overspray, drips, stencil ghosts, and rough receptive surface grain
  render_quality: Raw, high-impact, wall-scale paint language without requiring a wall or city scene
  spatial_distortion: Stylized forms
  atmosphere: Urgent, improvised, graphic
  key_features: Spray texture
  creative_brief: Aerosol mist feathers beyond every edge, creating halos that feel fast, public, and impossible to fully control. Stencil logic, drips, and layered color clouds turn any subject into a graphic act of pressure and release. The mark should feel immediate and risky without requiring walls, streets, tags, or readable lettering.
