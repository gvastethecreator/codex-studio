  aesthetic: Chalk drawing on dark receptive ground with dusty reversal and temporary surface energy
  form_and_line: Dusty white lines
  color_palette: White on Black/Green
  lighting_setup: Flat
  material_texture: Slate-like tooth, chalk dust, ghost erasure, and powder buildup
  render_quality: Temporary hand-drawn clarity with high contrast and rough tactile edges
  spatial_distortion: Rough
  atmosphere: Rustic, temporary, handmade
  key_features: Dusty lines
  creative_brief: Calcium carbonate dust clings to dark tooth, every line a temporary claim destined for erasure. White on black reverses the natural order, light emerging from darkness through powder and pressure. The drawing should feel provisional and handmade without requiring menus, classrooms, boards, or written notes.
