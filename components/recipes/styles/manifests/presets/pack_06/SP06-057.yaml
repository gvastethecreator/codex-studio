  creative_brief: Two visual systems occupy the same frame, one visible through the contours or tonal mask of the other. Interior and exterior logic collapse into one exposure, holding contradiction as composition rather than narrative. Meaning emerges from overlap, transparency, and negative space without requiring faces, forests, mountains, or human profiles.
