  creative_brief: Broken color vibrates at the edge of perception, demanding the eye complete what the brush merely suggested. Light becomes the true subject, dissolving hard boundaries into shimmering dabs of pure sensation. The image feels painted from perception rather than description, all atmosphere and optical afterimage.
