visualDna:
  aesthetic: Monet style impressionism
  subject_treatment: Short, broken brushstrokes
  color_and_tone: Vibrant, unblended optical mixing
  lighting_and_shadow: Perceptual light built from broken color, luminous edges, and warm-cool vibration
  texture_and_material: Thick paint dabs
  camera_and_composition: Loss of detail
  atmosphere_and_mood: Light, airy, fleeting
  rendering_and_quality: Optical impressionist finish with loose local detail and high color vibration
  key_features: Dabbed paint texture
  creative_brief: >-
    Apply impressionist oil perception to any input: broken color dabs, optical mixing, shimmering light,
    softened contours, quick visible strokes, and atmospheric afterimage. Keep perception-first painting
    without requiring gardens, riverbanks, dancers, plein-air landscapes, or period scenes.
