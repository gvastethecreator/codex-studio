visualDna:
  aesthetic: Trash-polka graphic collision style with black realism shards, red vector strikes, and splatter tension
  subject_treatment: Realistic vs graphic
  color_and_tone: Black, Grey, Red
  lighting_and_shadow: High contrast
  texture_and_material: Ink, splatter
  camera_and_composition: Collage
  atmosphere_and_mood: Intense, chaotic
  rendering_and_quality: Aggressive, modern
  key_features: Red and Black
  creative_brief: >-
    Black ink and red accents dominate a world where realistic fragments collide with graphic abstraction.
    Splatter, smear, stencil, and hard typography-like blocks share one aggressive composition without
    requiring skin, tattoos, arms, blood, or readable lettering. The style should feel dangerous through
    contrast and collision, not gore.
