visualDna:
  aesthetic: Acrylic strokes on photo
  subject_treatment: Brush strokes
  color_and_tone: Photo + Paint
  lighting_and_shadow: Mixed
  texture_and_material: Paint texture
  camera_and_composition: Obscured details
  atmosphere_and_mood: Abstracted reality
  rendering_and_quality: Expressive overpainted-print finish with smeared opacity and obscured detail
  key_features: Smeared paint
  creative_brief: >-
    Thick acrylic strokes drag across an existing image surface, obscuring and revealing in the same gesture,
    paint acting as both veil and window. The brush risks the base layer through smear, opacity, and
    interruption. The image lives in friction between printed certainty and applied gesture, without requiring
    photographic realism.
