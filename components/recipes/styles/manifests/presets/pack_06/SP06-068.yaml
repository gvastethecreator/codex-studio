visualDna:
  aesthetic: Xerox zine reproduction style with crushed contrast, toner grain, and DIY assembly artifacts
  subject_treatment: High contrast, grainy
  color_and_tone: Black and White
  lighting_and_shadow: Xerox flash
  texture_and_material: Toner, tape
  camera_and_composition: Rough cuts
  atmosphere_and_mood: Raw, underground
  rendering_and_quality: DIY, punk
  key_features: Xerox grain
  creative_brief: >-
    Photocopy logic flattens everything into high-contrast grain, shadows becoming solid black, highlights
    burning to paper white. Toner dust, tape shadows, rough crop edges, and repeated-copy degradation become
    the aesthetic. The image lives in reproduction, without requiring booklets, staples, pages, text, or punk
    slogans.
