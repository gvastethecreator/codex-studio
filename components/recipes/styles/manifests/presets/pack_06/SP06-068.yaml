visualDna:
  aesthetic: Xerox zine reproduction style with crushed contrast, toner grain, and DIY assembly artifacts
  form_and_line: High contrast, grainy
  color_palette: Black and White
  lighting_setup: Xerox flash
  material_texture: Toner, tape
  render_quality: DIY, punk
  spatial_distortion: Rough cuts
  atmosphere: Raw, underground
  key_features: Xerox grain
  creative_brief: Photocopy logic flattens everything into high-contrast grain, shadows becoming solid black, highlights burning to paper white. Toner dust, tape shadows, rough crop edges, and repeated-copy degradation become the aesthetic. The image lives in reproduction, without requiring booklets, staples, pages, text, or punk slogans.
