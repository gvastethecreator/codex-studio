visualDna:
  aesthetic: ASCII-density image style built from monospaced glyph fields and terminal-era tonal logic
  form_and_line: Repeating keyboard glyphs used as value cells, line clusters, and contour-density bands
  color_palette: Monochrome green/black
  lighting_setup: Density based
  material_texture: Text grid
  render_quality: Retro, hacker
  spatial_distortion: Low res
  atmosphere: Tech, code
  key_features: Glyph density image, monospaced grid, terminal glow
  creative_brief: Characters from the ASCII set assemble into image through density and contrast, each glyph functioning as a pixel-value decision. The image exists as symbol field and picture at once, but it should avoid readable words, captions, signatures, or logos. Every keystroke builds form from limited geometry and terminal-era constraint.
