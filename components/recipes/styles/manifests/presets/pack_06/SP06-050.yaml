visualDna:
  aesthetic: 16-bit pixel-art style with deliberate grid economy and palette-ramp readability
  subject_treatment: Pixel perfect
  color_and_tone: Limited palette
  lighting_and_shadow: Dithered
  texture_and_material: Pixel grid
  camera_and_composition: Blocky
  atmosphere_and_mood: Nostalgic
  rendering_and_quality: Retro game-art finish without requiring sprites, characters, cartridges, or UI
  key_features: Grid alignment
  creative_brief: >-
    Apply 16-bit pixel-art constraints to any input: intentional pixel placement, limited palette, crisp grid
    scale, dithered shade ramps, tile rhythm, and hard aliasing. Keep hardware-era nostalgia from
    construction, not from forced game props, HUDs, sprites, or level scenes.
