visualDna:
  aesthetic: Analog cut-paper collage with visible seams, mismatched print sources, and deliberate fragment tension
  form_and_line: Scissor cuts
  color_palette: Vintage print fragments, mismatched ink ages, and clashing CMYK residues
  lighting_setup: Inconsistent
  material_texture: Paper, glue
  render_quality: Dada, punk
  spatial_distortion: Disjointed
  atmosphere: Chaotic, surreal
  key_features: Cutout edges
  creative_brief: >-
    Scissor cuts interrupt source material, reassembling fragments into a visual logic the originals never intended.
    Glue shows at the edges, paper types clash, perspectives collide — the seams are the point. The image makes meaning
    through juxtaposition, with gaps, scale jumps, and cut edges doing the expressive work. Apply this mixed-media
    process over any input: preserve material assembly, edge evidence, surface treatment, layering logic, and handmade
    artifacts while avoiding required clippings, readable text, boards, fire, studio setup, or literal craft-table
    scene.
