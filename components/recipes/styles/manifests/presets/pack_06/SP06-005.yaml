visualDna:
  aesthetic: Renaissance egg tempera
  subject_treatment: Fine cross-hatching strokes
  color_and_tone: Bright, pure pigments, gold leaf
  lighting_and_shadow: Soft, internal glow
  texture_and_material: Wood panel, smooth gesso
  camera_and_composition: Flattened icon-plane depth, deliberate frontality, and fine linear modeling
  atmosphere_and_mood: Reverent, ancient, luminous through craft rather than narrative content
  rendering_and_quality: Historical panel-painting discipline with devotional precision but no mandatory subject
  key_features: Fine linear brushwork
  creative_brief: >-
    Apply egg-tempera discipline to any input: luminous thin pigment, fine cross-hatched modeling, crisp small
    strokes, panel-like permanence, and restrained inner glow. Keep sacred-craft precision as technique, not
    as required religious icon, portrait, gold ground, or medieval subject.
