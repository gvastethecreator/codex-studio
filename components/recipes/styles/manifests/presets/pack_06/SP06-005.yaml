  aesthetic: Renaissance egg tempera
  form_and_line: Fine cross-hatching strokes
  color_palette: Bright, pure pigments, gold leaf
  lighting_setup: Soft, internal glow
  material_texture: Wood panel, smooth gesso
  render_quality: Historical panel-painting discipline with devotional precision but no mandatory subject
  spatial_distortion: Flattened icon-plane depth, deliberate frontality, and fine linear modeling
  atmosphere: Reverent, ancient, luminous through craft rather than narrative content
  key_features: Fine linear brushwork
  creative_brief: >-
    Apply egg-tempera discipline to any input: luminous thin pigment, fine
    cross-hatched modeling, crisp small strokes, panel-like permanence, and
    restrained inner glow. Keep sacred-craft precision as technique, not as
    required religious icon, portrait, gold ground, or medieval subject.
