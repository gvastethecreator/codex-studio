visualDna:
  aesthetic: Stealth-game art direction with readable shadow zones, cool surveillance mood, and silent tactical composition.
  subject_treatment: Break any subject into concealment-ready silhouettes, light-safe edges, and readable exposure states.
  color_and_tone: Blue-black shadows, sodium or cyan guard-light accents, desaturated mids, and sharp visibility contrast.
  lighting_and_shadow: Hard pools of detection light, broad occluding darkness, rim hints, and value-coded safe/danger zones.
  texture_and_material: Damp concrete-like roughness, soft bloom in lit areas, subtle grain, and minimal shiny distractions.
  camera_and_composition: Oblique surveillance framing, strong occluder shapes, path-like negative space, and clear stealth lanes.
  atmosphere_and_mood: Suspenseful, quiet, covert mood without requiring rooftops, cities, guards, weapons, or night exteriors.
  rendering_and_quality: Game-readable lighting design, clean silhouette hierarchy, no UI markers or readable text.
avoidRules:
  - watermark
  - text
  - literal rooftop requirement
  - guard requirement
  - weapon requirement
