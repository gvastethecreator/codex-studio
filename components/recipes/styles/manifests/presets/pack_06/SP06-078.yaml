  lighting_and_shadow: Reflective
  texture_and_material: Metal foil, cracks
  camera_and_composition: Flat gold areas
  atmosphere_and_mood: Rich, ornamental
  rendering_and_quality: Ornamental gilded finish with metallic leaf behavior and decorative flatness
  key_features: Metallic shine
  creative_brief: >-
    Gold leaf adheres with breathlike delicacy, the slightest air current threatening to fold the foil into
    oblivion. The metal catches light and throws it back as radiance, an active source rather than passive
    surface. The image should feel precious through material reflectivity and ornament, not through any fixed
    subject. Apply this mixed-media process over any input: preserve material assembly, edge evidence, surface
    treatment, layering logic, and handmade artifacts while avoiding required clippings, readable text,
    boards, fire, studio setup, or literal craft-table scene.
