visualDna:
  aesthetic: High-gloss polymer couture, reflective power dressing and lacquered futurism.
  subject_treatment: Broad reflective panels, clean seam routing, sculpted garment planes and continuous glossy wrapping.
  color_and_tone: Black shiny, blood-red, midnight purple, liquid-mercury, rubber-white, patent-bordeaux
  lighting_and_shadow: High contrast reflection, rim-light gloss, controlled strip catchlights and wet-look sheen.
  texture_and_material: Lacquered polymer, polished PVC, patent leather, chlorinated rubber and slick sealant finish.
  camera_and_composition: Reflection-bend compression across broad glossy planes.
  atmosphere_and_mood: Intense, sleek, mirror-shine confidence and lacquered edge without fetish framing.
  rendering_and_quality: Shiny, edgy high-polish couture with material reflection precision.
  key_features: Reflections, crease-free tension, zip-line cues, seam articulation and high-shine polish.
  creative_brief: >-
    Coat the input in high-gloss polymer logic: seamless reflection, broad glossy panels, zip-line detailing,
    seam articulation and strip-light catchlights. Preserve power-dressing intensity without club setting,
    fetish-coded framing, second-skin portrait, body-first silhouette or wet-look body emphasis.
avoidRules:
  - matte
  - cotton
  - fetish framing
  - body-first silhouette
