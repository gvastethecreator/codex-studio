visualDna:
  aesthetic: High-gloss polymer couture, reflective power dressing and lacquered futurism.
  form_and_line: Broad reflective panels, clean seam routing, sculpted garment planes and continuous glossy wrapping.
  color_palette: Black shiny, blood-red, midnight purple, liquid-mercury, rubber-white, patent-bordeaux
  lighting_setup: High contrast reflection, rim-light gloss, studio-strip catchlights and controlled wet-look sheen.
  material_texture: Lacquered polymer, polished PVC, patent leather, chlorinated rubber and slick sealant finish.
  render_quality: Shiny, edgy high-polish couture with material reflection precision.
  spatial_distortion: Reflection-bend compression across broad glossy planes.
  atmosphere: Intense, sleek, mirror-shine confidence and lacquered edge without fetish framing.
  key_features: Reflections, crease-free tension, zip-line cues, seam articulation and high-shine polish.
  creative_brief: >-
    Coat the input in high-gloss polymer logic: seamless reflection, broad glossy panels, zip-line detailing,
    seam articulation and strip-light catchlights. Preserve power-dressing intensity without club setting,
    fetish-coded framing, second-skin portrait, body-first silhouette or wet-look body emphasis.
avoidRules:
