    Razor-clean contours, ribboned motion trails, patterned shape blocks, ceremonial pauses, and breath-synced
    flow lines.
  color_and_tone: Lantern amber, winter blue, blood crimson, charcoal black, snow white, and vivid elemental accent tones.
  lighting_and_shadow: Warm lantern glow against cold mist, precise rim cuts, soft memory bloom, and explosive arc highlights.
  texture_and_material: Woven pattern grain, ink-wash mist, polished cel edges, snowlike particles, and luminous breath trails.
  camera_and_composition: Curved slash-space, breath-expanded depth, and choreographic foreshortening that frames motion as dance.
  atmosphere_and_mood: Heroic, tragic, elegant, intense
  rendering_and_quality: Premium modern anime action polish with ornamental clarity, emotional pauses, and fluid arc readability.
