  color_palette: Concrete gray, rain black, cold cyan, corpse white, muted violet, and faint sodium amber.
  lighting_setup: Funereal top light, wet reflections, distant industrial glow, and minimal rim cuts against oppressive shadow.
  material_texture: Rain-dark concrete, matte black fabric, oxidized metal, glass streaks, and low-grain digital polish.
  render_quality: High-detail cyber-goth anime finish with bleak restraint, architectural dread, and precise silence.
  spatial_distortion: Vast empty planes, oppressive verticals, and isolation framing that makes consciousness feel trapped.
