visualDna:
  aesthetic: >-
    Cyber-goth anime dread with abandoned modernism, concrete emptiness, rain-dark reflection, black
    silhouette severity, and personhood anxiety
  subject_treatment: Severe black silhouettes, brutalist negative space, rigid contour restraint, and philosophical stillness.
  color_and_tone: Concrete gray, rain black, cold cyan, corpse white, muted violet, and faint sodium amber.
  lighting_and_shadow: >-
    Funereal top light, wet reflections, distant industrial glow, and minimal rim cuts against oppressive
    shadow.
  texture_and_material: Rain-dark concrete, matte black fabric, oxidized metal, glass streaks, and low-grain digital polish.
  camera_and_composition: Vast empty planes, oppressive verticals, and isolation framing that makes consciousness feel trapped.
  atmosphere_and_mood: Bleak, cerebral, cool, funereal
  rendering_and_quality: High-detail cyber-goth anime finish with bleak restraint, architectural dread, and precise silence.
  key_features: >-
    Concrete voids, rain reflection, black silhouettes, cold self-awareness, abandoned modernism, and
    mausoleum stillness
  creative_brief: >-
    Use Ergo Proxy as style anchor for cyber-goth mausoleum dread. Any prompt should become empty, rain-dark,
    severe, and philosophically uncertain. Androids, domes, cities, processions, and human figures are
    optional.
