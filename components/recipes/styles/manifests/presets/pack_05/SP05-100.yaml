visualDna:
  aesthetic: Dungeon-lantern adventure style, with luminous aspiration, layered depth, mythic growth, and warm light against unknown dark.
  form_and_line: Upward-leading contours, lanternlike glow halos, tiered depth bands, clean fantasy detail, and heroic small-scale emphasis.
  color_palette: Lantern gold, crystal blue, deep cavern teal, warm leather brown, divine white, and hopeful rose accents.
  lighting_setup: Portable warm glow, crystalline bounce, darkness-to-light gradients, and vertical rays that imply ascent.
  material_texture: Faceted crystal shimmer, rough mineral grain, worn cloth, soft leather, and luminous dust.
  render_quality: Luminous fantasy anime polish with aspirational clarity, readable depth, and gentle mythic sparkle.
  spatial_distortion: Layered descent-as-ascent geometry, vertical pull, and darkness shaped by warm focal light.
  atmosphere: Adventurous, luminous, mythic, aspirational.
  key_features: Lantern warmth, crystal depth, aspirational darkness, vertical growth, mythic smallness.
  creative_brief: >-
    Make any prompt feel like light earning its way upward: use warm focal glow,
    mineral sparkle, and layered darkness to imply aspiration without requiring
    a fixed underground location, faction system, or specific artifact.
