visualDna:
  aesthetic: Fluid psychedelic tragedy, with elastic deformation, neon collapse, raw youth panic, and ecstatic horror color.
  form_and_line: Liquefied contours, rubbery distortion, broken silhouette rhythm, smear-heavy transitions, and unstable expressive anatomy.
  color_palette: Acid magenta, toxic cyan, bruised violet, hot red, blacklight blue, and dirty flesh neutrals.
  lighting_setup: Club-neon bleed, strobing color fields, overexposed emotional peaks, and hard underlight for panic surges.
  material_texture: Wet ink smear, digital grain, oily bloom, rough cel edges, and visceral color mixing without literal gore dependence.
  render_quality: Experimental anime finish with controlled chaos, readable deformation, and high-emotion psychedelic motion.
  spatial_distortion: Bodies, space, and perspective stretch together as emotion overload bends the frame.
  atmosphere: Psychedelic, tragic, devastating, neon-drenched.
  key_features: Elastic metamorphosis, neon tragedy, blacklight horror, raw deformation, ecstatic collapse.
  creative_brief: >-
    Apply neon tragic metamorphosis as a transferable visual treatment:
    dissolve stable form, push color into blacklight panic, and make any prompt
    feel emotionally overloaded without requiring a fixed horror event or
    location.
