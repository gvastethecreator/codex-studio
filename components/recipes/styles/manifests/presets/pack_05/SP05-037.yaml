visualDna:
  aesthetic: Satirical overpowered action style combining premium destruction spectacle with deadpan comedic detachment
  form_and_line: >-
    Hyper-clean impact silhouettes, minimal-expression face grammar, explosive contour bursts, freeze-frame punchline
    timing lines
  color_palette: >-
    Catastrophic contrast spikes over neutral comedic anchors, high-energy effect chroma with deliberate flat reaction
    zones
  lighting_setup: >-
    Blockbuster blast illumination paired with calm portrait lighting for reaction shots, emphasizing
    joke-through-contrast
  material_texture: >-
    Crisp debris effects, polished impact particles, low-noise digital surfaces, comic-clean compositing with theatrical
    clarity
  render_quality: >-
    Top-tier action animation polish intentionally juxtaposed with anti-dramatic character stillness and visual
    punchline control
  spatial_distortion: Extreme impact foreshortening alternating with static deadpan framing to maximize comedic dissonance
  atmosphere: Absurd, overpowering, ironic, explosive, stoic
  key_features: Spectacle-vs-deadpan duality, overkill impact staging, minimal-reaction comedy rhythm, freeze-frame gag mechanics
  creative_brief: >-
    The style should read as high-budget action satire: catastrophic impact grammar contrasted with emotionally flat
    reaction framing, making comedic dissonance the transferable core. Apply this anime/IP-title grammar over any input:
    preserve its motion language, line economy, emotional staging, palette logic, and symbolic cues while avoiding a
    required cast, lore event, weapon, arena, school, ship, or fixed scene.
