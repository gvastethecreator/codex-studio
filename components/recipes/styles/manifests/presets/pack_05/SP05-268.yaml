visualDna:
  aesthetic: >-
    Neon despair pressure, fluorescent sweat, jagged adult-anime caricature, impossible financial tension,
    ruin made graphic and unflattering
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Fluorescent sweat sheen, cheap plastic glare, damp paper texture, sticky surface gloss, rough skin grain,
    stale air haze
  camera_and_composition: >-
    Pressure-cooker close-ups, jagged facial exaggeration, claustrophobic negative space, tilted risk
    geometry, collapse-edge framing
  atmosphere_and_mood: Desperate, electric, ugly, suspenseful
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: >-
    Sweat-heavy close-ups, fluorescent pressure, jagged anxious silhouettes, risk-geometry distortion,
    brink-of-collapse acting
  creative_brief: >-
    Treat any prompt as a pressure chamber of debt, shame, and impossible stakes: fluorescent sweat, jagged
    exaggeration, tilted geometry, and ugly honesty should define the look without fixed surfaces, play
    structures, settings, currency props, or named competition.
