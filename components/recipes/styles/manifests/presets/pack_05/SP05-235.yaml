visualDna:
  aesthetic: >-
    Eighties pop-cyber rebellion with glossy nocturnal surfaces, media holography, youth freedom
    pressure, and concealed simulation unease
  form_and_line: >-
    Diseño aerodinámico, siluetas juveniles estilizadas y geometría urbana de cartelería
    holográfica.
  color_palette: >-
    Magenta neón, azul eléctrico, negro asfalto, cromo rosado y violeta sintético de videoclub
    futurista.
  lighting_setup: Reflejos húmedos, signage holográfico pulsante y highlights de vitrina nocturna.
  material_texture: Cuero brillante, plástico translúcido, cromo pulido, lluvia fina y granulado retro de pantalla.
  render_quality: Retrofuturo anime de acabado glossy con energía urbana y legibilidad de diseño pop.
  spatial_distortion: Profundidad de corredor luminoso con fuga alta velocidad y capas de publicidad simulada.
  atmosphere: Seductora, rebelde y revelatoria, con falsedad sistémica bajo glamour.
  key_features: >-
    Pop-cyber glamour, media holography, glossy escape lines, retro fashion light, simulation
    signals, and nocturnal synthetic shine
  creative_brief: >-
    Use Megazone 23 as style anchor for pop-cyber simulation gloss. Any prompt should feel glossy,
    free, mediated, and secretly synthetic. Highways, vehicles, idols, city nights, screens, and
    chase scenes are optional.
