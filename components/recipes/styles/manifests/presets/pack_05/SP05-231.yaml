visualDna:
  aesthetic: >-
    Metaphysical bio-mechanical opera with coral tectonics, sonic symbolism, sacred scale, and
    melancholic ritual structure
  form_and_line: >-
    Silueta biomecánica orgánico-mecánica, panelado litúrgico y curvas de coral acopladas a aristas
    ceremoniales.
  color_palette: >-
    Azul abisal y cobalto litúrgico con acentos coral rojo, blanco sacramental y negro de vacío
    acuoso.
  lighting_setup: >-
    Halo ceremonial azul, contraluces de barrera urbana y destellos resonantes sincronizados al
    motivo musical.
  material_texture: >-
    Carcasa nacarada, estrías coralinas, metal húmedo, pátina salina y superficies de energía
    translúcida.
  render_quality: Alta definición simbólica con legibilidad de iconografía sacra y dramatismo de escala operática.
  spatial_distortion: >-
    Profundidad ceremonial con compresión axial hacia el ícono central y perspectiva de himno
    visual.
  atmosphere: Sagrada, enigmática y doliente, como himno visual en cámara lenta.
  key_features: >-
    Coral biomechanical forms, alien blue, sonic geometry, liturgical scale, resonant symmetry, and
    sacred machine melancholy
  creative_brief: >-
    Use RahXephon as style anchor for coral resonance liturgy. Any prompt should feel biotectonic,
    musical, sacred, and monumental. Mecha, cities, temples, entities, battles, and musical props
    are optional.
