visualDna:
  aesthetic: Ópera mecha metafísica con imaginería coral, simbolismo sonoro y melancolía ritual en escala de ciudad-santuario.
  form_and_line: Silueta biomecánica orgánico-mecánica, panelado litúrgico y curvas de coral acopladas a aristas de armadura.
  color_palette: Azul abisal y cobalto litúrgico con acentos coral rojo, blanco sacramental y negro de vacío acuoso.
  lighting_setup: Halo ceremonial azul, contraluces de barrera urbana y destellos resonantes sincronizados al motivo musical.
  material_texture: Carcasa nacarada, estrías coralinas, metal húmedo, pátina salina y superficies de energía translúcida.
  render_quality: Alta definición simbólica con legibilidad de iconografía sacra y dramatismo de escala operática.
  spatial_distortion: Profundidad ceremonial con compresión axial hacia el ícono central y perspectiva de himno visual.
  atmosphere: Sagrada, enigmática y doliente, como himno de guerra en cámara lenta.
  key_features: Mecha coral, sangre azul alienígena, motivos musicales geométricos y combate tratado como liturgia.
  creative_brief: >-
    Define una gramática mecha-liturgy reusable donde biotectónica coral,
    resonancia musical y monumentalidad sacra articulen la identidad sin
    depender de una escena puntual.
