  color_palette: Hyper-saturated emotional spikes over neutral calm fields, abrupt neon surges, and cathartic chroma inversions
  lighting_setup: Unstable luminance pulses, aura bloom surges, and expression-tied exposure shifts that mirror emotional escalation
  material_texture: Crayon-like edge noise, sketch grain overlays, painterly smear accents, and cel-polish broken by raw marks
  render_quality: Stylized high-energy rendering that keeps rough expressive artifacts intentionally visible as part of the finish
  spatial_distortion: Emotion-driven perspective warping and psychic blast deformation with elastic frame pressure
  atmosphere: Cathartic, unstable, empathetic, surreal, explosive
