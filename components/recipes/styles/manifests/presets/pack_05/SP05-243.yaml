visualDna:
  aesthetic: Grandilocuencia OVA de fantasy clásico, sinceridad tabletop, nobleza heroica y aventura coral como composición atemporal.
  form_and_line: Contorno elegante tradicional, ornamento clásico visible, composición frontal tipo tapiz y jerarquía coral.
  color_palette: Zafiro profundo, oro heráldico, rojo estandarte, marfil de pergamino y verde épico.
  lighting_setup: Fondo pictórico luminoso, key cálido de amanecer abstracto y rim heroico en superficies pulidas.
  material_texture: Malla decorativa, textiles bordados, piedra antigua, cuero noble y escamas ornamentales.
  render_quality: Acabado clásico de fantasía ilustrada con lectura mítica y belleza de cuadro aventurero.
  spatial_distortion: Escala heroica tradicional, profundidad amplia y staging de formación coral.
  atmosphere: Mítica, noble y aspiracional, con pureza de aventura antigua.
  key_features: Formación coral, brillo noble, fondos pintados, tapiz épico y códigos visuales de aventura clásica.
  creative_brief: >-
    Define una gramática OVA-quest reusable donde ornamento clásico, composición
    coral y romanticismo aventurero conserven épica sincera sin grupo fijo,
    protección obligatoria, paisaje concreto, campaña o misión narrativa.
