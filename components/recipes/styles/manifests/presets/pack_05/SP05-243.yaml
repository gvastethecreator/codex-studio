visualDna:
  aesthetic: Grandilocuencia OVA de fantasy clásico, con sinceridad tabletop y nobleza heroica de aventura coral.
  form_and_line: Contorno elegante tradicional, ornamento medieval visible y composición de party frontal tipo póster de campaña.
  color_palette: Zafiro profundo, oro heráldico, rojo estandarte, marfil de pergamino y verde bosque épico.
  lighting_setup: Cielo pictórico luminoso, key cálido de amanecer de quest y rim heroico en armadura pulida.
  material_texture: Cota de malla brillante, estandartes bordados, piedra antigua, cuero noble y escamas dracónicas decorativas.
  render_quality: Acabado clásico de fantasía ilustrada con lectura mítica y belleza de cuadro aventurero.
  spatial_distortion: Escala heroica tradicional, profundidad de paisaje amplio y staging de formación de grupo.
  atmosphere: Mítica, noble y aspiracional, con pureza de aventura antigua.
  key_features: Formación de party, armadura reluciente, cielos pintados y códigos visuales de campaña épica.
  creative_brief: >-
    Define una gramática OVA-quest reusable donde iconografía medieval clásica,
    composición de grupo y romanticismo aventurero conserven una épica sincera
    y atemporal.
