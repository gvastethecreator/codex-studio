visualDna:
  aesthetic: Remote conflict grief, cold command logic, adolescent vulnerability under systems pressure, and disciplined tragedy.
  form_and_line: Hard-edged tactical linework, thin command vectors, segmented armor-like shapes, restrained faces, and precise formation spacing.
  color_palette: Ash gray, military olive, cold screen blue, muted rust, black graphite, and restrained red warning accents.
  lighting_setup: Cold monitor glow, smoke-softened daylight, minimal rim light, command-screen blue wash, and low-contrast grief shadows.
  material_texture: Matte plating, fabric grit, dusty optics, chipped edge paint, worn interface glass, and dry particulate haze.
  render_quality: Premium tactical anime rendering with sober clarity, controlled detail density, and emotional restraint under pressure.
  spatial_distortion: Remote-control framing, compressed command depth, map-like overlays, and emotional distance between subject layers.
  atmosphere: Tragic, disciplined, somber, remote
  key_features: Cold command overlays, muted tactical palette, grief distance, hard-edged systems pressure, and restrained emotional damage.
  creative_brief: >-
    Apply remote conflict grief as a reusable style treatment: make any subject
    feel controlled from afar, disciplined, young, and emotionally burdened while
    staying abstract, portable, and detached from fixed transport forms, roles,
    rooms, props, or conflict scenes.
