visualDna:
  aesthetic: Romance ocultista doméstico, ternura ritual, extrañeza feérica, hueso/musgo como materialidad y misterio afectivo.
  form_and_line: Contorno delicado de cuento gótico, curvas botánicas, siluetas extrañas abstractas y detalle íntimo de rito cotidiano.
  color_palette: Verde musgo, crema té, marrón madera húmeda, negro hueso y dorado tenue de lámpara.
  lighting_setup: Luz de atardecer filtrada, velas bajas y brillos mágicos discretos de escala íntima.
  material_texture: Piedra húmeda, madera antigua, porcelana, pergamino arcano y fibras vegetales vivas.
  render_quality: Fantasía íntima de alta atmósfera con microdetalle doméstico y pulsación sobrenatural sutil.
  spatial_distortion: Acogimiento comprimido, profundidad íntima, escala humana y foco suave sobre ritualidad cotidiana.
  atmosphere: Encantada, melancólica y cálida, con inquietud amorosa latente.
  key_features: Talismán óseo abstracto, musgo, luz cálida, botánica ritual, folklore feérico y delicadeza gótica.
  creative_brief: >-
    Define una gramática thorn-cottage reusable donde domesticidad ritual,
    naturaleza encantada y misterio afectivo convivan con libertad de sujeto, sin
    exigir vivienda, interior, rol mágico, pasaje o rito literal.
