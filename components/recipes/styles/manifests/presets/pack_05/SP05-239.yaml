visualDna:
  aesthetic: >-
    Pop-cosmic anime exuberance where scale elasticity, saturated color, impossible spectacle, and
    hidden sentiment collide
  form_and_line: >-
    Líneas dinámicas estilizadas, poses expansivas, anatomía de acción expresiva no literal y curvas
    pop de alto impulso.
  color_palette: Rosa bubblegum, azul eléctrico, amarillo solar, violeta espacial y blanco de flare emocional.
  lighting_setup: >-
    Resplandores cósmicos saturados, contraluces de explosión y gradientes pop de alto impacto
    cromático.
  material_texture: >-
    Superficie brillante cartoon-tech, bloom de energía, trazas de velocidad y detalles técnicos
    simplificados.
  render_quality: >-
    Espectáculo anime de escala mutable con lectura pop inmediata y dramatismo afectivo debajo del
    caos.
  spatial_distortion: >-
    Warps de tamaño, perspectiva juguetona y composición que alterna micro y macro en el mismo
    frame.
  atmosphere: Exultante, extraña y conmovedora, de caos colorido con corazón.
  key_features: >-
    Saturated pop color, mutable scale, youthful energy, impossible spectacle, elastic geometry, and
    heart under chromatic chaos
  creative_brief: >-
    Use bubblegum cosmic overdrive as elastic-pop scale grammar. Any prompt should feel huge,
    joyful, impossible, and secretly sincere. Machines, pilots, galaxies, roles, and fixed
    worldbuilding are optional.
