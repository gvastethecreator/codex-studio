visualDna:
  aesthetic: Exuberancia pop-cósmica, elasticidad de escala, energía juvenil abstracta y sentimentalidad escondida bajo espectáculo imposible.
  form_and_line: Líneas dinámicas estilizadas, poses expansivas, anatomía de acción expresiva no literal y curvas pop de alto impulso.
  color_palette: Rosa bubblegum, azul eléctrico, amarillo solar, violeta espacial y blanco de flare emocional.
  lighting_setup: Resplandores cósmicos saturados, contraluces de explosión y gradientes pop de alto impacto cromático.
  material_texture: Superficie brillante cartoon-tech, bloom de energía, trazas de velocidad y detalles técnicos simplificados.
  render_quality: Espectáculo anime de escala mutable con lectura pop inmediata y dramatismo afectivo debajo del caos.
  spatial_distortion: Warps de tamaño, perspectiva juguetona y composición que alterna micro y macro en el mismo frame.
  atmosphere: Exultante, extraña y conmovedora, de caos colorido con corazón.
  key_features: Pop saturado, escala mutable, energía juvenil abstracta, espectáculo desmedido y corazón bajo caos cromático.
  creative_brief: >-
    Construye una gramática bubblegum-overdrive reusable donde color explosivo,
    elasticidad escalar y emoción juvenil convivan sin máquinas específicas,
    roles fijos, worldbuilding literal o espectáculo narrativo fijo.
