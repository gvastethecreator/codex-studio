visualDna:
  aesthetic: Hyper-saturated strategy fantasy, with candy-neon logic, theatrical confidence, impossible geometry, and gameboard reality.
  form_and_line: Crisp decorative contours, grid-aware diagonals, playful scale shifts, geometric overlays, and theatrical gesture rhythm.
  color_palette: Electric magenta, cyan candy, saturated violet, acid yellow, luminous peach, and impossible sky blue.
  lighting_setup: Overbright neon wash, prismatic rim bands, luminous grid bounce, and deliberately excessive bloom.
  material_texture: Glossy cel polish, glassy game surfaces, holographic gradients, candy plastic sheen, and sharp geometric overlays.
  render_quality: Ultra-clean anime finish with maximal saturation, strategic clarity, and surreal confidence.
  spatial_distortion: Boardlike planes, impossible perspective folds, floating rule geometry, and controlled chibi-scale elasticity.
  atmosphere: Strategic, dazzling, hyper, confident.
  key_features: Candy-neon grids, rule-logic spectacle, overconfident saturation, geometric theater, impossible polish.
  creative_brief: >-
    Convert any prompt into a dazzling strategy space: color should exceed
    physics, geometry should imply rules, and every surface should feel like a
    confident move without requiring literal game props, cast, or scene.
