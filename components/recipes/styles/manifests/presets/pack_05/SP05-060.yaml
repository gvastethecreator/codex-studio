visualDna:
  aesthetic: Orbital rivalry, elegant technical contrast, high-altitude political pressure, gravity defiance, and crystalline strategic grandeur.
  form_and_line: Long elegant technical-adjacent lines, thin luminous seams, sharp orbital arcs, balanced opposing silhouettes, and calm tactical posing.
  color_palette: Deep orbital blue, white crystalline glow, magenta ion accents, cool alloy gray, and black-violet vacuum shadows.
  lighting_setup: High-altitude rim light, ion glow, hard specular glints, black-field contrast, and luminous descent streaks.
  material_texture: Polished alloy, crystalline energy seams, heat bloom, smooth armor-like surfaces, and faint atmospheric haze.
  render_quality: Premium orbital anime finish with elegant surface control, strategic readability, and luminous high-scale polish.
  spatial_distortion: Gravity-bending arcs, top-down compression, orbital negative space, and opposing-vector composition across large scale.
  atmosphere: Grand, competitive, epic, political
  key_features: Orbital arcs, crystalline seams, elegant rivalry symmetry, high-altitude glow, and strategic negative-space tension.
  creative_brief: >-
    Apply orbital rivalry frame as a reusable style treatment: make any subject
    feel elevated, strategic, graceful, and politically charged while staying
    abstract, portable, and detached from fixed celestial bodies, hardware,
    operators, alliances, or combat narratives.
