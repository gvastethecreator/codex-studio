visualDna:
  aesthetic: >-
    Elegant orbital anime rivalry where high-altitude pressure, gravity defiance, crystalline seams,
    and strategic grandeur shape the frame
  form_and_line: >-
    Long elegant technical-adjacent lines, thin luminous seams, sharp orbital arcs, balanced
    opposing silhouettes, and calm tactical posing.
  color_palette: >-
    Deep orbital blue, white crystalline glow, magenta ion accents, cool alloy gray, and
    black-violet vacuum shadows.
  lighting_setup: >-
    High-altitude rim light, ion glow, hard specular glints, black-field contrast, and luminous
    descent streaks.
  material_texture: >-
    Polished alloy, crystalline energy seams, heat bloom, smooth armor-like surfaces, and faint
    atmospheric haze.
  render_quality: >-
    Premium orbital anime finish with elegant surface control, strategic readability, and luminous
    high-scale polish.
  spatial_distortion: >-
    Gravity-bending arcs, top-down compression, orbital negative space, and opposing-vector
    composition across large scale.
  atmosphere: Grand, competitive, epic, political
  key_features: >-
    Orbital arcs, crystalline seams, rivalry symmetry, high-altitude glow, strategic negative space,
    and graceful technical contrast
  creative_brief: >-
    Use orbital rivalry symmetry as elevated-strategy grammar. Any prompt should feel graceful,
    suspended, politically charged, and technically precise. If subject or character supports it,
    add crystalline hardware seams, pilot/rivalry cues, or orbital-mecha elegance; planets,
    alliances, and combat scenes remain optional.
