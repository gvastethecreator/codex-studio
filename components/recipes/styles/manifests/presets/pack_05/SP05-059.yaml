visualDna:
  aesthetic: Procedural cyber cognition, network pressure, modular tactical overlays, identity uncertainty, and calm investigative momentum.
  form_and_line: Clean technical linework, modular contour blocks, thin overlay vectors, precise facial restraint, and grounded cyber-anime silhouettes.
  color_palette: Blue-gray steel, muted teal, signal green, amber interface points, black glass, and pale skin-warm accents.
  lighting_setup: Monitor wash, soft urban-noir glow, optical shimmer, low practical highlights, and controlled specular edge light.
  material_texture: Interface glass, matte polymer, subtle rain sheen, brushed technical surfaces, and ghosted transparent overlays.
  render_quality: Premium procedural cyber-anime finish with cool-headed readability, interface discipline, and high-detail restraint.
  spatial_distortion: Network-layer parallax, transparent overlay depth, surveillance compression, and modular data planes around subject forms.
  atmosphere: Tactical, cool-headed, procedural, cerebral
  key_features: Tactical overlays, optical transparency, modular data planes, identity-fracture calm, and procedural cyber-noir clarity.
  creative_brief: >-
    Apply tactical network procedure as a reusable style treatment: make any
    subject feel analyzed, networked, partially hidden, and intellectually
    tense while staying abstract, portable, and detached from fixed operators,
    brands, devices, institutions, rooms, or casework scenes.
