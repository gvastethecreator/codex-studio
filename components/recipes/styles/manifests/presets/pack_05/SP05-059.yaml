visualDna:
  aesthetic: >-
    Procedural cyber cognition with modular overlays, optical transparency, network pressure,
    identity uncertainty, and calm investigative tension
  form_and_line: >-
    Clean technical linework, modular contour blocks, thin overlay vectors, precise facial
    restraint, and grounded cyber-anime silhouettes.
  color_palette: >-
    Blue-gray steel, muted teal, signal green, amber interface points, black glass, and pale
    skin-warm accents.
  lighting_setup: >-
    Monitor wash, soft urban-noir glow, optical shimmer, low practical highlights, and controlled
    specular edge light.
  material_texture: >-
    Interface glass, matte polymer, subtle rain sheen, brushed technical surfaces, and ghosted
    transparent overlays.
  render_quality: >-
    Premium procedural cyber-anime finish with cool-headed readability, interface discipline, and
    high-detail restraint.
  spatial_distortion: >-
    Network-layer parallax, transparent overlay depth, surveillance compression, and modular data
    planes around subject forms.
  atmosphere: Tactical, cool-headed, procedural, cerebral
  key_features: >-
    Transparent data planes, modular tactical overlays, identity fracture, optical layering, network
    pressure, and cyber-noir clarity
  creative_brief: >-
    Use tactical network cognition as analyzed-visibility grammar. Any prompt should feel partially
    hidden, networked, inspected, and intellectually tense. Agents, devices, brands, institutions,
    casework, and rooms are optional.
avoidRules:
  - realistic
  - 3d render
  - photo
  - live action
  - western comic
  - ugly
  - bad anatomy
  - low quality
  - jpeg artifacts
  - watermark
  - text
  - signature
