visualDna:
  aesthetic: Party-quest comedy style, with bright parody fantasy, theatrical incompetence, overblown magic timing, and joyful failure.
  form_and_line: Bouncy contours, exaggerated reaction shapes, clean fantasy trims, comedic pose beats, and elastic timing accents.
  color_palette: Aqua blue, sunny gold, rosy blush, carnival green, comic violet, and warm tavern-amber notes.
  lighting_setup: Cheerful high-key glow, sudden gag flashes, soft magical bloom, and clean readable contrast for punchline timing.
  material_texture: Polished cel surfaces, fluffy effect puffs, glossy magical sparks, soft cloth color, and bright comedic overlays.
  render_quality: Clean comedy-fantasy anime finish with expressive timing, readable silhouettes, and charming controlled chaos.
  spatial_distortion: Small perspective exaggerations, reaction zooms, and anticlimax framing that undercuts epic scale.
  atmosphere: Comedic, chaotic, irreverent, satirical.
  key_features: Parody brightness, elastic failure, gag-timed magic, cheerful disorder, anticlimax composition.
  creative_brief: >-
    Apply fantasy parody as a visual treatment: make any prompt bright,
    theatrical, and joyfully inept through gag timing, saturated clarity, and
    anticlimax composition without requiring a fixed group, place, or gag scene.
