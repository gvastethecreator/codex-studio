visualDna:
  aesthetic: White wasteland robot elegy, with pale entropy, lonely heroism, post-collapse silence, and machine mortality.
  form_and_line: Elegant mechanical curves, sparse black-white silhouettes, long empty contours, and slow mythic action lines.
  color_palette: Chalk white, ash gray, dead black, pale blue, rust whisper orange, and faint gold memory.
  lighting_setup: Bleached overcast, soft rim isolation, dust diffusion, and almost-shadowless elegiac light.
  material_texture: Powder dust, worn enamel, chipped metal, dry polymer, wind-erased grain, and soft cel haze.
  render_quality: High-detail sci-fi anime finish with restrained ruin texture, pale clarity, and mythic loneliness.
  spatial_distortion: Empty horizon expansion, small-figure isolation, and entropy-soft depth without fixed wasteland staging.
  atmosphere: Elegiac, pale, lonely, mythic
  key_features: Pale entropy, elegant machinery, lonely contrast, dust silence, machine elegy.
  creative_brief: >-
    Make any prompt feel like a pale machine elegy: use white silence, worn
    enamel, dust haze, and lonely contrast without requiring robots, ruins,
    wastelands, or combat against entropy.
