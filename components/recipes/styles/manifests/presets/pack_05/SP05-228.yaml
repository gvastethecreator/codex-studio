visualDna:
  aesthetic: >-
    Pale machine elegy with enamel decay, post-collapse silence, lonely contrast, worn synthetic surfaces, and
    dust-haze mortality
  subject_treatment: >-
    Elegant mechanical curves, sparse black-white silhouettes, long empty contours, and slow mythic action
    lines.
  color_and_tone: Chalk white, ash gray, dead black, pale blue, rust whisper orange, and faint gold memory.
  lighting_and_shadow: Bleached overcast, soft rim isolation, dust diffusion, and almost-shadowless elegiac light.
  texture_and_material: Powder dust, worn enamel, chipped metal, dry polymer, wind-erased grain, and soft cel haze.
  camera_and_composition: Empty horizon expansion, small-figure isolation, and entropy-soft depth without fixed wasteland staging.
  atmosphere_and_mood: Elegiac, pale, lonely, mythic
  rendering_and_quality: High-detail sci-fi anime finish with restrained ruin texture, pale clarity, and mythic loneliness.
  key_features: Pale entropy, worn enamel, elegant machinery, dust silence, lonely contrast, and machine mortality
  creative_brief: >-
    Use Casshern Sins as style anchor for white machine elegy. Any prompt should feel pale, silent, synthetic,
    lonely, and worn by time. If figure or object exists, suggest enamel machine surfaces, worn synthetic
    joints, or robot elegy; ruins, wastelands, heroism, and combat against entropy remain optional.
avoidRules:
  - realistic
  - 3d render
  - photo
  - live action
  - western comic
  - ugly
  - bad anatomy
  - low quality
  - jpeg artifacts
  - watermark
  - text
  - signature
