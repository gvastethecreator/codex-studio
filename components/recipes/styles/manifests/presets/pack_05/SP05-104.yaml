  aesthetic: Sparse economical animation, generous negative space, single-line character expressions, backgrounds reduced to color atmospheres, Makoto Shinkai skies stripped to essence, quiet indie-game cutscene, intentional emptiness, every line earned
  form_and_line: Ultra-thin restrained ink lines, minimal contour economy, suggestion over statement, fewer strokes more impact
  color_palette: Single-hue atmospheres, sky-gradient minimalism, off-white expanses, one accent color per scene, monochrome restraint
  lighting_setup: Soft overcast diffusion, single-source window light, crepuscular quiet rays, ambient emptiness
  material_texture: Smooth digital matte, untextured simplicity, paper-white void, subtle grain whisper if any
  render_quality: Indie-anime minimalism, arthouse restraint, quiet-production beauty, less-is-more conviction
  spatial_distortion: Characters small in vast empty spaces, loneliness-accentuating framing, negative-space compositions
