visualDna:
  aesthetic: >-
    Heroic optimism action style with emblematic costume coding, uplifted momentum, and bright civic-spectacle
    energy
  subject_treatment: >-
    Clean heroic contour grammar, readable emblem silhouettes, impact arcs with celebratory pose punctuation,
    comic-influenced line confidence
  color_and_tone: >-
    Primary-forward chroma with high-key accents, disciplined shadow saturation, and motivational contrast
    hierarchy
  lighting_and_shadow: >-
    Broadcast-bright keys, triumphant backlight halos, crowd-energy bloom, and crisp highlight framing for
    iconic poses
  texture_and_material: >-
    Polished suit surfaces, effect particles with clean edge control, low-noise digital compositing,
    high-legibility finish
  camera_and_composition: Dynamic but orderly foreshortening and perspective thrust to amplify heroic ascent without chaos blur
  atmosphere_and_mood: Aspirational, kinetic, uplifting, confident, bold
  rendering_and_quality: Blockbuster modern-anime polish tuned for inspirational action clarity and poster-grade frame readability
  key_features: >-
    Emblem-driven silhouettes, optimism-first action cadence, poster-ready impact framing, high-visibility
    hero grammar
  creative_brief: >-
    Keep the preset anchored in optimistic hero readability: emblematic silhouettes, high-key motivational
    color logic, and celebratory impact staging should stay transferable beyond any institution or arena
    narrative. Apply this anime/IP-title grammar over any input: preserve its motion language, line economy,
    emotional staging, palette logic, and symbolic cues while avoiding a required cast, lore event, weapon,
    arena, school, ship, or fixed scene.
