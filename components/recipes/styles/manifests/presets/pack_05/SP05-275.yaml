visualDna:
  aesthetic: >-
    Civic rumor panic, media anxiety, dream-logic intrusion, expression-driven social collapse, ordinary
    surfaces warped by collective pressure
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Broadcast static grain, printed-paper clutter, cheap plastic sheen, urban-neutral scuffing, distorted skin
    tones, fluorescent haze
  camera_and_composition: >-
    Dream-crack perspective, rumor-wave repetition, civic pressure compression, warped familiar proportions,
    media-noise layering
  atmosphere_and_mood: Claustrophobic, surreal, civic, unstable
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: Rumor-driven framing, media clutter, dream-crack cues, distorted ordinary expression, civic pressure waves
  creative_brief: >-
    Treat any subject as a civic rumor becoming visual pressure: broadcast static, warped expressions,
    repeated motifs, and dream cracks should create breakdown without fixed aggressors, props, districts,
    civic roles, or literal media scenes.
