  color_palette: Acid rainbow bursts, soft neutral calm fields, hot magenta, electric cyan, yellow-white overload, and raw pencil gray.
  lighting_setup: Aura bloom surges, exposure jumps, emotional flash peaks, and calm flat light before rupture.
  material_texture: Paint smear, crayon edge noise, sketch grain, cel polish breaks, paperlike halftone, and raw energy streaks.
  render_quality: Experimental modern anime finish preserving rough expressive artifacts inside high-energy action clarity.
  spatial_distortion: Emotion-driven warping, paint-like psychic expansion, and frame pressure that bends around inner state.
  atmosphere: Earnest, explosive, weird, cathartic
  key_features: Paint-surge energy, sincere simplicity, overload threshold, rough marks, abstract catharsis.
  creative_brief: >-
    Make any prompt express inner overflow: let rough sketch marks break into
    paintlike psychic color, with sincerity and catharsis driving the frame
    instead of a fixed character, institution, or catastrophe premise.
