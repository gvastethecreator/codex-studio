    Psychic paint-surge meltdown, with awkward sincerity, emotional overload, rough sketch artifacts, and
    abstract energy storms.
  subject_treatment: >-
    Wobbly sketch contours, sudden paint-smear bursts, simple honest face grammar, elastic psychic rings, and
    hand-drawn rupture.
  color_and_tone: >-
    Acid rainbow bursts, soft neutral calm fields, hot magenta, electric cyan, yellow-white overload, and raw
    pencil gray.
  lighting_and_shadow: Aura bloom surges, exposure jumps, emotional flash peaks, and calm flat light before rupture.
  texture_and_material: >-
    Paint smear, crayon edge noise, sketch grain, cel polish breaks, paperlike halftone, and raw energy
    streaks.
  camera_and_composition: Emotion-driven warping, paint-like psychic expansion, and frame pressure that bends around inner state.
  atmosphere_and_mood: Earnest, explosive, weird, cathartic
  rendering_and_quality: Experimental modern anime finish preserving rough expressive artifacts inside high-energy action clarity.
  key_features: Paint-surge energy, sincere simplicity, overload threshold, rough marks, abstract catharsis.
  creative_brief: >-
    Make any prompt express inner overflow: let rough sketch marks break into paintlike psychic color, with
    sincerity and catharsis driving the frame instead of a fixed character, institution, or catastrophe
    premise.
