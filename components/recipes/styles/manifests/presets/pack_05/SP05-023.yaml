visualDna:
  aesthetic: Elastic-adventure shonen style with exaggerated expression physics, optimistic maritime energy, and carnival-scale freedom tone
  form_and_line: Rubberized silhouette stretching, expressive facial exaggeration, playful action arcs, and high-clarity contour timing
  color_palette: Sunlit high-saturation primaries with tropical cyan-azure fields, warm accent bursts, and cheerful contrast control
  lighting_setup: Bright open-sky keys, clean cel highlights, soft gradient fill, and lively rim accents for buoyant readability
  material_texture: Smooth cel-polish surfaces, low-noise digital grain, crisp effect overlays, and clean line-art compositing
  render_quality: Early-digital adventure anime finish emphasizing exuberant readability, elastic staging, and colorful momentum
  spatial_distortion: Stretch-and-squash perspective logic with playful foreshortening and horizon-expanding exploratory framing
  atmosphere: Joyful, adventurous, playful, free, high-spirited
  key_features: Elastic expression grammar, high-sun adventure palette, playful action deformation, exploratory kinetic framing
  creative_brief: >-
    Keep identity anchored in elastic expressive physics and bright exploratory
    momentum; the style should communicate boundless adventure energy without
    relying on specific pirate or lore motifs.
