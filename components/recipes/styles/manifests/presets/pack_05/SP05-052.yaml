visualDna:
  aesthetic: Bureaucratic techno-control rendered as verdict logic, surveillance pressure, clinical social sorting, and cold institutional paranoia.
  form_and_line: Hard-edged anime linework, precise machine-adjacent contours, segmented panel strokes, rigid geometry, and clean blocking.
  color_palette: Acid cyan, magenta status pops, dark steel neutrals, cold violet shadows, and sterile white alert accents.
  lighting_setup: Fluorescent grid glow, digital reflections, severe underlight, wet-surface specularity, and scanline-like rim highlights.
  material_texture: Glossy polymer, brushed metal grain, glassy overlays, carbon-fiber hints, and rain-slick synthetic finish.
  render_quality: High-detail cyber-anime rendering with sharp interface discipline, specular richness, and cold forensic clarity.
  spatial_distortion: Wireframe vanishing points, surveillance overlays, flattened authority zones, and compressed perspective corridors of control.
  atmosphere: Clinical, oppressive, dystopian, cold
  key_features: Verdict glyphs, coefficient-like overlays, cold grid authority, glass reflections, and machine-readable emotional distance.
  creative_brief: >-
    Apply surveillance verdict grid as a reusable style treatment: make any
    subject feel measured, sorted, judged, and lit by institutional data while
    staying abstract, portable, and detached from fixed civic roles, props,
    locations, or incident narratives.
