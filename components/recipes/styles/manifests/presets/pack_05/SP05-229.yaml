visualDna:
  aesthetic: >-
    Gritty enforcement cyberpunk anime with punitive tech iconography, warning-light discipline,
    analog surveillance mood, and hardboiled abrasion
  form_and_line: >-
    Dense industrial inking, rigid angular anatomy, mechanical panel etching, severe contour weight
    shifts
  color_palette: >-
    Polluted tungsten ambers, toxic cyans, bruised violets, dirty steel greys, constrained red
    warning accents
  lighting_setup: >-
    Harsh top-lit practicals, strip-light reflections, narrow rim passes, low-key contrast with
    localized glow bursts
  material_texture: >-
    Scuffed metal casings, worn polymer shells, cable abrasion marks, oxidized fasteners, oily
    reflective film
  render_quality: >-
    Mature seinen-mecha finish emphasizing grime realism, mechanical fidelity, and disciplined
    compositing
  spatial_distortion: >-
    Compressed telephoto pressure mixed with abrupt perspective breaks for tactical hostility and
    visual tension
  atmosphere: Coercive, paranoid, punitive, claustrophobic, electrically unstable
  key_features: >-
    Warning lights, enforcement-tech silhouettes, worn armor texture, surveillance-era detail, hard
    neon vice, and mechanical severity
  creative_brief: >-
    Use Cyber City Oedo 808 as style anchor for punitive neon vice texture. Any prompt should feel
    abrasive, surveilled, constrained, and neon-hard. Prisoners, hackers, police, missions, alleys,
    and fixed story beats are optional.
avoidRules:
  - realistic
  - 3d render
  - photo
  - live action
  - western comic
  - ugly
  - bad anatomy
  - low quality
  - jpeg artifacts
  - watermark
  - text
  - signature
assets:
