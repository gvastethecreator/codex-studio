visualDna:
  aesthetic: Ornamental blade-fantasy action style with calligraphic motion, ceremonial elegance, and mythic elemental flourish
  form_and_line: Curved sword-arc trajectories, decorative yet sharp contour control, fluid strike ribbons, and posture-led heroic silhouette grammar
  color_palette: Luminous jewel accents over deep ink neutrals, selective vermilion-gold highlights, and atmospheric cool-warm transitions
  lighting_setup: Moonlit high-contrast accents, controlled bloom around slash arcs, and dramatic rim isolation for ceremonial action beats
  material_texture: Fine textile pattern hints, polished steel glint behavior, painterly effect overlays, and low-noise digital cel finish
  render_quality: Premium stylized action rendering that balances ornamental detail with crisp combat readability
  spatial_distortion: Elegant directional foreshortening with spiral motion emphasis and fluid depth pulls around weapon arcs
  atmosphere: Heroic, graceful, luminous, solemn, resolute
  key_features: Calligraphic slash language, ornamental combat elegance, mythic elemental arc motifs, ceremonial silhouette staging
  creative_brief: >-
    Keep this preset rooted in decorative blade choreography and luminous arc
    design, treating elemental flow as visual calligraphy rather than
    franchise-specific narrative cues.
