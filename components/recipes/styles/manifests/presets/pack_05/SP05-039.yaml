  material_texture: Clean modern anime surface polish, legible effect overlays, map-like compositional textures, low-grit digital finish
  render_quality: Premium strategy-action anime rendering that prioritizes intelligible logic and discovery freshness
  spatial_distortion: Dynamic depth with navigational clarity, emphasizing positional intelligence over chaotic motion blur
