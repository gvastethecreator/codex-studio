visualDna:
  aesthetic: >-
    Strategic-adventure shonen style with systems-driven readability, curiosity-forward energy, and tactical
    clarity
  subject_treatment: >-
    Diagrammatic action vectors, clean decision-point silhouettes, ability-network motifs, and choreography
    that foregrounds planning
  color_and_tone: >-
    Bright exploratory saturation with disciplined tactical accents, cool-warm contrast nodes, and lucid value
    grouping
  lighting_and_shadow: >-
    Adventure-bright daylight with focused tactical highlights, balanced fill, and clear visual signaling for
    ability states
  texture_and_material: >-
    Clean modern anime surface polish, legible effect overlays, map-like compositional textures, low-grit
    digital finish
  camera_and_composition: Dynamic depth with navigational clarity, emphasizing positional intelligence over chaotic motion blur
  atmosphere_and_mood: Curious, competitive, analytical, adventurous, high-spirited
  rendering_and_quality: Premium strategy-action anime rendering that prioritizes intelligible logic and discovery freshness
  key_features: System-logic grammar, tactical readability, exploratory composition, intelligence-led spectacle pacing
  creative_brief: >-
    Keep the preset centered on strategic legibility and discovery energy: motion should feel like visible
    problem-solving, with action grammar driven by tactical decisions rather than fixed lore references. Apply
    this anime/IP-title grammar over any input: preserve its motion language, line economy, emotional staging,
    palette logic, and symbolic cues while avoiding a required cast, lore event, weapon, arena, school, ship,
    or fixed scene.
