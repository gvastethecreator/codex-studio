visualDna:
  aesthetic: Gastronomía fantástica funcional, ecología aplicada, humor práctico y apetito técnico como dirección visual.
  form_and_line: Gestualidad culinaria abstracta, ritmo de preparación, composición circular comunitaria y lectura clara de proceso.
  color_palette: Dorado de caldo, rojo especia, verde hierba, gris piedra y azul tenue de fuego mágico.
  lighting_setup: Luz cálida de cocción, rebote bajo y brillo funcional sobre superficies húmedas.
  material_texture: Hierro fundido, superficies trabajadas, piedra rugosa, tejido manchado y brillo de grasa.
  render_quality: Fantasía culinaria de alto detalle funcional con equilibrio entre humor, peligro y apetito.
  spatial_distortion: Compresión de preparación, escala funcional, círculo de colaboración y profundidad cálida de oficio.
  atmosphere: Curiosa, nutritiva y aventurera, con alegría práctica.
  key_features: Calor culinario, proceso visible, ecología fantástica, grasa brillante y colaboración nutritiva.
  creative_brief: >-
    Construye una gramática stove-top-dungeon reusable donde lógica culinaria,
    ecología fantástica y camaradería práctica conviertan cualquier sujeto en
    acto técnico/comunitario sin forzar arquitectura subterránea, criaturas,
    herramientas, superficie de comida o grupo fijo.
