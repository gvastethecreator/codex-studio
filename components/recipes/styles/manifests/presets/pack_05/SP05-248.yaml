visualDna:
  aesthetic: Cocina de supervivencia fantástica, donde la exploración de dungeon se transforma en gastronomía ecológica aplicada.
  form_and_line: Gestualidad culinaria en combate, utensilios protagonistas y composición de mesa improvisada sobre ruina pétrea.
  color_palette: Dorado de caldo, rojo especia, verde hierba de caverna, gris piedra y azul tenue de fuego mágico.
  lighting_setup: Fuego de cocina en cueva, luz cálida de hornilla portátil y rebote tenue en paredes húmedas.
  material_texture: Hierro fundido, superficies de corte, piedra rugosa, tejido aventurero manchado y brillo de grasa.
  render_quality: Fantasía culinaria de alto detalle funcional con equilibrio entre humor, peligro y apetito.
  spatial_distortion: Espacio de cocina-campamento comprimido dentro de sala de dungeon de gran escala.
  atmosphere: Curiosa, nutritiva y aventurera, con alegría práctica.
  key_features: Ollas y cuchillos, ingredientes monstruo, estación de cocción de campaña y party hambrienta colaborativa.
  creative_brief: >-
    Construye una gramática stove-top-dungeon reusable donde lógica culinaria,
    ecología de monstruos y camaradería de campo conviertan la exploración en
    acto técnico y comunitario.
