visualDna:
  aesthetic: Watercolor-bleeding anime, ink-wash fluidity, dissolving linework into color pools, Studio 4°C experimental energy, backgrounds painted as impressionist landscapes, characters existing as pigment suggestions, movement captured through paint splashes, Yuasa-esque liquid reality
  form_and_line: Loose dissolving ink contours, wet-into-wet bleeding edges, sumi-e gesture lines, variable wash pressure, disappearing outlines
  color_palette: Washed indigo, bleeding crimson, ink-stone black, tea-stain sepia, water-diluted pastels, pool-of-paint gradients
  lighting_setup: Water-filtered light, backlit through paper, translucent color glow, diffused wash illumination
  material_texture: Wet rice-paper buckling, ink bleeding into surrounding fibers, watercolor bloom halos, salt-texture crystals
  render_quality: Experimental art-anime frame, painterly moving canvas, ink-and-wash cinema, anti-commercial beauty
  spatial_distortion: Figures dissolving at edges into abstract color fields, backgrounds bleeding into foreground, no hard spatial boundaries
  atmosphere: Meditative, ephemeral, dreamlike transience, ink-stone poetry
  key_features: Watercolor blooms, disappearing linework, ink-pool negative space, pigment granulation, wet-paper texture
