visualDna:
  aesthetic: >-
    Heroic ignition anime through sharp geometry, flat-shaded heat, pastel-neon urgency, and clean
    angular optimism
  form_and_line: >-
    Triangular contour rhythm, blocky urgent silhouettes, explosive straight vectors, hard graphic
    cuts, and heroic angular posing.
  color_palette: >-
    Hot magenta, cyan flame edges, lemon yellow, coral orange, black graphic anchors, and clean
    white highlights.
  lighting_setup: >-
    Flat flame glow, hard cel highlights, color-block rim light, geometric bloom, and crisp
    emergency-heat contrast.
  material_texture: >-
    Smooth enamel, clean graphic smoke, matte panels, stylized heat shimmer, and polished
    high-chroma surfaces.
  render_quality: >-
    Premium hypergraphic anime finish with perfect shape readability, bright vector energy, and
    controlled chaos.
  spatial_distortion: >-
    Triangle-led perspective, explosive foreshortening, angular depth slices, and speed-grid
    compression around action.
  atmosphere: Hyper, triumphant, chaotic, spirited
  key_features: >-
    Triangular heat shapes, urgent diagonals, pastel-neon flame, heroic geometry, readable chaos,
    and hot color blocking
  creative_brief: >-
    Use geometric ignition urgency as heat-shape grammar. Any prompt should feel brave, fast, hot,
    and angular through clean flame geometry. Rescue teams, vehicles, cities, disasters, and literal
    emergency events are optional.
