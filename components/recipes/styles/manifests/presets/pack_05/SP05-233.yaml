visualDna:
  aesthetic: >-
    Austere survival anime in hostile scale, with closed-habitat discipline, cosmic emptiness,
    defensive biotechnology, and everyday last-resort ritual
  form_and_line: >-
    Estructura modular cerrada, ortogonalidad funcional, perfiles sobrios y bloques volumétricos de
    hábitat.
  color_palette: Gris grafito, verde tenue de sistemas vitales, blanco clínico y negro cósmico profundo.
  lighting_setup: Iluminación funcional de habitáculo, franjas frías de emergencia y contraluz de vacío exterior.
  material_texture: >-
    Aleación reciclada, panelado utilitario, sellos de presión, marcas de mantenimiento y
    superficies de uso continuo.
  render_quality: Sci-fi de precisión sobria con foco en escala interior y sensación de ecosistema cerrado.
  spatial_distortion: >-
    Profundidad longitudinal de hábitat y contraste radical entre densidad interna y exterior
    infinito.
  atmosphere: Ascética, aislada y resiliente, con tensión de extinción permanente.
  key_features: >-
    Closed-habitat geometry, operational uniformity, hostile void, defensive biotechnology, survival
    ritual, and systemic austerity
  creative_brief: >-
    Use Knights of Sidonia as style anchor for vacuum-fortress survival discipline. Any prompt
    should feel sealed, procedural, isolated, and cosmically threatened. Ships, decks, cities,
    uniforms, pilots, and space battles are optional.
