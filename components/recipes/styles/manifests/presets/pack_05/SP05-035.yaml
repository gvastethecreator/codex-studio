visualDna:
  aesthetic: Vertical-survival action style defined by scale terror, trajectory tension, and desperate acceleration rhythm
  form_and_line: Tether-like diagonals, anchor-point geometry, hard angular silhouettes, sharp momentum lines for vertical pressure
  color_palette: Dusty survival neutrals with emergency red-orange flares, cold steel tones, and smoke-dark value structure
  lighting_setup: Harsh side light with particulate haze, breached-sky shafts, silhouette-first backlight, and panic-intensity contrast spikes
  material_texture: Tension-line sheen, weathered technical fibers, mineral debris grain, smoke and grit overlays with high kinetic readability
  render_quality: High-intensity survival anime finish emphasizing motion mechanics, scale legibility, and urgency-first compositional clarity
  spatial_distortion: Extreme vertical foreshortening with depth-drop exaggeration and looming mass contrast to reinforce peril
  atmosphere: Desperate, relentless, hunted, grim, adrenaline-heavy
  key_features: Aerial trajectory grammar, scale-shock framing, tension-mechanics readability, pressure visual cadence
  creative_brief: >-
    The identity should come from vertical-mobility tension and overwhelming
    scale contrast: tethered motion logic and depth-drop fear must remain
    central without requiring a specific survival setting.
