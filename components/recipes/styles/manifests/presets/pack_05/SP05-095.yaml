visualDna:
  aesthetic: Afterquest melancholy fantasy, with quiet post-heroic light, long memory, restrained spellcraft, and time-softened grief.
  form_and_line: Gentle contours, delicate trim, small gesture emphasis, wide breathing spaces, and low-conflict silhouette rhythm.
  color_palette: Pale sky blue, sage green, soft wheat gold, faded violet, pearl white, and warm memory amber.
  lighting_setup: Diffuse morning light, slow rim glow, transparent magical motes, and subtle shifts that make time visible.
  material_texture: Soft cloth grain, weathered parchment, grasslike brush texture, translucent particles, and watercolor-like cel softness.
  render_quality: Serene fantasy anime finish with high restraint, lyrical clarity, and emotional negative space.
  spatial_distortion: Open horizontal breathing room, postcard stillness, and time-depth layering through light rather than action.
  atmosphere: Reflective, serene, melancholic, timeless.
  key_features: Post-heroic quiet, memory light, soft horizon, gentle spellcraft, gratitude-through-distance.
  creative_brief: >-
    Give any prompt afterquest melancholy: let light carry memory, let space
    breathe, and let magic feel almost incidental, avoiding fixed roads,
    groups, rituals, landscapes, or aftermath scenes.
