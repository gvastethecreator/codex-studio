visualDna:
  aesthetic: >-
    Sword oath under neon rain, with brooding restraint, occult edge-light, revenge severity, and sudden clean
    violence.
  subject_treatment: >-
    Long rain diagonals, spare silhouette control, blade-like light cuts, severe eye-line geometry, and
    stillness-before-impact.
  color_and_tone: Midnight black, neon cyan, blood red, wet asphalt blue, steel gray, and cold violet.
  lighting_and_shadow: Rain-split neon, narrow rim blades, low-key noir pools, and abrupt impact flashes.
  texture_and_material: Wet pavement sheen, rain streaks, polished edge glints, dark cloth flats, and occult particle cuts.
  camera_and_composition: Long-lens compression, rain-layer parallax, and sudden perspective cuts that feel oath-driven.
  atmosphere_and_mood: Brooding, precise, cool, vengeful
  rendering_and_quality: Sleek modern anime thriller finish with precise restraint, wet neon depth, and sharp impact readability.
  key_features: Neon rain, oathlike stillness, blade-light cuts, noir restraint, occult edge energy.
  creative_brief: >-
    Make any prompt feel like a restrained revenge oath: use wet neon, cold edge light, precise stillness, and
    sudden graphic cuts without requiring a sword, uniform, hidden room, or named place.
