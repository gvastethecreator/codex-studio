visualDna:
  aesthetic: >-
    High-voltage kinetic alloy anime where velocity lines, prosthetic elegance, reflective
    machinery, and tragic momentum fuse into engineered motion
  form_and_line: >-
    Aggressive motion-vector inking, segmented mechanical contour logic, diagonal force-lines, crisp
    technical edge discipline
  color_palette: >-
    Electric cyan-magenta spikes over steel neutrals, deep violet shadows, selective hazard-orange
    micro-accents
  lighting_setup: >-
    Dynamic rim bursts, strobing practical spill, high-speed specular streaking, sharp contrast
    pockets under moving glow
  material_texture: >-
    Lightweight alloy limbs, polymer joint housings, brushed composite plates, reflective
    performance coatings, circuit-trace details
  render_quality: >-
    Premium action-cel rendering with high temporal clarity, dense technical detail, and polished
    mecha-athletic finish
  spatial_distortion: >-
    Extreme foreshortening and directional depth tunnels to amplify acceleration and trajectory
    readability
  atmosphere: Urgent, cathartic, intense, adrenaline-charged
  key_features: >-
    Velocity vectors, alloy reflection, engineered body rhythm, neon motion trails, sprint
    compression, and emotional acceleration
  creative_brief: >-
    Use neon kinetic alloy sprint as speed-and-material grammar. Any prompt should feel engineered,
    fast, reflective, and emotionally charged through line force and metal response. If a character
    or body exists, push prosthetic/mecha-athletic cues; athletes, races, streets, and fixed cyber
    bodies remain optional.
