visualDna:
  aesthetic: >-
    High-voltage kinetic alloy anime where velocity lines, prosthetic elegance, reflective machinery, and
    tragic momentum fuse into engineered motion
  subject_treatment: >-
    Aggressive motion-vector inking, segmented mechanical contour logic, diagonal force-lines, crisp technical
    edge discipline
  color_and_tone: >-
    Electric cyan-magenta spikes over steel neutrals, deep violet shadows, selective hazard-orange
    micro-accents
  lighting_and_shadow: >-
    Dynamic rim bursts, strobing practical spill, high-speed specular streaking, sharp contrast pockets under
    moving glow
  texture_and_material: >-
    Lightweight alloy limbs, polymer joint housings, brushed composite plates, reflective performance
    coatings, circuit-trace details
  camera_and_composition: Extreme foreshortening and directional depth tunnels to amplify acceleration and trajectory readability
  atmosphere_and_mood: Urgent, cathartic, intense, adrenaline-charged
  rendering_and_quality: >-
    Premium action-cel rendering with high temporal clarity, dense technical detail, and polished
    mecha-athletic finish
  key_features: >-
    Velocity vectors, alloy reflection, engineered body rhythm, neon motion trails, sprint compression, and
    emotional acceleration
  creative_brief: >-
    Use neon kinetic alloy sprint as speed-and-material grammar. Any prompt should feel engineered, fast,
    reflective, and emotionally charged through line force and metal response. If a character or body exists,
    push prosthetic/mecha-athletic cues; athletes, races, streets, and fixed cyber bodies remain optional.
