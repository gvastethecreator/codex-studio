visualDna:
  aesthetic: Grindhouse-splatter action style with punk absurdity, grotesque humor, and chaotic cinematic framing energy
  form_and_line: Jagged impact strokes, aggressive silhouette breakage, halftone-panel interruptions, and deliberately unstable line cadence
  color_palette: Dirty reds and oily blacks with acidic neon accents, paper-gray halftone fields, and high-impact contrast bursts
  lighting_setup: Harsh practical glare, grime-filtered shadows, strobe-like impact flashes, and uneven luminance for manic pacing
  material_texture: Ink splatter overlays, print-noise grit, smeared debris particulates, and roughened compositing layers
  render_quality: High-intensity splatter-action rendering with controlled visual mess and sharp comedic-shock timing
  spatial_distortion: Abrupt perspective warps and frame rupture moments that amplify violent-comic disorientation
  atmosphere: Deranged, visceral, anarchic, darkly comic, volatile
  key_features: Splatter-comedy contrast, panel-break chaos, grindhouse texture stack, unstable impact framing
  creative_brief: >-
    Preserve identity through grindhouse splatter grammar and absurd tonal
    collision: rough print textures and manic frame ruptures should define the
    style regardless of character premise.
