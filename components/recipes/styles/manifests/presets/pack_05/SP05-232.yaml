visualDna:
  aesthetic: >-
    Tragic operational anime austerity with drone geometry, abrasive dust, low-frequency grief, and
    systemic dehumanization
  form_and_line: >-
    Geometría baja y artrópoda abstracta, articulación funcional y composición táctica de horizonte
    horizontal.
  color_palette: Arena desaturada, acero pálido, óxido mate y señales de interfaz en rojo de alerta contenido.
  lighting_setup: >-
    Cielo lechoso de guerra, contraluces de polvo en suspensión y pantallas tácticas como fuente
    secundaria.
  material_texture: Blindaje erosionado, abrasión eólica, barro seco, arañazos de campo y polímero envejecido.
  render_quality: Realismo anime táctico con énfasis en desgaste operacional y lectura de sistema.
  spatial_distortion: Perspectiva terrestre comprimida con telemetría superpuesta y sensación de distancia sin salida.
  atmosphere: Sombría, ventosa y fatalista, de duelo militar silencioso.
  key_features: >-
    Drone-like hardware grammar, command overlays, abrasive dust, operational ruin, collective loss,
    and low-frequency emotion
  creative_brief: >-
    Use 86 as style anchor for dustfront drone lament. Any prompt should express disposability,
    remote pressure, abrasive terrain, and muted grief. Units, fronts, battles, spider machines,
    soldiers, and uniforms are optional.
