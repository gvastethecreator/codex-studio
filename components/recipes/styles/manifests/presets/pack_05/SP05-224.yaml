visualDna:
  aesthetic: >-
    Clean tactical futurism with sterile arcology pressure, ceramic hard surfaces, bio-political
    restraint, and polished control geometry
  form_and_line: >-
    Hard-edged tactical contours, clean arcology grids, exoshell-like segmentation, corridor
    perspective, and severe panel discipline.
  color_palette: Ceramic white, tactical gray, cold cyan, muted olive, warning red, and polished black.
  lighting_setup: Clinical overhead glow, hard tactical rims, glass reflection planes, and cold specular control.
  material_texture: >-
    Ceramic armor sheen, brushed composite, glassy architecture, carbon weave, sterile floor
    reflection, and synthetic dust.
  render_quality: >-
    High-detail sci-fi anime finish with polished hard surfaces, severe clarity, and tactical civic
    scale.
  spatial_distortion: >-
    Clean corridor depth, grid vanishing points, and controlled hard-surface perspective without
    fixed squad staging.
  atmosphere: Tactical, polished, civic, severe
  key_features: >-
    Sterile grids, ceramic reflections, severe civic control, polished tactical geometry, cold
    material contrast, and bio-political pressure
  creative_brief: >-
    Use Appleseed as style anchor for sterile arcology severity. Any prompt should feel controlled,
    clean, tactical, and politically tense. If a body or object exists, add exosuit/ceramic-armor
    logic or arcology control geometry; assaults, squads, corridors, weapons, and city-states remain
    optional.
