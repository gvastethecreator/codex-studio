visualDna:
  aesthetic: Industrial weight under attrition, hydraulic strain, scarred machinery logic, mud-heavy motion, and pressure-tested endurance.
  form_and_line: Blocky hard-edge linework, piston-like contour rhythm, bolted silhouette mass, compressed stances, and blunt impact diagonals.
  color_palette: Oil black, worn steel, oxidized orange, bruised olive, emergency amber, and dull blue shadow.
  lighting_setup: Low industrial glow, welding sparks, smoky backlight, hard practical highlights, and grime-muted rim separation.
  material_texture: Scratched plating, hydraulic grease, soot, chipped paint, rough rubber, and particulate dust over dense surfaces.
  render_quality: Premium heavy-tech anime rendering with tactile mass, readable layered parts, and controlled grime detail.
  spatial_distortion: Low-angle compression, heavy foreground mass, flattened depth under pressure, and recoil-like perspective drag.
  atmosphere: Gruff, pressured, gritty, mechanical
  key_features: Hydraulic weight cues, scarred plating language, dirty sparks, compressed stance energy, and attrition-worn mechanical rhythm.
  creative_brief: >-
    Apply hydraulic mass attrition as a reusable style treatment: make any
    subject feel heavy, functional, stressed, and worn by repeated impacts while
    staying abstract, portable, and detached from fixed machines, operators,
    props, transport forms, or conflict settings.
