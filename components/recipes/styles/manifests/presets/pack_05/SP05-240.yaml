visualDna:
  aesthetic: >-
    Anti-naturalistic ignition anime with tricolor fire geometry, protest intensity, flat chromatic
    collision, and legible formal chaos
  form_and_line: >-
    Aristas diagonales agresivas, siluetas icónicas abstractas, composición de póster y bloques de
    calor facetado.
  color_palette: Cian intenso, magenta caliente, amarillo ácido, negro carbón y blanco de choque térmico.
  lighting_setup: Llama plana de alto croma, backlight térmico y rims duros para separar masas en conflicto.
  material_texture: >-
    Acabado gráfico semiplano, material termo-reactivo, hollín estilizado y overlays de energía
    lineal.
  render_quality: >-
    Acción maximalista de lectura instantánea, con color-blocking extremo y control formal de caos
    ígneo.
  spatial_distortion: Perspectiva en diagonales violentas y compresión dramática para amplificar colisión heroica.
  atmosphere: Ardiente, rebelde y estruendosa, de protesta visual en combustión.
  key_features: >-
    Tricolor flame planes, angular riot geometry, flat extreme color, combative sanctity, readable
    chaos, and thermal protest pressure
  creative_brief: >-
    Use tri-fire riot geometry as incendiary graphic grammar. Any prompt should feel urgent,
    flat-colored, angular, and rebellious. Hardware, cities, emergency roles, vehicles, and incident
    scenes are optional.
