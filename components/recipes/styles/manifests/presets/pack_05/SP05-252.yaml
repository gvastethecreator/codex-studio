visualDna:
  aesthetic: Fantasy comfort-food itinerante, con calidez práctica, abundancia amable y economía visual de baja tensión.
  form_and_line: Curvas suaves, agrupación hospitalaria, ritmos redondeados y lectura doméstica aplicada a cualquier sujeto.
  color_palette: Dorado caldo, marrón pan, verde campo, azul cielo abierto y crema rústica.
  lighting_setup: Calor bajo envolvente, luz crepuscular amable y vapor luminoso como velo atmosférico.
  material_texture: Esmalte gastado, madera cálida, tela viajera, brillo gastronómico y grano especiado sin prop obligatorio.
  render_quality: Slice-of-life fantástico con detalle sensorial, bordes suaves y apetito cromático transferible.
  spatial_distortion: Escala íntima y acogedora, con foco cercano y profundidad tranquila de pausa compartida.
  atmosphere: Cálida, relajada y generosa, sin urgencia trágica.
  key_features: Vapor apetecible, superficies sabrosas, hospitalidad de viaje, abundancia práctica y calma nutricional.
  creative_brief: >-
    Construye una gramática merchant-road-stew reusable donde cualquier prompt
    reciba calidez comestible, brillo de hospitalidad y textura de abundancia
    cotidiana sin anclar la composición a una escena culinaria o viajera fija.
