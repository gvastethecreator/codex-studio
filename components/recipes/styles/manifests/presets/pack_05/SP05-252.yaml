visualDna:
  aesthetic: Fantasy itinerante de comfort-food, con economía de ruta, cocina de campamento y abundancia de baja tensión.
  form_and_line: Composición centrada en olla y mesa improvisada, siluetas amables de viaje y gesto culinario doméstico.
  color_palette: Dorado caldo, marrón pan, verde campo, azul cielo abierto y crema de vajilla rústica.
  lighting_setup: Fuego de campamento cálido, luz crepuscular amable y vapor iluminado como acento narrativo.
  material_texture: Hierro de cacerola, madera de carreta, tela de alforja, especias visibles y superficies gastronómicas brillantes.
  render_quality: Slice-of-life fantástico con detalle comestible y legibilidad de convivencia en ruta.
  spatial_distortion: Escala de carretera y campamento, con foco íntimo en la estación de cocina móvil.
  atmosphere: Cálida, relajada y hambrienta, de viaje sin urgencia trágica.
  key_features: Olla protagonista, familiar glotón, packs de mercader y nubes de vapor apetecible.
  creative_brief: >-
    Construye una gramática merchant-road-stew reusable donde cocina práctica,
    hospitalidad de viaje y abundancia cotidiana sostengan una aventura amable
    centrada en el acto de compartir comida.
