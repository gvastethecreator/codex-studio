visualDna:
  aesthetic: >-
    Scrap-metal anime velocity where cyber resilience, junk-steel humanity, compact impact arcs, and
    spark-lit grit make motion emotional
  form_and_line: >-
    Hard-edged mechanical contours, close-quarters arcs, stacked metal rhythms, compact body-force
    geometry, and sharp hatch detail.
  color_palette: Scrap silver, rust orange, oil black, electric teal, bruised violet, and spark white.
  lighting_setup: >-
    Industrial underglow, specular streaks, harsh fluorescent cuts, and impact sparks that trace
    motion.
  material_texture: >-
    Dented alloy, brushed steel, oily polymer, cable grain, carbon weave, and scarred composite
    surfaces.
  render_quality: >-
    High-detail sci-fi anime finish with intimate machine detail, speed clarity, and resilient
    emotional grit.
  spatial_distortion: >-
    Velocity tunnels, stacked vertical pressure, and close-range impact compression without fixed
    arena framing.
  atmosphere: Raw, fast, scrapyard, determined
  key_features: >-
    Dented metal, cyber resilience, speed compression, spark trails, ferocious close motion, and
    battered humanity
  creative_brief: >-
    Use Battle Angel Alita as style anchor for scrap velocity resilience. Any prompt should feel
    fast, dented, tough, and human under metal. Cyborgs, races, scrapyards, arenas, and combat
    setups are optional.
