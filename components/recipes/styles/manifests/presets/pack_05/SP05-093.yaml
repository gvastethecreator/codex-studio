visualDna:
  aesthetic: Wandering mage chronicle style, with patient world texture, learned magic, natural wonder, and mature travel curiosity.
  form_and_line: Soft fantasy linework, practical ornament, maplike flow lines, layered detail zones, and calm exploratory rhythm.
  color_palette: Weathered sky blue, warm ochre, moss green, parchment cream, mineral violet, and soft mana glow.
  lighting_setup: Long-horizon daylight, warm ambient bounce, gentle spell glows, and atmospheric depth that feels lived-in.
  material_texture: Parchment grain, woven cloth, weathered leather, mineral dust, soft magic particles, and hand-painted terrain color.
  render_quality: Expansive but intimate fantasy anime polish with rich cultural texture and curiosity-first clarity.
  spatial_distortion: Maplike expansion, slow parallax depth, and open composition that rewards looking around.
  atmosphere: Curious, expansive, wondrous, immersive.
  key_features: Learned magic, lived-in texture, journey-as-growth, soft horizon depth, world curiosity.
  creative_brief: >-
    Render any subject as part of a patient magical chronicle: magic should feel
    studied and geographic, surfaces should look traveled, and wonder should
    come from accumulated detail rather than a canonical itinerary or event.
