visualDna:
  aesthetic: >-
    Clinical innocence rupture, soft color against sterile brutality, invisible-force trauma, broken memory,
    songlike sadness under sharp white space
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Clinical white matte, rain-slick sheen, soft pastel wash, sharp red staining, fractured glass texture,
    sterile tile grain
  camera_and_composition: >-
    Invisible-force displacement, fragile center framing, white-space rupture, close emotional compression,
    sharp offscreen threat vectors
  atmosphere_and_mood: Sad, violent, clinical, exposed
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: >-
    Blood-on-white contrast, pastel fragility, clinical emptiness, invisible-force framing, memory-fracture
    sadness
  creative_brief: >-
    Render any subject through soft innocence breaking against sterile violence: pale negative space, pastel
    warmth, sharp crimson interruption, and invisible pressure should carry the style without fixed
    facilities, escape scenes, character traits, or scientific backstory.
