visualDna:
  aesthetic: >-
    Endless industrial anime silence with recursive concrete, terminal scale, sparse machine light,
    tiny markers, and civilization beyond meaning
  form_and_line: >-
    Brutal hard-edge geometry, tiny scale markers, recursive corridor lines, terminal void shapes,
    and severe panel discipline.
  color_palette: Concrete gray, abyss black, terminal green, cold white, rust shadow, and faint warning red.
  lighting_setup: Sparse industrial glow, distant strip lights, hard underlighting, and huge shadow masses.
  material_texture: Raw concrete, oxidized metal, dust film, scratched panels, cable scars, and cold digital grain.
  render_quality: >-
    High-detail sci-fi anime finish with monumental clarity, machine silence, and oppressive
    architectural precision.
  spatial_distortion: Abyssal vanishing points, recursive scale, and impossible depth that dwarfs any subject.
  atmosphere: Monumental, empty, lethal, alienated
  key_features: >-
    Recursive architecture, concrete void, terminal scale, sparse machine light, tiny markers, and
    industrial silence
  creative_brief: >-
    Use BLAME! as style anchor for terminal megastructure silence. Any prompt should become vast,
    recursive, concrete, sparse, and machine-haunted. Corridors, weapons, lone figures, facilities,
    and literal megastructure interiors are optional.
