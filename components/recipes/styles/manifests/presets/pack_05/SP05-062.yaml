visualDna:
  aesthetic: >-
    Crimson hunger tension, alienated identity split, predatory color flares, fleshy ribbon abstraction,
    mask-like concealment, appetite rendered as graphic pressure
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Damp ink grain, membrane gloss, scratched matte surfaces, bruised translucency, red wet-edge accents, worn
    urban-neutral grit
  camera_and_composition: >-
    Identity-split framing, asymmetrical flare shapes, close pressure cropping, predatory negative space,
    invasive contour echoes
  atmosphere_and_mood: Tormented, hungry, alienated, violent
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: >-
    Heavy atmosphere, narrative weight, oppressive mood building, visceral consequence framing, story-first
    visual language
  creative_brief: >-
    Treat any input as a study in appetite, concealment, and identity fracture. Push crimson flares through
    desaturated shadows, membrane-like gloss, and invasive ribbon silhouettes while keeping the style
    abstract, transferable, and free of fixed locations, named effects, or literal pursuit setups.
