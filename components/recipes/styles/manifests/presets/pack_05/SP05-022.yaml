visualDna:
  aesthetic: >-
    Urban-supernatural severity style with monochrome dominance, high-fashion restraint, and spiritual
    pressure as controlled aura geometry
  subject_treatment: >-
    Long razor diagonals, contour precision, severe silhouette blocking, mask-like simplification, ink-clean
    negative-space cuts
  color_and_tone: >-
    Black-white core with selective cyan-violet spectral accents, silver mids, and sparse high-intensity
    contrast nodes
  lighting_and_shadow: >-
    Hard-edged rim illumination, selective underglow, concentrated aura bloom pockets, and dramatic shadow
    partitioning
  texture_and_material: >-
    Smooth matte cloth against polished blade sheen, faint particle haze, low-grain digital cel patina, crisp
    effect overlays
  camera_and_composition: >-
    High-angle slash trajectories with compressed depth lanes and silhouette-priority framing for impact
    authority
  atmosphere_and_mood: Severe, iconic, charged, controlled, intimidating
  rendering_and_quality: Premium early-digital shonen polish optimized for iconic pose readability and supernatural edge fidelity
  key_features: >-
    Monochrome supremacy, razor-vector composition, aura-pressure motifs, severe fashion silhouettes,
    mask-signature abstraction
  creative_brief: >-
    Anchor this preset in monochrome edge-energy language and strict silhouette authority; emphasize
    spiritual-pressure contrast design over any specific transformation scene or character setup. Apply this
    anime/IP-title grammar over any input: preserve its motion language, line economy, emotional staging,
    palette logic, and symbolic cues while avoiding a required cast, lore event, weapon, arena, school, ship,
    or fixed scene.
