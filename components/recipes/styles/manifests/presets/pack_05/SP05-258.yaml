visualDna:
  aesthetic: Fantasía de utilidad cotidiana, donde oficio, logística y soporte práctico reemplazan el espectáculo heroico.
  form_and_line: Composición funcional, gestos de precisión, módulos pequeños y lectura clara de competencia manual.
  color_palette: Marrón herramienta, acero gris, naranja lámpara, verde cuerda y beige de piedra utilitaria.
  lighting_setup: Focos cálidos portátiles, sombras técnicas y acentos de trabajo que guían la mirada por función.
  material_texture: Fibra trenzada, metal opaco, cuero utilitario, polvo mineral y marcas de uso cuidadoso.
  render_quality: Slice-of-adventure operativo, con encanto de competencia práctica y detalle táctil legible.
  spatial_distortion: Escala humana de mantenimiento, proximidad funcional y tensión pequeña resuelta con método.
  atmosphere: Modesta, cálida y confiable.
  key_features: Precisión artesanal, soporte logístico, microgestos de oficio, calidez técnica y humildad competente.
  creative_brief: >-
    Construye una gramática toolbox-quest reusable donde cualquier prompt gane
    oficio, cuidado técnico y eficacia narrativa sin exigir utilería, grupo,
    locación peligrosa o situación de reparación literal.
