visualDna:
  aesthetic: >-
    Total-attrition tactical anime apocalypse with annihilation interfaces, critical alarms,
    mass-threat abstraction, and command-pressure geometry
  form_and_line: >-
    Silueta vectorial dura, composición de comando en capas y masa hostil tratada como volumen
    estadístico.
  color_palette: Acero opaco, rojo de alarma, humo gris, naranja de detonación y verde instrumental de HUD.
  lighting_setup: Parpadeo de alertas, backlight de crisis y luminancia electrónica de mando.
  material_texture: Superficie golpeada, concreto fracturado, residuos térmicos y lluvia sobre materiales bélicos.
  render_quality: Sci-fi táctico con claridad operativa, presión visual alta y escala de colapso civilizatorio.
  spatial_distortion: >-
    Profundidad por enjambre y capas de táctica superpuesta, con compresión de decisiones en tiempo
    crítico.
  atmosphere: Desesperada, militarizada y sacrificial, de urgencia sostenida.
  key_features: >-
    Control overlays, critical alarms, mass threat fields, evacuation geometry, urban wear, and
    command-pressure severity
  creative_brief: >-
    Use Muv-Luv Alternative as style anchor for extinction interface command. Any prompt should feel
    statistically overwhelmed, tactically compressed, and near-collapse. Suits, cities, enemies,
    battles, cockpits, and war scenes are optional.
avoidRules:
  - realistic
  - 3d render
  - photo
  - live action
  - western comic
  - ugly
  - bad anatomy
  - low quality
  - jpeg artifacts
  - watermark
  - text
  - signature
