visualDna:
  aesthetic: Apocalipsis táctico de desgaste total, con interfaz de aniquilación y amenaza impersonal de masa estadística.
  form_and_line: Silueta vectorial dura, composición de comando en capas y masa hostil tratada como volumen estadístico.
  color_palette: Acero opaco, rojo de alarma, humo gris, naranja de detonación y verde instrumental de HUD.
  lighting_setup: Parpadeo de alertas, backlight de crisis y luminancia electrónica de mando.
  material_texture: Superficie golpeada, concreto fracturado, residuos térmicos y lluvia sobre materiales bélicos.
  render_quality: Sci-fi táctico con claridad operativa, presión visual alta y escala de colapso civilizatorio.
  spatial_distortion: Profundidad por enjambre y capas de táctica superpuesta, con compresión de decisiones en tiempo crítico.
  atmosphere: Desesperada, militarizada y sacrificial, de urgencia sostenida.
  key_features: Overlays de control, amenaza masiva, desgaste urbano, alarmas críticas y geometría de evacuación.
  creative_brief: >-
    Formula una gramática extinction-war reusable donde interfaz táctica,
    desgaste urbano y amenaza masiva no antropomórfica definan el estilo con
    rigor de comando sin exigir traje, ciudad, enemigo o batalla literal.
