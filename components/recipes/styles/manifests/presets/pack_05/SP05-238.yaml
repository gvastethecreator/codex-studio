visualDna:
  aesthetic: Neo-tokusatsu digital anime style with giant-silhouette heroism, lattice-grid iconography, and clean melancholic futurism
  form_and_line: Bold hero contour staging, scale-contrast silhouette stacking, geometric effect overlays, restrained technical hatch accents
  color_palette: Cool steel base, electric cyan lattices, muted magenta glows, controlled white-hot highlights, low-saturation dusk neutrals
  lighting_setup: Monumental backlight silhouettes, grid-emissive overlays, selective rim emphasis, soft atmospheric diffusion against hard key edges
  material_texture: Smooth armored composites, semi-gloss synthetic panels, subtle weathering traces, luminous energy-surface interaction cues
  render_quality: Crisp modern tokusatsu-anime finish with high silhouette readability, effect-layer precision, and emotionally clean rendering
  spatial_distortion: Hero-scale exaggeration via depth compression and vertical dominance, with foreground-midground scale tension
  atmosphere: Heroic, wistful, controlled, luminous, resonant
  key_features: Giant-form silhouette grammar, digital lattice overlays, disciplined mecha contour language, mood-through-scale composition
  creative_brief: >-
    The style should be recognized by monumental silhouette contrast and
    digital-grid visual motifs; keep the emotional tone contemplative while
    preserving clean heroic readability across different subjects.
