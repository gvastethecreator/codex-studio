visualDna:
  aesthetic: >-
    Neo-tokusatsu anime melancholy with colossus-scale silhouettes, digital lattice motifs, clean
    heroic geometry, and nostalgic signal light
  form_and_line: >-
    Contorno monumental limpio, apilado de escala por capas y overlays geométricos de precisión
    controlada.
  color_palette: Acero frío, cian eléctrico, magenta tenue de crepúsculo y blancos de energía puntuales.
  lighting_setup: >-
    Contraluz de ícono heroico, emisión de grid holográfico y difusión atmosférica suave sobre key
    duro.
  material_texture: >-
    Compuesto sintético semibrillo, panelado depurado, interacción lumínica energía-armadura y
    desgaste mínimo.
  render_quality: >-
    Acabado nítido tokusatsu-anime con legibilidad de silueta y limpieza emocional de alto
    contraste.
  spatial_distortion: >-
    Compresión de profundidad para escalar la figura central y tensión foreground-midground de mundo
    miniaturizado.
  atmosphere: Heroica y resonante, con nostalgia tecnológica contenida.
  key_features: >-
    Colossal silhouette contrast, digital lattice, nostalgic tech glow, clean hero geometry,
    sentimental scale, and grid energy
  creative_brief: >-
    Use SSSS.Gridman as style anchor for tokusatsu digital grid scale. Any prompt should feel huge,
    clean, signal-lit, and contemplatively heroic. If subject supports it, add colossus/robot scale
    hints or digital-lattice armor; cities, monsters, literal screens, and battle scenes remain
    optional.
