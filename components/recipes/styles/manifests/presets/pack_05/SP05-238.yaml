visualDna:
  aesthetic: Neo-tokusatsu melancólico con heroísmo de silueta gigante y gramática digital de rejilla energética.
  form_and_line: Contorno monumental limpio, apilado de escala por capas y overlays geométricos de precisión controlada.
  color_palette: Acero frío, cian eléctrico, magenta tenue de crepúsculo y blancos de energía puntuales.
  lighting_setup: Contraluz de ícono heroico, emisión de grid holográfico y difusión atmosférica suave sobre key duro.
  material_texture: Compuesto sintético semibrillo, panelado depurado, interacción lumínica energía-armadura y desgaste mínimo.
  render_quality: Acabado nítido tokusatsu-anime con legibilidad de silueta y limpieza emocional de alto contraste.
  spatial_distortion: Compresión de profundidad para escalar la figura central y tensión foreground-midground de mundo miniaturizado.
  atmosphere: Heroica y resonante, con nostalgia tecnológica contenida.
  key_features: Silueta colosal, lattice digital, nostalgia tecnológica e iconografía de escala sentimental.
  creative_brief: >-
    Define una gramática tokusatsu-grid reusable donde contraste de silueta
    colosal y motivos de malla digital sostengan una heroicidad contemplativa,
    limpia y transferible entre sujetos.
