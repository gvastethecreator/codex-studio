visualDna:
  aesthetic: Defensive underdog fantasy, with resilience, grit, layered mistrust, protective geometry, and forward-moving defiance.
  form_and_line: Broad blocking shapes, guarded silhouettes, nested arcs, scarred contour weight, and stance-like compositional stability.
  color_palette: Burnished bronze, storm blue, mud brown, ember red, wounded violet, and hard steel highlights.
  lighting_setup: Low defensive glow, side-lit grit, hard edge rims, and ember accents that make endurance visible.
  material_texture: Scratched metal, rough cloth, cracked stone grain, soot glaze, and protective magic particles.
  render_quality: Gritty fantasy anime polish with tactile defense logic, emotional resilience, and clear silhouette weight.
  spatial_distortion: Forward pressure against heavy opposition, layered barriers, and compressed depth that makes survival active.
  atmosphere: Determined, defensive, resilient, betrayed.
  key_features: Protective geometry, underdog grit, barrier layering, resilient glow, distrust-to-defiance tension.
  creative_brief: >-
    Render any prompt as defense becoming motion: use barrier geometry, scarred
    material texture, and hard-earned glow so resilience reads visually without
    requiring a literal defensive artifact, group, kingdom, curse, or disaster.
