  color_palette: Carmín crepuscular, azul viento, dorado arcano, plata fría y violeta profético.
  lighting_setup: Backlight ventoso, glow místico facetado y key dramático de tensión sentimental.
  material_texture: Tela batida por viento, metal pulido abstracto, piedra ceremonial, brillo adivinatorio y humo atmosférico.
  render_quality: Fantasía romántica de alto dramatismo con fusión legible de épica mecha y sensibilidad shōjo.
  spatial_distortion: Profundidad por corrientes de viento, diagonales de destino, tensión entre curvas suaves y masas angulares.
  atmosphere: Ventosa, mística y apasionada, con tensión entre amor y guerra.
  key_features: Simbolismo adivinatorio, ráfagas diagonales, contraste shōjo-angular, plata arcana y mirada predestinada.
  creative_brief: >-
    Define una gramática windblown-prophecy reusable donde romance fatalista,
    iconografía adivinatoria, viento y contraste angular construyan épica emotiva
    transferible, sin fijar rol, artefacto, conflicto o vínculo narrativo
    específico.
