  spatial_distortion: Profundidad por corrientes de viento y énfasis en diagonales de destino entre personaje y máquina.
  atmosphere: Ventosa, mística y apasionada, con tensión entre amor y guerra.
  key_features: Simbolismo de tarot, capa en ráfaga, knight-mecha dracónico y encuadre de mirada predestinada.
