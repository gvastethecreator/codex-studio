visualDna:
  aesthetic: Fantasía cortesana de mandato celeste, con exilio iniciático, simbolismo bestial y densidad político-espiritual.
  form_and_line: Silueta ceremonial oriental, pliegues de túnica imperial y arquitectura de sala del trono con eje de autoridad.
  color_palette: Verde jade, rojo cinabrio, dorado imperial, negro tinta y azul niebla de montañas sagradas.
  lighting_setup: Luz solemne de corte, contraluz de salón ritual y brillos selectivos sobre insignias de legitimidad.
  material_texture: Seda pesada, laca ceremonial, piedra de palacio, ornamento broncíneo y talismanes de bestia mensajera.
  render_quality: Drama de alta fantasía político-mítica con lectura jerárquica clara y peso ceremonial.
  spatial_distortion: Verticalidad de poder en interiores y contraste con horizontalidad de camino de exilio.
  atmosphere: Regia, fatal y reflexiva, atravesada por destino y deber.
  key_features: Túnica imperial, emisarios bestiales, trono monumental y dualidad entre corte y peregrinaje.
  creative_brief: >-
    Construye una gramática imperial-destiny reusable donde protocolo cortesano,
    imaginería mandática y transformación del exilio en soberanía definan la
    identidad visual.
