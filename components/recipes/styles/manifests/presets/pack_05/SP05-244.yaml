visualDna:
  aesthetic: Fantasía cortesana de mandato celeste, legitimidad ritual, exilio interior y densidad político-espiritual como presión visual.
  form_and_line: Siluetas ceremoniales, pliegues autoritarios, ejes verticales de poder, ornamento sobrio y contorno de destino impuesto.
  color_palette: Verde jade, rojo cinabrio, dorado imperial, negro tinta y azul niebla ceremonial.
  lighting_setup: Luz solemne de autoridad, contraluz ritual y brillos selectivos sobre símbolos de legitimidad.
  material_texture: Seda pesada, laca ceremonial, piedra pulida, ornamento broncíneo y talismanes abstractos.
  render_quality: Drama de alta fantasía político-mítica con lectura jerárquica clara y peso ceremonial.
  spatial_distortion: Verticalidad de poder, horizontalidad de tránsito interior, simetría protocolar y distancia jerárquica.
  atmosphere: Regia, fatal y reflexiva, atravesada por destino y deber.
  key_features: Protocolo ritual, jade y cinabrio, legitimidad visual, distancia jerárquica y transformación de exilio en autoridad.
  creative_brief: >-
    Construye una gramática imperial-destiny reusable donde protocolo, mandato,
    jade/cinabrio, simetría y distancia jerárquica transformen cualquier sujeto
    en drama de autoridad, sin exigir institución, objeto, rol o tránsito
    narrativo específico.
