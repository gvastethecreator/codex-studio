visualDna:
  aesthetic: Fantasía pastel de convivencia alegre, con banquet como ancla sensorial, comedia suave y luz de celebración.
  form_and_line: Siluetas cute limpias, agrupación amable, curvas dulces y composición horizontal de abundancia compartida.
  color_palette: Rosa crema, azul caramelo, melocotón, verde menta y dorado postre.
  lighting_setup: Luz alta festiva, rebote cálido y acentos brillantes que convierten bordes y ornamentos en dulzor visual.
  material_texture: Glaseado, pan suave, cerámica brillante, tela colorida y superficies pulidas sin locación obligatoria.
  render_quality: Acabado candy-clean con legibilidad de ensemble y tono celebratorio continuo.
  spatial_distortion: Densidad amable, profundidad de convivencia y ritmo horizontal que deja respirar cada forma.
  atmosphere: Alegre, acogedora y deliciosa.
  key_features: Colorimetría de postre, abundancia pastel, comedia suave, brillo candy-clean y camaradería luminosa.
  creative_brief: >-
    Construye una gramática banquet-quest-pastel reusable donde cualquier prompt
    gane alegría compartida, dulzor cromático y acabado candy-clean sin exigir
    reunión, locación pública o escena culinaria fija.
