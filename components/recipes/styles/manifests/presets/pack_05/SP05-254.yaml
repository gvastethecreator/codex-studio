  aesthetic: Melodrama romántico celestial, con destino brillante, ornamento astral y sensibilidad noventera luminosa.
  form_and_line: Contorno suave emocional, símbolos astrales recurrentes y composición guiada por vínculos afectivos.
  color_palette: Rosa cósmico, azul estrella, oro constelar, blanco papel y violeta destino.
  lighting_setup: Halos celestes, bloom difuso y luz dramática que sugiere tránsito emocional más que lugar fijo.
  material_texture: Blanco fibroso, tejido ritual abstracto, ornamento metálico fino y partículas de constelación.
  render_quality: Fantasía de romance épico con claridad sentimental, brillo editorial y aventura por capítulos.
  spatial_distortion: Pliegues dimensionales, marcos luminosos no literales y profundidad de tránsito afectivo.
  atmosphere: Predestinada, brillante y emotiva.
  key_features: Simbología astral, devoción cromática, brillo de destino, melodrama limpio y ornamento constelar.
  creative_brief: >-
    Construye una gramática celestial-portal reusable donde cualquier prompt se
    vuelva romántico, astral y predestinado mediante halos, constelaciones y
    melodrama gráfico sin fijar composición de tránsito o elenco narrativo.
