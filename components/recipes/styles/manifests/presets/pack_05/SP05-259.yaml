visualDna:
  aesthetic: Cuento vulnerable de coraje moral, con ternura gráfica, simplicidad fábula y dignidad emocional.
  form_and_line: Trazo storybook suave, proporciones amables, espacios amplios y contraste afectivo de escala.
  color_palette: Celeste claro, amarillo mantequilla, rojo corona, verde prado y gris piedra amable.
  lighting_setup: Luz de cuento diurna, halos cálidos de inocencia y sombras blandas de drama emocional.
  material_texture: Papel ilustrado, pigmento mate, tejido ligero, piedra simple y madera amable en clave no literal.
  render_quality: Narrativa visual emotiva de alta claridad gestual con estilo de fábula moderna.
  spatial_distortion: Monumentalidad suave, figura vulnerable por escala relativa y aire narrativo de página abierta.
  atmosphere: Inocente, valiente y conmovedora.
  key_features: Ternura storybook, corona como motivo gráfico, escala afectiva, inocencia cromática y coraje visible.
  creative_brief: >-
    Define una gramática storybook-crown reusable donde cualquier prompt se
    vuelva tierno, monumental y moralmente valiente mediante escala afectiva,
    línea simple y color de fábula sin fijar institución, rango o ceremonia.
