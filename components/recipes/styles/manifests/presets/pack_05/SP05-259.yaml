visualDna:
  aesthetic: Cuento de coronación vulnerable, con ternura gráfica y heroísmo moral en clave infantil.
  form_and_line: Trazo storybook suave, silueta pequeña protagonista y arquitectura de castillo de fábula.
  color_palette: Celeste claro, amarillo mantequilla, rojo corona, verde prado y gris piedra amable.
  lighting_setup: Luz de cuento diurna, halos cálidos de inocencia y sombras blandas de drama emocional.
  material_texture: Mampostería simple, tejido noble ligero, madera palaciega y acabado ilustrado de libro infantil.
  render_quality: Narrativa visual emotiva de alta claridad gestual con estilo de fábula moderna.
  spatial_distortion: Contraste deliberado entre figura mínima y espacio monumental para enfatizar coraje.
  atmosphere: Inocente, valiente y conmovedora.
  key_features: Corona sobredimensionada, castillos de cuento, lenguaje corporal transparente y contraste de escala afectivo.
  creative_brief: >-
    Define una gramática storybook-crown reusable donde fragilidad corporal,
    monumentalidad de fábula y valentía ética construyan una épica sensible y
    universal.
