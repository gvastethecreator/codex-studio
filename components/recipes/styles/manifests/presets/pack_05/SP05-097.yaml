visualDna:
  aesthetic: Bone-throne dark dominion, with ornate villain regality, cathedral dread, absolute hierarchy, and frozen authority.
  form_and_line: Massive vertical symmetry, baroque contour density, crownlike negative space, severe silhouettes, and ceremonial stillness.
  color_palette: Bone ivory, royal black, grave violet, antique gold, cold emerald, and deep crimson authority.
  lighting_setup: Low underglow, throne-like backlight, cathedral shadow shafts, and hard rim halos around dominant forms.
  material_texture: Carved bone texture, polished black stone, heavy velvet darkness, tarnished gold, and cold magical dust.
  render_quality: Grand dark-fantasy anime polish with ornate detail, oppressive scale, and absolute compositional control.
  spatial_distortion: Monumental centrality, vertical dread, and symmetrical pressure that makes any subject feel enthroned.
  atmosphere: Dominant, sinister, grandiose, foreboding.
  key_features: Skeletal regality, cathedral shadow, imperial stillness, ornate dread, absolute hierarchy.
  creative_brief: >-
    Render any prompt with dark dominion authority: use bone-ivory contrast,
    baroque symmetry, cold magical dust, and oppressive stillness without
    requiring a literal seat of power, faction, army, or named ruler.
