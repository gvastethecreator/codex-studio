visualDna:
  aesthetic: >-
    Sun-reclaimed concrete mystery, institutional remnants softened by growth, existential dislocation,
    low-key unease beneath bright quiet
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Sun-bleached concrete, weed-soft edge texture, flaked paint, warm dust, cracked institutional surfaces,
    dry moss grain
  camera_and_composition: >-
    Open-horizon uncertainty, institutional grid decay, sunlit emptiness, broken-modern scale contrast, quiet
    pathlike depth
  atmosphere_and_mood: Mysterious, sun-bleached, uneasy, searching
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: >-
    Sun-bleached concrete, growth-over-grid texture, existential quiet, mystery through absence, broken-modern
    softness
  creative_brief: >-
    Give any prompt a bright post-institutional mystery treatment: sunlight, concrete, plant-softened decay,
    and unresolved emptiness should imply lost systems without fixed institutions, roles, threats, travel
    paths, or world lore.
