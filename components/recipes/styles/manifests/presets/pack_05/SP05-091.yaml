visualDna:
  aesthetic: Glowing VR fantasy, with interface-light magic, virtual romance, polished heroism, and visceral digital immersion.
  form_and_line: Clean fantasy contours, translucent HUD arcs, thin luminous trim, modular edge highlights, and readable action silhouettes.
  color_palette: Sky sapphire, interface cyan, warm amber courage, emerald status glow, white bloom, and deep virtual blue.
  lighting_setup: Diegetic UI glow, atmospheric depth haze, soft rim auras, and crystalline light planes.
  material_texture: Glassy overlays, polished cel surfaces, pixel-fine particles, synthetic fabric sheen, and luminous edge bloom.
  render_quality: Expansive digital-fantasy anime polish with high clarity, clean compositing, and romantic virtual scale.
  spatial_distortion: Layered interface depth, suspended panels, and horizon expansion that makes space feel software-shaped.
  atmosphere: Adventurous, virtual, epic, romantic.
  key_features: Interface constellations, virtual glow, clean adventure polish, synthetic depth, emotional immersion.
  creative_brief: >-
    Make any prompt feel like fantasy translated through a beautiful virtual
    system: UI light should behave like atmosphere, digital edges should feel
    tactile, and heroic scale should come from immersion rather than fixed game
    locations or named characters.
