visualDna:
  aesthetic: >-
    Pale threshold horror, silver glint discipline, metamorphic dread, bleak restraint, ranked severity as
    graphic order, hunter-prey symmetry without literal roles
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Chalk-pale matte surfaces, silver edge sheen, cracked ash grain, cold leatherlike roughness, mineral dust,
    restrained organic distortion
  camera_and_composition: >-
    Symmetrical threat staging, pale figure-ground inversion, narrow vertical cuts, restrained metamorphic
    edges, severe silhouette separation
  atmosphere_and_mood: Bleak, haunted, grim, melancholic
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: >-
    Heavy atmosphere, narrative weight, oppressive mood building, visceral consequence framing, story-first
    visual language
  creative_brief: >-
    Give any prompt a pale, disciplined horror treatment where beauty looks one step from transformation. Use
    silver edge accents, ash-matte textures, severe silhouette order, and quiet dread as a portable image
    grammar, not a fixed cast, setting, rank system, or confrontation scene.
avoidRules:
  - realistic
  - 3d render
  - photo
  - live action
  - western comic
  - ugly
  - bad anatomy
  - low quality
  - jpeg artifacts
  - watermark
  - text
  - signature
