visualDna:
  aesthetic: >-
    Cybernetic nihilism rendered through oxidized wire, failing light, cable abrasion, hard shadow, and
    downward social pressure
  subject_treatment: >-
    Rigid amputated geometry, rust-wire diagonals, severe low silhouettes, tunnel-like compression, and brutal
    panel cuts.
  color_and_tone: Rust brown, dead black, sickly green, old fluorescent white, bloodless gray, and oxidized orange.
  lighting_and_shadow: Failing tube light, harsh underlighting, narrow glow seams, and deep oppressive shadow blocks.
  texture_and_material: Rust streaks, cable abrasion, scarred metal, damp concrete, oxidized fasteners, and oily reflective film.
  camera_and_composition: Downward compression, subterranean depth, and claustrophobic perspective breaks.
  atmosphere_and_mood: Nihilistic, rusted, oppressive, cold
  rendering_and_quality: Mature sci-fi anime finish with abrasive grime, mechanical fidelity, and oppressive compositing.
  key_features: >-
    Rust-wire texture, cable scars, failing fluorescent light, oppressive descent, hard-shadow nihilism, and
    dead machinery
  creative_brief: >-
    Use Texhnolyze as style anchor for rust-wire descent. Any prompt should feel corroded, downward, bruised
    by infrastructure, and dimly alive. Prosthetics, underground spaces, corridors, body damage, and violence
    are optional.
