visualDna:
  aesthetic: Tragic conflict-anime style with institutional gravity, elegiac pacing, and large-scale mechanized weight
  subject_treatment: >-
    Severe silhouette hierarchy, disciplined shape language, rupture-line punctuation, and mournful
    still-frame counterbeats
  color_and_tone: >-
    Desaturated iron blues, muddy earth umbers, smoke grays, muted blood-crimson accents, low-saturation cold
    highlights
  lighting_and_shadow: >-
    Diffused overcast with intermittent rupture flashes, long shadow veils, and documentary-like contrast
    restraint
  texture_and_material: >-
    Sooted metal surfaces, churned particulate, worn fabric grain, static noise overlays for archival tragedy
    tone
  camera_and_composition: Wide pressure planes with depth layering and occasional compression for claustrophobic strategic burden
  atmosphere_and_mood: Somber, catastrophic, heavy, mournful, relentless
  rendering_and_quality: >-
    Cinematic tragedy-drama polish focused on emotional gravity, scale coherence, and restrained effect
    realism
  key_features: >-
    Disciplined silhouette order, elegiac rupture rhythm, archival tragedy tonality, institutional pressure
    grammar
  creative_brief: >-
    Preserve this preset as an elegy language: desaturated conflict weight, institutional silhouette
    discipline, and grief-forward pacing should define it beyond any specific tactical setup. Apply this
    anime/IP-title grammar over any input: preserve its motion language, line economy, emotional staging,
    palette logic, and symbolic cues while avoiding a required cast, lore event, weapon, arena, school, ship,
    or fixed scene.
