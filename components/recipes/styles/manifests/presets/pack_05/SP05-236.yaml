visualDna:
  aesthetic: >-
    Extreme utilitarian anime wear where compact hardware, mud, rust, logistical pressure, and
    anti-glamour function replace spectacle
  form_and_line: >-
    Volúmenes compactos blindados, ópticas mínimas abstractas, panelado funcional, proporciones
    bajas y ausencia de heroización formal.
  color_palette: Verde oliva sucio, marrón barro, gris acero oxidado y rojo de testigo operativo mínimo.
  lighting_setup: Luz plomiza, rebote húmedo de lodo y lectura por focos funcionales de baja intensidad.
  material_texture: >-
    Óxido activo, barro espeso, soldadura tosca, pintura descascarada y desgaste por fricción
    mecánica.
  render_quality: >-
    Mecánica utilitaria de alta credibilidad con peso físico, suciedad persistente y enfoque
    anti-glamour.
  spatial_distortion: >-
    Perspectiva baja, compresión de presión logística, visibilidad limitada y masa compacta en
    primer plano.
  atmosphere: Ruda, agotada y pragmática, sin épica.
  key_features: >-
    Low compact mass, utility chassis logic, mud-rust texture, survival materiality, compressed
    pressure, and anti-heroic function
  creative_brief: >-
    Use compact attrition hardware as worn-function grammar. Any prompt should feel low, heavy,
    disposable, repaired, and logistically stressed. Vehicles, factions, trenches, war, and hero
    spectacle are optional.
