visualDna:
  aesthetic: Realismo utilitario de desgaste extremo, hardware compacto tratado como material desechable, presión logística, anti-glamour industrial.
  form_and_line: Volúmenes compactos blindados, ópticas mínimas abstractas, panelado funcional, proporciones bajas y ausencia de heroización formal.
  color_palette: Verde oliva sucio, marrón barro, gris acero oxidado y rojo de testigo operativo mínimo.
  lighting_setup: Luz plomiza, rebote húmedo de lodo y lectura por focos funcionales de baja intensidad.
  material_texture: Óxido activo, barro espeso, soldadura tosca, pintura descascarada y desgaste por fricción mecánica.
  render_quality: Mecánica utilitaria de alta credibilidad con peso físico, suciedad persistente y enfoque anti-glamour.
  spatial_distortion: Perspectiva baja, compresión de presión logística, visibilidad limitada y masa compacta en primer plano.
  atmosphere: Ruda, agotada y pragmática, sin épica.
  key_features: Chasis utilitario abstracto, barro y herrumbre, lectura funcional, supervivencia material, compactación pesada.
  creative_brief: >-
    Define una gramática compact-attrition reusable donde masa baja,
    materialidad de desgaste y presión logística expresen supervivencia
    prolongada sin transportes concretos, facciones, zanjas tácticas, conflicto
    literal o espectacularización heroica.
