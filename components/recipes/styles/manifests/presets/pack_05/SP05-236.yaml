visualDna:
  aesthetic: Realismo militar utilitario de desgaste extremo, con mecha tratado como hardware desechable de trinchera.
  form_and_line: Volúmenes compactos de blindado, óptica visor monocular y panelado funcional sin heroización formal.
  color_palette: Verde oliva sucio, marrón barro, gris acero oxidado y rojo de testigo operativo mínimo.
  lighting_setup: Cielo plomizo, rebote húmedo de lodo y lectura por focos funcionales de baja intensidad.
  material_texture: Óxido activo, barro espeso, soldadura tosca, pintura descascarada y desgaste por fricción mecánica.
  render_quality: Mecánica bélica de alta credibilidad con peso físico, suciedad persistente y enfoque anti-glamour.
  spatial_distortion: Perspectiva de campo bajo con compresión de trinchera y visibilidad táctica limitada.
  atmosphere: Ruda, agotada y pragmática, de guerra sin épica.
  key_features: Visor scope, chasis utilitario, barro y herrumbre, staging de trincheras y lenguaje de supervivencia táctica.
  creative_brief: >-
    Define una gramática scopedog-attrition reusable donde masa compacta,
    materialidad de desgaste y puesta en escena logística expresen conflicto
    prolongado sin espectacularización heroica.
