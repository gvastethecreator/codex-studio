visualDna:
  aesthetic: Reset-loop dark fantasy, with ornate beauty under dread, emotional collapse, and recursive fate pressure.
  form_and_line: Elegant fantasy contouring interrupted by spiral repeats, stress-fracture accents, and tightening visual rhythms.
  color_palette: Icy violet, pale silver, bruised blue, candle amber, deep burgundy, and shadowed ivory.
  lighting_setup: Beautiful surface glow with dread below it, cold rim halos, looping highlight echoes, and suffocating low contrast.
  material_texture: Fine fabric grain, carved ornament, paper-thin magic particles, damp shadow glaze, and polished despair.
  render_quality: High-polish fantasy anime with psychological tension, delicate detail, and controlled emotional breakdown.
  spatial_distortion: Spiral compression, deja-vu repetition, and ornamental depth that seems to close inward.
  atmosphere: Anxious, tragic, harrowing, relentless.
  key_features: Recursive fate, beauty-as-pressure, spiral dread, fragile hope, ornate emotional collapse.
  creative_brief: >-
    Treat any prompt as trapped inside beautiful repetition: use spiral
    composition, delicate ornament, cold glow, and emotional pressure to imply a
    reset-loop without literal locations, antagonists, set pieces, or named
    characters.
