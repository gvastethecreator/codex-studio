visualDna:
  aesthetic: >-
    Aristocratic menace, crimson authority fields, black ceremonial contrast, gothic pressure geometry,
    predatory elegance, sanctified violence as abstraction
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Velvet-black ink mass, oxidized crimson glaze, polished dark enamel, aged paper grain, hard-edged stain
    texture, smoky drybrush
  camera_and_composition: >-
    Heraldic vertical framing, severe silhouette hierarchy, crimson-black power asymmetry, ritualized negative
    space, blade-sharp contour rhythm
  atmosphere_and_mood: Violent, regal, gothic, relentless
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: >-
    Heavy atmosphere, narrative weight, oppressive mood building, visceral consequence framing, story-first
    visual language
  creative_brief: >-
    Convert any subject into a regal gothic pressure image built from crimson authority, black ceremonial
    voids, and hard-edged shadow hierarchy. Keep the menace formal, graphic, and transferable instead of tied
    to fixed costumes, factions, interiors, weapons, or pursuit scenes.
