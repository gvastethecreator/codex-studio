visualDna:
  aesthetic: Aristocratic menace, crimson authority fields, black ceremonial contrast, gothic pressure geometry, predatory elegance, sanctified violence as abstraction
  form_and_line: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_palette: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_setup: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  material_texture: Velvet-black ink mass, oxidized crimson glaze, polished dark enamel, aged paper grain, hard-edged stain texture, smoky drybrush
  render_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  spatial_distortion: Heraldic vertical framing, severe silhouette hierarchy, crimson-black power asymmetry, ritualized negative space, blade-sharp contour rhythm
  atmosphere: Violent, regal, gothic, relentless
  key_features: Heavy atmosphere, narrative weight, oppressive mood building, visceral consequence framing, story-first visual language
  creative_brief: >
    Convert any subject into a regal gothic pressure image built from crimson
    authority, black ceremonial voids, and hard-edged shadow hierarchy. Keep the
    menace formal, graphic, and transferable instead of tied to fixed costumes,
    factions, interiors, weapons, or pursuit scenes.
