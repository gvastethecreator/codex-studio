visualDna:
  aesthetic: >-
    Rusted neon dread, broken youth interiority, violet-night melancholy, fractured chronology, faint
    unreality threading through ordinary damage
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Rusted neon bleed, industrial dust, violet film grain, damp concrete-neutral scuffing, analog static, worn
    wall texture
  camera_and_composition: >-
    Fragmented chronology cuts, violet-night compression, interior dread depth, static-layer repetition,
    memory-broken framing
  atmosphere_and_mood: Melancholic, fragmented, nocturnal, ghostly
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: Violet night tones, rusted neon bleed, fragmented framing, interior dread, static-haunted melancholy
  creative_brief: >-
    Give any prompt a rusted-neon psychological treatment: violet haze, analog static, fractured time, and
    damaged interiority should define the style without fixed institutions, passageways, myths, public spaces,
    urban scale, or haunting setup.
