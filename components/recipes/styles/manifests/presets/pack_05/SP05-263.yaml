visualDna:
  aesthetic: Black signal nihilism, fluorescent rules pressure, synthetic afterlife dread, cynical precision, glossy void objects, survival logic as graphic design
  form_and_line: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_palette: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_setup: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  material_texture: Latex-black gloss, fluorescent scan haze, neutral domestic grit, cold polymer sheen, scratched glass, synthetic dust
  render_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  spatial_distortion: Spherical void anchors, target-like overlays, compressed enclosure tension, cynical rule spacing, glossy black focal gravity
  atmosphere: Cruel, flashy, nihilistic, electric
  key_features: Gloss-black void shapes, fluorescent rule marks, cynical target geometry, synthetic grit, ruthless body-language abstraction
  creative_brief: >
    Treat any subject as if it is being processed by a cruel fluorescent system:
    glossy black anchors, green signal marks, synthetic grit, and rule-like
    overlays create nihilistic pressure without fixed settings, attire systems,
    play structures, locations, or scorekeeping props.
