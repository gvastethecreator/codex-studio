visualDna:
  aesthetic: >-
    Adolescent kinetic-collage style with abrupt tonal pivots, rebellious surreal pop energy, and anti-linear
    visual rhythm
  subject_treatment: >-
    Mixed-grammar line states, impact-smear transitions, panel-break overlays, elastic contour interruptions,
    intentionally uneven stroke cadence
  color_and_tone: >-
    Hyper-saturated primaries colliding with acidic neons, abrupt pastel inversions, high-chroma bursts
    against muted reset zones
  lighting_and_shadow: >-
    Rapid contrast switches, flash-frame highlights, intentional exposure jumps, and graphic shadow snapping
    between beats
  texture_and_material: >-
    Hybrid cel-polish with manga halftone inserts, rough print fragments, and controlled noise patches for
    collage friction
  camera_and_composition: >-
    Perspective ruptures, jump-cut framing logic, and composition resets that mimic impulsive developmental
    turbulence
  atmosphere_and_mood: Restless, rebellious, volatile, cathartic, raw
  rendering_and_quality: >-
    Experimental early-digital anime treatment favoring stylistic rupture, energetic readability, and
    emotionally volatile transitions
  key_features: Multi-style collision grammar, panel-break kinetics, chroma whiplash, anti-linear composition pacing
  creative_brief: >-
    Keep this preset defined by abrupt stylistic modulation and collage-like motion logic, turning emotional
    volatility into a transferable visual system rather than a specific coming-of-age scene, cast, or
    location. Apply this anime/IP-title grammar over any input: preserve its motion language, line economy,
    emotional staging, palette logic, and symbolic cues while avoiding a required cast, lore event, weapon,
    arena, school, ship, or fixed scene.
