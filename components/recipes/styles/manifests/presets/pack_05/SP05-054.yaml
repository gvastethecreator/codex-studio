visualDna:
  aesthetic: Operatic luminous conflict, sleek heroic geometry, psychic color pressure, radiant scale, and melodramatic cosmic stakes.
  form_and_line: Clean heroic hard-edge linework, long beam diagonals, crisp panel accents, elegant silhouette contrast, and elevated stance framing.
  color_palette: White-hot cores, saturated red-blue primaries, violet void shadows, chrome neutrals, and aurora-like particle color.
  lighting_setup: Radiant beam keys, flare bloom, colored rim clashes, distant black-field contrast, and luminous particulate haze.
  material_texture: Polished alloy sheen, smooth enamel planes, energy bloom, transparent particles, and cel-era specular snaps.
  render_quality: Premium space-opera anime finish with clear heroic hierarchy, bright chroma discipline, and polished luminous drama.
  spatial_distortion: Grand diagonal scale, beam-led depth, telephoto compression, and cosmic negative space around the focal silhouette.
  atmosphere: Dramatic, luminous, operatic, cosmic
  key_features: Beam diagonals, psychic color bloom, operatic silhouette contrast, luminous particles, and heroic negative-space staging.
  creative_brief: >-
    Apply luminous beam opera as a reusable style treatment: make any subject
    feel grand, radiant, emotionally strategic, and staged through colored
    energy while staying abstract, portable, and detached from fixed operators,
    hardware, territory, or combat narratives.
