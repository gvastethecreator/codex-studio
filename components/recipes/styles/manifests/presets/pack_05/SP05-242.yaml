visualDna:
  aesthetic: Fantasía de bajo nivel marcada por precariedad, duelo íntimo y supervivencia de escuadra sin épica grandilocuente.
  form_and_line: Siluetas contenidas, postura defensiva, distancia emocional entre miembros y lectura de movimiento cauteloso.
  color_palette: Marrón humo, gris barro, verde apagado, naranja tenue de fogata y azul noche húmeda.
  lighting_setup: Fuego débil de campamento, niebla baja, sombras largas y luz ambiental fría de bosque hostil.
  material_texture: Cuero remendado, tela mojada, metal sin pulir, barro adherido y desgaste acumulado en equipo improvisado.
  render_quality: Realismo anime sobrio con foco en vulnerabilidad corporal y narrativa de pérdidas pequeñas.
  spatial_distortion: Escala humana reducida, encuadres cerrados de grupo y profundidad incierta por niebla y maleza.
  atmosphere: Frágil, humilde y sincera, con miedo persistente y lealtad emergente.
  key_features: Fogata mínima, armadura parchada, senderos lodados y formación insegura de party novata.
  creative_brief: >-
    Construye una gramática smoke-and-mud reusable donde materialidad precaria,
    luz pobre y colaboración temblorosa expresen crecimiento desde la
    vulnerabilidad.
