visualDna:
  aesthetic: >-
    Sun-bleached cruelty, austere discipline, hierarchy as pressure, heat-stripped beauty, severe silence
    before irreversible motion
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Bleached dust, dry blood-brown staining, worn textile fiber, polished edge glints, hot paper grain, taut
    skin shadow
  camera_and_composition: >-
    Severe pre-motion stillness, hierarchy-weighted spacing, sun-flattened depth, brutal close crop,
    disciplined diagonal tension
  atmosphere_and_mood: Brutal, austere, scorching, merciless
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: Sun-bleached harshness, pre-motion rigor, woundlike detail, hierarchy pressure, unbearable stillness
  creative_brief: >-
    Render any subject under merciless heat and discipline: bleached light, dry staining, taut silence, and
    hierarchical spacing should make beauty feel cruel without fixed eras, duels, blades, ranks, or
    body-horror staging.
