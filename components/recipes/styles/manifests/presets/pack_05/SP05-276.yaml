  aesthetic: Merciless feudal duel realism, heat and blood, rank hierarchy, mutilated bodies, severe silence before violence, beauty stripped down to cruelty and discipline
  form_and_line: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_palette: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_setup: Ominous directional shadows, single-source drama light, deep chiaroscuro, cavernous underlighting
  material_texture: Ruin stone, worn leather, grime, organic detail, rust patina, cracked masonry, viscera sheen
  render_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  spatial_distortion: Grounded anatomy, severe silhouettes, realistic mass distribution, oppressive scale contrast
  atmosphere: Brutal, austere, scorching, merciless
  key_features: Sun-bleached harshness, duel posture rigor, body-wound detail, class-hierarchy props, unbearable stillness
  creative_brief: The sun does not illuminate here but interrogates every wound and silence between sword strokes. Bodies become territory and blades become law in a world where beauty is measured by how cleanly a life is severed. Each frame holds the unbearable weight of the moment just before blood becomes memory.
