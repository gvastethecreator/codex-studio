visualDna:
  aesthetic: Fantasía artesanal de conocimiento emergente, fragilidad íntima, obsesión material por el libro y tecnología transformadora.
  form_and_line: Escala pequeña, detalle manual, lenguaje visual centrado en oficio, proceso, paciencia y acumulación de pasos.
  color_palette: Sepia pergamino, azul tinta, marrón madera, crema papel y rojo cera de sello.
  lighting_setup: Luz suave de lectura, lámpara cálida y contraste bajo de espacio artesanal.
  material_texture: Vellum, pulpa de papel, madera prensada, metal tipográfico y manchas de tinta en tela.
  render_quality: Narrativa íntima de craft medieval con precisión material y foco en innovación cotidiana.
  spatial_distortion: Escala concentrada, composición por proceso manual y profundidad de oficio paciente.
  atmosphere: Estudiosa, tierna y obstinada, con fervor por la lectura.
  key_features: Tinta y papel, materialidad de libro, proceso artesanal, voluntad férrea y progreso silencioso.
  creative_brief: >-
    Define una gramática printing-devotion reusable donde materialidad del libro,
    labor artesanal y progreso silencioso conviertan cualquier sujeto en motor
    visual de conocimiento, sin espacio de trabajo fijo, herramientas concretas,
    organización artesanal o fragilidad corporal obligatoria.
