visualDna:
  aesthetic: Fantasía artesanal de imprenta emergente, con fragilidad corporal y obsesión por el libro como tecnología transformadora.
  form_and_line: Escala pequeña protagonista, detalle de taller manual y lenguaje visual centrado en oficio, proceso y paciencia.
  color_palette: Sepia pergamino, azul tinta, marrón madera, crema papel y rojo cera de sello.
  lighting_setup: Luz de ventana de scriptoria, lámpara de mesa cálida y contraste suave de interiores de taller.
  material_texture: Vellum, pulpa de papel, madera de prensa, metal tipográfico y manchas de tinta en tela.
  render_quality: Narrativa íntima de craft medieval con precisión material y foco en innovación cotidiana.
  spatial_distortion: Escala doméstica concentrada, composición por mesa de trabajo y profundidad de guild artesanal.
  atmosphere: Estudiosa, tierna y obstinada, con fervor por la lectura.
  key_features: Herramientas de imprenta, tinta y papel, interiores de taller y contraste entre cuerpo frágil y voluntad férrea.
  creative_brief: >-
    Define una gramática printing-devotion reusable donde materialidad del libro,
    labor artesanal y progreso silencioso conviertan la alfabetización en motor
    dramático visual.
