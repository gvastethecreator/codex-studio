visualDna:
  aesthetic: >-
    Prestige hero impact satire, with blockbuster destruction grammar, bored overpowered calm, and sincerity
    cut by absurdity.
  subject_treatment: >-
    Hyper-clean impact silhouettes, deadpan flat zones, explosive contour bursts, simple reaction shapes, and
    punchline timing lines.
  color_and_tone: >-
    Catastrophe orange, hero yellow, blank beige, concrete gray, electric blue, and crisp white impact
    flashes.
  lighting_and_shadow: >-
    Blockbuster blast illumination, calm portrait lighting, hard rim clarity, and comic contrast between scale
    and reaction.
  texture_and_material: >-
    Crisp debris particles, polished effect shards, clean cel fields, low-noise surfaces, and theatrical smoke
    gradients.
  camera_and_composition: Extreme impact foreshortening alternating with static flat framing for comedic dissonance.
  atmosphere_and_mood: Deadpan, explosive, absurd, triumphant
  rendering_and_quality: Top-tier modern anime action polish deliberately interrupted by anti-dramatic stillness.
  key_features: Overkill impact, deadpan calm, blockbuster polish, flat reaction zones, satire-through-contrast.
  creative_brief: >-
    Apply prestige impact satire to any prompt: render spectacle with maximum craft, then undercut it through
    flat reaction space and deadpan composition without requiring a hero, monster, cape, city, or crater
    scene.
