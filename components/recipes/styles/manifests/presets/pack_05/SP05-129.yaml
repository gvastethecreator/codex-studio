visualDna:
  aesthetic: Prestige hero impact satire, with blockbuster destruction grammar, bored overpowered calm, and sincerity cut by absurdity.
  form_and_line: Hyper-clean impact silhouettes, deadpan flat zones, explosive contour bursts, simple reaction shapes, and punchline timing lines.
  color_palette: Catastrophe orange, hero yellow, blank beige, concrete gray, electric blue, and crisp white impact flashes.
  lighting_setup: Blockbuster blast illumination, calm portrait lighting, hard rim clarity, and comic contrast between scale and reaction.
  material_texture: Crisp debris particles, polished effect shards, clean cel fields, low-noise surfaces, and theatrical smoke gradients.
  render_quality: Top-tier modern anime action polish deliberately interrupted by anti-dramatic stillness.
  spatial_distortion: Extreme impact foreshortening alternating with static flat framing for comedic dissonance.
  atmosphere: Deadpan, explosive, absurd, triumphant
  key_features: Overkill impact, deadpan calm, blockbuster polish, flat reaction zones, satire-through-contrast.
  creative_brief: >-
    Apply prestige impact satire to any prompt: render spectacle with maximum
    craft, then undercut it through flat reaction space and deadpan composition
    without requiring a hero, monster, cape, city, or crater scene.
