  color_palette: Ámbar cálido, turquesa brillante, rojo granate, verde esmeralda y azul noche ornamental.
  lighting_setup: Sol cálido, luces colgantes abstractas y destellos mágicos facetados tipo gema.
  material_texture: Tejidos bordados, latón trabajado, piedra caliza, polvo cálido y cristal encantado.
