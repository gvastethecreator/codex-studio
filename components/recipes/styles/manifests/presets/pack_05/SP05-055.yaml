visualDna:
  aesthetic: Gothic techno-dread, sacred industrial stillness, bio-synthetic unease, philosophical coldness, and elegant decay.
  form_and_line: Severe hard-edge linework, ribbed verticals, grotesque silhouette pressure, fine hatchwork, and solemn contour spacing.
  color_palette: Blackened teal, oxidized violet, dim cyan, bone ivory, cold steel, and rare acidic highlights.
  lighting_setup: Subterranean low glow, chapel-like shafts abstracted into geometry, rim-lit machinery, and negative-fill dread.
  material_texture: Damp metal, bio-organic membrane hints, worn stone-like surfaces, black lacquer, and corroded polymer.
  render_quality: Premium gothic-cyber anime finish with refined dread, precise surface hierarchy, and quiet high-detail menace.
  spatial_distortion: Vertical compression, sacred-scale symmetry, deep axial recession, and hollow negative space around the subject.
  atmosphere: Brooding, cerebral, existential, haunting
  key_features: Sacred-industrial geometry, bio-tech unease, black-metal sheen, hollow vertical space, and restrained existential menace.
  creative_brief: >-
    Apply gothic tech existential dread as a reusable style treatment: make any
    subject feel ritualized, hollow, elegant, and bio-synthetic while staying
    abstract, portable, and detached from fixed architecture, figures, places,
    or horror set pieces.
