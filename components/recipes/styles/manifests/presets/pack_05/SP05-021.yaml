visualDna:
  aesthetic: Youth-shonen velocity style with disciplined kinetic iconography, optimistic momentum arcs, and early-digital action clarity
  form_and_line: Clean directional inking, compact contour economy, speed-line vectors, emblematic silhouette rhythm, readable motion architecture
  color_palette: Saturated primaries with warm earth underlay, energetic accent spikes, high-contrast cel blocks, restrained shadow neutrals
  lighting_setup: Balanced key-fill anime model with brisk rim accents, controlled highlight pops, and smooth gradient transitions
  material_texture: Matte cel surface discipline, subtle broadcast-era noise, clean plate layering, minimal micro-surface clutter
  render_quality: Early-2000s digital-cel finish with crisp action legibility, stable compositing, and confident color separation
  spatial_distortion: Forward-leaning perspective thrust, elastic action staging, and trajectory-oriented framing for kinetic storytelling
  atmosphere: Driven, hopeful, kinetic, focused, resilient
  key_features: Kinetic motif abstraction, readable motion vectors, optimistic action cadence, stylized rivalry energy without fixed setting
  creative_brief: >-
    Preserve a youthful combat grammar through motion-vector linework,
    emblematic shape cues, and saturated cel dynamism so the style transfers
    across subjects without relying on a specific locale or accessory.
