visualDna:
  aesthetic: >-
    Youth-shonen velocity style with disciplined kinetic iconography, optimistic momentum arcs, and
    early-digital action clarity
  subject_treatment: >-
    Clean directional inking, compact contour economy, speed-line vectors, emblematic silhouette rhythm,
    readable motion architecture
  color_and_tone: >-
    Saturated primaries with warm earth underlay, energetic accent spikes, high-contrast cel blocks,
    restrained shadow neutrals
  lighting_and_shadow: >-
    Balanced key-fill anime model with brisk rim accents, controlled highlight pops, and smooth gradient
    transitions
  texture_and_material: >-
    Matte cel surface discipline, subtle broadcast-era noise, clean plate layering, minimal micro-surface
    clutter
  camera_and_composition: >-
    Forward-leaning perspective thrust, elastic action staging, and trajectory-oriented framing for kinetic
    storytelling
  atmosphere_and_mood: Driven, hopeful, kinetic, focused, resilient
  rendering_and_quality: >-
    Early-2000s digital-cel finish with crisp action legibility, stable compositing, and confident color
    separation
  key_features: >-
    Kinetic motif abstraction, readable motion vectors, optimistic action cadence, stylized rivalry energy
    without fixed setting
  creative_brief: >-
    Preserve a youthful combat grammar through motion-vector linework, emblematic shape cues, and saturated
    cel dynamism so the style transfers across subjects without relying on a specific locale or accessory.
    Apply this anime/IP-title grammar over any input: preserve its motion language, line economy, emotional
    staging, palette logic, and symbolic cues while avoiding a required cast, lore event, weapon, arena,
    school, ship, or fixed scene.
