visualDna:
  aesthetic: Procedural low-fantasy severity, dirty-metal pragmatism, tactical light discipline, merciless efficiency as composition, dice-like tension without literal gameplay
  form_and_line: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_palette: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_setup: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  material_texture: Dirty metal scuffing, torch-smoked grain, worn leatherlike matte, damp stone-neutral grit, practical cloth abrasion, dry blood-brown staining
  render_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  spatial_distortion: Tactical corridor-like compression, step-by-step composition, narrow light cones, practical silhouette economy, procedural threat spacing
  atmosphere: Tactical, grim, relentless, procedural
  key_features: Heavy atmosphere, narrative weight, oppressive mood building, visceral consequence framing, story-first visual language
  creative_brief: >
    Treat any subject as harsh practical fantasy rendered through procedure,
    restraint, and problem-solving grit. Use narrow light, dirty metal texture,
    smoky shadow, and economical silhouettes while keeping all figures, props,
    locations, enemies, and game-signifiers non-specific.
