visualDna:
  aesthetic: >-
    Luminous natural-cycle calm, adult folklore quiet, grief softened by ecology, pale living haze,
    contemplative moonlit medicine
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Moon-haze bloom, damp bark grain, soft moss matte, pale bioluminescent dust, river-silt texture, natural
    paper fibers
  camera_and_composition: >-
    Slow ecological layering, low horizontal calm, moon-haze depth, softened foreground veil, cyclical flow
    composition
  atmosphere_and_mood: Quiet, eerie, compassionate, nocturnal
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: Pale living haze, ecological stillness, moonlit calm, grief-softened texture, natural-cycle motifs
  creative_brief: >-
    Render any subject as part of a quiet natural cycle: pale glow, damp organic grain, moon haze, and patient
    ecological rhythm should define the style without fixed natural locations, specialist roles, journeys,
    rites, or named folklore beings.
