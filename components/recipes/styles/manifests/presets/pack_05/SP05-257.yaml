  color_palette: Plata de luna, azul medianoche, verde comercio, ocre de camino y violeta tenue de aura contenida.
  lighting_setup: Nocturnidad limpia, highlights cálidos bajos y acentos suaves que dejan el poder en reserva.
  material_texture: Madera seca, cuero sobrio, metal de intercambio, tela mate y polvo mineral en clave abstracta.
  render_quality: Fantasía transaccional con detalle económico, humor seco y poder subrayado por contención.
  spatial_distortion: Espacio amplio sugerido, microjerarquías de intercambio y foco tranquilo sin escena fija.
