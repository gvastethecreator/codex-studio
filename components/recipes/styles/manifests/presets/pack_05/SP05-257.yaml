visualDna:
  aesthetic: Isekai mercantil lunar de tono deadpan, donde poder abrumador convive con economía práctica y diplomacia local.
  form_and_line: Silueta sobria de viajero, staging de negociación en ruta y contraste entre calma expresiva y fuerza implícita.
  color_palette: Plata de luna, azul medianoche, verde comercio, ocre de camino y violeta tenue de aura contenida.
  lighting_setup: Nocturnidad limpia, highlights de fogón y acentos suaves sobre puestos, mapas y mercancía.
  material_texture: Madera de carreta, cuero de mercader, moneda metálica, tela de puesto y polvo de sendero.
  render_quality: Fantasía de viaje transaccional con detalle de worldbuilding económico y poder subrayado por contención.
  spatial_distortion: Espacio de ruta abierta con microescenas de intercambio y focalización en figura central serena.
  atmosphere: Desapegada, práctica y confiada.
  key_features: Road-market, comunidad demi-humana, postura overpowered serena y utilería comercial.
  creative_brief: >-
    Define una gramática moonlit-merchant reusable donde comercio itinerante,
    convivencia multi-especie y poder desproporcionado de baja exhibición se
    articulen con tono tranquilo.
