visualDna:
  aesthetic: Sleek post-apocalyptic tenderness, polished fragility, sunset loneliness, romantic pressure, and floral-tech melancholy.
  form_and_line: Smooth aerodynamic contours, delicate hard-edge panel accents, paired silhouette tension, and vulnerable negative-space framing.
  color_palette: Peach sunset, pale rose, white polymer, cool blue-gray, soft red accents, and muted violet shadow.
  lighting_setup: Sunset backlight, soft specular skin, cool technical fill, warm rim glow, and quiet bloom around emotional focal points.
  material_texture: Polished synthetic cloth, enamel shell surfaces, soft petal-like highlights, dust haze, and clean composite sheen.
  render_quality: Premium glossy anime finish with emotional clarity, sleek surface control, and bittersweet high-detail restraint.
  spatial_distortion: Intimate compression against broad empty space, soft horizon drag, and paired-vector composition without fixed setting.
  atmosphere: Vulnerable, sleek, bittersweet, romantic
  key_features: Sleek paired silhouettes, sunset ruin color, petal-tech motifs, fragile intimacy, and polished melancholy surfaces.
  creative_brief: >-
    Apply sleek post-apoc romance as a reusable style treatment: make any
    subject feel tender, engineered, lonely, and hopeful after collapse while
    staying abstract, portable, and detached from fixed operators, equipment,
    attire systems, decay settings, or alert scenarios.
