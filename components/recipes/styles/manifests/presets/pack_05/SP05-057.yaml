visualDna:
  aesthetic: >-
    Sleek post-collapse tenderness where polished fragility, sunset loneliness, floral-tech melancholy, and
    engineered intimacy carry emotion
  subject_treatment: >-
    Smooth aerodynamic contours, delicate hard-edge panel accents, paired silhouette tension, and vulnerable
    negative-space framing.
  color_and_tone: Peach sunset, pale rose, white polymer, cool blue-gray, soft red accents, and muted violet shadow.
  lighting_and_shadow: >-
    Sunset backlight, soft specular skin, cool technical fill, warm rim glow, and quiet bloom around emotional
    focal points.
  texture_and_material: >-
    Polished synthetic cloth, enamel shell surfaces, soft petal-like highlights, dust haze, and clean
    composite sheen.
  camera_and_composition: >-
    Intimate compression against broad empty space, soft horizon drag, and paired-vector composition without
    fixed setting.
  atmosphere_and_mood: Vulnerable, sleek, bittersweet, romantic
  rendering_and_quality: >-
    Premium glossy anime finish with emotional clarity, sleek surface control, and bittersweet high-detail
    restraint.
  key_features: >-
    Paired-silhouette rhythm, petal-tech motifs, sunset ruin color, polished melancholy, fragile intimacy, and
    glossy edge softness
  creative_brief: >-
    Use sleek collapse romance as fragile-engineered tenderness grammar. Any prompt should feel lonely,
    polished, hopeful, and post-catastrophic. Operators, suits, ruins, alarms, equipment, and romance scenes
    are optional.
