visualDna:
  aesthetic: Civilización post-login de fantasía sistémica, con política de gremios, urbanismo social y cooperación como tecnología cultural.
  form_and_line: Arquitectura ordenada de plazas y foros, siluetas de party-role claras y linework táctico de interfaz diegética.
  color_palette: Azul acero urbano, verde esmeralda administrativo, ámbar cálido de taberna y acentos cian de UI arcana.
  lighting_setup: Luz diurna de plaza, interiores de guildhall en tungsteno suave y superposición luminosa de ventanas de sistema.
  material_texture: Piedra cívica pulida, madera de cartelera, pergamino de contrato, metal de insignia y tela de uniforme gremial.
  render_quality: Fantasía urbana de alta legibilidad estratégica, con composición coral y claridad de roles en escena.
  spatial_distortion: Escala comunitaria horizontal, jerarquía visual por grupos y profundidad orientada a mapa social.
  atmosphere: Comunal, analítica y esperanzada, de ciudad que aprende a autogobernarse.
  key_features: Emblemas de guild, plazas de negociación, pizarras de quest y staging colaborativo de escuadras.
  creative_brief: >-
    Define una gramática strategy-guild reusable donde infraestructura social,
    estética de sistema y cooperación visible articulen identidad de mundo sin
    depender de una misión concreta.
