visualDna:
  aesthetic: Fantasía sistémica de cooperación visible, política social abstracta, administración luminosa y mundo legible como infraestructura cultural.
  form_and_line: Retículas ordenadas, siluetas funcionales claras, linework táctico de interfaz diegética y composición coral modular.
  color_palette: Azul acero urbano, verde esmeralda administrativo, ámbar cálido de taberna y acentos cian de UI arcana.
  lighting_setup: Luz administrativa clara, tungsteno suave y superposición luminosa de ventanas de sistema.
  material_texture: Piedra pulida, madera tabular, pergamino abstracto, metal de emblema y tela funcional.
  render_quality: Fantasía de alta legibilidad estratégica, con composición coral y claridad de roles visuales.
  spatial_distortion: Escala comunitaria horizontal, jerarquía visual por módulos y profundidad orientada a mapa social.
  atmosphere: Comunal, analítica y esperanzada, de sistema que aprende a autogobernarse.
  key_features: Emblemas abstractos, nodos de negociación, pizarras de sistema y staging colaborativo modular.
  creative_brief: >-
    Define una gramática cooperation-grid reusable donde infraestructura social,
    estética de sistema y cooperación visible articulen identidad sin
    instituciones nombradas, nodos cívicos fijos, tableros de misión, escuadras
    o urbe concreta.
