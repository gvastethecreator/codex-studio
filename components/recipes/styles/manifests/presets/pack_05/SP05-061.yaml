visualDna:
  aesthetic: >-
    Monumental doom weight, scar-like crosshatching, eclipse-black negative space, sacrificial emblem logic,
    oppressive scale fields, cursed ornamental geometry
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Scarred ink grain, worn hide texture, oxidized patina, cracked mineral surfaces, viscous black accents,
    abraded parchment roughness
  camera_and_composition: >-
    Severe silhouettes, compressed foreground mass, oppressive scale contrast, ceremonial void framing,
    gravity-heavy composition
  atmosphere_and_mood: Brutal, tragic, despairing, epic
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: >-
    Heavy atmosphere, narrative weight, oppressive mood building, visceral consequence framing, story-first
    visual language
  creative_brief: >-
    Render any subject as if weight, guilt, and fate have been pressed into the ink. Use scar-dense hatching,
    sacrificial symbol geometry, bruised earth reds, and eclipse-black shadow fields to create monumental doom
    as a transferable render grammar, free of fixed props, cast, lore icons, or set-piece events.
