  lighting_setup: Disaster-scene glare, operational floodlights, smoke-filtered backlight, and clear hazard-color hierarchy.
  material_texture: Concrete dust, rubberized armor sheen, bio-organic gloss, utility metal, smoke grit, and signage-flat overlays.
  render_quality: Premium modern anime finish with procedural clarity, colossal impact readability, and civic-response texture.
