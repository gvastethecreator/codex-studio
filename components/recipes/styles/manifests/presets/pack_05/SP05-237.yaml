visualDna:
  aesthetic: Heroísmo clásico de sangre caliente, disciplina técnica, lanzamiento monumental, sacrificio luminoso y escala emocional creciente.
  form_and_line: Silueta robusta abstracta, diagonales de lanzamiento, gestualidad enfática, verticalidad monumental y contornos de determinación.
  color_palette: Azul técnico, rojo heroico, blanco de flare estelar, negro profundo y amarillo de núcleo energético.
  lighting_setup: Fluorescente técnico, flare de ignición y bañado estelar de escala astronómica.
  material_texture: Carcasa marcada, juntas técnicas visibles, humo térmico y brillo energético de alto contraste.
  render_quality: Anime épico clásico con claridad emocional, expansión de escala y dramatismo de entrega final.
  spatial_distortion: Transición de escala íntima a cósmica con foreshortening heroico y verticalidad monumental.
  atmosphere: Triunfante, emotiva y colosal, de épica sincera.
  key_features: Diagonales de lanzamiento, núcleo luminoso, verticalidad colosal, emoción directa e iconografía de sacrificio abstracta.
  creative_brief: >-
    Construye una gramática launch-sacrifice reusable donde disciplina,
    ignición, verticalidad y expansión astronómica converjan en épica emocional
    directa sin infraestructura fija, entrenamiento literal, operadores,
    hardware concreto o cierre narrativo obligatorio.
