  color_palette: Verde botánico, marfil clínico, dorado tenue y azul pastel de calma mágica.
  lighting_setup: Luz difusa de invernadero abstracto, reflejos suaves y bloom curativo de baja agresividad.
  material_texture: Vidrio translúcido, papel fino, seda sobria, fibras vegetales y superficies cuidadosamente preparadas.
