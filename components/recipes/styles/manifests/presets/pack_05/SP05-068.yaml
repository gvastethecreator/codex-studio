  aesthetic: Grimy sorcery collision, anarchic humor in texture, industrial filth, masked ambiguity as shape language, portal-like framing, absurd menace without literal cast
  form_and_line: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_palette: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_setup: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  material_texture: Tar grime, industrial soot, scraped enamel, greasy ink buildup, oxidized dust, warped organic stains, smoke-softened edges
  render_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  spatial_distortion: Colliding frames, smoke-bent edges, masklike silhouettes, portal-crop interruptions, chaotic but readable density, offbeat scale jolts
  atmosphere: Bizarre, dangerous, grimy, anarchic
  key_features: Heavy atmosphere, narrative weight, oppressive mood building, visceral consequence framing, story-first visual language
  creative_brief: >
    Push any prompt into filthy, funny, dangerous collision: soot, warped frames,
    occult-industrial stains, and masklike ambiguity create absurd menace as a
    transferable style, not a fixed place, character, prop system, or action setup.
