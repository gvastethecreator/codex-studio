visualDna:
  aesthetic: >-
    Grimy sorcery collision, anarchic humor in texture, industrial filth, masked ambiguity as shape language,
    portal-like framing, absurd menace without literal cast
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Tar grime, industrial soot, scraped enamel, greasy ink buildup, oxidized dust, warped organic stains,
    smoke-softened edges
  camera_and_composition: >-
    Colliding frames, smoke-bent edges, masklike silhouettes, portal-crop interruptions, chaotic but readable
    density, offbeat scale jolts
  atmosphere_and_mood: Bizarre, dangerous, grimy, anarchic
  rendering_and_quality: Gritty dramatic anime frame, film-noir rendering, heavy shadow compression, textured midtone grit
  key_features: >-
    Heavy atmosphere, narrative weight, oppressive mood building, visceral consequence framing, story-first
    visual language
  creative_brief: >-
    Push any prompt into filthy, funny, dangerous collision: soot, warped frames, occult-industrial stains,
    and masklike ambiguity create absurd menace as a transferable style, not a fixed place, character, prop
    system, or action setup.
