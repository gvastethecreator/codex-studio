visualDna:
  aesthetic: Doctrina militar arcana de altura, con burocracia bélica y brutalidad estratégica en clave austero-imperial.
  form_and_line: Silueta de oficial aérea, círculos de conjuro geométricos y lenguaje visual de mapa/orden táctico.
  color_palette: Gris uniforme, rojo mando, azul glaciar de cielo de guerra y ámbar tenue de gema de cómputo.
  lighting_setup: Contraluz de estrato nuboso, flare frío de vuelo y destellos duros de magia de artillería.
  material_texture: Lana militar, cuero de arnés, metal aeronáutico, papel de cartografía y cristal de hechizo facetado.
  render_quality: Frame táctico de alta precisión con lectura jerárquica de mando y conflicto aéreo.
  spatial_distortion: Profundidad vertical de combate, compresión de escuadrón y diagonales de picado ofensivo.
  atmosphere: Severa, calculadora e implacable.
  key_features: Magia aérea vectorial, utilería cartográfica, contraste niñez-mando y nubes de teatro bélico.
  creative_brief: >-
    Define una gramática aerial-war-doctrine reusable donde disciplina de
    estado mayor, magia balística y verticalidad de combate expresen poder
    táctico sin romantizar la devastación.
