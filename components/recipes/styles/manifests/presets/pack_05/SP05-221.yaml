visualDna:
  aesthetic: Idol signal dogfight style, with pop broadcast emotion, missile-calligraphy motion, and romance refracted through machinery.
  form_and_line: Hard-edged mechanical contours, music-wave arcs, contrail swarms, panel-line rhythm, and stage-light silhouette cuts.
  color_palette: Idol pink, signal cyan, deep space navy, missile white, alloy gray, and hopeful gold.
  lighting_setup: Stage beams crossing combat glow, broadcast bloom, specular metal streaks, and pop-concert rim accents.
  material_texture: Brushed alloy, glossy polymer, holographic signal grain, vapor trails, carbon panels, and sparkle-light overlays.
  render_quality: High-detail sci-fi anime finish with precise machinery, pop emotion, and luminous motion readability.
  spatial_distortion: Aerial vector depth, broadcast-layer overlays, and sweeping contrail perspective without fixed cockpit framing.
  atmosphere: Aerial, poppy, heroic, romantic
  key_features: Signal-pop lighting, contrail calligraphy, mechanical romance, broadcast layers, stage-combat fusion.
  creative_brief: >-
    Apply pop-signal mecha emotion to any prompt through concert light,
    contrail rhythm, broadcast overlays, and engineered romance without
    requiring aircraft, dogfights, performers, cockpit views, or war scenes.
