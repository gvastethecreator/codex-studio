visualDna:
  aesthetic: >-
    Mythic spectacle style with ceremonial iconography, noble dramatic scale, and reality-layer rupture
    effects
  subject_treatment: >-
    Heroic silhouette opposition, repeated luminous motifs, calligraphic strike vectors, and emblematic stance
    framing
  color_and_tone: >-
    Regal gold-crimson contrasts over deep navy-charcoal grounds, with luminous arc accents and ceremonial
    highlight bands
  lighting_and_shadow: >-
    Mythic backlight domes, volumetric ray fan-outs, high-drama rim partitioning, and operatic spotlight
    behavior
  texture_and_material: >-
    Polished relic-metal sheen, arcane effect particles, clean cinematic composites, and controlled bloom
    around signature motifs
  camera_and_composition: >-
    Reality-fold perspective pulls and horizon warping around repeated symbolic manifestations to emphasize
    mythic magnitude
  atmosphere_and_mood: Grandiose, operatic, solemn, epic, fated
  rendering_and_quality: Grand-scale fantasy-action rendering with high symbolic clarity and premium spectacle polish
  key_features: Symbol-field iconography, ceremonial opposition, reality-layer rupture cues, regal color authority
  creative_brief: >-
    Preserve identity through mythic symbolism and ceremonial opposition; reality-warp spectacle should
    support an operatic visual grammar beyond specific lore references or combat setups. Apply this
    anime/IP-title grammar over any input: preserve its motion language, line economy, emotional staging,
    palette logic, and symbolic cues while avoiding a required cast, lore event, weapon, arena, school, ship,
    or fixed scene.
avoidRules:
  - realistic
  - 3d render
  - photo
  - live action
  - western comic
  - ugly
  - bad anatomy
  - low quality
  - jpeg artifacts
  - watermark
  - text
  - signature
