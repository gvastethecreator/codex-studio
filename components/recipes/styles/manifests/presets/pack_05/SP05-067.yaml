  key_features: >-
    Heavy atmosphere, narrative weight, oppressive mood building, visceral consequence framing, story-first
    visual language
  creative_brief: >-
    Recast any subject with beautiful depth that feels costly to enter: luminous blooms, damp mineral texture,
    layered compression, and wonder turning quietly unsafe. Keep the image portable, with no fixed explorers,
    lore systems, travel premise, or literal worldbuilding requirement.
