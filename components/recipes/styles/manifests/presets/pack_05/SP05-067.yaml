visualDna:
  aesthetic: >-
    Lush wonder hiding irreversible cost, bioluminescent mystery, depth-layered dread, delicate beauty under
    pressure, reliclike detail as visual lure
  subject_treatment: Dense mature-anime linework, heavy crosshatching, weighted contour variation, gritty ink density
  color_and_tone: Muted earths, blood reds, cold moonlit tones, desaturated horror palette, bruised shadow hues
  lighting_and_shadow: Ominous directional shadows, single-source drama light, deep chiaroscuro, low-key shadow lift
  texture_and_material: >-
    Bioluminescent bloom, damp mineral grain, soft organic translucency, antique relic patina, mossy velvet
    matte, pressure-worn edges
  camera_and_composition: >-
    Layered vertical depth cues, scale uncertainty, beautiful foreground lure, ominous compression, circular
    pull composition
  atmosphere_and_mood: Wondrous, terrifying, abyssal, enchanting
