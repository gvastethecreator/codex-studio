    Apply character-turnaround sheet grammar to any input: proportion locking, neutral lighting, orthographic
    consistency, material callouts, annotation-ready edges, and scale discipline should support design handoff
    without requiring humanoid characters, T-poses, expression sheets, labels, or fixed sheet layouts.
