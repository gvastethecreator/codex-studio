visualDna:
  aesthetic: Tiered equipment progression sheet emphasizing upgrade readability
  subject_treatment: Stable base silhouette with controlled complexity increase per tier
  color_and_tone: Structured rarity progression from muted utilitarian to luminous high-tier accents
  lighting_and_shadow: Controlled comparison light with incremental specular/emissive escalation
  texture_and_material: Progressive material sophistication (wear, polish, inlay, arcane finish)
  camera_and_composition: Fixed-view horizontal evolution layout with optional detail insets
  atmosphere_and_mood: Aspirational, reward-centric, game-economy legibility
  rendering_and_quality: Comparative design board optimized for progression clarity
  key_features: Multi-tier continuity, rarity-coded visual jumps, consistent proportion baseline
  creative_brief: >-
    Apply weapon-tier progression language to any input: upgrade deltas, rarity materials, silhouette
    escalation, modular attachments, and increasingly ornate construction. If no weapon or equipment exists,
    convert the subject into tiered design evolution without requiring weapons, game inventory UI, or readable
    labels.
avoidRules:
  - one version
  - static
  - no comparison
  - flat
  - no materials
  - unlabeled
  - single option
  - no evolution
  - just final
