visualDna:
  aesthetic: Tiered equipment progression sheet emphasizing upgrade readability
  form_and_line: Stable base silhouette with controlled complexity increase per tier
  color_palette: Structured rarity progression from muted utilitarian to luminous high-tier accents
  lighting_setup: Standardized comparison light with incremental specular/emissive escalation
  material_texture: Progressive material sophistication (wear, polish, inlay, arcane finish)
  render_quality: Comparative design board optimized for progression clarity
  spatial_distortion: Fixed-view horizontal evolution layout with optional detail insets
  atmosphere: Aspirational, reward-centric, game-economy legibility
  key_features: Multi-tier continuity, rarity-coded visual jumps, consistent proportion baseline
  creative_brief: >-
    Apply weapon-tier progression language to any input: upgrade deltas, rarity materials, silhouette escalation,
    modular attachments, and increasingly ornate construction. If no weapon or equipment exists, convert the subject
    into tiered design evolution without requiring weapons, game inventory UI, or readable labels.
avoidRules:
  - one version
  - static
  - no comparison
  - flat
  - no materials
  - unlabeled
  - single option
  - no evolution
  - just final
