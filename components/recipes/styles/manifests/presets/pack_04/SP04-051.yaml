visualDna:
  aesthetic: >-
    Creature-concept development style driven by ecological plausibility, adaptive morphology, and
    silhouette threat readability
  form_and_line: >-
    Anatomical construction logic with biomechanical cue layering, functional limb articulation, and
    predator-profile contour control
  color_palette: Skin tones, organic chromatics, creature-flesh spectrum
  lighting_setup: Rim light, silhouette reveal, ambient dread
  material_texture: Scales, fur
  render_quality: Scary, biological, anatomical conviction, apex-predator presence
  spatial_distortion: >-
    Speculative anatomy distortions guided by functional adaptation, not random mutation, with
    balanced asymmetry control
  atmosphere: Dangerous, alive, predatory stillness, ecological tension
  key_features: Silhouette, anatomical breakdown, adaptive feature
  creative_brief: >-
    Apply creature-design grammar to any input: adaptive morphology, habitat-driven features,
    anatomical construction, predator-profile silhouette, and biological material logic should
    create living threat without requiring monsters, beasts, claws, fangs, horror scenes, or one
    creature vignette.
avoidRules:
  - human
  - cute
