visualDna:
  aesthetic: >-
    Modern blockbuster-comic style with sleek mythic hero energy, widescreen panel staging, and high-impact
    digital polish
  subject_treatment: >-
    Clean high-confidence digital inking with controlled contour weights, sharp silhouette reads, and
    cinematic action line economy
  color_and_tone: >-
    Bold cool-warm contrast with luminous gradient ramps, reflective accent tones, and controlled
    flare-spectrum highlights
  lighting_and_shadow: >-
    Dynamic key/rim orchestration with volumetric accent rays, specular hit placement, and dramatic separation
    for heroic focus
  texture_and_material: Smooth digitally polished surfaces with subtle composite grain and high-clarity FX glow layering
  camera_and_composition: >-
    Heroic proportion push with muscular volume exaggeration, forced-perspective beats, and panoramic action
    framing
  atmosphere_and_mood: Intense, mythic, serious, kinetic, cinematic
  rendering_and_quality: >-
    High-detail glossy comic finish emphasizing readability under motion, premium digital compositing, and
    refined surface response
  key_features: >-
    Widescreen action composition, specular-driven suit rendering, flare-controlled highlights,
    decompressed-impact pacing
  creative_brief: >-
    Keep this preset grounded in polished blockbuster-comic grammar: heroic silhouette clarity, dynamic light
    separation, high-gloss FX and widescreen impact should define identity without requiring a superhero,
    suit, fight scene or specific comic universe.
