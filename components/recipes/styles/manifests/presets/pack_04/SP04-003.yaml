visualDna:
  aesthetic: Modern blockbuster-comic style with sleek mythic hero energy, widescreen panel staging, and high-impact digital polish
  form_and_line: Clean high-confidence digital inking with controlled contour weights, sharp silhouette reads, and cinematic action line economy
  color_palette: Bold cool-warm contrast with luminous gradient ramps, reflective accent tones, and controlled flare-spectrum highlights
  lighting_setup: Dynamic key/rim orchestration with volumetric accent rays, specular hit placement, and dramatic separation for heroic focus
  material_texture: Smooth digitally polished surfaces with subtle composite grain and high-clarity FX glow layering
  render_quality: High-detail glossy comic finish emphasizing readability under motion, premium digital compositing, and refined surface response
  spatial_distortion: Heroic proportion push with muscular volume exaggeration, forced-perspective beats, and panoramic action framing
  atmosphere: Intense, mythic, serious, kinetic, cinematic
  key_features: Widescreen action composition, specular-driven suit rendering, flare-controlled highlights, decompressed-impact pacing
  creative_brief: >-
    Keep this preset grounded in polished blockbuster-comic grammar: heroic
    silhouette clarity, dynamic light separation, high-gloss FX and widescreen
    impact should define identity without requiring a superhero, suit, fight
    scene or specific comic universe.
