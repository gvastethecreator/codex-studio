visualDna:
  aesthetic: >-
    Iterative color-script style focused on controlled multi-pass illumination studies and mood transfer
    through light alone
  subject_treatment: >-
    Stable compositional scaffold with constant geometry, variation expressed through light patterning, edge
    softness, and shadow behavior
  color_and_tone: >-
    Phase-based palette families from cool pre-dawn violets to warm amber daylight, magenta dusk transitions,
    and deep nocturnal indigos
  lighting_and_shadow: >-
    Systematic key-angle sweeps, temperature-shift ladders, variable diffusion density, calibrated contrast
    steps across render passes
  texture_and_material: >-
    Per-pass volumetric response variation, haze density modulation, shadow hardness tuning, reflective
    intensity mapping
  camera_and_composition: Fixed camera and structure with depth perception driven by atmosphere and luminance distribution changes
  atmosphere_and_mood: Analytical yet emotional, cinematic, temporal, expressive, study-driven
  rendering_and_quality: >-
    Production-grade lighting development board aesthetic with coherent comparability between passes and
    disciplined cinematic polish
  key_features: >-
    Multi-pass lighting matrix, color-temperature progression, shadow-arc logic, atmospheric phase control,
    mood-through-illumination methodology
  creative_brief: >-
    Apply lighting-scenario pass logic to any input: same-form relighting, rim-light options, bounce color,
    shadow-temperature studies, exposure variation, and cinematic value planning. It should work on subjects,
    products, spaces, or abstractions without requiring a scene matrix or narrative location.
avoidRules:
  - single lighting
  - one time of day
  - consistent mood
  - no comparison
  - flat
  - character focused
  - subject prominent
assets:
  defaultImage: /assets/recipes/styles/defaults/SP04-093.webp
attributes:
  negativePrompt: >-
    single lighting, one time of day, consistent mood, no comparison, flat, character focused, subject
    prominent
