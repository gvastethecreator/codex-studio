visualDna:
  aesthetic: Rough environment blockout with macro-shape worldbuilding focus (Feng Zhu and James Gurney-influenced)
  form_and_line: Broad brush masses, low-detail edge control, minimal explicit linework
  color_palette: Depth-driven warm/cool separation with fog-desaturated distance bands
  lighting_setup: Single clear key direction with volumetric atmosphere indication
  material_texture: Painterly large-stroke texture and soft haze transitions
  render_quality: Early environment pass prioritizing composition, scale, and mood
  spatial_distortion: Foreground exaggeration and atmospheric compression for depth readability
  atmosphere: Expansive, exploratory, pre-production wonder
  key_features: Big-shape hierarchy, focal light anchor, layered recession planes, thumbnail legibility
  creative_brief: >-
    Apply rough environment-pass rendering to any input: broad value blocking, atmospheric depth, macro-shape staging,
    haze layers, painterly edge economy, and quick world-building texture. If no place exists, convert the prompt into
    environmental mood abstraction without requiring a landscape, building, or location.
avoidRules:
  - detailed
  - finished
  - character-focused
  - close-up
  - tight brushwork
  - polished
  - small scale
  - intimate
