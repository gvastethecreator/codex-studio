visualDna:
  aesthetic: Rough environment blockout with macro-shape worldbuilding focus and painterly pre-production scale
  subject_treatment: Broad brush masses, low-detail edge control, minimal explicit linework
  color_and_tone: Depth-driven warm/cool separation with fog-desaturated distance bands
  lighting_and_shadow: Single clear key direction with volumetric atmosphere indication
  texture_and_material: Painterly large-stroke texture and soft haze transitions
  camera_and_composition: Foreground exaggeration and atmospheric compression for depth readability
  atmosphere_and_mood: Expansive, exploratory, pre-production wonder
  rendering_and_quality: Early environment pass prioritizing composition, scale, and mood
  key_features: Big-shape hierarchy, focal light anchor, layered recession planes, thumbnail legibility
  creative_brief: >-
    Apply rough environment-pass rendering to any input: broad value blocking, atmospheric depth, macro-shape
    staging, haze layers, painterly edge economy, and quick world-building texture. If no place exists,
    convert the prompt into environmental mood abstraction without requiring a landscape, building, or
    location.
avoidRules:
  - detailed
  - finished
  - character-focused
  - close-up
  - tight brushwork
  - polished
  - small scale
  - intimate
