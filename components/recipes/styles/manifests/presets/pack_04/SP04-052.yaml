visualDna:
  aesthetic: Isometric systems-art style with modular worldbuilding clarity, playful simulation readability, and toy-scale urban abstraction
  form_and_line: Clean vector-pixel hybrid contours, grid-disciplined shape language, and module-first construction logic
  color_palette: Bright ordered saturation with zone-based hue grouping, clear functional contrast, and tile-friendly color separation
  lighting_setup: Consistent directional isometric lighting with uniform shadow logic and readability-first highlight placement
  material_texture: Tile-ready clean surfaces with subtle pattern repetition cues and low-noise asset cohesion
  render_quality: Production-grade simulation asset finish emphasizing legibility at scale, modular coherence, and system clarity
  spatial_distortion: Isometric orthographic logic with fixed-angle depth mapping and no perspective convergence
  atmosphere: Ordered, playful, clean, constructive, serene
  key_features: Isometric angle discipline, modular tile-grid composition, systems readability hierarchy, toy-scale abstraction
  creative_brief: >-
    Keep identity in modular isometric grammar: fixed-angle spatial logic,
    tile-grid coherence, and readable system layering should transfer across
    subjects beyond any particular city-simulator reference.
