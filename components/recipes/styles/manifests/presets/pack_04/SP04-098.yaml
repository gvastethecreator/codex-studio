visualDna:
  aesthetic: Mythic hand-drafted cartographic illustration with ornamental navigation grammar and editorial worldbuilding clarity
  form_and_line: Calligraphic contour hierarchy, iconographic terrain symbols, radial navigation geometry, decorative border cadence
  color_palette: Aged parchment neutrals, iron-gall sepia ink, oxidized teal accents, muted mineral greens, restrained vermillion highlights
  lighting_setup: Uniform document-style illumination, low-specular paper response, subtle edge-vignette to emphasize plate readability
  material_texture: Fibrous vellum grain, dry-ink bleed, pressure-variant line deposition, fold-memory wear, wax-like residue details
  render_quality: High-fidelity illustrated atlas plate finish with controlled print-era imperfections and deliberate artisan irregularity
  spatial_distortion: Orthographic map-plane logic with symbolic scale compression and layered annotation depth
  atmosphere: Scholarly, arcane, exploratory, archival, crafted for interpretive reading rather than literal realism
  key_features: Compass geometry motifs, rhumb-line rhythm, cartouche typography framing, etched terrain icon system, weathered paper patina
  creative_brief: >-
    Prioritize cartographic language as style: ornamental navigation marks,
    disciplined icon systems, and tactile print-era texture should define the
    image independently of any specific fictional place.
