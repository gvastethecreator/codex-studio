visualDna:
  aesthetic: >-
    Graphic tech-noir comic style with stark contrast, synthetic chroma accents, and moody futurist
    editorial framing
  form_and_line: >-
    Knife-edged contour work, selective heavy blacks, angular panel-ready geometry, restrained
    crosshatch texture
  color_palette: >-
    Black-dominant base, cyan-magenta duotone energy, cool indigo shadows, sparse neon highlight
    punctuation
  lighting_setup: Chiaroscuro with luminous edge accents, vapor-soft diffusion pockets, hard silhouette separation
  material_texture: Slick reflective surfaces, particulate haze, coarse urban grit abstraction, chromed edge glints
  render_quality: High-impact noir-comic rendering with poster-grade readability and controlled cinematic bloom
  spatial_distortion: Perspective compression tuned for dramatic panel composition and foreground-background tension
  atmosphere: Ominous, electric, tense, sophisticated, anti-utopian
  key_features: >-
    Duotone neon contrast, heavy shadow architecture, reflective black planes, vapor diffusion
    bands, sharp graphic silhouettes
  creative_brief: >-
    Apply tech-noir comic language to any input: contrast hierarchy, cyan-magenta duotone control,
    reflective black planes, vapor diffusion bands, and sharp graphic silhouettes should define
    identity without locking to alleys, skylines, screens, vehicles, detectives, or any specific
    place.
avoidRules:
  - daylight
  - nature
