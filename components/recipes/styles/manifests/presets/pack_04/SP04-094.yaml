visualDna:
  aesthetic: >-
    Educational anatomical reference plate with layered structural clarity and classical medical-plate influence
  form_and_line: Precise technical linework for muscle, bone, and tendon mapping
  color_palette: Standardized didactic coding (muscle warm, bone neutral, vascular cool/warm accents)
  lighting_setup: Even clinical illumination for unambiguous form legibility
  material_texture: Plate-style paper and wash overlays with minimal decorative noise
  render_quality: Reference-grade illustration optimized for study and instruction
  spatial_distortion: Multi-view orthographic layout with transparent overlays and inset details
  atmosphere: Scientific, disciplined, pedagogical
  key_features: Layered anatomy views, insertion/origin callouts, proportion guides, sectional clarity
  creative_brief: >-
    Apply anatomy-reference-sheet structure to any input: layered construction, skeletal-like scaffolds, muscle-flow
    analogues, cutaway marks, and educational diagram composition. If no biological body exists, convert forms into
    anatomical systems without requiring humans, animals, labels, or medical realism.
avoidRules:
  - stylized
  - cartoon
  - simplified
  - abstract
  - loose
  - messy
  - inaccurate
  - fantasy proportion
  - guesswork
