visualDna:
  aesthetic: Size-comparison chart with educational scale framing
  subject_treatment: Baseline-aligned silhouettes with measurement ticks and reference markers
  color_and_tone: Neutral comparative scheme with restrained atmospheric scaling cues
  lighting_and_shadow: Consistent silhouette rim/read light for cross-subject legibility
  texture_and_material: Clean chartboard finish with minimal atmospheric fade on largest entries
  camera_and_composition: Left-to-right ascending scale progression with fixed ground reference
  atmosphere_and_mood: Awe-oriented yet analytical, museum-chart clarity
  rendering_and_quality: Infographic-style concept sheet optimized for proportional comprehension
  key_features: Human and real-world benchmarks, incremental height logic, clear unit hierarchy
  creative_brief: >-
    Apply monster size-comparison chart logic to any input: baseline scaling, tick marks, escalating
    silhouettes, cutaway scale cues, and comparative graphic hierarchy. If no creature exists, convert the
    subject into abstract scale-study forms without requiring monsters, humans for scale, chart labels, or a
    creature lineup.
avoidRules:
  - single creature
  - no reference
  - unclear scale
  - vague proportions
  - tiny
  - only one
  - human-centric
  - no comparison
