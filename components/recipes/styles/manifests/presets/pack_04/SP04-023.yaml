    Apply scratchboard inversion to any input: remove darkness through incision rhythm, hatch
    density, burr-like chatter, and directional scratch patterns to define focal hierarchy without
    requiring animals, night scenes, portraits, theatrical props, or fixed black-ground
    compositions.
