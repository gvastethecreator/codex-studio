  creative_brief: Carved away material leaves behind a surface born of resistance, each gouge a record of the knife's passage through linoleum. Ink sits heavy on the raised portions, transferring the image with the satisfying pressure of the press. This is printmaking as labor, where every white line required the removal of something solid.
