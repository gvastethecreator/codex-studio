visualDna:
  aesthetic: >-
    1930s monochrome bounce-cartoon, Fleischer-era rubber-hose surrealism, pie-cut graphic language, looping
    rhythm
  subject_treatment: Thick, bouncy
  color_and_tone: Black and White, charcoal fill, cream paper, no grey
  lighting_and_shadow: Flat monochrome, stark graphic contrast
  texture_and_material: Film grain, nitrate flicker, hand-painted cel
  camera_and_composition: Noodle limbs, rubber-hose arms, boneless contortion
  atmosphere_and_mood: Happy, weird, vaudeville rhythm, early-talkie energy
  rendering_and_quality: Retro, bouncy, surreal rubber-band motion, hypnotic loop
  key_features: Rubber-hose curves, pie-cut graphics, bouncing syncopation, surreal morph logic
  creative_brief: >-
    Convert the subject into early monochrome animation language: cream paper, charcoal fill, thick bouncy
    contours, noodle-like elastic curves, and surreal morphs synced to invisible jazz. Avoid fixed mascot
    anatomy or period props. The style should come from rhythmic deformation, stark graphic contrast, nitrate
    flicker, and playful impossible motion. Apply Fleischer Rubber Hose Cartoon as a portable cinematic/camera
    style over any input: preserve its lens behavior, color process, lighting setup, artifact pattern, and
    deformation grammar while avoiding a required actor, room, prop, brand, readable text, fixed IP scene, or
    narrative setup.
avoidRules:
  - color
  - modern
