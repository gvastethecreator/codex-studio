visualDna:
  aesthetic: Deliberately ugly caricature, bulbous distortion, warty textures, hideous charm, adult-swim grotesque, John Kricfalusi energy
  form_and_line: Wobbly uneven contours, spasming line weight, broken construction, scratchy re-draw marks, elastic form logic
  color_palette: Sickly greens, bruised purples, bilious yellow, clammy grey, infection-tinted flesh tones, jaundiced warmth
  lighting_setup: Unflattering fluorescent overexposure, harsh single-source bulb, unkind overhead glare
  material_texture: Bumpy surface, exaggerated pores or pits, wart dimples, greasy sheen, splotchy texture
  render_quality: Intentionally terrible, purposefully unpleasant, anti-aesthetic, repulsive yet compelling, scratchy late-night animation
  spatial_distortion: Inflated proportions, mismatched feature scales, bulging forms, impossible curve stress
  atmosphere: Uncomfortable, repulsive yet funny, fever-dream ugly, caricature at its cruelest
  key_features: Asymmetry, bulbous focal swelling, greasy texture, excessive folds, cruel redraw energy
  creative_brief: 'Push any subject through grotesque caricature logic: proportions rebel, surfaces become bumpy and splotchy, contours wobble, and unflattering exaggeration becomes the main design force. Avoid requiring faces, noses, teeth, or bodies. The style should feel repulsive, funny, and magnetically overdrawn.'
avoidRules:
  - realistic
  - photorealistic
  - proportional
  - anatomically correct
  - beautiful
  - smooth
  - clean lines
  - polished
  - normal proportions
  - subtle
