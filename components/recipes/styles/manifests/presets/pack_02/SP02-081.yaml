schemaVersion: 1
id: SP02-081
packId: pack_02
name: Grotesque Exaggeration Cartoon
category: 6. Caricature And Cartoon Styles
version: 1
supportedTasks:
  - image_generate
  - image_edit
  - style_preset_card
tags:
  - cinematic-and-media
  - caricature-and-cartoon-styles
visualDna:
  aesthetic: >-
    Deliberately ugly caricature, bulbous distortion, warty textures, hideous charm, adult-swim grotesque,
    John Kricfalusi energy
  subject_treatment: >-
    Wobbly uneven contours, spasming line weight, broken construction, scratchy re-draw marks, elastic form
    logic
  color_and_tone: >-
    Sickly greens, bruised purples, bilious yellow, clammy grey, infection-tinted flesh tones, jaundiced
    warmth
  lighting_and_shadow: Unflattering fluorescent overexposure, harsh single-source bulb, unkind overhead glare
  texture_and_material: Bumpy surface, exaggerated pores or pits, wart dimples, greasy sheen, splotchy texture
  camera_and_composition: Inflated proportions, mismatched feature scales, bulging forms, impossible curve stress
  atmosphere_and_mood: Uncomfortable, repulsive yet funny, fever-dream ugly, caricature at its cruelest
  rendering_and_quality: >-
    Intentionally terrible, purposefully unpleasant, anti-aesthetic, repulsive yet compelling, scratchy
    late-night animation
  key_features: Asymmetry, bulbous focal swelling, greasy texture, excessive folds, cruel redraw energy
  creative_brief: >-
    Push any subject through grotesque caricature logic: proportions rebel, surfaces become bumpy and
    splotchy, contours wobble, and unflattering exaggeration becomes the main design force. Avoid requiring
    faces, noses, teeth, or bodies. The style should feel repulsive, funny, and magnetically overdrawn.
avoidRules:
  - realistic
  - photorealistic
  - proportional
  - anatomically correct
  - beautiful
  - smooth
  - clean lines
  - polished
  - normal proportions
  - subtle
assets:
  defaultImage: /assets/recipes/styles/defaults/SP02-081.webp
attributes:
  negativePrompt: >-
    realistic, photorealistic, proportional, anatomically correct, beautiful, smooth, clean lines, polished,
    normal proportions, subtle
