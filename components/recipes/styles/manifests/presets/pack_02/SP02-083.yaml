visualDna:
  aesthetic: Almost-real-but-wrong uncanny rendering, dead glossy surfaces, plastic smoothness, hyper-real detail on simplified structure, creepy animatronic energy, Polar-Express unease
  form_and_line: Overly smooth vector contours, mathematically perfect curves that feel wrong, no organic variation
  color_palette: Uncanny peach, corpse-wax beige, mortician foundation, too-uniform blush, synthetic warmth
  lighting_setup: Flat diffuse studio, shadowless void, CGI default lighting, no atmosphere
  material_texture: Too-smooth plastic surface, vinyl doll finish, waxy silicone, mannequin gloss
  render_quality: Hyper-clean vector rendering, unsettlingly perfect gradients, algorithmic smoothness, no human imperfection
  spatial_distortion: Proportions fractionally wrong, feature placement almost correct, threshold-scale misalignment
  atmosphere: Deeply unsettling, skin-crawling wrongness, silent discomfort, robotic emptiness
  key_features: Glassy speculars, too-perfect symmetry, puppet articulation seams, waxy synthetic sheen
  creative_brief: 'Apply uncanny-valley rendering to any subject: surfaces become too smooth, proportions almost correct, gradients too perfect, and expression of material feels algorithmic rather than alive. Avoid requiring portraits, eyes, smiles, or human anatomy. The discomfort should come from near-real precision that misses organic truth.'
avoidRules:
  - comfortable
  - natural
  - warm
  - wholesome
  - expressive
  - emotionally readable
