visualDna:
  aesthetic: >-
    Midnight neon-noir lighting style prioritizing reflective chroma bleed, sparse luminance islands, and cinematic cool
    isolation
  form_and_line: >-
    Silhouette-first framing, minimal contour clutter, negative-space emphasis, edge readability under low-key
    illumination
  color_palette: Cyan-magenta bi-chromatic core, electric blue mids, restrained hot-pink accents, deep near-black foundations
  lighting_setup: Localized emissive practicals, controlled bounce pools, specular spill choreography, selective halo diffusion
  material_texture: Wet-sheen reflectivity model, micro-surface puddle mirrors, slick asphalt-like gloss response, fine rain haze grain
  render_quality: Filmic low-light polish with clean contrast control, moody saturation restraint, and high reflection legibility
  spatial_distortion: Perspective neutrality with reflective depth doubling and compositional pull generated by light gradients
  atmosphere: Solitary, tense, nocturnal, melancholic, atmospheric
  key_features: >-
    Bi-chromatic reflections, dark-field contrast architecture, emissive point-source rhythm, moisture-driven specular
    response
  creative_brief: >-
    Treat this preset as a nocturnal lighting system: chroma reflections, controlled emissive spill, and wet-surface
    specularity should define the style independent of a specific location. Apply Neon Noir as a portable
    cinematic/camera style over any input: preserve its lens behavior, color process, lighting setup, artifact pattern,
    and deformation grammar while avoiding a required actor, room, prop, brand, readable text, fixed IP scene, or
    narrative setup.
avoidRules:
  - daylight
