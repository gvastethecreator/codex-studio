visualDna:
  aesthetic: Backlit subject
  subject_treatment: >-
    Treat subjects as believable filmed or broadcast subjects under Silhouette: casting, wardrobe, props,
    motion cues, and silhouette hierarchy follow 5. Lighting And Atmosphere cinematic and broadcast grammar
    without locking to one plot beat.
  color_and_tone: Black foreground, luminous background field, orange or blue gradient, stark contrast
  lighting_and_shadow: Strong backlight, no fill, rim-only separation
  texture_and_material: Contrast, edge crispness, opaque block
  camera_and_composition: >-
    Camera language native to Silhouette: genre-aware framing, lens character, focal hierarchy, motion cue,
    and vertical style-card composition.
  atmosphere_and_mood: Mystery, drama, anonymous form, graphic suspense
  rendering_and_quality: Graphic, bold, high-contrast drama, shape-first
  key_features: No fill light, recognizable outline, backlit separation, shape-first read
  creative_brief: >-
    Render the input as silhouette-first cinema: remove interior detail, preserve readable contour, use strong
    backlight and luminous background contrast. Avoid forcing people, dramatic skies, or sunset scenes.
    Identity should come from outer shape, not surface detail. Apply Silhouette as a portable cinematic/camera
    style over any input: preserve its lens behavior, color process, lighting setup, artifact pattern, and
    deformation grammar while avoiding a required actor, room, prop, brand, readable text, fixed IP scene, or
    narrative setup.
avoidRules:
  - detail in shadow
