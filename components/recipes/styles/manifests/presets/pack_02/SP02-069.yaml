visualDna:
  aesthetic: Split-key high contrast lighting
  subject_treatment: >-
    Treat subjects as believable filmed or broadcast subjects under Split Lighting: casting, wardrobe, props,
    motion cues, and silhouette hierarchy follow 5. Lighting And Atmosphere cinematic and broadcast grammar
    without locking to one plot beat.
  color_and_tone: High contrast, deep shadow, bright highlight, no midtone bridge
  lighting_and_shadow: 90 degree key, side-only illumination, perfect split
  texture_and_material: Hard side relief, surface texture, carved shadow edge
  camera_and_composition: >-
    Camera language native to Split Lighting: genre-aware framing, lens character, focal hierarchy, motion
    cue, and vertical style-card composition.
  atmosphere_and_mood: Tense, hidden, divided, severe
  rendering_and_quality: Dramatic, severe, dual-zone tension, graphic contrast
  key_features: Half black, half lit, razor side key, hard falloff
  creative_brief: >-
    Apply split lighting to any subject: one side cut by a hard key, the other side dropping into near-black
    with minimal midtone bridge. Avoid face-only drama, villain framing, or portrait assumptions. The image
    should feel divided by illumination itself.
avoidRules:
  - flat light
