visualDna:
  aesthetic: Posterized traced live action, A Scanner Darkly style, wobbly reality, digital uncanny valley
  subject_treatment: Wobbly trace
  color_and_tone: Flat blocks, posterized palette, unnatural local color, comic-book reduction
  lighting_and_shadow: Realistic (traced), live-action source, practical on-set
  texture_and_material: Digital paint, vector fill, smooth gradient zone
  camera_and_composition: Floating shapes, paint-drift, unstable outline, image swim
  atmosphere_and_mood: Surreal, trippy, unstable, psychological unease
  rendering_and_quality: Uncanny, dream, floating-reality disconnect, liquid edge
  key_features: Jitter, boil, line tremble, frame-to-frame instability
  creative_brief: >-
    Trace the input as unstable rotoscoped live action: posterized fills, wobbly vector edges, drifting color
    islands, and frame-boil instability. Avoid forcing faces or identity themes; any subject can become a
    live-action source slipping out of registration with its drawn overlay. Reality should look observed,
    repainted, and never fully locked to itself.
avoidRules:
  - smooth
  - 3d
