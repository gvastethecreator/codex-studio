visualDna:
  aesthetic: >-
    Public-access cable channel, cheap community bulletin graphics, VHS routing noise, amateur studio
    sincerity, crawl bands without readable text
  subject_treatment: Boxy title-safe layout, simple centered shapes, chunky crawl strips, misaligned overlay geometry
  color_and_tone: Cable blue, magenta key color, off-white crawl band, washed yellow, VHS black
  lighting_and_shadow: Fluorescent community-studio wash, underpowered practicals, hot camcorder highlights
  texture_and_material: VHS tracking noise, character-generator aliasing, tape blur, analog snow, scanline shimmer
  camera_and_composition: Title-safe margins, slightly skewed overlays, overscan cropping, analog edge warp
  atmosphere_and_mood: Homemade, local, earnest, oddly hypnotic
  rendering_and_quality: Low-budget, sincere, awkward, community-TV artifact
  key_features: Crawl bands, title-safe framing, VHS noise, aliasing, overscan, no readable text
  creative_brief: >-
    Render any prompt as public-access cable: cheap title-safe layout, crawl-band shapes, VHS tracking noise,
    analog snow, overscan crop, and sincere low-budget staging. Avoid readable announcements, specific
    community events, hosts, or studio setups. The style should feel routed through a worn municipal cable
    feed.
