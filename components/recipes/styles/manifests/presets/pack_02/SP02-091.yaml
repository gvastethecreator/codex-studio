visualDna:
  aesthetic: >-
    Dry-erase marker on whiteboard, awkward flowchart humor, half-erased previous ideas ghosting underneath,
    blue-expo red-expo green-expo marker colors, corporate satire drawn during boring meetings,
    strategy-diagram absurdity
  subject_treatment: >-
    Squeaky dry-erase marker strokes, variable thickness from marker angle, eraser-smear ghost trails, hasty
    unsteady linework, arrow-heavy composition
  color_and_tone: >-
    Expo-marker blue, red, green, black on glossy white, faded-ink pink from dried-out markers, smudge-grey
    eraser trails
  lighting_and_shadow: Harsh fluorescent overhead, glossy board reflection, shallow surface glare
  texture_and_material: Glossy whiteboard surface, dried-marker residue stains, eraser-felt streaks, aluminum frame reflection
  camera_and_composition: Arrows looping in impossible circles, crowded diagram spacing, warped marker perspective
  atmosphere_and_mood: Bored-meeting creativity, corporate-surrealism, passive-aggressive office humor, caffeine-fueled doodling
  rendering_and_quality: >-
    Office whiteboard doodle aesthetic, dry-erase impermanence, meeting-room creativity, corporate-absurdism
    humor
  key_features: >-
    Dry-erase marker strokes, eraser ghost trails, flowchart arrows, diagram circles, glossy board reflection,
    no readable text
  creative_brief: >-
    Translate any prompt into whiteboard doodle language: squeaky marker strokes, eraser ghosts, diagram
    arrows, glossy glare, color-coded marks, and half-erased residue. Avoid required meeting rooms, stick
    figures, readable text, or specific business diagrams. The surface should feel temporary, improvised, and
    slightly absurd.
