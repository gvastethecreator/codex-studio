visualDna:
  aesthetic: Dry-erase marker on whiteboard, awkward flowchart humor, half-erased previous ideas ghosting underneath, blue-expo red-expo green-expo marker colors, corporate satire drawn during boring meetings, strategy-diagram absurdity
  form_and_line: Squeaky dry-erase marker strokes, variable thickness from marker angle, eraser-smear ghost trails, hasty unsteady linework, arrow-heavy composition
  color_palette: Expo-marker blue, red, green, black on glossy white, faded-ink pink from dried-out markers, smudge-grey eraser trails
  lighting_setup: Harsh fluorescent overhead, glossy board reflection, shallow surface glare
  material_texture: Glossy whiteboard surface, dried-marker residue stains, eraser-felt streaks, aluminum frame reflection
  render_quality: Office whiteboard doodle aesthetic, dry-erase impermanence, meeting-room creativity, corporate-absurdism humor
  spatial_distortion: Arrows looping in impossible circles, crowded diagram spacing, warped marker perspective
  atmosphere: Bored-meeting creativity, corporate-surrealism, passive-aggressive office humor, caffeine-fueled doodling
  key_features: Dry-erase marker strokes, eraser ghost trails, flowchart arrows, diagram circles, glossy board reflection, no readable text
  creative_brief: 'Translate any prompt into whiteboard doodle language: squeaky marker strokes, eraser ghosts, diagram arrows, glossy glare, color-coded marks, and half-erased residue. Avoid required meeting rooms, stick figures, readable text, or specific business diagrams. The surface should feel temporary, improvised, and slightly absurd.'
