visualDna:
  aesthetic: >-
    Classic newspaper comic strip, dotted-color Ben-Day printing, simple repeating backgrounds with minimal
    variation, gag-a-day rhythm, Garfield/Calvin/Peanuts as style anchors, cheap-newsprint-ink smell almost
    visible
  subject_treatment: >-
    Simple clean ink outlines, consistent character-model sheets, minimal-detail efficiency, speed-line motion
    indicators, sweat-drop emotion marks
  color_and_tone: >-
    CMYK-dot color printing, limited four-color palette, newsprint off-white, ink-smudge grey,
    registration-error cyan fringe
  lighting_and_shadow: >-
    Flat lighting, occasional shadow-blob under character, no atmosphere or mood lighting, readability-first
    flatness
  texture_and_material: >-
    Newsprint paper tooth, halftone-dot color pattern, ink-bleed into fibers, off-registration misalignment,
    pulp-paper cheapness
  camera_and_composition: Panel-grid division, balloon-like negative space, repeating simplified background, model-sheet consistency
  atmosphere_and_mood: Cozy, familiar, breakfast-table comfort, gentle-humor warmth, daily-ritual companionship
  rendering_and_quality: Sunday-funnies aesthetic, newspaper-comic charm, four-panel-gag perfection, syndicated-strip warmth
  key_features: >-
    Panel grid, Ben-Day dot coloring, blank balloon shapes, repeating backgrounds, consistent model logic,
    newsprint paper tone
  creative_brief: >-
    Apply Sunday-funnies print grammar to any input: panel rhythm, simple ink outlines, Ben-Day dots,
    newsprint tooth, off-register CMYK, and readable gag composition without actual readable text. Avoid
    forcing recurring characters or fixed four-panel narrative. The style should feel syndicated, disposable,
    and familiar.
