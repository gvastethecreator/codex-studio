    Photo-cutout fragments, mismatched collage bodies or forms, xerox textures, anti-pretty black-and-white
    contrast, hostile cut edges
  creative_brief: >-
    Apply photo-cutout menace to any subject: xerox grain, mismatched photographic fragments, crude drawn
    bodies or forms, harsh black-and-white contrast, and visible cut edges. Avoid faces, schoolyards,
    yearbooks, or revenge narratives as requirements. Nothing should fit cleanly together.
