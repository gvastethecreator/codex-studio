schemaVersion: 1
id: SP02-100
packId: pack_02
name: Flipbook Rough Animation
category: 6. Caricature And Cartoon Styles
version: 1
supportedTasks:
  - image_generate
  - image_edit
  - style_preset_card
tags:
  - cinematic-and-media
  - caricature-and-cartoon-styles
visualDna:
  aesthetic: >-
    Rough-animation flipbook page, sequential gesture frames showing motion arc, onion-skin ghosts of previous
    and next poses, timing-chart marks, animation-desk peg-bar holes, rough breakdown between keyframes, Glen
    Keane rough-animation philosophy, line-boiling texture from hand-drawn frame-by-frame
  subject_treatment: >-
    Rapid-fire gesture lines, motion-arc construction curves, timing-chart-hash-marks,
    multiple-search-lines-per-frame, onion-skin-transparency-implied overlapping
  color_and_tone: >-
    Animation-paper blue-line underdrawing, graphite-pencil grey, Col-Erase blue, red-pencil breakdown lines,
    paper-buff background
  lighting_and_shadow: >-
    Animation-desk backlight transmitting through paper layers, peg-bar registration shadow, no rendered
    lighting
  texture_and_material: >-
    Animation-paper tooth, graphite-smudge buildup across frames, eraser-crumb dust, peg-bar-hole wear,
    paper-edge-dog-ear from flipping
  camera_and_composition: >-
    Sequential-frame-progression-across-page, motion-arc-ghost-overlays, onion-skin-transparency-depth,
    timing-chart-margin-notes
  atmosphere_and_mood: >-
    Creative-process intimacy, animation-desk focus, pure-motion-observation, pre-digital-handcraft,
    animator's-private-study
  rendering_and_quality: >-
    Flipbook-rough-animation aesthetic, motion-study-beauty, hand-drawn-frame energy, pre-cleanup-animation
    soul
  key_features: >-
    Sequential drawing progression, animation arc lines, timing-chart marks, onion-skin ghost overlays,
    peg-bar holes, blue-pencil construction, rough boiling line texture
  creative_brief: >-
    Translate any prompt into rough flipbook animation study: sequential marks, onion-skin ghosts, blue
    construction lines, graphite corrections, peg-bar holes, and visible motion arcs. Avoid stick-figure
    jumps, readable frame numbers, or final cleaned animation. The image should expose animation thinking
    before cleanup.
avoidRules:
  - finished
  - polished
  - clean
  - rendered
  - smooth
  - digital
  - final
  - single frame
  - static
  - tight
  - tweened
assets:
  defaultImage: /assets/recipes/styles/defaults/SP02-100.webp
attributes:
  negativePrompt: finished, polished, clean, rendered, smooth, digital, final, single frame, static, tight, tweened
