visualDna:
  aesthetic: >-
    Deformed yet adorable ugly-cute design, lumpy asymmetry, mismatched scale, so-ugly-it-is-precious charm,
    Ghibli soot-sprite meets Ren & Stimpy as style anchor
  subject_treatment: Chunky uneven outlines, bulbous swelling curves, random spikes and bumps, happy accident shapes
  color_and_tone: Sickly-sweet candy colors, mold-green with pink blush, bruise-purple fur, mucus-yellow highlights
  lighting_and_shadow: Soft forgiving glow, gentle rim light to emphasize lumpiness, cozy shadow under belly folds
  texture_and_material: Bumpy surface, lumpy wool texture, crusty dried-mud finish, scab-like patches
  camera_and_composition: Mismatched feature scale, uneven proportions, oversized mass, asymmetric appendage logic
  atmosphere_and_mood: Affectionate disgust, heartwarming grotesquerie, lovable wrongness
  rendering_and_quality: Lovingly ugly, carefully careless, trash-goblin preciousness, toy-line reject charm
  key_features: Mismatched scale, lumpy silhouette, awkward charm, candy-sick palette, forgiving glow
  creative_brief: >-
    Make any subject ugly-cute through lumpy asymmetry, mismatched scale, awkward silhouette, candy-sick
    color, and forgiving soft glow. Avoid requiring monsters, eyes, teeth, hair, animals, or bodies. Charm
    should come from deliberate wrongness made affectionate.
avoidRules:
  - beautiful
  - handsome
  - elegant
  - proportional
  - realistic anatomy
  - symmetrical
  - polished
