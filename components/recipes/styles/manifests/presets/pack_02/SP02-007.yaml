    Treat subjects as believable filmed or broadcast subjects under Silent Film: casting, wardrobe, props,
    motion cues, and silhouette hierarchy follow 1. Film Genres cinematic and broadcast grammar without
    locking to one plot beat.
  color_and_tone: Sepia or B&W, warm monochrome, faded amber tint
  lighting_and_shadow: Flat studio, even wash, orthochromatic limitation
  texture_and_material: Flicker, dust, gate weave, silver emulsion
  camera_and_composition: Vignette, rounded frame edge, iris close
  atmosphere_and_mood: Expressive, old, melodramatic, haunted silence
  rendering_and_quality: Fast motion feel, 18fps projection, flickering speed
  key_features: Flicker, vignette, iris-era framing
  creative_brief: >-
    Silent film style gives any subject amber monochrome age: 18fps flicker, dust, gate weave, orthochromatic
    flatness, vignette, rounded frame edges, and melodramatic gesture implied by composition. Keep
    title-card-era rhythm without requiring people, text cards, or performance.
