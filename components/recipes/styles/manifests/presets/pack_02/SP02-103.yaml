    Use 90s gross-kids cartoon logic on any input: lumpy asymmetry, slime greens, junk textures, pitted
    surfaces, grate-light, and playful ugliness. Avoid monster-school scenes, sewer locations, claws, eyes, or
    bodies as requirements. Charm should come from gross texture and rebellious shape.
