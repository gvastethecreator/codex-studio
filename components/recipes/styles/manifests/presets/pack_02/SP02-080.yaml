visualDna:
  aesthetic: >-
    Glossy sci-fi reboot spectacle, Star Trek reboot energy as style anchor, blinding anamorphic, JJ Abrams
    lens-flare overload
  subject_treatment: Horizontal lines
  color_and_tone: Blue anamorphic, cyan streak, warm skin, deep space black, magnesium white
  lighting_and_shadow: Blinding, overexposed key, intentional flare-induction
  texture_and_material: Glass artifacts, multi-coated lens, element reflection
  camera_and_composition: Washed out, flare-bleached, contrast-erased bloom
  atmosphere_and_mood: Future, bright, optimistic spectacle, epic scale
  rendering_and_quality: Sci-fi, action, summer-blockbuster spectacle, visual overload
  key_features: Horizontal flare, anamorphic streak, cyan-white bloom, contrast washout
  creative_brief: >-
    Use anamorphic overflare as the style driver: horizontal cyan-white streaks, blown highlights,
    lens-element reflections, bloom washout, and glossy blockbuster dazzle. Avoid requiring starships, space,
    crews, or sci-fi props. The camera artifacts should become the spectacle. Apply JJ Abrams Anamorphic
    Overflare as a portable cinematic/camera style over any input: preserve its lens behavior, color process,
    lighting setup, artifact pattern, and deformation grammar while avoiding a required actor, room, prop,
    brand, readable text, fixed IP scene, or narrative setup.
