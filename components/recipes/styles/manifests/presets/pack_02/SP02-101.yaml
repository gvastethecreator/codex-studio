  color_and_tone: Inflamed flesh pinks, nicotine yellow, clammy teal shadows, rash-red irritation, greasy beige skin
  lighting_and_shadow: Harsh proximity lighting, bright wet sheen, overexposed glare, ugly reaction-frame illumination
  texture_and_material: Pore-heavy surface, cracked folds, greasy shine, dried-gloss streaks, wobbling paint texture
  camera_and_composition: Subject crushing into lens space, bulging surface masses, swollen forward projection, off-axis pressure
