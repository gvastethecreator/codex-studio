  creative_brief: >-
    Use gross-up close-up language on any subject: invasive framing, pore-level detail, wet sheen, swollen
    folds, wobbling contours, and painterly revulsion. Avoid requiring faces, gums, lips, noses, or anatomy.
    Comedy should come from excessive proximity and unflattering texture.
