visualDna:
  aesthetic: >-
    Emergency broadcast interruption, signal-break abstraction, color bars, warning geometry without readable
    text, hostile analog tone made visual
  subject_treatment: Horizontal bands, test-pattern blocks, centered warning geometry, scanline fracture, hard rectangular cuts
  color_and_tone: SMPTE color bars, alert red, black void, phosphor white, dirty cyan, warning yellow
  lighting_and_shadow: Self-emissive CRT glow, blown white bars, high contrast signal clipping
  texture_and_material: CRT scanlines, analog snow, sync tear, tape dropout, phosphor bloom
  camera_and_composition: Horizontal roll, tracking tear, image displacement, broadcast interruption layering
  atmosphere_and_mood: Urgent, uncanny, official, hostile
  rendering_and_quality: Harsh, alarming, graphic, signal-native
  key_features: Color bars, scanline tear, signal snow, hard warning blocks, no readable text
  creative_brief: >-
    Render any prompt as emergency broadcast interruption: color bars, warning-block geometry, CRT glow,
    scanline tear, analog snow, and clipped high-contrast signal. Avoid readable messages, official seals,
    real alerts, or literal TV sets. The style should feel like the image is being overridden by broadcast
    infrastructure.
avoidRules:
  - soft film
  - friendly graphics
