visualDna:
  aesthetic: >-
    Shared-body elastic nonsense, opposite visual states locked in one stretched form, long-body contortions,
    impossible shared anatomy as style anchor, simple but deeply strange sitcom design
  subject_treatment: Clean elastic outlines, long-contour continuity, simple sitcom construction, soft squash curves
  color_and_tone: 90s flat TV color, mustard tan, muted blue, warm orange, faded green, heavy black accents
  lighting_and_shadow: Flat sitcom lighting, simple shadow blobs, no dramatic atmosphere
  texture_and_material: Smooth cel fill, analog TV softness, light scan grain, simple painted surface
  camera_and_composition: >-
    Sausage-form contortions, impossible shared-spine bends, mirrored states at both ends, accordion
    compression
  atmosphere_and_mood: Goofy, elastic, odd-couple, playful
  rendering_and_quality: Simple strange sitcom cartoon, elastic absurdity, readable long-form design
  key_features: Shared-form anatomy, impossible bends, dual-state contrast, elastic long silhouette, accordion compression
  creative_brief: >-
    Use shared-body elastic design as abstraction: one stretched form contains two opposing visual states,
    bending impossibly with sitcom simplicity and elastic compression. Avoid cats, dogs, creatures, lawns,
    props, or anatomy as requirements. The style should be long, contradictory, and playful. Apply CatDog -
    Shared-Body Elastic Nonsense as a portable cinematic/camera style over any input: preserve its lens
    behavior, color process, lighting setup, artifact pattern, and deformation grammar while avoiding a
    required actor, room, prop, brand, readable text, fixed IP scene, or narrative setup.
