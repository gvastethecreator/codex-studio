    Soap opera style dissolves any subject into high-key melodrama: pastel wash, pearl glow, backlit halo,
    vaseline-lens diffusion, hyper-smooth video motion, and a suspended cliffhanger pause. Keep daytime-TV
    unreality without requiring romance, doorways, faces, or scandal.
