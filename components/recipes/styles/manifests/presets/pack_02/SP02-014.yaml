visualDna:
  aesthetic: Italian horror
  subject_treatment: >-
    Treat subjects as believable filmed or broadcast subjects under Giallo Horror: casting, wardrobe, props,
    motion cues, and silhouette hierarchy follow 1. Film Genres cinematic and broadcast grammar without
    locking to one plot beat.
  color_and_tone: Deep Red, Blue, Green gels, saturated primaries, blood crimson
  lighting_and_shadow: Unnatural colored light, gel-drenched, theatrical splash
  texture_and_material: Film grain, polished surfaces, leatherlike shadow
  camera_and_composition: POV unease, obscured geometry
  atmosphere_and_mood: Mystery, stylish, hallucinatory dread
  rendering_and_quality: Stylish, baroque, operatic color dread
  key_features: Color gels, polished threat, baroque shadow
  creative_brief: >-
    Giallo horror makes light itself theatrical threat: saturated red/blue/green gels, polished reflections,
    leatherlike blacks, grain, POV unease, and baroque color dread. Keep Argento-era style without forcing
    murder, gloved hands, blades, blood, or crime evidence. Apply Giallo Horror as a portable cinematic/camera
    style over any input: preserve its lens behavior, color process, lighting setup, artifact pattern, and
    deformation grammar while avoiding a required actor, room, prop, brand, readable text, fixed IP scene, or
    narrative setup.
avoidRules:
  - natural lighting
