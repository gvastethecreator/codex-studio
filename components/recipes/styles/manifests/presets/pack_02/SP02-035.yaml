visualDna:
  aesthetic: Elastic golden-age studio cartoon, Chuck Jones timing, painted backgrounds, graphic slapstick energy
  subject_treatment: Thick black
  color_and_tone: Flat, primary pop, canary yellow, ACME red, sky cel blue
  lighting_and_shadow: Flat cel color, no shading, graphic clarity
  texture_and_material: Cel, painted acetate, glossy finish, gouache background
  camera_and_composition: Extreme squash/stretch, full-body deformation, eye-pop take
  atmosphere_and_mood: Funny, anarchic, elastic, gag-driven
  rendering_and_quality: Zany, fast, breakneck timing, held-smear blur
  key_features: Abstract painted backdrop, held smear, squash-stretch deformation, crisp cel silhouette
  creative_brief: >-
    Apply golden-age cartoon grammar to any input: flat cel color, thick confident outline, held-smear motion,
    exaggerated squash-stretch, and painted backdrops simplified for comic impact. Do not require specific
    props, creatures, or set pieces; the value is timing, deformation, and graphic clarity. Reality should
    bend toward the gag through shape, pose, and rhythm.
