visualDna:
  aesthetic: Strobe-sliced motion freeze
  subject_treatment: >-
    Treat subjects as believable filmed or broadcast subjects under Strobe Light: casting, wardrobe, props,
    motion cues, and silhouette hierarchy follow 5. Lighting And Atmosphere cinematic and broadcast grammar
    without locking to one plot beat.
  color_and_tone: High contrast White, hard flash, bleached moment, deep shadow gaps
  lighting_and_shadow: Flash freeze, strobe burst, millisecond illumination
  texture_and_material: Sharp motion edges, suspended droplets or fragments, hard-flash glare
  camera_and_composition: Motion trails, ghost frame, multiple-exposure overlay
  atmosphere_and_mood: Disorienting, intense, discontinuous rhythm, flash-cut energy
  rendering_and_quality: Intense, frozen, time-slice, action-arrested
  key_features: Frozen motion, hard flash edges, ghost frame, black gaps, time-slice rhythm
  creative_brief: >-
    Render motion as strobe discontinuity: millisecond flash bursts, frozen fragments, hard white glare, black
    gaps, and ghosted multi-exposure trails. Avoid club scenes, dancers, panic, or specific action props. The
    image should feel cut into separate time slices by light. Apply Strobe Light as a portable
    cinematic/camera style over any input: preserve its lens behavior, color process, lighting setup, artifact
    pattern, and deformation grammar while avoiding a required actor, room, prop, brand, readable text, fixed
    IP scene, or narrative setup.
avoidRules:
  - continuous light
