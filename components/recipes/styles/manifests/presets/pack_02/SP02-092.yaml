visualDna:
  aesthetic: >-
    Drawing on crumpled then flattened paper, crease-lines cutting through the art, stained and abused
    surface, wrinkled-grid distortion, beautiful-accident texture, discarded-thought recovered
  subject_treatment: >-
    Lines broken by paper creases, ink pooling in fold valleys, interrupted-contour across wrinkles,
    roughened-edge strokes
  color_and_tone: >-
    Stained paper beige, coffee-ring sepia, ballpoint blue, graphite grey, yellow-highlighter fluorescence,
    tea-tannin brown
  lighting_and_shadow: >-
    Top-down desk-lamp warmth, crease-shadow depth from crumpled topography, side-light revealing paper
    texture
  texture_and_material: >-
    Deep-crease paper folds, coffee-stain absorption circles, water-damage warping, ink-bleed into fibers,
    torn-edge roughness
  camera_and_composition: Forms bisected by fold lines, features shifted across crease faults, drawn-then-crumpled distortion
  atmosphere_and_mood: >-
    Desperate creativity, beautiful failure, late-night frustrated genius, rescued inspiration, melancholy
    charm
  rendering_and_quality: >-
    Crumpled-paper sketch aesthetic, rescued-from-trash beauty, accidental-texture rendering, wabi-sabi art
    philosophy
  key_features: >-
    Paper crease lines across art, coffee-stain rings, torn paper edges, ink-pooling in fold valleys,
    wabi-sabi imperfection
  creative_brief: >-
    Apply crumpled-paper damage to any input: fold faults, ink pooling, coffee stains, torn edges, warped
    fibers, and recovered-sketch imperfection. Avoid requiring characters, trash scenes, or literal rejection
    narrative. Damage should co-author the composition through surface deformation.
avoidRules:
  - flat
  - clean
  - smooth
  - pristine
  - digital
  - straight
  - unwrinkled
  - perfect
  - crisp edges
