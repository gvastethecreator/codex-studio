  creative_brief: >-
    Recompose any input as folded paper construction: planar facets, visible crease shadows, fibrous edges,
    and soft studio bounce across handmade paper. Avoid forcing landscapes, tabletop worlds, or origami
    creatures. The subject should keep its intent while becoming a fragile assembly of folds, thickness, and
    careful craft.
