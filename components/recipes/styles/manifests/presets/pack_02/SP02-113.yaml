  creative_brief: >-
    Use toxic suburb satire as style: malformed silhouettes, polluted color, class-coded clutter, lopsided
    warmth, and environmental rot embedded in shape. Avoid families, portraits, trailers, smokestacks, or
    bodies as required content. The image should feel poisoned yet weirdly cozy. Apply The Oblongs - Toxic
