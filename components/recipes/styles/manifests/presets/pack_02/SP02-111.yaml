visualDna:
  aesthetic: >-
    Mouth-breathing delinquent caricature, slouch nihilism, ugly low-rent interiors as style anchor, cheap
    music-video culture, vacant deadbrain energy, pencil-neck stupidity
  subject_treatment: Jagged slack contours, pencil-neck angles, ugly profile-like construction, slow posture sag
  color_and_tone: Cheap TV beige, nicotine yellow, washed denim blue, dull brown, cathode green, stale red
  lighting_and_shadow: Flat cathode glow, low-rent room ambience, no glamour, tired exposure
  texture_and_material: Analog TV grain, stained fabric suggestion, cheap wall texture, rough ink edge
  camera_and_composition: Gravity-heavy slouch, flattened posture, jagged head shapes, underfed proportion logic
  atmosphere_and_mood: Idiotic, lazy, mean, vacant
  rendering_and_quality: Ugly deadpan adult cartoon, low-energy slouch caricature, anti-glamour TV satire
  key_features: Slouch geometry, deadbeat clutter texture, ugly profile-like shapes, cheap-TV ambience, vacant posture
  creative_brief: >-
    Use dumb slouch caricature as visual grammar: sagging posture logic, jagged profiles, cheap-TV glow, ugly
    low-rent color, and vacant timing. Avoid couches, teens, interiors, overbites, or specific bodies as
    requirements. The style should make boredom look physically heavy. Apply Beavis and Butt-Head - Dumb Couch
    Slouch as a portable cinematic/camera style over any input: preserve its lens behavior, color process,
    lighting setup, artifact pattern, and deformation grammar while avoiding a required actor, room, prop,
    brand, readable text, fixed IP scene, or narrative setup.
