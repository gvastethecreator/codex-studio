  creative_brief: >-
    Use dumb slouch caricature as visual grammar: sagging posture logic, jagged profiles, cheap-TV glow, ugly low-rent
    color, and vacant timing. Avoid couches, teens, interiors, overbites, or specific bodies as requirements. The style
    should make boredom look physically heavy. Apply Beavis and Butt-Head - Dumb Couch Slouch as a portable
    cinematic/camera style over any input: preserve its lens behavior, color process, lighting setup, artifact pattern,
    and deformation grammar while avoiding a required actor, room, prop, brand, readable text, fixed IP scene, or
    narrative setup.
