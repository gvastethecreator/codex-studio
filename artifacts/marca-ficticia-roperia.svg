    <path d="M-230 60 C-130 0, -40 -10, 60 40 C130 75, 220 70, 300 20 L300 240 L-300 240 Z" fill="none" stroke="#f8fafc" stroke-width="18" stroke-linejoin="round" opacity="0.9"/>

