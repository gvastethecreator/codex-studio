    <path d="M-220 98 C-120 56, -40 50, 70 92 C140 120, 225 118, 285 66" stroke="#cbd5e1" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>

    <text x="0" y="-35" text-anchor="middle" font-size="84" font-family="Georgia, 'Times New Roman', serif" fill="#f8fafc" letter-spacing="8" font-weight="700">NOVA</text>
    <text x="0" y="34" text-anchor="middle" font-size="84" font-family="Georgia, 'Times New Roman', serif" fill="#94a3b8" letter-spacing="8" font-weight="700">THREADS</text>

    <text x="0" y="96" text-anchor="middle" font-size="28" font-family="Arial, Helvetica, sans-serif" fill="#cbd5e1" letter-spacing="5">Ropa urbana consciente</text>
  </g>

  <g opacity="0.8">
    <rect x="90" y="92" width="130" height="7" rx="3" fill="#f8fafc"/>
    <rect x="970" y="530" width="130" height="7" rx="3" fill="#f8fafc"/>
    <rect x="90" y="530" width="130" height="7" rx="3" fill="#94a3b8"/>
    <rect x="970" y="92" width="130" height="7" rx="3" fill="#94a3b8"/>
  </g>

  <text x="120" y="580" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#cbd5e1" letter-spacing="2">Colección "Horizonte" · Edición 2026</text>
